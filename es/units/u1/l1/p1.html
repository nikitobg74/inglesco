<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unidad 1 - Lección 1 Parte 1: Saludos básicos | Inglesco</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script> 
 <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
    body { padding:20px; background:#eef2ff; }

    .back-btn { display:inline-block; margin-bottom:20px; padding:8px 15px; background:#2563eb; color:white; border-radius:10px; text-decoration:none; font-weight:600; }
    .back-btn:hover { background:#1e40af; }

    h1 { text-align:center; margin-bottom:15px; color:#2563eb; }

    /* Progress Bar with Steps */
    .progress-container {
      display:flex;
      justify-content:center;
      margin-bottom:30px;
      gap:10px;
    }

    .step {
      width:40px;
      height:40px;
      border-radius:50%;
      background:#d1d5db;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      color:black;
      cursor:pointer;
      transition: all 0.3s ease;
    }

    .step.active {
      background:#2563eb;
      color:white;
    }

    .step:hover {
      transform: scale(1.1);
    }

    /* Character Card */
    .character {
      background: white;
      max-width: 600px;
      margin: 20px auto;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .character img {
      width: 220px;
      border-radius: 12px;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .character img:hover { transform: scale(1.05); }

    .english { font-size: 22px; font-weight: 600; margin-top: 15px; }
    .spanish { font-size: 16px; color: #555; margin-top: 5px; }
    .counter { margin-top: 10px; font-weight: 600; color: #2563eb; }

    /* Continue Button */
    .continue-btn {
      display: block;
      margin: 40px auto;
      padding: 12px 25px;
      background: #9ca3af;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: not-allowed;
    }

    .continue-btn.enabled {
      background: #2563eb;
      cursor: pointer;
    }

  </style>
</head>

<body>

<a href="../index.html" class="back-btn">← Volver a Unidad 1</a>
<h1>Lección 1</h1>

<!-- Progress -->
<div class="progress-container">
  <div class="step active" onclick="window.location.href='p1.html'">1</div>
  <div class="step" onclick="window.location.href='p2.html'">2</div>
  <div class="step" onclick="window.location.href='p3.html'">3</div>
  <div class="step" onclick="window.location.href='p4.html'">4</div>
<div class="step" onclick="window.location.href='p5.html'">5</div>
</div>

<!-- Ana -->
<div class="character">
  <img src="../../../../assets/images/u1/ana.png" alt="Ana saying: Hello, my name is Ana" onclick="playAudio('ana')" />
  <div class="english">Hello. My name is Ana.</div>
  <div class="spanish">Hola, me llamo Ana.</div>
  <div class="counter" id="ana-count">Plays: 0/2</div>
  <audio id="ana-audio" src="../../../../assets/audio/u1/ana.mp3"></audio>
</div>

<!-- Pedro -->
<div class="character">
  <img src="../../../../assets/images/u1/pedro.png" alt="Pedro saying: Hello, my name is Pedro" onclick="playAudio('pedro')" />
  <div class="english">Hello. My name is Pedro.</div>
  <div class="spanish">Hola, me llamo Pedro.</div>
  <div class="counter" id="pedro-count">Plays: 0/2</div>
  <audio id="pedro-audio" src="../../../../assets/audio/u1/pedro.mp3"></audio>
</div>

<!-- George -->
<div class="character">
  <img src="../../../../assets/images/u1/george.png" alt="George saying: Hello, my name is George" onclick="playAudio('george')" />
  <div class="english">Hello. My name is George.</div>
  <div class="spanish">Hola, me llamo George.</div>
  <div class="counter" id="george-count">Plays: 0/2</div>
  <audio id="george-audio" src="../../../../assets/audio/u1/george.mp3"></audio>
</div>

<!-- Julie -->
<div class="character">
  <img src="../../../../assets/images/u1/julie.png" alt="Julie saying: Hello, my name is Julie" onclick="playAudio('julie')" />
  <div class="english">Hello. My name is Julie.</div>
  <div class="spanish">Hola, me llamo Julie.</div>
  <div class="counter" id="julie-count">Plays: 0/2</div>
  <audio id="julie-audio" src="../../../../assets/audio/u1/julie.mp3"></audio>
</div>

<button class="continue-btn" id="continueBtn" disabled>
  Continue / Continuar →
</button>

<script>
let plays = { ana:0, pedro:0, george:0, julie:0 };

function playAudio(name) {
  const audio = document.getElementById(name + "-audio");
  audio.play();

  if (plays[name] < 2) {
    plays[name]++;
    document.getElementById(name + "-count").innerText =
      "Plays: " + plays[name] + "/2";
  }

  checkCompletion();
}

function checkCompletion() {
  if (plays.ana >=2 && plays.pedro >=2 && plays.george >=2 && plays.julie >=2) {
    const btn = document.getElementById("continueBtn");
    btn.disabled = false;
    btn.classList.add("enabled");
    btn.onclick = () => { window.location.href = "p2.html"; };
  }
}
</script>

</body>
</html>
