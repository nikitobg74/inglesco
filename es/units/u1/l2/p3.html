<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lección 2 - Parte 3</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script defer src="../../../../js/u1/u1_l2_p3.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body { padding:20px; background:#dbeafe; }

    .back-btn { display:inline-block; margin-bottom:20px; padding:8px 15px; background:#2563eb; color:white; border-radius:10px; text-decoration:none; font-weight:600; }
    .back-btn:hover { background:#1e40af; }

    .unit-title { text-align:center; font-size:26px; font-weight:700; margin-bottom:10px; color:#2563eb; }

    .progress-container { display:flex; justify-content:center; margin:15px 0 25px; gap:10px; flex-wrap:wrap; }
    .step { width:40px; height:40px; border-radius:50%; background:#d1d5db; display:flex; align-items:center; justify-content:center; font-weight:600; color:black; cursor:pointer; transition:all 0.3s; }
    .step.active { background:#2563eb; color:white; }
    .step:hover { transform:scale(1.1); }

    .exercise-box { max-width:680px; margin:0 auto; background:white; padding:25px 20px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); text-align:center; }

    h2 { font-size:18px; color:#1e293b; margin-bottom:4px; }
    .subtitle { font-size:14px; color:#64748b; margin-bottom:20px; }

    .portrait-wrap { position:relative; display:inline-block; cursor:pointer; margin-bottom:16px; }
    .portrait-wrap img { width:110px; height:110px; object-fit:cover; border-radius:14px; border:3px solid #2563eb; display:block; transition:opacity 0.2s; }
    .portrait-wrap:hover img { opacity:0.85; }
    .audio-badge { position:absolute; bottom:6px; right:6px; background:rgba(37,99,235,0.85); color:white; border-radius:50%; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-size:15px; pointer-events:none; }

    .zone-label { font-size:12px; font-weight:600; color:#94a3b8; text-align:left; margin-top:14px; margin-bottom:4px; padding-left:4px; }
    .drop-zone, .word-bank { min-height:64px; padding:12px; border:2px dashed #cbd5e1; border-radius:12px; display:flex; flex-wrap:wrap; gap:8px; justify-content:center; align-items:center; }
    .drop-zone { background:#f8faff; }

    .word { padding:9px 15px; background:#3b82f6; color:white; font-size:15px; font-weight:600; border-radius:10px; cursor:pointer; user-select:none; transition:transform 0.15s, background 0.15s; }
    .word:hover { background:#2563eb; transform:scale(1.05); }
    .word:active { transform:scale(0.95); }
    .word.in-zone { background:#7c3aed; }
    .word.in-zone:hover { background:#6d28d9; }

    .btn-row { display:flex; gap:10px; justify-content:center; margin-top:14px; flex-wrap:wrap; }
    .check-btn { padding:11px 28px; font-size:15px; font-weight:700; background:#22c55e; color:white; border:none; border-radius:10px; cursor:pointer; flex:1; max-width:260px; font-family:'Poppins',sans-serif; }
    .check-btn:hover { background:#16a34a; }
    .clear-btn { padding:11px 18px; font-size:15px; font-weight:700; background:#f97316; color:white; border:none; border-radius:10px; cursor:pointer; display:none; font-family:'Poppins',sans-serif; }
    .clear-btn:hover { background:#ea580c; }

    .feedback { font-size:15px; font-weight:600; min-height:22px; margin-top:10px; }
    .round-counter { font-size:13px; font-weight:600; color:#2563eb; margin-top:8px; }

    .continue-btn { display:block; margin:20px auto 0; padding:12px 30px; font-size:16px; font-weight:700; background:#22c55e; color:white; border:none; border-radius:10px; cursor:not-allowed; opacity:0.45; transition:all 0.3s; width:100%; max-width:300px; font-family:'Poppins',sans-serif; }
    .continue-btn.enabled { opacity:1; cursor:pointer; }
    .continue-btn.enabled:hover { background:#16a34a; }

    .i18n { display:none; }

    @media(max-width:480px) {
      .exercise-box { padding:18px 14px; }
      .word { font-size:14px; padding:8px 12px; }
    }
  </style>
</head>
<body>

<a href="../index.html" class="back-btn">← Volver a Unidad 1</a>
<div class="unit-title">Lección 2</div>

<div class="progress-container">
  <div class="step" data-page="p1.html">1</div>
  <div class="step" data-page="p2.html">2</div>
  <div class="step active" data-page="p3.html">3</div>
  <div class="step" data-page="p4.html">4</div>
</div>

<div class="i18n">
  <span id="msg-correct">✅ ¡Correcto!</span>
  <span id="msg-try-again">❌ Intenta otra vez</span>
  <span id="msg-excellent">🎉 ¡Excelente! Lo lograste.</span>
  <span id="counter-tpl">Ejercicio {n} / {total}</span>
</div>

<div class="exercise-box">
  <h2>Ordena las palabras</h2>
  <p class="subtitle">Toca la imagen para escuchar, luego arma la oración</p>

  <div id="portraitArea"></div>

  <p class="zone-label">Tu respuesta:</p>
  <div class="drop-zone" id="dropZone"></div>

  <p class="zone-label">Palabras:</p>
  <div class="word-bank" id="wordBank"></div>

  <div class="btn-row">
    <button class="check-btn" id="checkBtn">Verificar ✓</button>
    <button class="clear-btn" id="clearBtn">Limpiar ✕</button>
  </div>

  <div class="feedback" id="feedback"></div>
  <div class="round-counter" id="roundCounter"></div>

  <button class="continue-btn" id="continueBtn" disabled>Continuar →</button>
</div>

<script id="exercise-data" type="application/json">
{
  "imgBase":   "../../../../assets/images/u1/",
  "audioBase": "../../../../assets/audio/u1/",
  "nextPage":  "p4.html",
  "rounds": [
    { "key":"maria",  "img":"maria.png",  "audio":"maria_1_2_1.mp3",  "answer":"I am Maria" },
    { "key":"carlos", "img":"carlos.png", "audio":"carlos_1_2_1.mp3", "answer":"I am from Buenos Aires" },
    { "key":"pedro",  "img":"pedro.png",  "audio":"pedro_1_2_1.mp3",  "answer":"I am Chilean" },
    { "key":"george", "img":"george.png", "audio":"george_1_2_1.mp3", "answer":"I am from Caracas" },
    { "key":"julie",  "img":"julie.png",  "audio":"julie_1_2_1.mp3",  "answer":"I am Costa Rican" }
  ]
}
</script>

</body>
</html>
