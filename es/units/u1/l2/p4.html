<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lección 2 - Parte 4</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script defer src="../../../../js/u1/u1_l2_p4.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
    body { padding:20px; background:#dbeafe; }

    .back-btn { display:inline-block; margin-bottom:20px; padding:8px 15px; background:#2563eb; color:white; border-radius:10px; text-decoration:none; font-weight:600; }
    .back-btn:hover { background:#1e40af; }

    .unit-title { text-align:center; font-size:26px; font-weight:700; margin-bottom:10px; color:#2563eb; }

    .progress-container { display:flex; justify-content:center; margin:15px 0 25px; gap:10px; flex-wrap:wrap; }
    .step { width:40px; height:40px; border-radius:50%; background:#d1d5db; display:flex; align-items:center; justify-content:center; font-weight:600; color:black; cursor:pointer; transition:all 0.3s; }
    .step.active { background:#2563eb; color:white; }
    .step:hover { transform:scale(1.1); }

    .exercise-box { max-width:600px; margin:0 auto; background:white; padding:25px 20px; border-radius:15px; box-shadow:0 10px 25px rgba(0,0,0,0.1); text-align:center; }

    h2 { font-size:18px; color:#1e293b; margin-bottom:4px; }
    .subtitle { font-size:14px; color:#64748b; margin-bottom:22px; }

    .portrait-wrap { position:relative; display:inline-block; cursor:pointer; margin-bottom:18px; }
    .portrait-wrap img { width:130px; height:130px; object-fit:cover; border-radius:14px; border:3px solid #2563eb; display:block; transition:opacity 0.2s; }
    .portrait-wrap:hover img { opacity:0.85; }
    .audio-badge { position:absolute; bottom:6px; right:6px; background:rgba(37,99,235,0.85); color:white; border-radius:50%; width:32px; height:32px; display:flex; align-items:center; justify-content:center; font-size:16px; pointer-events:none; }

    .sentence { font-size:18px; font-weight:600; color:#1e293b; line-height:2; margin-bottom:16px; }

    .blank-input { display:inline-block; padding:6px 10px; font-size:16px; font-family:'Poppins',sans-serif; border:2px solid #cbd5e1; border-radius:8px; width:120px; text-align:center; outline:none; transition:border-color 0.2s, background 0.2s; vertical-align:middle; }
    .blank-input:focus { border-color:#2563eb; }
    .blank-input.correct { border-color:#22c55e; background:#f0fdf4; color:#15803d; }
    .blank-input.wrong   { border-color:#ef4444; background:#fef2f2; color:#b91c1c; animation:shake 0.35s ease; }
    .blank-input:disabled { background:#f1f5f9; }

    @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)} 40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }

    .hint { font-size:13px; color:#7c3aed; font-weight:600; min-height:20px; margin-bottom:6px; }
    .feedback { font-size:15px; font-weight:600; min-height:22px; margin-bottom:12px; }

    .attempts-dots { display:flex; justify-content:center; gap:6px; margin-bottom:10px; }
    .dot { width:10px; height:10px; border-radius:50%; background:#d1d5db; transition:background 0.3s; }
    .dot.used { background:#ef4444; }

    .btn-row { display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:6px; }
    .check-btn { padding:11px 28px; font-size:15px; font-weight:700; background:#2563eb; color:white; border:none; border-radius:10px; cursor:pointer; transition:background 0.2s; font-family:'Poppins',sans-serif; }
    .check-btn:hover { background:#1e40af; }
    .check-btn:disabled { background:#93c5fd; cursor:default; }
    .clear-btn { padding:11px 18px; font-size:15px; font-weight:700; background:#f97316; color:white; border:none; border-radius:10px; cursor:pointer; display:none; font-family:'Poppins',sans-serif; }
    .clear-btn:hover { background:#ea580c; }

    .nav-row { display:flex; justify-content:space-between; align-items:center; margin-top:20px; gap:10px; }
    .nav-btn { padding:10px 22px; font-size:14px; font-weight:700; border:none; border-radius:10px; cursor:pointer; transition:all 0.2s; font-family:'Poppins',sans-serif; }
    .nav-btn.prev { background:#e2e8f0; color:#374151; }
    .nav-btn.prev:hover { background:#cbd5e1; }
    .nav-btn.next { background:#22c55e; color:white; }
    .nav-btn.next:hover { background:#16a34a; }
    .nav-btn:disabled { opacity:0.4; cursor:default; }
    .card-counter { font-size:13px; font-weight:600; color:#2563eb; }

    .i18n { display:none; }

    @media(max-width:480px) {
      .exercise-box { padding:18px 14px; }
      .sentence { font-size:16px; }
      .blank-input { width:100px; font-size:14px; }
    }
  </style>
</head>
<body>

<a href="../index.html" class="back-btn">← Volver a Unidad 1</a>
<div class="unit-title">Lección 2</div>

<div class="progress-container">
  <div class="step" data-page="p1.html">1</div>
  <div class="step" data-page="p2.html">2</div>
  <div class="step" data-page="p3.html">3</div>
  <div class="step active" data-page="p4.html">4</div>
</div>

<div class="i18n">
  <span id="msg-correct">✅ ¡Correcto!</span>
  <span id="msg-wrong">❌ Intenta de nuevo</span>
  <span id="msg-hint-pre">💡 Pista:</span>
  <span id="msg-all-done">🎉 ¡Lección completada!</span>
</div>

<div class="exercise-box">
  <h2>Completa la oración</h2>
  <p class="subtitle">Toca la imagen para escuchar y escribe las palabras que faltan</p>

  <div id="cardArea"></div>

  <div class="nav-row">
    <button class="nav-btn prev" id="prevBtn" disabled>← Anterior</button>
    <span class="card-counter" id="cardCounter"></span>
    <button class="nav-btn next" id="nextBtn">Siguiente →</button>
  </div>
</div>
