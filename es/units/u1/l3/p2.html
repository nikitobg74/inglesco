<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unidad 1 - Lección 3 - Parte 2</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- ✅ Correct JS path -->
  <script defer src="../../../../js/u1/u1_l3_p2.js"></script>

  <style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
    body { padding:20px; background:#dbeafe; }

    .back-btn {
      display:inline-block;
      margin-bottom:20px;
      padding:8px 15px;
      background:#2563eb;
      color:white;
      border-radius:10px;
      text-decoration:none;
      font-weight:600;
    }
    .back-btn:hover { background:#1e40af; }

    .unit-title {
      text-align:center;
      font-size:28px;
      font-weight:700;
      margin-bottom:15px;
      color:#2563eb;
    }

    /* Progress bar */
    .progress-container {
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:25px;
    }
    .step {
      width:40px;
      height:40px;
      border-radius:50%;
      background:#d1d5db;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      cursor:pointer;
      transition: transform 0.3s;
    }
    .step.active { background:#2563eb; color:white; }
    .step:hover { transform: scale(1.1); }

    .exercise-box {
      max-width:800px;
      margin:0 auto;
      background:white;
      padding:30px;
      border-radius:15px;
      box-shadow:0 10px 25px rgba(0,0,0,0.1);
      text-align:center;
    }

    .exercise-text { text-align:center; margin-top:10px; }
    .exercise-text .en { font-size:18px; color:#1e40af; font-weight:600; }
    .exercise-text .es { font-size:14px; color:#2563eb; font-weight:400; display:block; margin-top:4px; }

    /* Number boxes */
    .number-container {
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      gap:15px;
      margin-top:20px;
    }

    .number-card {
      width:110px;
      height:110px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      border-radius:12px;
      cursor:pointer;
      transition: transform 0.2s;
      color:white;
    }

    .number-card:hover { transform: scale(1.1); }

    .number-digit {
      font-size:36px;
      font-weight:700;
      line-height:1;
    }

    .number-word {
      font-size:14px;
      font-weight:700;
      color:black; /* BLACK and BOLD as requested */
      margin-top:5px;
      letter-spacing:1px;
    }

    .number-card.played { opacity:0.5; }

    .next-btn {
      margin:30px auto 0 auto;
      padding:12px 25px;
      font-size:16px;
      border:none;
      border-radius:10px;
      background:#2563eb;
      color:white;
      font-weight:600;
      cursor:pointer;
      display:none;
    }
    .next-btn:hover { background:#1e40af; }
  </style>
</head>

<body>

<a href="../index.html" class="back-btn">← Volver a Unidad 1</a>

<div class="unit-title">Lección 3 - Parte 2</div>

<div class="progress-container" id="progressContainer">
  <div class="step" data-page="p1.html">1</div>
  <div class="step active" data-page="p2.html">2</div>
  <div class="step" data-page="p3.html">3</div>
  <div class="step" data-page="p4.html">4</div>
<div class="step" data-page="p5.html">5</div>
</div>

<div class="exercise-box">
  <h2>Numbers - Números</h2>
  <p class="exercise-text">
    <span class="en">Click on a number to hear its pronunciation.</span><br>
    <span class="es">Haz click en un número para escuchar su pronunciación</span>
  </p>

  <!-- ✅ JS reads config from here (language stays in HTML) -->
  <div class="number-container" id="numberContainer"
       data-audio-base="../../../../assets/audio/u1/"
       data-next="p3.html"></div>

  <button class="next-btn" id="nextBtn">Siguiente →</button>
</div>

</body>
</html>
