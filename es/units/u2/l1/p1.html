<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unidad 2 - Lección 1 - Parte 1</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --blue:        #2563eb;
  --blue-dark:   #1e40af;
  --blue-light:  #dbeafe;
  --green:       #16a34a;
  --green-light: #bbf7d0;
  --green-border:#86efac;
  --bg:          #f0f4ff;
  --card-bg:     #ffffff;
  --text:        #1e293b;
  --muted:       #94a3b8;
  --radius:      16px;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px;
}

/* ── Back button ── */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px;
  background: var(--blue);
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 16px;
  transition: background 0.2s;
}
.back-btn:hover { background: var(--blue-dark); }

/* ── Progress steps ── */
.progress-container {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 0 0 20px 0;
}
.step {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: #d1d5db;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  color: #1f2933;
}
.step.active { background: var(--blue); color: #fff; }
.step:hover  { transform: scale(1.1); }

/* ── Main card ── */
.exercise-box {
  max-width: 950px;
  margin: 0 auto;
  background: var(--card-bg);
  padding: 28px 28px 32px;
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(37,99,235,0.10);
}

.unit-title {
  color: var(--blue);
  font-size: clamp(18px, 4vw, 26px);
  font-weight: 900;
  text-align: center;
  margin-bottom: 14px;
  line-height: 1.3;
}

.instruction-box {
  background: var(--blue-light);
  padding: 12px 18px;
  border-radius: 12px;
  text-align: center;
  font-weight: 700;
  font-size: clamp(13px, 3vw, 15px);
  margin-bottom: 24px;
  color: var(--blue-dark);
}

/* ── Word cards grid ── */
.words-container {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 16px;
  margin-bottom: 28px;
}

.word-card {
  background: #f8faff;
  border: 2px solid #e0e7ff;
  border-radius: var(--radius);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s, background 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.word-card:hover {
  transform: translateY(-3px);
  box-shadow: 0 8px 20px rgba(37,99,235,0.15);
  border-color: var(--blue);
}
.word-card:active { transform: scale(0.97); }
.word-card.played {
  background: var(--green-light);
  border-color: var(--green-border);
}

/* Image area */
.card-img-wrap {
  width: 100%;
  aspect-ratio: 4/3;
  overflow: hidden;
  position: relative;
  background: #e0e7ff;
}
.card-img-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.3s;
}
.word-card:hover .card-img-wrap img { transform: scale(1.05); }

/* Speaker icon overlay */
.speaker-overlay {
  position: absolute;
  bottom: 7px;
  right: 7px;
  background: rgba(37,99,235,0.85);
  color: #fff;
  border-radius: 50%;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  transition: background 0.2s;
  pointer-events: none;
}
.word-card.played .speaker-overlay { background: rgba(22,163,74,0.90); }

/* Text area */
.card-text {
  padding: 10px 8px 12px;
  text-align: center;
  width: 100%;
}
.word-en {
  font-size: clamp(14px, 3vw, 17px);
  font-weight: 800;
  color: var(--text);
  line-height: 1.2;
}
.word-es {
  font-size: clamp(11px, 2.5vw, 13px);
  color: var(--muted);
  font-weight: 600;
  margin-top: 3px;
}
.word-card.played .word-en { color: var(--green); }

/* ── Next button ── */
.next-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--blue);
  color: #fff;
  padding: 12px 24px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 800;
  font-size: 15px;
  transition: background 0.2s;
}
.next-btn:hover { background: var(--blue-dark); }

/* ── Responsive ── */
@media (max-width: 480px) {
  .exercise-box     { padding: 20px 14px 24px; }
  .words-container  { grid-template-columns: repeat(2, 1fr); gap: 12px; }
}
</style>
</head>

<body>

<a href="../index.html" class="back-btn">← Volver a Unidad 2</a>

<div class="progress-container">
  <div class="step active" data-page="p1.html">1</div>
  <div class="step" data-page="p2.html">2</div>
  <div class="step" data-page="p3.html">3</div>
  <div class="step" data-page="p4.html">4</div>
</div>

<div class="exercise-box">

  <h1 class="unit-title">Lección 1 · Parte 1<br>Rooms in the House – Habitaciones de la casa</h1>

  <div class="instruction-box">
    👆 Toca cada imagen para escuchar la pronunciación en inglés
  </div>

  <div class="words-container" id="wordsContainer"></div>

  <a href="p2.html" class="next-btn">Siguiente →</a>

</div>

<script src="../../../../js/u2/u2_l1_p1.js"></script>
</body>
</html>
