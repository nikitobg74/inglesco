<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 2 - Lección 1 - Parte 3</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --blue:        #2563eb;
  --blue-dark:   #1e40af;
  --blue-light:  #dbeafe;
  --green:       #16a34a;
  --green-light: #dcfce7;
  --red:         #dc2626;
  --bg:          #f0f4ff;
  --card-bg:     #ffffff;
  --text:        #1e293b;
  --muted:       #64748b;
  --radius:      14px;
}

body {
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 12px 16px;
}

/* ── Back button ── */
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 7px 14px;
  background: var(--blue);
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  font-weight: 700;
  font-size: 13px;
  margin-bottom: 12px;
  transition: background 0.2s;
}
.back-btn:hover { background: var(--blue-dark); }

/* ── Progress steps ── */
.progress-container {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 14px;
}
.step {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: #d1d5db;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 14px;
  cursor: pointer;
  transition: all 0.2s;
  color: #1f2933;
}
.step.active { background: var(--blue); color: #fff; }
.step:hover  { transform: scale(1.1); }

/* ── Main card ── */
.exercise-box {
  max-width: 950px;
  margin: 0 auto;
  background: var(--card-bg);
  padding: 18px 18px 24px;
  border-radius: 20px;
  box-shadow: 0 8px 30px rgba(37,99,235,0.10);
}

.unit-title {
  color: var(--blue);
  font-size: clamp(15px, 3.5vw, 22px);
  font-weight: 900;
  text-align: center;
  margin-bottom: 10px;
  line-height: 1.3;
}

.instruction-box {
  background: var(--blue-light);
  padding: 9px 14px;
  border-radius: 12px;
  text-align: center;
  font-weight: 700;
  font-size: clamp(11px, 2.6vw, 13px);
  margin-bottom: 14px;
  color: var(--blue-dark);
  line-height: 1.5;
}

/* ── Top row: woman + room image side by side ── */
.p3-top {
  display: flex;
  gap: 12px;
  align-items: flex-start;
  margin-bottom: 14px;
}

/* Woman — compact */
.p3-man {
  flex: 0 0 auto;
  text-align: center;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.p3-man img {
  width: 80px;
  height: 80px;
  object-fit: cover;
  border-radius: 12px;
  border: 2px solid #e0e7ff;
  display: block;
  transition: transform 0.2s, box-shadow 0.2s;
}
.p3-man:hover img {
  transform: scale(1.04);
  box-shadow: 0 4px 12px rgba(37,99,235,0.2);
}
.p3-man-label {
  font-size: 10px;
  color: var(--muted);
  font-weight: 700;
  margin-top: 3px;
  line-height: 1.3;
}

/* Room card — takes remaining width */
.room-card {
  flex: 1;
  background: #f8fafc;
  border: 2px solid #e5e7eb;
  border-radius: var(--radius);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 120px;
  transition: border-color 0.3s, box-shadow 0.3s;
}
.room-card.solved {
  border-color: var(--green);
  box-shadow: 0 0 0 3px rgba(22,163,74,0.15);
}
.room-card img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  border-radius: 10px;
}
.room-placeholder {
  padding: 16px 12px;
  background: #eef2ff;
  color: #334155;
  font-weight: 700;
  font-size: 13px;
  text-align: center;
  width: 100%;
}

/* Mini progress */
.mini-progress {
  text-align: center;
  font-weight: 800;
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 10px;
}

/* ── Sentence slots ── */
.sentence {
  display: flex;
  gap: 8px;
  justify-content: center;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.slot {
  min-width: 60px;
  padding: 10px 10px;
  border-radius: 10px;
  border: 2px dashed #cbd5e1;
  background: #fff;
  font-weight: 800;
  font-size: clamp(12px, 3vw, 15px);
  text-align: center;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  color: #94a3b8;
}
.slot.filled {
  border-style: solid;
  border-color: #93c5fd;
  background: #eff6ff;
  color: var(--text);
}
.slot.next-empty {
  border-color: var(--blue);
  background: #eef2ff;
  animation: pulse-slot 1s infinite;
}
@keyframes pulse-slot {
  0%, 100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.3); }
  50%       { box-shadow: 0 0 0 4px rgba(37,99,235,0.15); }
}

/* ── Word bank ── */
.wordbank {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: center;
  margin-bottom: 12px;
}

.word {
  background: #e0f2fe;
  border: 2px solid #bfdbfe;
  padding: 10px 14px;
  border-radius: 10px;
  cursor: pointer;
  font-weight: 800;
  font-size: clamp(13px, 3vw, 15px);
  transition: all 0.15s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
.word:hover  { background: #dbeafe; transform: translateY(-1px); }
.word:active { transform: scale(0.95); }
.word.used   { opacity: 0.35; pointer-events: none; }

/* ── Controls ── */
.controls {
  display: flex;
  gap: 10px;
  justify-content: center;
  margin-bottom: 10px;
}

.btn {
  padding: 10px 20px;
  border-radius: 12px;
  font-weight: 800;
  font-size: 14px;
  cursor: pointer;
  border: none;
  font-family: inherit;
  transition: background 0.2s, transform 0.15s;
}
.btn:active { transform: scale(0.96); }
.btn.primary   { background: var(--blue); color: #fff; }
.btn.primary:hover { background: var(--blue-dark); }
.btn.secondary { background: #64748b; color: #fff; }
.btn.secondary:hover { background: #475569; }
.btn:disabled  { opacity: 0.4; cursor: not-allowed; transform: none; }

/* ── Feedback ── */
#feedback {
  text-align: center;
  font-weight: 800;
  font-size: clamp(13px, 3vw, 15px);
  min-height: 22px;
  margin-bottom: 12px;
}
#feedback.ok  { color: var(--green); }
#feedback.bad { color: var(--red); }

/* ── Next button ── */
.next-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--blue);
  color: #fff;
  padding: 11px 22px;
  border-radius: 12px;
  text-decoration: none;
  font-weight: 800;
  font-size: 14px;
  transition: background 0.2s;
}
.next-btn:hover { background: var(--blue-dark); }

@media (max-width: 380px) {
  .p3-man img { width: 64px; height: 64px; }
  .slot { min-width: 50px; padding: 8px 6px; }
}
</style>
</head>

<body>

<a href="../index.html" class="back-btn">← Volver a Unidad 2</a>

<div class="progress-container">
  <div class="step" data-page="p1.html">1</div>
  <div class="step" data-page="p2.html">2</div>
  <div class="step active" data-page="p3.html">3</div>
  <div class="step" data-page="p4.html">4</div>
</div>

<div class="exercise-box">

  <h1 class="unit-title">Lección 1 · Parte 3<br>Where are you? – ¿Dónde estás?</h1>

  <div class="instruction-box">
    1) Toca a la persona para escuchar &nbsp;·&nbsp;
    2) Mira la imagen &nbsp;·&nbsp;
    3) Toca las palabras para completar: <b>I am in the ____</b>
  </div>

  <!-- Woman + Room side by side -->
  <div class="p3-top">
    <div class="p3-man" id="manBox">
      <img src="../../../../assets/images/u2/u2.l1.p3.woman.jpg" alt="Person">
      <div class="p3-man-label">Where<br>are you?</div>
    </div>

    <div class="room-card" id="roomCard">
      <img id="roomImg" alt="Room" style="display:none;">
      <div class="room-placeholder" id="roomPlaceholder">
        🔒 Toca a la persona para empezar
      </div>
    </div>
  </div>

  <div class="mini-progress" id="miniProgress">0/4</div>

  <!-- Sentence slots -->
  <div class="sentence" id="sentenceSlots">
    <div class="slot" data-slot="0">____</div>
    <div class="slot" data-slot="1">____</div>
    <div class="slot" data-slot="2">____</div>
    <div class="slot" data-slot="3">____</div>
    <div class="slot" data-slot="4">____</div>
  </div>

  <!-- Word bank -->
  <div class="wordbank" id="wordBank"></div>

  <!-- Buttons -->
  <div class="controls">
    <button class="btn secondary" id="clearBtn" disabled>Clear</button>
    <button class="btn primary"   id="checkBtn" disabled>Check ✓</button>
  </div>

  <div id="feedback"
       data-locked="Toca a la persona para empezar"
       data-try-again="Intenta otra vez 🔄"
       data-correct="¡Correcto! ✅">
  </div>

  <a href="p4.html" class="next-btn" id="nextBtn">Siguiente →</a>

</div>

<script src="../../../../js/u2/u2_l1_p3.js"></script>
</body>
</html>
