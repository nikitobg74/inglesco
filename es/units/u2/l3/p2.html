<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unidad 2 • Lección 3 • Parte 2 | Inglesco</title>

<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

body {
  background: linear-gradient(135deg, #dbeafe, #fef9c3);
  min-height: 100vh;
  padding: 16px 12px 80px;
  color: #111827;
}

.wrap { max-width: 700px; margin: 0 auto; }

/* ── BACK ── */
.back-btn {
  display: inline-block; margin-bottom: 16px; padding: 7px 14px;
  background: #2563eb; color: white; border-radius: 10px;
  text-decoration: none; font-weight: 700; font-size: 14px;
}

/* ── HEADER ── */
.top-title { text-align: center; font-size: 18px; font-weight: 900; margin-bottom: 4px; }
.subline   { text-align: center; font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #374151; }

/* ── STEP DOTS ── */
.progress-container {
  display: flex; justify-content: center; gap: 10px; margin: 12px 0 20px;
}
.step {
  width: 38px; height: 38px; border-radius: 50%; background: #d1d5db;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 15px; text-decoration: none; color: #1f2933;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.step.active { background: #2563eb; color: #fff; }

/* ── CARD ── */
.card {
  background: rgba(255,255,255,.88);
  border-radius: 18px;
  padding: 20px 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
  margin-bottom: 16px;
}

/* ── INSTRUCTION ── */
.instruction-box {
  background: #e0e7ff; color: #111827; font-weight: 600;
  padding: 14px 18px; border-radius: 12px; text-align: center;
  font-size: 14px; line-height: 1.6; margin-bottom: 12px;
}

/* ── RULE BOX ── */
.rule-box {
  background: #f0f9ff; border: 1px solid #bfdbfe;
  padding: 10px 16px; border-radius: 12px; text-align: center;
  font-weight: 700; font-size: 14px; color: #1e3a5f;
  margin-bottom: 16px;
}

/* ── COUNTER ── */
.counter-row {
  display: flex; justify-content: space-between;
  align-items: center; margin-bottom: 16px;
}
.counter-pill {
  background: #2563eb; color: #fff;
  padding: 5px 14px; border-radius: 999px;
  font-size: 13px; font-weight: 700;
}
.bar-wrap { flex: 1; margin: 0 12px; background: #e2e8f0; border-radius: 999px; height: 7px; }
.bar-fill { height: 100%; background: #2563eb; border-radius: 999px; transition: width .3s; width: 0%; }

/* ── DIALOGUE ROW ── */
.dialogue-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
}

/* clickable image boxes */
.img-box {
  flex: 1;
  max-width: 220px;
  border: 3px solid #e2e8f0;
  border-radius: 16px;
  padding: 10px;
  background: #f8fafc;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: border-color .2s, box-shadow .2s, transform .15s;
}
.img-box:hover:not(.disabled) { transform: scale(1.02); border-color: #93c5fd; }
.img-box.disabled { cursor: not-allowed; opacity: .92; }
.img-box.correct  { border-color: #22c55e; box-shadow: 0 6px 18px rgba(34,197,94,.22); }
.img-box.wrong    { border-color: #ef4444; box-shadow: 0 6px 18px rgba(239,68,68,.18); }

.img-box img {
  width: 100%; border-radius: 12px; display: block;
  object-fit: contain; background: #f1f5f9;
}

/* play column */
.play-col {
  flex: 0 0 auto;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.play-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: #2563eb; color: #fff; border: none;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background .2s, transform .1s;
}
.play-btn:hover  { background: #1e40af; }
.play-btn:active { transform: scale(.93); }
.status-text { font-size: 12px; font-weight: 700; color: #486581; text-align: center; }

/* ── MESSAGE ROW ── */
.message-row {
  display: flex; justify-content: center; align-items: center;
  min-height: 24px; margin-top: 14px;
  font-size: 14px; font-weight: 800;
}
.msg-correct { color: #16a34a; }
.msg-wrong   { color: #dc2626; }
.msg-info    { color: #2563eb; }

/* ── CONTROLS ── */
.controls {
  display: flex; justify-content: center; gap: 10px;
  flex-wrap: wrap; margin-top: 14px;
}
.ctrl-btn {
  padding: 10px 20px; border: none; border-radius: 12px;
  font-weight: 900; font-size: 14px; cursor: pointer;
  font-family: 'Poppins', sans-serif;
  -webkit-tap-highlight-color: transparent;
  transition: opacity .2s;
}
.ctrl-btn.replay { background: #6b7280; color: #fff; }

/* ── NEXT BTN ── */
.next-wrap { display: flex; justify-content: center; margin-top: 16px; }
.next-btn {
  display: inline-block; padding: 13px 36px;
  background: #2563eb; color: #fff; border-radius: 14px;
  font-weight: 900; font-size: 15px; text-decoration: none;
}

.hidden { display: none !important; }

@media (max-width: 480px) {
  .img-box   { max-width: 140px; padding: 6px; }
  .play-btn  { width: 44px; height: 44px; font-size: 17px; }
}
</style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">← Unidad 2</a>

  <div class="top-title">Unidad 2 • Lección 3 • Parte 2</div>
  <div class="subline">Listening: Choose the correct image</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step active" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
  </div>

  <div class="card">

    <div class="instruction-box">
      Toca ▶ para escuchar. Luego elige la imagen correcta.<br>
      Puedes repetir el audio.
    </div>

    <div class="rule-box">
      I am = yo &nbsp;|&nbsp; He is = él &nbsp;|&nbsp; She is = ella
    </div>

    <div class="counter-row">
      <span class="counter-pill" id="pill">1 / 10</span>
      <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
    </div>

    <div class="dialogue-row">
      <div class="img-box disabled" id="leftBox">
        <img id="leftImg" src="" alt="">
      </div>

      <div class="play-col">
        <button class="play-btn" id="playBtn">▶</button>
        <div class="status-text" id="statusText">Play</div>
      </div>

      <div class="img-box disabled" id="rightBox">
        <img id="rightImg" src="" alt="">
      </div>
    </div>

    <div class="message-row">
      <span id="msgPlayFirst" class="msg-info  hidden">▶ Primero toca Play</span>
      <span id="msgCorrect"   class="msg-correct hidden">✅ Correcto</span>
      <span id="msgWrong"     class="msg-wrong   hidden">❌ Intenta otra vez</span>
    </div>

    <div class="controls">
      <button class="ctrl-btn replay" id="replayBtn">↺ Repetir</button>
    </div>

    <div class="next-wrap">
      <a href="p3.html" class="next-btn hidden" id="nextBtn">Siguiente →</a>
    </div>

  </div><!-- /card -->

</div><!-- /wrap -->

<script>
(() => {
  const BASE  = 'https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/';
  const IMG   = BASE + 'images/u2/';
  const AUDIO = BASE + 'audio/u2/';

  /* ── SFX ── */
  const sfxOk  = new Audio(BASE + 'audio/u1/correct.wav');
  const sfxBad = new Audio(BASE + 'audio/u1/incorrect.wav');
  function playSfx(ok) {
    const s = ok ? sfxOk : sfxBad;
    s.currentTime = 0; s.play().catch(() => {});
  }

  /* ── ROUND DATA ── */
  const BASE_ROUNDS = [
    { left:'u2.l2.p4.supermarket1.jpg',    right:'u2.l3.p2.supermarket.jpg',       audio:'u2.l3.p2.she.supermarket.mp3', correctImg:'u2.l3.p2.supermarket.jpg' },
    { left:'u2.l3.p2.man.restaurant1.jpg', right:'u2.l3.p1.woman.restaurant1.jpg', audio:'u2.l3.p2.restaurant.mp3',      correctImg:'u2.l3.p1.woman.restaurant1.jpg' },
    { left:'u2.l3.p1.man.office1.jpg',     right:'u2.l2.p4.office1.jpg',            audio:'u2.l3.p2.office.mp3',          correctImg:'u2.l2.p4.office1.jpg' },
    { left:'u2.l2.p4.office1.jpg',         right:'u2.l3.p1.man.office1.jpg',        audio:'u2.l3.p2.office2.mp3',         correctImg:'u2.l3.p1.man.office1.jpg' },
    { left:'u2.l3.p1.man.bank1.jpg',       right:'u2.l2.p4.park1.jpg',              audio:'u2.l3.p2.park.mp3',            correctImg:'u2.l2.p4.park1.jpg' },
    { left:'u2.l3.p1.woman.library1.jpg',  right:'u2.l2.p4.library1.jpg',           audio:'u2.l3.p2.He.library3.mp3',     correctImg:'u2.l2.p4.library1.jpg' },
    { left:'u2.l2.p4.supermarket1.jpg',    right:'u2.l2.p4.movietheater1.jpg',      audio:'u2.l3.p2.movietheatre.mp3',    correctImg:'u2.l2.p4.movietheater1.jpg' },
    { left:'u2.l2.p4.library1.jpg',        right:'u2.l2.p3.library.jpg',            audio:'u2.l3.p2.library2.mp3',        correctImg:'u2.l2.p3.library.jpg' },
    { left:'u2.l2.p4.park1.jpg',           right:'u2.l3.p1.man.bank1.jpg',          audio:'u2.l3.p2.bank.mp3',            correctImg:'u2.l3.p1.man.bank1.jpg' },
    { left:'u2.l3.p2.she.supermarket.jpg', right:'u2.l2.p4.supermarket1.jpg',       audio:'u2.l3.p2.supermarket.mp3',     correctImg:'u2.l2.p4.supermarket1.jpg' }
  ];

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function buildRounds() {
    return shuffle(BASE_ROUNDS).map(r => {
      if (Math.random() < 0.5) return { ...r };
      return { ...r, left: r.right, right: r.left }; // swap positions, correctImg stays
    });
  }

  const ROUNDS = buildRounds();
  const TOTAL  = ROUNDS.length;
  let idx = 0, hasPlayed = false, locked = false;

  /* ── Elements ── */
  const leftBox    = document.getElementById('leftBox');
  const rightBox   = document.getElementById('rightBox');
  const leftImg    = document.getElementById('leftImg');
  const rightImg   = document.getElementById('rightImg');
  const playBtn    = document.getElementById('playBtn');
  const replayBtn  = document.getElementById('replayBtn');
  const statusText = document.getElementById('statusText');
  const pill       = document.getElementById('pill');
  const bar        = document.getElementById('bar');
  const nextBtn    = document.getElementById('nextBtn');
  const msgPlayFirst = document.getElementById('msgPlayFirst');
  const msgCorrect   = document.getElementById('msgCorrect');
  const msgWrong     = document.getElementById('msgWrong');

  const audio = new Audio();
  audio.preload = 'auto';

  /* ── Helpers ── */
  function hideMsgs() {
    msgPlayFirst.classList.add('hidden');
    msgCorrect.classList.add('hidden');
    msgWrong.classList.add('hidden');
  }
  function stopAudio() {
    try { audio.pause(); audio.currentTime = 0; } catch(_) {}
  }
  function resetBoxes() {
    leftBox.classList.remove('correct','wrong');
    rightBox.classList.remove('correct','wrong');
    leftBox.classList.add('disabled');
    rightBox.classList.add('disabled');
  }
  function enableBoxes() {
    leftBox.classList.remove('disabled');
    rightBox.classList.remove('disabled');
  }
  function updateCounter() {
    pill.textContent = `${Math.min(idx+1, TOTAL)} / ${TOTAL}`;
    bar.style.width  = (idx / TOTAL * 100) + '%';
  }

  function loadRound(i) {
    hideMsgs();
    hasPlayed = false;
    locked    = false;
    const r   = ROUNDS[i];
    leftImg.src  = IMG + r.left;
    rightImg.src = IMG + r.right;
    audio.src    = AUDIO + r.audio;
    audio.currentTime = 0;
    resetBoxes();
    updateCounter();
    statusText.textContent = 'Play';
    nextBtn.classList.add('hidden');
  }

  function play() {
    hideMsgs();
    stopAudio();
    statusText.textContent = 'Reproduciendo…';
    audio.play().catch(() => { statusText.textContent = 'Play'; });
    hasPlayed = true;
    enableBoxes();
  }

  audio.addEventListener('ended', () => { statusText.textContent = 'Play'; });

  function choose(side) {
    if (locked) return;
    if (!hasPlayed) {
      hideMsgs(); msgPlayFirst.classList.remove('hidden');
      return;
    }

    hideMsgs();
    leftBox.classList.remove('wrong');
    rightBox.classList.remove('wrong');

    const r = ROUNDS[idx];
    const chosenFilename = side === 'left' ? r.left : r.right;

    if (chosenFilename === r.correctImg) {
      locked = true;
      playSfx(true);
      (side === 'left' ? leftBox : rightBox).classList.add('correct');
      leftBox.classList.add('disabled');
      rightBox.classList.add('disabled');
      msgCorrect.classList.remove('hidden');

      setTimeout(() => {
        idx++;
        if (idx >= TOTAL) {
          pill.textContent = `${TOTAL} / ${TOTAL}`;
          bar.style.width  = '100%';
          nextBtn.classList.remove('hidden');
          statusText.textContent = 'Play';
          return;
        }
        loadRound(idx);
      }, 650);

    } else {
      playSfx(false);
      (side === 'left' ? leftBox : rightBox).classList.add('wrong');
      msgWrong.classList.remove('hidden');
    }
  }

  /* ── iOS-safe tap ── */
  function onTap(el, fn) {
    let moved = false, byTouch = false;
    el.addEventListener('touchstart', () => { moved = false; byTouch = false; }, { passive: true });
    el.addEventListener('touchmove',  () => { moved = true; }, { passive: true });
    el.addEventListener('touchend', e => {
      if (moved) return;
      e.preventDefault(); byTouch = true; fn();
    });
    el.addEventListener('click', () => { if (byTouch) { byTouch = false; return; } fn(); });
  }

  onTap(playBtn,   play);
  onTap(replayBtn, play);
  onTap(leftBox,   () => choose('left'));
  onTap(rightBox,  () => choose('right'));

  loadRound(0);
})();
</script>

</body>
</html>
