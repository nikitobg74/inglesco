<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 2 - Lección 3 - Parte 2</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
body { padding:20px; background:#eef2ff; }

.back-btn{
  display:inline-block;
  margin-bottom:20px;
  padding:8px 15px;
  background:#2563eb;
  color:#ffffff;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
}
.back-btn:hover{ background:#1e40af; }

.progress-container{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:15px 0 25px 0;
}
.step{
  width:40px; height:40px;
  border-radius:50%;
  background:#d1d5db;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:600;
  cursor:pointer;
  transition:all 0.3s;
  color:#1f2933;
}
.step.active{ background:#2563eb; color:#ffffff; }
.step:hover{ transform:scale(1.1); }

.exercise-box{
  max-width:950px;
  margin:0 auto;
  background:#ffffff;
  padding:30px 40px;
  border-radius:18px;
  box-shadow:0 10px 25px rgba(0,0,0,0.08);
  color:#2c3e50;
}

.unit-title{
  color:#2563eb;
  font-size:28px;
  font-weight:700;
  text-align:center;
  margin-bottom:10px;
}

.instruction-box{
  background:#e0e7ff;
  padding:15px 20px;
  border-radius:12px;
  text-align:center;
  font-weight:600;
  margin-bottom:18px;
}

.rule-box{
  background:#f1f5ff;
  border:1px solid #dbeafe;
  padding:12px 16px;
  border-radius:12px;
  text-align:center;
  font-weight:700;
  margin-bottom:18px;
  color:#1f2933;
}

.counter-row{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:18px;
  color:#1f2933;
  font-weight:700;
}
.counter-pill{
  background:#2563eb;
  color:#fff;
  padding:6px 12px;
  border-radius:999px;
  font-size:14px;
}

.dialogue-row{
  display:flex;
  justify-content:center;
  align-items:stretch;
  gap:14px;
  flex-wrap:wrap;
}

/* Clickable image boxes */
.image-box{
  background:#f8fafc;
  border:2px solid #e5e7eb;
  border-radius:16px;
  padding:14px;
  width:100%;
  max-width:360px;
  text-align:center;
  transition: transform .15s, border-color .15s, box-shadow .15s;
  cursor:pointer;
  user-select:none;
}
.image-box:hover{ transform:scale(1.01); }
.image-box.disabled{
  cursor:not-allowed;
  opacity:.95;
}
.image-box.correct{
  border-color:#22c55e;
  box-shadow:0 10px 22px rgba(34,197,94,.18);
}
.image-box.wrong{
  border-color:#ef4444;
  box-shadow:0 10px 22px rgba(239,68,68,.16);
}

.image-box img{
  width:100%;
  max-width:330px;
  border-radius:14px;
  display:block;
  margin:0 auto;
}

/* Middle play */
.play-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:10px;
  min-width: 90px;
}
.play-btn{
  border:none;
  cursor:pointer;
  background:#2563eb;
  color:#fff;
  width:54px;
  height:54px;
  border-radius:999px;
  font-weight:900;
  font-size:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:all .2s;
}
.play-btn:hover{ background:#1e40af; }
.play-btn:disabled{ opacity:.6; cursor:not-allowed; }

.small-note{
  font-weight:700;
  color:#334155;
  font-size:13px;
  text-align:center;
}

/* Bottom controls */
.controls{
  margin-top:18px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.control-btn{
  border:none;
  cursor:pointer;
  background:#2563eb;
  color:#fff;
  padding:10px 18px;
  border-radius:12px;
  font-weight:800;
  transition:all 0.2s;
}
.control-btn.secondary{ background:#0ea5e9; }
.control-btn.gray{ background:#6b7280; }
.control-btn:hover{ filter:brightness(0.95); }
.control-btn:disabled{ opacity:0.6; cursor:not-allowed; }

.message-row{
  margin-top:14px;
  display:flex;
  justify-content:center;
  min-height: 22px;
  font-weight:800;
  color:#1f2933;
}

.next-lesson-wrap{
  margin-top:18px;
  display:flex;
  justify-content:center;
}
.next-btn{
  display:inline-block;
  text-decoration:none;
  background:#0ea5e9;
  color:#fff;
  padding:12px 18px;
  border-radius:12px;
  font-weight:900;
}
.next-btn:hover{ filter:brightness(0.95); }

.hidden{ display:none !important; }

@media (max-width:768px){
  .exercise-box{ padding:22px 18px; }
  .image-box{ max-width:520px; }
}
</style>
</head>

<body>

<a href="../index.html" class="back-btn" id="backBtn">← Volver a Unidad 2</a>

<div class="progress-container">
  <div class="step" data-page="p1.html">1</div>
  <div class="step active" data-page="p2.html">2</div>
  <div class="step" data-page="p3.html">3</div>
  <div class="step" data-page="p4.html">4</div>
</div>

<div class="exercise-box">
  <div class="unit-title" id="unitTitle">Unidad 2 – Lección 3 - Parte 2</div>

  <div class="instruction-box" id="instructionBox">
    Toca ▶ para escuchar. Luego elige la imagen correcta. Puedes repetir el audio.
  </div>

  <div class="rule-box" id="ruleBox">
    I am = yo &nbsp;&nbsp;|&nbsp;&nbsp; He is = él &nbsp;&nbsp;|&nbsp;&nbsp; She is = ella
  </div>

  <div class="counter-row">
    <span class="counter-pill" id="roundPill">1/10</span>
  </div>

  <div class="dialogue-row">
    <!-- LEFT option -->
    <div class="image-box disabled" id="leftBox" role="button" tabindex="0" aria-label="Opción izquierda">
      <img id="leftImg" src="" alt="Left option" />
    </div>

    <!-- PLAY -->
    <div class="play-wrap">
      <button class="play-btn" id="playBtn" type="button" aria-label="Play">▶</button>
      <div class="small-note" id="statusText">Play</div>
    </div>

    <!-- RIGHT option -->
    <div class="image-box disabled" id="rightBox" role="button" tabindex="0" aria-label="Opción derecha">
      <img id="rightImg" src="" alt="Right option" />
    </div>
  </div>

  <!-- Messages are Spanish (HTML only) -->
  <div class="message-row">
    <span id="msgPlayFirst" class="hidden">▶ Primero toca Play</span>
    <span id="msgCorrect" class="hidden">✅ Correcto</span>
    <span id="msgWrong" class="hidden">❌ Intenta otra vez</span>
  </div>

  <div class="controls">
    <button class="control-btn gray" id="replayBtn" type="button">Repeat ↺</button>
  </div>

  <div class="next-lesson-wrap">
    <a href="p3.html" class="next-btn hidden" id="nextBtn">Next ▶</a>
  </div>
</div>

<script src="../../../../js/u2/u2_l3_p2.js"></script>
</body>
</html>
