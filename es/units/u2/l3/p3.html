<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unidad 2 • Lección 3 • Parte 3 | Inglesco</title>

<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

body {
  background: linear-gradient(135deg, #dbeafe, #fef9c3);
  min-height: 100vh;
  padding: 16px 12px 80px;
  color: #111827;
}

.wrap { max-width: 700px; margin: 0 auto; }

/* ── BACK ── */
.back-btn {
  display: inline-block; margin-bottom: 16px; padding: 7px 14px;
  background: #2563eb; color: white; border-radius: 10px;
  text-decoration: none; font-weight: 700; font-size: 14px;
}

/* ── HEADER ── */
.top-title { text-align: center; font-size: 18px; font-weight: 900; margin-bottom: 4px; }
.subline   { text-align: center; font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #374151; }

/* ── STEP DOTS ── */
.progress-container {
  display: flex; justify-content: center; gap: 10px; margin: 12px 0 20px;
}
.step {
  width: 38px; height: 38px; border-radius: 50%; background: #d1d5db;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 15px; text-decoration: none; color: #1f2933;
  cursor: pointer; -webkit-tap-highlight-color: transparent;
}
.step.active { background: #2563eb; color: #fff; }

/* ── CARD ── */
.card {
  background: rgba(255,255,255,.88);
  border-radius: 18px;
  padding: 20px 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
  margin-bottom: 16px;
}

/* ── INSTRUCTION ── */
.instruction-box {
  background: #e0e7ff; color: #111827; font-weight: 600;
  padding: 14px 18px; border-radius: 12px; text-align: center;
  font-size: 14px; line-height: 1.6; margin-bottom: 16px;
}

/* ── COUNTER + PROGRESS BAR ── */
.counter-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 16px;
}
.counter-pill {
  background: #2563eb; color: #fff;
  padding: 5px 14px; border-radius: 999px;
  font-size: 13px; font-weight: 700; white-space: nowrap;
}
.bar-wrap { flex: 1; margin: 0 12px; background: #e2e8f0; border-radius: 999px; height: 7px; }
.bar-fill { height: 100%; background: #2563eb; border-radius: 999px; transition: width .35s; width: 0%; }
.pct-label { font-size: 12px; font-weight: 700; color: #486581; }

/* ── PLAY ── */
.play-row {
  display: flex; align-items: center; justify-content: center; gap: 12px;
  margin-bottom: 20px;
}
.play-btn {
  width: 52px; height: 52px; border-radius: 50%;
  background: #2563eb; color: #fff; border: none;
  font-size: 20px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-tap-highlight-color: transparent;
  transition: background .2s, transform .1s;
}
.play-btn:hover  { background: #1e40af; }
.play-btn:active { transform: scale(.93); }
.status-text { font-size: 13px; font-weight: 700; color: #486581; }
.replay-btn {
  padding: 8px 16px; background: #6b7280; color: #fff;
  border: none; border-radius: 10px; font-weight: 700; font-size: 13px;
  cursor: pointer; font-family: 'Poppins', sans-serif;
  -webkit-tap-highlight-color: transparent;
}

/* ── LINES (A / B / C) ── */
.lines { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }

.line-btn {
  width: 100%; border: 2px solid #e2e8f0; background: #fff;
  border-radius: 14px; padding: 12px 14px; cursor: pointer;
  text-align: left; font-weight: 700; color: #1f2937;
  font-family: 'Poppins', sans-serif;
  -webkit-tap-highlight-color: transparent;
  transition: border-color .15s, box-shadow .15s, transform .1s;
}
.line-btn:hover:not(:disabled) { transform: scale(1.005); border-color: #93c5fd; }
.line-btn:disabled { opacity: .65; cursor: not-allowed; }
.line-btn.correct  { border-color: #22c55e; box-shadow: 0 6px 18px rgba(34,197,94,.2); }
.line-btn.wrong    { border-color: #ef4444; box-shadow: 0 6px 18px rgba(239,68,68,.16); }

.line-row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.line-letter {
  width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: #e0e7ff; color: #1e40af; font-weight: 900; font-size: 14px;
}
.line-text { flex: 1; font-size: 15px; }
.blank {
  display: inline-block; min-width: 110px;
  padding: 2px 10px; border-radius: 999px;
  border: 2px dashed #cbd5e1; background: #f1f5f9;
  color: #0f172a; font-weight: 900; margin-left: 6px;
  font-size: 14px;
}

/* ── WORD BANK ── */
.wordbank-label {
  font-size: 12px; font-weight: 700; color: #2563eb;
  letter-spacing: .06em; text-transform: uppercase;
  margin-bottom: 10px; padding-bottom: 6px;
  border-bottom: 2px solid #dbeafe;
}
.word-row {
  display: flex; justify-content: center; gap: 10px; flex-wrap: wrap;
  margin-bottom: 4px;
}
.word-btn {
  border: 2px solid #bfdbfe; background: #eff6ff; color: #1e40af;
  padding: 10px 16px; border-radius: 999px; font-weight: 900; font-size: 14px;
  cursor: pointer; font-family: 'Poppins', sans-serif;
  -webkit-tap-highlight-color: transparent;
  transition: background .15s, border-color .15s, transform .1s;
}
.word-btn:hover:not(:disabled) { transform: scale(1.03); }
.word-btn:disabled { opacity: .55; cursor: not-allowed; }
.word-btn.selected { border-color: #2563eb; background: #2563eb; color: #fff; }

/* ── MESSAGES ── */
.message-row {
  display: flex; justify-content: center; align-items: center;
  min-height: 24px; margin-top: 14px;
  font-size: 14px; font-weight: 800;
}
.msg-correct { color: #16a34a; }
.msg-wrong   { color: #dc2626; }
.msg-info    { color: #2563eb; }

/* ── NEXT ── */
.next-wrap { display: flex; justify-content: center; margin-top: 16px; }
.next-btn {
  display: inline-block; padding: 13px 36px;
  background: #2563eb; color: #fff; border-radius: 14px;
  font-weight: 900; font-size: 15px; text-decoration: none;
}

.hidden { display: none !important; }
</style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">← Unidad 2</a>

  <div class="top-title">Unidad 2 • Lección 3 • Parte 3</div>
  <div class="subline">Complete the sentence</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step active" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
  </div>

  <div class="card">

    <div class="instruction-box">
      Toca ▶ para escuchar. Elige una palabra del banco y luego toca A, B o C para completar la frase.
    </div>

    <!-- counter + bar -->
    <div class="counter-row">
      <span class="counter-pill" id="pill">1 / 15</span>
      <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>
      <span class="pct-label" id="pct">0%</span>
    </div>

    <!-- play row -->
    <div class="play-row">
      <button class="play-btn" id="playBtn">▶</button>
      <div class="status-text" id="statusText">Play</div>
      <button class="replay-btn" id="replayBtn">↺ Repetir</button>
    </div>

    <!-- lines -->
    <div class="lines">
      <button class="line-btn" id="lineA" disabled>
        <div class="line-row">
          <div class="line-letter">A</div>
          <div class="line-text"><span id="textA"></span><span class="blank" id="blankA">_____</span></div>
        </div>
      </button>
      <button class="line-btn" id="lineB" disabled>
        <div class="line-row">
          <div class="line-letter">B</div>
          <div class="line-text"><span id="textB"></span><span class="blank" id="blankB">_____</span></div>
        </div>
      </button>
      <button class="line-btn" id="lineC" disabled>
        <div class="line-row">
          <div class="line-letter">C</div>
          <div class="line-text"><span id="textC"></span><span class="blank" id="blankC">_____</span></div>
        </div>
      </button>
    </div>

    <!-- word bank -->
    <div class="wordbank-label">Banco de palabras</div>
    <div class="word-row">
      <button class="word-btn" id="word1" disabled></button>
      <button class="word-btn" id="word2" disabled></button>
      <button class="word-btn" id="word3" disabled></button>
    </div>

    <!-- messages -->
    <div class="message-row">
      <span id="msgPlayFirst" class="msg-info  hidden">▶ Primero toca Play</span>
      <span id="msgPickWord"  class="msg-info  hidden">👆 Primero elige una palabra</span>
      <span id="msgCorrect"   class="msg-correct hidden">✅ Correcto</span>
      <span id="msgWrong"     class="msg-wrong   hidden">❌ Intenta otra vez</span>
    </div>

    <!-- next -->
    <div class="next-wrap">
      <a href="p4.html" class="next-btn hidden" id="nextBtn">Siguiente →</a>
    </div>

  </div><!-- /card -->

</div><!-- /wrap -->

<script>
(() => {
  const BASE  = 'https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/';
  const AUDIO = BASE + 'audio/u2/';

  /* ── SFX ── */
  const sfxOk  = new Audio(BASE + 'audio/u1/correct.wav');
  const sfxBad = new Audio(BASE + 'audio/u1/incorrect.wav');
  function playSfx(ok) {
    const s = ok ? sfxOk : sfxBad;
    s.currentTime = 0; s.play().catch(() => {});
  }

  /* ── DATA ── */
  const BASE_EXERCISES = [
    { audio:'u2.l3.p2.she.supermarket.mp3', correctWord:'supermarket',  correctType:'SHE_AT' },
    { audio:'u2.l3.p2.restaurant.mp3',      correctWord:'restaurant',   correctType:'SHE_AT' },
    { audio:'u2.l3.p2.office.mp3',          correctWord:'office',       correctType:'SHE_AT' },
    { audio:'u2.l3.p2.park.mp3',            correctWord:'park',         correctType:'SHE_AT' },
    { audio:'u2.l3.p2.library2.mp3',        correctWord:'library',      correctType:'SHE_AT' },
    { audio:'u2.l3.p2.He.library3.mp3',     correctWord:'library',      correctType:'HE_AT'  },
    { audio:'u2.l3.p2.movietheatre.mp3',    correctWord:'movie theater',correctType:'HE_AT'  },
    { audio:'u2.l3.p2.supermarket.mp3',     correctWord:'supermarket',  correctType:'HE_AT'  },
    { audio:'u2.l3.p2.office2.mp3',         correctWord:'office',       correctType:'HE_AT'  },
    { audio:'u2.l3.p2.bank.mp3',            correctWord:'bank',         correctType:'HE_AT'  },
    { audio:'u2.l3.p3.Iam.restaurant.mp3',  correctWord:'restaurant',   correctType:'I_AT'   },
    { audio:'u2.l3.p3.Iam.movie.mp3',       correctWord:'movie theater',correctType:'I_AT'   },
    { audio:'u2.l3.p3.Iam.supermarket.mp3', correctWord:'supermarket',  correctType:'I_AT'   },
    { audio:'u2.l3.p3.Iam.office.mp3',      correctWord:'office',       correctType:'I_AT'   },
    { audio:'u2.l3.p3.Iam.library.mp3',     correctWord:'library',      correctType:'I_AT'   }
  ];

  const ALL_WORDS = ['restaurant','office','supermarket','park','library','movie theater','bank'];

  function lineText(type) {
    if (type === 'I_AT')   return 'I am at the';
    if (type === 'HE_AT')  return 'He is at the';
    return 'She is at the';
  }

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length-1; i > 0; i--) {
      const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];
    }
    return a;
  }

  function pickDistractors(correct) {
    return shuffle(ALL_WORDS.filter(w => w !== correct)).slice(0, 2);
  }

  const EXERCISES = shuffle(BASE_EXERCISES.map(x => ({...x})));
  const TOTAL = EXERCISES.length;
  let idx = 0, hasPlayed = false, locked = false, selectedWord = null;
  let mapping = null; // {A:'I_AT', B:'HE_AT', C:'SHE_AT'}

  /* ── Elements ── */
  const playBtn  = document.getElementById('playBtn');
  const replayBtn= document.getElementById('replayBtn');
  const statusEl = document.getElementById('statusText');
  const pill     = document.getElementById('pill');
  const bar      = document.getElementById('bar');
  const pct      = document.getElementById('pct');
  const nextBtn  = document.getElementById('nextBtn');

  const lineA = document.getElementById('lineA');
  const lineB = document.getElementById('lineB');
  const lineC = document.getElementById('lineC');
  const textA = document.getElementById('textA');
  const textB = document.getElementById('textB');
  const textC = document.getElementById('textC');
  const blankA= document.getElementById('blankA');
  const blankB= document.getElementById('blankB');
  const blankC= document.getElementById('blankC');

  const word1 = document.getElementById('word1');
  const word2 = document.getElementById('word2');
  const word3 = document.getElementById('word3');
  const wordBtns = [word1, word2, word3];
  const lineBtns = [lineA, lineB, lineC];
  const blanks   = [blankA, blankB, blankC];
  const lineKeys = ['A','B','C'];

  const msgPlayFirst = document.getElementById('msgPlayFirst');
  const msgPickWord  = document.getElementById('msgPickWord');
  const msgCorrect   = document.getElementById('msgCorrect');
  const msgWrong     = document.getElementById('msgWrong');

  const audio = new Audio();
  audio.preload = 'auto';

  /* ── Helpers ── */
  function hideMsgs() {
    [msgPlayFirst, msgPickWord, msgCorrect, msgWrong].forEach(m => m.classList.add('hidden'));
  }
  function stopAudio() {
    try { audio.pause(); audio.currentTime = 0; } catch(_) {}
  }
  function updateProgress() {
    const shown = Math.min(idx + 1, TOTAL);
    pill.textContent = `${shown} / ${TOTAL}`;
    const p = Math.round(idx / TOTAL * 100);
    bar.style.width  = p + '%';
    pct.textContent  = p + '%';
  }
  function enableAll() {
    lineBtns.forEach(b => b.disabled = false);
    wordBtns.forEach(b => b.disabled = false);
  }
  function disableAll() {
    lineBtns.forEach(b => b.disabled = true);
    wordBtns.forEach(b => b.disabled = true);
  }
  function clearBlanks() {
    blanks.forEach(b => b.textContent = '_____');
  }
  function clearLineColors() {
    lineBtns.forEach(b => b.classList.remove('correct','wrong'));
  }

  function buildMapping() {
    const types = shuffle(['I_AT','HE_AT','SHE_AT']);
    return { A: types[0], B: types[1], C: types[2] };
  }

  function loadRound(i) {
    hideMsgs();
    hasPlayed = false; locked = false; selectedWord = null;

    const ex = EXERCISES[i];
    audio.src = AUDIO + ex.audio;
    audio.currentTime = 0;

    // build A/B/C → lineType mapping
    mapping = buildMapping();
    textA.textContent = lineText(mapping.A);
    textB.textContent = lineText(mapping.B);
    textC.textContent = lineText(mapping.C);

    // word bank
    const [d1, d2] = pickDistractors(ex.correctWord);
    const words = shuffle([ex.correctWord, d1, d2]);
    wordBtns.forEach((b, i) => {
      b.textContent = words[i];
      b.classList.remove('selected');
    });

    clearBlanks();
    clearLineColors();
    disableAll();
    updateProgress();
    statusEl.textContent = 'Play';
    nextBtn.classList.add('hidden');
  }

  function play() {
    hideMsgs();
    stopAudio();
    statusEl.textContent = 'Reproduciendo…';
    audio.play().catch(() => { statusEl.textContent = 'Play'; });
    hasPlayed = true;
    enableAll();
  }

  audio.addEventListener('ended', () => { statusEl.textContent = 'Play'; });

  function selectWord(btn) {
    if (!hasPlayed || locked) return;
    wordBtns.forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedWord = btn.textContent;
  }

  function chooseLine(key) {
    if (locked) return;
    hideMsgs();

    if (!hasPlayed)    { msgPlayFirst.classList.remove('hidden'); return; }
    if (!selectedWord) { msgPickWord.classList.remove('hidden');  return; }

    const ex  = EXERCISES[idx];
    const ki  = lineKeys.indexOf(key);
    const btn = lineBtns[ki];

    // show word in blank
    blanks[ki].textContent = selectedWord;

    const isCorrect = selectedWord === ex.correctWord && mapping[key] === ex.correctType;

    if (isCorrect) {
      btn.classList.add('correct');
      playSfx(true);
      msgCorrect.classList.remove('hidden');
      locked = true;
      disableAll();

      setTimeout(() => {
        idx++;
        if (idx >= TOTAL) {
          pill.textContent = `${TOTAL} / ${TOTAL}`;
          bar.style.width  = '100%';
          pct.textContent  = '100%';
          nextBtn.classList.remove('hidden');
          statusEl.textContent = 'Play';
          return;
        }
        loadRound(idx);
      }, 2000);

    } else {
      btn.classList.add('wrong');
      playSfx(false);
      msgWrong.classList.remove('hidden');
      // clear blank after short delay
      setTimeout(() => { blanks[ki].textContent = '_____'; btn.classList.remove('wrong'); }, 600);
    }
  }

  /* ── iOS-safe tap ── */
  function onTap(el, fn) {
    let moved = false, byTouch = false;
    el.addEventListener('touchstart', () => { moved = false; byTouch = false; }, { passive: true });
    el.addEventListener('touchmove',  () => { moved = true; }, { passive: true });
    el.addEventListener('touchend', e => {
      if (moved) return;
      e.preventDefault(); byTouch = true; fn();
    });
    el.addEventListener('click', () => { if (byTouch) { byTouch = false; return; } fn(); });
  }

  onTap(playBtn,  play);
  onTap(replayBtn,play);
  wordBtns.forEach(b => onTap(b, () => selectWord(b)));
  lineBtns.forEach((b, i) => onTap(b, () => chooseLine(lineKeys[i])));

  loadRound(0);
})();
</script>

</body>
</html>
