<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 2 - Lección 6 - Parte 1</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      color:#0f172a;
    }

    .wrap{
      max-width: 900px;
      margin: 0 auto;
    }

    /* ===== BACK BUTTON ===== */
    .back-btn{
      display:inline-block;
      margin-bottom:20px;
      padding:8px 15px;
      background:#2563eb;
      color:#fff;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
    }
    .back-btn:hover{ background:#1e40af; }

    /* ===== PROGRESS BAR ===== */
    .progress-container{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:15px 0 25px 0;
    }
    .step{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#d1d5db;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      cursor:pointer;
      transition:all .3s;
      color:#1f2933;
      user-select:none;
    }
    .step.active{
      background:#2563eb;
      color:#fff;
    }
    .step:hover{
      transform:scale(1.1);
    }

    /* ===== NEXT BUTTON (BOTTOM) ===== */
    .footer-actions{
      display:flex;
      justify-content:center;
      margin-top:25px;
      padding-bottom: 30px;
    }
    .next-btn{
      display:inline-block;
      padding:10px 18px;
      background:#2563eb;
      color:#fff;
      text-decoration:none;
      border-radius:12px;
      font-weight:800;
    }
    .next-btn:hover{ background:#1e40af; }
    .hidden{ display:none !important; }

    /* ===== MOBILE SAFE ===== */
    @media (max-width:520px){
      .step{ width:34px; height:34px; font-size:14px; }
    }

    /* ===== PAGE UI ===== */
    .card{
      background: rgba(255,255,255,.88);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.10);
      margin-bottom: 14px;
    }

    .title{
      font-size: 26px;
      font-weight: 900;
      margin: 6px 0 10px 0;
      letter-spacing: .2px;
      text-align:center;
    }

    .lesson-subtitle{
      text-align:center;
      font-weight: 800;
      margin: 0 0 10px 0;
      opacity: .85;
    }

    .hero{
      display:flex;
      flex-direction: column;
      gap: 12px;
    }

    .hero-img{
      width:100%;
      border-radius: 14px;
      object-fit: cover;
      max-height: 320px;
    }

    /* tighter lines */
    .text-block{
      line-height: 1;
      font-size: 18px;
      font-weight: 800;
      white-space: pre-line;
    }

    .audio-row{
      display:flex;
      align-items:center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .play-btn{
      appearance:none;
      border:0;
      cursor:pointer;
      padding: 12px 16px;
      border-radius: 14px;
      background: #16a34a;
      color: #fff;
      font-weight: 900;
      font-size: 16px;
      box-shadow: 0 8px 18px rgba(22,163,74,.25);
      min-width: 180px;
    }
    .play-btn:hover{ filter: brightness(.95); }
    .play-btn:disabled{ opacity: .65; cursor:not-allowed; }

    .hint{
      text-align:center;
      font-weight: 700;
      opacity: .75;
      margin: 6px 0 0 0;
      font-size: 14px;
    }

    .section-title{
      font-size: 20px;
      font-weight: 900;
      margin: 0 0 10px 0;
      text-align:center;
    }

    /* ===== QUIZ ===== */
    .quiz{
      display:flex;
      flex-direction: column;
      gap: 12px;
    }
    .q-card{
      background: rgba(255,255,255,.92);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    }
    .q-text{
      font-size: 17px;
      font-weight: 900;
      margin: 0 0 10px 0;
      line-height: 1.25;
    }
    .choices{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }
    .choice-btn{
      appearance:none;
      border: 2px solid #cbd5e1;
      background:#fff;
      padding: 12px 12px;
      border-radius: 14px;
      font-weight: 900;
      font-size: 16px;
      cursor:pointer;
      text-align:left;
      transition: transform .08s, border-color .2s, background .2s;
    }
    .choice-btn:active{ transform: scale(.99); }
    .choice-btn.correct{
      border-color:#16a34a;
      background:#dcfce7;
    }
    .choice-btn.wrong{
      border-color:#dc2626;
      background:#fee2e2;
    }
    .choice-btn:disabled{
      opacity:.9;
      cursor:not-allowed;
    }

    .done-badge{
      display:inline-block;
      margin: 8px auto 0 auto;
      padding: 8px 12px;
      border-radius: 999px;
      background:#dcfce7;
      color:#166534;
      font-weight: 900;
      text-align:center;
    }

    /* ===== OBJECTS ===== */
    .items{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .item{
      display:flex;
      gap: 12px;
      align-items:center;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    }
    .item img{
      width: 92px;
      height: 92px;
      border-radius: 14px;
      object-fit: cover;
      flex: 0 0 auto;
      background:#e5e7eb;
    }
    .item-main{
      flex:1;
      min-width: 0;
    }
    .word{
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 8px 0;
    }
    .small-play{
      appearance:none;
      border:0;
      cursor:pointer;
      padding: 10px 12px;
      border-radius: 14px;
      background:#2563eb;
      color:#fff;
      font-weight: 900;
      font-size: 14px;
      width: 100%;
      max-width: 220px;
    }
    .small-play:hover{ background:#1e40af; }
    .small-play:disabled{ opacity:.65; cursor:not-allowed; }
  </style>
</head>

<body>
  <div class="wrap">

    <a href="../index.html" class="back-btn">← Volver a Unidad 2</a>

    <!-- Progress 1-4 -->
    <div class="progress-container" aria-label="Progreso de la lección">
      <div class="step active" data-go="p1.html" aria-current="page">1</div>
      <div class="step" data-go="p2.html">2</div>
      <div class="step" data-go="p3.html">3</div>
      <div class="step" data-go="p4.html">4</div>
    </div>

    <!-- STORY -->
    <div class="card hero">
      <div class="lesson-subtitle">Unidad 2 · Lección 6 · Parte 1</div>
      <div class="title">We Are at School</div>

      <img id="storyImg" class="hero-img" alt="Classroom" />

      <div id="storyText" class="text-block"></div>

      <div class="audio-row">
        <button id="playStoryBtn" class="play-btn" type="button">▶ Play Text</button>
        <audio id="storyAudio" preload="auto"></audio>
      </div>

      <div class="hint">Listen, then answer the questions below.</div>
    </div>

    <!-- MINI QUIZ -->
    <div class="card">
      <div class="section-title">Mini Quiz</div>
      <div id="quizWrap" class="quiz"></div>

      <div id="doneBadge" class="done-badge hidden">✅ Great job! You can continue.</div>
    </div>

    <!-- OBJECTS -->
    <div class="card">
      <div class="section-title">Classroom Objects</div>
      <div class="items" id="itemsGrid"></div>
    </div>

    <!-- Next button at bottom -->
    <div class="footer-actions">
      <a href="p2.html" class="next-btn hidden" id="nextBtn">Next ▶</a>
    </div>

  </div>

  <script src="../../../../js/u2/u2_l6_p1.js"></script>
</body>
</html>
