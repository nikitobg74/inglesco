<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 2 - Lección 6 - Parte 3</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
<script defer src="/_vercel/insights/script.js"></script>
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      color:#0f172a;
    }
    .wrap{ max-width: 900px; margin: 0 auto; }

    .back-btn{
      display:inline-block;
      margin-bottom:20px;
      padding:8px 15px;
      background:#2563eb;
      color:#fff;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
    }
    .back-btn:hover{ background:#1e40af; }

    .progress-container{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:15px 0 25px 0;
    }
    .step{
      width:40px; height:40px;
      border-radius:50%;
      background:#d1d5db;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      cursor:pointer;
      transition:all .3s;
      color:#1f2933;
      user-select:none;
    }
    .step.active{ background:#2563eb; color:#fff; }
    .step:hover{ transform:scale(1.1); }

    @media (max-width:520px){
      .step{ width:34px; height:34px; font-size:14px; }
    }

    .card{
      background: rgba(255,255,255,.88);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.10);
      margin-bottom: 14px;
    }

    .sub{
      font-size: 28px;
      font-weight: 900;
      color: #2563eb;
      text-align:center;
      margin: 6px 0 10px 0;
    }

    .es-instructions{
      background: rgba(255,255,255,.92);
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 6px 18px rgba(15,23,42,.08);
      margin-bottom: 14px;
      font-weight: 800;
      line-height: 1.3;
    }
    .es-instructions ul{ margin:0; padding-left:18px; }
    .es-instructions li{ margin:6px 0; }

    .two-col{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items:start;
    }
    @media (min-width:820px){
      .two-col{ grid-template-columns: 1fr 1fr; }
    }

.img{
  width:100%;
  max-width: 340px;
  height: auto;          /* let image keep ratio */
  max-height: 220px;
  border-radius: 16px;
  object-fit: contain;   /* ✅ no cropping */
  background:#fff;
}
/* ON image: smaller and never cropped */
.img-on{
  width: 100%;
  max-width: 320px;     /* smaller */
  max-height: 170px;    /* smaller */
  object-fit: contain;  /* IMPORTANT: no cropping */
  background: #fff;
}
    .fixed-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 10px;
    }

    .ex-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 10px;
    }

    .toprow{
      width:100%;
      max-width:420px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
      font-weight:900;
    }

    .pill{
      padding:8px 12px;
      border-radius:999px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 6px 18px rgba(15,23,42,.08);
    }

    .play-btn{
      appearance:none;
      border:0;
      cursor:pointer;
      padding:10px 12px;
      border-radius:999px;
      background:#2563eb;
      color:#fff;
      font-weight:900;
    }
    .play-btn:hover{ background:#1e40af; }
    .play-btn:disabled{ opacity:.65; cursor:not-allowed; }

    .sentence{
      width:100%;
      max-width:420px;
      text-align:center;
      font-weight:900;
      font-size: 18px;
      padding: 10px 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 6px 18px rgba(15,23,42,.08);
      line-height: 1.25;
    }
    .onword{ color:#dc2626; } /* red */

    .status{
      width:100%;
      max-width:420px;
      text-align:center;
      font-weight:900;
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.9);
      box-shadow: 0 6px 18px rgba(15,23,42,.08);
    }

    .actions{
      width:100%;
      max-width:420px;
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      margin-top: 6px;
    }

    .btn{
      appearance:none;
      border:0;
      cursor:pointer;
      padding: 12px 14px;
      border-radius: 14px;
      font-weight: 900;
      background:#2563eb;
      color:#fff;
    }
    .btn:hover{ background:#1e40af; }
    .btn.secondary{
      background:#0f172a;
    }
    .btn.secondary:hover{ background:#111827; }
    .hidden{ display:none !important; }

    /* Quiz */
    .quiz-wrap{
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: 12px;
    }
    .options{
      width:100%;
      max-width:420px;
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .opt{
      width:100%;
      text-align:left;
      background: rgba(255,255,255,.92);
      border: 2px solid rgba(15,23,42,.10);
      border-radius: 14px;
      padding: 12px 12px;
      cursor:pointer;
      font-weight: 900;
      line-height:1.2;
      box-shadow: 0 6px 18px rgba(15,23,42,.06);
    }
    .opt.selected{
      border-color:#2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.18);
    }
    .opt .label{
      display:inline-block;
      min-width: 28px;
      color:#2563eb;
    }

    .footer-actions{
      display:flex;
      justify-content:center;
      margin-top:25px;
      padding-bottom: 30px;
    }
    .next-link{
      display:inline-block;
      padding:10px 18px;
      background:#2563eb;
      color:#fff;
      text-decoration:none;
      border-radius:12px;
      font-weight:800;
    }
    .next-link:hover{ background:#1e40af; }
  </style>
</head>

<body>
  <div class="wrap">

    <a href="../index.html" class="back-btn">Volver a Unidad 2</a>

    <div class="progress-container">
      <div class="step" data-go="p1.html">1</div>
      <div class="step" data-go="p2.html">2</div>
      <div class="step active" data-go="p3.html">3</div>
      <div class="step" data-go="p4.html">4</div>
    </div>

    <div class="card">
      <div class="sub">Unidad 2 · Lección 6 · Parte 3</div>

      <div class="es-instructions">
        <ul>
          <li>ON = sobre una superficie.</li>
          <li>Presiona ▶ Play para escuchar.</li>
          <li>Lee la oración (la palabra <span style="color:#dc2626;font-weight:900;">on</span> está en rojo).</li>
        </ul>
      </div>

      <!-- ===== PART 1: EXAMPLES ===== -->
      <section id="part1">
        <div class="two-col">

          <!-- Fixed ON image (must stay) -->
          <div class="fixed-wrap">
           <img id="onImg" class="img img-on" alt="ON" />
          </div>

          <!-- Example image + sentence -->
          <div class="ex-wrap">
            <div class="toprow">
              <div class="pill">Ejemplo: <span id="exNow">1</span>/<span id="exTotal">6</span></div>
              <button id="playBtn" class="play-btn" type="button">▶ Play</button>
            </div>

            <img id="exImg" class="img" alt="Example" />

            <div id="sentence" class="sentence"></div>

            <div id="status1" class="status">Presiona ▶ Play.</div>

            <div class="actions">
              <button id="nextExBtn" class="btn" type="button">Next ▶</button>
              <button id="startQuizBtn" class="btn secondary hidden" type="button">Start Practice ▶</button>
            </div>
          </div>

        </div>
      </section>

      <!-- ===== PART 2: QUIZ ===== -->
      <section id="part2" class="hidden">
        <div class="quiz-wrap">
          <div class="toprow" style="max-width:420px;">
            <div class="pill">Practice: <span id="qNow">1</span>/<span id="qTotal">4</span></div>
            <button id="qPlayBtn" class="play-btn" type="button">▶ Play</button>
          </div>

          <img id="qImg" class="img" alt="Question" />

          <div id="qStatus" class="status">Elige A, B o C.</div>

          <div id="options" class="options"></div>

          <div class="actions">
            <button id="checkBtn" class="btn" type="button">Check</button>
          </div>
        </div>
      </section>
    </div>

    <div class="footer-actions">
      <a href="p4.html" class="next-link hidden" id="nextPageBtn">Next ▶</a>
    </div>

  </div>

  <!-- UI TEXT (page language lives here; JS stays neutral) -->
  <div id="uiText" hidden
    data-status1-ready="Presiona ▶ Play."
    data-status1-afterplay="Ahora presiona Next ▶"
    data-status1-done="✅ Muy bien. Ahora práctica."
    data-playing="Reproduciendo..."
    data-audio-blocked="Audio bloqueado. Intenta otra vez."
    data-play="▶ Play"
    data-replay="▶ Replay"
    data-quiz-pick="Elige A, B o C."
    data-quiz-select="Selecciona una opción primero."
    data-quiz-correct="✅ Correcto!"
    data-quiz-wrong="❌ No. Intenta otra vez."
    data-check="Check"
  ></div>

  <script src="../../../../js/u2/u2_l6_p3.js"></script>
</body>
