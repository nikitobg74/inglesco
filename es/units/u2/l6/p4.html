<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Aula – Vocabulario del Salón de Clases | Inglesco Unidad 2 Lección 6</title>
  <meta name="description" content="Aprende más vocabulario del salón de clases en inglés: bookshelf, pencil, map, board, clock, bulletin board, table. Escucha y repite. Inglesco Unidad 2 Lección 6 Parte 4." />
  <meta name="keywords" content="vocabulario aula inglés, bookshelf pencil map inglés, aprender inglés gratis, inglés para hispanohablantes, Inglesco" />
  <link rel="canonical" href="https://inglesco.co/es/units/u2/l6/p4.html" />
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
    body { padding:20px; background:#f0fdf4; color:#1e293b; }

    .back-btn {
      display:inline-flex; align-items:center; gap:6px;
      margin-bottom:20px; padding:8px 16px;
      background:#2563eb; color:#fff; border-radius:10px;
      text-decoration:none; font-weight:700; font-size:14px;
      transition:background .2s;
    }
    .back-btn:hover { background:#1e40af; }

    .progress-container { display:flex; justify-content:center; gap:10px; margin:0 0 24px 0; }
    .step {
      width:40px; height:40px; border-radius:50%; background:#d1d5db;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; cursor:pointer; transition:all .25s;
      color:#1f2937; user-select:none; font-size:15px;
    }
    .step.active { background:#2563eb; color:#fff; box-shadow:0 0 0 3px #bfdbfe; }
    .step:hover { transform:scale(1.1); }

    .score-badge { display:flex; justify-content:center; margin-bottom:14px; }
    .score-inner {
      background:#fff; border:2px solid #2563eb; border-radius:999px;
      padding:5px 18px; font-weight:800; font-size:14px; color:#1e40af;
      display:flex; align-items:center; gap:6px;
    }
    .score-inner span { font-size:18px; }

    .exercise-box {
      max-width:820px; margin:0 auto; background:#fff;
      padding:28px 32px; border-radius:20px;
      box-shadow:0 10px 30px rgba(139,92,246,0.12);
    }
    .unit-title { color:#2563eb; font-size:26px; font-weight:900; text-align:center; margin-bottom:4px; }
    .lesson-sub { text-align:center; font-weight:700; color:#475569; font-size:14px; margin-bottom:20px; }

    .instruction-box {
      background:#d1fae5; border-radius:14px; padding:14px 18px;
      margin-bottom:20px; font-weight:700; color:#0f172a;
      font-size:14px; line-height:1.55; text-align:center;
    }

    .section {
      background:#f8fafc; border:1px solid #e2e8f0;
      border-radius:16px; padding:20px; margin-top:16px;
    }
    .section-title {
      font-weight:900; color:#0f172a; text-align:center;
      margin-bottom:16px; font-size:15px;
      text-transform:uppercase; letter-spacing:.04em;
    }

    /* Classroom hero */
    .classroom-wrap {
      background:#f1f5f9; border-radius:14px; overflow:hidden;
      display:flex; justify-content:center; margin-bottom:20px;
    }
    .classroom-wrap img {
      width:100%; max-height:240px; object-fit:contain;
      background:#f1f5f9; display:block;
    }

    /* Game area */
    .game-area { display:flex; flex-direction:column; align-items:center; gap:14px; }

    .top-row {
      width:100%; max-width:480px; display:flex;
      justify-content:space-between; align-items:center;
      gap:10px; flex-wrap:wrap;
    }
    .counter-pill {
      background:#2563eb; color:#fff; padding:5px 14px;
      border-radius:999px; font-size:13px; font-weight:900;
    }
    .play-btn {
      border:none; cursor:pointer; background:#2563eb; color:#fff;
      padding:10px 22px; border-radius:999px; font-weight:900; font-size:15px;
      transition:background .2s, transform .1s;
      box-shadow:0 4px 12px rgba(37,99,235,0.28);
    }
    .play-btn:hover { background:#1e40af; transform:scale(1.03); }
    .play-btn:disabled { opacity:.55; cursor:not-allowed; transform:none; }

    .obj-img-wrap {
      width:100%; max-width:340px; background:#f1f5f9;
      border-radius:16px; overflow:hidden;
      display:flex; justify-content:center; align-items:center;
      min-height:180px;
    }
    .obj-img-wrap img {
      width:100%; max-height:220px; object-fit:contain;
      background:#f1f5f9; display:block;
    }

    .word-label {
      width:100%; max-width:480px; text-align:center;
      font-weight:900; font-size:28px; color:#0f172a;
      background:#fff; border:2px solid #e2e8f0;
      border-radius:16px; padding:14px 16px;
      letter-spacing:.3px;
    }

    .status-pill {
      width:100%; max-width:480px; text-align:center;
      font-weight:800; font-size:14px; padding:10px 14px;
      border-radius:999px; background:#fff; border:2px solid #e2e8f0;
      color:#0f172a; transition:border-color .2s, background .2s;
    }
    .status-pill.ok   { border-color:#16a34a; background:#dcfce7; color:#14532d; }
    .status-pill.done { border-color:#2563eb; background:#eff6ff; color:#1e40af; }

    .next-word-btn {
      border:none; cursor:pointer; background:#2563eb; color:#fff;
      padding:12px 30px; border-radius:12px; font-weight:900; font-size:15px;
      transition:background .2s;
    }
    .next-word-btn:hover { background:#1e40af; }
    .next-word-btn:disabled { opacity:.5; cursor:not-allowed; }

    .footer-actions { display:flex; justify-content:center; margin-top:22px; }
    .finish-btn {
      display:inline-block; padding:12px 28px; background:#16a34a;
      color:#fff; text-decoration:none; border-radius:12px;
      font-weight:900; font-size:15px; transition:background .2s;
      box-shadow:0 4px 12px rgba(22,163,74,0.28);
    }
    .finish-btn:hover { background:#15803d; }

    .hidden { display:none !important; }

    @media (max-width:540px) {
      body { padding:12px; }
      .exercise-box { padding:18px 14px; }
      .unit-title { font-size:21px; }
      .word-label { font-size:22px; }
    }
  </style>
</head>

<body>
  <a href="../index.html" class="back-btn">← Volver a Unidad 2</a>

  <div class="progress-container">
    <div class="step" data-go="p1.html">1</div>
    <div class="step" data-go="p2.html">2</div>
    <div class="step" data-go="p3.html">3</div>
    <div class="step active" data-go="p4.html">4</div>
  </div>

  <div class="score-badge">
    <div class="score-inner"><span>⭐</span> Palabras: <b id="scoreBadge">0 / 7</b></div>
  </div>

  <div class="exercise-box">
    <h1 class="unit-title">Mi Aula</h1>
    <div class="lesson-sub">Unidad 2 · Lección 6 · Parte 4</div>

    <div class="instruction-box">
      Escucha cada palabra y repítela en voz alta.<br>
      Presiona <b>▶ Play</b>, escucha, repite y luego pulsa <b>Siguiente ▶</b>.
    </div>

    <div class="section">
      <div class="section-title">🏫 Classroom Vocabulary</div>

      <div class="classroom-wrap">
        <img id="classroomImg" alt="Classroom — salón de clases en inglés" />
      </div>

      <div class="game-area">
        <div class="top-row">
          <span class="counter-pill">Palabra <span id="nowEl">1</span> de <span id="totalEl">7</span></span>
          <button id="playBtn" class="play-btn" type="button">▶ Play</button>
        </div>

        <div class="obj-img-wrap">
          <img id="objImg" alt="Classroom object" />
        </div>

        <div id="wordLabel" class="word-label">…</div>

        <div id="statusPill" class="status-pill">Presiona ▶ Play y repite la palabra.</div>

        <button id="nextWordBtn" class="next-word-btn" type="button" disabled>Siguiente ▶</button>
      </div>
    </div>

    <div class="footer-actions">
      <a href="../index.html" class="finish-btn hidden" id="finishBtn">✅ Finalizar lección</a>
    </div>
  </div>

<script>
(() => {
  const SB         = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE   = SB + "images/u2/";
  const AUDIO_BASE = SB + "audio/u2/";
  const SFX_OK_URL = SB + "sfx/correct.wav";

  function playOK() { try { new Audio(SFX_OK_URL).play(); } catch(e){} }

  const ITEMS = [
    { img:"u2.l6.p4.bookshelf.jpg",      audio:"u2.l6.p4.bookshelf.mp3", text:"bookshelf"      },
    { img:"u2.l6.p4.pencil.jpg",         audio:"u2.l6.p4.pencil.mp3",    text:"pencil"         },
    { img:"u2.l6.p4.map.jpg",            audio:"u2.l6.p4.map.mp3",       text:"map"            },
    { img:"u2.l6.p4.board.jpg",          audio:"u2.l6.p4.board.mp3",     text:"board"          },
    { img:"u2.l6.p4.clock.jpg",          audio:"u2.l6.p4.clock.mp3",     text:"clock"          },
    { img:"u2.l6.p4.bulletin.board.jpg", audio:"u2.l6.p4.bulletin.mp3",  text:"bulletin board" },
    { img:"u2.l6.p4.table.jpg",          audio:"u2.l6.p4.table.mp3",     text:"table"          },
  ];

  const LS_KEY = "inglesco_progress_u2";
  let idx = 0, hasPlayed = false, wordsCompleted = 0, pageComplete = false;

  const $ = id => document.getElementById(id);
  const classroomImg = $("classroomImg");
  const objImg       = $("objImg");
  const playBtn      = $("playBtn");
  const nextWordBtn  = $("nextWordBtn");
  const statusPill   = $("statusPill");
  const nowEl        = $("nowEl");
  const wordLabel    = $("wordLabel");
  const finishBtn    = $("finishBtn");

  classroomImg.src = IMG_BASE + "u2.l6.p4.classroom.jpg";
  $("totalEl").textContent = String(ITEMS.length);

  function updateScore() {
    $("scoreBadge").textContent = `${wordsCompleted} / ${ITEMS.length}`;
  }

  function setStatus(msg, cls) {
    statusPill.textContent = msg;
    statusPill.className   = "status-pill" + (cls ? " " + cls : "");
  }

  function saveProgress() {
    try {
      const raw  = localStorage.getItem(LS_KEY);
      const data = raw ? JSON.parse(raw) : {};
      if (!data.l6) data.l6 = { partsCompleted:0, partsTotal:4 };
      if (!pageComplete) {
        pageComplete = true;
        data.l6.partsCompleted = Math.max(data.l6.partsCompleted || 0, 4);
        data.l6.partsTotal = 4;
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }
    } catch(e) {}
  }

  document.querySelectorAll(".step").forEach(s => {
    s.addEventListener("click", () => { const go = s.getAttribute("data-go"); if (go) window.location.href = go; });
  });

  const audio = new Audio();
  audio.preload = "none";

  function loadItem() {
    const item = ITEMS[idx];
    hasPlayed = false;
    nowEl.textContent     = String(idx + 1);
    objImg.src            = IMG_BASE + item.img;
    objImg.alt            = item.text;
    wordLabel.textContent = item.text;
    audio.src             = AUDIO_BASE + item.audio;
    audio.onended         = null;
    playBtn.textContent   = "▶ Play";
    playBtn.disabled      = false;
    nextWordBtn.disabled  = true;
    setStatus("Presiona ▶ Play y repite la palabra.");
  }

  playBtn.addEventListener("click", async () => {
    setStatus("Reproduciendo…");
    playBtn.disabled     = true;
    nextWordBtn.disabled = true;
    audio.currentTime    = 0;
    audio.onended        = null;
    try {
      await audio.play();
      audio.onended = () => {
        hasPlayed            = true;
        playBtn.textContent  = "▶ Replay";
        playBtn.disabled     = false;
        nextWordBtn.disabled = false;
        setStatus("¡Repite en voz alta! Luego pulsa Siguiente ▶", "ok");
      };
    } catch(e) {
      playBtn.disabled = false;
      setStatus("Audio bloqueado. Intenta otra vez.");
    }
  });

  nextWordBtn.addEventListener("click", () => {
    if (!hasPlayed) return;
    playOK();
    wordsCompleted++;
    updateScore();

    if (idx >= ITEMS.length - 1) {
      setStatus("✅ ¡Excelente! Has completado la lección.", "done");
      playBtn.disabled     = true;
      nextWordBtn.disabled = true;
      finishBtn.classList.remove("hidden");
      saveProgress();
      return;
    }
    idx++;
    loadItem();
  });

  updateScore();
  loadItem();
})();
</script>
</body>
</html>
