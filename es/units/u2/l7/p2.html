<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 2 - Lección 7 - Parte 2</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <style>
    body{
      margin:0;
      font-family: Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      color:#0f172a;
    }
    .wrap{ max-width: 900px; margin: 0 auto; }

    /* ===== BACK BUTTON ===== */
    .back-btn{
      display:inline-block;
      margin-bottom:20px;
      padding:8px 15px;
      background:#2563eb;
      color:#fff;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
    }
    .back-btn:hover{ background:#1e40af; }

    /* ===== PROGRESS BAR ===== */
    .progress-container{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:15px 0 25px 0;
    }
    .step{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#d1d5db;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      cursor:pointer;
      transition:all .3s;
      color:#1f2933;
      user-select:none;
    }
    .step.active{ background:#2563eb; color:#fff; }
    .step:hover{ transform:scale(1.1); }
    @media (max-width:520px){
      .step{ width:34px; height:34px; font-size:14px; }
    }

    /* ===== CARD ===== */
    .card{
      background: rgba(255,255,255,.88);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.10);
      margin-bottom: 14px;
    }

    .lesson-subtitle{
      text-align:center;
      font-weight: 800;
      margin: 0 0 10px 0;
      opacity: .85;
    }
    .title{
      font-size: 26px;
      font-weight: 900;
      margin: 6px 0 10px 0;
      letter-spacing: .2px;
      text-align:center;
    }

    .hint-es{
      text-align:center;
      font-weight: 900;
      margin: 6px 0 0 0;
      font-size: 15px;
      opacity:.9;
    }
    .hint{
      text-align:center;
      font-weight: 700;
      opacity: .75;
      margin: 6px 0 0 0;
      font-size: 14px;
    }

    /* ===== LIST ===== */
    .items{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      margin-top: 10px;
    }
    .item{
      display:flex;
      gap: 12px;
      align-items:flex-start;
      padding: 12px;
      border-radius: 16px;
      background: rgba(255,255,255,.92);
      box-shadow: 0 6px 18px rgba(15, 23, 42, 0.08);
    }
    .item img{
      width: 84px;
      height: 84px;
      border-radius: 14px;
      object-fit: contain;   /* keep true image */
      background:#e5e7eb;
      flex: 0 0 auto;
    }
    .item-main{
      flex:1;
      min-width: 0;
    }
    .row-top{
      display:flex;
      align-items:center;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
    }
    .label{
      font-weight: 900;
      font-size: 15px;
      opacity:.85;
    }

    .mask-line{
      margin-top: 8px;
      font-weight: 900;
      font-size: 14px;
      opacity: .9;
      display:flex;
      align-items:center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .mask{
      display:inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background:#f1f5f9;
      border: 2px dashed #94a3b8;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    .hint-btn{
      appearance:none;
      border:0;
      cursor:pointer;
      padding: 8px 10px;
      border-radius: 12px;
      background:#2563eb;
      color:#fff;
      font-weight: 900;
      font-size: 13px;
    }
    .hint-btn:hover{ background:#1e40af; }
    .hint-btn:disabled{ opacity:.6; cursor:not-allowed; }

    .input{
      width: 100%;
      margin-top: 10px;
      padding: 12px 12px;
      border-radius: 14px;
      border: 2px solid #cbd5e1;
      font-size: 16px;
      font-weight: 900;
      outline: none;
    }
    .input:focus{
      border-color:#2563eb;
      box-shadow: 0 0 0 3px rgba(37,99,235,.15);
    }
    .input.correct{
      border-color:#16a34a;
      background:#dcfce7;
    }
    .input.wrong{
      border-color:#dc2626;
      background:#fee2e2;
    }

    /* ===== ACTIONS ===== */
    .actions{
      display:flex;
      justify-content:center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 14px;
      padding-bottom: 22px;
    }
    .check-btn{
      appearance:none;
      border:0;
      cursor:pointer;
      padding: 12px 18px;
      border-radius: 14px;
      background:#16a34a;
      color:#fff;
      font-weight: 900;
      font-size: 16px;
      min-width: 220px;
      box-shadow: 0 8px 18px rgba(22,163,74,.22);
    }
    .check-btn:hover{ filter: brightness(.96); }
    .check-btn:disabled{ opacity:.55; cursor:not-allowed; }

    .finish-btn{
      display:inline-block;
      padding: 12px 18px;
      border-radius: 14px;
      background:#2563eb;
      color:#fff;
      font-weight: 900;
      text-decoration:none;
      min-width: 220px;
      text-align:center;
    }
    .finish-btn:hover{ background:#1e40af; }
    .hidden{ display:none !important; }

    .done-badge{
      display:inline-block;
      margin: 10px auto 0 auto;
      padding: 8px 12px;
      border-radius: 999px;
      background:#dcfce7;
      color:#166534;
      font-weight: 900;
      text-align:center;
    }
  </style>
</head>

<body>
  <div class="wrap">

    <a href="../index.html" class="back-btn">← Volver a Unidad 2</a>

    
<div class="progress-container" aria-label="Progreso de la lección">
  <div class="step" data-go="p1.html">1</div>
  <div class="step active" data-go="p2.html" aria-current="page">2</div>
  <div class="step" data-go="p3.html">3</div>
<div class="step" data-go="p4.html">4</div>
</div>

    <div class="card">
      <div class="lesson-subtitle">Unidad 2 · Lección 7 · Parte 2</div>
      <div class="title">Escribe las palabras</div>

      <div class="hint-es">Mira la imagen y escribe la palabra completa debajo.</div>
      <div class="hint">Complete all words, then press CHECK.</div>

      <div id="itemsGrid" class="items"></div>

      <div class="actions">
        <button id="checkBtn" class="check-btn" type="button" disabled>✔ CHECK</button>
        <a id="finishBtn" class="finish-btn hidden" href="../index.html">Finalizar ▶</a>
      </div>

      <div id="doneBadge" class="done-badge hidden">🎉 Buen trabajo, felicitaciones..</div> 
    </div>

  </div>

  <script src="../../../../js/u2/u2_l7_p2.js"></script>
</body>
</html>
