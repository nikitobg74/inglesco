<!-- u3/l1/p1.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 – Lección 1 – P1</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <style>
    body{
      font-family: Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      color:#0f172a;
    }

    .wrap{
      max-width: 980px;
      margin: 0 auto;
    }

    /* ===== BACK BUTTON ===== */
    .back-btn{
      display:inline-block;
      margin-bottom:20px;
      padding:8px 15px;
      background:#2563eb;
      color:#fff;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
    }
    .back-btn:hover{ background:#1e40af; }

    /* ===== PROGRESS BAR ===== */
    .progress-container{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:15px 0 25px 0;
    }
    .step{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#d1d5db;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      cursor:pointer;
      transition:all .3s;
      color:#1f2933;
      user-select:none;
    }
    .step.active{
      background:#2563eb;
      color:#fff;
    }
    .step:hover{ transform:scale(1.1); }
    .step.locked{
      opacity:.55;
      cursor:not-allowed;
      transform:none !important;
    }

    /* ===== NEXT BUTTON (BOTTOM) ===== */
    .footer-actions{
      display:flex;
      justify-content:center;
      margin-top:25px;
      padding-bottom: 10px;
    }
    .next-btn{
      display:inline-block;
      padding:10px 18px;
      background:#2563eb;
      color:#fff;
      text-decoration:none;
      border-radius:12px;
      font-weight:800;
    }
    .next-btn:hover{ background:#1e40af; }
    .hidden{ display:none !important; }

    /* ===== CARDS / SECTIONS ===== */
    h1{
      font-size: 22px;
      margin: 0 0 8px 0;
    }
    .subtitle{
      margin: 0 0 18px 0;
      font-size: 16px;
      line-height: 1.35;
    }

    .section{
      background: rgba(255,255,255,.85);
      border: 1px solid rgba(15,23,42,.08);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
      margin-bottom: 18px;
    }

    .section-title{
      font-size: 18px;
      margin: 0 0 10px 0;
      font-weight: 900;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .card{
      background:#fff;
      border-radius: 16px;
      border: 1px solid rgba(15,23,42,.08);
      padding: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.06);
      display:flex;
      flex-direction:column;
      gap: 10px;
    }

    .imgbox{
      display:flex;
      justify-content:center;
      align-items:center;
      background: rgba(219,234,254,.55);
      border-radius: 14px;
      padding: 10px;
      overflow:hidden;
    }
    .imgbox img{
      max-width: 100%;
      height: auto;
      display:block;
      border-radius: 12px;
    }

    .play-row{
      display:flex;
      gap: 10px;
      align-items:center;
      justify-content:space-between;
      flex-wrap: wrap;
    }

    .btn{
      border: 0;
      background:#2563eb;
      color:#fff;
      font-weight: 900;
      padding: 10px 12px;
      border-radius: 12px;
      cursor:pointer;
      min-width: 150px;
      text-align:center;
    }
    .btn:hover{ background:#1e40af; }
    .btn:disabled{
      opacity:.6;
      cursor:not-allowed;
    }

    .lines{
      display:flex;
      flex-direction:column;
      gap: 4px;
      font-size: 15px;
      line-height: 1.25;
    }
    .en{
      font-weight: 900;
      font-size: 16px;
    }
    .es{
      font-weight: 700;
      color:#334155;
    }
    .mini{
      font-size: 13px;
      color:#475569;
    }

    .ing{
      color: #dc2626;
      font-weight: 900;
    }

    /* ===== PART 2 ===== */
    .drill{
      display:flex;
      flex-direction:column;
      gap: 10px;
    }

    .drill .phrase{
      font-size: 16px;
      font-weight: 900;
      line-height: 1.25;
    }

    .drill .hint{
      font-size: 14px;
      color:#334155;
      margin-top: -2px;
    }

    .input-row{
      display:flex;
      gap: 10px;
      align-items:center;
      flex-wrap: wrap;
    }

    .word-input{
      flex: 1 1 220px;
      padding: 12px 12px;
      border-radius: 12px;
      border: 2px solid rgba(15,23,42,.18);
      font-size: 16px;
      outline: none;
      background: #fff;
    }
    .word-input:disabled{
      background: rgba(241,245,249,.9);
      cursor:not-allowed;
    }

    .status{
      font-weight: 900;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(241,245,249,.9);
      border: 1px solid rgba(15,23,42,.12);
      min-width: 120px;
      text-align:center;
    }
    .ok{
      background: rgba(34,197,94,.12);
      border-color: rgba(34,197,94,.35);
      color: #166534;
    }

    .collapsed{ display:none; }

    /* ===== MOBILE SAFE ===== */
    @media (max-width:520px){
      .step{ width:34px; height:34px; font-size:14px; }
      .grid{ grid-template-columns: 1fr; }
      .btn{ width: 100%; min-width: unset; }
      h1{ font-size: 20px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <!-- Progress 1-4 -->
    <div class="progress-container" aria-label="Progreso de la lección">
      <div class="step active" data-go="p1.html" aria-current="page">1</div>
      <div class="step" data-go="p2.html">2</div>
<div class="step" data-go="p3.html">3</div>
<div class="step" data-go="p4.html">4</div>
    </div>

    <h1>Lección 1 – What are you doing?</h1>
    <p class="subtitle">
      <b>Parte 1:</b> Mira la imagen, toca <b>Escuchar</b> y repite.<br/>
      <b>Parte 2:</b> Escucha el diálogo y <b>escribe la palabra</b>.
    </p>

    <!-- PART 1 -->
    <section class="section" aria-label="Parte 1">
      <div class="section-title">Parte 1 · Verbos</div>
      <div id="vocabGrid" class="grid"></div>
    </section>

    <!-- PART 2 -->
    <section class="section" aria-label="Parte 2">
      <div class="section-title">Parte 2 · Escucha y escribe</div>
      <p class="mini" style="margin-top:-4px;">
        Primero escucha el audio. Después escribe la palabra correcta (termina en <span class="ing">-ing</span>).
      </p>

      <div id="drillList" class="drill"></div>
    </section>

    <!-- Next button -->
    <div class="footer-actions">
      <a id="nextBtn" class="next-btn hidden" href="p2.html">Continuar</a>
    </div>
  </div>

  <script src="../../../../js/u3/u3_l1_p1.js"></script>
</body>
</html>
