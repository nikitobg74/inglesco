<!-- u3/l1/p2.html -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 – Lección 1 – P2</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <style>
    body{
      font-family: Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      color:#0f172a;
    }
    .wrap{ max-width: 680px; margin: 0 auto; }

    /* ===== BACK BUTTON ===== */
    .back-btn{
      display:inline-block;
      margin-bottom:20px;
      padding:8px 15px;
      background:#2563eb;
      color:#fff;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
    }
    .back-btn:hover{ background:#1e40af; }

    /* ===== PROGRESS BAR ===== */
    .progress-container{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:15px 0 25px 0;
    }
    .step{
      width:40px; height:40px;
      border-radius:50%;
      background:#d1d5db;
      display:flex; align-items:center; justify-content:center;
      font-weight:600; cursor:pointer; transition:all .3s;
      color:#1f2933; user-select:none;
    }
    .step.active{ background:#2563eb; color:#fff; }
    .step:hover{ transform:scale(1.1); }

    /* ===== FOOTER ===== */
    .footer-actions{
      display:flex; justify-content:center;
      margin-top:25px; padding-bottom:10px;
    }
    .next-btn{
      display:inline-block; padding:10px 28px;
      background:#2563eb; color:#fff;
      text-decoration:none; border-radius:12px; font-weight:800;
    }
    .next-btn:hover{ background:#1e40af; }
    .hidden{ display:none !important; }

    /* ===== CARD ===== */
    .section{
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(15,23,42,.08);
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
    }

    h1{ font-size: 22px; margin: 0 0 6px 0; text-align:center; }
    .subtitle{
      margin: 0 0 16px 0; font-size: 15px;
      line-height: 1.5; text-align:center; color:#334155;
    }
    .counter{
      font-weight:800; text-align:center;
      font-size:14px; color:#1e3a8a; margin-bottom:14px;
    }

    .imgbox{
      display:flex; justify-content:center; align-items:center;
      background: rgba(219,234,254,.55);
      border-radius: 14px; padding: 10px;
      margin-bottom: 16px;
    }
    .imgbox img{
      max-width:100%; max-height:260px;
      object-fit:contain; border-radius:12px; display:block;
    }

    .btn{
      border:0; background:#2563eb; color:#fff;
      font-weight:900; padding:12px; border-radius:12px;
      cursor:pointer; width:100%; font-size:15px;
    }
    .btn:hover{ background:#1e40af; }
    .btn:disabled{ opacity:.6; cursor:not-allowed; }

    /* ===== ANSWER SLOTS ===== */
    .answer-wrap{
      margin-top:18px;
    }
    .answer-label{
      font-weight:900; font-size:14px; color:#334155;
      margin-bottom:8px; text-align:center;
    }
    .slots{
      display:flex; flex-wrap:wrap; gap:8px;
      align-items:center; justify-content:center;
      padding:12px;
      border-radius:14px;
      background:rgba(241,245,249,.9);
      border:1px dashed rgba(15,23,42,.2);
      min-height:60px;
    }
    .slot{
      min-width:56px; height:40px;
      border-radius:12px;
      border:2px solid rgba(15,23,42,.18);
      background:#fff;
      display:flex; align-items:center; justify-content:center;
      font-weight:900; padding:0 12px;
      user-select:none; font-size:15px;
    }
    .slot.filled{
      border-color:rgba(37,99,235,.5);
      background:rgba(219,234,254,.6);
      cursor:pointer;
    }

    /* ===== WORD BANK ===== */
    .bank{
      margin-top:16px;
      background:#fff;
      border-radius:16px;
      border:1px solid rgba(15,23,42,.08);
      padding:14px;
      box-shadow:0 4px 12px rgba(0,0,0,.05);
    }
    .bank-title{
      font-weight:900; font-size:14px; color:#334155;
      margin-bottom:10px; text-align:center;
    }
    .words{
      display:flex; flex-wrap:wrap; gap:10px; justify-content:center;
    }
    .word{
      border:2px solid rgba(15,23,42,.18);
      background:#fff; border-radius:999px;
      padding:10px 16px; font-weight:900; font-size:15px;
      cursor:pointer; user-select:none; transition:transform .08s;
    }
    .word:active{ transform:scale(.97); }
    .word:hover:not(.disabled){ border-color:#2563eb; background:#dbeafe; }
    .word.disabled{ opacity:.45; cursor:not-allowed; }

    .actions-row{
      display:flex; gap:10px; margin-top:12px; flex-wrap:wrap;
    }
    .small-btn{
      flex:1 1 140px; border:0;
      background:rgba(15,23,42,.07); color:#0f172a;
      font-weight:900; padding:10px 12px;
      border-radius:12px; cursor:pointer; font-size:14px;
    }
    .small-btn:hover{ background:rgba(15,23,42,.12); }
    .small-btn:disabled{ opacity:.5; cursor:not-allowed; }

    .status{
      margin-top:12px; font-weight:900; text-align:center;
      padding:10px 12px; border-radius:12px;
      background:rgba(241,245,249,.9);
      border:1px solid rgba(15,23,42,.12);
      font-size:18px;
    }
    .good{ background:rgba(34,197,94,.12); border-color:rgba(34,197,94,.4); color:#166534; }
    .bad{  background:rgba(239,68,68,.10); border-color:rgba(239,68,68,.3); color:#991b1b; }

    @media (max-width:520px){
      .step{ width:34px; height:34px; font-size:14px; }
      h1{ font-size:19px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="progress-container" aria-label="Progreso de la lección">
      <div class="step" data-go="p1.html">1</div>
      <div class="step active" data-go="p2.html" aria-current="page">2</div>
      <div class="step" data-go="p3.html">3</div>
      <div class="step" data-go="p4.html">4</div>
    </div>

    <h1>Lección 1 – P2</h1>
    <p class="subtitle">
      Escucha el audio y ordena las palabras para formar la respuesta.
    </p>

    <section class="section">
      <div id="counter" class="counter">1 / 8</div>

      <div class="imgbox">
        <img id="sceneImg" alt="">
      </div>

      <button id="playBtn" class="btn" type="button">🔊 Escuchar</button>

      <!-- Answer slots only -->
      <div class="answer-wrap">
        <div class="answer-label">Respuesta</div>
        <div id="aSlots" class="slots" aria-label="Respuesta"></div>
      </div>

      <!-- Word bank -->
      <div class="bank">
        <div class="bank-title">Palabras</div>
        <div id="wordBank" class="words"></div>

        <div class="actions-row">
          <button id="undoBtn"  class="small-btn" type="button" disabled>↩︎ Deshacer</button>
          <button id="resetBtn" class="small-btn" type="button" disabled>⟲ Reiniciar</button>
        </div>

        <div id="statusBox" class="status">—</div>
      </div>
    </section>

    <div class="footer-actions">
      <a id="nextBtn" class="next-btn hidden" href="p3.html">Continuar ▶</a>
    </div>
  </div>

  <script src="../../../../js/u3/u3_l1_p2.js"></script>
</body>
</html>
