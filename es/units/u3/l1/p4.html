<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 – Lección 1 – P4</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vercel Insights -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px;
      background: linear-gradient(135deg, #dbeafe 0%, #fef9c3 100%);
      color: #0f172a;
      min-height: 100vh;
      margin: 0;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── BACK BUTTON ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 14px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── PROGRESS DOTS ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 20px 0;
    }
    .step {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: transform .2s, background .2s;
      color: #1f2933;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover { transform: scale(1.1); }

    /* ── SCORE BADGE ── */
    .score-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .score-badge {
      background: #fff;
      border: 2px solid #2563eb;
      border-radius: 20px;
      padding: 5px 16px;
      font-weight: 800;
      font-size: 15px;
      color: #2563eb;
      letter-spacing: .3px;
    }
    .score-label {
      font-size: 13px;
      color: #475569;
      font-weight: 600;
    }

    /* ── PAGE HEADING ── */
    h1 { font-size: 20px; margin: 0 0 6px 0; font-weight: 900; }
    .subtitle {
      margin: 0 0 18px 0;
      font-size: 14px;
      line-height: 1.5;
      color: #334155;
    }

    /* ── SECTION ── */
    .section {
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(15,23,42,.08);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,.07);
      margin-bottom: 18px;
    }

    /* ── COUNTER ── */
    .counter {
      font-weight: 900;
      font-size: 13px;
      color: #475569;
      text-align: center;
      margin-bottom: 12px;
    }

    /* ── IMAGE BOX ── */
    .imgbox {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f1f5f9;
      border-radius: 14px;
      padding: 8px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .imgbox img {
      max-height: 200px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    /* ── PROMPT CARD ── */
    .prompt-card {
      background: #fff;
      border-radius: 16px;
      border: 1px solid rgba(15,23,42,.10);
      padding: 14px;
      box-shadow: 0 4px 12px rgba(0,0,0,.06);
    }
    .ctx-line {
      font-weight: 700;
      font-size: 15px;
      color: #334155;
      margin-bottom: 4px;
    }
    .q-line {
      font-weight: 900;
      font-size: 16px;
      margin-bottom: 14px;
    }

    /* ── SENTENCE FRAME ── */
    .frame {
      font-weight: 900;
      font-size: 15px;
      padding: 10px 14px;
      border-radius: 12px;
      background: rgba(241,245,249,.9);
      border: 1px solid rgba(15,23,42,.12);
      margin-bottom: 12px;
      line-height: 1.4;
    }
    .blank {
      display: inline-block;
      min-width: 90px;
      border-bottom: 3px solid rgba(15,23,42,.35);
      padding: 0 4px 2px;
      margin: 0 4px;
    }

    /* ── INPUT ROW ── */
    .answer-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
    }
    .word-input {
      flex: 1;
      padding: 12px 14px;
      border-radius: 12px;
      border: 2px solid rgba(15,23,42,.18);
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      outline: none;
      background: #fff;
      transition: border-color .2s;
      min-width: 0;
    }
    .word-input:focus { border-color: #2563eb; }
    .word-input.correct-input { border-color: rgba(34,197,94,.65); background: rgba(240,253,244,.7); }
    .word-input.wrong-input { border-color: #ef4444; animation: shake .4s ease; }
    .word-input:disabled { background: rgba(241,245,249,.9); cursor: not-allowed; }

    .submit-btn {
      border: 0;
      background: #2563eb;
      color: #fff;
      font-family: inherit;
      font-weight: 800;
      font-size: 14px;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      white-space: nowrap;
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }
    .submit-btn:hover:not(:disabled) { background: #1e40af; }
    .submit-btn:active:not(:disabled) { transform: scale(.97); }
    .submit-btn:disabled { opacity: .45; cursor: not-allowed; }

    /* ── FEEDBACK ── */
    .feedback {
      min-height: 22px;
      margin-top: 10px;
      font-size: 13px;
      font-weight: 700;
      text-align: center;
    }
    .feedback.ok  { color: #16a34a; }
    .feedback.bad { color: #dc2626; }
    .feedback.hint { color: #b45309; }

    /* ── COMPLETION BANNER ── */
    .completion-banner {
      display: none;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border: 2px solid rgba(34,197,94,.4);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      margin-bottom: 14px;
    }
    .completion-banner.visible { display: block; }
    .completion-banner h2 { margin: 0 0 4px; font-size: 20px; font-weight: 900; color: #166534; }
    .completion-banner p  { margin: 0; font-size: 14px; color: #166534; font-weight: 600; }

    /* ── NEXT BTN ── */
    .footer-actions {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      padding-bottom: 12px;
    }
    .next-btn {
      display: inline-block;
      padding: 12px 32px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 900;
      font-size: 16px;
      transition: background .15s, transform .1s;
    }
    .next-btn:hover { background: #1e40af; }
    .next-btn:active { transform: scale(.97); }

    .hidden { display: none !important; }

    /* ── ANIMATIONS ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-7px); }
      40%      { transform: translateX(7px); }
      60%      { transform: translateX(-5px); }
      80%      { transform: translateX(5px); }
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      body { padding: 12px; }
      h1 { font-size: 18px; }
      .step { width: 34px; height: 34px; font-size: 14px; }
      .answer-row { flex-direction: column; }
      .submit-btn { width: 100%; }
      .imgbox img { max-height: 150px; }
    }
  </style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

  <!-- Progress dots -->
  <div class="progress-container" aria-label="Progreso de la lección">
    <div class="step" data-go="p1.html">1</div>
    <div class="step" data-go="p2.html">2</div>
    <div class="step" data-go="p3.html">3</div>
    <div class="step active" data-go="p4.html" aria-current="page">4</div>
  </div>

  <!-- Score bar -->
  <div class="score-bar">
    <span class="score-label">Puntaje:</span>
    <span class="score-badge" id="scoreBadge">0 / 8</span>
  </div>

  <h1>Lección 1 – What are you doing?</h1>
  <p class="subtitle">
    Mira la imagen y escribe la palabra correcta (verbo + <b>-ing</b>).
  </p>

  <section class="section">
    <div class="counter" id="counter">1 / 8</div>

    <div class="imgbox">
      <img id="sceneImg" alt="">
    </div>

    <div class="prompt-card">
      <div class="ctx-line" id="ctxLine">—</div>
      <div class="q-line"   id="qLine">—</div>

      <div class="frame">
        <span id="frameLeft"></span><span class="blank"></span><span id="frameRight"></span>
      </div>

      <div class="answer-row">
        <input id="wordInput" class="word-input" type="text" inputmode="latin"
               autocomplete="off" spellcheck="false" placeholder="Escribe la palabra…">
        <button id="submitBtn" class="submit-btn" type="button">OK</button>
      </div>

      <div class="feedback" id="feedback"></div>
    </div>
  </section>

  <!-- Completion banner -->
  <div class="completion-banner" id="completionBanner">
    <h2>🎉 ¡Excelente!</h2>
    <p id="completionMsg">Completaste la Parte 4.</p>
  </div>

  <!-- Next -->
  <div class="footer-actions">
    <a id="nextBtn" class="next-btn hidden" href="../l2/p1.html">Continuar → Lección 2</a>
  </div>

</div>

<script>
(() => {
  /* ── CONFIG ── */
  const SB  = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG = SB + "images/u3/";
  const SFX_CORRECT = SB + "sfx/correct.wav";

  const DELAY_NEXT    = 1600;
  const HINT_AFTER    = 2;   // show answer hint after this many wrong attempts

  /* ── DATA ── */
  const ROUNDS = [
    { img:"u3.l1.p1.woman.eating.jpg",    ctx:"Emma is at home.",           q:"What is she doing?",  left:"She is", right:".", answer:"eating"    },
    { img:"u3.l1.p1.man.drinking.jpg",    ctx:"John is in the bedroom.",    q:"What is he doing?",   left:"He is",  right:".", answer:"drinking"   },
    { img:"u3.l1.p1.woman.cooking2.jpg",  ctx:"Martha is in the kitchen.",  q:"What is she doing?",  left:"She is", right:".", answer:"cooking"    },
    { img:"u3.l1.p1.woman.reading2.jpg",  ctx:"Jane is in the bedroom.",    q:"What is she doing?",  left:"She is", right:".", answer:"reading"    },
    { img:"u3.l1.p1.man.watching.jpg",    ctx:"Mateo is in the living room.",q:"What is he doing?",  left:"He is",  right:".", answer:"watching"   },
    { img:"u3.l1.p1.man.playing.jpg",     ctx:"Henry is at the park.",      q:"What is he doing?",   left:"He is",  right:".", answer:"playing"    },
    { img:"u3.l1.p1.woman.singing2.jpg",  ctx:"Sherri is at the theater.",  q:"What is she doing?",  left:"She is", right:".", answer:"singing"    },
    { img:"u3.l1.p1.man.listening.jpg",   ctx:"I am at home.",              q:"What am I doing?",    left:"I am",   right:".", answer:"listening"  },
  ];

  /* ── DOM ── */
  const $id = id => document.getElementById(id);
  const sceneImg   = $id('sceneImg');
  const counter    = $id('counter');
  const ctxLine    = $id('ctxLine');
  const qLine      = $id('qLine');
  const frameLeft  = $id('frameLeft');
  const frameRight = $id('frameRight');
  const wordInput  = $id('wordInput');
  const submitBtn  = $id('submitBtn');
  const feedback   = $id('feedback');
  const scoreBadge = $id('scoreBadge');
  const nextBtn    = $id('nextBtn');
  const banner     = $id('completionBanner');
  const compMsg    = $id('completionMsg');

  /* ── AUDIO ── */
  const sfxCorrect = new Audio(SFX_CORRECT);

  /* ── STATE ── */
  let index       = 0;
  let attempts    = 0;
  let locked      = false;
  let correctCount = 0;

  /* ── HELPERS ── */
  function normalize(t){ return String(t || '').trim().toLowerCase(); }

  function updateScore(){
    scoreBadge.textContent = correctCount + ' / ' + ROUNDS.length;
  }

  function clearFeedback(){
    feedback.textContent = '';
    feedback.className = 'feedback';
  }

  function setFeedback(text, type){
    feedback.textContent = text;
    feedback.className = 'feedback ' + type;
  }

  /* ── LOAD ROUND ── */
  function loadRound(i){
    index    = i;
    attempts = 0;
    locked   = false;

    const r = ROUNDS[i];

    counter.textContent  = (i + 1) + ' / ' + ROUNDS.length;
    sceneImg.src         = IMG + r.img;
    ctxLine.textContent  = r.ctx;
    qLine.textContent    = r.q;
    frameLeft.textContent  = r.left;
    frameRight.textContent = r.right;

    wordInput.value = '';
    wordInput.disabled = false;
    wordInput.className = 'word-input';
    submitBtn.disabled = false;

    clearFeedback();
    wordInput.focus();
  }

  /* ── CHECK ANSWER ── */
  function checkAnswer(){
    if (locked) return;
    const typed  = normalize(wordInput.value);
    const answer = normalize(ROUNDS[index].answer);
    if (!typed) return;

    if (typed === answer) {
      // Correct
      locked = true;
      correctCount++;
      updateScore();

      wordInput.disabled = true;
      wordInput.classList.remove('wrong-input');
      wordInput.classList.add('correct-input');
      submitBtn.disabled = true;
      setFeedback('¡Correcto! ✓', 'ok');

      try { sfxCorrect.currentTime = 0; sfxCorrect.play(); } catch(e){}

      setTimeout(() => {
        const next = index + 1;
        if (next >= ROUNDS.length) {
          finishLesson();
        } else {
          loadRound(next);
        }
      }, DELAY_NEXT);

    } else {
      // Wrong
      attempts++;
      wordInput.classList.remove('wrong-input');
      void wordInput.offsetWidth; // reflow for re-animation
      wordInput.classList.add('wrong-input');

      if (attempts >= HINT_AFTER) {
        setFeedback('Pista: ' + ROUNDS[index].answer, 'hint');
      } else {
        setFeedback('Intenta de nuevo.', 'bad');
      }

      setTimeout(() => wordInput.classList.remove('wrong-input'), 450);
    }
  }

  /* ── FINISH ── */
  function finishLesson(){
    // Save progress to localStorage
    try {
      const saved = JSON.parse(localStorage.getItem('inglesco_progress_u3') || '{}');
      if (!saved.l1) saved.l1 = {};
      const prev = saved.l1.partsCompleted || 0;
      if (prev < 4) {
        saved.l1.partsCompleted = 4;
        saved.l1.partsTotal = saved.l1.partsTotal || 4;
      }
      localStorage.setItem('inglesco_progress_u3', JSON.stringify(saved));

      const fk = 'inglesco_furthest_u3_l1';
      const prevFurthest = parseInt(localStorage.getItem(fk) || '0', 10);
      if (prevFurthest < 4) localStorage.setItem(fk, '4');
    } catch(e){}

    // Show completion UI
    banner.classList.add('visible');
    compMsg.textContent = '¡Puntaje: ' + correctCount + ' de ' + ROUNDS.length + '! Continúa a la Lección 2.';
    nextBtn.classList.remove('hidden');
    nextBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  /* ── EVENTS ── */
  submitBtn.addEventListener('click', checkAnswer);

  wordInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); checkAnswer(); }
  });

  // Touch-safe tap for submit
  submitBtn.addEventListener('touchend', e => {
    e.preventDefault();
    checkAnswer();
  });

  // Progress dot navigation
  document.querySelectorAll('.step').forEach(step => {
    step.addEventListener('click', () => {
      const go = step.dataset.go;
      if (go) window.location.href = go;
    });
  });

  /* ── INIT ── */
  document.addEventListener('DOMContentLoaded', () => {
    updateScore();
    loadRound(0);
  });
})();
</script>
</body>
</html>
