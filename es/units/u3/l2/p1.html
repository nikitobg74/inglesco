<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 – Lección 2 – P1</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vercel Insights -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px;
      background: linear-gradient(135deg, #dbeafe 0%, #fef9c3 100%);
      color: #0f172a;
      min-height: 100vh;
      margin: 0;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── BACK BUTTON ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 14px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── PROGRESS DOTS ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 20px 0;
    }
    .step {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: transform .2s, background .2s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    /* ── SCORE BADGE ── */
    .score-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 18px;
    }
    .score-badge {
      background: #fff;
      border: 2px solid #2563eb;
      border-radius: 20px;
      padding: 5px 16px;
      font-weight: 800;
      font-size: 15px;
      color: #2563eb;
    }
    .score-label {
      font-size: 13px;
      color: #475569;
      font-weight: 600;
    }

    /* ── PAGE HEADING ── */
    h1 { font-size: 20px; margin: 0 0 4px 0; font-weight: 900; }
    .grammar-tag {
      display: inline-block;
      background: rgba(255,255,255,.8);
      border-radius: 10px;
      padding: 5px 12px;
      font-size: 14px;
      font-weight: 800;
      margin-bottom: 18px;
      color: #1e40af;
    }

    /* ── SECTION CARD ── */
    .section {
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(15,23,42,.08);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 6px 20px rgba(0,0,0,.07);
      margin-bottom: 18px;
    }

    /* ── COUNTER ── */
    .counter {
      font-weight: 900;
      font-size: 13px;
      color: #475569;
      text-align: center;
      margin-bottom: 12px;
    }

    /* ── IMAGE BOX ── */
    .imgbox {
      display: flex;
      justify-content: center;
      align-items: center;
      background: #f1f5f9;
      border-radius: 14px;
      padding: 8px;
      overflow: hidden;
      margin-bottom: 14px;
    }
    .imgbox img {
      max-height: 200px;
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
      border-radius: 10px;
    }

    /* ── SCRIPT LINES ── */
    .script-box {
      background: rgba(219,234,254,.35);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }
    .script-line {
      font-size: 14px;
      font-weight: 700;
      line-height: 1.6;
      color: #1e3a5f;
      display: block;
    }

    /* ── REPLAY BUTTON ── */
    .replay-btn {
      display: block;
      width: 100%;
      border: 0;
      background: #2563eb;
      color: #fff;
      font-family: inherit;
      font-weight: 800;
      font-size: 14px;
      padding: 11px 14px;
      border-radius: 12px;
      cursor: pointer;
      text-align: center;
      transition: background .15s, transform .1s;
      margin-bottom: 16px;
    }
    .replay-btn:hover  { background: #1e40af; }
    .replay-btn:active { transform: scale(.97); }

    /* ── QUESTION BOXES ── */
    .qbox {
      background: #fff;
      border-radius: 14px;
      border: 2px solid transparent;
      padding: 12px;
      margin-bottom: 12px;
      transition: border-color .25s;
    }
    .qbox:last-child { margin-bottom: 0; }
    .qbox.correct-box { border-color: rgba(34,197,94,.5); }

    .qtitle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 10px;
    }
    .q-status {
      font-size: 18px;
      font-weight: 900;
      min-width: 24px;
      text-align: right;
    }
    .q-status.ok  { color: #16a34a; }
    .q-status.bad { color: #dc2626; }

    /* ── OPTIONS ── */
    .options {
      display: grid;
      gap: 8px;
    }
    .opt {
      width: 100%;
      text-align: left;
      border: 2px solid rgba(15,23,42,.12);
      background: #fff;
      border-radius: 12px;
      padding: 11px 14px;
      font-family: inherit;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: border-color .15s, background .15s, transform .1s;
    }
    .opt:hover:not(:disabled)  { border-color: rgba(37,99,235,.5); }
    .opt:active:not(:disabled) { transform: scale(.98); }
    .opt.correct {
      border-color: #16a34a;
      background: rgba(22,163,74,.1);
    }
    .opt.wrong {
      border-color: #ef4444;
      background: rgba(239,68,68,.08);
      animation: shake .35s ease;
    }
    .opt:disabled { cursor: not-allowed; opacity: .9; }

    /* ── INLINE FEEDBACK ── */
    .inline-feedback {
      text-align: center;
      font-size: 14px;
      font-weight: 800;
      min-height: 20px;
      margin-top: 8px;
      color: #16a34a;
    }

    /* ── COMPLETION BANNER ── */
    .completion-banner {
      display: none;
      background: linear-gradient(135deg, #dcfce7, #bbf7d0);
      border: 2px solid rgba(34,197,94,.4);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
      margin-bottom: 14px;
    }
    .completion-banner.visible { display: block; }
    .completion-banner h2 { margin: 0 0 4px; font-size: 20px; font-weight: 900; color: #166534; }
    .completion-banner p  { margin: 0; font-size: 14px; color: #166534; font-weight: 600; }

    /* ── NEXT BTN ── */
    .footer-actions {
      display: flex;
      justify-content: center;
      margin-top: 20px;
      padding-bottom: 12px;
    }
    .next-btn {
      display: inline-block;
      padding: 12px 32px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 900;
      font-size: 16px;
      transition: background .15s, transform .1s;
    }
    .next-btn:hover  { background: #1e40af; }
    .next-btn:active { transform: scale(.97); }

    .hidden { display: none !important; }

    /* ── ANIMATIONS ── */
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-6px); }
      75%      { transform: translateX(6px); }
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      body  { padding: 12px; }
      h1    { font-size: 18px; }
      .step { width: 34px; height: 34px; font-size: 14px; }
      .imgbox img { max-height: 160px; }
      .opt  { font-size: 14px; padding: 10px 12px; }
    }
  </style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

  <!-- Progress dots -->
  <div class="progress-container" aria-label="Progreso de la lección">
    <a class="step active" href="p1.html" aria-label="Parte 1">1</a>
    <a class="step" href="p2.html" aria-label="Parte 2">2</a>
    <a class="step" href="p3.html" aria-label="Parte 3">3</a>
    <a class="step" href="p4.html" aria-label="Parte 4">4</a>
  </div>

  <!-- Score bar -->
  <div class="score-bar">
    <span class="score-label">Puntaje:</span>
    <span class="score-badge" id="scoreBadge">0 / 10</span>
  </div>

  <h1>Lección 2 – We are…</h1>
  <div class="grammar-tag">We are = nosotros estamos</div>

  <section class="section">
    <div class="counter" id="counter">1 / 5</div>

    <!-- Image -->
    <div class="imgbox">
      <img id="sceneImg" src="" alt="Escena familiar">
    </div>

    <!-- Script lines -->
    <div class="script-box" aria-live="polite">
      <span class="script-line" id="line1"></span>
      <span class="script-line" id="line2"></span>
      <span class="script-line" id="line3"></span>
    </div>

    <!-- Replay audio -->
    <button id="replayBtn" class="replay-btn" type="button">▶ Repetir audio</button>

    <!-- Question A -->
    <div class="qbox" id="qABox">
      <div class="qtitle">
        <span id="qAText">A.</span>
        <span class="q-status" id="qAStatus" aria-label="Estado A"></span>
      </div>
      <div class="options" id="qAOptions"></div>
    </div>

    <!-- Question B (revealed after A correct) -->
    <div class="qbox hidden" id="qBBox">
      <div class="qtitle">
        <span id="qBText">B.</span>
        <span class="q-status" id="qBStatus" aria-label="Estado B"></span>
      </div>
      <div class="options" id="qBOptions"></div>
    </div>

    <div class="inline-feedback hidden" id="feedbackOk">¡Correcto! ✓</div>
  </section>

  <!-- Completion banner -->
  <div class="completion-banner" id="completionBanner">
    <h2>🎉 ¡Excelente!</h2>
    <p id="completionMsg">Completaste la Parte 1.</p>
  </div>

  <!-- Next button -->
  <div class="footer-actions">
    <a id="nextBtn" class="next-btn hidden" href="p2.html">Continuar → Parte 2</a>
  </div>

</div>

<script>
(() => {
  /* ── CONFIG ── */
  const SB  = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG = SB + "images/u3/";
  const AUD = SB + "audio/u3/";
  const SFX_CORRECT = SB + "sfx/correct.wav";

  const WAIT_AFTER_CORRECT = 1600;

  /* ── DATA ── */
  // 5 rounds × 2 questions = 10 total points
  const ROUNDS = [
    {
      img:   "u3.l2.p1.jones.jpg",
      audio: "u3.l2.p1.jones.mp3",
      lines: ["We are the Jones family.", "We are in the kitchen.", "And we are cooking dinner."],
      A: { prompt: "We are in the ___.", options: ["park","kitchen","bedroom"],        correct: "kitchen"      },
      B: { prompt: "We are ___ dinner.", options: ["eating","cooking","watching"],     correct: "cooking"      }
    },
    {
      img:   "u3.l2.p1.miller.jpg",
      audio: "u3.l2.p1.miller.mp3",
      lines: ["We are the Miller family.", "We are in the dining room.", "And we are eating dinner."],
      A: { prompt: "We are in the ___.", options: ["kitchen","bedroom","dining room"], correct: "dining room"  },
      B: { prompt: "We are ___ dinner.", options: ["eating","cooking","watching"],     correct: "eating"       }
    },
    {
      img:   "u3.l2.p1.davis.jpg",
      audio: "u3.l2.p1.davis.mp3",
      lines: ["We are the Davis family.", "We are in the living room.", "And we are playing cards."],
      A: { prompt: "We are in the ___.", options: ["bathroom","bedroom","living room"],correct: "living room"  },
      B: { prompt: "We are ___ cards.",  options: ["cooking","playing","watching"],    correct: "playing"      }
    },
    {
      img:   "u3.l2.p1.martinez.jpg",
      audio: "u3.l2.p1.martinez.mp3",
      lines: ["We are the Martinez family.", "We are at the beach.", "And we are playing ball."],
      A: { prompt: "We are at the ___.", options: ["bathroom","yard","beach"],         correct: "beach"        },
      B: { prompt: "We are ___ ball.",   options: ["playing","cooking","watching"],    correct: "playing"      }
    },
    {
      img:   "u3.l2.p1.barns.jpg",
      audio: "u3.l2.p1.barnes.mp3",
      lines: ["We are the Barnes family.", "We are at the movie theater.", "And we are watching a movie."],
      A: { prompt: "We are at the ___.",    options: ["beach","movie theater","dining room"], correct: "movie theater" },
      B: { prompt: "We are ___ a movie.",   options: ["eating","cooking","watching"],          correct: "watching"     }
    }
  ];

  const TOTAL_POINTS = ROUNDS.length * 2; // 10

  /* ── DOM ── */
  const $id = id => document.getElementById(id);
  const sceneImg   = $id('sceneImg');
  const counter    = $id('counter');
  const line1      = $id('line1');
  const line2      = $id('line2');
  const line3      = $id('line3');
  const replayBtn  = $id('replayBtn');
  const qABox      = $id('qABox');
  const qBBox      = $id('qBBox');
  const qAText     = $id('qAText');
  const qBText     = $id('qBText');
  const qAOptions  = $id('qAOptions');
  const qBOptions  = $id('qBOptions');
  const qAStatus   = $id('qAStatus');
  const qBStatus   = $id('qBStatus');
  const feedbackOk = $id('feedbackOk');
  const scoreBadge = $id('scoreBadge');
  const banner     = $id('completionBanner');
  const compMsg    = $id('completionMsg');
  const nextBtn    = $id('nextBtn');

  /* ── AUDIO ── */
  const audio      = new Audio();
  const sfxCorrect = new Audio(SFX_CORRECT);

  /* ── STATE ── */
  let idx          = 0;
  let locked       = false;
  let correctCount = 0;
  let firstPlay    = true; // require manual play on round 1

  /* ── HELPERS ── */
  function updateScore() {
    scoreBadge.textContent = correctCount + ' / ' + TOTAL_POINTS;
  }

  function safePlay() {
    audio.currentTime = 0;
    const p = audio.play();
    if (p && typeof p.catch === 'function') p.catch(() => {});
  }

  function setStatus(el, state) {
    el.classList.remove('ok', 'bad');
    el.textContent = '';
    if (state === 'ok')  { el.classList.add('ok');  el.textContent = '✓'; }
    if (state === 'bad') { el.classList.add('bad'); el.textContent = '✖'; }
  }

  function showOkFlash() {
    feedbackOk.classList.remove('hidden');
    setTimeout(() => feedbackOk.classList.add('hidden'), 900);
  }

  function renderOptions(container, opts, correct, handler) {
    container.innerHTML = '';
    opts.forEach(text => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'opt';
      b.textContent = text;
      b.addEventListener('click', () => handler(b, text, correct));
      // Touch-safe
      b.addEventListener('touchend', e => { e.preventDefault(); handler(b, text, correct); });
      container.appendChild(b);
    });
  }

  function markWrong(btn) {
    btn.classList.add('wrong');
    setTimeout(() => btn.classList.remove('wrong'), 400);
  }

  function lockOptions(container, correct) {
    [...container.querySelectorAll('.opt')].forEach(b => {
      if (b.textContent === correct) b.classList.add('correct');
      b.disabled = true;
    });
  }

  /* ── LOAD ROUND ── */
  function loadRound(i) {
    idx    = i;
    locked = false;

    feedbackOk.classList.add('hidden');
    setStatus(qAStatus, null);
    setStatus(qBStatus, null);
    qABox.style.borderColor = '';
    qBBox.style.borderColor = '';

    const r = ROUNDS[i];
    counter.textContent = (i + 1) + ' / ' + ROUNDS.length;
    sceneImg.src  = IMG + r.img;
    audio.src     = AUD + r.audio;
    line1.textContent = r.lines[0] || '';
    line2.textContent = r.lines[1] || '';
    line3.textContent = r.lines[2] || '';

    qAText.textContent = 'A. ' + r.A.prompt;
    renderOptions(qAOptions, r.A.options, r.A.correct, handlePickA);

    qBBox.classList.add('hidden');
    qBOptions.innerHTML = '';
    qBText.textContent = 'B.';

    if (!firstPlay) safePlay();
  }

  /* ── PICK A ── */
  function handlePickA(btn, chosen, correct) {
    if (locked) return;
    if (chosen !== correct) {
      setStatus(qAStatus, 'bad');
      markWrong(btn);
      return;
    }
    locked = true;
    correctCount++;
    updateScore();
    setStatus(qAStatus, 'ok');
    qABox.classList.add('correct-box');
    lockOptions(qAOptions, correct);
    try { sfxCorrect.currentTime = 0; sfxCorrect.play(); } catch(e){}
    showOkFlash();

    // Reveal B
    const r = ROUNDS[idx];
    qBBox.classList.remove('hidden');
    qBText.textContent = 'B. ' + r.B.prompt;
    renderOptions(qBOptions, r.B.options, r.B.correct, handlePickB);
    locked = false;
  }

  /* ── PICK B ── */
  function handlePickB(btn, chosen, correct) {
    if (locked) return;
    if (chosen !== correct) {
      setStatus(qBStatus, 'bad');
      markWrong(btn);
      return;
    }
    locked = true;
    correctCount++;
    updateScore();
    setStatus(qBStatus, 'ok');
    qBBox.classList.add('correct-box');
    lockOptions(qBOptions, correct);
    try { sfxCorrect.currentTime = 0; sfxCorrect.play(); } catch(e){}
    showOkFlash();

    setTimeout(() => {
      if (idx + 1 < ROUNDS.length) {
        loadRound(idx + 1);
      } else {
        finishLesson();
      }
    }, WAIT_AFTER_CORRECT);
  }

  /* ── FINISH ── */
  function finishLesson() {
    // Save progress
    try {
      const saved = JSON.parse(localStorage.getItem('inglesco_progress_u3') || '{}');
      if (!saved.l2) saved.l2 = {};
      const prev = saved.l2.partsCompleted || 0;
      if (prev < 1) {
        saved.l2.partsCompleted = 1;
        saved.l2.partsTotal = saved.l2.partsTotal || 4;
      }
      localStorage.setItem('inglesco_progress_u3', JSON.stringify(saved));

      const fk = 'inglesco_furthest_u3_l2';
      const prevF = parseInt(localStorage.getItem(fk) || '0', 10);
      if (prevF < 1) localStorage.setItem(fk, '1');
    } catch(e){}

    banner.classList.add('visible');
    compMsg.textContent = '¡Puntaje: ' + correctCount + ' de ' + TOTAL_POINTS + '! Continúa a la Parte 2.';
    nextBtn.classList.remove('hidden');
    nextBtn.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  /* ── REPLAY ── */
  replayBtn.addEventListener('click', () => {
    firstPlay = false;
    safePlay();
  });
  replayBtn.addEventListener('touchend', e => {
    e.preventDefault();
    firstPlay = false;
    safePlay();
  });

  /* ── INIT ── */
  updateScore();
  loadRound(0);
})();
</script>
</body>
</html>
