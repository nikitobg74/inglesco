<!-- u3/l3/p1.html  (Unidad 3 / Lección 3 / Parte 1) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 3 • Parte 1</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vercel Insights -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px 16px 40px;
      background: linear-gradient(135deg, #dbeafe 0%, #fef9c3 100%);
      color: #111827;
      margin: 0;
      min-height: 100vh;
    }

    .wrap { max-width: 600px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── Header ── */
    .top-title {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 6px;
      color: #1e3a8a;
    }
    .subline {
      text-align: center;
      margin: 0 0 14px;
    }
    .subline span {
      background: rgba(255,255,255,.75);
      padding: 5px 14px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 15px;
      display: inline-block;
    }

    /* ── Score bar ── */
    .score-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      margin-bottom: 14px;
    }
    .score-pill {
      background: rgba(255,255,255,.80);
      border-radius: 20px;
      padding: 5px 16px;
      font-weight: 800;
      font-size: 14px;
      color: #1e3a8a;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .score-pill .icon { font-size: 16px; }

    /* ── Progress dots ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 20px;
    }
    .step {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all .25s;
      color: #374151;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; box-shadow: 0 3px 10px rgba(37,99,235,.35); }
    .step:hover { transform: scale(1.1); }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Image ── */
    .img-wrap {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #f1f5f9;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      margin-bottom: 12px;
    }
    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      max-height: 280px;
    }

    /* ── Controls row ── */
    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .btn {
      border: 0;
      border-radius: 12px;
      padding: 10px 20px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 4px 12px rgba(0,0,0,.12);
      transition: transform .1s, background .15s;
    }
    .btn:active { transform: translateY(1px); }
    .btn-play { background: #2563eb; color: #fff; }
    .btn-play:hover { background: #1d4ed8; }
    .btn-play:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── Round label ── */
    .round-label {
      text-align: center;
      font-weight: 800;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 8px;
    }

    /* ── Script box ── */
    .script {
      background: rgba(255,255,255,.70);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 14px;
      line-height: 1.4;
    }
    .script .en {
      display: block;
      font-weight: 700;
      font-size: 15px;
      color: #1e3a8a;
      margin: 3px 0;
    }

    /* ── Q boxes ── */
    .qbox {
      background: rgba(255,255,255,.75);
      border-radius: 14px;
      padding: 12px;
      border: 2px solid transparent;
      margin-bottom: 12px;
      transition: border-color .2s;
    }
    .qtitle {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #1f2937;
    }
    .status {
      min-width: 32px;
      text-align: right;
      font-weight: 900;
      font-size: 20px;
    }
    .status.ok  { color: #16a34a; }
    .status.bad { color: #dc2626; }

    /* ── Options ── */
    .options { display: grid; gap: 9px; }
    .opt {
      width: 100%;
      text-align: left;
      border: 2px solid rgba(17,24,39,.12);
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      line-height: 1.3;
    }
    .opt:hover:not(:disabled) { border-color: rgba(37,99,235,.5); background: #eff6ff; }
    .opt.correct  { border-color: #16a34a; background: rgba(22,163,74,.10); }
    .opt.wrong    { border-color: #dc2626; background: rgba(220,38,38,.08); }
    .opt:disabled { cursor: not-allowed; }

    /* ── Feedback ── */
    .feedback {
      text-align: center;
      font-weight: 900;
      font-size: 18px;
      color: #16a34a;
      margin: 8px 0;
    }

    /* ── End screen ── */
    .end {
      text-align: center;
      padding: 10px 0 4px;
    }
    .end h2 {
      font-size: 22px;
      font-weight: 900;
      margin: 0 0 6px;
      color: #1e3a8a;
    }
    .end .final-score {
      font-size: 16px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 16px;
    }
    .next-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 4px 14px rgba(37,99,235,.3);
    }
    .next-btn:hover { background: #1d4ed8; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      body { padding: 12px 12px 36px; }
      .step { width: 34px; height: 34px; font-size: 14px; }
      .top-title { font-size: 16px; }
      .opt { font-size: 14px; padding: 11px 12px; }
      .img-wrap img { max-height: 220px; }
    }
  </style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

  <div class="top-title">Unidad 3 • Lección 3 • Parte 1</div>
  <div class="subline"><span><b>I am • We are • They are</b></span></div>

  <!-- Score bar -->
  <div class="score-bar">
    <div class="score-pill"><span class="icon">✅</span> <span id="scoreCorrect">0</span> correctas</div>
    <div class="score-pill"><span class="icon">❌</span> <span id="scoreWrong">0</span> errores</div>
  </div>

  <!-- Progress steps -->
  <div class="progress-container">
    <a class="step active" href="p1.html" aria-label="Parte 1">1</a>
    <a class="step" href="p2.html" aria-label="Parte 2">2</a>
    <a class="step" href="p3.html" aria-label="Parte 3">3</a>
    <a class="step" href="p4.html" aria-label="Parte 4">4</a>
  </div>

  <div class="card">

    <!-- Image -->
    <div class="img-wrap">
      <img id="sceneImg" src="" alt="Escena" />
    </div>

    <!-- Play button + round -->
    <div class="controls">
      <button id="replayBtn" class="btn btn-play" type="button">▶ Escuchar</button>
    </div>
    <div class="round-label" id="roundLabel">1 / 6</div>

    <!-- Script -->
    <div class="script" aria-live="polite">
      <span class="en" id="line1"></span>
      <span class="en" id="line2"></span>
    </div>

    <!-- Q A -->
    <div class="qbox" id="qABox">
      <div class="qtitle">
        <span id="qAText">A.</span>
        <span class="status" id="qAStatus"></span>
      </div>
      <div class="options" id="qAOptions"></div>
    </div>

    <!-- Q B -->
    <div class="qbox hidden" id="qBBox">
      <div class="qtitle">
        <span id="qBText">B.</span>
        <span class="status" id="qBStatus"></span>
      </div>
      <div class="options" id="qBOptions"></div>
    </div>

    <div class="feedback hidden" id="feedbackOk">¡Muy bien! ✅</div>

    <!-- End screen -->
    <div class="end hidden" id="endScreen">
      <h2>¡Excelente trabajo! 🎉</h2>
      <div class="final-score" id="finalScore"></div>
      <a class="next-btn" href="p2.html">Siguiente (P2) →</a>
    </div>

  </div><!-- /card -->
</div><!-- /wrap -->

<script>
(() => {
  "use strict";

  const SUPABASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE   = SUPABASE + "images/u3/";
  const AUDIO_BASE = SUPABASE + "audio/u3/";   // confirmed path in Supabase
  const SFX_CORRECT = SUPABASE + "sfx/correct.wav";
  const GAP_MS = 550;
  const PROGRESS_KEY   = "inglesco_progress_u3";
  const FURTHEST_KEY   = "inglesco_furthest_u3_l3";

  // ── Scenes ──────────────────────────────────────────────────────────────
  const SCENES = [
    {
      img: "u3.l3.p1.karen.jpg",
      q1: {
        text: "Where is Karen?",
        audio: "u3.l3.p1.karen.mp3",
        options: ["She is in the park.", "She is in the kitchen.", "She is in the bedroom."],
        correctIndex: 0
      },
      q2: {
        text: "What is she doing?",
        audio: "u3.l3.p1.shedoing.mp3",
        options: ["She is eating lunch.", "She is playing baseball.", "She is drinking milk."],
        correctIndex: 0
      }
    },
    {
      img: "u3.l3.p1.clark.jpg",
      q1: {
        text: "Where are Mr. and Mrs. Clark?",
        audio: "u3.l3.p1.clark.mp3",
        options: ["They are in the dining room.", "They are in the park.", "They are in the yard."],
        correctIndex: 0
      },
      q2: {
        text: "What are they doing?",
        audio: "u3.l3.p1.theydoing.mp3",
        options: ["They are eating dinner.", "They are playing cards.", "They are playing baseball."],
        correctIndex: 0
      }
    },
    {
      img: "u3.l3.p1.tom.jpg",
      q1: {
        text: "Where is Tom?",
        audio: "u3.l3.p1.tom.mp3",
        options: ["He is in the bedroom.", "He is in the cafeteria.", "He is in the park."],
        correctIndex: 0
      },
      q2: {
        text: "What is he doing?",
        audio: "u3.l3.p1.hedoing.mp3",
        options: ["He is playing the guitar.", "He is drinking milk.", "He is eating dinner."],
        correctIndex: 0
      }
    },
    {
      img: "u3.l3.p1.we.cards.jpg",
      q1: {
        text: "Where are you?",
        audio: "u3.l3.p1.where.you.mp3",
        options: ["We are in the living room.", "We are in the bedroom.", "We are in the yard."],
        correctIndex: 0
      },
      q2: {
        text: "What are you doing?",
        audio: "u3.l3.p1.you.doing.mp3",
        options: ["We are playing cards.", "We are eating lunch.", "We are drinking milk."],
        correctIndex: 0
      }
    },
    {
      img: "u3.l3.p1.gary.phil.jpg",
      q1: {
        text: "Where are Gary and Phil?",
        audio: "u3.l3.p1.gary.phil.mp3",
        options: ["They are in the yard.", "They are in the dining room.", "They are in the cafeteria."],
        correctIndex: 0
      },
      q2: {
        text: "What are they doing?",
        audio: "u3.l3.p1.theydoing.mp3",
        options: ["They are playing baseball.", "They are eating dinner.", "They are playing cards."],
        correctIndex: 0
      }
    },
    {
      img: "u3.l3.p1.nancy.jpg",
      q1: {
        text: "Where is Nancy?",
        audio: "u3.l3.p1.nancy.mp3",
        options: ["She is in the cafe.", "She is in the park.", "She is in the living room."],
        correctIndex: 0
      },
      q2: {
        text: "What is she doing?",
        audio: "u3.l3.p1.shedoing.mp3",
        options: ["She is drinking coffee.", "She is playing the guitar.", "She is eating lunch."],
        correctIndex: 0
      }
    }
  ];

  // ── DOM ──────────────────────────────────────────────────────────────────
  const sceneImg      = document.getElementById("sceneImg");
  const replayBtn     = document.getElementById("replayBtn");
  const roundLabel    = document.getElementById("roundLabel");
  const line1         = document.getElementById("line1");
  const line2         = document.getElementById("line2");
  const qABox         = document.getElementById("qABox");
  const qBBox         = document.getElementById("qBBox");
  const qAText        = document.getElementById("qAText");
  const qBText        = document.getElementById("qBText");
  const qAStatus      = document.getElementById("qAStatus");
  const qBStatus      = document.getElementById("qBStatus");
  const qAOptions     = document.getElementById("qAOptions");
  const qBOptions     = document.getElementById("qBOptions");
  const feedbackOk    = document.getElementById("feedbackOk");
  const endScreen     = document.getElementById("endScreen");
  const scoreCorrect  = document.getElementById("scoreCorrect");
  const scoreWrong    = document.getElementById("scoreWrong");
  const finalScore    = document.getElementById("finalScore");

  // ── State ────────────────────────────────────────────────────────────────
  const player   = new Audio();
  const sfxOk    = new Audio(SFX_CORRECT);
  player.preload = "auto";

  let idx        = 0;
  let phase      = "idle";
  let q1Map      = null;
  let q2Map      = null;
  let correctCount = 0;
  let wrongCount   = 0;
  // Track first-attempt correctness per scene to avoid double-counting score
  let q1FirstAttempt = true;
  let q2FirstAttempt = true;

  // ── Helpers ──────────────────────────────────────────────────────────────
  const sleep   = ms => new Promise(r => setTimeout(r, ms));
  const hide    = el => el.classList.add("hidden");
  const show    = el => el.classList.remove("hidden");

  function updateScoreUI() {
    scoreCorrect.textContent = correctCount;
    scoreWrong.textContent   = wrongCount;
  }

  function clearStatus() {
    qAStatus.textContent = "";
    qBStatus.textContent = "";
    qAStatus.className   = "status";
    qBStatus.className   = "status";
  }

  function disableOptions(container) {
    container.querySelectorAll("button.opt").forEach(b => b.disabled = true);
  }

  function resetOptionStyles(container) {
    container.querySelectorAll("button.opt").forEach(b => {
      b.disabled = false;
      b.classList.remove("correct","wrong");
    });
  }

  function fisherYates(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function buildMap(options, correctIndex) {
    const items = fisherYates(options.map((t, i) => ({ text: t, isCorrect: i === correctIndex })));
    return { items, locked: false };
  }

  function renderOptions(container, map, onPick) {
    container.innerHTML = "";
    map.items.forEach(it => {
      const btn = document.createElement("button");
      btn.type = "button";
      btn.className = "opt";
      btn.textContent = it.text;

      // iOS-safe tap handler
      let moved = false;
      btn.addEventListener("touchstart",  () => { moved = false; }, { passive: true });
      btn.addEventListener("touchmove",   () => { moved = true;  }, { passive: true });
      btn.addEventListener("touchend",    e  => { if (!moved) { e.preventDefault(); onPick(btn, it); } }, { passive: false });
      btn.addEventListener("click",       ()  => onPick(btn, it));

      container.appendChild(btn);
    });
  }

  async function playAudio(filename) {
    player.pause();
    player.currentTime = 0;
    player.src = AUDIO_BASE + filename;
    try { await player.play(); return true; } catch { return false; }
  }

  function playSfxCorrect() {
    sfxOk.currentTime = 0;
    sfxOk.play().catch(() => {});
  }

  // ── Progress tracking ────────────────────────────────────────────────────
  function saveProgress() {
    // Mark p1 as completed in unit progress
    try {
      const raw  = localStorage.getItem(PROGRESS_KEY);
      const data = raw ? JSON.parse(raw) : {};
      if (!data.l3) data.l3 = { partsCompleted: 0, partsTotal: 4 };
      if (data.l3.partsCompleted < 1) data.l3.partsCompleted = 1;
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));

      // furthest page tracker
      const cur = parseInt(localStorage.getItem(FURTHEST_KEY) || "0", 10);
      if (cur < 1) localStorage.setItem(FURTHEST_KEY, "1");
    } catch(e) {}
  }

  // ── Scene logic ──────────────────────────────────────────────────────────
  function startScene() {
    const scene = SCENES[idx];

    hide(endScreen);
    hide(feedbackOk);
    hide(qBBox);
    show(qABox);
    clearStatus();
    qAOptions.innerHTML = "";
    qBOptions.innerHTML = "";

    sceneImg.src          = IMG_BASE + scene.img;
    roundLabel.textContent = `${idx + 1} / ${SCENES.length}`;
    line1.textContent     = scene.q1.text;
    line2.textContent     = scene.q2.text;

    q1Map = buildMap(scene.q1.options, scene.q1.correctIndex);
    q2Map = buildMap(scene.q2.options, scene.q2.correctIndex);
    q1FirstAttempt = true;
    q2FirstAttempt = true;

    renderOptions(qAOptions, q1Map, onPickQ1);
    disableOptions(qAOptions);

    qAText.textContent = `A. ${scene.q1.text}`;
    qBText.textContent = `B. ${scene.q2.text}`;

    phase = "idle";
    replayBtn.disabled    = false;
    replayBtn.textContent = "▶ Escuchar";
  }

  async function playQ1ThenUnlock() {
    await playAudio(SCENES[idx].q1.audio);
    resetOptionStyles(qAOptions);
    phase = "q1_ready";
  }

  async function onPickQ1(btn, item) {
    if (phase !== "q1_ready" || q1Map.locked) return;
    q1Map.locked = true;

    if (item.isCorrect) {
      btn.classList.add("correct");
      qAStatus.textContent = "✓";
      qAStatus.className   = "status ok";
      disableOptions(qAOptions);
      playSfxCorrect();

      if (q1FirstAttempt) { correctCount++; updateScoreUI(); }

      show(feedbackOk);
      phase = "q1_done";
      await sleep(GAP_MS);
      hide(feedbackOk);

      show(qBBox);
      renderOptions(qBOptions, q2Map, onPickQ2);
      disableOptions(qBOptions);

      const ok2 = await playAudio(SCENES[idx].q2.audio);
      phase = ok2 ? "q2_ready" : "q2_wait_audio";
      if (ok2) resetOptionStyles(qBOptions);

    } else {
      btn.classList.add("wrong");
      qAStatus.textContent = "✗";
      qAStatus.className   = "status bad";
      if (q1FirstAttempt) { wrongCount++; updateScoreUI(); }
      q1FirstAttempt = false;
      q1Map.locked = false;
    }
  }

  async function onPickQ2(btn, item) {
    if (phase !== "q2_ready" || q2Map.locked) return;
    q2Map.locked = true;

    if (item.isCorrect) {
      btn.classList.add("correct");
      qBStatus.textContent = "✓";
      qBStatus.className   = "status ok";
      disableOptions(qBOptions);
      playSfxCorrect();

      if (q2FirstAttempt) { correctCount++; updateScoreUI(); }

      show(feedbackOk);
      phase = "q2_done";
      await sleep(GAP_MS);
      hide(feedbackOk);

      idx++;
      if (idx >= SCENES.length) {
        phase = "ended";
        replayBtn.disabled = true;
        saveProgress();
        finalScore.textContent =
          `Respuestas correctas: ${correctCount} / ${SCENES.length * 2}`;
        show(endScreen);
      } else {
        startScene();
      }

    } else {
      btn.classList.add("wrong");
      qBStatus.textContent = "✗";
      qBStatus.className   = "status bad";
      if (q2FirstAttempt) { wrongCount++; updateScoreUI(); }
      q2FirstAttempt = false;
      q2Map.locked = false;
    }
  }

  // ── Play button ──────────────────────────────────────────────────────────
  replayBtn.addEventListener("click", async () => {
    if (phase === "idle") {
      await playQ1ThenUnlock();

    } else if (phase === "q1_ready" || phase === "q1_done") {
      await playAudio(SCENES[idx].q1.audio);

    } else if (phase === "q2_wait_audio") {
      await playAudio(SCENES[idx].q2.audio);
      resetOptionStyles(qBOptions);
      phase = "q2_ready";

    } else if (phase === "q2_ready" || phase === "q2_done") {
      await playAudio(SCENES[idx].q2.audio);
    }
  });

  // ── Init ─────────────────────────────────────────────────────────────────
  startScene();
})();
</script>

</body>
</html>
