<!-- u3/l3/p4.html  (Unidad 3 / Lección 3 / Parte 4) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 3 • Parte 4</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      color:#111827;
      margin:0;
    }
    .wrap{ max-width: 820px; margin: 0 auto; }

    .back-btn{
      display:inline-block;
      margin-bottom:20px;
      padding:8px 15px;
      background:#2563eb;
      color:#fff;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
    }
    .back-btn:hover{ background:#1e40af; }

    .progress-container{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:15px 0 25px 0;
    }
    .step{
      width:40px; height:40px;
      border-radius:50%;
      background:#d1d5db;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      cursor:pointer;
      transition:all .3s;
      color:#1f2933;
      text-decoration:none;
      user-select:none;
    }
    .step.active{ background:#2563eb; color:#fff; }
    .step:hover{ transform:scale(1.1); }

    .top-title{
      text-align:center;
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 900;
    }
    .subline{
      text-align:center;
      margin: 0 0 18px 0;
      font-size: 16px;
      font-weight: 800;
    }
    .subline span{
      background: rgba(255,255,255,.7);
      padding: 6px 10px;
      border-radius: 10px;
      display:inline-block;
    }

    .card{
      background: rgba(255,255,255,.85);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    .row{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
      align-items:start;
    }

    .media{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
      justify-items:center;
    }

    .img-box{
      width: 100%;
      max-width: 520px;
      border-radius: 16px;
      overflow:hidden;
      background:#fff;
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
    }
    .img-box img{ width:100%; height:auto; display:block; }

    .controls{
      display:flex;
      justify-content:center;
      width:100%;
      margin-top: 6px;
    }
    .btn{
      width:100%;
      max-width: 520px;
      border:0;
      border-radius: 12px;
      padding: 10px 14px;
      font-weight: 1000;
      cursor:pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,.10);
      background:#2563eb;
      color:#fff;
      font-size: 15px;
    }
    .btn:hover{ background:#1e40af; }
    .btn:disabled{ opacity:.7; cursor:not-allowed; }

    .round{
      text-align:center;
      font-weight: 900;
      margin-top: 6px;
      opacity: .85;
    }

    .script{
      max-width: 520px;
      width:100%;
      background: rgba(255,255,255,.7);
      border-radius: 14px;
      padding: 10px 12px;
      line-height: 1.25;
      font-weight: 900;
    }
    .script .line{ display:block; margin: 6px 0; }

    .qbox{
      background: rgba(255,255,255,.75);
      border-radius: 14px;
      padding: 12px;
      margin-top: 10px;
    }
    .qtitle{
      font-weight: 1000;
      margin-bottom: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }
    .status{
      min-width: 34px;
      text-align:right;
      font-weight: 1000;
      font-size: 18px;
    }
    .status.ok{ color:#16a34a; }
    .status.bad{ color:#dc2626; }

    .prompt{
      font-weight: 1000;
      font-size: 18px;
      margin: 6px 0 10px 0;
      line-height: 1.2;
    }

    .verb-wrap{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }
    .verb-input{
      flex: 0 0 auto;
      width: 160px;
      border: 3px solid rgba(17,24,39,.18);
      border-radius: 12px;
      padding: 10px 12px;
      font-weight: 1000;
      font-size: 16px;
      outline:none;
      background:#fff;
      text-transform: lowercase;
    }
    .verb-input:focus{ border-color: rgba(37,99,235,.65); }

    .verb-input.ok{
      border-color:#16a34a;
      background: rgba(22,163,74,.12);
    }
    .verb-input.bad{
      border-color:#dc2626;
      background: rgba(220,38,38,.10);
    }
    .hint{
      margin-top: 10px;
      text-align:center;
      font-weight: 900;
      opacity:.92;
    }
    .hint .blur{
      filter: blur(6px);
      user-select:none;
      padding: 0 6px;
      border-radius: 8px;
      background: rgba(17,24,39,.06);
      display:inline-block;
    }
    .hint .reveal{ filter:none !important; }

    .hidden{ display:none !important; }

    .end{
      text-align:center;
      padding: 12px 10px 2px;
      margin-top: 14px;
      background: rgba(255,255,255,.7);
      border-radius: 14px;
    }
    .end h2{
      margin: 8px 0 8px 0;
      font-size: 24px;
      font-weight: 1000;
    }

    @media (max-width:520px){
      .step{ width:34px; height:34px; font-size:14px; }
      .top-title{ font-size: 18px; }
      .subline{ font-size: 15px; }
      .prompt{ font-size: 17px; }
      .verb-input{ width: 100%; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 3 • Parte 4</div>
    <div class="subline"><span><b>Final Quiz: Type the verb ✅</b></span></div>

    <div class="progress-container">
      <a class="step" href="p1.html" aria-label="Parte 1">1</a>
      <a class="step" href="p2.html" aria-label="Parte 2">2</a>
      <a class="step" href="p3.html" aria-label="Parte 3">3</a>
      <a class="step active" href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">
      <div class="media">
        <div class="img-box">
          <img id="sceneImg" src="" alt="Escena" />
        </div>

        <div class="controls">
          <button id="playBtn" class="btn" type="button">▶ Play audio</button>
        </div>

        <div class="round" id="roundLabel">1 / 6</div>

        

      <div class="qbox" id="quizBox">
        <div class="qtitle">
          <span id="qTitle">Write the missing verb</span>
          <span class="status" id="status"></span>
        </div>

        <div class="prompt" id="prompt">
          She is <span class="verb-wrap"><input id="verbInput" class="verb-input" type="text" autocomplete="off" autocapitalize="none" spellcheck="false" placeholder="type…" /></span> lunch.
        </div>

        <div class="hint" id="hintBox">
          Hint: <span class="blur" id="hintWord">eating</span>
        </div>
      </div>

      <div class="end hidden" id="endScreen">
        <h2>¡Great job! 🎉</h2>
        <p style="margin:0; font-weight:1000;">¡Terminaste la Lección 3! ✅</p>
      </div>
    </div>

    <div class="footer-actions">
      <a id="nextBtn" class="next-btn hidden" href="../index.html">Continuar → Unidad 3</a>
    </div>
  </div>

    <script src="../../../../js/u3/u3_l3_p4.js"></script>
  </div>
</body>
</html>
