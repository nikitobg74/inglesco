<!-- u3/l3/p4.html  (Unidad 3 / Leccion 3 / Parte 4) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 - Leccion 3 - Parte 4</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px 16px 40px;
      background: linear-gradient(135deg, #dbeafe 0%, #fef9c3 100%);
      color: #111827;
      margin: 0;
      min-height: 100vh;
    }
    .wrap { max-width: 600px; margin: 0 auto; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    .top-title {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 6px;
      color: #1e3a8a;
    }
    .subline { text-align: center; margin: 0 0 14px; }
    .subline span {
      background: rgba(255,255,255,.75);
      padding: 5px 14px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 15px;
      display: inline-block;
    }

    .score-bar {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 14px;
    }
    .score-pill {
      background: rgba(255,255,255,.80);
      border-radius: 20px;
      padding: 5px 16px;
      font-weight: 800;
      font-size: 14px;
      color: #1e3a8a;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 20px;
    }
    .step {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
      cursor: pointer;
      transition: all .25s;
      color: #374151;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; box-shadow: 0 3px 10px rgba(37,99,235,.35); }
    .step:hover  { transform: scale(1.1); }

    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    .img-wrap {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #f1f5f9;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      margin-bottom: 12px;
    }
    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      max-height: 220px;
    }

    .controls {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }
    .btn-play {
      border: 0;
      border-radius: 12px;
      padding: 10px 24px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      box-shadow: 0 4px 12px rgba(37,99,235,.25);
      transition: background .15s, transform .1s;
      width: 100%;
      max-width: 340px;
    }
    .btn-play:hover    { background: #1d4ed8; }
    .btn-play:active   { transform: translateY(1px); }
    .btn-play:disabled { background: #93c5fd; cursor: not-allowed; }

    .round-label {
      text-align: center;
      font-weight: 800;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .qbox {
      background: rgba(255,255,255,.75);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 12px;
    }
    .qtitle {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #1f2937;
    }
    .status { min-width: 32px; text-align: right; font-weight: 900; font-size: 20px; }
    .status.ok  { color: #16a34a; }
    .status.bad { color: #dc2626; }

    /* Sentence with inline input */
    .prompt {
      font-weight: 800;
      font-size: 18px;
      line-height: 2.2;
      color: #111827;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px;
      margin-bottom: 14px;
    }

    .verb-input {
      width: 148px;
      border: 3px solid rgba(17,24,39,.18);
      border-radius: 12px;
      padding: 8px 12px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 800;
      font-size: 16px;
      outline: none;
      background: #fff;
      text-transform: lowercase;
      transition: border-color .15s, background .15s;
      -webkit-appearance: none;
    }
    .verb-input:focus   { border-color: #2563eb; }
    .verb-input.ok      { border-color: #16a34a; background: rgba(22,163,74,.10); color: #15803d; }
    .verb-input.bad     { border-color: #dc2626; background: rgba(220,38,38,.08); }
    .verb-input:disabled { opacity: .85; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20%     { transform: translateX(-7px); }
      40%     { transform: translateX(7px); }
      60%     { transform: translateX(-4px); }
      80%     { transform: translateX(4px); }
    }
    .shake { animation: shake .38s ease; }

    /* Check row */
    .check-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .btn-check {
      border: 0;
      border-radius: 12px;
      padding: 10px 22px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      background: #16a34a;
      color: #fff;
      box-shadow: 0 4px 12px rgba(22,163,74,.25);
      transition: background .15s, transform .1s;
      flex-shrink: 0;
    }
    .btn-check:hover   { background: #15803d; }
    .btn-check:active  { transform: translateY(1px); }
    .btn-check:disabled {
      background: #d1d5db;
      color: #9ca3af;
      cursor: not-allowed;
      box-shadow: none;
    }

    .correct-reveal {
      font-weight: 700;
      font-size: 15px;
      color: #374151;
      background: rgba(220,38,38,.07);
      border-radius: 10px;
      padding: 8px 14px;
      border: 2px solid rgba(220,38,38,.20);
      line-height: 1.4;
    }
    .correct-reveal b { color: #16a34a; font-weight: 900; }

    .end {
      text-align: center;
      padding: 14px 0 6px;
    }
    .end h2 { font-size: 22px; font-weight: 900; margin: 0 0 6px; color: #1e3a8a; }
    .end .final-score { font-size: 16px; font-weight: 700; color: #374151; margin-bottom: 16px; }
    .next-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 4px 14px rgba(37,99,235,.3);
    }
    .next-btn:hover { background: #1d4ed8; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      body { padding: 12px 12px 36px; }
      .step { width: 34px; height: 34px; font-size: 14px; }
      .top-title { font-size: 16px; }
      .prompt { font-size: 16px; }
      .verb-input { width: 130px; font-size: 15px; }
      .img-wrap img { max-height: 180px; }
    }
  </style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">&larr; Volver a Unidad 3</a>

  <div class="top-title">Unidad 3 &bull; Leccion 3 &bull; Parte 4</div>
  <div class="subline"><span><b>Escribe el verbo &#x270D;</b></span></div>

  <div class="score-bar">
    <div class="score-pill">&#9989; <span id="scoreCorrect">0</span> correctas</div>
    <div class="score-pill">&#10060; <span id="scoreWrong">0</span> errores</div>
  </div>

  <div class="progress-container">
    <a class="step" href="p1.html" aria-label="Parte 1">1</a>
    <a class="step" href="p2.html" aria-label="Parte 2">2</a>
    <a class="step" href="p3.html" aria-label="Parte 3">3</a>
    <a class="step active" href="p4.html" aria-label="Parte 4">4</a>
  </div>

  <div class="card">

    <div class="img-wrap">
      <img id="sceneImg" src="" alt="Escena" />
    </div>

    <div class="controls">
      <button id="playBtn" class="btn-play" type="button">&#9654; Escuchar</button>
    </div>

    <div class="round-label" id="roundLabel">1 / 6</div>

    <div class="qbox">
      <div class="qtitle">
        <span>Escribe el verbo que falta</span>
        <span class="status" id="statusEl"></span>
      </div>

      <div class="prompt" id="promptEl"></div>

      <div class="check-row">
        <button id="checkBtn" class="btn-check" type="button" disabled>Verificar &#10003;</button>
        <div class="correct-reveal hidden" id="correctReveal"></div>
      </div>
    </div>

    <div class="end hidden" id="endScreen">
      <h2>&#127881; Excelente trabajo!</h2>
      <div class="final-score" id="finalScore"></div>
      <a class="next-btn" href="../index.html">Continuar &rarr; Unidad 3</a>
    </div>

  </div>
</div>

<script>
(() => {
  "use strict";

  const SUPABASE     = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE     = SUPABASE + "images/u3/";
  const AUDIO_BASE   = SUPABASE + "audio/u3/";
  const SFX_CORRECT  = SUPABASE + "sfx/correct.wav";
  const NEXT_DELAY   = 1400;
  const PROGRESS_KEY = "inglesco_progress_u3";
  const FURTHEST_KEY = "inglesco_furthest_u3_l3";

  const SCENES = [
    { img:"u3.l3.p1.karen.jpg",     audio:"u3.l3.p4.karen.mp3",     subject:"She is",   object:"lunch",      verb:"eating"   },
    { img:"u3.l3.p1.tom.jpg",       audio:"u3.l3.p4.tom.mp3",       subject:"He is",    object:"the guitar", verb:"playing"  },
    { img:"u3.l3.p1.we.cards.jpg",  audio:"u3.l3.p4.we.cards.mp3",  subject:"We are",   object:"cards",      verb:"playing"  },
    { img:"u3.l3.p1.gary.phil.jpg", audio:"u3.l3.p4.gary.phil.mp3", subject:"They are", object:"baseball",   verb:"playing"  },
    { img:"u3.l3.p1.nancy.jpg",     audio:"u3.l3.p4.nancy.mp3",     subject:"She is",   object:"coffee",     verb:"drinking" },
    { img:"u3.l3.p1.clark.jpg",     audio:"u3.l3.p4.clark.mp3",     subject:"They are", object:"dinner",     verb:"eating"   }
  ];

  // DOM
  const sceneImg      = document.getElementById("sceneImg");
  const playBtn       = document.getElementById("playBtn");
  const roundLabel    = document.getElementById("roundLabel");
  const promptEl      = document.getElementById("promptEl");
  const statusEl      = document.getElementById("statusEl");
  const checkBtn      = document.getElementById("checkBtn");
  const correctReveal = document.getElementById("correctReveal");
  const endScreen     = document.getElementById("endScreen");
  const scoreCorrect  = document.getElementById("scoreCorrect");
  const scoreWrong    = document.getElementById("scoreWrong");
  const finalScore    = document.getElementById("finalScore");

  let verbInput     = null;

  // State
  const player = new Audio();
  const sfxOk  = new Audio(SFX_CORRECT);
  player.preload = "auto";

  let idx           = 0;
  let locked        = false;
  let audioUnlocked = false;
  let firstAttempt  = true;
  let correctCount  = 0;
  let wrongCount    = 0;

  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const hide  = el => el.classList.add("hidden");
  const show  = el => el.classList.remove("hidden");

  function normalize(s) {
    return (s || "").toLowerCase().trim().replace(/[.?!\s]+/g, "");
  }

  function updateScoreUI() {
    scoreCorrect.textContent = correctCount;
    scoreWrong.textContent   = wrongCount;
  }

  function clearStatus() {
    statusEl.textContent = "";
    statusEl.className   = "status";
  }

  function setStatus(ok) {
    statusEl.textContent = ok ? "\u2713" : "\u2717";
    statusEl.className   = "status " + (ok ? "ok" : "bad");
  }

  async function playAudio(filename) {
    player.pause();
    player.currentTime = 0;
    player.src = AUDIO_BASE + filename;
    try { await player.play(); return true; } catch(e) { return false; }
  }

  function playSfxCorrect() {
    sfxOk.currentTime = 0;
    sfxOk.play().catch(function(){});
  }

  function saveProgress() {
    try {
      var raw  = localStorage.getItem(PROGRESS_KEY);
      var data = raw ? JSON.parse(raw) : {};
      if (!data.l3) data.l3 = { partsCompleted: 0, partsTotal: 4 };
      data.l3.partsCompleted = 4;
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));
      localStorage.setItem(FURTHEST_KEY, "4");
    } catch(e) {}
  }

  // ── Render scene ──────────────────────────────────────────────────────────
  function renderScene() {
    var s = SCENES[idx];

    hide(endScreen);
    hide(correctReveal);
    clearStatus();

    locked       = false;
    firstAttempt = true;

    sceneImg.src           = IMG_BASE + s.img;
    roundLabel.textContent = (idx + 1) + " / " + SCENES.length;

    // Build inline prompt
    promptEl.innerHTML = "";
    promptEl.appendChild(document.createTextNode(s.subject + "\u00A0"));

    verbInput = document.createElement("input");
    verbInput.type           = "text";
    verbInput.className      = "verb-input";
    verbInput.autocomplete   = "off";
    verbInput.autocapitalize = "none";
    verbInput.spellcheck     = false;
    verbInput.setAttribute("autocorrect", "off");
    verbInput.placeholder    = "escribe...";
    verbInput.disabled       = true;

    verbInput.addEventListener("input", function() {
      if (locked) return;
      // As soon as user edits, clear wrong state — fresh start
      verbInput.classList.remove("bad", "shake");
      clearStatus();
      hide(correctReveal);
      checkBtn.disabled = verbInput.value.trim().length === 0;
    });

    verbInput.addEventListener("keydown", function(e) {
      if (e.key === "Enter" && !checkBtn.disabled && !locked) {
        e.preventDefault();
        handleCheck();
      }
    });

    promptEl.appendChild(verbInput);
    promptEl.appendChild(document.createTextNode("\u00A0" + s.object + "."));

    checkBtn.disabled   = true;
    playBtn.disabled    = false;
    playBtn.textContent = "\u25B6 Escuchar";

    if (audioUnlocked) {
      playAudio(s.audio).then(function() {
        verbInput.disabled  = false;
        verbInput.value     = "";
        verbInput.focus();
        playBtn.textContent = "\u25B6 Repetir";
      });
    }
  }

  // ── Handle check ─────────────────────────────────────────────────────────
  async function handleCheck() {
    if (locked) return;

    var s      = SCENES[idx];
    var typed  = normalize(verbInput.value);
    var target = normalize(s.verb);

    if (typed.length === 0) return;

    // Correct
    if (typed === target) {
      locked = true;
      verbInput.classList.remove("bad", "shake");
      verbInput.classList.add("ok");
      verbInput.disabled = true;
      checkBtn.disabled  = true;
      hide(correctReveal);
      setStatus(true);
      playSfxCorrect();

      if (firstAttempt) { correctCount++; updateScoreUI(); }

      await sleep(NEXT_DELAY);

      idx++;
      if (idx >= SCENES.length) {
        playBtn.disabled = true;
        saveProgress();
        finalScore.textContent = "Respuestas correctas: " + correctCount + " / " + SCENES.length;
        show(endScreen);
        return;
      }

      renderScene();

    // Wrong
    } else {
      verbInput.classList.remove("ok", "shake");
      void verbInput.offsetWidth; // restart animation
      verbInput.classList.add("bad", "shake");
      setStatus(false);

      if (firstAttempt) { wrongCount++; updateScoreUI(); firstAttempt = false; }

      // Show correct spelling — stays until next scene
      correctReveal.innerHTML = "Se escribe: <b>" + s.verb + "</b>";
      show(correctReveal);
      // Input stays active — student can keep trying if they want
    }
  }

  // Check button
  checkBtn.addEventListener("click", handleCheck);

  // iOS tap
  var moved = false;
  checkBtn.addEventListener("touchstart", function() { moved = false; }, { passive: true });
  checkBtn.addEventListener("touchmove",  function() { moved = true;  }, { passive: true });
  checkBtn.addEventListener("touchend",   function(e) {
    if (!moved) { e.preventDefault(); handleCheck(); }
  }, { passive: false });

  // Play button
  playBtn.addEventListener("click", async function() {
    if (idx >= SCENES.length) return;
    audioUnlocked = true;
    await playAudio(SCENES[idx].audio);
    verbInput.disabled  = false;
    verbInput.focus();
    checkBtn.disabled   = verbInput.value.trim().length === 0;
    playBtn.textContent = "\u25B6 Repetir";
  });

  renderScene();
})();
</script>

</body>
</html>
