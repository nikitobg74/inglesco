<!-- u3/l4/p2.html (Mobile-first) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 4 • Parte 2</title>

  <style>
    body{
      font-family: Arial, sans-serif;
      padding: 20px;
      margin:0;
      color:#111827;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
    }
    .wrap{ max-width: 820px; margin: 0 auto; }

    /* ===== BACK BUTTON ===== */
    .back-btn{
      display:inline-block;
      margin-bottom:20px;
      padding:8px 15px;
      background:#2563eb;
      color:#fff;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
    }
    .back-btn:hover{ background:#1e40af; }

    /* ===== PROGRESS BAR ===== */
    .progress-container{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:15px 0 25px 0;
    }
    .step{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#d1d5db;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      cursor:pointer;
      transition:all .3s;
      color:#1f2933;
      text-decoration:none;
      user-select:none;
    }
    .step.active{ background:#2563eb; color:#fff; }
    .step:hover{ transform:scale(1.1); }

    /* ===== NEXT BUTTON ===== */
    .footer-actions{
      display:flex;
      justify-content:center;
      margin-top:25px;
    }
    .next-btn{
      display:inline-block;
      padding:10px 18px;
      background:#2563eb;
      color:#fff;
      text-decoration:none;
      border-radius:12px;
      font-weight:800;
    }
    .next-btn:hover{ background:#1e40af; }
    .hidden{ display:none !important; }

    /* ===== HEADER ===== */
    .top-title{
      text-align:center;
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 900;
    }
    .subline{
      text-align:center;
      margin: 0 0 18px 0;
      font-size: 16px;
      font-weight: 800;
    }
    .subline span{
      background: rgba(255,255,255,.7);
      padding: 6px 10px;
      border-radius: 10px;
      display:inline-block;
    }

    /* ===== CARD ===== */
    .card{
      background: rgba(255,255,255,.85);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }
    .row{
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    /* ===== MEDIA ===== */
    .media{
      display:grid;
      grid-template-columns: 1fr;
      gap: 10px;
      justify-items:center;
    }
    .img-box{
      width: 100%;
      max-width: 520px;
      border-radius: 16px;
      overflow:hidden;
      background:#fff;
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
    }
   .img-box img{
  width:100%;
  max-height:220px;
  object-fit:contain;
  display:block;
}

    .round{
      text-align:center;
      font-weight: 900;
      margin-top: 6px;
      opacity: .85;
    }

    /* ===== QUESTION ===== */
    .qa{
      display:grid;
      gap: 12px;
      margin-top: 10px;
    }
    .qbox{
      background: rgba(255,255,255,.75);
      border-radius: 14px;
      padding: 12px;
      border: 2px solid transparent;
      max-width: 520px;
      width: 100%;
      margin: 0 auto;
    }
    .qtitle{
      font-weight: 900;
      margin-bottom: 10px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      line-height: 1.2;
    }
    .status{
      min-width: 34px;
      text-align:right;
      font-weight: 900;
      font-size: 18px;
    }
    .status.ok{ color:#16a34a; }
    .status.bad{ color:#dc2626; }

    .options{ display:grid; gap: 10px; }
    .opt{
      width:100%;
      text-align:left;
      border: 2px solid rgba(17,24,39,.12);
      background:#fff;
      border-radius: 14px;
      padding: 12px 12px;
      font-weight: 900;
      cursor:pointer;
      font-size: 16px;
    }
    .opt:hover{ border-color: rgba(37,99,235,.55); }
    .opt.correct{
      border-color:#16a34a;
      background: rgba(22,163,74,.12);
    }
    .opt.wrong{
      border-color:#dc2626;
      background: rgba(220,38,38,.10);
    }
    .opt:disabled{ cursor:not-allowed; opacity:.95; }

    .feedback{
      text-align:center;
      margin-top: 10px;
      font-weight: 1000;
      font-size: 18px;
      color:#16a34a;
    }

    /* ===== END ===== */
    .end{
      text-align:center;
      padding: 12px 10px 2px;
    }
    .end h2{
      margin: 8px 0 8px 0;
      font-size: 24px;
      font-weight: 1000;
    }

    /* ===== MOBILE SAFE ===== */
    @media (max-width:520px){
      .step{ width:34px; height:34px; font-size:14px; }
      .top-title{ font-size: 18px; }
      .subline{ font-size: 15px; }
      .opt{ font-size: 15px; padding: 12px 10px; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 4 • Parte 2</div>
    <div class="subline"><span><b>Elige</b> la oración correcta</span></div>

    <div class="progress-container">
      <a class="step" href="p1.html" aria-label="Parte 1">1</a>
      <a class="step active" href="p2.html" aria-label="Parte 2">2</a>
      <a class="step" href="p3.html" aria-label="Parte 3">3</a>
      <a class="step" href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">
      <div class="row">
        <div class="media">
          <div class="img-box">
            <img id="sceneImg" src="" alt="Scene" />
          </div>
          <div class="round" id="roundLabel">1 / 10</div>
        </div>

        <div class="qa">
          <div class="qbox" id="qBox">
            <div class="qtitle">
              <span id="qText">What is Tom doing?</span>
              <span class="status" id="qStatus" aria-label="Status"></span>
            </div>
            <div class="options" id="qOptions"></div>

            <div class="feedback hidden" id="feedbackOk" data-text="Correct!">Correct!</div>
          </div>
        </div>
      </div>

      <div class="end hidden" id="endScreen">
        <h2>¡Buen trabajo!</h2>
        <p style="margin:0 0 14px 0; font-weight:900;">Continue to Part 3.</p>
        <div class="footer-actions">
          <a class="next-btn" href="p3.html">Next (Part 3) →</a>
        </div>
      </div>
    </div>
  </div>

  <script src="../../../../js/u3/u3_l4_p2.js"></script>
</body>
</html>
