<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 4 • Parte 3</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vercel Insights -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe 0%, #fef9c3 100%);
      min-height: 100vh;
    }

    .wrap { max-width: 640px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── Header ── */
    .top-title {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 6px;
    }
    .topic-badge {
      text-align: center;
      margin: 0 0 6px;
    }
    .topic-badge span {
      background: rgba(255,255,255,.75);
      padding: 5px 14px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 14px;
      display: inline-block;
    }
    .subline {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin: 0 0 14px;
    }

    /* ── Score bar ── */
    .score-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      margin-bottom: 14px;
    }
    .score-pill {
      background: rgba(255,255,255,.8);
      border-radius: 20px;
      padding: 5px 16px;
      font-weight: 800;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .score-pill .icon { font-size: 16px; }
    .score-pill.green { color: #16a34a; }
    .score-pill.blue  { color: #2563eb; }

    /* ── Step dots ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 18px;
    }
    .step {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all .25s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Image ── */
    .img-wrap {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #f1f5f9;
      margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.07);
    }
    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      max-height: 240px;
    }

    /* ── Round label ── */
    .round-label {
      text-align: center;
      font-weight: 800;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    /* ── Progress track ── */
    .progress-track {
      background: #e5e7eb;
      border-radius: 99px;
      height: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 99px;
      transition: width .35s ease;
      width: 0%;
    }

    /* ── Exercise ── */
    .exercise { display: grid; gap: 14px; }
    .exercise.hidden { display: none !important; }

    /* ── Sentence card ── */
    .sentence-card {
      background: rgba(241,245,249,.9);
      border-radius: 16px;
      padding: 16px 14px;
      text-align: center;
    }
    .instruction {
      font-weight: 700;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .sentence {
      font-size: 22px;
      font-weight: 900;
      line-height: 1.6;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .blank {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 90px;
      min-height: 44px;
      padding: 0 12px;
      border-radius: 12px;
      border: 2px dashed #9ca3af;
      background: #fff;
      font-size: 18px;
      font-weight: 900;
      color: #9ca3af;
      transition: border-color .2s, background .2s, color .2s;
    }
    .blank.filled {
      border-style: solid;
      border-color: #2563eb;
      background: #eff6ff;
      color: #1d4ed8;
    }
    .blank.correct {
      border-color: #16a34a;
      background: rgba(22,163,74,.12);
      color: #166534;
    }

    /* ── Tile groups ── */
    .tile-group {
      display: grid;
      gap: 10px;
    }
    .tile-group.hidden { display: none !important; }

    .group-label {
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: .05em;
    }

    .tiles {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    .tile {
      border: 0;
      border-radius: 12px;
      padding: 11px 20px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      box-shadow: 0 4px 10px rgba(37,99,235,.25);
      transition: background .15s, transform .1s;
      -webkit-tap-highlight-color: transparent;
    }
    .tile:hover   { background: #1e40af; }
    .tile:active  { transform: translateY(1px); }
    .tile:disabled { opacity: .65; cursor: not-allowed; }
    .tile.correct  { background: #16a34a !important; box-shadow: 0 4px 10px rgba(22,163,74,.3); }
    .tile.wrong    { background: #dc2626 !important; box-shadow: 0 4px 10px rgba(220,38,38,.3); }

    /* ── Status line ── */
    .status-line {
      text-align: center;
      min-height: 28px;
      font-weight: 900;
      font-size: 20px;
    }
    .status-line.ok  { color: #16a34a; }
    .status-line.bad { color: #dc2626; }

    /* ── End screen ── */
    .end-screen {
      text-align: center;
      padding: 10px 0 4px;
    }
    .end-screen.hidden { display: none !important; }
    .end-screen h2 {
      font-size: 24px;
      font-weight: 900;
      margin: 8px 0 6px;
    }
    .end-score {
      font-size: 15px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 16px;
    }
    .next-btn {
      display: inline-block;
      padding: 12px 28px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 900;
      font-size: 16px;
      box-shadow: 0 6px 14px rgba(37,99,235,.25);
    }
    .next-btn:hover { background: #1e40af; }

    .hidden { display: none !important; }

    @media (max-width: 420px) {
      body { padding: 12px; }
      .top-title { font-size: 16px; }
      .step { width: 34px; height: 34px; font-size: 13px; }
      .sentence { font-size: 19px; }
      .blank { min-width: 76px; min-height: 40px; font-size: 16px; }
      .tile { font-size: 14px; padding: 10px 16px; }
      .img-wrap img { max-height: 190px; }
    }
  </style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

  <div class="top-title">Unidad 3 • Lección 4 • Parte 3</div>
  <div class="topic-badge"><span>Completa la oración</span></div>
  <div class="subline">Mira la imagen y elige las palabras correctas.</div>

  <!-- Score bar -->
  <div class="score-bar">
    <div class="score-pill green"><span class="icon">✓</span><span id="scoreCorrect">0</span> correctas</div>
    <div class="score-pill blue"><span class="icon">📝</span><span id="scoreTotal">0 / 22</span></div>
  </div>

  <!-- Part step dots -->
  <div class="progress-container">
    <a class="step"        href="p1.html" aria-label="Parte 1">1</a>
    <a class="step"        href="p2.html" aria-label="Parte 2">2</a>
    <a class="step active" href="p3.html" aria-label="Parte 3">3</a>
    <a class="step"        href="p4.html" aria-label="Parte 4">4</a>
  </div>

  <!-- Main card -->
  <div class="card">

    <!-- Image -->
    <div class="img-wrap">
      <img id="sceneImg" src="" alt="Scene" />
    </div>

    <!-- Round label -->
    <div class="round-label" id="roundLabel">1 / 11</div>

    <!-- Progress track -->
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>

    <!-- Exercise -->
    <div class="exercise" id="exerciseBox">

      <!-- Sentence with blanks -->
      <div class="sentence-card">
        <div class="instruction">Completa la frase</div>
        <div class="sentence">
          <span id="part1"></span>
          <span class="blank" id="blank1">___</span>
          <span class="blank" id="blank2">___</span>
          <span id="part2"></span>
        </div>
      </div>

      <!-- Step 1: is / are -->
      <div class="tile-group" id="group1Wrap">
        <div class="group-label">Elige: is / are</div>
        <div class="tiles" id="tiles1"></div>
      </div>

      <!-- Step 2: verb -->
      <div class="tile-group hidden" id="group2Wrap">
        <div class="group-label">Elige el verbo</div>
        <div class="tiles" id="tiles2"></div>
      </div>

      <!-- Status -->
      <div class="status-line" id="statusLine" aria-live="polite"></div>

    </div><!-- /exercise -->

    <!-- End screen -->
    <div class="end-screen hidden" id="endScreen">
      <h2>¡Excelente! 🎉</h2>
      <div class="end-score" id="endScore"></div>
      <a class="next-btn" href="p4.html">Siguiente → Parte 4</a>
    </div>

  </div><!-- /card -->
</div><!-- /wrap -->

<script>
(() => {
  "use strict";

  const SUPABASE    = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE    = SUPABASE + "images/u3/";
  const AUDIO_BASE  = SUPABASE + "audio/u3/";

  // ── DOM ──
  const sceneImg     = document.getElementById("sceneImg");
  const roundLabel   = document.getElementById("roundLabel");
  const progressFill = document.getElementById("progressFill");
  const exerciseBox  = document.getElementById("exerciseBox");
  const endScreen    = document.getElementById("endScreen");
  const endScore     = document.getElementById("endScore");

  const part1    = document.getElementById("part1");
  const part2    = document.getElementById("part2");
  const blank1   = document.getElementById("blank1");
  const blank2   = document.getElementById("blank2");

  const group1Wrap = document.getElementById("group1Wrap");
  const group2Wrap = document.getElementById("group2Wrap");
  const tiles1     = document.getElementById("tiles1");
  const tiles2     = document.getElementById("tiles2");
  const statusLine = document.getElementById("statusLine");

  const scoreCorrectEl = document.getElementById("scoreCorrect");
  const scoreTotalEl   = document.getElementById("scoreTotal");

  // ── DATA ──
  const ROUNDS = [
    {
      img: "u3.l4.p3.breakfast.jpg",
      audio: "u3.l4.p3.breakfast.mp3",
      subject: "He",
      beAnswer: "is",
      verbAnswer: "eating",
      verbOptions: ["eating", "drinking", "reading"],
      tail: " breakfast."
    },
    {
      img: "u3.l4.p3.milk.jpg",
      audio: "u3.l4.p3.milk.mp3",
      subject: "She",
      beAnswer: "is",
      verbAnswer: "drinking",
      verbOptions: ["drinking", "eating", "sleeping"],
      tail: " milk."
    },
    {
      img: "u3.l4.p3.math.jpg",
      audio: "u3.l4.p3.math.mp3",
      subject: "They",
      beAnswer: "are",
      verbAnswer: "studying",
      verbOptions: ["studying", "watching", "playing"],
      tail: " mathematics."
    },
    {
      img: "u3.l4.p3.texto.jpg",
      audio: "u3.l4.p3.text.mp3",
      subject: "He",
      beAnswer: "is",
      verbAnswer: "reading",
      verbOptions: ["reading", "drinking", "singing"],
      tail: " a text."
    },
    {
      img: "u3.l4.p3.sleeping.jpg",
      audio: "u3.l4.p3.sleeping.mp3",
      subject: "They",
      beAnswer: "are",
      verbAnswer: "sleeping",
      verbOptions: ["sleeping", "cooking", "playing"],
      tail: "."
    },
    {
      img: "u3.l4.p3.teaching.jpg",
      audio: "u3.l4.p3.teaching.mp3",
      subject: "She",
      beAnswer: "is",
      verbAnswer: "teaching",
      verbOptions: ["teaching", "reading", "drinking"],
      tail: "."
    },
    {
      img: "u3.l4.p3.listening.jpg",
      audio: "u3.l4.p3.listening.mp3",
      subject: "He",
      beAnswer: "is",
      verbAnswer: "listening",
      verbOptions: ["listening", "watching", "singing"],
      tail: " to music."
    },
    {
      img: "u3.l4.p3.watching.jpg",
      audio: "u3.l4.p3.watching.mp3",
      subject: "They",
      beAnswer: "are",
      verbAnswer: "watching",
      verbOptions: ["watching", "studying", "sleeping"],
      tail: " TV."
    },
    {
      img: "u3.l4.p3.cooking.jpg",
      audio: "u3.l4.p3.cooking.mp3",
      subject: "She",
      beAnswer: "is",
      verbAnswer: "cooking",
      verbOptions: ["cooking", "drinking", "reading"],
      tail: " dinner."
    },
    {
      img: "u3.l4.p3.singing.jpg",
      audio: "u3.l4.p3.singing.mp3",
      subject: "He",
      beAnswer: "is",
      verbAnswer: "singing",
      verbOptions: ["singing", "sleeping", "teaching"],
      tail: "."
    },
    {
      img: "u3.l4.p3.playing.jpg",
      audio: "u3.l4.p3.playing.mp3",
      subject: "They",
      beAnswer: "are",
      verbAnswer: "playing",
      verbOptions: ["playing", "watching", "studying"],
      tail: " baseball."
    }
  ];

  const TOTAL       = ROUNDS.length;
  const TOTAL_TILES = TOTAL * 2; // 2 tiles per round (be + verb)

  // ── STATE ──
  let idx           = 0;
  let step          = 1;     // 1 = pick is/are, 2 = pick verb
  let locked        = false;
  let wrongFlashing = false; // true during red flash — blocks ALL further taps (no retries counted)
  let step1Answered = false; // first tap on step 1 already registered
  let step2Answered = false; // first tap on step 2 already registered
  let tapsCorrect   = 0;     // first-attempt correct taps
  let tapsTotal     = 0;     // first-attempt taps (correct + wrong, one per tile)
  let audio         = null;

  // Preload SFX
  let sfxCorrect   = null;
  let sfxIncorrect = null;
  try { sfxCorrect   = new Audio(SUPABASE + "sfx/correct.wav");   sfxCorrect.load();   } catch {}
  try { sfxIncorrect = new Audio(SUPABASE + "sfx/incorrect.wav"); sfxIncorrect.load(); } catch {}

  function playCorrect()   { try { if (sfxCorrect)   { sfxCorrect.currentTime   = 0; sfxCorrect.play();   } } catch {} }
  function playIncorrect() { try { if (sfxIncorrect) { sfxIncorrect.currentTime = 0; sfxIncorrect.play(); } } catch {} }

  // ── UTILS ──
  const show = el => el.classList.remove("hidden");
  const hide = el => el.classList.add("hidden");

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function clearEl(el) { el.innerHTML = ""; }

  function setStatus(type, text) {
    statusLine.textContent = text || "";
    statusLine.classList.remove("ok", "bad");
    if (type === "ok")  statusLine.classList.add("ok");
    if (type === "bad") statusLine.classList.add("bad");
  }

  function disableTiles(container, off) {
    container.querySelectorAll(".tile").forEach(b => { b.disabled = off; });
  }

  function updateScoreDisplay() {
    scoreCorrectEl.textContent = tapsCorrect;
    scoreTotalEl.textContent   = tapsTotal + " / " + TOTAL_TILES;
  }

  function updateProgress() {
    progressFill.style.width = (idx / TOTAL * 100) + "%";
  }

  function saveProgress() {
    try {
      const key  = "inglesco_progress_u3";
      const data = JSON.parse(localStorage.getItem(key) || "{}");
      if (!data.l4) data.l4 = {};
      data.l4.p3 = { done: true, correct: tapsCorrect, total: TOTAL_TILES };
      localStorage.setItem(key, JSON.stringify(data));
    } catch {}
  }

  // ── TILES ──
  function makeTap(btn, handler) {
    let moved = false;
    btn.addEventListener("touchstart", () => { moved = false; }, { passive: true });
    btn.addEventListener("touchmove",  () => { moved = true;  }, { passive: true });
    btn.addEventListener("touchend", e => {
      if (!moved) { e.preventDefault(); handler(); }
    }, { passive: false });
    btn.addEventListener("click", handler);
  }

  function buildBeTiles(round) {
    clearEl(tiles1);
    shuffle(["is", "are"]).forEach(word => {
      const btn = document.createElement("button");
      btn.className   = "tile";
      btn.type        = "button";
      btn.textContent = word;

      makeTap(btn, () => {
        if (locked || wrongFlashing || step !== 1) return;

        if (word === round.beAnswer) {
          // Count as correct on first attempt, or just proceed if retrying after wrong
          if (!step1Answered) { tapsTotal++; tapsCorrect++; step1Answered = true; }
          updateScoreDisplay();
          blank1.textContent = word;
          blank1.className   = "blank filled correct";
          btn.classList.add("correct");
          disableTiles(tiles1, true);
          step = 2;
          show(group2Wrap);
          setStatus("", "");
          buildVerbTiles(round);
        } else {
          // Only count the very first wrong tap
          if (!step1Answered) { tapsTotal++; step1Answered = true; }
          updateScoreDisplay();
          wrongFlashing = true;
          playIncorrect();
          btn.classList.add("wrong");
          setStatus("bad", "✗");
          disableTiles(tiles1, true);
          setTimeout(() => {
            btn.classList.remove("wrong");
            disableTiles(tiles1, false);
            setStatus("", "");
            wrongFlashing = false;
          }, 700);
        }
      });

      tiles1.appendChild(btn);
    });
  }

  function buildVerbTiles(round) {
    clearEl(tiles2);
    shuffle(round.verbOptions).forEach(word => {
      const btn = document.createElement("button");
      btn.className   = "tile";
      btn.type        = "button";
      btn.textContent = word;

      makeTap(btn, () => {
        if (locked || wrongFlashing || step !== 2) return;

        if (word === round.verbAnswer) {
          // Count as correct on first attempt, or just proceed if retrying after wrong
          if (!step2Answered) { tapsTotal++; tapsCorrect++; step2Answered = true; }
          updateScoreDisplay();
          blank2.textContent = word;
          blank2.className   = "blank filled correct";
          btn.classList.add("correct");
          disableTiles(tiles2, true);
          setStatus("ok", "✓");
          locked = true;
          playCorrect();
          playRoundAudio(round);
        } else {
          // Only count the very first wrong tap
          if (!step2Answered) { tapsTotal++; step2Answered = true; }
          updateScoreDisplay();
          wrongFlashing = true;
          playIncorrect();
          btn.classList.add("wrong");
          setStatus("bad", "✗");
          disableTiles(tiles2, true);
          setTimeout(() => {
            btn.classList.remove("wrong");
            disableTiles(tiles2, false);
            setStatus("", "");
            wrongFlashing = false;
          }, 700);
        }
      });

      tiles2.appendChild(btn);
    });
  }

  // ── AUDIO ──
  function stopAudio() {
    if (!audio) return;
    try { audio.pause(); audio.currentTime = 0; } catch {}
  }

  function playRoundAudio(round) {
    stopAudio();
    audio = new Audio(AUDIO_BASE + round.audio);
    const advance = () => {
      setTimeout(() => {
        if (idx < TOTAL - 1) loadRound(idx + 1);
        else finish();
      }, 400);
    };
    audio.onended = advance;
    audio.onerror = advance;
    audio.play().catch(advance);
  }

  // ── ROUNDS ──
  function loadRound(i) {
    idx           = i;
    step          = 1;
    locked        = false;
    wrongFlashing = false;
    step1Answered = false;
    step2Answered = false;

    const round = ROUNDS[idx];

    roundLabel.textContent = `${idx + 1} / ${TOTAL}`;
    updateProgress();
    sceneImg.src = IMG_BASE + round.img;

    part1.textContent = round.subject + " ";
    part2.textContent = round.tail;

    blank1.textContent = "___";
    blank1.className   = "blank";
    blank2.textContent = "___";
    blank2.className   = "blank";

    setStatus("", "");
    hide(group2Wrap);
    clearEl(tiles2);

    show(exerciseBox);
    hide(endScreen);

    buildBeTiles(round);
  }

  function finish() {
    progressFill.style.width = "100%";
    hide(exerciseBox);
    saveProgress();
    endScore.textContent = `Correctas: ${tapsCorrect} / ${TOTAL_TILES}`;
    show(endScreen);
  }

  // ── INIT ──
  loadRound(0);
})();
</script>
</body>
</html>
