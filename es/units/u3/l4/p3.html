<!-- u3/l4/p3.html (Mobile-first) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 4 • Parte 3</title>
<link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
  <style>
    body{
      font-family: Arial, sans-serif;
      padding:20px;
      margin:0;
      color:#111827;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
    }
    .wrap{ max-width:820px; margin:0 auto; }

    .back-btn{
      display:inline-block;
      margin-bottom:20px;
      padding:8px 15px;
      background:#2563eb;
      color:#fff;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
    }
    .back-btn:hover{ background:#1e40af; }

    .progress-container{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:15px 0 25px 0;
    }
    .step{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#d1d5db;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      cursor:pointer;
      transition:all .3s;
      color:#1f2933;
      text-decoration:none;
      user-select:none;
    }
    .step.active{ background:#2563eb; color:#fff; }
    .step:hover{ transform:scale(1.1); }

    .top-title{
      text-align:center;
      margin:0 0 8px 0;
      font-size:20px;
      font-weight:900;
    }
    .subline{
      text-align:center;
      margin:0 0 18px 0;
      font-size:16px;
      font-weight:800;
    }
    .subline span{
      background: rgba(255,255,255,.7);
      padding:6px 10px;
      border-radius:10px;
      display:inline-block;
    }

    .card{
      background: rgba(255,255,255,.85);
      border-radius:18px;
      padding:14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    .media{
      display:grid;
      grid-template-columns:1fr;
      gap:10px;
      justify-items:center;
    }

    .img-box{
      width:100%;
      max-width:520px;
      border-radius:16px;
      overflow:hidden;
      background:#fff;
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
    }
    .img-box img{
      width:100%;
      max-height:230px;
      object-fit:contain;
      display:block;
    }

    .round{
      text-align:center;
      font-weight:900;
      margin-top:6px;
      opacity:.85;
    }

    .exercise{
      max-width:520px;
      margin: 10px auto 0;
      display:grid;
      gap:14px;
    }

    .sentence-box{
      background: rgba(255,255,255,.78);
      border-radius:16px;
      padding:14px;
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }

    .instruction{
      text-align:center;
      font-weight:800;
      margin-bottom:12px;
      font-size:15px;
      color:#1f2937;
    }

    .sentence{
      text-align:center;
      font-size:24px;
      font-weight:900;
      line-height:1.5;
    }

    .blank{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:86px;
      min-height:42px;
      padding:0 10px;
      margin:0 4px;
      border-radius:12px;
      border:2px dashed #9ca3af;
      background:#fff;
      font-size:20px;
      font-weight:900;
      vertical-align:middle;
    }
    .blank.filled{
      border-style:solid;
      border-color:#2563eb;
      background:#eff6ff;
    }
    .blank.correct{
      border-color:#16a34a;
      background: rgba(22,163,74,.12);
      color:#166534;
    }

    .tiles-group{
      display:grid;
      gap:10px;
    }

    .group-title{
      font-size:14px;
      font-weight:900;
      text-align:center;
      opacity:.9;
    }

    .tiles{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
    }

    .tile{
      border:0;
      border-radius:12px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,.10);
      background:#2563eb;
      color:#fff;
      font-size:15px;
    }
    .tile:hover{ background:#1e40af; }
    .tile:disabled{
      opacity:.7;
      cursor:not-allowed;
    }
    .tile.correct{
      background:#16a34a !important;
      color:#fff;
    }
    .tile.wrong{
      background:#dc2626 !important;
      color:#fff;
    }

    .status-line{
      text-align:center;
      min-height:24px;
      font-weight:1000;
      font-size:18px;
    }
    .status-line.ok{ color:#16a34a; }
    .status-line.bad{ color:#dc2626; }

    .end{
      text-align:center;
      padding: 16px 10px 4px;
    }
    .end h2{
      margin:8px 0;
      font-size:24px;
      font-weight:1000;
    }
    .footer-actions{
      display:flex;
      justify-content:center;
      margin-top:20px;
    }
    .next-btn{
      display:inline-block;
      padding:10px 18px;
      background:#2563eb;
      color:#fff;
      text-decoration:none;
      border-radius:12px;
      font-weight:800;
    }
    .next-btn:hover{ background:#1e40af; }

    .hidden{ display:none !important; }

    @media (max-width:520px){
      .step{ width:34px; height:34px; font-size:14px; }
      .top-title{ font-size:18px; }
      .subline{ font-size:15px; }
      .sentence{ font-size:21px; }
      .blank{ min-width:76px; min-height:40px; font-size:18px; }
      .tile{ width:auto; max-width:100%; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 4 • Parte 3</div>
    <div class="subline">
      <span><b>Instrucción:</b> mira la imagen y completa la frase con las palabras correctas.</span>
    </div>

    <div class="progress-container">
      <a class="step" href="p1.html" aria-label="Parte 1">1</a>
      <a class="step" href="p2.html" aria-label="Parte 2">2</a>
      <a class="step active" href="p3.html" aria-label="Parte 3">3</a>
      <a class="step" href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">
      <div class="media">
        <div class="img-box">
          <img id="sceneImg" src="" alt="Scene" />
        </div>

        <div class="round" id="roundLabel">1 / 11</div>
      </div>

      <div class="exercise" id="exerciseBox">
        <div class="sentence-box">
          <div class="instruction" id="promptLine">Elige las palabras correctas.</div>

          <div class="sentence">
            <span id="part1"></span>
            <span class="blank" id="blank1">___</span>
            <span class="blank" id="blank2">___</span>
            <span id="part2"></span>
          </div>
        </div>

        <div class="tiles-group">
          <div class="group-title" id="group1Title">Choose: is / are</div>
          <div class="tiles" id="tiles1"></div>
        </div>

        <div class="tiles-group hidden" id="group2Wrap">
          <div class="group-title" id="group2Title">Choose the verb</div>
          <div class="tiles" id="tiles2"></div>
        </div>

        <div class="status-line" id="statusLine" aria-live="polite"></div>
      </div>

      <div class="end hidden" id="endScreen">
        <h2 data-done="Great job!">Great job!</h2>
        <p style="margin:0 0 14px 0; font-weight:900;">Continue to Part 4.</p>
        <div class="footer-actions">
          <a class="next-btn" href="p4.html">Next (Part 4) →</a>
        </div>
      </div>
    </div>
  </div>

  <script src="../../../../js/u3/u3_l4_p3.js"></script>
</body>
</html>
