<!-- u3/l4/p4.html (Mobile-first) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 4 • Parte 4</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <style>
    body{
      font-family: Arial, sans-serif;
      padding:20px;
      margin:0;
      color:#111827;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
    }
    .wrap{ max-width:820px; margin:0 auto; }

    .back-btn{
      display:inline-block;
      margin-bottom:20px;
      padding:8px 15px;
      background:#2563eb;
      color:#fff;
      border-radius:10px;
      text-decoration:none;
      font-weight:700;
    }
    .back-btn:hover{ background:#1e40af; }

    .progress-container{
      display:flex;
      justify-content:center;
      gap:10px;
      margin:15px 0 25px 0;
    }
    .step{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#d1d5db;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:600;
      cursor:pointer;
      transition:all .3s;
      color:#1f2933;
      text-decoration:none;
      user-select:none;
    }
    .step.active{ background:#2563eb; color:#fff; }
    .step:hover{ transform:scale(1.1); }

    .top-title{
      text-align:center;
      margin:0 0 8px 0;
      font-size:20px;
      font-weight:900;
    }
    .subline{
      text-align:center;
      margin:0 0 18px 0;
      font-size:16px;
      font-weight:800;
    }
    .subline span{
      background: rgba(255,255,255,.7);
      padding:6px 10px;
      border-radius:10px;
      display:inline-block;
    }

    .card{
      background: rgba(255,255,255,.85);
      border-radius:18px;
      padding:14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    .round{
      text-align:center;
      font-weight:900;
      margin: 4px 0 14px 0;
      opacity:.85;
    }

    .exercise{
      max-width:620px;
      margin:0 auto;
      display:grid;
      gap:16px;
    }

    .block{
      background: rgba(255,255,255,.78);
      border-radius:16px;
      padding:14px;
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }

    .block-title{
      font-size:16px;
      font-weight:1000;
      text-align:center;
      margin-bottom:12px;
    }

    .sentence-box{
      min-height:54px;
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
      justify-content:center;
      border:2px dashed #cbd5e1;
      border-radius:14px;
      padding:10px;
      background:#fff;
    }

    .word-chip{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:36px;
      padding:6px 10px;
      border-radius:10px;
      background:#eff6ff;
      border:2px solid #93c5fd;
      font-weight:900;
      font-size:18px;
      line-height:1.1;
    }

    .word-chip.correct{
      background: rgba(22,163,74,.12);
      border-color:#16a34a;
      color:#166534;
    }

    .tiles{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      justify-content:center;
      margin-top:12px;
    }

    .tile{
      border:0;
      border-radius:12px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,.10);
      background:#2563eb;
      color:#fff;
      font-size:15px;
    }
    .tile:hover{ background:#1e40af; }
    .tile:disabled{
      opacity:.7;
      cursor:not-allowed;
    }
    .tile.correct{
      background:#16a34a !important;
      color:#fff;
    }
    .tile.wrong{
      background:#dc2626 !important;
      color:#fff;
    }

    .status-line{
      text-align:center;
      min-height:24px;
      font-weight:1000;
      font-size:18px;
    }
    .status-line.ok{ color:#16a34a; }
    .status-line.bad{ color:#dc2626; }

    .hidden{ display:none !important; }

    .end{
      text-align:center;
      padding: 16px 10px 4px;
    }
    .end h2{
      margin:8px 0;
      font-size:24px;
      font-weight:1000;
    }
    .end p{
      margin:6px 0;
      font-weight:900;
    }

    .footer-actions{
      display:flex;
      justify-content:center;
      margin-top:20px;
    }
    .next-btn{
      display:inline-block;
      padding:10px 18px;
      background:#2563eb;
      color:#fff;
      text-decoration:none;
      border-radius:12px;
      font-weight:800;
    }
    .next-btn:hover{ background:#1e40af; }

    @media (max-width:520px){
      .step{ width:34px; height:34px; font-size:14px; }
      .top-title{ font-size:18px; }
      .subline{ font-size:15px; }
      .word-chip{ font-size:17px; }
      .tile{ font-size:14px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 4 • Parte 4</div>
    <div class="subline">
      <span><b>Instrucción:</b> construye la pregunta y la respuesta con las palabras correctas.</span>
    </div>

    <div class="progress-container">
      <a class="step" href="p1.html" aria-label="Parte 1">1</a>
      <a class="step" href="p2.html" aria-label="Parte 2">2</a>
      <a class="step" href="p3.html" aria-label="Parte 3">3</a>
      <a class="step active" href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">
      <div class="round" id="roundLabel">1 / 11</div>

      <div class="exercise" id="exerciseBox">
        <div class="block">
          <div class="block-title">Construye la pregunta</div>
          <div class="sentence-box" id="questionBox"></div>
          <div class="tiles" id="questionTiles"></div>
        </div>

        <div class="block hidden" id="answerBlock">
          <div class="block-title">Construye la respuesta</div>
          <div class="sentence-box" id="answerBox"></div>
          <div class="tiles" id="answerTiles"></div>
        </div>

        <div class="status-line" id="statusLine" aria-live="polite"></div>
      </div>

      <div class="end hidden" id="endScreen">
        <h2>¡Buen trabajo!</h2>
        <p>Felicitaciones.</p>
        <p>Terminaste la lección.</p>
      </div>
    </div>
  </div>

  <script src="../../../../js/u3/u3_l4_p4.js"></script>
</body>
</html>
