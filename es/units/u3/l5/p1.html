<!-- u3/l5/p1.html (Mobile-first) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 5 • Parte 1</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
    }
    .wrap { max-width: 820px; margin: 0 auto; }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 15px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
    }
    .back-btn:hover { background: #1e40af; }

    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0 25px 0;
    }
    .step {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    .top-title {
      text-align: center;
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 900;
    }
    .subline {
      text-align: center;
      margin: 0 0 18px 0;
      font-size: 16px;
      font-weight: 800;
    }
    .subline span {
      background: rgba(255,255,255,.7);
      padding: 6px 10px;
      border-radius: 10px;
      display: inline-block;
    }

    .card {
      background: rgba(255,255,255,.85);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    /* ── Note card ── */
    .note-card {
      background: #f0fdf4;
      border: 2px solid #86efac;
      border-radius: 16px;
      padding: 18px 16px 16px;
      margin-bottom: 18px;
    }
    .note-card h3 {
      margin: 0 0 2px 0;
      font-size: 16px;
      font-weight: 900;
      color: #166534;
    }
    .note-subtitle {
      font-size: 13px;
      color: #4b7c5e;
      font-style: italic;
      margin: 0 0 14px 0;
    }

    .sub-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 14px;
      font-size: 15px;
    }
    .sub-table thead th {
      background: #dcfce7;
      color: #166534;
      font-weight: 900;
      padding: 7px 10px;
      text-align: center;
      font-size: 12px;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .sub-table thead th:first-child { border-radius: 10px 0 0 0; }
    .sub-table thead th:last-child  { border-radius: 0 10px 0 0; }

    .sub-table tbody tr:nth-child(odd)  { background: #fff; }
    .sub-table tbody tr:nth-child(even) { background: #f0fdf4; }

    .sub-table td {
      padding: 9px 10px;
      vertical-align: middle;
      line-height: 1.4;
    }
    .sub-table td.arrow {
      text-align: center;
      font-size: 20px;
      color: #16a34a;
      font-weight: 900;
      width: 28px;
    }
    .sub-table td.col-orig {
      font-weight: 700;
      color: #1e3a5f;
    }
    .sub-table td.col-it {
      font-weight: 700;
      color: #166534;
    }
    .sub-table td.col-it b {
      font-size: 17px;
      color: #15803d;
    }
    .sub-table td .es {
      display: block;
      font-size: 12px;
      color: #6b7280;
      font-style: italic;
      font-weight: 400;
      margin-top: 2px;
    }

    .note-footer {
      font-size: 13px;
      color: #374151;
      background: #dcfce7;
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 14px;
      line-height: 1.6;
    }

    .dismiss-btn {
      display: block;
      width: 100%;
      padding: 11px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-weight: 900;
      font-size: 15px;
      cursor: pointer;
      transition: background .2s;
    }
    .dismiss-btn:hover { background: #15803d; }

    /* ── Round label ── */
    .round {
      text-align: center;
      font-weight: 900;
      margin: 4px 0 14px 0;
      opacity: .85;
    }

    /* ── Exercise ── */
    .exercise {
      max-width: 620px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    .img-block { text-align: center; }
    .item-img {
      width: 100%;
      max-width: 340px;
      height: 220px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
      display: block;
      margin: 0 auto 14px;
      background: #e5e7eb;
    }
    .play-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-weight: 900;
      font-size: 17px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(37,99,235,.30);
      transition: background .2s, transform .1s;
    }
    .play-btn:hover  { background: #1e40af; }
    .play-btn:active { transform: scale(.97); }
    .play-btn svg    { width: 22px; height: 22px; fill: #fff; }

    .block {
      background: rgba(255,255,255,.78);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }
    .block-title {
      font-size: 17px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 14px;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option-btn {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #93c5fd;
      border-radius: 14px;
      background: #eff6ff;
      font-weight: 800;
      font-size: 17px;
      cursor: pointer;
      text-align: center;
      transition: background .15s, border-color .15s, transform .1s;
      color: #1e3a5f;
    }
    .option-btn:hover:not(:disabled) {
      background: #dbeafe;
      border-color: #3b82f6;
      transform: scale(1.01);
    }
    .option-btn:disabled { cursor: not-allowed; }
    .option-btn.correct {
      background: rgba(22,163,74,.15) !important;
      border-color: #16a34a !important;
      color: #166534 !important;
    }
    .option-btn.wrong {
      background: rgba(220,38,38,.10) !important;
      border-color: #dc2626 !important;
      color: #991b1b !important;
    }

    .status-line {
      text-align: center;
      min-height: 24px;
      font-weight: 900;
      font-size: 18px;
    }
    .status-line.ok  { color: #16a34a; }
    .status-line.bad { color: #dc2626; }

    .hidden { display: none !important; }

    .end { text-align: center; padding: 16px 10px 4px; }
    .end h2 { margin: 8px 0; font-size: 24px; font-weight: 900; }
    .end p  { margin: 6px 0; font-weight: 800; }

    @media (max-width: 520px) {
      .step        { width: 34px; height: 34px; font-size: 14px; }
      .top-title   { font-size: 18px; }
      .subline     { font-size: 15px; }
      .option-btn  { font-size: 15px; padding: 12px 14px; }
      .block-title { font-size: 15px; }
      .item-img    { height: 180px; }
      .sub-table   { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 5 • Parte 1</div>
    <div class="subline">
      <span><b>Instrucción:</b> escucha y elige la respuesta correcta.</span>
    </div>

    <div class="progress-container">
      <a class="step active" href="p1.html" aria-label="Parte 1">1</a>
      <a class="step" href="p2.html" aria-label="Parte 2">2</a>
      <a class="step" href="p3.html" aria-label="Parte 3">3</a>
      <a class="step" href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">

      <!-- Note card (dismissible) -->
      <div class="note-card" id="noteCard">
        <h3 id="noteTitle"></h3>
        <p class="note-subtitle" id="noteSubtitle"></p>
        <table class="sub-table">
          <thead>
            <tr>
              <th id="thOrig"></th>
              <th></th>
              <th id="thIt"></th>
            </tr>
          </thead>
          <tbody id="noteTableBody"></tbody>
        </table>
        <div class="note-footer" id="noteFooter"></div>
        <button class="dismiss-btn" id="dismissBtn"></button>
      </div>

      <div class="round hidden" id="roundLabel">1 / 7</div>

      <div class="exercise hidden" id="exerciseBox">

        <div class="img-block">
          <img class="item-img" id="itemImg" src="" alt="" />
          <button class="play-btn" id="playBtn">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <span id="playLabel"></span>
          </button>
        </div>

        <div class="block" id="q1Block">
          <div class="block-title" id="q1Title"></div>
          <div class="options" id="q1Options"></div>
        </div>

        <div class="block hidden" id="q2Block">
          <div class="block-title" id="q2Title"></div>
          <div class="options" id="q2Options"></div>
        </div>

        <div class="status-line" id="statusLine" aria-live="polite"></div>
      </div>

      <div class="end hidden" id="endScreen">
        <h2 id="endTitle"></h2>
        <p id="endMsg1"></p>
        <p id="endMsg2"></p>
      </div>

    </div>
  </div>

  <script src="../../../../js/u3/u3_l5_p1.js"></script>
</body>
</html>
