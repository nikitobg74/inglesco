<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 5 • Parte 2</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vercel Insights -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe 0%, #fef9c3 100%);
      min-height: 100vh;
    }

    .wrap { max-width: 680px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── Top title ── */
    .top-title {
      text-align: center;
      margin: 0 0 6px;
      font-size: 18px;
      font-weight: 900;
    }
    .subline {
      text-align: center;
      margin: 0 0 14px;
      font-size: 14px;
      font-weight: 700;
    }
    .subline span {
      background: rgba(255,255,255,.75);
      padding: 5px 12px;
      border-radius: 10px;
      display: inline-block;
    }

    /* ── Part nav dots ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 20px;
    }
    .step {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      transition: all .25s;
      color: #374151;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; box-shadow: 0 4px 12px rgba(37,99,235,.4); }
    .step:hover:not(.active) { transform: scale(1.1); background: #93c5fd; }

    /* ── Main card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Round + score header ── */
    .round-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .round-label {
      font-weight: 900;
      font-size: 15px;
      opacity: .8;
    }
    .score-badges {
      display: flex;
      gap: 8px;
    }
    .badge {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 13px;
    }
    .badge-ok  { background: #dcfce7; color: #166534; }
    .badge-bad { background: #fee2e2; color: #991b1b; }

    /* ── Exercise wrapper ── */
    .exercise { display: grid; gap: 14px; }

    /* ── Prompt card ── */
    .prompt-card {
      display: flex;
      gap: 12px;
      align-items: center;
      background: #fff;
      border-radius: 16px;
      padding: 12px;
      box-shadow: 0 4px 14px rgba(0,0,0,.07);
    }
    .item-img {
      width: 110px;
      height: 82px;
      object-fit: contain;
      border-radius: 12px;
      flex-shrink: 0;
      background: #f1f5f9;
      box-shadow: 0 3px 8px rgba(0,0,0,.08);
    }
    .prompt-info {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .prompt-who   { font-size: 17px; font-weight: 900; color: #1e3a5f; }
    .prompt-where { font-size: 14px; font-weight: 700; color: #2563eb; }
    .prompt-doing { font-size: 14px; font-weight: 700; color: #7c3aed; }

    /* ── Sentence build blocks ── */
    .block {
      background: #fff;
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 14px rgba(0,0,0,.07);
    }
    .block-title {
      font-size: 13px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 10px;
      color: #4b5563;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    .sentence-box {
      min-height: 52px;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      justify-content: center;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 10px;
      background: #f8fafc;
      margin-bottom: 12px;
      transition: border-color .2s;
    }

    .word-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 5px 10px;
      border-radius: 9px;
      background: #eff6ff;
      border: 2px solid #93c5fd;
      font-weight: 800;
      font-size: 16px;
      line-height: 1.1;
      transition: background .2s, border-color .2s;
    }
    .word-chip.correct {
      background: #dcfce7;
      border-color: #16a34a;
      color: #166534;
    }
    .word-chip.revealed {
      background: #fef9c3;
      border-color: #ca8a04;
      color: #713f12;
    }

    /* ── Tiles ── */
    .tiles {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .tile {
      border: 0;
      border-radius: 10px;
      padding: 9px 14px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,.12);
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      transition: background .15s, transform .1s, box-shadow .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .tile:hover:not(:disabled) { background: #1d4ed8; box-shadow: 0 6px 14px rgba(37,99,235,.35); }
    .tile:active:not(:disabled) { transform: scale(.96); }
    .tile:disabled { opacity: .55; cursor: not-allowed; box-shadow: none; }
    .tile.correct  { background: #16a34a !important; }
    .tile.wrong    { background: #dc2626 !important; animation: shake .3s; }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-4px); }
      75%      { transform: translateX(4px); }
    }

    /* ── Status line ── */
    .status-line {
      text-align: center;
      min-height: 26px;
      font-weight: 800;
      font-size: 16px;
      margin-top: 4px;
    }
    .status-line.ok  { color: #16a34a; }
    .status-line.bad { color: #dc2626; }
    .status-line.hint { color: #b45309; }

    /* ── End screen ── */
    .end { text-align: center; padding: 20px 10px 8px; }
    .end .trophy { font-size: 52px; margin-bottom: 8px; }
    .end h2 { margin: 8px 0; font-size: 26px; font-weight: 900; color: #1e3a5f; }
    .end p  { margin: 6px 0; font-weight: 700; color: #374151; font-size: 15px; }
    .end .final-score {
      display: inline-flex;
      gap: 16px;
      margin: 14px 0;
      background: #f0fdf4;
      border-radius: 14px;
      padding: 12px 24px;
    }
    .end .score-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
    .end .score-num  { font-size: 28px; font-weight: 900; }
    .end .score-lbl  { font-size: 12px; font-weight: 700; color: #6b7280; }
    .end .score-ok   { color: #16a34a; }
    .end .score-bad  { color: #dc2626; }

    .next-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 28px;
      background: #2563eb;
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 6px 16px rgba(37,99,235,.35);
    }
    .next-btn:hover { background: #1d4ed8; }

    .hidden { display: none !important; }

    /* ── Mobile tweaks ── */
    @media (max-width: 480px) {
      body { padding: 10px; }
      .step       { width: 32px; height: 32px; font-size: 13px; }
      .top-title  { font-size: 16px; }
      .item-img   { width: 82px; height: 62px; }
      .prompt-who { font-size: 15px; }
      .word-chip  { font-size: 14px; padding: 4px 8px; }
      .tile       { font-size: 13px; padding: 8px 11px; }
      .prompt-where, .prompt-doing { font-size: 13px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 5 • Parte 2</div>
    <div class="subline"><span id="instrLine"></span></div>

    <div class="progress-container">
      <a class="step"        href="p1.html" aria-label="Parte 1">1</a>
      <a class="step active" href="p2.html" aria-label="Parte 2">2</a>
      <a class="step"        href="p3.html" aria-label="Parte 3">3</a>
      <a class="step"        href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">
      <div class="round-row">
        <div class="round-label" id="roundLabel">1 / 13</div>
        <div class="score-badges">
          <div class="badge badge-ok">✓ <span id="scoreOk">0</span></div>
          <div class="badge badge-bad">✗ <span id="scoreBad">0</span></div>
        </div>
      </div>

      <div class="exercise" id="exerciseBox">

        <div class="prompt-card">

          <div class="prompt-info">

          <div class="block-title" id="s1Title"></div>

        <!-- Stage 2 -->
        <div class="block hidden" id="s2Block">

            <span class="score-num score-bad" id="finalBad">0</span>
            <span class="score-lbl">Errores</span>
          </div>
        </div>
        <a class="next-btn" href="p3.html">Siguiente parte →</a>
      </div>

  <script>
  (() => {
    "use strict";

    const SUPABASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
    const IMG_BASE = SUPABASE + "images/u3/";
    const AUD_BASE = SUPABASE + "audio/u3/";

    // ── Audio ─────────────────────────────────────────────────────────────
    const sfxCorrect = new Audio(AUD_BASE + "correct.wav");
    const sfxWrong   = new Audio(AUD_BASE + "incorrect.wav");
    sfxCorrect.preload = "auto";
    sfxWrong.preload   = "auto";

    function playCorrect() { sfxCorrect.currentTime = 0; sfxCorrect.play().catch(() => {}); }
    function playWrong()   { sfxWrong.currentTime   = 0; sfxWrong.play().catch(() => {}); }

    // ── DOM ───────────────────────────────────────────────────────────────
    const roundLabel  = document.getElementById("roundLabel");
    const exerciseBox = document.getElementById("exerciseBox");
    const endScreen   = document.getElementById("endScreen");
    const instrLine   = document.getElementById("instrLine");
    const itemImg     = document.getElementById("itemImg");
    const promptWho   = document.getElementById("promptWho");
    const promptWhere = document.getElementById("promptWhere");
    const promptDoing = document.getElementById("promptDoing");
    const s1Block     = document.getElementById("s1Block");
    const s1Title     = document.getElementById("s1Title");
    const s1Box       = document.getElementById("s1Box");
    const s1Tiles     = document.getElementById("s1Tiles");
    const s2Block     = document.getElementById("s2Block");
    const s2Title     = document.getElementById("s2Title");
    const s2Box       = document.getElementById("s2Box");
    const s2Tiles     = document.getElementById("s2Tiles");
    const statusLine  = document.getElementById("statusLine");
    const scoreOkEl   = document.getElementById("scoreOk");
    const scoreBadEl  = document.getElementById("scoreBad");
    const endTitle    = document.getElementById("endTitle");
    const endMsg1     = document.getElementById("endMsg1");
    const finalOkEl   = document.getElementById("finalOk");
    const finalBadEl  = document.getElementById("finalBad");

    // ── Config ────────────────────────────────────────────────────────────
    const MAX_MISTAKES = 3; // reveal answer after this many wrong attempts per stage

    const CONFIG = {
      instr:   "Construye las oraciones con las palabras correctas.",
      s1Title: "Oración 1 — dónde está:",
      s2Title: "Oración 2 — qué está haciendo:",
      end: {
        title: "¡Buen trabajo!",
        msg1:  "Terminaste la parte 2."
      }
    };

    // ── Rounds ────────────────────────────────────────────────────────────
    const ROUNDS = [
      {
        image:  "u3.l5.p2.woman.park.jpg",
        prompt: { who: "Sofia", where: "park", doing: "eating lunch" },
        s1:     ["Sofia", "is", "in the", "park."],
        s2:     ["She", "is", "eating", "lunch."]
      },
      {
        image:  "u3.l5.p2.couple.jpg",
        prompt: { who: "you", where: "dining room", doing: "eating dinner" },
        s1:     ["We", "are", "in the", "dining", "room."],
        s2:     ["We", "are", "eating", "dinner."]
      },
      {
        image:  "u3.l5.p2.man.guitar.jpg",
        prompt: { who: "David", where: "bedroom", doing: "playing the guitar" },
        s1:     ["David", "is", "in the", "bedroom."],
        s2:     ["He", "is", "playing", "the", "guitar."]
      },
      {
        image:  "u3.l5.p2.cards.jpg",
        prompt: { who: "you", where: "living room", doing: "playing cards" },
        s1:     ["We", "are", "in the", "living", "room."],
        s2:     ["We", "are", "playing", "cards."]
      },
      {
        image:  "u3.l5.p2.baseball.jpg",
        prompt: { who: "Tom and Lisa", where: "backyard", doing: "playing baseball" },
        s1:     ["Tom", "and", "Lisa", "are", "in the", "backyard."],
        s2:     ["They", "are", "playing", "baseball."]
      },
      {
        image:  "u3.l5.p2.woman.coffee.jpg",
        prompt: { who: "Miss Rivera", where: "cafeteria", doing: "drinking coffee" },
        s1:     ["Miss", "Rivera", "is", "in the", "cafeteria."],
        s2:     ["She", "is", "drinking", "coffee."]
      },
      {
        image:  "u3.l5.p2.library.jpg",
        prompt: { who: "you", where: "library", doing: "studying English" },
        s1:     ["We", "are", "in the", "library."],
        s2:     ["We", "are", "studying", "English."]
      },
      {
        image:  "u3.l5.p2.man.teacher.jpg",
        prompt: { who: "Mr. Patel", where: "classroom", doing: "teaching mathematics" },
        s1:     ["Mr.", "Patel", "is", "in the", "classroom."],
        s2:     ["He", "is", "teaching", "mathematics."]
      },
      {
        image:  "u3.l5.p2.man.bathroom.jpg",
        prompt: { who: "Marco", where: "bathroom", doing: "singing" },
        s1:     ["Marco", "is", "in the", "bathroom."],
        s2:     ["He", "is", "singing."]
      },
      {
        image:  "u3.l5.p2.woman.hospital.jpg",
        prompt: { who: "Emma", where: "hospital", doing: "watching TV" },
        s1:     ["Emma", "is", "in the", "hospital."],
        s2:     ["She", "is", "watching", "TV."]
      },
      {
        image:  "u3.l5.p2.man.park.jpg",
        prompt: { who: "Brian", where: "park", doing: "listening to music" },
        s1:     ["Brian", "is", "in the", "park."],
        s2:     ["He", "is", "listening", "to", "music."]
      },
      {
        image:  "u3.l5.p2.dog.park.jpg",
        prompt: { who: "The dog", where: "park", doing: "playing ball" },
        s1:     ["The", "dog", "is", "in the", "park."],
        s2:     ["It", "is", "playing", "ball."]
      },
      {
        image:  "u3.l5.p2.cat.fish.jpg",
        prompt: { who: "The cat", where: "yard", doing: "eating fish" },
        s1:     ["The", "cat", "is", "in the", "yard."],
        s2:     ["It", "is", "eating", "fish."]
      }
    ];

    const TOTAL    = ROUNDS.length;
    let idx        = 0;
    let isLocked   = false;
    let scoreOk    = 0;
    let scoreBad   = 0;
    // per-stage mistake counter, reset per round per stage
    let mistakesS1 = 0;
    let mistakesS2 = 0;

    // ── Helpers ───────────────────────────────────────────────────────────
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
    function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

    function setStatus(type, text) {
      statusLine.textContent = text;
      statusLine.className   = "status-line" + (type ? " " + type : "");
    }

    function getWords(box) {
      return Array.from(box.children).map(el => el.textContent);
    }

    function arraysEqual(a, b) {
      if (a.length !== b.length) return false;
      return a.every((v, i) => v === b[i]);
    }

    function paintResult(box, target) {
      Array.from(box.children).forEach((el, i) => {
        el.classList.remove("correct", "revealed");
        el.classList.add(el.textContent === target[i] ? "correct" : "revealed");
      });
    }

    function paintAllCorrect(box) {
      Array.from(box.children).forEach(el => {
        el.classList.remove("revealed");
        el.classList.add("correct");
      });
    }

    function addWord(box, word) {
      const chip = document.createElement("span");
      chip.className   = "word-chip";
      chip.textContent = word;
      box.appendChild(chip);
    }

    function disableTiles(container) {
      container.querySelectorAll(".tile").forEach(btn => { btn.disabled = true; });
    }

    function enableTiles(container) {
      container.querySelectorAll(".tile").forEach(btn => {
        btn.disabled = false;
        btn.classList.remove("wrong", "correct");
      });
    }

    function resetStage(container, box) {
      clear(box);
      enableTiles(container);
      setStatus("", "");
      isLocked = false;
    }

    function updateScoreUI() {
      scoreOkEl.textContent  = scoreOk;
      scoreBadEl.textContent = scoreBad;
    }

    // ── Reveal correct answer (after MAX_MISTAKES) ────────────────────────
    function revealAnswer(container, box, words, onDone) {
      clear(box);
      disableTiles(container);
      words.forEach(word => {
        const chip = document.createElement("span");
        chip.className   = "word-chip revealed";
        chip.textContent = word;
        box.appendChild(chip);
      });
      setStatus("hint", "💡 Revisa la respuesta correcta.");
      isLocked = true;
      setTimeout(() => {
        setStatus("", "");
        isLocked = false;
        onDone();
      }, 2000);
    }

    // ── Tile builder ──────────────────────────────────────────────────────
    function buildTiles(container, box, words, mistakeCountRef, onCorrect) {
      clear(container);
      clear(box);
      const shuffled = shuffle(words);

      shuffled.forEach(word => {
        const btn = document.createElement("button");
        btn.className   = "tile";
        btn.type        = "button";
        btn.textContent = word;

        btn.addEventListener("click", handleTap);
        btn.addEventListener("touchend", e => { e.preventDefault(); handleTap.call(btn); });

        function handleTap() {
          if (isLocked || btn.disabled) return;
          addWord(box, word);
          btn.disabled = true;

          const current = getWords(box);
          if (current.length < words.length) return;

          // full sentence built — evaluate
          isLocked = true;
          disableTiles(container);

          if (arraysEqual(current, words)) {
            paintAllCorrect(box);
            setStatus("ok", "✓ ¡Correcto!");
            playCorrect();
            scoreOk++;
            updateScoreUI();
            setTimeout(() => {
              setStatus("", "");
              isLocked = false;
              onCorrect();
            }, 1500);
          } else {
            // wrong
            paintResult(box, words);
            setStatus("bad", "Revisa las palabras en rojo.");
            playWrong();
            scoreBad++;
            mistakeCountRef.count++;
            updateScoreUI();

            if (mistakeCountRef.count >= MAX_MISTAKES) {
              // reveal
              setTimeout(() => {
                revealAnswer(container, box, words, onCorrect);
              }, 900);
            } else {
              setTimeout(() => {
                resetStage(container, box);
              }, 1500);
            }
          }
        }

        container.appendChild(btn);
      });
    }

    // ── Load round ────────────────────────────────────────────────────────
    function loadRound(i) {
      idx        = i;
      isLocked   = false;
      mistakesS1 = 0;
      mistakesS2 = 0;
      setStatus("", "");

      const round = ROUNDS[idx];
      roundLabel.textContent = `${idx + 1} / ${TOTAL}`;

      itemImg.src            = IMG_BASE + round.image;
      itemImg.alt            = round.prompt.who;
      promptWho.textContent  = round.prompt.who;
      promptWhere.textContent = "📍 " + round.prompt.where;
      promptDoing.textContent = "▶ "  + round.prompt.doing;

      s1Title.textContent = CONFIG.s1Title;
      s2Title.textContent = CONFIG.s2Title;

      s2Block.classList.add("hidden");
      s1Block.classList.remove("hidden");

      const m1 = { count: 0 };
      const m2 = { count: 0 };

      buildTiles(s1Tiles, s1Box, round.s1, m1, () => {
        s2Block.classList.remove("hidden");
        s2Block.scrollIntoView({ behavior: "smooth", block: "nearest" });
        buildTiles(s2Tiles, s2Box, round.s2, m2, () => {
          advanceOrFinish();
        });
      });
    }

    function advanceOrFinish() {
      if (idx < TOTAL - 1) {
        loadRound(idx + 1);
      } else {
        finish();
      }
    }

    // ── Page completion tracking ──────────────────────────────────────────
    function saveProgress() {
      try {
        const key  = "inglesco_progress_u3";
        const data = JSON.parse(localStorage.getItem(key) || "{}");
        if (!data.l5) data.l5 = {};
        const prev = data.l5.partsCompleted || 0;
        data.l5.partsCompleted = Math.max(prev, 2);
        data.l5.partsTotal     = data.l5.partsTotal || 4;
        localStorage.setItem(key, JSON.stringify(data));
      } catch (e) {}
    }

    // ── Finish ────────────────────────────────────────────────────────────
    function finish() {
      saveProgress();
      exerciseBox.classList.add("hidden");
      endTitle.textContent   = CONFIG.end.title;
      endMsg1.textContent    = CONFIG.end.msg1;
      finalOkEl.textContent  = scoreOk;
      finalBadEl.textContent = scoreBad;
      endScreen.classList.remove("hidden");
    }

    // ── Init ──────────────────────────────────────────────────────────────
    instrLine.textContent = CONFIG.instr;
    loadRound(0);
  })();
  </script>
</body>
</html>
