<!-- u3/l5/p3.html (Mobile-first) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 5 • Parte 3</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
    }
    .wrap { max-width: 820px; margin: 0 auto; }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 15px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
    }
    .back-btn:hover { background: #1e40af; }

    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0 25px 0;
    }
    .step {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    .top-title {
      text-align: center;
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 900;
    }
    .subline {
      text-align: center;
      margin: 0 0 18px 0;
      font-size: 16px;
      font-weight: 800;
    }
    .subline span {
      background: rgba(255,255,255,.7);
      padding: 6px 10px;
      border-radius: 10px;
      display: inline-block;
    }

    .card {
      background: rgba(255,255,255,.85);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    .round {
      text-align: center;
      font-weight: 900;
      margin: 4px 0 14px 0;
      opacity: .85;
    }

    .exercise {
      max-width: 620px;
      margin: 0 auto;
      display: grid;
      gap: 16px;
    }

    /* ── Image ── */
    .img-block { text-align: center; }
    .item-img {
      width: 100%;
      max-width: 340px;
      height: 200px;
      object-fit: cover;
      border-radius: 16px;
      box-shadow: 0 6px 18px rgba(0,0,0,.12);
      display: block;
      margin: 0 auto;
      background: #e5e7eb;
    }

    /* ── Sentence blocks ── */
    .block {
      background: rgba(255,255,255,.78);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }
    .block-title {
      font-size: 15px;
      font-weight: 900;
      text-align: center;
      margin-bottom: 10px;
      color: #374151;
      opacity: .8;
    }

    .sentence-box {
      min-height: 54px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      border: 2px dashed #cbd5e1;
      border-radius: 14px;
      padding: 10px;
      background: #fff;
      margin-bottom: 12px;
    }

    .word-chip {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
      padding: 7px 14px;
      border-radius: 10px;
      background: #eff6ff;
      border: 2px solid #93c5fd;
      font-weight: 900;
      font-size: 16px;
      line-height: 1.2;
    }
    .word-chip.correct {
      background: rgba(22,163,74,.12);
      border-color: #16a34a;
      color: #166534;
    }

    .tiles {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
    }

    /* chunk tiles — wider than word tiles */
    .tile {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,.10);
      background: #2563eb;
      color: #fff;
      font-size: 15px;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .tile:hover:not(:disabled) { background: #1e40af; }
    .tile:active               { transform: scale(.97); }
    .tile:disabled             { opacity: .5; cursor: not-allowed; }
    .tile.correct              { background: #16a34a !important; }
    .tile.wrong                { background: #dc2626 !important; }

    .status-line {
      text-align: center;
      min-height: 24px;
      font-weight: 900;
      font-size: 18px;
    }
    .status-line.ok  { color: #16a34a; }
    .status-line.bad { color: #dc2626; }

    .hidden { display: none !important; }

    .end { text-align: center; padding: 16px 10px 4px; }
    .end h2 { margin: 8px 0; font-size: 24px; font-weight: 900; }
    .end p  { margin: 6px 0; font-weight: 800; }

    @media (max-width: 520px) {
      .step      { width: 34px; height: 34px; font-size: 14px; }
      .top-title { font-size: 18px; }
      .tile      { font-size: 13px; padding: 9px 12px; }
      .word-chip { font-size: 15px; }
      .item-img  { height: 170px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 5 • Parte 3</div>
    <div class="subline">
      <span id="instrLine"></span>
    </div>

    <div class="progress-container">
      <a class="step" href="p1.html" aria-label="Parte 1">1</a>
      <a class="step" href="p2.html" aria-label="Parte 2">2</a>
      <a class="step active" href="p3.html" aria-label="Parte 3">3</a>
      <a class="step" href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">
      <div class="round" id="roundLabel">1 / 13</div>

      <div class="exercise" id="exerciseBox">

        <!-- Image only — no prompt card -->
        <div class="img-block">
          <img class="item-img" id="itemImg" src="" alt="" />
        </div>

        <!-- Stage 1: location sentence -->
        <div class="block" id="s1Block">
          <div class="block-title" id="s1Title"></div>
          <div class="sentence-box" id="s1Box"></div>
          <div class="tiles" id="s1Tiles"></div>
        </div>

        <!-- Stage 2: activity sentence -->
        <div class="block hidden" id="s2Block">
          <div class="block-title" id="s2Title"></div>
          <div class="sentence-box" id="s2Box"></div>
          <div class="tiles" id="s2Tiles"></div>
        </div>

        <div class="status-line" id="statusLine" aria-live="polite"></div>
      </div>

      <div class="end hidden" id="endScreen">
        <h2 id="endTitle"></h2>
        <p id="endMsg1"></p>
        <p id="endMsg2"></p>
      </div>
    </div>
  </div>

  <script src="../../../../js/u3/u3_l5_p3.js"></script>
</body>
</html>
