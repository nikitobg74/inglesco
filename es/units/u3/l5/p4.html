<!-- u3/l5/p4.html (Mobile-first) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 5 • Parte 4</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
    }
    .wrap { max-width: 820px; margin: 0 auto; }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 15px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
    }
    .back-btn:hover { background: #1e40af; }

    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0 25px 0;
    }
    .step {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    .top-title {
      text-align: center;
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 900;
    }
    .subline {
      text-align: center;
      margin: 0 0 18px 0;
      font-size: 16px;
      font-weight: 800;
    }
    .subline span {
      background: rgba(255,255,255,.7);
      padding: 6px 10px;
      border-radius: 10px;
      display: inline-block;
    }

    .card {
      background: rgba(255,255,255,.85);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    /* ── Story card ── */
    .story-card {
      background: #f0fdf4;
      border: 2px solid #86efac;
      border-radius: 16px;
      padding: 18px 16px;
      margin-bottom: 20px;
    }
    .story-title {
      font-size: 15px;
      font-weight: 900;
      color: #166534;
      margin: 0 0 12px 0;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .story-text {
      font-size: 16px;
      line-height: 1.9;
      color: #1e3a5f;
    }
    .story-text p      { margin: 0 0 6px 0; }
    .story-text p.gap  { margin-bottom: 12px; }

    /* ── Progress bar ── */
    .progress-bar-wrap {
      background: #e5e7eb;
      border-radius: 99px;
      height: 8px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: #16a34a;
      border-radius: 99px;
      transition: width .4s ease;
      width: 0%;
    }
    .score-line {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      color: #6b7280;
      margin-bottom: 16px;
    }

    /* ── Questions ── */
    .questions-title {
      font-size: 16px;
      font-weight: 900;
      text-align: center;
      margin: 0 0 16px 0;
      color: #374151;
    }
    .question-item {
      background: rgba(255,255,255,.78);
      border-radius: 16px;
      padding: 14px;
      box-shadow: 0 4px 12px rgba(0,0,0,.06);
      margin-bottom: 12px;
    }
    .question-text {
      font-size: 16px;
      font-weight: 700;
      color: #1e3a5f;
      margin-bottom: 10px;
      line-height: 1.4;
    }
    .tf-buttons {
      display: flex;
      gap: 10px;
    }
    .tf-btn {
      flex: 1;
      padding: 12px;
      border: 2px solid #93c5fd;
      border-radius: 12px;
      background: #eff6ff;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
      transition: background .15s, border-color .15s, transform .1s;
      color: #1e3a5f;
    }
    .tf-btn:hover:not(:disabled) {
      background: #dbeafe;
      border-color: #3b82f6;
      transform: scale(1.02);
    }
    .tf-btn:disabled      { cursor: not-allowed; }
    .tf-btn.correct {
      background: rgba(22,163,74,.15) !important;
      border-color: #16a34a !important;
      color: #166534 !important;
    }
    .tf-btn.wrong {
      background: rgba(220,38,38,.10) !important;
      border-color: #dc2626 !important;
      color: #991b1b !important;
    }

    .hidden { display: none !important; }

    /* ── End screen ── */
    .end {
      text-align: center;
      padding: 20px 10px 10px;
    }
    .end .trophy   { font-size: 52px; margin-bottom: 8px; }
    .end h2        { margin: 8px 0; font-size: 26px; font-weight: 900; color: #166534; }
    .end p         { margin: 6px 0; font-weight: 800; font-size: 16px; color: #374151; }
    .end .score-big {
      font-size: 22px;
      font-weight: 900;
      color: #2563eb;
      margin: 12px 0;
    }
    .end-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      align-items: center;
      margin-top: 18px;
    }
    .end-btn {
      display: inline-block;
      width: 100%;
      max-width: 280px;
      padding: 12px 28px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 900;
      font-size: 16px;
      box-shadow: 0 6px 14px rgba(37,99,235,.25);
      transition: background .2s;
      text-align: center;
      box-sizing: border-box;
    }
    .end-btn:hover       { background: #1e40af; }
    .end-btn.retry-btn {
      background: #f59e0b;
      box-shadow: 0 6px 14px rgba(245,158,11,.25);
    }
    .end-btn.retry-btn:hover { background: #d97706; }

    @media (max-width: 520px) {
      .step          { width: 34px; height: 34px; font-size: 14px; }
      .top-title     { font-size: 18px; }
      .story-text    { font-size: 15px; }
      .tf-btn        { font-size: 15px; padding: 10px; }
      .question-text { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 5 • Parte 4</div>
    <div class="subline">
      <span id="instrLine"></span>
    </div>

    <div class="progress-container">
      <a class="step" href="p1.html" aria-label="Parte 1">1</a>
      <a class="step" href="p2.html" aria-label="Parte 2">2</a>
      <a class="step" href="p3.html" aria-label="Parte 3">3</a>
      <a class="step active" href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">

      <div id="exerciseBox">
        <div class="story-card">
          <div class="story-title" id="storyTitle"></div>
          <div class="story-text"  id="storyText"></div>
        </div>

        <div class="progress-bar-wrap">
          <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        <div class="score-line" id="scoreLine"></div>

        <div class="questions-title" id="questionsTitle"></div>
        <div id="questionsList"></div>
      </div>

      <div class="end hidden" id="endScreen">
        <div class="trophy">🏆</div>
        <h2  id="endTitle"></h2>
        <p   id="endMsg1"></p>
        <div class="score-big" id="endScore"></div>
        <p   id="endMsg2"></p>
        <div class="end-actions">
          <button class="end-btn retry-btn hidden" id="retryBtn"></button>
          <a id="endBtn" href="../index.html" class="end-btn"></a>
        </div>
      </div>

    </div>
  </div>

  <script src="../../../../js/u3/u3_l5_p4.js"></script>
</body>
</html>
