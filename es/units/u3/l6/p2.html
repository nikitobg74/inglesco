      const prev = parseInt(localStorage.getItem(LESSON_KEY) || "0", 10);
      if (2 > prev) localStorage.setItem(LESSON_KEY, "2");
    } catch(e) {}
    try {
      const raw  = localStorage.getItem(PROGRESS_KEY);
      const data = raw ? JSON.parse(raw) : {};
      if (!data.l6) data.l6 = { partsCompleted: 0, partsTotal: 4 };
      if (data.l6.partsCompleted < 2) data.l6.partsCompleted = 2;
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));

      { en: "your",  es: "tu / tus" },
      { en: "their", es: "su (de ellos)" }
    ],
    play: "Escuchar",

  // ── Rounds ───────────────────────────────────────────────────────────────
  // answer: 3 correct chunks

  const ROUNDS = [
    {
      image:    "u3.l6.p1.fix.car.jpg",

  // ── Shuffle ──────────────────────────────────────────────────────────────
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const SHUFFLED = shuffle(ROUNDS);
  const TOTAL    = SHUFFLED.length;
  let idx          = 0;
  let audio        = null;
  let isLocked     = false;
  let roundMistakes = 0;
  let totalCorrect  = 0;
  let totalWrong    = 0;

  // ── Helpers ──────────────────────────────────────────────────────────────
  function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

  function stopAudio() {
    if (!audio) return;
    try { audio.pause(); audio.currentTime = 0; } catch(e) {}
  }

  function playSfx(sfx) {
    try { sfx.currentTime = 0; sfx.play(); } catch(e) {}
  }

  function setStatus(type, text) {
    statusLine.textContent = text;
    statusLine.className   = "status-line" + (type ? " " + type : "");
  }

  function updateScoreUI() {
    correctCountEl.textContent = totalCorrect;
    wrongCountEl.textContent   = totalWrong;
  }

  function getChunks(box) {
    return Array.from(box.children).map(el => el.dataset.chunk);
  }

  function arraysEqual(a, b) {
    return a.length === b.length && a.every((v, i) => v === b[i]);
  }

  function disableTiles() {
    Array.from(tilesContainer.querySelectorAll(".tile")).forEach(b => { b.disabled = true; });
  }

  function enableTiles() {
    Array.from(tilesContainer.querySelectorAll(".tile"))
      .forEach(b => { b.disabled = false; b.classList.remove("wrong", "correct"); });
  }

  // ── Mistake dots ─────────────────────────────────────────────────────────
  function renderMistakeDots(count) {
    mistakeDots.innerHTML = "";
    for (let i = 0; i < MAX_MISTAKES; i++) {
      const d = document.createElement("div");
      d.className = "m-dot" + (i < count ? " filled" : "");
      mistakeDots.appendChild(d);
    }
  }

  // ── Chip (placed word) ───────────────────────────────────────────────────
  function addChip(box, text, isRevealed) {
    const chip = document.createElement("span");
    chip.className       = "word-chip" + (isRevealed ? " revealed" : "");
    chip.textContent     = text;
    chip.dataset.chunk   = text;
    box.appendChild(chip);
    box.classList.add("has-chips");
  }

  function paintAllCorrect(box) {
    Array.from(box.children).forEach(el => {
      el.classList.remove("revealed");
      el.classList.add("correct");
    });
  }

  // ── Auto-reveal ──────────────────────────────────────────────────────────
  function revealAnswer(round) {
    isLocked = true;
    disableTiles();
    clear(sentenceBox);

    // Show answer chips in amber
    round.answer.forEach(chunk => addChip(sentenceBox, chunk, true));

    setStatus("hint", "⚠ Respuesta: " + round.answer.join(" "));

    setTimeout(() => {
      setStatus("", "");
      isLocked = false;
      advanceOrFinish();
    }, 2000);
  }

  // ── Build tiles ──────────────────────────────────────────────────────────
  function buildTiles(round) {
    clear(tilesContainer);
    clear(sentenceBox);
    sentenceBox.classList.remove("has-chips");
    isLocked      = false;
    roundMistakes = 0;
    renderMistakeDots(0);

    // 3 correct + 1 distractor = 4 tiles total
    const allTiles = shuffle([...round.answer, ...round.wrong]);

    allTiles.forEach(chunk => {
      const isCorrect = round.answer.includes(chunk);
      const btn = document.createElement("button");
      btn.className   = "tile";
      btn.type        = "button";
      btn.textContent = chunk;

      const handler = () => {
        if (isLocked || btn.disabled) return;

        if (!isCorrect) {
          // Wrong distractor
          roundMistakes++;
          totalWrong++;
          updateScoreUI();
          renderMistakeDots(roundMistakes);
          btn.classList.add("wrong");
          playSfx(SFX_BAD);
          setStatus("bad", "✗");
          isLocked = true;

          if (roundMistakes >= MAX_MISTAKES) {
            disableTiles();
            setTimeout(() => revealAnswer(round), 500);
          } else {
            setTimeout(() => {
              btn.classList.remove("wrong");
              isLocked = false;
              setStatus("", "");
            }, 600);
          }
          return;
        }

        // Correct chunk tapped
        addChip(sentenceBox, chunk, false);
        btn.disabled = true;

        const current = getChunks(sentenceBox);
        if (current.length < round.answer.length) return; // still building

        if (arraysEqual(current, round.answer)) {
          // Complete + correct order
          isLocked = true;
          paintAllCorrect(sentenceBox);
          totalCorrect++;
          updateScoreUI();
          playSfx(SFX_OK);
          setStatus("ok", "✓");
          disableTiles();
          setTimeout(() => {
            setStatus("", "");
            isLocked = false;
            advanceOrFinish();
          }, 1000);
        } else {
          // All correct chunks but wrong order → reset
          roundMistakes++;
          totalWrong++;
          updateScoreUI();
          renderMistakeDots(roundMistakes);
          isLocked = true;
          playSfx(SFX_BAD);
          setStatus("bad", "✗ Orden incorrecto");
          disableTiles();

          if (roundMistakes >= MAX_MISTAKES) {
            setTimeout(() => revealAnswer(round), 600);
          } else {
            setTimeout(() => {
              clear(sentenceBox);
              sentenceBox.classList.remove("has-chips");
              enableTiles();
              setStatus("", "");
              isLocked = false;
            }, 700);
          }
        }
      };

      btn.addEventListener("click", handler);
      btn.addEventListener("touchstart", e => { e.preventDefault(); handler(); }, { passive: false });
      tilesContainer.appendChild(btn);
    });
  }

  // ── Load round ───────────────────────────────────────────────────────────
  function loadRound(i) {
    idx = i;
    stopAudio();
    setStatus("", "");
    isLocked = false;

    const round = SHUFFLED[idx];
    roundLabel.textContent    = `${idx + 1} / ${TOTAL}`;
    itemImg.src               = IMG + round.image;
    itemImg.alt               = "";
    questionLabel.textContent = CONFIG.questionLabel;
    questionText.textContent  = round.question;
    playLabel.textContent     = CONFIG.play;

    buildBlock.classList.add("hidden");
    clear(sentenceBox);
    clear(tilesContainer);
    renderMistakeDots(0);
  }

  // ── Play button ──────────────────────────────────────────────────────────
  const handlePlay = () => {
    stopAudio();
    const round = SHUFFLED[idx];
    audio = new Audio(AUD + round.audio);

    const showBuild = () => {
      if (buildBlock.classList.contains("hidden")) {
        buildTitle.textContent = CONFIG.buildTitle;
        buildTiles(round);
        buildBlock.classList.remove("hidden");
        buildBlock.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    };

    audio.onended = showBuild;
    audio.play().catch(showBuild);
  };

  playBtn.addEventListener("click", handlePlay);
  playBtn.addEventListener("touchstart", e => { e.preventDefault(); handlePlay(); }, { passive: false });

  // ── Advance ──────────────────────────────────────────────────────────────
  function advanceOrFinish() {
    if (idx < TOTAL - 1) loadRound(idx + 1);
    else finish();
  }

  // ── Finish ───────────────────────────────────────────────────────────────
  function finish() {
    stopAudio();
    markPageComplete();
    exerciseBox.classList.add("hidden");
    roundLabel.classList.add("hidden");
    mistakeDots.classList.add("hidden");
    refPanel.classList.add("hidden");
    scoreBar.classList.add("hidden");

    endCorrectEl.textContent = totalCorrect;
    endWrongEl.textContent   = totalWrong;
    endTitle.textContent     = CONFIG.end.title;
    endMsg1.textContent      = CONFIG.end.msg1;
    endMsg2.textContent      = CONFIG.end.msg2;
    endScreen.classList.remove("hidden");
  }

  // ── Ref panel ────────────────────────────────────────────────────────────
  refToggle.addEventListener("click", () => {
    const open = refBody.classList.contains("open");
    refBody.classList.toggle("open", !open);
    refToggle.classList.toggle("open", !open);
  });

  function buildRefTable() {
    refThEn.textContent        = CONFIG.colEn;
    refThEs.textContent        = CONFIG.colEs;
    refToggleLabel.textContent = CONFIG.refLabel;
    CONFIG.pronRows.forEach(row => {
      const tr = document.createElement("tr");
      const tdEn = document.createElement("td"); tdEn.className = "col-en"; tdEn.textContent = row.en;
      const tdEs = document.createElement("td"); tdEs.className = "col-es"; tdEs.textContent = row.es;
      tr.append(tdEn, tdEs);
      refTableBody.appendChild(tr);
    });
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  instrLine.textContent = CONFIG.instr;
  buildRefTable();
  loadRound(0);
})();
</script>
</body>
