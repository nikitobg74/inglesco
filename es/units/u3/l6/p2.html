<!-- u3/l6/p2.html (Mobile-first) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 6 • Parte 2</title>
<link rel="icon" type="image/svg+xml" href="../../../favicon.svg">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
    }
    .wrap { max-width: 820px; margin: 0 auto; }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 15px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
    }
    .back-btn:hover { background: #1e40af; }

    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0 25px 0;
    }
    .step {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    .top-title {
      text-align: center;
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 900;
    }
    .subline {
      text-align: center;
      margin: 0 0 18px 0;
      font-size: 16px;
      font-weight: 800;
    }
    .subline span {
      background: rgba(255,255,255,.7);
      padding: 6px 10px;
      border-radius: 10px;
      display: inline-block;
    }

    .card {
      background: rgba(255,255,255,.85);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    .ref-panel {
      background: #f0fdf4;
      border: 2px solid #86efac;
      border-radius: 14px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .ref-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-weight: 900;
      font-size: 14px;
      color: #166534;
      text-align: left;
    }
    .ref-toggle:hover        { background: #dcfce7; }
    .ref-toggle .arrow       { font-size: 12px; transition: transform .25s; display: inline-block; }
    .ref-toggle.open .arrow  { transform: rotate(180deg); }
    .ref-body                { max-height: 0; overflow: hidden; transition: max-height .3s ease; }
    .ref-body.open           { max-height: 400px; }
    .ref-body-inner          { padding: 0 14px 14px; }

    .pron-table { width: 100%; border-collapse: collapse; font-size: 15px; }
    .pron-table thead th {
      background: #dcfce7; color: #166534; font-weight: 900;
      padding: 7px 10px; text-align: center; font-size: 12px;
      letter-spacing: .04em; text-transform: uppercase;
    }
    .pron-table thead th:first-child { border-radius: 10px 0 0 0; }
    .pron-table thead th:last-child  { border-radius: 0 10px 0 0; }
    .pron-table tbody tr:nth-child(odd)  { background: #fff; }
    .pron-table tbody tr:nth-child(even) { background: #f0fdf4; }
    .pron-table td           { padding: 9px 14px; vertical-align: middle; }
    .pron-table td.col-en    { font-weight: 900; color: #7c3aed; font-size: 17px; }
    .pron-table td.col-es    { color: #374151; font-style: italic; font-size: 14px; }

    .round { text-align: center; font-weight: 900; margin: 4px 0 14px 0; opacity: .85; }

    .exercise { max-width: 620px; margin: 0 auto; display: grid; gap: 16px; }

    .img-block { text-align: center; }
    .item-img {
      width: 100%; max-width: 340px; height: 220px; object-fit: cover;
      border-radius: 16px; box-shadow: 0 6px 18px rgba(0,0,0,.12);
      display: block; margin: 0 auto 14px; background: #e5e7eb;
    }
    .play-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; background: #2563eb; color: #fff; border: none;
      border-radius: 14px; font-weight: 900; font-size: 17px; cursor: pointer;
      box-shadow: 0 6px 14px rgba(37,99,235,.30); transition: background .2s, transform .1s;
    }
    .play-btn:hover  { background: #1e40af; }
    .play-btn:active { transform: scale(.97); }
    .play-btn svg    { width: 22px; height: 22px; fill: #fff; }

    .question-card {
      background: rgba(255,255,255,.78); border-radius: 16px;
      padding: 14px 16px; box-shadow: 0 6px 16px rgba(0,0,0,.06); text-align: center;
    }
    .question-label { font-size: 13px; font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: .04em; margin-bottom: 6px; }
    .question-text  { font-size: 19px; font-weight: 900; color: #1e3a5f; }

    .build-block {
      background: rgba(255,255,255,.78); border-radius: 16px;
      padding: 14px; box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }
    .build-title {
      font-size: 14px; font-weight: 900; color: #374151;
      text-align: center; margin-bottom: 10px; opacity: .8;
      text-transform: uppercase; letter-spacing: .03em;
    }
    .sentence-box {
      min-height: 52px; display: flex; flex-wrap: wrap; gap: 8px;
      align-items: center; justify-content: center;
      border: 2px dashed #cbd5e1; border-radius: 14px;
      padding: 10px; background: #fff; margin-bottom: 12px;
    }
    .word-chip {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 38px; padding: 7px 14px; border-radius: 10px;
      background: #eff6ff; border: 2px solid #93c5fd;
      font-weight: 900; font-size: 16px; white-space: nowrap;
    }
    .word-chip.correct { background: rgba(22,163,74,.12); border-color: #16a34a; color: #166534; }

    .tiles { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .tile {
      border: 0; border-radius: 12px; padding: 11px 16px; font-weight: 900;
      cursor: pointer; box-shadow: 0 6px 14px rgba(0,0,0,.10);
      background: #2563eb; color: #fff; font-size: 15px;
      transition: background .15s, transform .1s; white-space: nowrap;
    }
    .tile:hover:not(:disabled) { background: #1e40af; }
    .tile:active               { transform: scale(.97); }
    .tile:disabled             { opacity: .5; cursor: not-allowed; }
    .tile.correct              { background: #16a34a !important; }
    .tile.wrong                { background: #dc2626 !important; }

    .status-line { text-align: center; min-height: 24px; font-weight: 900; font-size: 18px; }
    .status-line.ok  { color: #16a34a; }
    .status-line.bad { color: #dc2626; }

    .hidden { display: none !important; }

    .end { text-align: center; padding: 16px 10px 4px; }
    .end .trophy { font-size: 52px; margin-bottom: 8px; }
    .end h2 { margin: 8px 0; font-size: 24px; font-weight: 900; }
    .end p  { margin: 6px 0; font-weight: 800; }

    @media (max-width: 520px) {
      .step { width: 34px; height: 34px; font-size: 14px; }
      .top-title { font-size: 18px; }
      .item-img { height: 180px; }
      .question-text { font-size: 17px; }
      .tile { font-size: 13px; padding: 10px 12px; }
      .word-chip { font-size: 15px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 6 • Parte 2</div>
    <div class="subline">
      <span id="instrLine"></span>
    </div>

    <div class="progress-container">
      <a class="step" href="p1.html" aria-label="Parte 1">1</a>
      <a class="step active" href="p2.html" aria-label="Parte 2">2</a>
      <a class="step" href="p3.html" aria-label="Parte 3">3</a>
      <a class="step" href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">

      <div class="ref-panel" id="refPanel">
        <button class="ref-toggle" id="refToggle">
          <span id="refToggleLabel"></span>
          <span class="arrow">▼</span>
        </button>
        <div class="ref-body" id="refBody">
          <div class="ref-body-inner">
            <table class="pron-table">
              <thead><tr><th id="refThEn"></th><th id="refThEs"></th></tr></thead>
              <tbody id="refTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <div class="round" id="roundLabel">1 / 11</div>

      <div class="exercise" id="exerciseBox">
        <div class="img-block">
          <img class="item-img" id="itemImg" src="" alt="" />
          <button class="play-btn" id="playBtn">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <span id="playLabel"></span>
          </button>
        </div>

        <div class="question-card">
          <div class="question-label" id="questionLabel"></div>
          <div class="question-text"  id="questionText"></div>
        </div>

        <div class="build-block hidden" id="buildBlock">
          <div class="build-title" id="buildTitle"></div>
          <div class="sentence-box"  id="sentenceBox"></div>
          <div class="tiles"         id="tilesContainer"></div>
        </div>

        <div class="status-line" id="statusLine" aria-live="polite"></div>
      </div>

      <div class="end hidden" id="endScreen">
        <div class="trophy">🏆</div>
        <h2 id="endTitle"></h2>
        <p  id="endMsg1"></p>
        <p  id="endMsg2"></p>
      </div>

    </div>
  </div>

  <script src="../../../../js/u3/u3_l6_p2.js"></script>
</body>
</html>
