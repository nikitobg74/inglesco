  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe 0%, #fef9c3 100%);
      min-height: 100vh;
    }

    .wrap { max-width: 680px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 18px;
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
      transition: background .2s;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── Step dots ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 20px;
    }
    .step {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
      cursor: pointer;
      transition: all .25s;
      color: #374151;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; box-shadow: 0 4px 12px rgba(37,99,235,.35); }
    .step:hover:not(.active) { background: #9ca3af; transform: scale(1.08); }

    /* ── Page title ── */
    .top-title {
      text-align: center;
      margin: 0 0 6px;
      font-size: 19px;
      font-weight: 900;
      color: #1e3a5f;
    }
    .subline {
      text-align: center;
      margin: 0 0 16px;
    }
    .subline span {
      background: rgba(255,255,255,.75);
      padding: 5px 12px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      color: #374151;
      display: inline-block;
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Score bar ── */
    .score-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 20px;
      margin-bottom: 12px;
    }
    .score-item {
      display: flex; align-items: center; gap: 6px;
      font-weight: 800; font-size: 15px;
    }
    .score-item .dot { width: 12px; height: 12px; border-radius: 50%; }
    .score-item.correct-score .dot { background: #16a34a; }
    .score-item.wrong-score   .dot { background: #dc2626; }
    .score-item.correct-score { color: #15803d; }
    .score-item.wrong-score   { color: #b91c1c; }

    /* ── Round label ── */
    .round {
      text-align: center;
      font-weight: 900; font-size: 14px;
      margin: 0 0 10px;
      color: #6b7280;
    }

    /* ── Mistake dots ── */
    .mistake-dots {
      display: flex; justify-content: center; gap: 6px;
      min-height: 18px; margin-bottom: 12px;
    }
    .m-dot { width: 10px; height: 10px; border-radius: 50%; background: #fca5a5; }
    .m-dot.filled { background: #dc2626; }

    /* ── Exercise ── */
    .exercise { display: grid; gap: 14px; }

    /* ── Image ── */
    .img-wrapper {
      background: #f1f5f9;
      border-radius: 16px;
      overflow: hidden;
    }
    .item-img {
      width: 100%; max-width: 100%;
      height: 210px;
      object-fit: contain;
      display: block;
      background: #f1f5f9;
    }

    /* ── Play button ── */
    .play-btn {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; width: 100%;
      padding: 13px;
      background: #2563eb; color: #fff;
      border: none; border-radius: 14px;
      font-weight: 900; font-size: 16px;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 5px 14px rgba(37,99,235,.28);
      transition: background .2s, transform .1s;
    }
    .play-btn:hover  { background: #1e40af; }
    .play-btn:active { transform: scale(.97); }
    .play-btn svg { width: 22px; height: 22px; fill: #fff; flex-shrink: 0; }

    /* ── Build block ── */
    .build-block {
      background: rgba(255,255,255,.8);
      border-radius: 14px;
      padding: 14px;
      box-shadow: 0 4px 12px rgba(0,0,0,.06);
    }
    .build-title {
      font-size: 13px; font-weight: 900; color: #6b7280;
      text-align: center; margin-bottom: 10px;
      text-transform: uppercase; letter-spacing: .04em;
    }

    /* ── Sentence drop zone ── */
    .sentence-box {
      min-height: 54px;
      display: flex; flex-wrap: wrap; gap: 8px;
      align-items: center; justify-content: center;
      border: 2px dashed #cbd5e1;
      border-radius: 14px;
      padding: 10px 12px;
      background: #fff;
      margin-bottom: 14px;
      transition: border-color .2s;
    }
    .sentence-box.has-chips { border-color: #93c5fd; }

    /* ── Per-slot grading colors ── */
    .word-chip {
      display: inline-flex; align-items: center; justify-content: center;
      min-height: 36px;
      padding: 6px 13px;
      border-radius: 10px;
      background: #eff6ff; border: 2px solid #93c5fd;
      font-weight: 800; font-size: 15px;
      white-space: nowrap;
      color: #1e3a5f;
      transition: background .15s, border-color .15s;
    }
    .word-chip.correct  { background: rgba(22,163,74,.12);  border-color: #16a34a; color: #166534; }
    .word-chip.wrong-slot { background: rgba(220,38,38,.10); border-color: #dc2626; color: #991b1b; }
    .word-chip.revealed { background: rgba(245,158,11,.15); border-color: #f59e0b; color: #92400e; }

    /* ── Tiles ── */
    .tiles {
      display: flex; flex-wrap: wrap; gap: 10px; justify-content: center;
    }
    .tile {
      border: 0; border-radius: 12px;
      padding: 11px 16px;
      font-weight: 900; font-size: 15px;
      cursor: pointer; font-family: inherit;
      box-shadow: 0 4px 12px rgba(0,0,0,.11);
      background: #2563eb; color: #fff;
      white-space: nowrap;
      transition: background .15s, transform .1s, opacity .2s;
    }
    .tile:hover:not(:disabled) { background: #1e40af; }
    .tile:active { transform: scale(.96); }
    .tile:disabled { opacity: .35; cursor: not-allowed; }
    .tile.used    { opacity: .35; }
    .tile.wrong   { background: #dc2626 !important; }
    .tile.revealed { background: #f59e0b !important; }

    /* ── Status ── */
    .status-line {
      text-align: center; min-height: 26px;
      font-weight: 900; font-size: 17px;
    }
    .status-line.ok   { color: #16a34a; }
    .status-line.bad  { color: #dc2626; }
    .status-line.hint { color: #d97706; }

    /* ── End ── */
    .end { text-align: center; padding: 20px 10px 8px; }
    .end .trophy { font-size: 54px; margin-bottom: 6px; }
    .end h2 { margin: 8px 0 4px; font-size: 24px; font-weight: 900; color: #1e3a5f; }
    .end .end-score {

    .end .es-item.correct-score .es-num { color: #16a34a; }
    .end .es-item.wrong-score   .es-num { color: #dc2626; }
    .end p { margin: 6px 0; font-weight: 700; color: #374151; }

    .hidden { display: none !important; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      body { padding: 12px; }
      .step { width: 34px; height: 34px; font-size: 13px; }
      .top-title { font-size: 17px; }
      .item-img { height: 175px; }
      .tile { font-size: 13px; padding: 10px 12px; }
      .word-chip { font-size: 14px; padding: 6px 11px; }
      .play-btn { font-size: 15px; }
    }
  </style>

<script>
(() => {
  "use strict";

  // ── Asset paths ──────────────────────────────────────────────────────────
  const SB      = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG     = SB + "images/u3/";
  const AUD     = SB + "audio/u3/";
  const SFX_OK  = new Audio(SB + "audio/u3/correct.wav");
  const SFX_BAD = new Audio(SB + "audio/u3/incorrect.wav");

  // ── Progress / localStorage ──────────────────────────────────────────────
  const PROGRESS_KEY = "inglesco_progress_u3";
  const LESSON_KEY   = "inglesco_furthest_u3_l6";

  function markPageComplete() {
    try {
      const prev = parseInt(localStorage.getItem(LESSON_KEY) || "0", 10);
      if (3 > prev) localStorage.setItem(LESSON_KEY, "3");
    } catch(e) {}
    try {
      const raw  = localStorage.getItem(PROGRESS_KEY);
      const data = raw ? JSON.parse(raw) : {};
      if (!data.l6) data.l6 = { partsCompleted: 0, partsTotal: 4 };
      if (data.l6.partsCompleted < 3) data.l6.partsCompleted = 3;
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));
    } catch(e) {}
  }

  // ── DOM ──────────────────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const roundLabel     = $("roundLabel");
  const mistakeDots    = $("mistakeDots");
  const exerciseBox    = $("exerciseBox");
  const endScreen      = $("endScreen");
  const instrLine      = $("instrLine");
  const scoreBar       = $("scoreBar");
  const correctCountEl = $("correctCount");
  const wrongCountEl   = $("wrongCount");
  const itemImg        = $("itemImg");
  const playBtn        = $("playBtn");
  const playLabel      = $("playLabel");
  const buildBlock     = $("buildBlock");
  const buildTitle     = $("buildTitle");
  const sentenceBox    = $("sentenceBox");
  const tilesContainer = $("tilesContainer");
  const statusLine     = $("statusLine");
  const endTitle       = $("endTitle");
  const endMsg1        = $("endMsg1");
  const endMsg2        = $("endMsg2");
  const endCorrectEl   = $("endCorrect");
  const endWrongEl     = $("endWrong");

  // ── Config ───────────────────────────────────────────────────────────────
  const MAX_MISTAKES = 2;

  const CONFIG = {
    instr:      "Escucha y ordena las palabras para formar la oración.",
    buildTitle: "Ordena las palabras:",
    play:       "Escuchar",
    end: {
      title: "¡Excelente trabajo!",
      msg1:  "Felicitaciones.",
      msg2:  "Terminaste la Parte 3."
    }
  };

  // ── Rounds ───────────────────────────────────────────────────────────────
  // Reduced to 1 distractor (was 2) → 6 tiles total instead of 7
  const ROUNDS = [
    {
      image:       "u3.l6.p1.fix.car.jpg",
      audio:       "u3.l6.p3.fix.car.mp3",
      answer:      ["I", "am", "fixing", "my", "car."],
      distractors: ["her"]
    },
    {
      image:       "u3.l6.p1.woman.fix.car.jpg",
      audio:       "u3.l6.p3.woman.fix.car.mp3",
      answer:      ["She", "is", "fixing", "her", "car."],
      distractors: ["his"]
    },
    {
      image:       "u3.l6.p1.fix.sink.jpg",
      audio:       "u3.l6.p3.fix.sink.mp3",
      answer:      ["He", "is", "fixing", "his", "sink."],
      distractors: ["her"]
    },
    {
      image:       "u3.l6.p1.woman.clean.apartment.jpg",
      audio:       "u3.l6.p3.woman.clean.apartment.mp3",
      answer:      ["She", "is", "cleaning", "her", "apartment."],
      distractors: ["his"]
    },
    {
      image:       "u3.l6.p1.man.clean.window.jpg",
      audio:       "u3.l6.p3.man.clean.window.mp3",
      answer:      ["He", "is", "cleaning", "his", "window."],
      distractors: ["her"]
    },
    {
      image:       "u3.l6.p1.feed.cat.jpg",
      audio:       "u3.l6.p3.feed.cat.mp3",
      answer:      ["I", "am", "feeding", "my", "cat."],
      distractors: ["her"]
    },
    {
      image:       "u3.l6.p1.doing.homework.jpg",
      audio:       "u3.l6.p3.doing.homework.mp3",
      answer:      ["They", "are", "doing", "their", "homework."],
      distractors: ["our"]
    },
    {
      image:       "u3.l6.p1.woman.washing.clothes.jpg",
      audio:       "u3.l6.p3.woman.washing.clothes.mp3",
      answer:      ["She", "is", "washing", "her", "clothes."],
      distractors: ["his"]
    },
    {
      image:       "u3.l6.p1.painting.jpg",
      audio:       "u3.l6.p3.painting.mp3",
      answer:      ["We", "are", "painting", "our", "bedroom."],
      distractors: ["their"]
    },
    {
      image:       "u3.l6.p1.girl.brushing.teeth.jpg",
      audio:       "u3.l6.p3.girl.brushing.teeth.mp3",
      answer:      ["I", "am", "brushing", "my", "teeth."],
      distractors: ["her"]
    },
    {
      image:       "u3.l6.p1.man.read.email.jpg",
      audio:       "u3.l6.p3.man.read.email.mp3",
      answer:      ["He", "is", "reading", "his", "emails."],
      distractors: ["her"]
    }
  ];

  // ── Shuffle ──────────────────────────────────────────────────────────────
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const SHUFFLED = shuffle(ROUNDS);
  const TOTAL    = SHUFFLED.length;
  let idx           = 0;
  let audio         = null;
  let isLocked      = false;
  let roundMistakes = 0;
  let totalCorrect  = 0;
  let totalWrong    = 0;

  // ── Helpers ──────────────────────────────────────────────────────────────
  function clear(el) { while (el.firstChild) el.removeChild(el.firstChild); }

  function stopAudio() {
    if (!audio) return;
    try { audio.pause(); audio.currentTime = 0; } catch(e) {}
  }

  function playSfx(sfx) {
    try { sfx.currentTime = 0; sfx.play(); } catch(e) {}
  }

  function setStatus(type, text) {
    statusLine.textContent = text;
    statusLine.className   = "status-line" + (type ? " " + type : "");
  }

  function updateScoreUI() {
    correctCountEl.textContent = totalCorrect;
    wrongCountEl.textContent   = totalWrong;
  }

  function getWords(box) {
    return Array.from(box.children).map(el => el.dataset.word);
  }

  function arraysEqual(a, b) {
    return a.length === b.length && a.every((v, i) => v === b[i]);
  }

  function disableTiles() {
    Array.from(tilesContainer.querySelectorAll(".tile")).forEach(b => { b.disabled = true; });
  }

  function enableTiles() {
    Array.from(tilesContainer.querySelectorAll(".tile"))
      .forEach(b => { b.disabled = false; b.classList.remove("wrong", "used"); });
  }

  // ── Mistake dots ─────────────────────────────────────────────────────────
  function renderMistakeDots(count) {
    mistakeDots.innerHTML = "";
    for (let i = 0; i < MAX_MISTAKES; i++) {
      const d = document.createElement("div");
      d.className = "m-dot" + (i < count ? " filled" : "");
      mistakeDots.appendChild(d);
    }
  }

  // ── Chip ─────────────────────────────────────────────────────────────────
  function addChip(box, word, cls) {
    const chip = document.createElement("span");
    chip.className    = "word-chip" + (cls ? " " + cls : "");
    chip.dataset.word = word;
    chip.textContent  = word;
    box.appendChild(chip);
    box.classList.add("has-chips");
  }

  // ── Per-slot grading on wrong order ──────────────────────────────────────
  function gradeSlots(box, target) {
    const chips = Array.from(box.children);
    chips.forEach((chip, i) => {
      chip.classList.remove("correct", "wrong-slot");
      chip.classList.add(chip.dataset.word === target[i] ? "correct" : "wrong-slot");
    });
  }

  function paintAllCorrect(box) {
    Array.from(box.children).forEach(el => {
      el.classList.remove("wrong-slot", "revealed");
      el.classList.add("correct");
    });
  }

  // ── Auto-reveal ──────────────────────────────────────────────────────────
  function revealAnswer(round) {
    isLocked = true;
    disableTiles();
    clear(sentenceBox);
    sentenceBox.classList.remove("has-chips");

    round.answer.forEach(w => addChip(sentenceBox, w, "revealed"));
    setStatus("hint", "⚠ Respuesta: " + round.answer.join(" "));

    setTimeout(() => {
      setStatus("", "");
      isLocked = false;
      advanceOrFinish();
    }, 2000);
  }

  // ── Build tiles ──────────────────────────────────────────────────────────
  function buildTiles(round) {
    clear(tilesContainer);
    clear(sentenceBox);
    sentenceBox.classList.remove("has-chips");
    isLocked      = false;
    roundMistakes = 0;
    renderMistakeDots(0);

    const answerSet = new Set(round.answer);
    const allWords  = shuffle([...round.answer, ...round.distractors]);

    allWords.forEach(word => {
      const isCorrectWord = answerSet.has(word);
      const btn = document.createElement("button");
      btn.className    = "tile";
      btn.type         = "button";
      btn.textContent  = word;
      btn.dataset.word = word;

      const handler = () => {
        if (isLocked || btn.disabled) return;

        // ── Distractor tapped ──
        if (!isCorrectWord) {
          roundMistakes++;
          totalWrong++;
          updateScoreUI();
          renderMistakeDots(roundMistakes);
          btn.classList.add("wrong");
          playSfx(SFX_BAD);
          setStatus("bad", "✗ Esa palabra no pertenece aquí.");
          isLocked = true;

          if (roundMistakes >= MAX_MISTAKES) {
            disableTiles();
            setTimeout(() => revealAnswer(round), 500);
          } else {
            setTimeout(() => {
              btn.classList.remove("wrong");
              isLocked = false;
              setStatus("", "");
            }, 600);
          }
          return;
        }

        // ── Correct word tapped ──
        addChip(sentenceBox, word, "");
        btn.disabled = true;
        btn.classList.add("used");

        const current = getWords(sentenceBox);
        if (current.length < round.answer.length) return; // still building

        // All words placed — check order
        if (arraysEqual(current, round.answer)) {
          isLocked = true;
          paintAllCorrect(sentenceBox);
          totalCorrect++;
          updateScoreUI();
          playSfx(SFX_OK);
          setStatus("ok", "✓");
          disableTiles();
          setTimeout(() => {
            setStatus("", "");
            isLocked = false;
            advanceOrFinish();
          }, 1000);
        } else {
          // Wrong order — grade slots, then reset
          roundMistakes++;
          totalWrong++;
          updateScoreUI();
          renderMistakeDots(roundMistakes);
          isLocked = true;
          playSfx(SFX_BAD);
          gradeSlots(sentenceBox, round.answer);
          setStatus("bad", "Revisa las palabras en rojo.");
          disableTiles();

          if (roundMistakes >= MAX_MISTAKES) {
            setTimeout(() => revealAnswer(round), 1000);
          } else {
            setTimeout(() => {
              clear(sentenceBox);
              sentenceBox.classList.remove("has-chips");
              enableTiles();
              setStatus("", "");
              isLocked = false;
            }, 1000);
          }
        }
      };

      btn.addEventListener("click", handler);
      btn.addEventListener("touchstart", e => { e.preventDefault(); handler(); }, { passive: false });
      tilesContainer.appendChild(btn);
    });
  }

  // ── Load round ───────────────────────────────────────────────────────────
  function loadRound(i) {
    idx = i;
    stopAudio();
    setStatus("", "");
    isLocked = false;

    const round = SHUFFLED[idx];
    roundLabel.textContent = `${idx + 1} / ${TOTAL}`;
    itemImg.src            = IMG + round.image;
    itemImg.alt            = "";
    playLabel.textContent  = CONFIG.play;

    buildBlock.classList.add("hidden");
    clear(sentenceBox);
    clear(tilesContainer);
    renderMistakeDots(0);
  }

  // ── Play button ──────────────────────────────────────────────────────────
  const handlePlay = () => {
    stopAudio();
    const round = SHUFFLED[idx];
    audio = new Audio(AUD + round.audio);

    const showBuild = () => {
      if (buildBlock.classList.contains("hidden")) {
        buildTitle.textContent = CONFIG.buildTitle;
        buildTiles(round);
        buildBlock.classList.remove("hidden");
        buildBlock.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    };

    audio.onended = showBuild;
    audio.play().catch(showBuild);
  };

  playBtn.addEventListener("click", handlePlay);
  playBtn.addEventListener("touchstart", e => { e.preventDefault(); handlePlay(); }, { passive: false });

  // ── Advance ──────────────────────────────────────────────────────────────
  function advanceOrFinish() {
    if (idx < TOTAL - 1) loadRound(idx + 1);
    else finish();
  }

  // ── Finish ───────────────────────────────────────────────────────────────
  function finish() {
    stopAudio();
    markPageComplete();
    exerciseBox.classList.add("hidden");
    roundLabel.classList.add("hidden");
    mistakeDots.classList.add("hidden");
    scoreBar.classList.add("hidden");

    endCorrectEl.textContent = totalCorrect;
    endWrongEl.textContent   = totalWrong;
    endTitle.textContent     = CONFIG.end.title;
    endMsg1.textContent      = CONFIG.end.msg1;
    endMsg2.textContent      = CONFIG.end.msg2;
    endScreen.classList.remove("hidden");
  }

  // ── Init ─────────────────────────────────────────────────────────────────
  instrLine.textContent = CONFIG.instr;
  loadRound(0);
})();
</script>
</body>
</html>
