<!-- u3/l6/p4.html (Mobile-first) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 6 • Parte 4</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
    }
    .wrap { max-width: 820px; margin: 0 auto; }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 15px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
    }
    .back-btn:hover { background: #1e40af; }

    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0 25px 0;
    }
    .step {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    .top-title {
      text-align: center;
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 900;
    }
    .subline {
      text-align: center;
      margin: 0 0 18px 0;
      font-size: 16px;
      font-weight: 800;
    }
    .subline span {
      background: rgba(255,255,255,.7);
      padding: 6px 10px;
      border-radius: 10px;
      display: inline-block;
    }

    .card {
      background: rgba(255,255,255,.85);
      border-radius: 18px;
      padding: 14px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    .round { text-align: center; font-weight: 900; margin: 4px 0 14px 0; opacity: .85; }

    .exercise { max-width: 620px; margin: 0 auto; display: grid; gap: 16px; }

    .img-block { text-align: center; }
    .item-img {
      width: 100%; max-width: 340px; height: 220px; object-fit: cover;
      border-radius: 16px; box-shadow: 0 6px 18px rgba(0,0,0,.12);
      display: block; margin: 0 auto 14px; background: #e5e7eb;
    }
    .play-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; background: #2563eb; color: #fff; border: none;
      border-radius: 14px; font-weight: 900; font-size: 17px; cursor: pointer;
      box-shadow: 0 6px 14px rgba(37,99,235,.30); transition: background .2s, transform .1s;
    }
    .play-btn:hover  { background: #1e40af; }
    .play-btn:active { transform: scale(.97); }
    .play-btn svg    { width: 22px; height: 22px; fill: #fff; }

    /* ── Sentence + blanks ── */
    .build-block {
      background: rgba(255,255,255,.78); border-radius: 16px;
      padding: 18px 14px; box-shadow: 0 6px 16px rgba(0,0,0,.06);
    }

    .sentence-display {
      display: flex; flex-wrap: wrap; align-items: center;
      justify-content: center; gap: 4px 2px;
      font-size: 20px; font-weight: 800; color: #1e3a5f;
      line-height: 1.8; margin-bottom: 16px; text-align: center;
    }

    .blank-input {
      display: inline-block;
      border: none;
      border-bottom: 3px solid #2563eb;
      background: transparent;
      font-size: 20px;
      font-weight: 900;
      color: #2563eb;
      text-align: center;
      outline: none;
      padding: 2px 4px;
      min-width: 80px;
      transition: border-color .2s, background .2s;
      border-radius: 4px 4px 0 0;
    }
    .blank-input:focus {
      background: #eff6ff;
      border-color: #1d4ed8;
    }
    .blank-input.correct {
      color: #16a34a;
      border-color: #16a34a;
      background: rgba(22,163,74,.08);
    }
    .blank-input.wrong {
      color: #dc2626;
      border-color: #dc2626;
      background: rgba(220,38,38,.08);
      animation: shake .3s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }

    .check-btn {
      display: block; margin: 0 auto;
      padding: 12px 36px; background: #7c3aed; color: #fff; border: none;
      border-radius: 14px; font-weight: 900; font-size: 17px; cursor: pointer;
      box-shadow: 0 6px 14px rgba(124,58,237,.30); transition: background .2s, transform .1s;
    }
    .check-btn:hover:not(:disabled) { background: #6d28d9; }
    .check-btn:active               { transform: scale(.97); }
    .check-btn:disabled             { opacity: .5; cursor: not-allowed; }

    /* ── Hint box ── */
    .hint-box {
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      color: #92400e;
      background: #fef3c7;
      border: 2px solid #fcd34d;
      border-radius: 12px;
      padding: 10px 20px;
      margin-top: 12px;
      opacity: 0;
      transform: translateY(-6px);
      transition: opacity .2s ease, transform .2s ease;
      pointer-events: none;
      min-height: 48px;
    }
    .hint-box.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .status-line { text-align: center; min-height: 24px; font-weight: 900; font-size: 18px; margin-top: 4px; }
    .status-line.ok  { color: #16a34a; }
    .status-line.bad { color: #dc2626; }

    .hidden { display: none !important; }

    .end { text-align: center; padding: 16px 10px 4px; }
    .end .trophy { font-size: 52px; margin-bottom: 8px; }
    .end h2 { margin: 8px 0; font-size: 24px; font-weight: 900; }
    .end p  { margin: 6px 0; font-weight: 800; }

    /* ── difficulty badge ── */
    .diff-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      margin-bottom: 10px;
    }
    .diff-badge.easy { background: #dcfce7; color: #166534; }
    .diff-badge.hard { background: #fce7f3; color: #9d174d; }

    @media (max-width: 520px) {
      .step { width: 34px; height: 34px; font-size: 14px; }
      .top-title { font-size: 18px; }
      .item-img { height: 180px; }
      .sentence-display { font-size: 17px; }
      .blank-input { font-size: 17px; min-width: 66px; }
      .check-btn { font-size: 15px; padding: 11px 28px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 6 • Parte 4</div>
    <div class="subline">
      <span id="instrLine"></span>
    </div>

    <div class="progress-container">
      <a class="step" href="p1.html" aria-label="Parte 1">1</a>
      <a class="step" href="p2.html" aria-label="Parte 2">2</a>
      <a class="step" href="p3.html" aria-label="Parte 3">3</a>
      <a class="step active" href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">

      <div class="round" id="roundLabel">1 / 11</div>

      <div class="exercise" id="exerciseBox">

        <div class="img-block">
          <img class="item-img" id="itemImg" src="" alt="" />
          <button class="play-btn" id="playBtn">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <span id="playLabel"></span>
          </button>
        </div>

        <div class="build-block hidden" id="buildBlock">
          <div class="sentence-display" id="sentenceDisplay"></div>
          <button class="check-btn" id="checkBtn"></button>
          <div class="hint-box" id="hintBox"></div>
        </div>

        <div class="status-line" id="statusLine" aria-live="polite"></div>

      </div>

      <div class="end hidden" id="endScreen">
        <div class="trophy">🏆</div>
        <h2 id="endTitle"></h2>
        <p  id="endMsg1"></p>
        <p  id="endMsg2"></p>
      </div>

    </div>
  </div>

  <script src="../../../../js/u3/u3_l6_p4.js"></script>
</body>
</html>
