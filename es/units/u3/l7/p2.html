<!-- u3/l7/p2.html (Mobile-first, self-contained) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 7 • Parte 2</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="manifest" href="../../../../manifest.json">

  <!-- Vercel Analytics -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      min-height: 100vh;
    }

    .wrap { max-width: 640px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── Progress dots ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 22px 0;
    }
    .step {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
      cursor: pointer;
      transition: all .3s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    /* ── Titles ── */
    .top-title {
      text-align: center;
      margin: 0 0 6px 0;
      font-size: 19px; font-weight: 900;
      color: #1e40af;
    }
    .subline {
      text-align: center;
      margin: 0 0 16px 0;
      font-size: 15px; font-weight: 700;
    }
    .subline span {
      background: rgba(255,255,255,.75);
      padding: 6px 12px;
      border-radius: 10px;
      display: inline-block;
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Ref panel ── */
    .ref-panel {
      background: #f0fdf4;
      border: 2px solid #86efac;
      border-radius: 14px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .ref-toggle {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 14px; background: none; border: none;
      cursor: pointer; font-weight: 900; font-size: 14px;
      color: #166534; text-align: left;
    }
    .ref-toggle:hover       { background: #dcfce7; }
    .ref-toggle .arrow      { font-size: 12px; transition: transform .25s; display: inline-block; }
    .ref-toggle.open .arrow { transform: rotate(180deg); }
    .ref-body               { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
    .ref-body.open          { max-height: 600px; }
    .ref-body-inner         { padding: 0 14px 14px; }

    .pron-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .pron-table thead th {
      background: #dcfce7; color: #166534; font-weight: 900;
      padding: 7px 10px; text-align: center; font-size: 11px;
      letter-spacing: .05em; text-transform: uppercase;
    }
    .pron-table thead th:first-child { border-radius: 10px 0 0 0; }
    .pron-table thead th:last-child  { border-radius: 0 10px 0 0; }
    .pron-table tbody tr:nth-child(odd)  { background: #fff; }
    .pron-table tbody tr:nth-child(even) { background: #f0fdf4; }
    .pron-table td        { padding: 8px 12px; vertical-align: middle; }
    .pron-table td.col-q  { font-weight: 900; color: #7c3aed; font-size: 15px; }
    .pron-table td.col-a  { color: #374151; font-style: italic; font-size: 13px; }

    /* ── Round row + counter ── */
    .round-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0 14px 0;
      font-weight: 900;
      font-size: 14px;
      opacity: .85;
    }
    .counter { display: flex; gap: 10px; }
    .counter-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 900; font-size: 13px;
    }
    .counter-badge.correct { background: #dcfce7; color: #16a34a; }
    .counter-badge.wrong   { background: #fee2e2; color: #dc2626; }

    /* ── Exercise layout ── */
    .exercise { max-width: 560px; margin: 0 auto; display: grid; gap: 16px; }

    /* ── Two-image layout ── */
    .img-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      justify-content: center;
    }
    .img-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
      min-width: 0;
    }
    .img-col.right-col { margin-top: 18px; }

    .img-wrap {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #f1f5f9;
      box-shadow: 0 6px 16px rgba(0,0,0,.12);
    }
    .item-img {
      width: 100%;
      height: 160px;
      object-fit: contain;
      display: block;
    }

    /* ── Q / A lines ── */
    .q-line {
      margin-top: 10px;
      font-size: 15px; font-weight: 900;
      color: #1e3a5f; text-align: center;
      line-height: 1.4;
    }
    .a-line {
      margin-top: 8px;
      font-size: 14px; font-weight: 700;
      color: #166534; text-align: center;
      line-height: 1.4;
      background: rgba(220,252,231,.6);
      border-radius: 10px;
      padding: 6px 10px;
    }

    /* ── Play button ── */
    .play-area { text-align: center; }
    .play-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 26px;
      background: #2563eb; color: #fff; border: none;
      border-radius: 14px; font-weight: 900; font-size: 16px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(37,99,235,.28);
      transition: background .2s, transform .1s;
      margin-top: 4px;
    }
    .play-btn:hover  { background: #1e40af; }
    .play-btn:active { transform: scale(.97); }
    .play-btn svg    { width: 20px; height: 20px; fill: #fff; }

    /* ── Next button ── */
    .next-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 26px;
      background: #16a34a; color: #fff; border: none;
      border-radius: 14px; font-weight: 900; font-size: 16px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(22,163,74,.28);
      transition: background .2s, transform .1s;
      margin-top: 4px;
    }
    .next-btn:hover  { background: #15803d; }
    .next-btn:active { transform: scale(.97); }

    /* ── Status ── */
    .status-line {
      text-align: center; min-height: 24px;
      font-weight: 900; font-size: 17px; margin-top: 4px;
    }
    .status-line.ok  { color: #16a34a; }
    .status-line.bad { color: #dc2626; }

    .hidden { display: none !important; }

    /* ── End screen ── */
    .end { text-align: center; padding: 20px 10px 8px; }
    .end .trophy { font-size: 52px; margin-bottom: 8px; }
    .end h2 { margin: 8px 0; font-size: 23px; font-weight: 900; color: #1e40af; }
    .end p  { margin: 6px 0; font-weight: 700; color: #374151; }
    .end .score-summary {
      display: flex; gap: 16px; justify-content: center; margin: 14px 0 4px;
    }
    .end .score-box {
      padding: 10px 20px;
      border-radius: 14px;
      font-weight: 900; font-size: 18px;
    }
    .end .score-box.correct { background: #dcfce7; color: #16a34a; }
    .end .score-box.wrong   { background: #fee2e2; color: #dc2626; }

    .end-nav-btn {
      display: inline-block;
      margin-top: 18px;
      padding: 13px 32px;
      background: #2563eb; color: #fff;
      border-radius: 14px; text-decoration: none;
      font-weight: 900; font-size: 16px;
      box-shadow: 0 6px 14px rgba(37,99,235,.28);
      transition: background .2s;
    }
    .end-nav-btn:hover { background: #1e40af; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .step     { width: 33px; height: 33px; font-size: 13px; }
      .top-title { font-size: 17px; }
      .item-img { height: 130px; }
      .img-row  { gap: 8px; }
      .q-line   { font-size: 13px; }
      .a-line   { font-size: 12px; }
      .play-btn, .next-btn { font-size: 15px; padding: 11px 18px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 7 • Parte 2</div>
    <div class="subline"><span id="instrLine"></span></div>

    <div class="progress-container">
      <a class="step"        href="p1.html" aria-label="Parte 1">1</a>
      <a class="step active" href="p2.html" aria-label="Parte 2">2</a>
      <a class="step"        href="p3.html" aria-label="Parte 3">3</a>
      <a class="step"        href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">

      <!-- Vocab ref panel -->
      <div class="ref-panel" id="refPanel">
        <button class="ref-toggle" id="refToggle">
          <span id="refToggleLabel"></span>
          <span class="arrow">▼</span>
        </button>
        <div class="ref-body" id="refBody">
          <div class="ref-body-inner">
            <table class="pron-table">
              <thead><tr><th id="refThQ"></th><th id="refThA"></th></tr></thead>
              <tbody id="refTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Round label + score counter -->
      <div class="round-row">
        <span id="roundLabel">1 / 7</span>
        <div class="counter">
          <span class="counter-badge correct" id="cntCorrect">✓ 0</span>
          <span class="counter-badge wrong"   id="cntWrong">✗ 0</span>
        </div>
      </div>

      <div class="exercise" id="exerciseBox">

        <!-- Two-image row -->
        <div class="img-row">
          <div class="img-col left-col">
            <div class="img-wrap">
              <img class="item-img" id="imgLeft" src="" alt="" />
            </div>
            <div class="q-line" id="qLine"></div>
          </div>
          <div class="img-col right-col">
            <div class="img-wrap">
              <img class="item-img" id="imgRight" src="" alt="" />
            </div>
            <div class="a-line hidden" id="aLine"></div>
          </div>
        </div>

        <!-- Play / Next buttons -->
        <div class="play-area">
          <button class="play-btn" id="playBtn">
            <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <span id="playLabel"></span>
          </button>
          <button class="next-btn hidden" id="nextBtn">
            <span id="nextLabel"></span> →
          </button>
        </div>

        <div class="status-line" id="statusLine" aria-live="polite"></div>

      </div>

      <div class="end hidden" id="endScreen">
        <div class="trophy">🏆</div>
        <h2 id="endTitle"></h2>
        <p id="endMsg1"></p>
        <div class="score-summary">
          <div class="score-box correct" id="endCorrect"></div>
          <div class="score-box wrong"   id="endWrong"></div>
        </div>
        <a href="p3.html" class="end-nav-btn">Siguiente →</a>
      </div>

    </div>
  </div>

<script>
(() => {
  "use strict";

  const UNIT   = 3;
  const LESSON = 7;
  const PART   = 2;

  const SUPABASE_BASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMAGE_BASE    = SUPABASE_BASE + "images/u3/";
  const AUDIO_BASE    = SUPABASE_BASE + "audio/u3/";
  const SFX_CORRECT   = SUPABASE_BASE + "sfx/correct.wav";
  const SFX_WRONG     = SUPABASE_BASE + "sfx/incorrect.wav";

  // ── DOM refs ──
  const roundLabel     = document.getElementById("roundLabel");
  const exerciseBox    = document.getElementById("exerciseBox");
  const endScreen      = document.getElementById("endScreen");
  const instrLine      = document.getElementById("instrLine");

  const refToggle      = document.getElementById("refToggle");
  const refToggleLabel = document.getElementById("refToggleLabel");
  const refBody        = document.getElementById("refBody");
  const refThQ         = document.getElementById("refThQ");
  const refThA         = document.getElementById("refThA");
  const refTableBody   = document.getElementById("refTableBody");

  const imgLeft        = document.getElementById("imgLeft");
  const imgRight       = document.getElementById("imgRight");
  const qLine          = document.getElementById("qLine");
  const aLine          = document.getElementById("aLine");

  const playBtn        = document.getElementById("playBtn");
  const playLabel      = document.getElementById("playLabel");
  const nextBtn        = document.getElementById("nextBtn");
  const nextLabel      = document.getElementById("nextLabel");

  const statusLine     = document.getElementById("statusLine");
  const endTitle       = document.getElementById("endTitle");
  const endMsg1        = document.getElementById("endMsg1");
  const endCorrect     = document.getElementById("endCorrect");
  const endWrong       = document.getElementById("endWrong");
  const cntCorrect     = document.getElementById("cntCorrect");
  const cntWrong       = document.getElementById("cntWrong");

  // ── Config ──
  const CONFIG = {
    instr:    "Escucha y lee el diálogo.",
    refLabel: "📋 Estructuras del diálogo",
    colQ:     "Pregunta",
    colA:     "Respuesta",
    vocabRows: [
      { q: "Is he busy?",    a: "Yes, he is."         },
      { q: "Is she busy?",   a: "Yes, she is."        },
      { q: "Are they busy?", a: "Yes, they are."      },
      { q: "Are you busy?",  a: "Yes, I am. (yo)"     },
      { q: "Are you busy?",  a: "Yes, we are. (nosotros)" }
    ],
    play: "Escuchar",
    next: "Siguiente",
    end: {
      title: "¡Muy bien!",
      msg1:  "Terminaste la Parte 2."
    }
  };

  // ── Rounds ──
  const EXAMPLE_ROUND = {
    imageLeft:  "u3.l7.p2.busy2.jpg",
    imageRight: "u3.l7.p2.she.cooking.dinner.jpg",
    audio:      "u3.l7.p2.are.you.busy2.mp3",
    question:   "Are you busy?",
    answer:     "Yes, I am. I am cooking dinner."
  };

  const SHUFFLE_ROUNDS = [
    {
      imageLeft:  "u3.l7.p2.busy.jpg",
      imageRight: "u3.l7.p1.man.clean.apartment.jpg",
      audio:      "u3.l7.p2.man.clean.apartment.mp3",
      question:   "Is Carlos busy today?",
      answer:     "Yes, he is. He is cleaning his apartment."
    },
    {
      imageLeft:  "u3.l7.p2.busy.jpg",
      imageRight: "u3.l7.p1.she.feed.cat.jpg",
      audio:      "u3.l7.p2.she.feed.cat.mp3",
      question:   "Is Rosa busy today?",
      answer:     "Yes, she is. She is feeding her cat."
    },
    {
      imageLeft:  "u3.l7.p2.busy.jpg",
      imageRight: "u3.l7.p1.fix.tv.jpg",
      audio:      "u3.l7.p2.fix.tv.mp3",
      question:   "Are you busy today?",
      answer:     "Yes, we are. We are fixing our TV."
    },
    {
      imageLeft:  "u3.l7.p2.busy.jpg",
      imageRight: "u3.l7.p1.painting.bedroom.jpg",
      audio:      "u3.l7.p2.painting.bedroom.mp3",
      question:   "Are Pedro and Ana busy today?",
      answer:     "Yes, they are. They are painting their bedroom."
    },
    {
      imageLeft:  "u3.l7.p2.busy.jpg",
      imageRight: "u3.l7.p1.do.his.homework.jpg",
      audio:      "u3.l7.p2.do.his.homework.mp3",
      question:   "Is Tim busy today?",
      answer:     "Yes, he is. He is doing his homework."
    },
    {
      imageLeft:  "u3.l7.p2.busy.jpg",
      imageRight: "u3.l7.p1.she.wash.clothes.jpg",
      audio:      "u3.l7.p2.she.wash.clothes.mp3",
      question:   "Is Tracy busy today?",
      answer:     "Yes, she is. She is washing her clothes."
    }
  ];

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const ROUNDS = [EXAMPLE_ROUND, ...shuffle(SHUFFLE_ROUNDS)];
  const TOTAL  = ROUNDS.length;
  let idx      = 0;
  let audioObj = null;
  let hasPlayed = false;

  // Counters — p2 is a listen-and-read lesson (no wrong answers possible),
  // but we track "listened" as correct and skips as wrong for consistency.
  let scoreCorrect = 0;
  let scoreWrong   = 0;

  // ── SFX ──
  function playSfx(url) {
    new Audio(url).play().catch(() => {});
  }

  function updateCounter() {
    cntCorrect.textContent = `✓ ${scoreCorrect}`;
    cntWrong.textContent   = `✗ ${scoreWrong}`;
  }

  function stopAudio() {
    if (!audioObj) return;
    try { audioObj.pause(); audioObj.currentTime = 0; } catch (e) {}
  }

  // ── Load round ──
  function loadRound(i) {
    idx = i;
    hasPlayed = false;
    stopAudio();

    const round = ROUNDS[idx];
    roundLabel.textContent = `${idx + 1} / ${TOTAL}`;

    imgLeft.src  = IMAGE_BASE + round.imageLeft;
    imgLeft.alt  = "";
    imgRight.src = IMAGE_BASE + round.imageRight;
    imgRight.alt = "";

    qLine.textContent = round.question;
    aLine.textContent = round.answer;
    aLine.classList.remove("hidden");

    playLabel.textContent = CONFIG.play;
    nextLabel.textContent = CONFIG.next;

    playBtn.classList.remove("hidden");
    nextBtn.classList.add("hidden");
    statusLine.textContent = "";
    statusLine.className   = "status-line";
  }

  // ── Play button ──
  playBtn.addEventListener("click", () => {
    stopAudio();
    const round = ROUNDS[idx];
    audioObj = new Audio(AUDIO_BASE + round.audio);

    const showNext = () => {
      if (!hasPlayed) {
        hasPlayed = true;
        scoreCorrect++;
        updateCounter();
        playSfx(SFX_CORRECT);
      }
      playBtn.classList.add("hidden");
      nextBtn.classList.remove("hidden");
    };

    audioObj.onended = showNext;
    audioObj.play().catch(showNext);
  });

  // ── Next button ──
  nextBtn.addEventListener("click", () => {
    if (idx < TOTAL - 1) {
      loadRound(idx + 1);
    } else {
      finish();
    }
  });

  // ── Finish + progress tracking ──
  function finish() {
    stopAudio();
    exerciseBox.classList.add("hidden");

    try {
      const KEY  = `inglesco_progress_u${UNIT}`;
      const data = JSON.parse(localStorage.getItem(KEY) || "{}");
      const lk   = `l${LESSON}`;
      if (!data[lk]) data[lk] = { partsCompleted: 0, partsTotal: 4 };
      if (data[lk].partsCompleted < PART) data[lk].partsCompleted = PART;
      localStorage.setItem(KEY, JSON.stringify(data));

      const fkey = `inglesco_furthest_u${UNIT}_l${LESSON}`;
      const cur  = parseInt(localStorage.getItem(fkey) || "0", 10);
      if (PART > cur) localStorage.setItem(fkey, String(PART));
    } catch (e) {}

    endTitle.textContent   = CONFIG.end.title;
    endMsg1.textContent    = CONFIG.end.msg1;
    endCorrect.textContent = `✓ ${scoreCorrect}`;
    endWrong.textContent   = `✗ ${scoreWrong}`;
    endScreen.classList.remove("hidden");
  }

  // ── Ref panel toggle ──
  refToggle.addEventListener("click", () => {
    const isOpen = refBody.classList.contains("open");
    refBody.classList.toggle("open", !isOpen);
    refToggle.classList.toggle("open", !isOpen);
  });

  // ── Build vocab table ──
  function buildRefTable() {
    refThQ.textContent         = CONFIG.colQ;
    refThA.textContent         = CONFIG.colA;
    refToggleLabel.textContent = CONFIG.refLabel;
    CONFIG.vocabRows.forEach(row => {
      const tr  = document.createElement("tr");
      const tdQ = document.createElement("td");
      const tdA = document.createElement("td");
      tdQ.className   = "col-q";
      tdA.className   = "col-a";
      tdQ.textContent = row.q;
      tdA.textContent = row.a;
      tr.appendChild(tdQ);
      tr.appendChild(tdA);
      refTableBody.appendChild(tr);
    });
  }

  // ── Init ──
  instrLine.textContent = CONFIG.instr;
  buildRefTable();
  updateCounter();
  loadRound(0);
})();
</script>
</body>
</html>
