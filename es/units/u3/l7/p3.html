    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);

    .wrap { max-width: 640px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {

      gap: 10px;
      margin: 0 0 22px 0;
    }
    .step {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
      cursor: pointer;
      transition: all .3s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    /* ── Titles ── */

      text-align: center;
      margin: 0 0 6px 0;
      font-size: 19px; font-weight: 900;
      color: #1e40af;
    }
    .subline {
      text-align: center;
      margin: 0 0 16px 0;
      font-size: 15px; font-weight: 700;
    }
    .subline span {
      background: rgba(255,255,255,.75);
      padding: 6px 12px;
      border-radius: 10px;
      display: inline-block;
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Ref panel ── */
    .ref-panel {
      background: #f0fdf4;
      border: 2px solid #86efac;
      border-radius: 14px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .ref-toggle {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 14px; background: none; border: none;
      cursor: pointer; font-weight: 900; font-size: 14px;
      color: #166534; text-align: left;
    }
    .ref-toggle:hover       { background: #dcfce7; }
    .ref-toggle .arrow      { font-size: 12px; transition: transform .25s; display: inline-block; }
    .ref-toggle.open .arrow { transform: rotate(180deg); }
    .ref-body               { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
    .ref-body.open          { max-height: 600px; }
    .ref-body-inner         { padding: 0 14px 14px; }

    .pron-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .pron-table thead th {
      background: #dcfce7; color: #166534; font-weight: 900;
      padding: 7px 10px; text-align: center; font-size: 11px;
      letter-spacing: .05em; text-transform: uppercase;
    }
    .pron-table thead th:first-child { border-radius: 10px 0 0 0; }
    .pron-table thead th:last-child  { border-radius: 0 10px 0 0; }
    .pron-table tbody tr:nth-child(odd)  { background: #fff; }
    .pron-table tbody tr:nth-child(even) { background: #f0fdf4; }
    .pron-table td        { padding: 8px 12px; vertical-align: middle; }
    .pron-table td.col-q  { font-weight: 900; color: #7c3aed; font-size: 15px; }
    .pron-table td.col-a  { color: #374151; font-style: italic; font-size: 13px; }

    /* ── Round row + counter ── */
    .round-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 4px 0 14px 0;
      font-weight: 900;
      font-size: 14px;
      opacity: .85;
    }
    .counter { display: flex; gap: 10px; }
    .counter-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 900; font-size: 13px;
    }
    .counter-badge.correct { background: #dcfce7; color: #16a34a; }
    .counter-badge.wrong   { background: #fee2e2; color: #dc2626; }

    /* ── Exercise layout ── */
    .exercise { max-width: 560px; margin: 0 auto; display: grid; gap: 16px; }

    /* ── Image ── */
    .img-block { text-align: center; }
    .img-wrap {
      display: inline-block;
      border-radius: 16px;

      background: #f1f5f9;

      border-radius: 14px; font-weight: 900; font-size: 16px;

    .play-btn:active { transform: scale(.97); }

    /* ── Dialogue preview ── */
    .dialogue-preview {
      background: rgba(255,255,255,.78);
      border-radius: 14px;
      padding: 14px 16px;
      display: grid;
      gap: 6px;
      margin-top: 10px;

    .dialogue-a { font-size: 15px; font-weight: 700; color: #166534; font-style: italic; }

    /* ── Build block ── */
    .build-block {
      background: rgba(255,255,255,.78);
      border-radius: 16px;
      padding: 16px 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
      display: grid;
      gap: 14px;

    /* ── Question line ── */
    .question-line {
      font-size: 17px; font-weight: 900; color: #1e3a5f;
      text-align: center;
    }

    /* ── Part label ── */
    .part-label {
      font-size: 11px; font-weight: 900; color: #6b7280;
      text-transform: uppercase; letter-spacing: .06em;
      text-align: center;
      margin-bottom: 6px;
    }

    /* ── Drop zone ── */
    .drop-zone {
      min-height: 50px;
      border: 2px dashed #93c5fd;
      border-radius: 12px;
      padding: 8px 10px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      background: rgba(219,234,254,.3);
      transition: border-color .2s, background .2s;
      margin-bottom: 10px;
    }
    .drop-zone.correct {
      border-color: #16a34a;
      background: rgba(22,163,74,.08);
    }
    .drop-zone.wrong-flash {
      border-color: #dc2626;
      background: rgba(220,38,38,.06);
    }

    /* ── Chips (placed words) ── */
    .chip {
      padding: 8px 14px;
      border-radius: 10px;
      background: #2563eb;
      color: #fff;
      font-weight: 900;
      font-size: 14px;
      cursor: pointer;
      border: none;
      box-shadow: 0 3px 8px rgba(37,99,235,.22);
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .chip:hover  { background: #1e40af; }
    .chip:active { transform: scale(.96); }
    .chip.correct-chip {
      background: #16a34a !important;
      cursor: default;
      box-shadow: 0 3px 8px rgba(22,163,74,.22);
    }
    .chip.shown-chip {
      background: #d97706 !important;
      cursor: default;
      box-shadow: 0 3px 8px rgba(217,119,6,.22);
    }

    /* ── Tile bank ── */
    .tiles {
      display: flex; flex-wrap: wrap;
      gap: 10px; justify-content: center;
    }
    .tile {
      border: 0; border-radius: 12px;
      padding: 10px 16px; font-weight: 900;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(0,0,0,.10);
      background: #e0e7ff; color: #1e3a5f; font-size: 14px;
      transition: background .15s, transform .1s, opacity .2s;
      white-space: nowrap;
    }
    .tile:hover:not(:disabled) { background: #c7d2fe; }
    .tile:active               { transform: scale(.97); }
    .tile:disabled             { opacity: 0; cursor: default; pointer-events: none; }

    /* ── Mistake hint ── */
    .hint-text {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: #d97706;
      min-height: 18px;
    }

    /* ── Status ── */
    .status-line {
      text-align: center; min-height: 24px;
      font-weight: 900; font-size: 18px; margin-top: 2px;
    }
    .status-line.ok   { color: #16a34a; }
    .status-line.bad  { color: #dc2626; }
    .status-line.hint { color: #d97706; }

    .hidden { display: none !important; }

    /* ── End screen ── */
    .end { text-align: center; padding: 20px 10px 8px; }
    .end .trophy { font-size: 52px; margin-bottom: 8px; }
    .end h2 { margin: 8px 0; font-size: 23px; font-weight: 900; color: #1e40af; }
    .end p  { margin: 6px 0; font-weight: 700; color: #374151; }
    .end .score-summary {

    .end .score-box.correct { background: #dcfce7; color: #16a34a; }
    .end .score-box.wrong   { background: #fee2e2; color: #dc2626; }

    .end-nav-btn {

    /* ── Mobile ── */
    @media (max-width: 480px) {

    }

<script>
(() => {
  "use strict";

  const UNIT   = 3;

  const PART   = 3;

  const SUPABASE_BASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMAGE_BASE    = SUPABASE_BASE + "images/u3/";
  const AUDIO_BASE    = SUPABASE_BASE + "audio/u3/";
  const SFX_CORRECT   = SUPABASE_BASE + "sfx/correct.wav";
  const SFX_WRONG     = SUPABASE_BASE + "sfx/incorrect.wav";

  const MAX_MISTAKES = 2; // reveal answer after this many wrong attempts per part

  // ── DOM refs ──
  const roundLabel      = document.getElementById("roundLabel");
  const exerciseBox     = document.getElementById("exerciseBox");
  const endScreen       = document.getElementById("endScreen");
  const instrLine       = document.getElementById("instrLine");

  const refToggle       = document.getElementById("refToggle");
  const refToggleLabel  = document.getElementById("refToggleLabel");
  const refBody         = document.getElementById("refBody");
  const refThQ          = document.getElementById("refThQ");
  const refThA          = document.getElementById("refThA");
  const refTableBody    = document.getElementById("refTableBody");

  const itemImg         = document.getElementById("itemImg");
  const playBtn         = document.getElementById("playBtn");
  const playLabel       = document.getElementById("playLabel");
  const dialoguePreview = document.getElementById("dialoguePreview");
  const previewQ        = document.getElementById("previewQ");
  const previewA        = document.getElementById("previewA");

  const buildBlock      = document.getElementById("buildBlock");
  const questionLine    = document.getElementById("questionLine");

  const partABlock      = document.getElementById("partABlock");
  const partALabel      = document.getElementById("partALabel");
  const dropZoneA       = document.getElementById("dropZoneA");
  const tilesA          = document.getElementById("tilesA");
  const hintA           = document.getElementById("hintA");

  const partBBlock      = document.getElementById("partBBlock");
  const partBLabel      = document.getElementById("partBLabel");
  const dropZoneB       = document.getElementById("dropZoneB");
  const tilesB          = document.getElementById("tilesB");
  const hintB           = document.getElementById("hintB");

  const statusLine      = document.getElementById("statusLine");
  const endTitle        = document.getElementById("endTitle");
  const endMsg1         = document.getElementById("endMsg1");
  const endCorrect      = document.getElementById("endCorrect");
  const endWrong        = document.getElementById("endWrong");
  const cntCorrect      = document.getElementById("cntCorrect");
  const cntWrong        = document.getElementById("cntWrong");

  // ── Config ──
  const CONFIG = {
    instr:    "Escucha y ordena las palabras.",
    refLabel: "📋 Palabras nuevas",
    colQ:     "English",
    colA:     "Español",
    vocabRows: [
      { q: "busy",      a: "ocupado / ocupada" },
      { q: "painting",  a: "pintando"          },
      { q: "feeding",   a: "alimentando"       },
      { q: "fixing",    a: "arreglando"        },
      { q: "brushing",  a: "cepillando"        },
      { q: "exercises", a: "ejercicios"        },
      { q: "cleaning",  a: "limpiando"         },
      { q: "reading",   a: "leyendo"           },
      { q: "bicycle",   a: "bicicleta"         },
      { q: "yard",      a: "jardín / patio"    },
      { q: "teeth",     a: "dientes"           },
      { q: "emails",    a: "correos"           }
    ],
    play:   "Escuchar",
    partA:  "Respuesta corta",
    partB:  "Respuesta completa",
    end: {
      title: "¡Muy bien!",
      msg1:  "Terminaste la Parte 3."
    }
  };

  // ── Rounds ──
  const ROUNDS = [
    {
      image:    "u3.l7.p3.painting.jpg",
      audio:    "u3.l7.p3.painting.mp3",
      question: "Are they busy?",
      partA:    ["Yes,", "they", "are."],
      partB:    ["They", "are", "painting", "their", "house."]
    },
    {
      image:    "u3.l7.p3.feed.dog.jpg",
      audio:    "u3.l7.p3.feed.dog.mp3",
      question: "Is Tom busy?",
      partA:    ["Yes,", "he", "is."],
      partB:    ["He", "is", "feeding", "his", "dog."]
    },
    {
      image:    "u3.l7.p3.fix.bike.jpg",
      audio:    "u3.l7.p3.fix.bike.mp3",
      question: "Are you busy?",
      partA:    ["Yes,", "I", "am."],
      partB:    ["I", "am", "fixing", "my", "bicycle."]
    },
    {
      image:    "u3.l7.p3.fix.car.jpg",
      audio:    "u3.l7.p3.fix.car.mp3",
      question: "Is Karen busy?",
      partA:    ["Yes,", "she", "is."],
      partB:    ["She", "is", "fixing", "her", "car."]
    },
    {
      image:    "u3.l7.p3.brush.teeth.jpg",
      audio:    "u3.l7.p3.brush.teeth.mp3",
      question: "Are your children busy?",
      partA:    ["Yes,", "they", "are."],
      partB:    ["They", "are", "brushing", "their", "teeth."]
    },
    {
      image:    "u3.l7.p3.our.exercises.jpg",
      audio:    "u3.l7.p3.our.exercises.mp3",
      question: "Are you busy?",
      partA:    ["Yes,", "we", "are."],
      partB:    ["We", "are", "doing", "our", "exercises."]
    },
    {
      image:    "u3.l7.p3.clean.yard.jpg",
      audio:    "u3.l7.p3.clean.yard.mp3",
      question: "Is Pedro busy?",
      partA:    ["Yes,", "he", "is."],
      partB:    ["He", "is", "cleaning", "the", "yard."]
    },
    {
      image:    "u3.l7.p3.read.email.jpg",
      audio:    "u3.l7.p3.read.email.mp3",
      question: "Is Wendy busy?",
      partA:    ["Yes,", "she", "is."],
      partB:    ["She", "is", "reading", "her", "emails."]
    }
  ];

  // ── Shuffle ──
  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const SHUFFLED = shuffle(ROUNDS);
  const TOTAL    = SHUFFLED.length;
  let idx        = 0;
  let audioObj   = null;
  let scoreCorrect = 0;
  let scoreWrong   = 0;

  // ── SFX ──
  function playSfx(url) { new Audio(url).play().catch(() => {}); }

  function updateCounter() {
    cntCorrect.textContent = `✓ ${scoreCorrect}`;
    cntWrong.textContent   = `✗ ${scoreWrong}`;
  }

  function stopAudio() {
    if (!audioObj) return;
    try { audioObj.pause(); audioObj.currentTime = 0; } catch (e) {}
  }

  function setStatus(type, text) {
    statusLine.textContent = text;
    statusLine.className   = "status-line" + (type ? ` ${type}` : "");
  }

  // ── Build one ordering part ──
  // correct: token array in correct order
  // dropZone, tileBank, hintEl: DOM elements
  // onCorrect: callback when student gets it right
  function buildPart(correct, dropZone, tileBank, hintEl, onCorrect) {
    dropZone.innerHTML = "";
    tileBank.innerHTML = "";
    hintEl.textContent = "";
    dropZone.classList.remove("correct", "wrong-flash");
    setStatus("", "");

    let mistakes = 0;
    const placed = [];       // chip DOM nodes currently in dropZone
    const shuffled = shuffle(correct.slice());
    const tileButtons = []; // indexed by shuffled position

    shuffled.forEach((word, si) => {
      const btn = document.createElement("button");
      btn.className   = "tile";
      btn.type        = "button";
      btn.textContent = word;
      btn.dataset.idx = si;

      btn.addEventListener("click", () => {
        if (btn.disabled) return;
        btn.disabled = true;

        const chip = document.createElement("button");
        chip.className       = "chip";
        chip.type            = "button";
        chip.textContent     = word;
        chip.dataset.tileIdx = si;

        chip.addEventListener("click", () => {
          // Return chip to bank (only if not locked)
          if (chip.classList.contains("correct-chip") || chip.classList.contains("shown-chip")) return;
          const pidx = placed.indexOf(chip);
          if (pidx !== -1) placed.splice(pidx, 1);
          dropZone.removeChild(chip);
          tileButtons[si].disabled = false;
          setStatus("", "");
          hintEl.textContent = "";
          dropZone.classList.remove("correct", "wrong-flash");
        });

        placed.push(chip);
        dropZone.appendChild(chip);

        // Auto-check when all slots filled
        if (placed.length === correct.length) {
          const attempt = placed.map(c => c.textContent);
          const isRight = attempt.every((w, i) => w === correct[i]);

          if (isRight) {
            placed.forEach(c => c.classList.add("correct-chip"));
            dropZone.classList.add("correct");
            playSfx(SFX_CORRECT);
            scoreCorrect++;
            updateCounter();
            setStatus("ok", "✓ ¡Correcto!");
            hintEl.textContent = "";
            setTimeout(() => {
              setStatus("", "");
              onCorrect();
            }, 900);
          } else {
            // Wrong attempt
            mistakes++;
            scoreWrong++;
            updateCounter();
            playSfx(SFX_WRONG);
            dropZone.classList.add("wrong-flash");
            setStatus("bad", "✗ Revisa el orden.");

            if (mistakes >= MAX_MISTAKES) {
              // Reveal correct answer in amber
              hintEl.textContent = "";
              // Clear drop zone chips
              placed.forEach(c => dropZone.removeChild(c));
              placed.length = 0;
              // Disable all tiles
              tileButtons.forEach(b => { b.disabled = true; });
              // Show correct chips in amber
              correct.forEach(w => {
                const shownChip = document.createElement("button");
                shownChip.className   = "chip shown-chip";
                shownChip.type        = "button";
                shownChip.textContent = w;
                shownChip.disabled    = true;
                dropZone.appendChild(shownChip);
                placed.push(shownChip);
              });
              dropZone.classList.remove("wrong-flash");
              dropZone.classList.add("correct");
              setStatus("hint", `Respuesta: "${correct.join(" ")}"`);
              setTimeout(() => {
                setStatus("", "");
                onCorrect();
              }, 1800);
            } else {
              // Reset after brief flash
              const remaining = MAX_MISTAKES - mistakes;
              hintEl.textContent = remaining === 1
                ? "Un intento más antes de ver la respuesta."
                : "";
              setTimeout(() => {
                placed.forEach(c => {
                  const tIdx = parseInt(c.dataset.tileIdx, 10);
                  if (tIdx >= 0 && tIdx < tileButtons.length) tileButtons[tIdx].disabled = false;
                  if (dropZone.contains(c)) dropZone.removeChild(c);
                });
                placed.length = 0;
                dropZone.classList.remove("wrong-flash");
                setStatus("", "");
              }, 700);
            }
          }
        }
      });

      tileButtons.push(btn);
      tileBank.appendChild(btn);
    });
  }

  // ── Load round ──
  function loadRound(i) {
    idx = i;
    stopAudio();
    setStatus("", "");

    const round = SHUFFLED[idx];
    roundLabel.textContent = `${idx + 1} / ${TOTAL}`;

    itemImg.src = IMAGE_BASE + round.image;
    itemImg.alt = "";
    playLabel.textContent = CONFIG.play;

    previewQ.textContent = round.question;
    previewA.textContent = round.partA.join(" ") + " " + round.partB.join(" ");
    dialoguePreview.classList.add("hidden");
    buildBlock.classList.add("hidden");
    partBBlock.classList.add("hidden");
    hintA.textContent = "";
    hintB.textContent = "";
  }

  // ── Play button ──
  playBtn.addEventListener("click", () => {
    stopAudio();
    const round = SHUFFLED[idx];
    audioObj = new Audio(AUDIO_BASE + round.audio);

    dialoguePreview.classList.remove("hidden");

    const startBuild = () => {
      dialoguePreview.classList.add("hidden");
      buildBlock.classList.remove("hidden");
      partBBlock.classList.add("hidden");

      questionLine.textContent = round.question;
      partALabel.textContent   = CONFIG.partA;
      partBLabel.textContent   = CONFIG.partB;

      buildPart(round.partA, dropZoneA, tilesA, hintA, () => {
        partBBlock.classList.remove("hidden");
        partBBlock.scrollIntoView({ behavior: "smooth", block: "nearest" });
        buildPart(round.partB, dropZoneB, tilesB, hintB, () => {
          setTimeout(advanceOrFinish, 400);
        });
      });
    };

    audioObj.onended = startBuild;
    audioObj.play().catch(startBuild);
  });

  function advanceOrFinish() {
    if (idx < TOTAL - 1) {
      loadRound(idx + 1);
    } else {
      finish();
    }
  }

  // ── Finish + progress tracking ──
  function finish() {
    stopAudio();
    exerciseBox.classList.add("hidden");

    try {
      const KEY  = `inglesco_progress_u${UNIT}`;
      const data = JSON.parse(localStorage.getItem(KEY) || "{}");
      const lk   = `l${LESSON}`;
      if (!data[lk]) data[lk] = { partsCompleted: 0, partsTotal: 4 };
      if (data[lk].partsCompleted < PART) data[lk].partsCompleted = PART;
      localStorage.setItem(KEY, JSON.stringify(data));

      const fkey = `inglesco_furthest_u${UNIT}_l${LESSON}`;
      const cur  = parseInt(localStorage.getItem(fkey) || "0", 10);
      if (PART > cur) localStorage.setItem(fkey, String(PART));
    } catch (e) {}

    endTitle.textContent   = CONFIG.end.title;
    endMsg1.textContent    = CONFIG.end.msg1;
    endCorrect.textContent = `✓ ${scoreCorrect}`;
    endWrong.textContent   = `✗ ${scoreWrong}`;
    endScreen.classList.remove("hidden");
  }

  // ── Ref panel toggle ──
  refToggle.addEventListener("click", () => {
    const isOpen = refBody.classList.contains("open");
    refBody.classList.toggle("open", !isOpen);
    refToggle.classList.toggle("open", !isOpen);
  });

  // ── Build vocab table ──
  function buildRefTable() {
    refThQ.textContent         = CONFIG.colQ;
    refThA.textContent         = CONFIG.colA;
    refToggleLabel.textContent = CONFIG.refLabel;
    CONFIG.vocabRows.forEach(row => {
      const tr  = document.createElement("tr");
      const tdQ = document.createElement("td");
      const tdA = document.createElement("td");
      tdQ.className   = "col-q";
      tdA.className   = "col-a";
      tdQ.textContent = row.q;
      tdA.textContent = row.a;
      tr.appendChild(tdQ);
      tr.appendChild(tdA);
      refTableBody.appendChild(tr);
    });
  }

  // ── Init ──
  instrLine.textContent = CONFIG.instr;
  buildRefTable();
  updateCounter();
  loadRound(0);
})();
</script>
</body>
