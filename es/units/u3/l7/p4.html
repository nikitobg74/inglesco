<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 3 • Lección 7 • Parte 4</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="manifest" href="../../../../manifest.json">

  <!-- Vercel Analytics -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      min-height: 100vh;
    }

    .wrap { max-width: 640px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── Progress dots ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 22px 0;
    }
    .step {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
      cursor: pointer;
      transition: all .3s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    /* ── Titles ── */
    .top-title {
      text-align: center;
      margin: 0 0 6px 0;
      font-size: 19px; font-weight: 900;
      color: #1e40af;
    }
    .subline {
      text-align: center;
      margin: 0 0 16px 0;
      font-size: 15px; font-weight: 700;
    }
    .subline span {
      background: rgba(255,255,255,.75);
      padding: 6px 12px;
      border-radius: 10px;
      display: inline-block;
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Ref panel ── */
    .ref-panel {
      background: #f0fdf4;
      border: 2px solid #86efac;
      border-radius: 14px;
      margin-bottom: 14px;
      overflow: hidden;
    }
    .ref-toggle {
      width: 100%; display: flex; align-items: center;
      justify-content: space-between;
      padding: 10px 14px; background: none; border: none;
      cursor: pointer; font-weight: 900; font-size: 14px;
      color: #166534; text-align: left;
    }
    .ref-toggle:hover       { background: #dcfce7; }
    .ref-toggle .arrow      { font-size: 12px; transition: transform .25s; display: inline-block; }
    .ref-toggle.open .arrow { transform: rotate(180deg); }
    .ref-body               { max-height: 0; overflow: hidden; transition: max-height .35s ease; }
    .ref-body.open          { max-height: 400px; }
    .ref-body-inner         { padding: 0 14px 14px; }

    .pron-table { width: 100%; border-collapse: collapse; font-size: 14px; }
    .pron-table thead th {
      background: #dcfce7; color: #166534; font-weight: 900;
      padding: 7px 10px; text-align: center; font-size: 11px;
      letter-spacing: .05em; text-transform: uppercase;
    }
    .pron-table thead th:first-child { border-radius: 10px 0 0 0; }
    .pron-table thead th:last-child  { border-radius: 0 10px 0 0; }
    .pron-table tbody tr:nth-child(odd)  { background: #fff; }
    .pron-table tbody tr:nth-child(even) { background: #f0fdf4; }
    .pron-table td        { padding: 8px 12px; vertical-align: middle; }
    .pron-table td.col-en { font-weight: 900; color: #7c3aed; font-size: 15px; }
    .pron-table td.col-es { color: #374151; font-style: italic; font-size: 13px; }

    /* ── Paragraph block ── */
    .paragraph-block {
      background: #fffbeb;
      border: 2px solid #fde68a;
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 15px;
      line-height: 2;
      color: #1e3a5f;
      font-weight: 600;
      margin-bottom: 14px;
    }
    .paragraph-block p {
      margin: 0 0 4px 0;
      border-radius: 6px;
      padding: 2px 6px;
      transition: background .25s, color .25s;
    }
    .paragraph-block p:last-child { margin-bottom: 0; }
    .paragraph-block p.active {
      background: #fef08a;
      color: #92400e;
    }
    .paragraph-block p.done { color: #6b7280; }

    /* ── Audio progress bar ── */
    .audio-progress-wrap {
      margin-bottom: 12px;
      display: none;
    }
    .audio-progress-wrap.visible { display: block; }
    .audio-progress-track {
      width: 100%;
      height: 8px;
      background: #e5e7eb;
      border-radius: 99px;
      overflow: hidden;
    }
    .audio-progress-fill {
      height: 100%;
      width: 0%;
      background: #2563eb;
      border-radius: 99px;
      transition: width .25s linear;
    }

    /* ── Play / Pause button ── */
    .play-area { text-align: center; margin-bottom: 16px; }
    .play-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 26px;
      background: #2563eb; color: #fff; border: none;
      border-radius: 14px; font-weight: 900; font-size: 16px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(37,99,235,.28);
      transition: background .2s, transform .1s;
    }
    .play-btn:hover  { background: #1e40af; }
    .play-btn:active { transform: scale(.97); }
    .play-btn svg    { width: 20px; height: 20px; fill: #fff; flex-shrink: 0; }

    /* ── Round row + counter ── */
    .round-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 0 0 12px 0;
      font-weight: 900;
      font-size: 14px;
      opacity: .85;
    }
    .counter { display: flex; gap: 10px; }
    .counter-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 900; font-size: 13px;
    }
    .counter-badge.correct { background: #dcfce7; color: #16a34a; }
    .counter-badge.wrong   { background: #fee2e2; color: #dc2626; }

    /* ── Exercise block ── */
    .exercise-block {
      background: rgba(255,255,255,.78);
      border-radius: 16px;
      padding: 16px 12px;
      box-shadow: 0 6px 16px rgba(0,0,0,.06);
      display: grid;
      gap: 14px;
    }

    /* ── Sentence with blank ── */
    .sentence-display {
      font-size: 17px; font-weight: 800; color: #1e3a5f;
      text-align: center; line-height: 1.8;
      display: flex; flex-wrap: wrap;
      align-items: center; justify-content: center; gap: 4px;
    }

    .verb-blank {
      display: inline-block;
      min-width: 86px;
      padding: 4px 10px;
      border-bottom: 3px solid #2563eb;
      color: #9ca3af;
      font-weight: 900;
      font-size: 17px;
      text-align: center;
      border-radius: 4px 4px 0 0;
      transition: all .3s;
    }
    .verb-blank.filled { color: #16a34a; border-bottom-color: #16a34a; background: rgba(22,163,74,.08); }
    .verb-blank.shown  { color: #d97706; border-bottom-color: #d97706; background: rgba(217,119,6,.08); }

    /* ── Tiles ── */
    .tiles {
      display: flex; flex-wrap: wrap;
      gap: 10px; justify-content: center;
    }
    .tile {
      border: 0; border-radius: 12px;
      padding: 11px 20px; font-weight: 900;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(0,0,0,.10);
      background: #2563eb; color: #fff; font-size: 15px;
      transition: background .15s, transform .1s;
      white-space: nowrap;
    }
    .tile:hover:not(:disabled) { background: #1e40af; }
    .tile:active               { transform: scale(.97); }
    .tile:disabled             { opacity: .42; cursor: not-allowed; }
    .tile.correct              { background: #16a34a !important; }
    .tile.wrong                { background: #dc2626 !important; }
    .tile.shown                { background: #d97706 !important; }

    /* ── Status ── */
    .status-line {
      text-align: center; min-height: 24px;
      font-weight: 900; font-size: 18px;
    }
    .status-line.ok   { color: #16a34a; }
    .status-line.bad  { color: #dc2626; }
    .status-line.hint { color: #d97706; }

    .hidden { display: none !important; }

    /* ── End screen ── */
    .end { text-align: center; padding: 20px 10px 8px; }
    .end .trophy { font-size: 52px; margin-bottom: 8px; }
    .end h2 { margin: 8px 0; font-size: 23px; font-weight: 900; color: #1e40af; }
    .end p  { margin: 6px 0; font-weight: 700; color: #374151; }
    .end .score-summary {
      display: flex; gap: 16px; justify-content: center; margin: 14px 0 4px;
    }
    .end .score-box {
      padding: 10px 20px;
      border-radius: 14px;
      font-weight: 900; font-size: 18px;
    }
    .end .score-box.correct { background: #dcfce7; color: #16a34a; }
    .end .score-box.wrong   { background: #fee2e2; color: #dc2626; }

    .end-nav-btn {
      display: inline-block;
      margin-top: 18px;
      padding: 13px 32px;
      background: #2563eb; color: #fff;
      border-radius: 14px; text-decoration: none;
      font-weight: 900; font-size: 16px;
      box-shadow: 0 6px 14px rgba(37,99,235,.28);
      transition: background .2s;
    }
    .end-nav-btn:hover { background: #1e40af; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .step             { width: 33px; height: 33px; font-size: 13px; }
      .top-title        { font-size: 17px; }
      .paragraph-block  { font-size: 13px; line-height: 1.9; padding: 12px 14px; }
      .sentence-display { font-size: 15px; }
      .verb-blank       { font-size: 15px; min-width: 72px; }
      .tile             { font-size: 14px; padding: 10px 14px; }
      .play-btn         { font-size: 15px; padding: 11px 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Volver a Unidad 3</a>

    <div class="top-title">Unidad 3 • Lección 7 • Parte 4</div>
    <div class="subline"><span id="instrLine"></span></div>

    <div class="progress-container">
      <a class="step"        href="p1.html" aria-label="Parte 1">1</a>
      <a class="step"        href="p2.html" aria-label="Parte 2">2</a>
      <a class="step"        href="p3.html" aria-label="Parte 3">3</a>
      <a class="step active" href="p4.html" aria-label="Parte 4">4</a>
    </div>

    <div class="card">

      <!-- Vocab ref panel -->
      <div class="ref-panel" id="refPanel">
        <button class="ref-toggle" id="refToggle">
          <span id="refToggleLabel"></span>
          <span class="arrow">▼</span>
        </button>
        <div class="ref-body" id="refBody">
          <div class="ref-body-inner">
            <table class="pron-table">
              <thead><tr><th id="refThEn"></th><th id="refThEs"></th></tr></thead>
              <tbody id="refTableBody"></tbody>
            </table>
          </div>
        </div>
      </div>

      <!-- Paragraph -->
      <div class="paragraph-block" id="paragraphBlock"></div>

      <!-- Audio progress bar -->
      <div class="audio-progress-wrap" id="audioProgressWrap">
        <div class="audio-progress-track">
          <div class="audio-progress-fill" id="audioProgressFill"></div>
        </div>
      </div>

      <!-- Play / Pause button -->
      <div class="play-area">
        <button class="play-btn" id="playBtn">
          <svg id="playIcon"  viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          <span id="playLabel"></span>
        </button>
      </div>

      <!-- Round row + counter (shown after audio) -->
      <div class="round-row hidden" id="roundRow">
        <span id="roundLabel"></span>
        <div class="counter">
          <span class="counter-badge correct" id="cntCorrect">✓ 0</span>
          <span class="counter-badge wrong"   id="cntWrong">✗ 0</span>
        </div>
      </div>

      <!-- Exercise block -->
      <div class="exercise-block hidden" id="exerciseBox">
        <div class="sentence-display" id="sentenceDisplay"></div>
        <div class="tiles"            id="tilesContainer"></div>
        <div class="status-line"      id="statusLine" aria-live="polite"></div>
      </div>

      <!-- End screen -->
      <div class="end hidden" id="endScreen">
        <div class="trophy">🏆</div>
        <h2 id="endTitle"></h2>
        <p id="endMsg1"></p>
        <div class="score-summary">
          <div class="score-box correct" id="endCorrect"></div>
          <div class="score-box wrong"   id="endWrong"></div>
        </div>
        <a href="../index.html" class="end-nav-btn">¡Lección completa! →</a>
      </div>

    </div>
  </div>

<script>
(() => {
  "use strict";

  const UNIT   = 3;
  const LESSON = 7;
  const PART   = 4;

  const SUPABASE_BASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const AUDIO_BASE    = SUPABASE_BASE + "audio/u3/";
  const SFX_CORRECT   = SUPABASE_BASE + "sfx/correct.wav";
  const SFX_WRONG     = SUPABASE_BASE + "sfx/incorrect.wav";

  const MAX_MISTAKES = 2; // reveal answer after this many wrong taps per exercise

  // ── DOM refs ──
  const instrLine         = document.getElementById("instrLine");

  const refToggle         = document.getElementById("refToggle");
  const refToggleLabel    = document.getElementById("refToggleLabel");
  const refBody           = document.getElementById("refBody");
  const refThEn           = document.getElementById("refThEn");
  const refThEs           = document.getElementById("refThEs");
  const refTableBody      = document.getElementById("refTableBody");

  const paragraphBlock    = document.getElementById("paragraphBlock");
  const audioProgressWrap = document.getElementById("audioProgressWrap");
  const audioProgressFill = document.getElementById("audioProgressFill");
  const playBtn           = document.getElementById("playBtn");
  const playIcon          = document.getElementById("playIcon");
  const pauseIcon         = document.getElementById("pauseIcon");
  const playLabel         = document.getElementById("playLabel");

  const roundRow          = document.getElementById("roundRow");
  const roundLabel        = document.getElementById("roundLabel");
  const exerciseBox       = document.getElementById("exerciseBox");
  const sentenceDisplay   = document.getElementById("sentenceDisplay");
  const tilesContainer    = document.getElementById("tilesContainer");
  const statusLine        = document.getElementById("statusLine");

  const cntCorrect        = document.getElementById("cntCorrect");
  const cntWrong          = document.getElementById("cntWrong");

  const endScreen         = document.getElementById("endScreen");
  const endTitle          = document.getElementById("endTitle");
  const endMsg1           = document.getElementById("endMsg1");
  const endCorrect        = document.getElementById("endCorrect");
  const endWrong          = document.getElementById("endWrong");

  // ── Config ──
  const CONFIG = {
    instr:    "Lee el texto, escucha y completa los ejercicios.",
    audio:    "u3.l7.p4.story.mp3",
    refLabel: "📋 Palabras nuevas",
    colEn:    "English",
    colEs:    "Español",
    vocabRows: [
      { en: "everybody", es: "todos"   },
      { en: "street",    es: "calle"   },
      { en: "neighbors", es: "vecinos" }
    ],
    paragraph: [
      "Everybody on our street is very busy today.",
      "Mr. Davis is fixing his car in the garage.",
      "Mrs. Lopez is painting her bedroom.",
      "Carlos is feeding his cat.",
      "The cat is eating a fish.",
      "Mr. and Mrs. Patel are washing their clothes.",
      "Linda is cleaning her kitchen.",
      "And Tom and Sarah are playing baseball.",
      "Their dog is playing with a ball in the yard.",
      "I am busy, too.",
      "I am washing my car and I am watching all my neighbors.",
      "It is a very busy day on our street."
    ],
    play:   "Escuchar",
    pause:  "Pausar",
    resume: "Continuar",
    end: {
      title: "¡Lección completada!",
      msg1:  "Terminaste la Lección 7."
    }
  };

  // ── Exercises ──
  const EXERCISES = [
    {
      template: ["Mr. Davis is ", "{0}", " his car in the garage."],
      answer:   "fixing",
      wrong:    ["washing", "painting"]
    },
    {
      template: ["Mrs. Lopez is painting ", "{0}", " bedroom."],
      answer:   "her",
      wrong:    ["his", "their"]
    },
    {
      template: ["Carlos is ", "{0}", " his cat."],
      answer:   "feeding",
      wrong:    ["fixing", "painting"]
    },
    {
      template: ["Mr. and Mrs. Patel ", "{0}", " washing their clothes."],
      answer:   "are",
      wrong:    ["is", "am"]
    },
    {
      template: ["Linda is ", "{0}", " her kitchen."],
      answer:   "cleaning",
      wrong:    ["washing", "playing"]
    },
    {
      template: ["Tom and Sarah are ", "{0}", " baseball."],
      answer:   "playing",
      wrong:    ["washing", "fixing"]
    },
    {
      template: ["I am washing ", "{0}", " car."],
      answer:   "my",
      wrong:    ["their", "her"]
    }
  ];

  // ── State ──
  const TOTAL      = EXERCISES.length;
  let idx          = 0;
  let audio        = null;
  let isPlaying    = false;
  let isLocked     = false;
  let rafId        = null;
  let sentenceEls  = [];
  let mistakesNow  = 0;
  let scoreCorrect = 0;
  let scoreWrong   = 0;

  // ── SFX ──
  function playSfx(url) { new Audio(url).play().catch(() => {}); }

  function updateCounter() {
    cntCorrect.textContent = `✓ ${scoreCorrect}`;
    cntWrong.textContent   = `✗ ${scoreWrong}`;
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function setStatus(type, text) {
    statusLine.textContent = text;
    statusLine.className   = "status-line" + (type ? ` ${type}` : "");
  }

  // ── Audio stop ──
  function stopAudio() {
    if (!audio) return;
    try { audio.pause(); audio.currentTime = 0; } catch (e) {}
    cancelAnimationFrame(rafId);
    isPlaying = false;
  }

  // ── Icon helpers ──
  function showPlayIcon()   { playIcon.style.display = ""; pauseIcon.style.display = "none"; playLabel.textContent = CONFIG.play; }
  function showPauseIcon()  { playIcon.style.display = "none"; pauseIcon.style.display = ""; playLabel.textContent = CONFIG.pause; }
  function showResumeIcon() { playIcon.style.display = ""; pauseIcon.style.display = "none"; playLabel.textContent = CONFIG.resume; }

  // ── Sentence highlight (rAF) ──
  function updateHighlight() {
    if (!audio || audio.paused) return;
    const duration  = audio.duration || 1;
    const current   = audio.currentTime;
    const count     = sentenceEls.length;
    const segLen    = duration / count;
    const activeIdx = Math.min(Math.floor(current / segLen), count - 1);

    sentenceEls.forEach((el, i) => {
      el.classList.remove("active", "done");
      if (i < activeIdx)   el.classList.add("done");
      if (i === activeIdx) el.classList.add("active");
    });

    audioProgressFill.style.width = ((current / duration) * 100) + "%";
    rafId = requestAnimationFrame(updateHighlight);
  }

  // ── Play / Pause toggle ──
  playBtn.addEventListener("click", () => {
    if (!audio) {
      audio = new Audio(AUDIO_BASE + CONFIG.audio);
      audioProgressWrap.classList.add("visible");

      audio.addEventListener("ended", () => {
        isPlaying = false;
        cancelAnimationFrame(rafId);
        audioProgressFill.style.width = "100%";
        sentenceEls.forEach(el => { el.classList.remove("active"); el.classList.add("done"); });
        showPlayIcon();
        // Reveal exercises
        roundRow.classList.remove("hidden");
        exerciseBox.classList.remove("hidden");
        loadExercise(0);
      });

      audio.play().catch(() => {});
      isPlaying = true;
      showPauseIcon();
      rafId = requestAnimationFrame(updateHighlight);
      return;
    }

    if (isPlaying) {
      audio.pause();
      isPlaying = false;
      cancelAnimationFrame(rafId);
      showResumeIcon();
    } else {
      audio.play().catch(() => {});
      isPlaying = true;
      showPauseIcon();
      rafId = requestAnimationFrame(updateHighlight);
    }
  });

  // ── Build exercise ──
  function buildExercise(ex) {
    sentenceDisplay.innerHTML = "";
    mistakesNow = 0;

    ex.template.forEach(part => {
      if (part === "{0}") {
        const blank = document.createElement("span");
        blank.className   = "verb-blank";
        blank.id          = "verbBlank";
        blank.textContent = "___";
        sentenceDisplay.appendChild(blank);
      } else {
        const span = document.createElement("span");
        span.textContent = part;
        sentenceDisplay.appendChild(span);
      }
    });

    tilesContainer.innerHTML = "";
    isLocked = false;
    setStatus("", "");

    const allTiles = shuffle([ex.answer, ...ex.wrong]);

    allTiles.forEach(word => {
      const btn = document.createElement("button");
      btn.className   = "tile";
      btn.type        = "button";
      btn.textContent = word;

      btn.addEventListener("click", () => {
        if (isLocked || btn.disabled) return;
        handleTap(btn, word, ex);
      });

      tilesContainer.appendChild(btn);
    });
  }

  function handleTap(btn, word, ex) {
    if (word === ex.answer) {
      // Correct
      isLocked = true;
      btn.classList.add("correct");
      playSfx(SFX_CORRECT);
      scoreCorrect++;
      updateCounter();
      const blank = document.getElementById("verbBlank");
      if (blank) { blank.textContent = word; blank.classList.add("filled"); }
      setStatus("ok", "✓ ¡Correcto!");
      tilesContainer.querySelectorAll(".tile").forEach(b => { b.disabled = true; });
      setTimeout(() => { setStatus("", ""); isLocked = false; advanceOrFinish(); }, 900);
    } else {
      // Wrong
      btn.classList.add("wrong");
      playSfx(SFX_WRONG);
      mistakesNow++;
      scoreWrong++;
      updateCounter();
      isLocked = true;

      if (mistakesNow >= MAX_MISTAKES) {
        // Reveal correct answer
        const blank = document.getElementById("verbBlank");
        if (blank) { blank.textContent = ex.answer; blank.classList.add("shown"); }
        tilesContainer.querySelectorAll(".tile").forEach(b => {
          b.disabled = true;
          if (b.textContent === ex.answer) b.classList.add("shown");
        });
        setStatus("hint", `La respuesta es: "${ex.answer}"`);
        setTimeout(() => { setStatus("", ""); isLocked = false; advanceOrFinish(); }, 1800);
      } else {
        setStatus("bad", "✗ Intenta de nuevo.");
        setTimeout(() => {
          btn.classList.remove("wrong");
          btn.disabled = true;
          setStatus("", "");
          isLocked = false;
        }, 600);
      }
    }
  }

  // ── Load exercise ──
  function loadExercise(i) {
    idx = i;
    roundLabel.textContent = `${idx + 1} / ${TOTAL}`;
    buildExercise(EXERCISES[idx]);
    exerciseBox.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function advanceOrFinish() {
    if (idx < TOTAL - 1) {
      loadExercise(idx + 1);
    } else {
      finish();
    }
  }

  // ── Finish + progress tracking ──
  function finish() {
    stopAudio();
    exerciseBox.classList.add("hidden");
    roundRow.classList.add("hidden");

    try {
      const KEY  = `inglesco_progress_u${UNIT}`;
      const data = JSON.parse(localStorage.getItem(KEY) || "{}");
      const lk   = `l${LESSON}`;
      if (!data[lk]) data[lk] = { partsCompleted: 0, partsTotal: 4 };
      if (data[lk].partsCompleted < PART) data[lk].partsCompleted = PART;
      localStorage.setItem(KEY, JSON.stringify(data));

      const fkey = `inglesco_furthest_u${UNIT}_l${LESSON}`;
      const cur  = parseInt(localStorage.getItem(fkey) || "0", 10);
      if (PART > cur) localStorage.setItem(fkey, String(PART));
    } catch (e) {}

    endTitle.textContent   = CONFIG.end.title;
    endMsg1.textContent    = CONFIG.end.msg1;
    endCorrect.textContent = `✓ ${scoreCorrect}`;
    endWrong.textContent   = `✗ ${scoreWrong}`;
    endScreen.classList.remove("hidden");
  }

  // ── Ref panel toggle ──
  refToggle.addEventListener("click", () => {
    const isOpen = refBody.classList.contains("open");
    refBody.classList.toggle("open", !isOpen);
    refToggle.classList.toggle("open", !isOpen);
  });

  // ── Build vocab table ──
  function buildRefTable() {
    refThEn.textContent        = CONFIG.colEn;
    refThEs.textContent        = CONFIG.colEs;
    refToggleLabel.textContent = CONFIG.refLabel;
    CONFIG.vocabRows.forEach(row => {
      const tr   = document.createElement("tr");
      const tdEn = document.createElement("td");
      const tdEs = document.createElement("td");
      tdEn.className   = "col-en";
      tdEs.className   = "col-es";
      tdEn.textContent = row.en;
      tdEs.textContent = row.es;
      tr.appendChild(tdEn);
      tr.appendChild(tdEs);
      refTableBody.appendChild(tr);
    });
  }

  // ── Build paragraph ──
  function buildParagraph() {
    sentenceEls = [];
    CONFIG.paragraph.forEach(sentence => {
      const p = document.createElement("p");
      p.textContent = sentence;
      paragraphBlock.appendChild(p);
      sentenceEls.push(p);
    });
  }

  // ── Init ──
  instrLine.textContent = CONFIG.instr;
  buildRefTable();
  buildParagraph();
  showPlayIcon();
  updateCounter();
})();
</script>
</body>
</html>
