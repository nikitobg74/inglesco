<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unidad 4 • Lección 1 • Parte 4</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      min-height: 100vh;
      padding: 20px 16px 60px;
      color: #111827;
    }

    .wrap { max-width: 820px; margin: 0 auto; }

    .back-btn {
      display: inline-block;
      margin-bottom: 20px;
      padding: 8px 15px;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
    }
    .back-btn:hover { background: #1e40af; }

    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 15px 0 25px 0;
    }

    .step {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    .top-title {
      text-align: center;
      margin: 0 0 8px 0;
      font-size: 20px;
      font-weight: 900;
    }

    .subline {
      text-align: center;
      margin: 0 0 18px 0;
      font-size: 16px;
      font-weight: 800;
    }

    .subline span {
      background: rgba(255,255,255,.7);
      padding: 6px 10px;
      border-radius: 10px;
      display: inline-block;
    }

    .card {
      background: rgba(255,255,255,.85);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(0,0,0,.08);
    }

    .ex-header {
      text-align: center;
      background: #2563eb;
      color: white;
      border-radius: 16px;
      padding: 10px 28px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      margin-bottom: 20px;
      box-shadow: 0 6px 20px rgba(37,99,235,0.25);
    }

    .counter {
      text-align: center;
      font-size: 15px;
      font-weight: 700;
      color: #486581;
      margin-bottom: 18px;
    }

    .audio-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      margin-bottom: 24px;
    }

    .play-btn {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: #2563eb;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 20px rgba(37,99,235,0.35);
      transition: background 0.2s, transform 0.1s;
      color: white;
      font-size: 28px;
    }

    .play-btn:hover   { background: #1d4ed8; transform: scale(1.06); }
    .play-btn:active  { transform: scale(0.96); }
    .play-btn.playing { background: #7c3aed; }

    .play-label {
      font-size: 13px;
      font-weight: 600;
      color: #486581;
    }

    .build-area {
      min-height: 58px;
      background: #eff6ff;
      border: 2px dashed #93c5fd;
      border-radius: 14px;
      padding: 10px 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      transition: border-color 0.4s, background 0.4s;
    }

    .build-area.all-correct {
      border-color: #16a34a;
      background: #dcfce7;
    }

    .slot {
      min-width: 70px;
      height: 42px;
      border-radius: 10px;
      border: 2px solid #93c5fd;
      background: white;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 700;
      color: #1e40af;
      padding: 0 12px;
      cursor: pointer;
      transition: all 0.25s;
      user-select: none;
      white-space: nowrap;
    }

    .slot.empty {
      color: transparent;
      cursor: pointer;
    }

    .slot.filled {
      background: #dbeafe;
      border-color: #2563eb;
      cursor: pointer;
    }

    .slot.correct {
      background: #dcfce7;
      border-color: #16a34a;
      color: #15803d;
      cursor: default;
      pointer-events: none;
    }

    .slot.wrong {
      background: #fee2e2;
      border-color: #dc2626;
      color: #dc2626;
      animation: shake 0.45s ease;
    }

    .tile-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 14px;
      background: #f8fafc;
      border-radius: 14px;
      border: 2px solid #e2e8f0;
      min-height: 60px;
    }

    .tile {
      background: white;
      border: 2px solid #93c5fd;
      color: #1e40af;
      padding: 8px 18px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      user-select: none;
      white-space: nowrap;
    }

    .tile:hover {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
      transform: translateY(-2px);
    }

    .tile.selected {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
    }

    .tile.used {
      visibility: hidden;
      pointer-events: none;
    }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-6px); }
      40%  { transform: translateX(6px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }

    .end {
      text-align: center;
      padding: 16px 10px 4px;
      display: none;
    }

    .end.show { display: block; }
    .end .trophy { font-size: 52px; margin-bottom: 8px; }

    .end h2 {
      margin: 8px 0;
      font-size: 24px;
      font-weight: 900;
      color: #1e40af;
    }

    .end p {
      margin: 6px 0;
      font-weight: 600;
      color: #486581;
    }

    .next-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-weight: 900;
      font-size: 17px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(22,163,74,.30);
      transition: background .2s, transform .1s;
      margin-top: 14px;
      text-decoration: none;
    }

    .next-btn:hover  { background: #15803d; }
    .next-btn:active { transform: scale(.97); }

    @media (max-width: 520px) {
      .step      { width: 34px; height: 34px; font-size: 14px; }
      .top-title { font-size: 18px; }
      .tile      { font-size: 14px; padding: 7px 14px; }
      .slot      { font-size: 14px; min-width: 60px; }
      .play-btn  { width: 58px; height: 58px; font-size: 24px; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <a href="../../index.html" class="back-btn">← Unidad 4</a>

  <div class="top-title">Unidad 4 • Lección 1 • Parte 4</div>
  <div class="subline">
    <span>Escucha y forma la oración.</span>
  </div>

  <div class="progress-container">
    <a class="step" href="p1.html" aria-label="Parte 1">1</a>
    <a class="step" href="p2.html" aria-label="Parte 2">2</a>
    <a class="step" href="p3.html" aria-label="Parte 3">3</a>
    <a class="step active" href="p4.html" aria-label="Parte 4">4</a>
    <a class="step" href="p5.html" aria-label="Parte 5">5</a>
  </div>

  <div class="card">
    <div class="ex-header">Escucha y construye la oración</div>

    <div class="counter">Oración <span id="currentNum">1</span> de 8</div>

    <div class="audio-area">
      <button class="play-btn" id="playBtn" aria-label="Escuchar oración">▶</button>
      <span class="play-label" id="playLabel">Toca para escuchar</span>
    </div>

    <div class="build-area" id="buildArea"></div>

    <div class="tile-bank" id="tileBank"></div>

    <div class="end" id="endScreen">
      <div class="trophy">🏆</div>
      <h2>¡Buen trabajo!</h2>
      <p>Escuchaste y construiste todas las oraciones.</p>
      <p>Estás listo para continuar.</p>
      <a href="p5.html" class="next-btn">Siguiente parte →</a>
    </div>
  </div>
</div>

<script src="../../../../js/u4/u4_l1_p4.js"></script>

</body>
</html>
