<!-- u4/l1/p4.html (Mobile-first, self-contained) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidad 4 • Lección 1 • Parte 4</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="manifest" href="../../../../manifest.json">

  <!-- Vercel Analytics -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      min-height: 100vh;
      padding: 16px 16px 60px;
      color: #111827;
      margin: 0;
    }

    .wrap { max-width: 640px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── Progress dots ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 22px 0;
    }
    .step {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 15px;
      cursor: pointer;
      transition: all .3s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    /* ── Titles ── */
    .top-title {
      text-align: center;
      margin: 0 0 6px 0;
      font-size: 19px; font-weight: 900;
      color: #1e40af;
    }
    .subline {
      text-align: center;
      margin: 0 0 16px 0;
      font-size: 15px; font-weight: 700;
    }
    .subline span {
      background: rgba(255,255,255,.75);
      padding: 6px 12px;
      border-radius: 10px;
      display: inline-block;
    }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 18px 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Exercise header ── */
    .ex-header {
      text-align: center;
      background: #2563eb;
      color: #fff;
      border-radius: 14px;
      padding: 10px 20px;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .04em;
      text-transform: uppercase;
      margin-bottom: 16px;
      box-shadow: 0 6px 18px rgba(37,99,235,.22);
    }

    /* ── Round row + counter ── */
    .round-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 700;
      color: #486581;
      margin-bottom: 16px;
    }
    .counter { display: flex; gap: 10px; }
    .counter-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px;
      border-radius: 20px;
      font-weight: 900; font-size: 13px;
    }
    .counter-badge.correct { background: #dcfce7; color: #16a34a; }
    .counter-badge.wrong   { background: #fee2e2; color: #dc2626; }

    /* ── Audio area ── */
    .audio-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }

    .play-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      background: #2563eb;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 6px 18px rgba(37,99,235,.32);
      transition: background .2s, transform .1s;
      color: #fff;
      font-size: 26px;
    }
    .play-btn:hover  { background: #1d4ed8; transform: scale(1.06); }
    .play-btn:active { transform: scale(.96); }
    .play-btn.playing { background: #7c3aed; }

    .play-label {
      font-size: 13px;
      font-weight: 600;
      color: #486581;
    }

    /* ── Build area (drop zone) ── */
    .build-area {
      min-height: 56px;
      background: #eff6ff;
      border: 2px dashed #93c5fd;
      border-radius: 14px;
      padding: 10px 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      margin-bottom: 16px;
      transition: border-color .4s, background .4s;
    }
    .build-area.all-correct {
      border-color: #16a34a;
      background: #dcfce7;
    }

    /* ── Slots ── */
    .slot {
      min-width: 66px;
      height: 40px;
      border-radius: 10px;
      border: 2px solid #93c5fd;
      background: #fff;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      color: #1e40af;
      padding: 0 10px;
      cursor: pointer;
      transition: all .25s;
      user-select: none;
      white-space: nowrap;
    }
    .slot.empty   { color: transparent; }
    .slot.filled  { background: #dbeafe; border-color: #2563eb; cursor: pointer; color: #1e40af; }
    .slot.correct { background: #dcfce7; border-color: #16a34a; color: #15803d; cursor: default; pointer-events: none; }
    .slot.wrong   { background: #fee2e2; border-color: #dc2626; color: #dc2626; animation: shake .45s ease; }
    .slot.shown   { background: rgba(217,119,6,.10); border-color: #d97706; color: #92400e; cursor: default; pointer-events: none; }

    /* ── Tile bank ── */
    .tile-bank {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      padding: 14px;
      background: #f8fafc;
      border-radius: 14px;
      border: 2px solid #e2e8f0;
      min-height: 58px;
    }

    .tile {
      background: #fff;
      border: 2px solid #93c5fd;
      color: #1e40af;
      padding: 8px 16px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all .2s ease;
      user-select: none;
      white-space: nowrap;
    }
    .tile:hover:not(.used):not(.selected) {
      background: #2563eb;
      color: #fff;
      border-color: #2563eb;
      transform: translateY(-2px);
    }
    .tile.selected { background: #2563eb; color: #fff; border-color: #2563eb; }
    .tile.used     { visibility: hidden; pointer-events: none; }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-6px); }
      40%  { transform: translateX(6px); }
      60%  { transform: translateX(-4px); }
      80%  { transform: translateX(4px); }
      100% { transform: translateX(0); }
    }

    /* ── Wrong flash on slot ── */
    .slot-hint { color: #92400e !important; }

    /* ── End screen ── */
    .end { text-align: center; padding: 20px 10px 8px; display: none; }
    .end.show { display: block; }
    .end .trophy { font-size: 52px; margin-bottom: 8px; }
    .end h2 { margin: 8px 0; font-size: 23px; font-weight: 900; color: #1e40af; }
    .end p  { margin: 6px 0; font-weight: 600; color: #486581; }
    .end .score-summary {
      display: flex; gap: 16px; justify-content: center; margin: 14px 0 4px;
    }
    .end .score-box {
      padding: 10px 20px;
      border-radius: 14px;
      font-weight: 900; font-size: 18px;
    }
    .end .score-box.correct { background: #dcfce7; color: #16a34a; }
    .end .score-box.wrong   { background: #fee2e2; color: #dc2626; }

    .next-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 30px;
      background: #16a34a; color: #fff;
      border: none; border-radius: 14px;
      font-weight: 900; font-size: 16px;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(22,163,74,.28);
      transition: background .2s, transform .1s;
      margin-top: 16px;
      text-decoration: none;
    }
    .next-btn:hover  { background: #15803d; }
    .next-btn:active { transform: scale(.97); }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .step     { width: 33px; height: 33px; font-size: 13px; }
      .top-title { font-size: 17px; }
      .tile     { font-size: 13px; padding: 7px 12px; }
      .slot     { font-size: 13px; min-width: 56px; height: 36px; }
      .play-btn { width: 56px; height: 56px; font-size: 22px; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">← Unidad 4</a>

  <div class="top-title">Unidad 4 • Lección 1 • Parte 4</div>
  <div class="subline"><span>Escucha y forma la oración.</span></div>

  <div class="progress-container">
    <a class="step"        href="p1.html" aria-label="Parte 1">1</a>
    <a class="step"        href="p2.html" aria-label="Parte 2">2</a>
    <a class="step"        href="p3.html" aria-label="Parte 3">3</a>
    <a class="step active" href="p4.html" aria-label="Parte 4">4</a>
    <a class="step"        href="p5.html" aria-label="Parte 5">5</a>
  </div>

  <div class="card">
    <div class="ex-header">Escucha y construye la oración</div>

    <!-- Round row + counter -->
    <div class="round-row" id="roundRow">
      <span>Oración <span id="currentNum">1</span> de 8</span>
      <div class="counter">
        <span class="counter-badge correct" id="cntCorrect">✓ 0</span>
        <span class="counter-badge wrong"   id="cntWrong">✗ 0</span>
      </div>
    </div>

    <div class="audio-area" id="audioArea">
      <button class="play-btn" id="playBtn" aria-label="Escuchar oración">▶</button>
      <span class="play-label" id="playLabel">Toca para escuchar</span>
    </div>

    <div class="build-area" id="buildArea"></div>
    <div class="tile-bank"  id="tileBank"></div>

    <div class="end" id="endScreen">
      <div class="trophy">🏆</div>
      <h2>¡Buen trabajo!</h2>
      <p>Escuchaste y construiste todas las oraciones.</p>
      <div class="score-summary">
        <div class="score-box correct" id="endCorrect"></div>
        <div class="score-box wrong"   id="endWrong"></div>
      </div>
      <a href="p5.html" class="next-btn">Siguiente →</a>
    </div>
  </div>
</div>

<script>
(() => {
  "use strict";

  const UNIT   = 4;
  const LESSON = 1;
  const PART   = 4;

  const SUPABASE_BASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const AUDIO_BASE    = SUPABASE_BASE + "audio/u4/";   // flat — confirmed
  const SFX_CORRECT   = SUPABASE_BASE + "sfx/correct.wav";
  const SFX_WRONG     = SUPABASE_BASE + "sfx/incorrect.wav";

  const MAX_WRONG_PER_SLOT = 2; // reveal after this many wrong placements

  // ── Sentences ──
  // tokens: correct tiles in order | distractors: wrong subject & verb tiles
  // audio: reuses p2 files (confirmed at audio/u4/)
  const SENTENCES = [
    { tokens:["He is","washing","his","hair."],        distractors:{subject:"She is", verb:"painting"},  audio:"u4.l1.p2.washing.mp3"  },
    { tokens:["We are","doing","our","exercises."],    distractors:{subject:"They are",verb:"cleaning"}, audio:"u4.l1.p2.exercise.mp3" },
    { tokens:["They are","cleaning","their","yard."],  distractors:{subject:"We are", verb:"doing"},     audio:"u4.l1.p2.clean.mp3"    },
    { tokens:["She is","painting","her","living room."],distractors:{subject:"He is", verb:"washing"},   audio:"u4.l1.p2.painting.mp3" },
    { tokens:["He is","fixing","the","sink."],         distractors:{subject:"She is", verb:"cooking"},   audio:"u4.l1.p2.fixing.mp3"   },
    { tokens:["She is","cooking","dinner."],           distractors:{subject:"He is", verb:"fixing"},     audio:"u4.l1.p2.cooking.mp3"  },
    { tokens:["I am","feeding","my","cat."],           distractors:{subject:"We are", verb:"reading"},   audio:"u4.l1.p2.feed.mp3"     },
    { tokens:["He is","reading","his","email."],       distractors:{subject:"She is", verb:"feeding"},   audio:"u4.l1.p2.read.mp3"     }
  ];

  // ── DOM refs ──
  const playBtn    = document.getElementById("playBtn");
  const playLabel  = document.getElementById("playLabel");
  const buildArea  = document.getElementById("buildArea");
  const tileBank   = document.getElementById("tileBank");
  const endScreen  = document.getElementById("endScreen");
  const currentNum = document.getElementById("currentNum");
  const roundRow   = document.getElementById("roundRow");
  const audioArea  = document.getElementById("audioArea");
  const cntCorrect = document.getElementById("cntCorrect");
  const cntWrong   = document.getElementById("cntWrong");
  const endCorrect = document.getElementById("endCorrect");
  const endWrong   = document.getElementById("endWrong");

  // ── State ──
  const order     = shuffle(SENTENCES.map((_, i) => i));
  let curIdx      = 0;
  let curAudio    = null;
  let selectedTile = null;
  let filledSlots  = [];
  let correctInSentence = 0;
  let wrongPerSlot = []; // mistake count per slot index
  let scoreC      = 0;
  let scoreW      = 0;

  // ── SFX ──
  function playSfx(url) { new Audio(url).play().catch(() => {}); }

  function updateCounter() {
    cntCorrect.textContent = `✓ ${scoreC}`;
    cntWrong.textContent   = `✗ ${scoreW}`;
  }

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ── Audio control ──
  function stopAudio() {
    if (!curAudio) return;
    curAudio.pause();
    curAudio.currentTime = 0;
    curAudio = null;
    playBtn.classList.remove("playing");
    playBtn.textContent   = "▶";
    playLabel.textContent = "Toca para escuchar";
  }

  function playAudio(file, onEnd) {
    stopAudio();
    const a = new Audio(AUDIO_BASE + file);
    curAudio = a;
    playBtn.classList.add("playing");
    playBtn.textContent   = "■";
    playLabel.textContent = "Escuchando...";
    a.play().catch(() => {});
    a.addEventListener("ended", () => { if (curAudio === a) { stopAudio(); if (onEnd) onEnd(); } });
    a.addEventListener("error", () => { if (curAudio === a) stopAudio(); });
  }

  playBtn.addEventListener("click", () => {
    const s = SENTENCES[order[curIdx]];
    playAudio(s.audio);
  });

  // ── Build sentence ──
  function buildSentence(sentIdx) {
    const s = SENTENCES[sentIdx];
    const tokens = s.tokens;

    stopAudio();
    selectedTile        = null;
    filledSlots         = new Array(tokens.length).fill(null);
    wrongPerSlot        = new Array(tokens.length).fill(0);
    correctInSentence   = 0;

    currentNum.textContent = curIdx + 1;
    buildArea.classList.remove("all-correct");
    buildArea.innerHTML = "";
    tileBank.innerHTML  = "";

    // ── Slots ──
    tokens.forEach((token, i) => {
      const slot = document.createElement("div");
      slot.className        = "slot empty";
      slot.dataset.index    = i;
      slot.dataset.token    = token;
      slot.textContent      = token; // invisible via color:transparent on .empty
      slot.addEventListener("click", () => handleSlotClick(slot, i, tokens));
      buildArea.appendChild(slot);
    });

    // ── Tiles: subject pair + verb pair + tail in order ──
    const subjectPair = shuffle([tokens[0], s.distractors.subject]);
    const verbPair    = shuffle([tokens[1], s.distractors.verb]);
    const tail        = tokens.slice(2);

    [
      ...subjectPair.map(w => ({ word: w, type: "subject" })),
      ...verbPair.map(w    => ({ word: w, type: "verb"    })),
      ...tail.map(w        => ({ word: w, type: "tail"    }))
    ].forEach(({ word }) => {
      const tile = document.createElement("div");
      tile.className   = "tile";
      tile.textContent = word;
      tile.dataset.word = word;
      tile.addEventListener("click", () => handleTileClick(tile));
      tileBank.appendChild(tile);
    });
  }

  // ── Tile selection ──
  function handleTileClick(tile) {
    if (tile.classList.contains("used")) return;
    if (selectedTile === tile) { tile.classList.remove("selected"); selectedTile = null; return; }
    if (selectedTile) selectedTile.classList.remove("selected");
    selectedTile = tile;
    tile.classList.add("selected");
  }

  // ── Slot click ──
  function handleSlotClick(slot, i, tokens) {
    if (slot.classList.contains("correct") || slot.classList.contains("shown")) return;

    // Tap a filled/wrong slot to return the tile
    if (slot.classList.contains("filled") || slot.classList.contains("wrong")) {
      returnTileFromSlot(slot, i);
      return;
    }

    if (!selectedTile) {
      slot.style.borderColor = "#f59e0b";
      setTimeout(() => { slot.style.borderColor = ""; }, 500);
      return;
    }

    placeTile(slot, i, tokens);
  }

  function returnTileFromSlot(slot, i) {
    const tile = filledSlots[i];
    if (tile) { tile.classList.remove("used", "selected"); filledSlots[i] = null; }
    resetSlot(slot);
  }

  function resetSlot(slot) {
    slot.textContent = slot.dataset.token;
    slot.className   = "slot empty";
    slot.style.borderColor = "";
  }

  function placeTile(slot, i, tokens) {
    const chosen  = selectedTile.dataset.word;
    const correct = tokens[i];
    slot.textContent = chosen;

    if (chosen === correct) {
      slot.className = "slot correct";
      selectedTile.classList.add("used");
      filledSlots[i] = selectedTile;
      selectedTile   = null;
      playSfx(SFX_CORRECT);
      scoreC++;
      updateCounter();
      correctInSentence++;
      if (correctInSentence === tokens.length) onSentenceComplete();
    } else {
      // Wrong placement
      wrongPerSlot[i] = (wrongPerSlot[i] || 0) + 1;
      scoreW++;
      updateCounter();
      playSfx(SFX_WRONG);

      slot.className = "slot wrong";
      const tileUsed = selectedTile;
      tileUsed.classList.remove("selected");
      selectedTile = null;

      if (wrongPerSlot[i] >= MAX_WRONG_PER_SLOT) {
        // Reveal correct word in amber after shake
        setTimeout(() => {
          slot.textContent = correct;
          slot.className   = "slot shown";
          // Mark the tile with the correct word as used too
          tileBank.querySelectorAll(".tile").forEach(t => {
            if (t.dataset.word === correct && !t.classList.contains("used")) {
              t.classList.add("used");
            }
          });
          filledSlots[i] = { dataset: { word: correct } }; // mark as resolved
          correctInSentence++;
          if (correctInSentence === tokens.length) onSentenceComplete();
        }, 650);
      } else {
        setTimeout(() => resetSlot(slot), 650);
      }
    }
  }

  // ── Sentence complete ──
  function onSentenceComplete() {
    buildArea.classList.add("all-correct");
    const s = SENTENCES[order[curIdx]];
    setTimeout(() => playAudio(s.audio, advance), 300);
  }

  function advance() {
    curIdx++;
    if (curIdx >= SENTENCES.length) {
      finish();
    } else {
      buildSentence(order[curIdx]);
    }
  }

  // ── Finish ──
  function finish() {
    stopAudio();
    buildArea.style.display = "none";
    tileBank.style.display  = "none";
    audioArea.style.display = "none";
    roundRow.style.display  = "none";

    try {
      const KEY  = `inglesco_progress_u${UNIT}`;
      const data = JSON.parse(localStorage.getItem(KEY) || "{}");
      const lk   = `l${LESSON}`;
      if (!data[lk]) data[lk] = { partsCompleted: 0, partsTotal: 5 };
      if (data[lk].partsCompleted < PART) data[lk].partsCompleted = PART;
      localStorage.setItem(KEY, JSON.stringify(data));

      const fkey = `inglesco_furthest_u${UNIT}_l${LESSON}`;
      const cur  = parseInt(localStorage.getItem(fkey) || "0", 10);
      if (PART > cur) localStorage.setItem(fkey, String(PART));
    } catch (e) {}

    endCorrect.textContent = `✓ ${scoreC}`;
    endWrong.textContent   = `✗ ${scoreW}`;
    endScreen.classList.add("show");
  }

  // ── Init ──
  updateCounter();
  buildSentence(order[curIdx]);
})();
</script>
</body>
</html>
