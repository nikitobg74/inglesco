<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unidad 4 • Lección 2 • Parte 4</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      min-height: 100vh;
      padding: 16px 12px 60px;
      color: #111827;
    }

    .wrap { max-width: 700px; margin: 0 auto; }

    .back-btn {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 14px;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }

    .back-btn:hover { background: #1e40af; }

    .top-title {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .subline {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #374151;
    }

    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 12px 0 20px 0;
    }

    .step {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      cursor: pointer;
      transition: all .3s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
      font-size: 15px;
    }

    .step.active {
      background: #2563eb;
      color: #fff;
    }

    .step:hover { transform: scale(1.1); }

    .card {
      background: rgba(255,255,255,.88);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
    }

    .ex-header {
      text-align: center;
      background: #2563eb;
      color: white;
      border-radius: 14px;
      padding: 9px 20px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    .counter-row {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }

    .counter {
      font-size: 13px;
      font-weight: 700;
      color: #486581;
    }

    .bar-wrap {
      background: #e2e8f0;
      border-radius: 999px;
      height: 7px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: #2563eb;
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .img-wrap {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #e2e8f0;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
    }

    .img-wrap img {
      max-width: 100%;
      max-height: 160px;
      width: auto;
      height: auto;
      object-fit: contain;
      display: block;
      border-radius: 10px;
      transition: opacity 0.4s ease;
    }

    @media (max-width: 400px) {
      .img-wrap img { max-height: 130px; }
    }

    .audio-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }

    .play-btn {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #2563eb;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 5px 16px rgba(37,99,235,0.35);
      transition: background 0.2s, transform 0.1s;
      color: white;
      font-size: 24px;
    }

    .play-btn:hover {
      background: #1d4ed8;
      transform: scale(1.05);
    }

    .play-btn:active { transform: scale(0.96); }
    .play-btn.playing { background: #7c3aed; }
    .play-btn.replay { background: #0891b2; }
    .play-btn.pulse { animation: pulse 0.3s ease 2; }

    @keyframes pulse {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }

    .play-label {
      font-size: 12px;
      font-weight: 600;
      color: #486581;
      text-align: center;
    }

    .sentence-wrap {
      text-align: center;
      margin-bottom: 16px;
    }

    .sentence {
      font-size: 20px;
      font-weight: 900;
      color: #1e293b;
      line-height: 1.5;
    }

    .sentence .blank {
      display: inline-block;
      min-width: 80px;
      border-bottom: 3px solid #2563eb;
      color: #93c5fd;
      padding: 0 4px;
    }

    .sentence .filled {
      display: inline-block;
      background: #dcfce7;
      color: #15803d;
      border-radius: 8px;
      padding: 2px 10px;
      border: 2px solid #16a34a;
      animation: popIn 0.3s ease;
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .hint {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: #64748b;
      margin-bottom: 14px;
      min-height: 22px;
    }

    .hint.correct { color: #16a34a; }
    .hint.wrong { color: #dc2626; }
    .hint.warn { color: #d97706; }

    .tiles {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .tile {
      background: white;
      border: 2px solid #93c5fd;
      color: #1e40af;
      padding: 10px 28px;
      border-radius: 30px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Poppins', sans-serif;
      user-select: none;
    }

    .tile:hover {
      background: #2563eb;
      color: white;
      border-color: #2563eb;
      transform: translateY(-2px);
    }

    .tile.correct {
      background: #dcfce7;
      border-color: #16a34a;
      color: #15803d;
      transform: scale(1.08);
      pointer-events: none;
    }

    .tile.wrong {
      background: #fee2e2;
      border-color: #dc2626;
      color: #dc2626;
      animation: shake 0.45s ease;
    }

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .end {
      text-align: center;
      padding: 24px 10px 10px;
      display: none;
    }

    .end.show { display: block; }

    .end .trophy {
      font-size: 52px;
      margin-bottom: 10px;
    }

    .end h2 {
      margin: 8px 0;
      font-size: 22px;
      font-weight: 900;
      color: #1e40af;
    }

    .end p {
      margin: 5px 0;
      font-weight: 600;
      color: #486581;
      font-size: 14px;
    }

    .finish-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(22,163,74,.30);
      transition: background .2s;
      margin-top: 16px;
      text-decoration: none;
      font-family: 'Poppins', sans-serif;
    }

    .finish-btn:hover { background: #15803d; }
  </style>
</head>
<body>

<div class="wrap">

  <a href="../index.html" class="back-btn">← Unidad 4</a>

  <div class="top-title">Unidad 4 • Lección 2 • Parte 4</div>
  <div class="subline">Escucha y selecciona la palabra correcta</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step active" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <div class="card">

    <div id="slideArea">

      <div class="ex-header">Escucha primero y luego toca la palabra correcta.</div>

      <div class="counter-row">
        <span class="counter" id="counter">1 / 12</span>
      </div>

      <div class="bar-wrap">
        <div class="bar-fill" id="progressBar"></div>
      </div>

      <div class="img-wrap">
        <img id="slideImg" src="" alt="lesson image" />
      </div>

      <div class="audio-area">
        <button class="play-btn" id="playBtn" aria-label="Reproducir audio">▶</button>
        <span class="play-label" id="playLabel">Toca para escuchar</span>
      </div>

      <div class="sentence-wrap">
        <div class="sentence" id="sentence"></div>
      </div>

      <p class="hint" id="hint"></p>

      <div class="tiles" id="tiles"></div>

    </div>

    <div class="end" id="endScreen">
      <div class="trophy">🏆</div>
      <h2>¡Perfecto!</h2>
      <p>¡Completaste los 12 ejercicios!</p>
      <a href="p5.html" class="finish-btn">Continuar → Parte 5</a>
    </div>

  </div>
</div>

<script src="../../../../js/u4/u4_l2_p4.js"></script>
</body>
</html>
