<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unidad 4 • Lección 3 • Parte 2</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
  <link rel="manifest" href="../../../../manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

  <!-- Vercel Insights -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      min-height: 100vh;
      padding: 16px 12px 60px;
      color: #111827;
    }

    .wrap { max-width: 480px; margin: 0 auto; }

    .back-btn {
      display: inline-block; margin-bottom: 16px;
      padding: 7px 14px; background: #2563eb; color: white;
      border-radius: 10px; text-decoration: none; font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    .top-title {
      text-align: center; font-size: 18px; font-weight: 900;
      color: #1e40af; margin-bottom: 4px;
    }
    .subline {
      text-align: center; font-size: 14px; font-weight: 700;
      margin-bottom: 16px; color: #374151;
    }

    /* ── Progress steps ── */
    .progress-container {
      display: flex; justify-content: center;
      gap: 10px; margin: 12px 0 20px 0;
    }
    .step {
      width: 38px; height: 38px; border-radius: 50%;
      background: #d1d5db;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; cursor: pointer; transition: all .3s;
      color: #1f2933; text-decoration: none; user-select: none;
      font-size: 15px;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    /* ── Score bar ── */
    .score-bar {
      display: flex; justify-content: center; gap: 24px;
      margin-bottom: 14px;
    }
    .score-pill {
      display: flex; align-items: center; gap: 6px;
      background: white; border-radius: 999px;
      padding: 5px 14px; font-size: 14px; font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .score-pill.correct { color: #16a34a; }
    .score-pill.wrong   { color: #dc2626; }

    /* ── Main card ── */
    .card {
      background: rgba(255,255,255,.92);
      border-radius: 18px; padding: 18px 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,.09);
    }

    .counter-row {
      display: flex; justify-content: space-between;
      align-items: center; margin-bottom: 8px;
    }
    .counter { font-size: 13px; font-weight: 700; color: #486581; }
    .bar-wrap {
      background: #e2e8f0; border-radius: 999px;
      height: 7px; margin-bottom: 18px; overflow: hidden;
    }
    .bar-fill {
      height: 100%; width: 0%; background: #2563eb;
      border-radius: 999px; transition: width 0.5s ease;
    }

    /* ── Two-column layout ── */
    .slide-columns {
      display: flex; gap: 12px;
      align-items: flex-start; margin-bottom: 16px;
    }
    .col-left {
      flex: 0 0 42%;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }
    .col-left .img-wrap {
      width: 100%; border-radius: 14px; overflow: hidden;
      background: #f1f5f9; border: 2px solid #bfdbfe;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    .col-left .img-wrap img {
      max-width: 100%; max-height: 140px;
      width: auto; height: auto;
      object-fit: contain; display: block; border-radius: 10px;
    }
    .question-bubble {
      background: #2563eb; color: white;
      border-radius: 12px; padding: 8px 10px;
      text-align: center; font-size: 13px; font-weight: 700;
      line-height: 1.4; position: relative; width: 100%;
    }
    .question-bubble::before {
      content: '';
      position: absolute; top: -8px; left: 50%;
      transform: translateX(-50%);
      border: 8px solid transparent;
      border-bottom-color: #2563eb; border-top: 0;
    }

    .col-right {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
    }
    .col-right .img-wrap {
      width: 100%; border-radius: 14px; overflow: hidden;
      background: #f1f5f9;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    .col-right .img-wrap img {
      max-width: 100%; max-height: 140px;
      width: auto; height: auto;
      object-fit: contain; display: block; border-radius: 10px;
      transition: opacity 0.4s ease;
    }
    .answer-bubble {
      background: #f0fdf4; border: 2px solid #86efac;
      border-radius: 12px; padding: 10px 12px;
      text-align: center; width: 100%;
    }
    .answer-bubble .label-en {
      font-size: 16px; font-weight: 900;
      color: #1e293b; line-height: 1.4;
    }

    /* ── Audio area ── */
    .audio-area {
      display: flex; flex-direction: column;
      align-items: center; gap: 8px; margin-bottom: 16px;
    }
    .play-btn {
      width: 64px; height: 64px; border-radius: 50%;
      background: #2563eb; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 5px 16px rgba(37,99,235,0.35);
      transition: background 0.2s, transform 0.1s;
      color: white; font-size: 26px;
    }
    .play-btn:hover   { background: #1d4ed8; transform: scale(1.05); }
    .play-btn:active  { transform: scale(0.96); }
    .play-btn.playing { background: #7c3aed; }
    .play-btn.done    { background: #16a34a; }
    .play-label { font-size: 12px; font-weight: 600; color: #486581; }

    /* ── Feedback ── */
    .feedback-flash {
      text-align: center; font-size: 15px; font-weight: 700;
      min-height: 24px; margin-bottom: 10px;
    }
    .feedback-flash.correct { color: #16a34a; }
    .feedback-flash.wrong   { color: #dc2626; }

    /* ── Next button ── */
    .next-btn {
      display: block; width: 100%;
      padding: 13px 0; background: #d1d5db; color: #9ca3af;
      border: none; border-radius: 14px; font-weight: 900;
      font-size: 16px; cursor: not-allowed;
      font-family: 'Poppins', sans-serif;
      transition: background 0.3s, color 0.3s, box-shadow 0.3s;
      text-align: center;
    }
    .next-btn.ready {
      background: #2563eb; color: white; cursor: pointer;
      box-shadow: 0 5px 14px rgba(37,99,235,0.30);
    }
    .next-btn.ready:hover { background: #1d4ed8; }

    /* ── End screen ── */
    .end { text-align: center; padding: 24px 10px 10px; display: none; }
    .end.show { display: block; }
    .end .trophy { font-size: 52px; margin-bottom: 10px; }
    .end h2 { margin: 8px 0; font-size: 22px; font-weight: 900; color: #1e40af; }
    .end p  { margin: 5px 0; font-weight: 600; color: #486581; font-size: 14px; }
    .end-score {
      display: flex; justify-content: center; gap: 20px;
      margin: 14px 0 6px;
    }
    .end-score .pill {
      padding: 6px 18px; border-radius: 999px; font-weight: 700; font-size: 15px;
    }
    .end-score .pill.c { background: #dcfce7; color: #16a34a; }
    .end-score .pill.w { background: #fee2e2; color: #dc2626; }
    .finish-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; background: #16a34a; color: #fff;
      border: none; border-radius: 14px; font-weight: 900;
      font-size: 16px; cursor: pointer;
      box-shadow: 0 5px 12px rgba(22,163,74,.30);
      transition: background .2s; margin-top: 16px;
      text-decoration: none; font-family: 'Poppins', sans-serif;
    }
    .finish-btn:hover { background: #15803d; }

    @media (max-width: 400px) {
      .slide-columns { flex-direction: column; }
      .col-left { flex: none; width: 100%; }
      .col-right { width: 100%; }
      .col-left .img-wrap img,
      .col-right .img-wrap img { max-height: 110px; }
      .question-bubble::before { display: none; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <a href="../index.html" class="back-btn">← Unidad 4</a>

  <div class="top-title">Unidad 4 • Lección 3 • Parte 2</div>
  <div class="subline">What is this? — More vocabulary</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step active" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Score pills -->
  <div class="score-bar">
    <div class="score-pill correct">✅ <span id="scoreCorrect">0</span> correctas</div>
    <div class="score-pill wrong">❌ <span id="scoreWrong">0</span> errores</div>
  </div>

  <div class="card">

    <div id="slideArea">

      <div class="counter-row">
        <span class="counter" id="counter">1 / 5</span>
      </div>
      <div class="bar-wrap">
        <div class="bar-fill" id="progressBar"></div>
      </div>

      <div class="slide-columns">

        <div class="col-left">
          <div class="img-wrap">
            <img src="https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/images/u4/girl.asking.jpg" alt="Girl asking: What is this?" />
          </div>
          <div class="question-bubble">What is this?</div>
        </div>

        <div class="col-right">
          <div class="img-wrap">
            <img id="slideImg" src="" alt="Answer image" />
          </div>
          <div class="answer-bubble">
            <div class="label-en" id="enText"></div>
          </div>
        </div>

      </div>

      <div class="audio-area">
        <button class="play-btn" id="playBtn" aria-label="Reproducir audio">▶</button>
        <span class="play-label" id="playLabel">Toca para escuchar</span>
      </div>

      <div class="feedback-flash" id="feedbackFlash"></div>

      <button class="next-btn" id="nextBtn" disabled>Siguiente →</button>

    </div>

    <div class="end" id="endScreen">
      <div class="trophy">🏆</div>
      <h2>¡Muy bien!</h2>
      <p>Practicaste más vocabulario con "What is this?"</p>
      <div class="end-score">
        <div class="pill c">✅ <span id="endCorrect">0</span> correctas</div>
        <div class="pill w">❌ <span id="endWrong">0</span> errores</div>
      </div>
      <a href="p3.html" class="finish-btn">Continuar → Parte 3</a>
    </div>

  </div>
</div>

<script>
(() => {
  const UNIT   = 4;
  const LESSON = 3;
  const PART   = 2;

  const BASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG  = BASE + "images/u4/";
  const AUD  = BASE + "audio/u4/";
  const SFX  = BASE + "sfx/";

  const SLIDES = [
    { image: IMG + "u4.l2.p1.old.car.jpg",          audio: AUD + "u4.l3.p2.my.old.car.mp3",         en: "This is my old car."        },
    { image: IMG + "u4.l2.p4.expensive.phone.jpg",   audio: AUD + "u4.l3.p2.my.expensive.phone.mp3", en: "This is my expensive phone." },
    { image: IMG + "u4.l2.p1.small.bedroom.jpg",     audio: AUD + "u4.l3.p2.small.apartment.mp3",    en: "This is my small apartment." },
    { image: IMG + "u4.l2.p1.cheap.watch.jpg",       audio: AUD + "u4.l3.p2.cheap.watch.mp3",        en: "This is my cheap watch."     },
    { image: IMG + "u4.l2.p1.modern.house.jpg",      audio: AUD + "u4.l3.p2.big.house.mp3",          en: "This is my big house."       },
  ];

  const MAX_WRONG_BEFORE_REVEAL = 2;

  let current        = 0;
  let audioPlayed    = false;
  let isPlaying      = false;
  let playPromise    = null;
  let scoreCorrect   = 0;
  let scoreWrong     = 0;
  let wrongThisSlide = 0;

  const slideImg       = document.getElementById("slideImg");
  const enText         = document.getElementById("enText");
  const playBtn        = document.getElementById("playBtn");
  const playLabel      = document.getElementById("playLabel");
  const nextBtn        = document.getElementById("nextBtn");
  const counterEl      = document.getElementById("counter");
  const progressBar    = document.getElementById("progressBar");
  const endScreen      = document.getElementById("endScreen");
  const slideArea      = document.getElementById("slideArea");
  const feedbackFlash  = document.getElementById("feedbackFlash");
  const scoreCorrectEl = document.getElementById("scoreCorrect");
  const scoreWrongEl   = document.getElementById("scoreWrong");

  function playCorrectSFX() { new Audio(SFX + "correct.wav").play().catch(() => {}); }
  function playWrongSFX()   { new Audio(SFX + "incorrect.wav").play().catch(() => {}); }

  function showFeedback(type, msg) {
    feedbackFlash.textContent = msg;
    feedbackFlash.className = "feedback-flash " + type;
    clearTimeout(feedbackFlash._timer);
    feedbackFlash._timer = setTimeout(() => {
      feedbackFlash.textContent = "";
      feedbackFlash.className = "feedback-flash";
    }, 2200);
  }

  function recordCorrect() {
    scoreCorrect++;
    scoreCorrectEl.textContent = scoreCorrect;
    showFeedback("correct", "¡Correcto! 🎉");
    playCorrectSFX();
  }

  function recordWrong() {
    scoreWrong++;
    wrongThisSlide++;
    scoreWrongEl.textContent = scoreWrong;
    playWrongSFX();
    if (wrongThisSlide >= MAX_WRONG_BEFORE_REVEAL) {
      showFeedback("wrong", "La respuesta: " + SLIDES[current].en);
    } else {
      showFeedback("wrong", "Inténtalo de nuevo 💪");
    }
  }

  let audio = new Audio();

  function playAudio() {
    if (isPlaying) return;
    isPlaying = true;
    playBtn.innerHTML = "⏸";
    playBtn.classList.add("playing");
    playBtn.classList.remove("done");
    playLabel.textContent = "Escuchando...";

    playPromise = audio.play();
    if (playPromise) {
      playPromise.then(() => { playPromise = null; }).catch(err => {
        if (err.name !== "AbortError") {
          isPlaying = false;
          playBtn.classList.remove("playing");
          playBtn.innerHTML = "▶";
          playLabel.textContent = "No se pudo reproducir.";
        }
        playPromise = null;
      });
    }
  }

  function loadSlide(idx, autoplay) {
    const s = SLIDES[idx];
    audioPlayed    = false;
    isPlaying      = false;
    wrongThisSlide = 0;

    slideImg.style.opacity = "0";
    slideImg.src = s.image;
    slideImg.onload = () => { slideImg.style.opacity = "1"; };

    enText.textContent = s.en;
    counterEl.textContent = `${idx + 1} / ${SLIDES.length}`;
    progressBar.style.width = ((idx + 1) / SLIDES.length * 100) + "%";

    setPlayIdle();
    nextBtn.disabled = true;
    nextBtn.classList.remove("ready");

    feedbackFlash.textContent = "";
    feedbackFlash.className = "feedback-flash";

    audio.pause();
    audio = new Audio(s.audio);
    audio.preload = "auto";

    audio.addEventListener("ended", () => {
      isPlaying   = false;
      audioPlayed = true;
      setPlayDone();
      recordCorrect();
      nextBtn.disabled = false;
      nextBtn.classList.add("ready");
    });

    audio.addEventListener("error", () => {
      isPlaying = false;
      playLabel.textContent = "Audio no disponible";
      playBtn.classList.remove("playing");
      playBtn.innerHTML = "▶";
      audioPlayed = true;
      nextBtn.disabled = false;
      nextBtn.classList.add("ready");
    });

    if (autoplay) setTimeout(() => playAudio(), 300);
  }

  function setPlayIdle() {
    playBtn.innerHTML = "▶";
    playBtn.classList.remove("playing", "done");
    playLabel.textContent = "Toca para escuchar";
  }

  function setPlayDone() {
    playBtn.innerHTML = "▶";
    playBtn.classList.remove("playing");
    playBtn.classList.add("done");
    playLabel.textContent = "¡Escuchado! Toca para repetir";
  }

  playBtn.addEventListener("click", () => {
    if (isPlaying) {
      if (playPromise) {
        playPromise.then(() => audio.pause()).catch(() => {});
        playPromise = null;
      } else {
        audio.pause();
      }
      isPlaying = false;
      playBtn.innerHTML = "▶";
      playBtn.classList.remove("playing");
      playLabel.textContent = "Toca ▶ para continuar";
      return;
    }
    if (audioPlayed) audio.currentTime = 0;
    playAudio();
  });

  nextBtn.addEventListener("click", () => {
    if (nextBtn.disabled) return;
    audio.pause();
    isPlaying = false;
    current++;
    if (current >= SLIDES.length) {
      showEnd();
    } else {
      loadSlide(current, true);
    }
  });

  function showEnd() {
    slideArea.style.display = "none";
    endScreen.classList.add("show");
    document.getElementById("endCorrect").textContent = scoreCorrect;
    document.getElementById("endWrong").textContent   = scoreWrong;
    markPartComplete();
  }

  function markPartComplete() {
    try {
      const key  = `inglesco_progress_u${UNIT}`;
      const data = JSON.parse(localStorage.getItem(key) || "{}");
      const lk   = `l${LESSON}`;
      if (!data[lk]) data[lk] = { partsCompleted: 0, partsTotal: 5 };
      if ((data[lk].partsCompleted || 0) < PART) data[lk].partsCompleted = PART;
      localStorage.setItem(key, JSON.stringify(data));

      const fk   = `inglesco_furthest_u${UNIT}_l${LESSON}`;
      const prev = parseInt(localStorage.getItem(fk) || "0");
      if (PART > prev) localStorage.setItem(fk, String(PART));
    } catch(e) {}
  }

  loadSlide(0, false);
})();
</script>
</body>
</html>
