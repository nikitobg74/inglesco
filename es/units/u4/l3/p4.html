<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unidad 4 • Lección 3 • Parte 4</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
  <link rel="manifest" href="../../../../manifest.json" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

  <!-- Vercel Insights -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      min-height: 100vh;
      padding: 16px 12px 60px;
      color: #111827;
    }

    .wrap { max-width: 480px; margin: 0 auto; }

    .back-btn {
      display: inline-block; margin-bottom: 16px;
      padding: 7px 14px; background: #2563eb; color: white;
      border-radius: 10px; text-decoration: none; font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    .top-title {
      text-align: center; font-size: 18px; font-weight: 900;
      color: #1e40af; margin-bottom: 4px;
    }
    .subline {
      text-align: center; font-size: 14px; font-weight: 700;
      margin-bottom: 16px; color: #374151;
    }

    /* ── Part steps ── */
    .progress-container {
      display: flex; justify-content: center;
      gap: 10px; margin: 12px 0 20px 0;
    }
    .step {
      width: 38px; height: 38px; border-radius: 50%;
      background: #d1d5db;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; cursor: pointer; transition: all .3s;
      color: #1f2933; text-decoration: none; user-select: none;
      font-size: 15px;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    /* ── Score bar ── */
    .score-bar {
      display: flex; justify-content: center; gap: 24px;
      margin-bottom: 14px;
    }
    .score-pill {
      display: flex; align-items: center; gap: 6px;
      background: white; border-radius: 999px;
      padding: 5px 14px; font-size: 14px; font-weight: 700;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .score-pill.correct { color: #16a34a; }
    .score-pill.wrong   { color: #dc2626; }

    /* ── Main card ── */
    .card {
      background: rgba(255,255,255,.92);
      border-radius: 18px; padding: 18px 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,.09);
    }

    /* ── Question progress bar ── */
    .q-bar-wrap {
      background: #e2e8f0; border-radius: 999px;
      height: 7px; margin-bottom: 20px; overflow: hidden;
    }
    .q-bar-fill {
      height: 100%; width: 0%; background: #2563eb;
      border-radius: 999px; transition: width 0.5s ease;
    }

    /* ── Passage block ── */
    .passage-block { transition: opacity 0.35s; }
    .passage-block.fading { opacity: 0; }

    /* ── Image + audio row ── */
    .passage {
      display: flex; gap: 12px;
      align-items: flex-start; margin-bottom: 14px;
    }
    .passage-img {
      flex: 0 0 42%;
      border-radius: 14px; overflow: hidden;
      background: #f1f5f9; border: 2px solid #bfdbfe;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    .passage-img img {
      max-width: 100%; max-height: 160px;
      width: auto; height: auto;
      object-fit: contain; border-radius: 10px; display: block;
      transition: opacity 0.4s ease;
    }
    .passage-right {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; padding-top: 8px;
    }

    /* ── Audio button ── */
    .play-btn {
      width: 62px; height: 62px; border-radius: 50%;
      background: #2563eb; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 5px 16px rgba(37,99,235,0.35);
      transition: background 0.2s, transform 0.1s;
      color: white; font-size: 24px;
    }
    .play-btn:hover   { background: #1d4ed8; transform: scale(1.05); }
    .play-btn:active  { transform: scale(0.96); }
    .play-btn.playing { background: #7c3aed; }
    .play-btn.done    { background: #16a34a; }
    .play-label {
      font-size: 11px; font-weight: 600; color: #486581;
      text-align: center; line-height: 1.4;
    }

    /* ── Reading text ── */
    .reading-text {
      background: #f8fafc;
      border-left: 4px solid #2563eb;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px; font-weight: 600;
      line-height: 2; color: #1e293b;
      margin-bottom: 18px;
    }
    .reading-text p { margin: 0; }

    /* Inline fill-blank span — word visible, turns green on correct answer */
    .txt-blank { font-weight: 900; color: #1e293b; }
    .txt-blank.revealed { color: #15803d; }

    .divider {
      border: none; border-top: 2px dashed #cbd5e1;
      margin: 0 0 16px;
    }

    /* ── Question card ── */
    .q-card {
      background: #eff6ff; border: 2px solid #bfdbfe;
      border-radius: 14px; padding: 14px;
      margin-bottom: 10px; display: none;
    }
    .q-card.active { display: block; }

    .q-statement {
      font-size: 15px; font-weight: 700;
      color: #1e293b; margin-bottom: 12px; line-height: 1.5;
    }

    /* ── Feedback inline ── */
    .q-feedback {
      font-size: 13px; font-weight: 700;
      min-height: 20px; margin-top: 8px; text-align: center;
    }
    .q-feedback.correct { color: #16a34a; }
    .q-feedback.wrong   { color: #dc2626; }

    /* ── Tiles ── */
    .tiles-row {
      display: flex; gap: 10px; justify-content: center;
      flex-wrap: wrap;
    }
    .tile {
      flex: 1; min-width: 80px;
      padding: 13px 8px; border-radius: 14px;
      border: 3px solid #d1d5db; background: #f8fafc;
      font-size: 15px; font-weight: 900; color: #1e293b;
      cursor: pointer; text-align: center;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      user-select: none; line-height: 1.4;
    }
    .tile:hover:not(.locked) {
      border-color: #2563eb; background: #eff6ff;
      transform: scale(1.03);
    }
    .tile.locked { cursor: default; pointer-events: none; }
    .tile.correct { border-color: #16a34a; background: #dcfce7; color: #15803d; }
    .tile.wrong   { border-color: #dc2626; background: #fee2e2; color: #dc2626; }

    @keyframes shake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-7px); }
      30%  { transform: translateX(7px); }
      45%  { transform: translateX(-5px); }
      60%  { transform: translateX(5px); }
      75%  { transform: translateX(-3px); }
      90%  { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }
    .tile.shake { animation: shake 0.45s ease; }

    /* ── End screen ── */
    .end { text-align: center; padding: 24px 10px 10px; display: none; }
    .end.show { display: block; }
    .end .trophy { font-size: 52px; margin-bottom: 10px; }
    .end h2 { margin: 8px 0; font-size: 22px; font-weight: 900; color: #1e40af; }
    .end p  { margin: 5px 0; font-weight: 600; color: #486581; font-size: 14px; }
    .end-score {
      display: flex; justify-content: center; gap: 20px;
      margin: 14px 0 6px;
    }
    .end-score .pill {
      padding: 6px 18px; border-radius: 999px; font-weight: 700; font-size: 15px;
    }
    .end-score .pill.c { background: #dcfce7; color: #16a34a; }
    .end-score .pill.w { background: #fee2e2; color: #dc2626; }
    .finish-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; background: #16a34a; color: #fff;
      border: none; border-radius: 14px; font-weight: 900;
      font-size: 16px; cursor: pointer;
      box-shadow: 0 5px 12px rgba(22,163,74,.30);
      transition: background .2s; margin-top: 16px;
      text-decoration: none; font-family: 'Poppins', sans-serif;
    }
    .finish-btn:hover { background: #15803d; }

    @media (max-width: 400px) {
      .passage { flex-direction: column; }
      .passage-img { flex: none; width: 100%; }
      .passage-img img { max-height: 180px; margin: 0 auto; }
      .passage-right { flex-direction: row; justify-content: center; }
      .tile { font-size: 13px; padding: 11px 6px; }
      .q-statement { font-size: 13px; }
      .reading-text { font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <a href="../index.html" class="back-btn">← Unidad 4</a>

  <div class="top-title">Unidad 4 • Lección 3 • Parte 4</div>
  <div class="subline">Lee y responde</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step active" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Score pills -->
  <div class="score-bar">
    <div class="score-pill correct">✅ <span id="scoreCorrect">0</span> correctas</div>
    <div class="score-pill wrong">❌ <span id="scoreWrong">0</span> errores</div>
  </div>

  <div class="card">

    <!-- Question progress bar -->
    <div class="q-bar-wrap">
      <div class="q-bar-fill" id="qBar"></div>
    </div>

    <!-- Main area -->
    <div id="mainArea">
      <div class="passage-block" id="passageBlock">

        <div class="passage">
          <div class="passage-img">
            <img id="passageImg" src="" alt="" />
          </div>
          <div class="passage-right">
            <button class="play-btn" id="playBtn" aria-label="Reproducir audio">▶</button>
            <span class="play-label" id="playLabel">Toca para escuchar</span>
          </div>
        </div>

        <div class="reading-text" id="readingText"></div>

        <hr class="divider" />

        <div id="questionsArea"></div>

      </div>
    </div>

    <!-- End screen -->
    <div class="end" id="endScreen">
      <div class="trophy">🏆</div>
      <h2>¡Muy bien!</h2>
      <p>Leíste y respondiste correctamente.</p>
      <div class="end-score">
        <div class="pill c">✅ <span id="endCorrect">0</span> correctas</div>
        <div class="pill w">❌ <span id="endWrong">0</span> errores</div>
      </div>
      <a href="p5.html" class="finish-btn">Continuar → Parte 5</a>
    </div>

  </div>
</div>

<script>
(() => {
  const UNIT   = 4;
  const LESSON = 3;
  const PART   = 4;

  const BASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG  = BASE + "images/u4/";
  const AUD  = BASE + "audio/u4/";
  const SFX  = BASE + "sfx/";

  const PASSAGES = [
    {
      image: IMG + "u4.l3.p4.rich.man.jpg",
      audio: AUD + "u4.l3.p4.rich.man.mp3",
      lines: [
        "This is John.",
        "He is from California.",
        "His house is {blank:house-adj:new} and big.",
        "His car is fast and {blank:car-adj:expensive}.",
        "Today John is at the restaurant.",
        "He is eating dinner.",
      ],
      questions: [
        { id: "john-q1", statement: "John is at home today.",       type: "yesno",  correct: "No",        options: ["Yes","No"]                                                              },
        { id: "john-q2", statement: "Where is he?",                 type: "choice", correct: "A",         options: [{ label:"A", text:"He is at the restaurant." },{ label:"B", text:"He is at the park." }] },
        { id: "john-q3", statement: "His house is ___ and big.",    type: "fill",   blankId: "house-adj", correct: "new",       options: ["new","old"]       },
        { id: "john-q4", statement: "His car is fast and ___.",     type: "fill",   blankId: "car-adj",   correct: "expensive", options: ["expensive","slow"] },
      ],
    },
    {
      image: IMG + "u4.l3.p4.old.man.jpg",
      audio: AUD + "u4.l3.p4.old.man.mp3",
      lines: [
        "This is Jack.",
        "He is from Ohio.",
        "His house is {blank:house-adj:small} and old.",
        "His car is {blank:car-adj:slow} and cheap.",
        "Today Jack is at home.",
        "He is in the kitchen.",
        "He is cooking dinner.",
      ],
      questions: [
        { id: "jack-q1", statement: "Jack is at home today.",       type: "yesno",  correct: "Yes",       options: ["Yes","No"]                                                              },
        { id: "jack-q2", statement: "Where is he from?",            type: "choice", correct: "B",         options: [{ label:"A", text:"He is from California." },{ label:"B", text:"He is from Ohio." }] },
        { id: "jack-q3", statement: "His house is ___ and old.",    type: "fill",   blankId: "house-adj", correct: "small",     options: ["small","big"]     },
        { id: "jack-q4", statement: "His car is ___ and cheap.",    type: "fill",   blankId: "car-adj",   correct: "slow",      options: ["fast","slow"]     },
      ],
    },
  ];

  const TOTAL_Q = PASSAGES.reduce((sum, p) => sum + p.questions.length, 0);
  const MAX_WRONG_BEFORE_REVEAL = 2;

  // Per-question wrong-attempt tracker
  const wrongPerQ = {};

  let passageIdx  = 0;
  let questionIdx = 0;
  let answeredQ   = 0;
  let isPlaying   = false;
  let audioPlayed = false;
  let playPromise = null;
  let scoreCorrect = 0;
  let scoreWrong   = 0;

  const qBar          = document.getElementById("qBar");
  const passageImg    = document.getElementById("passageImg");
  const readingText   = document.getElementById("readingText");
  const playBtn       = document.getElementById("playBtn");
  const playLabel     = document.getElementById("playLabel");
  const questionsArea = document.getElementById("questionsArea");
  const mainArea      = document.getElementById("mainArea");
  const endScreen     = document.getElementById("endScreen");
  const passageBlock  = document.getElementById("passageBlock");
  const scoreCorrectEl = document.getElementById("scoreCorrect");
  const scoreWrongEl   = document.getElementById("scoreWrong");

  let audio = new Audio();

  // ── SFX ──────────────────────────────────────────────────────────────────
  function playCorrectSFX() { new Audio(SFX + "correct.wav").play().catch(() => {}); }
  function playWrongSFX()   { new Audio(SFX + "incorrect.wav").play().catch(() => {}); }

  // ── Progress bar ─────────────────────────────────────────────────────────
  function updateBar() {
    qBar.style.width = (answeredQ / TOTAL_Q * 100) + "%";
  }

  // ── Render reading text ───────────────────────────────────────────────────
  // {blank:id:word} → <span class="txt-blank" id="txtblank-id">word</span>
  function renderReadingText(passage) {
    readingText.innerHTML = passage.lines.map(line =>
      "<p>" + line.replace(/{blank:([^:}]+):([^}]+)}/g,
        (_, id, word) => `<span class="txt-blank" id="txtblank-${id}">${word}</span>`
      ) + "</p>"
    ).join("");
  }

  // ── Highlight inline word green when fill question answered correctly ─────
  function revealBlank(blankId) {
    const el = document.getElementById("txtblank-" + blankId);
    if (el) el.classList.add("revealed");
  }

  // ── Show feedback on active question card ─────────────────────────────────
  function setQFeedback(qId, type, msg) {
    const card = document.getElementById("qcard-" + qId);
    if (!card) return;
    let fb = card.querySelector(".q-feedback");
    if (!fb) {
      fb = document.createElement("div");
      fb.className = "q-feedback";
      card.appendChild(fb);
    }
    fb.textContent = msg;
    fb.className = "q-feedback " + type;
    clearTimeout(fb._t);
    if (type === "correct") return; // keep correct msg
    fb._t = setTimeout(() => { fb.textContent = ""; fb.className = "q-feedback"; }, 2000);
  }

  // ── Tile tap handler ──────────────────────────────────────────────────────
  function handleTap(tileEl, q) {
    const allTiles = tileEl.closest(".tiles-row").querySelectorAll(".tile");
    const isCorrect = tileEl.dataset.value === q.correct;
    const qKey = q.id;

    if (!wrongPerQ[qKey]) wrongPerQ[qKey] = 0;

    if (isCorrect) {
      allTiles.forEach(t => t.classList.add("locked"));
      tileEl.classList.add("correct");

      scoreCorrect++;
      scoreCorrectEl.textContent = scoreCorrect;
      setQFeedback(q.id, "correct", "¡Correcto! 🎉");
      playCorrectSFX();

      // If this is a fill question, green-highlight the reading text word
      if (q.type === "fill" && q.blankId) revealBlank(q.blankId);

      answeredQ++;
      updateBar();

      setTimeout(() => {
        questionIdx++;
        const passage = PASSAGES[passageIdx];
        if (questionIdx < passage.questions.length) {
          showQuestion(passage, questionIdx);
        } else {
          passageIdx++;
          if (passageIdx < PASSAGES.length) {
            loadPassage(passageIdx);
          } else {
            showEnd();
          }
        }
      }, 900);

    } else {
      wrongPerQ[qKey]++;
      scoreWrong++;
      scoreWrongEl.textContent = scoreWrong;
      playWrongSFX();

      allTiles.forEach(t => t.classList.add("locked"));
      tileEl.classList.add("wrong", "shake");

      if (wrongPerQ[qKey] >= MAX_WRONG_BEFORE_REVEAL) {
        // Show correct answer, reveal inline blank, then auto-advance
        setQFeedback(q.id, "wrong", "La respuesta: " + (q.type === "choice"
          ? q.options.find(o => o.label === q.correct)?.text || q.correct
          : q.correct));

        tileEl.addEventListener("animationend", () => {
          tileEl.classList.remove("shake");
          // highlight correct tile
          allTiles.forEach(t => {
            if (t.dataset.value === q.correct) t.classList.add("correct");
          });
          if (q.type === "fill" && q.blankId) revealBlank(q.blankId);

          answeredQ++;
          updateBar();

          setTimeout(() => {
            questionIdx++;
            const passage = PASSAGES[passageIdx];
            if (questionIdx < passage.questions.length) {
              showQuestion(passage, questionIdx);
            } else {
              passageIdx++;
              if (passageIdx < PASSAGES.length) {
                loadPassage(passageIdx);
              } else {
                showEnd();
              }
            }
          }, 1400);
        }, { once: true });

      } else {
        // Retry allowed
        setQFeedback(q.id, "wrong", "Inténtalo de nuevo 💪");
        tileEl.addEventListener("animationend", () => {
          tileEl.classList.remove("shake", "wrong");
          allTiles.forEach(t => t.classList.remove("locked"));
        }, { once: true });
      }
    }
  }

  // ── Build all question cards for a passage (hidden initially) ─────────────
  function buildAllQCards(passage) {
    questionsArea.innerHTML = "";
    passage.questions.forEach(q => {
      const card = document.createElement("div");
      card.className = "q-card";
      card.id = "qcard-" + q.id;

      const stmt = document.createElement("div");
      stmt.className = "q-statement";
      stmt.textContent = q.statement;
      card.appendChild(stmt);

      const row = document.createElement("div");
      row.className = "tiles-row";

      if (q.type === "yesno" || q.type === "fill") {
        q.options.forEach(opt => {
          const t = document.createElement("div");
          t.className = "tile";
          t.dataset.value = opt;
          t.textContent = opt;
          t.addEventListener("click", () => handleTap(t, q));
          row.appendChild(t);
        });
      } else if (q.type === "choice") {
        q.options.forEach(opt => {
          const t = document.createElement("div");
          t.className = "tile";
          t.dataset.value = opt.label;
          t.textContent = opt.text;
          t.addEventListener("click", () => handleTap(t, q));
          row.appendChild(t);
        });
      }

      card.appendChild(row);
      questionsArea.appendChild(card);
    });
  }

  // ── Show specific question card ───────────────────────────────────────────
  function showQuestion(passage, qIdx) {
    questionsArea.querySelectorAll(".q-card").forEach(c => c.classList.remove("active"));
    const q    = passage.questions[qIdx];
    const card = document.getElementById("qcard-" + q.id);
    if (card) {
      card.classList.add("active");
      // reset tiles for retry cases
      card.querySelectorAll(".tile").forEach(t => {
        t.classList.remove("correct", "wrong", "shake", "locked");
      });
      setTimeout(() => card.scrollIntoView({ behavior: "smooth", block: "nearest" }), 80);
    }
  }

  // ── Audio helpers ─────────────────────────────────────────────────────────
  function playAudio() {
    if (isPlaying) return;
    isPlaying = true;
    playBtn.innerHTML = "⏸";
    playBtn.classList.add("playing");
    playBtn.classList.remove("done");
    playLabel.textContent = "Escuchando...";

    playPromise = audio.play();
    if (playPromise) {
      playPromise.then(() => { playPromise = null; }).catch(err => {
        if (err.name !== "AbortError") {
          isPlaying = false;
          playBtn.classList.remove("playing");
          playBtn.innerHTML = "▶";
          playLabel.textContent = "No se pudo reproducir.";
        }
        playPromise = null;
      });
    }
  }

  function setPlayIdle() {
    playBtn.innerHTML = "▶";
    playBtn.classList.remove("playing", "done");
    playLabel.textContent = "Toca para escuchar";
  }

  function setPlayDone() {
    playBtn.innerHTML = "▶";
    playBtn.classList.remove("playing");
    playBtn.classList.add("done");
    playLabel.textContent = "¡Escuchado! Toca para repetir";
  }

  playBtn.addEventListener("click", () => {
    if (isPlaying) {
      if (playPromise) {
        playPromise.then(() => audio.pause()).catch(() => {});
        playPromise = null;
      } else {
        audio.pause();
      }
      isPlaying = false;
      playBtn.innerHTML = "▶";
      playBtn.classList.remove("playing");
      playLabel.textContent = "Toca ▶ para continuar";
      return;
    }
    if (audioPlayed) audio.currentTime = 0;
    playAudio();
  });

  // ── Load passage ──────────────────────────────────────────────────────────
  function loadPassage(idx) {
    const passage = PASSAGES[idx];
    questionIdx = 0;
    isPlaying   = false;
    audioPlayed = false;

    const doLoad = () => {
      passageImg.style.opacity = "0";
      passageImg.src = passage.image;
      passageImg.onload = () => { passageImg.style.opacity = "1"; };

      renderReadingText(passage);
      buildAllQCards(passage);

      audio.pause();
      audio = new Audio(passage.audio);
      audio.preload = "auto";

      audio.addEventListener("ended", () => {
        isPlaying   = false;
        audioPlayed = true;
        setPlayDone();
        showQuestion(passage, 0);
      });

      audio.addEventListener("error", () => {
        isPlaying = false;
        playLabel.textContent = "Audio no disponible";
        playBtn.classList.remove("playing");
        playBtn.innerHTML = "▶";
        audioPlayed = true;
        showQuestion(passage, 0);
      });

      setPlayIdle();
      passageBlock.classList.remove("fading");
    };

    if (idx === 0) {
      doLoad();
    } else {
      passageBlock.classList.add("fading");
      setTimeout(doLoad, 380);
    }
  }

  // ── End screen ────────────────────────────────────────────────────────────
  function showEnd() {
    mainArea.style.display = "none";
    endScreen.classList.add("show");
    document.getElementById("endCorrect").textContent = scoreCorrect;
    document.getElementById("endWrong").textContent   = scoreWrong;
    markPartComplete();
  }

  function markPartComplete() {
    try {
      const key  = `inglesco_progress_u${UNIT}`;
      const data = JSON.parse(localStorage.getItem(key) || "{}");
      const lk   = `l${LESSON}`;
      if (!data[lk]) data[lk] = { partsCompleted: 0, partsTotal: 5 };
      if ((data[lk].partsCompleted || 0) < PART) data[lk].partsCompleted = PART;
      localStorage.setItem(key, JSON.stringify(data));

      const fk   = `inglesco_furthest_u${UNIT}_l${LESSON}`;
      const prev = parseInt(localStorage.getItem(fk) || "0");
      if (PART > prev) localStorage.setItem(fk, String(PART));
    } catch(e) {}
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  updateBar();
  loadPassage(0);
})();
</script>
</body>
</html>
