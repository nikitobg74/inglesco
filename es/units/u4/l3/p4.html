<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unidad 4 • Lección 3 • Parte 4</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      min-height: 100vh;
      padding: 16px 12px 60px;
      color: #111827;
    }

    .wrap { max-width: 700px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {
      display: inline-block; margin-bottom: 16px;
      padding: 7px 14px; background: #2563eb; color: white;
      border-radius: 10px; text-decoration: none; font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── Page title ── */
    .top-title {
      text-align: center; font-size: 18px; font-weight: 900;
      margin-bottom: 4px;
    }
    .subline {
      text-align: center; font-size: 14px; font-weight: 700;
      margin-bottom: 16px; color: #374151;
    }

    /* ── Part progress steps ── */
    .progress-container {
      display: flex; justify-content: center;
      gap: 10px; margin: 12px 0 20px 0;
    }
    .step {
      width: 38px; height: 38px; border-radius: 50%;
      background: #d1d5db;
      display: flex; align-items: center; justify-content: center;
      font-weight: 600; cursor: pointer; transition: all .3s;
      color: #1f2933; text-decoration: none; user-select: none;
      font-size: 15px;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    /* ── Main card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 18px; padding: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
    }

    /* ── Question progress bar ── */
    .q-bar-wrap {
      background: #e2e8f0; border-radius: 999px;
      height: 7px; margin-bottom: 20px; overflow: hidden;
    }
    .q-bar-fill {
      height: 100%; width: 0%; background: #2563eb;
      border-radius: 999px; transition: width 0.5s ease;
    }

    /* ── Passage: image left, audio right ── */
    .passage {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 14px;
    }
    .passage-img {
      flex: 0 0 40%;
      border-radius: 14px; overflow: hidden;
      background: #eff6ff;
      border: 2px solid #bfdbfe;
      display: flex; align-items: center; justify-content: center;
      padding: 8px;
    }
    .passage-img img {
      max-width: 100%;
      max-height: 170px;
      width: auto; height: auto;
      object-fit: contain;
      border-radius: 10px;
      display: block;
    }
    .passage-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding-top: 8px;
    }

    /* ── Audio button ── */
    .play-btn {
      width: 62px; height: 62px; border-radius: 50%;
      background: #2563eb; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 5px 16px rgba(37,99,235,0.35);
      transition: background 0.2s, transform 0.1s;
      color: white; font-size: 24px;
    }
    .play-btn:hover   { background: #1d4ed8; transform: scale(1.05); }
    .play-btn:active  { transform: scale(0.96); }
    .play-btn.playing { background: #7c3aed; }
    .play-btn.done    { background: #16a34a; }
    .play-label {
      font-size: 11px; font-weight: 600; color: #486581;
      text-align: center; line-height: 1.4;
    }

    /* ── Reading text ── */
    .reading-text {
      background: #f8fafc;
      border-left: 4px solid #2563eb;
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 600;
      line-height: 2;
      color: #1e293b;
      margin-bottom: 18px;
    }
    .reading-text p { margin: 0; }



    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 2px dashed #cbd5e1;
      margin: 0 0 16px;
    }

    /* ── Question card ── */
    .q-card {
      background: #eff6ff;
      border: 2px solid #bfdbfe;
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
      display: none;
    }
    .q-card.active { display: block; }

    .q-statement {
      font-size: 15px; font-weight: 700;
      color: #1e293b; margin-bottom: 12px;
      line-height: 1.5;
    }

    /* ── Tiles ── */
    .tiles-row {
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    .tile {
      flex: 1;
      padding: 13px 8px;
      border-radius: 14px;
      border: 3px solid #d1d5db;
      background: #f8fafc;
      font-size: 15px; font-weight: 900;
      color: #1e293b;
      cursor: pointer;
      text-align: center;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      user-select: none;
      line-height: 1.4;
    }
    .tile:hover:not(.locked) {
      border-color: #2563eb;
      background: #eff6ff;
      transform: scale(1.03);
    }
    .tile.locked { cursor: default; pointer-events: none; }
    .tile.correct {
      border-color: #16a34a;
      background: #dcfce7;
      color: #15803d;
    }
    .tile.wrong {
      border-color: #dc2626;
      background: #fee2e2;
      color: #dc2626;
    }
    @keyframes shake {
      0%   { transform: translateX(0); }
      15%  { transform: translateX(-7px); }
      30%  { transform: translateX(7px); }
      45%  { transform: translateX(-5px); }
      60%  { transform: translateX(5px); }
      75%  { transform: translateX(-3px); }
      90%  { transform: translateX(3px); }
      100% { transform: translateX(0); }
    }
    .tile.shake { animation: shake 0.45s ease; }

    /* ── Passage fade transition ── */
    .passage-block {
      transition: opacity 0.35s;
    }
    .passage-block.fading { opacity: 0; }

    /* ── End screen ── */
    .end { text-align: center; padding: 24px 10px 10px; display: none; }
    .end.show { display: block; }
    .end .trophy { font-size: 52px; margin-bottom: 10px; }
    .end h2 { margin: 8px 0; font-size: 22px; font-weight: 900; color: #1e40af; }
    .end p  { margin: 5px 0; font-weight: 600; color: #486581; font-size: 14px; }
    .finish-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 12px 28px; background: #16a34a; color: #fff;
      border: none; border-radius: 14px; font-weight: 900;
      font-size: 16px; cursor: pointer;
      box-shadow: 0 5px 12px rgba(22,163,74,.30);
      transition: background .2s; margin-top: 16px;
      text-decoration: none; font-family: 'Poppins', sans-serif;
    }
    .finish-btn:hover { background: #15803d; }

    /* ── Mobile ── */
    @media (max-width: 480px) {
      .passage { flex-direction: column; }
      .passage-img { flex: none; width: 100%; }
      .passage-img img { max-height: 200px; margin: 0 auto; }
      .passage-right { flex-direction: row; justify-content: center; }
      .tile { font-size: 13px; padding: 11px 6px; }
      .q-statement { font-size: 13px; }
      .reading-text { font-size: 13px; }
    }
  </style>
</head>
<body>

<div class="wrap">

  <a href="../index.html" class="back-btn">← Unidad 4</a>

  <div class="top-title">Unidad 4 • Lección 3 • Parte 4</div>
  <div class="subline">Lee y responde</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step active" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <div class="card">

    <!-- Question progress bar -->
    <div class="q-bar-wrap">
      <div class="q-bar-fill" id="qBar"></div>
    </div>

    <!-- Main area -->
    <div id="mainArea">

      <div class="passage-block" id="passageBlock">

        <!-- Image + Audio -->
        <div class="passage">
          <div class="passage-img">
            <img id="passageImg" src="" alt="" />
          </div>
          <div class="passage-right">
            <button class="play-btn" id="playBtn" aria-label="Reproducir audio">▶</button>
            <span class="play-label" id="playLabel">Toca para escuchar</span>
          </div>
        </div>

        <!-- Reading text — always visible -->
        <div class="reading-text" id="readingText"></div>

        <hr class="divider" />

        <!-- Questions rendered here -->
        <div id="questionsArea"></div>

      </div>

    </div>

    <!-- End screen -->
    <div class="end" id="endScreen">
      <div class="trophy">🏆</div>
      <h2>¡Muy bien!</h2>
      <p>Leíste y respondiste correctamente.</p>
      <a href="p5.html" class="finish-btn">Continuar → Parte 5</a>
    </div>

  </div>
</div>

<script src="../../../../js/u4/u4_l3_p4.js"></script>
</body>
</html>
