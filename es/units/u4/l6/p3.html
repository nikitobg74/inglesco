<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unidad 4 • Lección 6 • Parte 3</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
    body {
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      min-height: 100vh;
      padding: 16px 12px 60px;
      color: #111827;
    }
    .wrap { max-width: 480px; margin: 0 auto; }

    .back-btn {
      display: inline-block; margin-bottom: 16px; padding: 7px 14px;
      background: #2563eb; color: #fff; border-radius: 10px;
      text-decoration: none; font-weight: 700; font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    .top-title { text-align:center; font-size:18px; font-weight:900; margin-bottom:4px; }
    .subline    { text-align:center; font-size:14px; font-weight:700; margin-bottom:16px; color:#374151; }

    .progress-container { display:flex; justify-content:center; gap:10px; margin:12px 0 20px; }
    .step {
      width:38px; height:38px; border-radius:50%; background:#d1d5db;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; font-size:15px; text-decoration:none; color:#1f2933; transition:all .25s;
    }
    .step.active { background:#2563eb; color:#fff; }
    .step:hover  { transform:scale(1.08); }

    /* ── card ── */
    .card, .end {
      background: rgba(255,255,255,.88); border-radius:18px; padding:24px 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
    }

    /* ── exercise progress bar ── */
    .ex-progress-row {
      display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;
    }
    .ex-counter { font-size:13px; font-weight:700; color:#486581; }
    .bar-wrap {
      background:#e2e8f0; border-radius:999px; height:7px; margin-bottom:22px; overflow:hidden;
    }
    .bar-fill {
      height:100%; width:0%; background:#a855f7; border-radius:999px; transition:width .45s ease;
    }

    /* ── prompt word ── */
    .prompt-label {
      text-align:center; font-size:10.5px; font-weight:900; text-transform:uppercase;
      letter-spacing:.7px; color:#7c3aed; margin-bottom:10px;
    }
    .prompt-word {
      text-align:center; font-size:36px; font-weight:900; color:#1e293b;
      background:#f5f3ff; border:2px solid #c4b5fd; border-radius:16px;
      padding:22px 20px; margin-bottom:28px; letter-spacing:.5px;
    }

    /* ── choice tiles ── */
    .choices-label {
      text-align:center; font-size:10.5px; font-weight:900; text-transform:uppercase;
      letter-spacing:.7px; color:#0f766e; margin-bottom:10px;
    }
    .choices-wrap {
      display:flex; flex-direction:column; gap:10px; margin-bottom:22px;
    }
    .choice-btn {
      width:100%; padding:13px 16px; border:none; border-radius:14px; cursor:pointer;
      background:#0d9488; color:#fff; font-size:16px; font-weight:700;
      box-shadow:0 4px 12px rgba(13,148,136,.25); transition:all .15s; text-align:center;
    }
    .choice-btn:hover:not(:disabled) { background:#0f766e; transform:scale(1.02); }

    @keyframes shake {
      0%,100% { transform:translateX(0); }
      20%      { transform:translateX(-9px); }
      40%      { transform:translateX(9px); }
      60%      { transform:translateX(-6px); }
      80%      { transform:translateX(6px); }
    }
    .choice-btn.wrong-flash {
      background:#dc2626 !important;
      animation: shake .4s ease;
    }
    .choice-btn.correct-flash {
      background:#16a34a !important;
    }
    .choice-btn:disabled { opacity:.45; cursor:default; transform:none; }

    /* ── feedback ── */
    .feedback {
      min-height:22px; text-align:center; font-size:14px; font-weight:700; margin-bottom:18px;
    }
    .feedback.correct { color:#16a34a; }
    .feedback.wrong   { color:#dc2626; }

    /* ── next button ── */
    .next-btn {
      display:block; width:100%; padding:13px 0; border:none; border-radius:14px;
      font-weight:900; font-size:16px; font-family:'Poppins',sans-serif;
      background:#d1d5db; color:#9ca3af; cursor:not-allowed; transition:all .3s;
    }
    .next-btn.ready {
      background:#2563eb; color:#fff; cursor:pointer; box-shadow:0 5px 14px rgba(37,99,235,.3);
    }
    .next-btn.ready:hover { background:#1d4ed8; }

    /* ── end screen ── */
    .end { display:none; text-align:center; margin-top:16px; padding:32px 20px; }
    .end.show { display:block; }
    .trophy { font-size:52px; margin-bottom:10px; }
    .end h2  { margin:8px 0; font-size:22px; font-weight:900; color:#1e40af; }
    .end p   { margin:6px 0; font-weight:600; color:#374151; font-size:14px; }
    .highlight-msg {
      background:#fef9c3; border:2px solid #fde68a; border-radius:12px;
      padding:12px 16px; margin:14px 0; font-size:14px; color:#78350f;
    }
    .finish-btn {
      display:inline-flex; align-items:center; gap:8px; padding:12px 28px;
      background:#16a34a; color:#fff; text-decoration:none; border-radius:14px;
      font-weight:900; font-size:16px; box-shadow:0 5px 12px rgba(22,163,74,.3);
    }
    .finish-btn:hover { background:#15803d; }

    @media (max-width:480px) {
      .prompt-word { font-size:28px; padding:18px 14px; }
      .choice-btn  { font-size:15px; }
    }
  </style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 4</a>

  <div class="top-title">Unidad 4 • Lección 6 • Parte 3</div>
  <div class="subline">Adjetivos opuestos — Opposite adjectives</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step active" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <div class="card" id="slideArea">
    <div class="ex-progress-row">
      <span class="ex-counter" id="exCounter">1 / 9</span>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill" id="barFill"></div>
    </div>

    <div class="prompt-label">¿Cuál es el opuesto?</div>
    <div class="prompt-word" id="promptWord"></div>

    <div class="choices-label">Elige la respuesta correcta</div>
    <div class="choices-wrap" id="choicesWrap"></div>

    <div class="feedback" id="feedback"></div>

    <button class="next-btn" id="nextBtn" disabled>Siguiente →</button>
  </div>

  <div class="end" id="endScreen">
    <div class="trophy">🏆</div>
    <h2>¡Muy buen trabajo!</h2>
    <p>Completaste la Parte 3.</p>
    <div class="highlight-msg">🎉 ¡Excelente! Ya conoces todos los adjetivos opuestos de esta lección.</div>
    <a href="p4.html" class="finish-btn">Continuar → Parte 4</a>
  </div>
</div>
<script src="../../../../js/u4/u4_l6_p3.js"></script>
</body>
</html>
