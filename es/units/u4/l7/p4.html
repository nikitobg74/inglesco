<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unidad 4 • Lección 7 • Parte 4</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

    body {
      background: linear-gradient(135deg, #dbeafe, #fef9c3);
      min-height: 100vh;
      padding: 16px 12px 60px;
      color: #111827;
    }

    .wrap { max-width: 700px; margin: 0 auto; }

    .back-btn {
      display: inline-block;
      margin-bottom: 16px;
      padding: 7px 14px;
      background: #2563eb;
      color: white;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    .top-title {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      margin-bottom: 4px;
    }

    .subline {
      text-align: center;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 16px;
      color: #374151;
    }

    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 12px 0 20px 0;
    }

    .step {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      text-decoration: none;
      user-select: none;
      color: #1f2933;
      transition: all .3s;
      font-size: 15px;
    }

    .step.active { background: #2563eb; color: #fff; }
    .step:hover { transform: scale(1.08); }

    .card {
      background: rgba(255,255,255,.90);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
      position: relative;
    }

    .counter-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .counter {
      font-size: 13px;
      font-weight: 700;
      color: #486581;
    }

    .bar-wrap {
      background: #e2e8f0;
      border-radius: 999px;
      height: 7px;
      margin-bottom: 20px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: #2563eb;
      border-radius: 999px;
      transition: width 0.35s ease;
    }

    .exercise-image {
      width: 100%;
      max-width: 560px;
      max-height: 280px;
      height: auto;
      object-fit: contain;
      border-radius: 12px;
      margin: 0 auto 16px;
      display: block;
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
      background: #fff;
    }

    .instruction {
      text-align: center;
      font-size: 12px;
      font-weight: 800;
      color: #64748b;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .sentence-box {
      background: #f8fafc;
      border: 2px solid #e2e8f0;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      transition: border-color .2s ease, background .2s ease, transform .2s ease;
    }

    .sentence {
      text-align: center;
      font-size: 24px;
      font-weight: 900;
      line-height: 1.4;
      min-height: 40px;
      color: #1f2937;
      word-break: break-word;
    }

    .sentence.correct {
      color: #15803d;
    }

    .tiles-grid {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .tile {
      border: none;
      border-radius: 14px;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: #eff6ff;
      color: #1d4ed8;
      border: 2px solid #bfdbfe;
      transition: transform .12s ease, background .2s ease, border-color .2s ease, color .2s ease, opacity .2s ease;
      min-height: 54px;
    }

    .tile:hover { transform: translateY(-1px); background: #dbeafe; }
    .tile.used { opacity: .35; pointer-events: none; }
    .tile.correct {
      background: #dcfce7;
      border-color: #22c55e;
      color: #15803d;
    }

    .feedback {
      text-align: center;
      min-height: 24px;
      margin-top: 14px;
      font-size: 14px;
      font-weight: 800;
      color: #475569;
    }

    .feedback.good { color: #15803d; }
    .feedback.bad { color: #b91c1c; }

    .popup-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(15, 23, 42, 0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 16px;
      z-index: 50;
    }

    .popup-backdrop.show {
      display: flex;
    }

    .letter-popup {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 18px 40px rgba(0,0,0,.18);
      text-align: center;
    }

    .popup-title {
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .5px;
      color: #64748b;
      margin-bottom: 10px;
    }

    .popup-word {
      font-size: 28px;
      font-weight: 900;
      color: #1d4ed8;
      margin-bottom: 14px;
      word-break: break-word;
    }

    .letter-options {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 10px;
    }

    .letter-btn {
      min-width: 58px;
      height: 54px;
      border: none;
      border-radius: 14px;
      background: #eff6ff;
      color: #1d4ed8;
      border: 2px solid #bfdbfe;
      font-size: 22px;
      font-weight: 900;
      cursor: pointer;
      transition: .15s ease;
    }

    .letter-btn:hover {
      transform: translateY(-1px);
      background: #dbeafe;
    }

    .letter-btn.correct {
      background: #dcfce7;
      border-color: #22c55e;
      color: #15803d;
    }

    .letter-btn.wrong {
      background: #fee2e2;
      border-color: #ef4444;
      color: #b91c1c;
    }

    .popup-note {
      min-height: 22px;
      font-size: 13px;
      font-weight: 800;
      color: #64748b;
    }

    .end {
      display: none;
      text-align: center;
      background: rgba(255,255,255,.88);
      border-radius: 18px;
      padding: 32px 20px;
      box-shadow: 0 8px 20px rgba(0,0,0,.08);
      margin-top: 16px;
    }

    .end.show { display: block; }

    .end .trophy {
      font-size: 52px;
      margin-bottom: 10px;
    }

    .end h2 {
      margin: 8px 0;
      font-size: 22px;
      font-weight: 900;
      color: #1e40af;
    }

    .end p {
      margin: 6px 0;
      font-weight: 600;
      color: #374151;
      font-size: 14px;
    }

    .finish-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 28px;
      background: #16a34a;
      color: #fff;
      border: none;
      border-radius: 14px;
      font-weight: 900;
      font-size: 16px;
      cursor: pointer;
      box-shadow: 0 5px 12px rgba(22,163,74,.30);
      transition: background .2s;
      margin-top: 16px;
      text-decoration: none;
    }

    .finish-btn:hover { background: #15803d; }

    .shake { animation: shake .4s ease; }

    @keyframes shake {
      0%   { transform: translateX(0); }
      20%  { transform: translateX(-7px); }
      40%  { transform: translateX(7px); }
      60%  { transform: translateX(-6px); }
      80%  { transform: translateX(6px); }
      100% { transform: translateX(0); }
    }

    @media (max-width: 560px) {
      .exercise-image { max-height: 220px; }
      .sentence { font-size: 21px; }
      .tile { font-size: 15px; padding: 11px 14px; }
      .popup-word { font-size: 24px; }
      .letter-btn { min-width: 54px; height: 50px; font-size: 20px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <a href="../index.html" class="back-btn">← Unidad 4</a>

    <div class="top-title">Unidad 4 • Lección 7 • Parte 4</div>
    <div class="subline">Construye la oración y completa la letra que falta</div>

    <div class="progress-container">
      <a class="step" href="p1.html">1</a>
      <a class="step" href="p2.html">2</a>
      <a class="step" href="p3.html">3</a>
      <a class="step active" href="p4.html">4</a>
      <a class="step" href="p5.html">5</a>
    </div>

    <div class="card" id="cardArea">
      <div class="counter-row">
        <span class="counter" id="counter">1 / 12</span>
      </div>

      <div class="bar-wrap">
        <div class="bar-fill" id="progressBar"></div>
      </div>

      <img id="exerciseImage" class="exercise-image" src="" alt="Imagen del ejercicio" onerror="this.style.display='none'" />

      <div class="instruction">Toca las palabras en orden</div>

      <div class="sentence-box" id="sentenceBox">
        <div class="sentence" id="sentence"></div>
      </div>

      <div class="tiles-grid" id="tiles"></div>
      <div class="feedback" id="feedback"></div>
    </div>

    <div class="end" id="endScreen">
      <div class="trophy">🌟</div>
      <h2>¡Buen trabajo!</h2>
      <p>Terminaste la Parte 4.</p>
      <a href="p5.html" class="finish-btn">Continuar → Parte 5</a>
    </div>
  </div>

  <div class="popup-backdrop" id="popupBackdrop">
    <div class="letter-popup" id="letterPopup">
      <div class="popup-title">Elige la letra correcta</div>
      <div class="popup-word" id="popupWord">yo_ng</div>
      <div class="letter-options" id="letterOptions"></div>
      <div class="popup-note" id="popupNote"></div>
    </div>
  </div>

  <script src="../../../../js/u4/u4_l7_p4.js"></script>
</body>
</html>
