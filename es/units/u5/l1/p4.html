<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 1 • Parte 4</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 60px;
  color:#111827;
}
.wrap{max-width:700px;margin:0 auto}
.back-btn{
  display:inline-block;
  margin-bottom:16px;
  padding:7px 14px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
  font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}
.progress-container{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;
  background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;
  color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* Vocabulary panel */
.vocab-panel{
  background:rgba(255,255,255,.88);
  border-radius:18px;
  margin-bottom:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
  overflow:hidden;
}
.vocab-toggle{
  width:100%;
  background:none;
  border:none;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  font-family:'Poppins',sans-serif;
  font-weight:700;
  font-size:15px;
  color:#1e40af;
}
.vocab-toggle .arrow{transition:transform .3s;font-size:12px}
.vocab-toggle.open .arrow{transform:rotate(180deg)}
.vocab-body{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px 12px;
  padding:0 18px 14px;
}
.vocab-body.hidden{display:none}
.vocab-row{
  display:flex;
  justify-content:space-between;
  padding:5px 10px;
  border-radius:8px;
  background:#eff6ff;
  font-size:14px;
}
.vocab-en{font-weight:700;color:#1d4ed8}
.vocab-es{color:#374151}

/* Card */
.card{
  background:rgba(255,255,255,.88);
  border-radius:18px;
  padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:13px;
  font-weight:700;
  color:#486581;
}
.bar-wrap{
  background:#e2e8f0;
  border-radius:999px;
  height:7px;
  margin-bottom:20px;
  overflow:hidden;
}
.bar-fill{
  height:100%;
  width:0%;
  background:#2563eb;
  border-radius:999px;
  transition:width .4s;
}

/* Image */
.lesson-img{
  width:100%;
  height:auto;
  max-height:360px;
  object-fit:contain;
  border-radius:14px;
  margin-bottom:14px;
  display:block;
  background:#f1f5f9;
}

/* Question label */
.question-label{
  text-align:center;
  font-size:16px;
  font-weight:700;
  color:#1e40af;
  margin-bottom:14px;
}

/* Audio button */
.audio-btn{
  width:64px;height:64px;
  border-radius:50%;
  border:none;
  background:#2563eb;
  color:white;
  font-size:26px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  transition:background .2s;
  flex-shrink:0;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
}
.audio-btn:hover{background:#1d4ed8}
.audio-btn.playing{background:#f59e0b;box-shadow:0 4px 14px rgba(245,158,11,.35)}
.audio-btn.done{background:#22c55e;box-shadow:0 4px 14px rgba(34,197,94,.35)}

/* Fill-in answer row */
.answer-area{
  display:none;
  margin-bottom:16px;
}
.answer-area.show{display:block}
.answer-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  font-size:16px;
  font-weight:700;
  flex-wrap:wrap;
  margin-bottom:14px;
  line-height:2;
}
.blank-word{
  padding:4px 12px;
  border-bottom:3px solid #93c5fd;
  color:#2563eb;
  font-weight:800;
  min-width:90px;
  text-align:center;
  display:inline-block;
}
.blank-word.correct{
  background:#dcfce7;
  color:#15803d;
  border-bottom-color:#22c55e;
  border-radius:6px;
}

/* Tiles */
.tiles{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.tile{
  padding:13px 20px;
  border-radius:12px;
  border:2px solid #bfdbfe;
  background:#eff6ff;
  color:#1d4ed8;
  font-weight:800;
  cursor:pointer;
  font-family:'Poppins',sans-serif;
  font-size:15px;
  transition:background .15s;
}
.tile:hover{background:#dbeafe}
.tile.used{opacity:.3;pointer-events:none}
.tile.correct{background:#dcfce7;border-color:#22c55e;color:#15803d;pointer-events:none}
.tile.error{
  background:#fee2e2;
  border-color:#ef4444;
  color:#b91c1c;
  animation:shake .4s;
}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 1 • Parte 4</div>
  <div class="subline">Escucha y completa</div>
  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step active" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Vocabulary panel -->
  <div class="vocab-panel">
    <button class="vocab-toggle open" id="vocabToggle" onclick="toggleVocab()">
      <span>📖 Vocabulario nuevo</span>
      <span class="arrow">▲</span>
    </button>
    <div class="vocab-body" id="vocabBody">
      <div class="vocab-row"><span class="vocab-en">wife</span><span class="vocab-es">esposa</span></div>
      <div class="vocab-row"><span class="vocab-en">husband</span><span class="vocab-es">esposo</span></div>
      <div class="vocab-row"><span class="vocab-en">son</span><span class="vocab-es">hijo</span></div>
      <div class="vocab-row"><span class="vocab-en">daughter</span><span class="vocab-es">hija</span></div>
    </div>
  </div>

  <!-- Main card -->
  <div class="card">
    <div class="counter-row">
      <span id="counter">1 / 4</span>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill" id="progressBar"></div>
    </div>

    <img id="lessonImg" class="lesson-img" src="" alt="" />

    <!-- Step 1: first question + audio -->
    <div class="question-label" id="q1Label"></div>
    <button class="audio-btn" id="audioBtn" onclick="playFirstAudio()">▶</button>

    <!-- Step 2: first fill-in -->
    <div class="answer-area" id="answer1Area">
      <div class="answer-row" id="answer1Row"></div>
      <div class="tiles" id="tiles1"></div>
    </div>

    <!-- Step 3: second question + second fill-in (shown after first correct) -->
    <div class="answer-area" id="answer2Area">
      <div class="question-label" id="q2Label"></div>
      <div class="answer-row" id="answer2Row"></div>
      <div class="tiles" id="tiles2"></div>
    </div>
  </div>
</div>

<!-- End screen outside card -->
<div style="display:none;text-align:center;background:rgba(255,255,255,.88);border-radius:18px;padding:30px;margin:16px auto;max-width:700px" id="endScreen">
  <h2>¡Excelente trabajo!</h2>
  <p style="margin:10px 0 20px">Completaste la Parte 4.</p>
  <a href="p5.html" style="display:inline-block;padding:10px 24px;background:#2563eb;color:white;border-radius:10px;text-decoration:none;font-weight:700">Continuar → Parte 5</a>
</div>

<script src="../../../../js/u5/u5_l1_p4.js"></script>
</body>
</html>
