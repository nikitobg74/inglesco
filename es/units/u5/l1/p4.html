<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 1 • Parte 4</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;padding:16px 12px 60px;color:#111827;
}
.wrap{max-width:640px;margin:0 auto}
.back-btn{
  display:inline-block;margin-bottom:16px;padding:7px 14px;
  background:#2563eb;color:white;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:14px;
}
.back-btn:hover{background:#1e40af}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}
.progress-container{display:flex;justify-content:center;gap:10px;margin:12px 0 20px 0}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}
.step:hover{transform:scale(1.08)}

/* Vocab */
.vocab-panel{
  background:rgba(255,255,255,.88);border-radius:18px;
  margin-bottom:16px;box-shadow:0 4px 12px rgba(0,0,0,.06);overflow:hidden;
}
.vocab-toggle{
  width:100%;background:none;border:none;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;color:#1e40af;
}
.vocab-toggle .arrow{transition:transform .3s;font-size:12px}
.vocab-toggle.open .arrow{transform:rotate(180deg)}
.vocab-body{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;padding:0 18px 14px}
.vocab-body.hidden{display:none}
.vocab-row{display:flex;justify-content:space-between;padding:5px 10px;border-radius:8px;background:#eff6ff;font-size:14px}
.vocab-en{font-weight:700;color:#1d4ed8}
.vocab-es{color:#374151}

/* Card */
.card{
  background:rgba(255,255,255,.88);border-radius:20px;
  padding:20px 16px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.mistakes-badge{font-size:13px;font-weight:700;color:#dc2626;visibility:hidden}
.bar-wrap{background:#e2e8f0;border-radius:999px;height:7px;margin-bottom:20px;overflow:hidden}
.bar-fill{height:100%;width:0%;background:#2563eb;border-radius:999px;transition:width .4s}

/* Image */
.img-wrap{
  width:100%;border-radius:14px;overflow:hidden;background:#f1f5f9;
  margin-bottom:16px;display:flex;align-items:center;justify-content:center;min-height:180px;
}
.lesson-img{width:100%;max-height:320px;object-fit:contain;display:block}

/* Question label */
.question-label{
  text-align:center;font-size:16px;font-weight:700;
  color:#1e40af;margin-bottom:12px;
}

/* Audio */
.audio-row{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:20px}
.audio-btn{
  width:68px;height:68px;border-radius:50%;border:none;
  background:#2563eb;color:white;font-size:28px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 14px rgba(37,99,235,.35);transition:background .2s,transform .15s;
}
.audio-btn:hover{background:#1d4ed8;transform:scale(1.05)}
.audio-btn.playing{background:#f59e0b;box-shadow:0 4px 14px rgba(245,158,11,.35)}
.audio-btn.done{background:#22c55e;box-shadow:0 4px 14px rgba(34,197,94,.35)}
.audio-btn:disabled{opacity:.7;cursor:default;transform:none}
.audio-hint{font-size:13px;font-weight:700;color:#64748b}

/* Fill-in area */
.answer-area{display:none;margin-bottom:16px}
.answer-area.show{display:block}

/* Step divider between Q1 and Q2 */
.step-divider{
  display:none;height:2px;background:linear-gradient(90deg,transparent,#bfdbfe,transparent);
  margin:16px 0;border-radius:99px;
}
.step-divider.show{display:block}

.answer-row{
  display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:16px;font-weight:700;flex-wrap:wrap;
  margin-bottom:14px;line-height:2.2;text-align:center;
}
.blank-word{
  padding:4px 12px;
  border-bottom:3px solid #93c5fd;
  color:#2563eb;font-weight:800;
  min-width:90px;text-align:center;display:inline-block;
  transition:background .2s,color .2s;
}
.blank-word.correct{
  background:#dcfce7;color:#15803d;
  border-bottom-color:#22c55e;border-radius:6px;
}

/* Tiles */
.tiles{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.tile{
  padding:13px 20px;border-radius:12px;
  border:2px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;
  font-weight:800;cursor:pointer;font-size:15px;
  transition:background .15s,transform .15s;
}
.tile:hover{background:#dbeafe;transform:translateY(-2px)}
.tile.used{opacity:.3;pointer-events:none}
.tile.correct{background:#dcfce7;border-color:#22c55e;color:#15803d;pointer-events:none}
.tile.error{background:#fee2e2;border-color:#ef4444;color:#b91c1c}

/* Hint bar */
.hint-bar{
  min-height:26px;margin-top:10px;text-align:center;
  font-size:13px;font-weight:700;color:#dc2626;
  opacity:0;transition:opacity .2s;
}
.hint-bar.show{opacity:1}

/* End screen */
.end{
  display:none;text-align:center;background:rgba(255,255,255,.88);
  border-radius:20px;padding:32px 20px;margin-top:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.end.show{display:block}
.end h2{font-size:24px;font-weight:900;margin-bottom:8px}
.end p{color:#374151;margin-bottom:20px}
.end-stats{display:flex;justify-content:center;gap:28px;margin-bottom:20px}
.stat{text-align:center}
.stat-num{font-size:32px;font-weight:900;color:#2563eb}
.stat-label{font-size:12px;font-weight:700;color:#6b7280;text-transform:uppercase}

@keyframes shake{
  0%{transform:translateX(0)}20%{transform:translateX(-7px)}
  40%{transform:translateX(7px)}60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}100%{transform:translateX(0)}
}
.shake-tile{animation:shake .4s}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 1 • Parte 4</div>
  <div class="subline">Escucha y completa</div>
  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step active" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Vocab -->
  <div class="vocab-panel">
    <button class="vocab-toggle open" id="vocabToggle" onclick="toggleVocab()">
      <span>📖 Vocabulario nuevo</span>
      <span class="arrow">▲</span>
    </button>
    <div class="vocab-body" id="vocabBody">
      <div class="vocab-row"><span class="vocab-en">wife</span><span class="vocab-es">esposa</span></div>
      <div class="vocab-row"><span class="vocab-en">husband</span><span class="vocab-es">esposo</span></div>
      <div class="vocab-row"><span class="vocab-en">son</span><span class="vocab-es">hijo</span></div>
      <div class="vocab-row"><span class="vocab-en">daughter</span><span class="vocab-es">hija</span></div>
    </div>
  </div>

  <!-- Main card -->
  <div class="card" id="mainCard">
    <div class="counter-row">
      <span id="counter">1 / 4</span>
      <span class="mistakes-badge" id="mistakeBadge">✗ <span id="mistakeCount">0</span></span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>

    <div class="img-wrap">
      <img id="lessonImg" class="lesson-img" src="" alt="" />
    </div>

    <div class="question-label" id="q1Label"></div>

    <div class="audio-row">
      <button class="audio-btn" id="audioBtn" onclick="playFirstAudio()">▶</button>
      <span class="audio-hint" id="audioHint">Toca para escuchar</span>
    </div>

    <!-- Q1 fill-in -->
    <div class="answer-area" id="answer1Area">
      <div class="answer-row" id="answer1Row"></div>
      <div class="tiles" id="tiles1"></div>
      <div class="hint-bar" id="hint1Bar"></div>
    </div>

    <!-- Divider between steps -->
    <div class="step-divider" id="stepDivider"></div>

    <!-- Q2 fill-in -->
    <div class="answer-area" id="answer2Area">
      <div class="question-label" id="q2Label"></div>
      <div class="answer-row" id="answer2Row"></div>
      <div class="tiles" id="tiles2"></div>
      <div class="hint-bar" id="hint2Bar"></div>
    </div>
  </div>

  <!-- End screen -->
  <div class="end" id="endScreen">
    <h2>¡Excelente trabajo!</h2>
    <p>Completaste la Parte 4.</p>
    <div class="end-stats">
      <div class="stat"><div class="stat-num" id="totalCorrect">0</div><div class="stat-label">Correctas</div></div>
      <div class="stat"><div class="stat-num" id="totalMistakes">0</div><div class="stat-label">Errores</div></div>
    </div>
    <a href="p5.html" class="back-btn" style="font-size:16px;padding:12px 28px">Continuar → Parte 5</a>
  </div>
</div>

<script>
(() => {
  const BASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";

  const EXERCISES = [
    {
      image:    BASE + "images/u5/u5.wife.riding.jpg",
      q1:       "Who is she?",
      audio1:   BASE + "audio/u5/u5.this.wife.mp3",
      partial1: ["This is my", "_____", "."],
      correct1: "wife",
      options1: ["sister", "wife", "daughter"],
      hint1:    "wife = esposa",
      q2:       "What is she doing?",
      audio2:   BASE + "audio/u5/u5.wife.riding.bicycle.mp3",
      partial2: ["She is", "_____", "her bicycle."],
      correct2: "riding",
      options2: ["riding", "reading", "cleaning"],
      hint2:    "riding = montando / riding a bicycle = montando en bicicleta"
    },
    {
      image:    BASE + "images/u5/u5.husband.swim.jpg",
      q1:       "Who is he?",
      audio1:   BASE + "audio/u5/u5.husband1.mp3",
      partial1: ["This is my", "_____", "."],
      correct1: "husband",
      options1: ["husband", "son", "brother"],
      hint1:    "husband = esposo",
      q2:       "What is he doing?",
      audio2:   BASE + "audio/u5/u5.husband.swim.mp3",
      partial2: ["He is", "_____", "."],
      correct2: "swimming",
      options2: ["fixing", "swimming", "cleaning"],
      hint2:    "swimming = nadando"
    },
    {
      image:    BASE + "images/u5/u5.daughter.english.jpg",
      q1:       "Who is she?",
      audio1:   BASE + "audio/u5/u5.daughter1.mp3",
      partial1: ["This is my", "_____", "."],
      correct1: "daughter",
      options1: ["sister", "wife", "daughter"],
      hint1:    "daughter = hija",
      q2:       "What is she doing?",
      audio2:   BASE + "audio/u5/u5.daughter.study.mp3",
      partial2: ["She is", "_____", "English."],
      correct2: "studying",
      options2: ["riding", "studying", "cleaning"],
      hint2:    "studying = estudiando"
    },
    {
      image:    BASE + "images/u5/u5.son.reading.jpg",
      q1:       "Who is he?",
      audio1:   BASE + "audio/u5/u5.my.son.mp3",
      partial1: ["This is my", "_____", "."],
      correct1: "son",
      options1: ["husband", "son", "brother"],
      hint1:    "son = hijo",
      q2:       "What is he doing?",
      audio2:   BASE + "audio/u5/u5.son.reading.mp3",
      partial2: ["He is", "_____", "."],
      correct2: "reading",
      options2: ["reading", "riding", "studying"],
      hint2:    "reading = leyendo"
    }
  ];

  // Shuffle exercise order
  for (let i = EXERCISES.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [EXERCISES[i], EXERCISES[j]] = [EXERCISES[j], EXERCISES[i]];
  }

  let exIndex      = 0;
  let currentAudio = null;
  let totalCorrect = 0;
  let totalMistakes= 0;

  const imgEl       = document.getElementById("lessonImg");
  const audioBtn    = document.getElementById("audioBtn");
  const audioHint   = document.getElementById("audioHint");
  const q1Label     = document.getElementById("q1Label");
  const answer1Area = document.getElementById("answer1Area");
  const answer1Row  = document.getElementById("answer1Row");
  const tiles1El    = document.getElementById("tiles1");
  const hint1Bar    = document.getElementById("hint1Bar");
  const stepDivider = document.getElementById("stepDivider");
  const answer2Area = document.getElementById("answer2Area");
  const q2Label     = document.getElementById("q2Label");
  const answer2Row  = document.getElementById("answer2Row");
  const tiles2El    = document.getElementById("tiles2");
  const hint2Bar    = document.getElementById("hint2Bar");
  const counter     = document.getElementById("counter");
  const bar         = document.getElementById("progressBar");
  const endScreen   = document.getElementById("endScreen");
  const mainCard    = document.getElementById("mainCard");
  const mistakeBadge= document.getElementById("mistakeBadge");
  const mistakeCount= document.getElementById("mistakeCount");

  window.toggleVocab = function() {
    const body   = document.getElementById("vocabBody");
    const toggle = document.getElementById("vocabToggle");
    const isOpen = !body.classList.contains("hidden");
    body.classList.toggle("hidden", isOpen);
    toggle.classList.toggle("open", !isOpen);
  };

  function stopAudio() {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
  }

  function loadExercise() {
    const ex = EXERCISES[exIndex];
    counter.textContent = `${exIndex + 1} / ${EXERCISES.length}`;
    bar.style.width = ((exIndex / EXERCISES.length) * 100) + "%";

    imgEl.src = ex.image;
    imgEl.alt = ex.q1;
    q1Label.textContent = ex.q1;

    audioBtn.className    = "audio-btn";
    audioBtn.textContent  = "▶";
    audioBtn.disabled     = false;
    audioHint.textContent = "Toca para escuchar";

    answer1Area.classList.remove("show");
    answer2Area.classList.remove("show");
    stepDivider.classList.remove("show");
    answer1Row.innerHTML = "";
    tiles1El.innerHTML   = "";
    answer2Row.innerHTML = "";
    tiles2El.innerHTML   = "";
    hint1Bar.classList.remove("show");
    hint2Bar.classList.remove("show");

    stopAudio();
  }

  window.playFirstAudio = function() {
    if (audioBtn.disabled) return;
    stopAudio();
    audioBtn.disabled     = true;
    audioBtn.className    = "audio-btn playing";
    audioBtn.textContent  = "🔊";
    audioHint.textContent = "Escuchando...";

    const ex = EXERCISES[exIndex];
    currentAudio = new Audio(ex.audio1);
    currentAudio.play().catch(() => setTimeout(onAudio1End, 800));
    currentAudio.addEventListener("ended", onAudio1End);
  };

  function onAudio1End() {
    audioBtn.className    = "audio-btn done";
    audioBtn.textContent  = "✓";
    audioBtn.disabled     = false;
    audioHint.textContent = "Toca para escuchar de nuevo";
    showAnswer1();
  }

  function showAnswer1() {
    const ex = EXERCISES[exIndex];
    buildAnswerRow(answer1Row, ex.partial1, "blank1");
    buildTiles(tiles1El, ex.options1, ex.correct1, hint1Bar, ex.hint1, onCorrect1);
    answer1Area.classList.add("show");
  }

  function onCorrect1() {
    totalCorrect++;
    const ex = EXERCISES[exIndex];
    stepDivider.classList.add("show");

    // Play audio2 automatically, then reveal Q2
    stopAudio();
    currentAudio = new Audio(ex.audio2);
    currentAudio.play().catch(() => setTimeout(showAnswer2, 800));
    currentAudio.addEventListener("ended", showAnswer2);
  }

  function showAnswer2() {
    const ex = EXERCISES[exIndex];
    q2Label.textContent = ex.q2;
    buildAnswerRow(answer2Row, ex.partial2, "blank2");
    buildTiles(tiles2El, ex.options2, ex.correct2, hint2Bar, ex.hint2, onCorrect2);
    answer2Area.classList.add("show");
    // Smooth scroll to new content
    answer2Area.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }

  function onCorrect2() {
    totalCorrect++;
    setTimeout(advance, 1800);
  }

  function advance() {
    exIndex++;
    if (exIndex >= EXERCISES.length) {
      mainCard.style.display = "none";
      endScreen.classList.add("show");
      bar.style.width = "100%";
      document.getElementById("totalCorrect").textContent  = totalCorrect;
      document.getElementById("totalMistakes").textContent = totalMistakes;
      window.scrollTo({ top: 0, behavior: "smooth" });
      return;
    }
    loadExercise();
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function buildAnswerRow(rowEl, partial, blankId) {
    rowEl.innerHTML = "";
    partial.forEach(part => {
      if (part === "_____") {
        const blank = document.createElement("span");
        blank.className  = "blank-word";
        blank.id         = blankId;
        blank.textContent= "_____";
        rowEl.appendChild(blank);
      } else {
        const txt = document.createElement("span");
        txt.textContent = part;
        rowEl.appendChild(txt);
      }
    });
  }

  function buildTiles(containerEl, options, correct, hintBarEl, hintText, onCorrectCb) {
    const opts = [...options];
    for (let i = opts.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [opts[i], opts[j]] = [opts[j], opts[i]];
    }
    containerEl.innerHTML = "";
    opts.forEach(word => {
      const btn = document.createElement("button");
      btn.className   = "tile";
      btn.textContent = word;
      btn.onclick     = () => selectTile(btn, word, correct, containerEl, hintBarEl, hintText, onCorrectCb);
      containerEl.appendChild(btn);
    });
  }

  function selectTile(btn, word, correct, containerEl, hintBarEl, hintText, onCorrectCb) {
    const blankId = containerEl === tiles1El ? "blank1" : "blank2";
    const blank   = document.getElementById(blankId);

    if (word === correct) {
      blank.textContent = word;
      blank.classList.add("correct");
      btn.classList.add("correct");
      containerEl.querySelectorAll(".tile").forEach(t => t.classList.add("used"));
      hintBarEl.classList.remove("show");
      onCorrectCb();
    } else {
      totalMistakes++;
      mistakeBadge.style.visibility = "visible";
      mistakeCount.textContent = totalMistakes;

      btn.classList.add("error", "shake-tile");
      hintBarEl.textContent = hintText;
      hintBarEl.classList.add("show");

      setTimeout(() => {
        btn.classList.remove("error", "shake-tile");
        setTimeout(() => hintBarEl.classList.remove("show"), 3000);
      }, 400);
    }
  }

  loadExercise();
})();
</script>
</body>
</html>
