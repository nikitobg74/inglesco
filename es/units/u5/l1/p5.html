<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 1 • Parte 5</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
<script src="../../../../js/inglesco-progress.js"></script>
<script>markLessonComplete("u5-l2");</script>
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 60px;
  color:#111827;
}
.wrap{max-width:700px;margin:0 auto}
.back-btn{
  display:inline-block;
  margin-bottom:16px;
  padding:7px 14px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
  font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}
.progress-container{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;
  background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;
  color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* Card */
.card{
  background:rgba(255,255,255,.88);
  border-radius:18px;
  padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
  font-size:13px;
  font-weight:700;
  color:#486581;
}
.bar-wrap{
  background:#e2e8f0;
  border-radius:999px;
  height:7px;
  margin-bottom:20px;
  overflow:hidden;
}
.bar-fill{
  height:100%;
  width:0%;
  background:#2563eb;
  border-radius:999px;
  transition:width .4s;
}

/* Image */
.lesson-img{
  width:100%;
  height:auto;
  max-height:360px;
  object-fit:contain;
  border-radius:14px;
  margin-bottom:14px;
  display:block;
  background:#f1f5f9;
}

/* Audio button */
.audio-btn{
  width:64px;height:64px;
  border-radius:50%;
  border:none;
  background:#2563eb;
  color:white;
  font-size:26px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;
  transition:background .2s;
  flex-shrink:0;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
}
.audio-btn:hover{background:#1d4ed8}
.audio-btn.playing{background:#f59e0b;box-shadow:0 4px 14px rgba(245,158,11,.35)}
.audio-btn.done{background:#22c55e;box-shadow:0 4px 14px rgba(34,197,94,.35)}

/* Builder section */
.builder-area{
  display:none;
  margin-bottom:16px;
}
.builder-area.show{display:block}

.builder-label{
  text-align:center;
  margin-bottom:12px;
}
.question-text{
  display:block;
  font-size:20px;
  font-weight:900;
  color:#1e3a8a;
  margin-bottom:4px;
}
.helper-text{
  display:block;
  font-size:14px;
  font-weight:700;
  color:#1e40af;
}

/* Drop zone */
.drop-zone{
  min-height:54px;
  border:2px dashed #93c5fd;
  border-radius:14px;
  background:#f0f9ff;
  display:flex;
  flex-wrap:wrap;
  align-items:center;
  gap:8px;
  padding:10px 12px;
  margin-bottom:14px;
}
.drop-zone .placed{
  padding:9px 14px;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:800;
  font-size:15px;
  cursor:pointer;
  transition:background .15s;
}
.drop-zone .placed:hover{background:#1d4ed8}
.drop-zone.correct{
  border-color:#22c55e;
  background:#f0fdf4;
}
.drop-zone.correct .placed{
  background:#15803d;
  cursor:default;
}
.drop-zone.error{
  border-color:#ef4444;
  background:#fef2f2;
  animation:shake .4s;
}

/* Tiles */
.tiles{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
}
.tile{
  padding:12px 18px;
  border-radius:12px;
  border:2px solid #bfdbfe;
  background:#eff6ff;
  color:#1d4ed8;
  font-weight:800;
  cursor:pointer;
  font-family:'Poppins',sans-serif;
  font-size:15px;
  transition:background .15s;
}
.tile:hover{background:#dbeafe}
.tile.used{opacity:.25;pointer-events:none}

@keyframes shake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}
  75%{transform:translateX(-6px)}
  100%{transform:translateX(0)}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 1 • Parte 5</div>
  <div class="subline">Escucha y ordena las palabras</div>
  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step active" href="p5.html">5</a>
  </div>

  <div class="card">
    <div class="counter-row">
      <span id="counter">1 / 4</span>
    </div>
    <div class="bar-wrap">
      <div class="bar-fill" id="progressBar"></div>
    </div>

    <img id="lessonImg" class="lesson-img" src="" alt="" />

    <button class="audio-btn" id="audioBtn" onclick="playFirstAudio()">▶</button>

    <div class="builder-area" id="builder1Area">
      <div class="builder-label" id="builder1Label"></div>
      <div class="drop-zone" id="dropZone1"></div>
      <div class="tiles" id="tiles1"></div>
    </div>

    <div class="builder-area" id="builder2Area">
      <div class="builder-label" id="builder2Label"></div>
      <div class="drop-zone" id="dropZone2"></div>
      <div class="tiles" id="tiles2"></div>
    </div>
  </div>
</div>

<div style="display:none;text-align:center;background:rgba(255,255,255,.88);border-radius:18px;padding:30px;margin:16px auto;max-width:700px" id="endScreen">
  <div style="font-size:48px;margin-bottom:12px">🎉</div>
  <h2 style="font-size:24px;font-weight:900;color:#1e40af;margin-bottom:8px">¡Felicitaciones!</h2>
  <p style="font-size:16px;font-weight:600;color:#374151;margin-bottom:6px">Completaste la Lección 1.</p>
  <p style="font-size:14px;color:#64748b;margin-bottom:24px">¡Excelente trabajo! Sigue practicando.</p>
  <a href="../index.html" style="display:inline-block;padding:12px 28px;background:#2563eb;color:white;border-radius:12px;text-decoration:none;font-weight:700;font-size:16px">Volver a la Unidad 5 →</a>
</div>

<script src="../../../../js/u5/u5_l1_p5.js"></script>
</body>
</html>
