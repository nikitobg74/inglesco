<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 2 • Parte 2</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 60px;
  color:#111827;
}
.wrap{max-width:700px;margin:0 auto}
.back-btn{
  display:inline-block;
  margin-bottom:16px;
  padding:7px 14px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
  font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}
.progress-container{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;
  background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;
  color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* Vocabulary panel */
.vocab-panel{
  background:rgba(255,255,255,.88);
  border-radius:18px;
  margin-bottom:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
  overflow:hidden;
}
.vocab-toggle{
  width:100%;
  background:none;
  border:none;
  padding:14px 18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:pointer;
  font-family:'Poppins',sans-serif;
  font-weight:700;
  font-size:15px;
  color:#1e40af;
}
.vocab-toggle .arrow{transition:transform .3s;font-size:12px}
.vocab-toggle.open .arrow{transform:rotate(180deg)}
.vocab-body{padding:0 18px 16px}
.vocab-body.hidden{display:none}
.vocab-hint{font-size:12px;color:#64748b;font-weight:600;margin-bottom:10px}
.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.vocab-tile{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;border-radius:12px;background:#eff6ff;
  border:2px solid #bfdbfe;cursor:pointer;
  transition:background .15s,border-color .15s;user-select:none;min-height:56px;
}
.vocab-tile:hover{background:#dbeafe;border-color:#93c5fd}
.vocab-tile.playing{background:#fef9c3;border-color:#f59e0b}
.vocab-left{display:flex;flex-direction:column;gap:2px}
.vocab-en{font-weight:700;color:#1d4ed8;font-size:14px}
.vocab-es{color:#64748b;font-size:12px}
.vocab-speaker{font-size:20px;flex-shrink:0;margin-left:6px}

/* Card */
.card{
  background:rgba(255,255,255,.88);
  border-radius:18px;
  padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:20px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#2563eb;
  border-radius:999px;transition:width .4s;
}
.lesson-img{
  width:100%;height:auto;max-height:360px;object-fit:contain;
  border-radius:14px;margin-bottom:14px;display:block;background:#f1f5f9;
}

/* Audio button */
.audio-btn{
  width:64px;height:64px;border-radius:50%;border:none;
  background:#2563eb;color:white;font-size:26px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 20px;transition:background .2s;flex-shrink:0;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
}
.audio-btn:hover{background:#1d4ed8}
.audio-btn.playing{background:#f59e0b;box-shadow:0 4px 14px rgba(245,158,11,.35)}
.audio-btn.done{background:#22c55e;box-shadow:0 4px 14px rgba(34,197,94,.35)}

/* Builder section */
.builder-area{display:none;margin-bottom:20px}
.builder-area.show{display:block}
.builder-label{
  text-align:center;font-size:15px;font-weight:700;
  color:#1e40af;margin-bottom:12px;
}
.drop-zone{
  min-height:54px;border:2px dashed #93c5fd;border-radius:14px;
  background:#f0f9ff;display:flex;flex-wrap:wrap;align-items:center;
  gap:8px;padding:10px 12px;margin-bottom:14px;
}
.drop-zone .placed{
  padding:9px 14px;border-radius:10px;background:#2563eb;
  color:white;font-weight:800;font-size:15px;cursor:pointer;
  transition:background .15s;
}
.drop-zone .placed:hover{background:#1d4ed8}
.drop-zone.correct{border-color:#22c55e;background:#f0fdf4}
.drop-zone.correct .placed{background:#15803d;cursor:default}
.drop-zone.error{
  border-color:#ef4444;background:#fef2f2;animation:shake .4s;
}
.tiles{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.tile{
  padding:12px 18px;border-radius:12px;border:2px solid #bfdbfe;
  background:#eff6ff;color:#1d4ed8;font-weight:800;cursor:pointer;
  font-family:'Poppins',sans-serif;font-size:15px;transition:background .15s;
}
.tile:hover{background:#dbeafe}
.tile.used{opacity:.25;pointer-events:none}

@keyframes shake{
  0%{transform:translateX(0)}25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 2 • Parte 2</div>
  <div class="subline">Escucha y construye la oración</div>
  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step active" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Vocabulary panel -->
  <div class="vocab-panel">
    <button class="vocab-toggle open" id="vocabToggle" onclick="toggleVocab()">
      <span>📖 Vocabulario nuevo</span>
      <span class="arrow">▲</span>
    </button>
    <div class="vocab-body" id="vocabBody">
      <p class="vocab-hint">🔊 Toca una palabra para escucharla</p>
      <div class="vocab-grid">
        <div class="vocab-tile" onclick="playVocab(this,'u5.mother.mp3')">
          <div class="vocab-left"><span class="vocab-en">mother</span><span class="vocab-es">madre</span></div>
          <span class="vocab-speaker">🔊</span>
        </div>
        <div class="vocab-tile" onclick="playVocab(this,'u5.father.mp3')">
          <div class="vocab-left"><span class="vocab-en">father</span><span class="vocab-es">padre</span></div>
          <span class="vocab-speaker">🔊</span>
        </div>
        <div class="vocab-tile" onclick="playVocab(this,'u5.grandmother1.mp3')">
          <div class="vocab-left"><span class="vocab-en">grandmother</span><span class="vocab-es">abuela</span></div>
          <span class="vocab-speaker">🔊</span>
        </div>
        <div class="vocab-tile" onclick="playVocab(this,'u5.grandfather1.mp3')">
          <div class="vocab-left"><span class="vocab-en">grandfather</span><span class="vocab-es">abuelo</span></div>
          <span class="vocab-speaker">🔊</span>
        </div>
        <div class="vocab-tile" onclick="playVocab(this,'u5.parents.mp3')">
          <div class="vocab-left"><span class="vocab-en">parents</span><span class="vocab-es">padres</span></div>
          <span class="vocab-speaker">🔊</span>
        </div>
        <div class="vocab-tile" onclick="playVocab(this,'u5.grandparents.mp3')">
          <div class="vocab-left"><span class="vocab-en">grandparents</span><span class="vocab-es">abuelos</span></div>
          <span class="vocab-speaker">🔊</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main card -->
  <div class="card">
    <div class="counter-row"><span id="counter">1 / 4</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>

    <img id="lessonImg" class="lesson-img" src="" alt="" />

    <button class="audio-btn" id="audioBtn" onclick="playFirstAudio()">▶</button>

    <!-- First sentence builder -->
    <div class="builder-area" id="builder1Area">
      <div class="builder-label" id="builder1Label"></div>
      <div class="drop-zone" id="dropZone1"></div>
      <div class="tiles" id="tiles1"></div>
    </div>

    <!-- Second sentence builder -->
    <div class="builder-area" id="builder2Area">
      <div class="builder-label" id="builder2Label"></div>
      <div class="drop-zone" id="dropZone2"></div>
      <div class="tiles" id="tiles2"></div>
    </div>
  </div>
</div>

<!-- End screen outside card -->
<div style="display:none;text-align:center;background:rgba(255,255,255,.88);border-radius:18px;padding:30px;margin:16px auto;max-width:700px" id="endScreen">
  <h2>¡Excelente trabajo!</h2>
  <p style="margin:10px 0 20px">Completaste la Parte 2.</p>
  <a href="p3.html" style="display:inline-block;padding:10px 24px;background:#2563eb;color:white;border-radius:10px;text-decoration:none;font-weight:700">Continuar → Parte 3</a>
</div>

<script>
  const VOCAB_BASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/audio/u5/";
  let vocabAudio = null;
  window.playVocab = function(tile, file) {
    if (vocabAudio) { vocabAudio.pause(); vocabAudio = null; }
    document.querySelectorAll(".vocab-tile").forEach(t => t.classList.remove("playing"));
    tile.classList.add("playing");
    vocabAudio = new Audio(VOCAB_BASE + file);
    vocabAudio.play().catch(() => {});
    vocabAudio.addEventListener("ended", () => tile.classList.remove("playing"));
  };
  window.toggleVocab = function() {
    const body   = document.getElementById("vocabBody");
    const toggle = document.getElementById("vocabToggle");
    const isOpen = !body.classList.contains("hidden");
    body.classList.toggle("hidden", isOpen);
    toggle.classList.toggle("open", !isOpen);
  };
</script>

<script src="../../../../js/u5/u5_l2_p2.js"></script>
</body>
</html>
