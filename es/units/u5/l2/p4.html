<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 2 • Parte 4</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 60px;
  color:#111827;
}
.wrap{max-width:700px;margin:0 auto}
.back-btn{
  display:inline-block;
  margin-bottom:16px;
  padding:7px 14px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
  font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}
.progress-container{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;
  background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;
  color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* Vocabulary panel */
.vocab-panel{
  background:rgba(255,255,255,.88);
  border-radius:18px;
  margin-bottom:16px;
  box-shadow:0 4px 12px rgba(0,0,0,.06);
  overflow:hidden;
}
.vocab-toggle{
  width:100%;background:none;border:none;padding:14px 18px;
  display:flex;justify-content:space-between;align-items:center;
  cursor:pointer;font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;color:#1e40af;
}
.vocab-toggle .arrow{transition:transform .3s;font-size:12px}
.vocab-toggle.open .arrow{transform:rotate(180deg)}
.vocab-body{padding:0 18px 16px}
.vocab-body.hidden{display:none}
.vocab-hint{font-size:12px;color:#64748b;font-weight:600;margin-bottom:10px}
.vocab-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.vocab-tile{
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 14px;border-radius:12px;background:#eff6ff;
  border:2px solid #bfdbfe;cursor:pointer;
  transition:background .15s,border-color .15s;user-select:none;min-height:56px;
}
.vocab-tile:hover{background:#dbeafe;border-color:#93c5fd}
.vocab-tile.playing{background:#fef9c3;border-color:#f59e0b}
.vocab-left{display:flex;flex-direction:column;gap:2px}
.vocab-en{font-weight:700;color:#1d4ed8;font-size:14px}
.vocab-es{color:#64748b;font-size:12px}
.vocab-speaker{font-size:20px;flex-shrink:0;margin-left:6px}

/* Card */
.card{
  background:rgba(255,255,255,.88);
  border-radius:18px;padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:20px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#2563eb;
  border-radius:999px;transition:width .4s;
}
.lesson-img{
  width:100%;height:auto;max-height:320px;object-fit:contain;
  border-radius:14px;margin-bottom:20px;display:block;background:#f1f5f9;
}
.question-label{
  text-align:center;font-size:17px;font-weight:700;
  color:#1e40af;margin-bottom:16px;
}
.sub-counter{
  text-align:center;font-size:12px;font-weight:600;
  color:#94a3b8;margin-bottom:14px;
}
.answers{
  display:flex;flex-direction:column;gap:12px;
}
.answer-btn{
  width:100%;padding:16px 20px;
  border-radius:14px;border:2px solid #bfdbfe;
  background:#eff6ff;color:#1d4ed8;
  font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;
  cursor:pointer;text-align:left;
  transition:background .15s,border-color .15s;
  line-height:1.4;
}
.answer-btn:hover:not(:disabled){background:#dbeafe;border-color:#93c5fd}
.answer-btn.correct{background:#dcfce7;border-color:#22c55e;color:#15803d;}
.answer-btn.wrong{
  background:#fee2e2;border-color:#ef4444;color:#b91c1c;
  animation:shake .4s;
}
.answer-btn:disabled{cursor:default}
@keyframes shake{
  0%{transform:translateX(0)}25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 2 • Parte 4</div>
  <div class="subline">Lee y selecciona la respuesta correcta</div>
  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step active" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Vocabulary panel -->
  <div class="vocab-panel">
    <button class="vocab-toggle open" id="vocabToggle" onclick="toggleVocab()">
      <span>📖 Vocabulario nuevo</span>
      <span class="arrow">▲</span>
    </button>
    <div class="vocab-body" id="vocabBody">
      <p class="vocab-hint">🔊 Toca una palabra para escucharla</p>
      <div class="vocab-grid">
        <div class="vocab-tile" onclick="playVocab(this,'u5.mother.mp3')">
          <div class="vocab-left"><span class="vocab-en">mother</span><span class="vocab-es">madre</span></div>
          <span class="vocab-speaker">🔊</span>
        </div>
        <div class="vocab-tile" onclick="playVocab(this,'u5.father.mp3')">
          <div class="vocab-left"><span class="vocab-en">father</span><span class="vocab-es">padre</span></div>
          <span class="vocab-speaker">🔊</span>
        </div>
        <div class="vocab-tile" onclick="playVocab(this,'u5.son.mp3')">
          <div class="vocab-left"><span class="vocab-en">son</span><span class="vocab-es">hijo</span></div>
          <span class="vocab-speaker">🔊</span>
        </div>
        <div class="vocab-tile" onclick="playVocab(this,'u5.daughter.mp3')">
          <div class="vocab-left"><span class="vocab-en">daughter</span><span class="vocab-es">hija</span></div>
          <span class="vocab-speaker">🔊</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Main card -->
  <div class="card">
    <div class="counter-row"><span id="counter">1 / 4</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>
    <img id="lessonImg" class="lesson-img" src="" alt="" />
    <div class="sub-counter" id="subCounter"></div>
    <div class="question-label" id="questionLabel"></div>
    <div class="answers" id="answers"></div>
  </div>
</div>

<!-- End screen outside card -->
<div style="display:none;text-align:center;background:rgba(255,255,255,.88);border-radius:18px;padding:30px;margin:16px auto;max-width:700px" id="endScreen">
  <h2>¡Excelente trabajo!</h2>
  <p style="margin:10px 0 20px">Completaste la Parte 4.</p>
  <a href="p5.html" style="display:inline-block;padding:10px 24px;background:#2563eb;color:white;border-radius:10px;text-decoration:none;font-weight:700">Continuar → Parte 5</a>
</div>

<script>
  const VOCAB_BASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/audio/u5/";
  let vocabAudio = null;
  window.playVocab = function(tile, file) {
    if (vocabAudio) { vocabAudio.pause(); vocabAudio = null; }
    document.querySelectorAll(".vocab-tile").forEach(t => t.classList.remove("playing"));
    tile.classList.add("playing");
    vocabAudio = new Audio(VOCAB_BASE + file);
    vocabAudio.play().catch(() => {});
    vocabAudio.addEventListener("ended", () => tile.classList.remove("playing"));
  };
  window.toggleVocab = function() {
    const body   = document.getElementById("vocabBody");
    const toggle = document.getElementById("vocabToggle");
    const isOpen = !body.classList.contains("hidden");
    body.classList.toggle("hidden", isOpen);
    toggle.classList.toggle("open", !isOpen);
  };
</script>
<script src="../../../../js/u5/u5_l2_p4.js"></script>
</body>
</html>
