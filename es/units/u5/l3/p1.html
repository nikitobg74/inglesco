<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 3 • Parte 1</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 60px;
  color:#111827;
}
.wrap{max-width:700px;margin:0 auto}
.back-btn{
  display:inline-block;
  margin-bottom:16px;
  padding:7px 14px;
  background:#2563eb;
  color:white;
  border-radius:10px;
  text-decoration:none;
  font-weight:700;
  font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}
.progress-container{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;
  background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;
  color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* Card */
.card{
  background:rgba(255,255,255,.88);
  border-radius:18px;
  padding:16px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:20px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#2563eb;
  border-radius:999px;transition:width .4s;
}

/* Image */
.lesson-img{
  width:100%;height:auto;max-height:300px;object-fit:contain;
  border-radius:14px;margin-bottom:18px;display:block;background:#f1f5f9;
}

/* Person label */
.person-label{
  text-align:center;font-size:13px;font-weight:700;
  color:#64748b;letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:10px;
}

/* Sentence with blank */
.sentence-box{
  background:#f8fafc;
  border:2px solid #e2e8f0;
  border-radius:14px;
  padding:16px 18px;
  font-size:18px;
  font-weight:700;
  color:#111827;
  text-align:center;
  margin-bottom:20px;
  line-height:1.6;
}
.blank-slot{
  display:inline-block;
  min-width:60px;
  padding:2px 10px;
  border-bottom:3px solid #93c5fd;
  color:#2563eb;
  font-weight:900;
  border-radius:4px;
  transition:background .2s, color .2s;
}
.blank-slot.correct{
  background:#dcfce7;
  color:#15803d;
  border-bottom-color:#22c55e;
  border-radius:6px;
}

/* Answer buttons */
.answers{
  display:flex;
  gap:12px;
  justify-content:center;
}
.answer-btn{
  flex:1;
  max-width:160px;
  padding:18px 10px;
  border-radius:14px;
  border:2px solid #bfdbfe;
  background:#eff6ff;
  color:#1d4ed8;
  font-family:'Poppins',sans-serif;
  font-weight:800;
  font-size:20px;
  cursor:pointer;
  text-align:center;
  transition:background .15s, border-color .15s;
}
.answer-btn:hover:not(:disabled){background:#dbeafe;border-color:#93c5fd}
.answer-btn.correct{background:#dcfce7;border-color:#22c55e;color:#15803d}
.answer-btn.wrong{
  background:#fee2e2;border-color:#ef4444;color:#b91c1c;
  animation:shake .4s;
}
.answer-btn:disabled{cursor:default}

@keyframes shake{
  0%{transform:translateX(0)}25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 3 • Parte 1</div>
  <div class="subline">Selecciona el verbo correcto</div>
  <div class="progress-container">
    <a class="step active" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Main card -->
  <div class="card">
    <div class="counter-row"><span id="counter">1 / 10</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>

    <img id="lessonImg" class="lesson-img" src="" alt="" />
    <div class="person-label" id="personLabel"></div>
    <div class="sentence-box" id="sentenceBox"></div>
    <div class="answers" id="answers"></div>
  </div>
</div>

<!-- End screen outside card -->
<div style="display:none;text-align:center;background:rgba(255,255,255,.88);border-radius:18px;padding:30px;margin:16px auto;max-width:700px" id="endScreen">
  <h2>¡Excelente trabajo!</h2>
  <p style="margin:10px 0 20px">Completaste la Parte 1.</p>
  <a href="p2.html" style="display:inline-block;padding:10px 24px;background:#2563eb;color:white;border-radius:10px;text-decoration:none;font-weight:700">Continuar → Parte 2</a>
</div>

<script src="../../../../js/u5/u5_l3_p1.js"></script>
</body>
</html>
