<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 3 • Parte 2</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 60px;
  color:#111827;
}
.wrap{max-width:640px;margin:0 auto}

.back-btn{
  display:inline-block;margin-bottom:16px;
  padding:7px 14px;background:#2563eb;color:white;
  border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}

.progress-container{
  display:flex;justify-content:center;gap:10px;margin:12px 0 20px;
}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* Score */
.score-row{
  display:flex;justify-content:center;gap:24px;margin-bottom:14px;
}
.score-box{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.7);border-radius:12px;
  padding:6px 14px;font-weight:700;font-size:14px;
}
.score-box.correct-score{color:#15803d}
.score-box.wrong-score{color:#b91c1c}
.score-dot{font-size:18px;line-height:1}

/* Card */
.card{
  background:rgba(255,255,255,.88);border-radius:20px;
  padding:20px 16px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:20px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#2563eb;
  border-radius:999px;transition:width .4s;
}

/* Image */
.img-wrap{
  width:100%;border-radius:14px;overflow:hidden;
  background:#f1f5f9;margin-bottom:14px;
  aspect-ratio:4/3;
  display:flex;align-items:center;justify-content:center;
}
.lesson-img{width:100%;height:100%;object-fit:contain;display:block}

/* Person label */
.person-label{
  text-align:center;font-size:13px;font-weight:700;
  color:#64748b;letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:12px;min-height:18px;
}

/* Audio button */
.audio-btn{
  width:64px;height:64px;border-radius:50%;border:none;
  background:#2563eb;color:white;font-size:26px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;transition:background .2s;flex-shrink:0;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
  -webkit-tap-highlight-color:transparent;
}
.audio-btn:hover{background:#1d4ed8}
.audio-btn.playing{background:#f59e0b;box-shadow:0 4px 14px rgba(245,158,11,.35)}
.audio-btn.done{background:#22c55e;box-shadow:0 4px 14px rgba(34,197,94,.35)}

/* Transcript */
.transcript-box{
  background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;
  padding:14px 16px;font-size:14px;line-height:1.8;color:#374151;
  margin-bottom:20px;display:none;
}
.transcript-box.show{display:block}

/* Questions */
.questions-area{display:none;margin-top:4px}
.questions-area.show{display:block}

.sub-counter{
  text-align:center;font-size:12px;font-weight:600;
  color:#94a3b8;margin-bottom:10px;
}
.question-label{
  font-size:15px;font-weight:700;color:#1e40af;
  margin-bottom:12px;text-align:center;
}
.mistake-hint{
  text-align:center;font-size:13px;font-weight:600;
  color:#b45309;background:#fef3c7;border-radius:10px;
  padding:8px 12px;margin-bottom:12px;display:none;
}

/* Answer buttons */
.answers{display:flex;flex-direction:column;gap:10px}
.answer-btn{
  width:100%;padding:14px 18px;
  border-radius:14px;border:2px solid #bfdbfe;
  background:#eff6ff;color:#1d4ed8;
  font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;
  cursor:pointer;text-align:left;
  transition:background .15s,border-color .15s;line-height:1.4;
  -webkit-tap-highlight-color:transparent;
}
.answer-btn:hover:not(:disabled){background:#dbeafe;border-color:#93c5fd}
.answer-btn.correct{background:#dcfce7;border-color:#22c55e;color:#15803d}
.answer-btn.wrong{background:#fee2e2;border-color:#ef4444;color:#b91c1c;animation:shake .4s}
.answer-btn.reveal{background:#fef9c3;border-color:#f59e0b;color:#92400e}
.answer-btn:disabled{cursor:default}

@keyframes shake{
  0%{transform:translateX(0)}25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}
}

/* End screen */
.end-screen{
  display:none;text-align:center;
  background:rgba(255,255,255,.88);border-radius:20px;
  padding:36px 20px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.end-screen .trophy{font-size:52px;margin-bottom:12px}
.end-screen h2{font-size:24px;font-weight:900;color:#1e40af;margin-bottom:8px}
.end-screen p{font-size:16px;font-weight:600;color:#374151;margin-bottom:6px}
.end-screen .sub{font-size:14px;color:#64748b;margin-bottom:20px}
.end-stats{display:flex;justify-content:center;gap:20px;margin:16px 0 24px}
.end-stat{background:#eff6ff;border-radius:14px;padding:12px 20px;font-weight:700;font-size:15px}
.end-stat span{display:block;font-size:11px;font-weight:600;color:#64748b;margin-top:2px}
.end-stat.green{color:#15803d;background:#dcfce7}
.end-stat.red{color:#b91c1c;background:#fee2e2}
.continue-btn{
  display:inline-block;padding:12px 28px;
  background:linear-gradient(135deg,#2563eb,#1e40af);
  color:white;border-radius:12px;text-decoration:none;
  font-weight:700;font-size:16px;
  box-shadow:0 4px 12px rgba(37,99,235,.35);
}

@media(max-width:400px){
  .top-title{font-size:15px}
  .answer-btn{font-size:14px;padding:12px 14px}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 3 • Parte 2</div>
  <div class="subline">Escucha y responde</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step active" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Score -->
  <div class="score-row">
    <div class="score-box correct-score">
      <span class="score-dot">✅</span>
      <span id="scoreCorrect">0</span> correctas
    </div>
    <div class="score-box wrong-score">
      <span class="score-dot">❌</span>
      <span id="scoreWrong">0</span> errores
    </div>
  </div>

  <!-- Main card -->
  <div class="card" id="mainCard">
    <div class="counter-row"><span id="counter">0 / 5</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>

    <div class="img-wrap">
      <img id="lessonImg" class="lesson-img" src="" alt="" />
    </div>
    <div class="person-label" id="personLabel"></div>

    <button class="audio-btn" id="audioBtn">▶</button>

    <div class="transcript-box" id="transcriptBox"></div>

    <div class="questions-area" id="questionsArea">
      <div class="sub-counter" id="subCounter"></div>
      <div class="question-label" id="questionLabel"></div>
      <div class="mistake-hint" id="mistakeHint">⚠️ Demasiados errores — mira la respuesta correcta.</div>
      <div class="answers" id="answers"></div>
    </div>
  </div>

  <!-- End screen -->
  <div class="end-screen" id="endScreen">
    <div class="trophy">🎉</div>
    <h2>¡Muy buen trabajo!</h2>
    <p>Completaste la Parte 2.</p>
    <p class="sub">¡Sigue así!</p>
    <div class="end-stats">
      <div class="end-stat green">
        <span id="endCorrect">0</span>
        <span>correctas</span>
      </div>
      <div class="end-stat red">
        <span id="endWrong">0</span>
        <span>errores</span>
      </div>
    </div>
    <a href="p3.html" class="continue-btn">Continuar → Parte 3</a>
  </div>
</div>

<script>
(() => {
  const BASE     = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE = BASE + "images/u5/";
  const AUD_BASE = BASE + "audio/u5/";
  const SFX_OK   = new Audio(BASE + "sfx/correct.wav");
  const SFX_BAD  = new Audio(AUD_BASE + "incorrect.wav");
  const MAX_MISTAKES = 3;

  const INTRO = {
    image:      IMG_BASE + "u5.lisa.jpg",
    audio:      AUD_BASE + "u5.lisa.mp3",
    transcript: "Hello, my name is Lisa. Today I am at home alone. Where is everybody?"
  };

  const EXAMPLES = [
    {
      person: "Parents",
      image:  IMG_BASE + "u5.l1.p2.mother.father.jpg",
      audio:  AUD_BASE + "u5.lisa.parents.mp3",
      transcript: "My parents are not at home. They are at the beach. Are they swimming? No. They are not swimming. They are drinking cocktails.",
      questions: [
        { q:"Where are my parents?", correct:"They are at the beach.",       wrong:"They are at home."        },
        { q:"What are they doing?",  correct:"They are drinking cocktails.", wrong:"They are drinking coffee." }
      ]
    },
    {
      person: "Sister",
      image:  IMG_BASE + "u5.sister.english.jpg",
      audio:  AUD_BASE + "u5.lisa.sister.mp3",
      transcript: "Today my sister is not at home. She is at the library. Is she studying math? No. She is not studying math. She is studying English.",
      questions: [
        { q:"Where is my sister?",  correct:"She is at the library.",    wrong:"She is at school."    },
        { q:"What is she doing?",   correct:"She is studying English.",  wrong:"She is studying math." }
      ]
    },
    {
      person: "Brother",
      image:  IMG_BASE + "u5.brother.riding.jpg",
      audio:  AUD_BASE + "u5.lisa.brother.mp3",
      transcript: "Today my brother is not at home. He is at the park. Is he playing ball? No. He is not playing ball. He is riding his bicycle.",
      questions: [
        { q:"Where is my brother?", correct:"He is at the park.",          wrong:"He is at the beach."    },
        { q:"What is he doing?",    correct:"He is riding his bicycle.",   wrong:"He is playing ball."    }
      ]
    },
    {
      person: "Dog",
      image:  IMG_BASE + "u5.dog.play.jpg",
      audio:  AUD_BASE + "u5.lisa.dog.mp3",
      transcript: "Our dog is not at home today. He is at the park. He is playing ball.",
      questions: [
        { q:"Where is our dog?", correct:"He is at the park.",    wrong:"He is at the beach."       },
        { q:"What is he doing?", correct:"He is playing ball.",   wrong:"He is riding a bicycle."   }
      ]
    },
    {
      person: "Lisa",
      image:  IMG_BASE + "u5.lisa.tv.jpg",
      audio:  AUD_BASE + "u5.lisa2.mp3",
      transcript: "Where am I? I am alone at home. What am I doing? I am not studying. I am watching TV.",
      questions: [
        { q:"Where am I?",    correct:"At home.",    wrong:"At the park." },
        { q:"What am I doing?", correct:"Watching TV.", wrong:"Studying."  }
      ]
    }
  ];

  // ── State ─────────────────────────────────────────────────
  let exIndex      = 0;
  let qIndex       = 0;
  let audioPlayed  = false;
  let locked       = false;
  let currentAudio = null;
  let isIntroMode  = true;
  let totalCorrect = 0;
  let totalWrong   = 0;
  let qMistakes    = 0;

  // ── DOM ───────────────────────────────────────────────────
  const imgEl          = document.getElementById("lessonImg");
  const personLabel    = document.getElementById("personLabel");
  const audioBtnEl     = document.getElementById("audioBtn");
  const transcriptEl   = document.getElementById("transcriptBox");
  const questionsArea  = document.getElementById("questionsArea");
  const subCounter     = document.getElementById("subCounter");
  const questionLabel  = document.getElementById("questionLabel");
  const answersEl      = document.getElementById("answers");
  const counterEl      = document.getElementById("counter");
  const barEl          = document.getElementById("progressBar");
  const endScreen      = document.getElementById("endScreen");
  const mainCard       = document.getElementById("mainCard");
  const scoreCorrectEl = document.getElementById("scoreCorrect");
  const scoreWrongEl   = document.getElementById("scoreWrong");
  const mistakeHint    = document.getElementById("mistakeHint");

  // ── SFX ───────────────────────────────────────────────────
  function playOk()  { SFX_OK.currentTime  = 0; SFX_OK.play().catch(()=>{}); }
  function playBad() { SFX_BAD.currentTime = 0; SFX_BAD.play().catch(()=>{}); }
  function updateScore() {
    scoreCorrectEl.textContent = totalCorrect;
    scoreWrongEl.textContent   = totalWrong;
  }

  // ── Audio helpers ─────────────────────────────────────────
  function stopCurrentAudio() {
    if (currentAudio) {
      currentAudio.pause();
      currentAudio.currentTime = 0;
      currentAudio = null;
    }
  }
  function setAudioPlay()    { audioBtnEl.className = "audio-btn";         audioBtnEl.textContent = "▶"; audioBtnEl.disabled = false; }
  function setAudioPlaying() { audioBtnEl.className = "audio-btn playing"; audioBtnEl.textContent = "🔊"; audioBtnEl.disabled = true;  }
  function setAudioDone()    { audioBtnEl.className = "audio-btn done";    audioBtnEl.textContent = "✓"; audioBtnEl.disabled = false; }

  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }

  // ── Intro ─────────────────────────────────────────────────
  function loadIntro() {
    isIntroMode = true; audioPlayed = false; qIndex = 0; locked = false;
    counterEl.textContent = `0 / ${EXAMPLES.length}`;
    barEl.style.width = "0%";
    imgEl.src = INTRO.image; imgEl.alt = "Lisa";
    personLabel.textContent = "";
    transcriptEl.textContent = INTRO.transcript;
    transcriptEl.classList.add("show");
    questionsArea.classList.remove("show");
    answersEl.innerHTML = "";
    stopCurrentAudio(); setAudioPlay();
  }

  // ── Load example ──────────────────────────────────────────
  function loadExample() {
    isIntroMode = false; audioPlayed = false; qIndex = 0; locked = false;
    qMistakes = 0;
    mistakeHint.style.display = "none";
    const ex = EXAMPLES[exIndex];
    counterEl.textContent = `${exIndex + 1} / ${EXAMPLES.length}`;
    barEl.style.width = ((exIndex + 1) / EXAMPLES.length * 100) + "%";
    imgEl.src = ex.image; imgEl.alt = ex.person;
    personLabel.textContent = ex.person;
    transcriptEl.textContent = ex.transcript;
    transcriptEl.classList.remove("show");
    questionsArea.classList.remove("show");
    answersEl.innerHTML = "";
    stopCurrentAudio(); setAudioPlay();
  }

  // ── Audio button ──────────────────────────────────────────
  audioBtnEl.addEventListener("click", () => {
    stopCurrentAudio();
    setAudioPlaying();

    const src = isIntroMode ? INTRO.audio : EXAMPLES[exIndex].audio;
    currentAudio = new Audio(src);

    currentAudio.play().catch(() => setAudioPlay());

    currentAudio.addEventListener("ended", () => {
      setAudioDone();
      if (isIntroMode) {
        setTimeout(() => { exIndex = 0; loadExample(); }, 600);
      } else if (!audioPlayed) {
        audioPlayed = true;
        transcriptEl.classList.add("show");
        showQuestion();
      }
    });
  });

  // ── Show question ─────────────────────────────────────────
  function showQuestion() {
    const ex = EXAMPLES[exIndex];
    const q  = ex.questions[qIndex];
    qMistakes = 0;
    mistakeHint.style.display = "none";

    subCounter.textContent    = `Pregunta ${qIndex + 1} / ${ex.questions.length}`;
    questionLabel.textContent = q.q;

    const options = [
      { text: q.correct, isCorrect: true  },
      { text: q.wrong,   isCorrect: false }
    ];
    shuffle(options);

    answersEl.innerHTML = "";
    options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className   = "answer-btn";
      btn.textContent = opt.text;
      btn.addEventListener("click", () => selectAnswer(btn, opt.isCorrect, q.correct));
      answersEl.appendChild(btn);
    });

    questionsArea.classList.add("show");
    locked = false;
  }

  // ── Select answer ─────────────────────────────────────────
  function selectAnswer(btn, isCorrect, correctText) {
    if (locked) return;
    const allBtns = answersEl.querySelectorAll(".answer-btn");

    if (isCorrect) {
      locked = true;
      allBtns.forEach(b => b.disabled = true);
      btn.classList.add("correct");
      totalCorrect++; updateScore(); playOk();
      setTimeout(() => {
        qIndex++;
        const ex = EXAMPLES[exIndex];
        if (qIndex < ex.questions.length) {
          showQuestion();
        } else {
          exIndex++;
          if (exIndex >= EXAMPLES.length) {
            showEndScreen();
          } else {
            loadExample();
          }
        }
      }, 900);
    } else {
      qMistakes++; totalWrong++; updateScore(); playBad();
      btn.classList.add("wrong");

      if (qMistakes >= MAX_MISTAKES) {
        locked = true;
        allBtns.forEach(b => b.disabled = true);
        mistakeHint.style.display = "block";
        allBtns.forEach(b => { if (b.textContent === correctText) b.classList.add("reveal"); });
        setTimeout(() => {
          qIndex++;
          const ex = EXAMPLES[exIndex];
          if (qIndex < ex.questions.length) {
            showQuestion();
          } else {
            exIndex++;
            if (exIndex >= EXAMPLES.length) {
              showEndScreen();
            } else {
              loadExample();
            }
          }
        }, 2000);
      } else {
        setTimeout(() => {
          btn.classList.remove("wrong");
          locked = false;
        }, 600);
      }
    }
  }

  // ── End screen ────────────────────────────────────────────
  function showEndScreen() {
    stopCurrentAudio();
    mainCard.style.display  = "none";
    endScreen.style.display = "block";
    document.getElementById("endCorrect").textContent = totalCorrect;
    document.getElementById("endWrong").textContent   = totalWrong;

    try {
      const key  = "inglesco_progress_u5";
      const data = JSON.parse(localStorage.getItem(key) || "{}");
      if (!data.l3) data.l3 = {};
      data.l3.partsCompleted = Math.max(data.l3.partsCompleted || 0, 2);
      localStorage.setItem(key, JSON.stringify(data));
    } catch(e) {}
  }

  // ── Init ──────────────────────────────────────────────────
  loadIntro();
})();
</script>
</body>
</html>
