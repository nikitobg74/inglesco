<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 3 • Parte 2</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 60px;
  color:#111827;
}
.wrap{max-width:700px;margin:0 auto}
.back-btn{
  display:inline-block;margin-bottom:16px;padding:7px 14px;
  background:#2563eb;color:white;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}
.progress-container{
  display:flex;justify-content:center;gap:10px;margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* Card */
.card{
  background:rgba(255,255,255,.88);border-radius:18px;
  padding:16px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:20px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#2563eb;
  border-radius:999px;transition:width .4s;
}

/* Image */
.lesson-img{
  width:100%;height:auto;max-height:300px;object-fit:contain;
  border-radius:14px;margin-bottom:14px;display:block;background:#f1f5f9;
}

/* Person label */
.person-label{
  text-align:center;font-size:13px;font-weight:700;
  color:#64748b;letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:12px;
}

/* Audio button */
.audio-btn{
  width:64px;height:64px;border-radius:50%;border:none;
  background:#2563eb;color:white;font-size:26px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 16px;transition:background .2s;flex-shrink:0;
  box-shadow:0 4px 14px rgba(37,99,235,.35);
}
.audio-btn:hover{background:#1d4ed8}
.audio-btn.playing{background:#f59e0b;box-shadow:0 4px 14px rgba(245,158,11,.35)}
.audio-btn.done{background:#22c55e;box-shadow:0 4px 14px rgba(34,197,94,.35)}

/* Transcript box */
.transcript-box{
  background:#f8fafc;border:2px solid #e2e8f0;border-radius:14px;
  padding:14px 16px;font-size:14px;line-height:1.8;color:#374151;
  margin-bottom:20px;display:none;
}
.transcript-box.show{display:block}

/* Questions area */
.questions-area{display:none;margin-top:4px}
.questions-area.show{display:block}

.question-block{margin-bottom:20px}
.question-label{
  font-size:15px;font-weight:700;color:#1e40af;
  margin-bottom:12px;text-align:center;
}
.sub-counter{
  text-align:center;font-size:12px;font-weight:600;
  color:#94a3b8;margin-bottom:14px;
}

/* Answer buttons — full width for longer sentences */
.answers{display:flex;flex-direction:column;gap:10px}
.answer-btn{
  width:100%;padding:14px 18px;
  border-radius:14px;border:2px solid #bfdbfe;
  background:#eff6ff;color:#1d4ed8;
  font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;
  cursor:pointer;text-align:left;
  transition:background .15s,border-color .15s;line-height:1.4;
}
.answer-btn:hover:not(:disabled){background:#dbeafe;border-color:#93c5fd}
.answer-btn.correct{background:#dcfce7;border-color:#22c55e;color:#15803d}
.answer-btn.wrong{
  background:#fee2e2;border-color:#ef4444;color:#b91c1c;
  animation:shake .4s;
}
.answer-btn:disabled{cursor:default}

@keyframes shake{
  0%{transform:translateX(0)}25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 3 • Parte 2</div>
  <div class="subline">Escucha y responde</div>
  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step active" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Main card -->
  <div class="card">
    <div class="counter-row"><span id="counter">1 / 5</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>

    <img id="lessonImg" class="lesson-img" src="" alt="" />
    <div class="person-label" id="personLabel"></div>

    <button class="audio-btn" id="audioBtn" onclick="playAudio()">▶</button>

    <div class="transcript-box" id="transcriptBox"></div>

    <div class="questions-area" id="questionsArea">
      <div class="sub-counter" id="subCounter"></div>
      <div class="question-label" id="questionLabel"></div>
      <div class="answers" id="answers"></div>
    </div>
  </div>
</div>

<!-- End screen outside card -->
<div style="display:none;text-align:center;background:rgba(255,255,255,.88);border-radius:18px;padding:36px 24px;margin:16px auto;max-width:700px" id="endScreen">
  <div style="font-size:52px;margin-bottom:12px">🎉</div>
  <h2 style="font-size:24px;font-weight:900;color:#1e40af;margin-bottom:8px">¡Muy buen trabajo!</h2>
  <p style="font-size:16px;font-weight:600;color:#374151;margin-bottom:6px">Completaste la Parte 2.</p>
  <p style="font-size:14px;color:#64748b;margin-bottom:24px">¡Sigue así!</p>
  <a href="p3.html" style="display:inline-block;padding:12px 28px;background:#2563eb;color:white;border-radius:12px;text-decoration:none;font-weight:700;font-size:16px">Continuar → Parte 3</a>
</div>

<script src="../../../../js/u5/u5_l3_p2.js"></script>
</body>
</html>
