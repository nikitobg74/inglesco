<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 3 • Parte 3</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 60px;
  color:#111827;
}
.wrap{max-width:700px;margin:0 auto}
.back-btn{
  display:inline-block;margin-bottom:16px;padding:7px 14px;
  background:#2563eb;color:white;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}
.progress-container{
  display:flex;justify-content:center;gap:10px;margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* Card */
.card{
  background:rgba(255,255,255,.88);border-radius:18px;
  padding:16px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:20px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#2563eb;
  border-radius:999px;transition:width .4s;
}

/* Image */
.lesson-img{
  width:100%;height:auto;max-height:280px;object-fit:contain;
  border-radius:14px;margin-bottom:14px;display:block;background:#f1f5f9;
}

/* Person label */
.person-label{
  text-align:center;font-size:13px;font-weight:700;
  color:#64748b;letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:14px;
}

/* Instruction */
.instruction{
  text-align:center;font-size:13px;font-weight:600;
  color:#94a3b8;margin-bottom:14px;
}

/* Drop zone — ordered sentences appear here */
.drop-zone{
  min-height:56px;
  border:2px dashed #93c5fd;
  border-radius:14px;
  background:#f0f9ff;
  padding:10px 12px;
  margin-bottom:14px;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.drop-zone.correct-all{
  border-color:#22c55e;
  background:#f0fdf4;
}

/* Placed sentence chip */
.placed-chip{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 14px;
  border-radius:10px;
  background:#2563eb;
  color:white;
  font-weight:700;
  font-size:14px;
  cursor:pointer;
  line-height:1.4;
  transition:background .15s;
}
.placed-chip:hover{background:#1d4ed8}
.placed-chip .chip-letter{
  font-size:16px;font-weight:900;
  background:rgba(255,255,255,.25);
  border-radius:6px;
  padding:2px 7px;
  flex-shrink:0;
}
.placed-chip.correct-chip{
  background:#15803d;
  cursor:default;
}
.placed-chip.error-chip{
  background:#dc2626;
  animation:shake .4s;
}

/* Phrase tile bank */
.tiles{
  display:flex;flex-direction:column;gap:10px;
}
.phrase-tile{
  width:100%;padding:13px 16px;
  border-radius:12px;border:2px solid #bfdbfe;
  background:#eff6ff;color:#1d4ed8;
  font-weight:700;font-size:14px;
  cursor:pointer;text-align:left;line-height:1.4;
  font-family:'Poppins',sans-serif;
  transition:background .15s,border-color .15s;
}
.phrase-tile:hover{background:#dbeafe;border-color:#93c5fd}
.phrase-tile.used{opacity:.25;pointer-events:none}

@keyframes shake{
  0%{transform:translateX(0)}25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 3 • Parte 3</div>
  <div class="subline">Ordena las frases</div>
  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step active" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Main card -->
  <div class="card">
    <div class="counter-row"><span id="counter">1 / 6</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>

    <img id="lessonImg" class="lesson-img" src="" alt="" />
    <div class="person-label" id="personLabel"></div>
    <p class="instruction">Toca las frases en el orden correcto</p>

    <div class="drop-zone" id="dropZone"></div>
    <div class="tiles" id="tiles"></div>
  </div>
</div>

<!-- End screen outside card -->
<div style="display:none;text-align:center;background:rgba(255,255,255,.88);border-radius:18px;padding:36px 24px;margin:16px auto;max-width:700px" id="endScreen">
  <div style="font-size:52px;margin-bottom:12px">🎉</div>
  <h2 style="font-size:24px;font-weight:900;color:#1e40af;margin-bottom:8px">¡Muy buen trabajo!</h2>
  <p style="font-size:16px;font-weight:600;color:#374151;margin-bottom:6px">Completaste la Parte 3.</p>
  <p style="font-size:14px;color:#64748b;margin-bottom:24px">¡Excelente esfuerzo!</p>
  <a href="p4.html" style="display:inline-block;padding:12px 28px;background:#2563eb;color:white;border-radius:12px;text-decoration:none;font-weight:700;font-size:16px">Continuar → Parte 4</a>
</div>

<script src="../../../../js/u5/u5_l3_p3.js"></script>
</body>
</html>
