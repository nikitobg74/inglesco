<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 3 • Parte 3</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<!-- Vercel Analytics -->
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 60px;
  color:#111827;
}
.wrap{max-width:640px;margin:0 auto}

.back-btn{
  display:inline-block;margin-bottom:16px;
  padding:7px 14px;background:#2563eb;color:white;
  border-radius:10px;text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}

.progress-container{
  display:flex;justify-content:center;gap:10px;margin:12px 0 20px;
}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* Score */
.score-row{
  display:flex;justify-content:center;gap:24px;margin-bottom:14px;
}
.score-box{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.7);border-radius:12px;
  padding:6px 14px;font-weight:700;font-size:14px;
}
.score-box.correct-score{color:#15803d}
.score-box.wrong-score{color:#b91c1c}
.score-dot{font-size:18px;line-height:1}

/* Card */
.card{
  background:rgba(255,255,255,.88);border-radius:20px;
  padding:20px 16px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:20px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#2563eb;
  border-radius:999px;transition:width .4s;
}

/* Image */
.img-wrap{
  width:100%;border-radius:14px;overflow:hidden;
  background:#f1f5f9;margin-bottom:14px;
  aspect-ratio:4/3;
  display:flex;align-items:center;justify-content:center;
}
.lesson-img{width:100%;height:100%;object-fit:contain;display:block}

/* Person label */
.person-label{
  text-align:center;font-size:13px;font-weight:700;
  color:#64748b;letter-spacing:.5px;text-transform:uppercase;
  margin-bottom:10px;
}

/* Mistake counter hint */
.mistake-row{
  text-align:center;font-size:12px;font-weight:600;
  color:#94a3b8;margin-bottom:10px;min-height:18px;
}
.mistake-row.warn{color:#b45309}

.instruction{
  text-align:center;font-size:13px;font-weight:600;
  color:#94a3b8;margin-bottom:14px;
}

/* Drop zone */
.drop-zone{
  min-height:56px;
  border:2px dashed #93c5fd;border-radius:14px;
  background:#f0f9ff;padding:10px 12px;
  margin-bottom:14px;
  display:flex;flex-direction:column;gap:8px;
  transition:border-color .3s,background .3s;
}
.drop-zone.correct-all{border-color:#22c55e;background:#f0fdf4}

/* Placed chips */
.placed-chip{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:10px;
  background:#2563eb;color:white;
  font-weight:700;font-size:14px;line-height:1.4;
  transition:background .15s;
}
.placed-chip .chip-letter{
  font-size:16px;font-weight:900;
  background:rgba(255,255,255,.25);border-radius:6px;
  padding:2px 7px;flex-shrink:0;
}
.placed-chip.correct-chip{background:#15803d;cursor:default}
.placed-chip.error-chip{background:#dc2626;animation:shake .4s}

/* Phrase tile bank */
.tiles{display:flex;flex-direction:column;gap:10px}
.phrase-tile{
  width:100%;padding:13px 16px;
  border-radius:12px;border:2px solid #bfdbfe;
  background:#eff6ff;color:#1d4ed8;
  font-weight:700;font-size:14px;cursor:pointer;
  text-align:left;line-height:1.4;
  font-family:'Poppins',sans-serif;
  transition:background .15s,border-color .15s;
  -webkit-tap-highlight-color:transparent;
}
.phrase-tile:hover{background:#dbeafe;border-color:#93c5fd}
.phrase-tile.used{opacity:.25;pointer-events:none}

@keyframes shake{
  0%{transform:translateX(0)}25%{transform:translateX(-6px)}
  50%{transform:translateX(6px)}75%{transform:translateX(-6px)}100%{transform:translateX(0)}
}

/* End screen */
.end-screen{
  display:none;text-align:center;
  background:rgba(255,255,255,.88);border-radius:20px;
  padding:36px 20px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.end-screen .trophy{font-size:52px;margin-bottom:12px}
.end-screen h2{font-size:24px;font-weight:900;color:#1e40af;margin-bottom:8px}
.end-screen p{font-size:16px;font-weight:600;color:#374151;margin-bottom:6px}
.end-screen .sub{font-size:14px;color:#64748b;margin-bottom:20px}
.end-stats{display:flex;justify-content:center;gap:20px;margin:16px 0 24px}
.end-stat{background:#eff6ff;border-radius:14px;padding:12px 20px;font-weight:700;font-size:15px}
.end-stat span{display:block;font-size:11px;font-weight:600;color:#64748b;margin-top:2px}
.end-stat.green{color:#15803d;background:#dcfce7}
.end-stat.red{color:#b91c1c;background:#fee2e2}
.continue-btn{
  display:inline-block;padding:12px 28px;
  background:linear-gradient(135deg,#2563eb,#1e40af);
  color:white;border-radius:12px;text-decoration:none;
  font-weight:700;font-size:16px;
  box-shadow:0 4px 12px rgba(37,99,235,.35);
}

@media(max-width:400px){
  .top-title{font-size:15px}
  .phrase-tile{font-size:13px;padding:11px 13px}
  .placed-chip{font-size:13px}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 3 • Parte 3</div>
  <div class="subline">Ordena las frases</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step active" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Score -->
  <div class="score-row">
    <div class="score-box correct-score">
      <span class="score-dot">✅</span>
      <span id="scoreCorrect">0</span> correctas
    </div>
    <div class="score-box wrong-score">
      <span class="score-dot">❌</span>
      <span id="scoreWrong">0</span> errores
    </div>
  </div>

  <!-- Main card -->
  <div class="card" id="mainCard">
    <div class="counter-row"><span id="counter">1 / 6</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>

    <div class="img-wrap">
      <img id="lessonImg" class="lesson-img" src="" alt="" />
    </div>
    <div class="person-label" id="personLabel"></div>

    <div class="mistake-row" id="mistakeRow"></div>
    <p class="instruction">Toca las frases en el orden correcto</p>

    <div class="drop-zone" id="dropZone"></div>
    <div class="tiles" id="tiles"></div>
  </div>

  <!-- End screen -->
  <div class="end-screen" id="endScreen">
    <div class="trophy">🎉</div>
    <h2>¡Muy buen trabajo!</h2>
    <p>Completaste la Parte 3.</p>
    <p class="sub">¡Excelente esfuerzo!</p>
    <div class="end-stats">
      <div class="end-stat green">
        <span id="endCorrect">0</span>
        <span>correctas</span>
      </div>
      <div class="end-stat red">
        <span id="endWrong">0</span>
        <span>errores</span>
      </div>
    </div>
    <a href="p4.html" class="continue-btn">Continuar → Parte 4</a>
  </div>
</div>

<script>
(() => {
  const BASE     = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE = BASE + "images/u5/";
  const SFX_OK   = new Audio(BASE + "sfx/correct.wav");
  const SFX_BAD  = new Audio(BASE + "audio/u5/incorrect.wav");
  const LETTERS  = ["A","B","C","D"];
  const MAX_MISTAKES_PER_EX = 5; // auto-reveal after this many wrong placements

  const EXERCISES = [
    {
      person: "Parents",
      image:  IMG_BASE + "u5.l1.p2.mother.father.jpg",
      phrases: [
        "My parents are not at home today.",
        "They are at the beach.",
        "They are not swimming.",
        "They are drinking cocktails."
      ]
    },
    {
      person: "Sister",
      image:  IMG_BASE + "u5.sister.english.jpg",
      phrases: [
        "My sister is not at home today.",
        "She is at the library.",
        "She is not studying math.",
        "She is studying English."
      ]
    },
    {
      person: "Brother",
      image:  IMG_BASE + "u5.brother.riding.jpg",
      phrases: [
        "My brother is not at home today.",
        "He is at the park.",
        "He is not playing ball.",
        "He is riding his bicycle."
      ]
    },
    {
      person: "Dog",
      image:  IMG_BASE + "u5.dog.play.jpg",
      phrases: [
        "Our dog is not at home today.",
        "He is at the park.",
        "He is not sleeping.",
        "He is playing ball."
      ]
    },
    {
      person: "Grandmother",
      image:  IMG_BASE + "u5.grandmother.planting.jpg",
      phrases: [
        "My grandmother is not at home today.",
        "She is in the garden.",
        "She is not cooking.",
        "She is planting flowers."
      ]
    },
    {
      person: "Grandfather",
      image:  IMG_BASE + "u5.grandfather.jpg",
      phrases: [
        "My grandfather is busy today.",
        "He is in the bathroom.",
        "He is not cleaning.",
        "He is fixing the shower."
      ]
    }
  ];

  // ── State ─────────────────────────────────────────────────
  let exIndex      = 0;
  let placed       = [];   // { phrase, btn }
  let solved       = false;
  let totalCorrect = 0;
  let totalWrong   = 0;
  let exMistakes   = 0;    // wrong placements for this exercise

  // ── DOM ───────────────────────────────────────────────────
  const imgEl          = document.getElementById("lessonImg");
  const personLabel    = document.getElementById("personLabel");
  const dropZone       = document.getElementById("dropZone");
  const tilesEl        = document.getElementById("tiles");
  const counterEl      = document.getElementById("counter");
  const barEl          = document.getElementById("progressBar");
  const endScreen      = document.getElementById("endScreen");
  const mainCard       = document.getElementById("mainCard");
  const scoreCorrectEl = document.getElementById("scoreCorrect");
  const scoreWrongEl   = document.getElementById("scoreWrong");
  const mistakeRow     = document.getElementById("mistakeRow");

  function playOk()  { SFX_OK.currentTime  = 0; SFX_OK.play().catch(()=>{}); }
  function playBad() { SFX_BAD.currentTime = 0; SFX_BAD.play().catch(()=>{}); }
  function updateScore() {
    scoreCorrectEl.textContent = totalCorrect;
    scoreWrongEl.textContent   = totalWrong;
  }
  function shuffle(a) {
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
  }
  function updateMistakeRow() {
    const remaining = MAX_MISTAKES_PER_EX - exMistakes;
    if (exMistakes === 0) {
      mistakeRow.textContent = "";
      mistakeRow.className   = "mistake-row";
    } else if (remaining <= 2) {
      mistakeRow.textContent = `⚠️ ${remaining} intento${remaining !== 1 ? "s" : ""} antes de revelar`;
      mistakeRow.className   = "mistake-row warn";
    } else {
      mistakeRow.textContent = `Errores en este ejercicio: ${exMistakes}`;
      mistakeRow.className   = "mistake-row";
    }
  }

  // ── Load exercise ─────────────────────────────────────────
  function loadExercise() {
    solved     = false;
    placed     = [];
    exMistakes = 0;

    const ex = EXERCISES[exIndex];
    counterEl.textContent = `${exIndex + 1} / ${EXERCISES.length}`;
    barEl.style.width = ((exIndex + 1) / EXERCISES.length * 100) + "%";

    imgEl.src = ex.image;
    imgEl.alt = ex.person;
    personLabel.textContent = ex.person;
    mistakeRow.textContent  = "";
    mistakeRow.className    = "mistake-row";

    dropZone.className = "drop-zone";
    dropZone.innerHTML = "";
    tilesEl.innerHTML  = "";

    const shuffled = [...ex.phrases];
    do { shuffle(shuffled); }
    while (shuffled.join("|") === ex.phrases.join("|"));

    shuffled.forEach(phrase => {
      const btn = document.createElement("button");
      btn.className      = "phrase-tile";
      btn.textContent    = phrase;
      btn.dataset.phrase = phrase;
      btn.addEventListener("click", () => placeTile(btn, phrase));
      tilesEl.appendChild(btn);
    });
  }

  // ── Place a tile ──────────────────────────────────────────
  function placeTile(btn, phrase) {
    if (solved) return;

    const ex         = EXERCISES[exIndex];
    const posIndex   = placed.length;
    const correctPhrase = ex.phrases[posIndex];
    const letter     = LETTERS[posIndex] || String(posIndex + 1);

    btn.classList.add("used");
    placed.push({ phrase, btn });

    const chip = document.createElement("div");
    chip.className = "placed-chip";
    chip.innerHTML = `<span class="chip-letter">${letter}</span><span>${phrase}</span>`;

    if (phrase === correctPhrase) {
      chip.classList.add("correct-chip");
      dropZone.appendChild(chip);
      totalCorrect++;
      updateScore();
      playOk();

      if (placed.length === ex.phrases.length) {
        solved = true;
        dropZone.classList.add("correct-all");
        setTimeout(advance, 1200);
      }
    } else {
      exMistakes++;
      totalWrong++;
      updateScore();
      playBad();
      updateMistakeRow();

      chip.classList.add("error-chip");
      dropZone.appendChild(chip);

      if (exMistakes >= MAX_MISTAKES_PER_EX) {
        // Auto-reveal: place all remaining in correct order
        solved = true;
        setTimeout(() => {
          chip.remove();
          btn.classList.remove("used");
          placed.pop();
          autoReveal();
        }, 500);
      } else {
        setTimeout(() => {
          chip.remove();
          btn.classList.remove("used");
          placed.pop();
        }, 500);
      }
    }
  }

  // ── Auto-reveal remaining phrases in correct order ────────
  function autoReveal() {
    const ex = EXERCISES[exIndex];
    // Disable all remaining tiles
    tilesEl.querySelectorAll(".phrase-tile:not(.used)").forEach(t => {
      t.disabled = true; t.style.opacity = "0.4";
    });

    let delay = 0;
    ex.phrases.forEach((phrase, i) => {
      // Skip already correctly placed ones
      const alreadyPlaced = placed.some((p, pi) => pi === i && p.phrase === phrase);
      if (alreadyPlaced) return;

      setTimeout(() => {
        const letter = LETTERS[i] || String(i + 1);
        const chip = document.createElement("div");
        chip.className = "placed-chip correct-chip";
        chip.innerHTML = `<span class="chip-letter">${letter}</span><span>${phrase}</span>`;
        dropZone.appendChild(chip);
        // Mark matching tile used
        tilesEl.querySelectorAll(".phrase-tile").forEach(t => {
          if (t.dataset.phrase === phrase) t.classList.add("used");
        });
      }, delay);
      delay += 350;
    });

    setTimeout(() => {
      dropZone.classList.add("correct-all");
      setTimeout(advance, 1000);
    }, delay + 400);
  }

  // ── Advance ───────────────────────────────────────────────
  function advance() {
    exIndex++;
    if (exIndex >= EXERCISES.length) {
      showEndScreen();
    } else {
      loadExercise();
    }
  }

  // ── End screen ────────────────────────────────────────────
  function showEndScreen() {
    mainCard.style.display  = "none";
    endScreen.style.display = "block";
    document.getElementById("endCorrect").textContent = totalCorrect;
    document.getElementById("endWrong").textContent   = totalWrong;

    try {
      const key  = "inglesco_progress_u5";
      const data = JSON.parse(localStorage.getItem(key) || "{}");
      if (!data.l3) data.l3 = {};
      data.l3.partsCompleted = Math.max(data.l3.partsCompleted || 0, 3);
      localStorage.setItem(key, JSON.stringify(data));
    } catch(e) {}
  }

  // ── Init ──────────────────────────────────────────────────
  shuffle(EXERCISES);
  loadExercise();
})();
</script>
</body>
</html>
