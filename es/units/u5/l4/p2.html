<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Unidad 5 • Lección 4 • Parte 2</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

<!-- Vercel Analytics -->
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 80px;
  color:#111827;
}
.wrap{max-width:640px;margin:0 auto}

.back-btn{
  display:inline-block;margin-bottom:16px;padding:7px 14px;
  background:#2563eb;color:white;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}

/* ── Progress dots ── */
.progress-container{
  display:flex;justify-content:center;gap:10px;margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* ── Score pills ── */
.score-row{
  display:flex;justify-content:center;gap:16px;margin-bottom:14px;
}
.score-pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:999px;
  font-weight:700;font-size:13px;
}
.score-pill.correct-pill{background:#dcfce7;color:#16a34a;border:1.5px solid #86efac}
.score-pill.wrong-pill{background:#fee2e2;color:#dc2626;border:1.5px solid #fca5a5}

/* ── Card ── */
.card{
  background:rgba(255,255,255,.88);border-radius:20px;
  padding:18px 16px 22px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:18px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#a855f7;
  border-radius:999px;transition:width .4s;
}

/* Image */
.lesson-img{
  width:100%;
  max-height:220px;
  object-fit:contain;
  border-radius:14px;
  margin-bottom:18px;
  display:block;
  background:#f1f5f9;
}

/* ── Question blocks ── */
.q-block{
  margin-bottom:18px;
  opacity:0;transform:translateY(8px);
  transition:opacity .3s,transform .3s;
  pointer-events:none;
}
.q-block.visible{
  opacity:1;transform:translateY(0);
  pointer-events:auto;
}

.q-label{
  text-align:center;font-size:15px;font-weight:700;
  color:#1e3a5f;margin-bottom:6px;
}
.q-sentence{
  text-align:center;font-size:16px;font-weight:700;
  color:#0d9488;line-height:1.6;margin-bottom:14px;
}

.options-row{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
}

.opt-btn{
  padding:13px 28px;
  border-radius:12px;
  border:2px solid #0d9488;
  background:#f0fdfa;color:#0f766e;
  font-weight:700;font-size:15px;
  font-family:'Poppins',sans-serif;
  cursor:pointer;min-width:120px;text-align:center;
  transition:background .15s,border-color .15s,color .15s,transform .1s;
  touch-action:manipulation;
}
.opt-btn:hover:not(:disabled){background:#ccfbf1;border-color:#0d9488}
.opt-btn:active:not(:disabled){transform:scale(.96)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{background:#22c55e;border-color:#22c55e;color:white}
.opt-btn.wrong{background:#fee2e2;border-color:#ef4444;color:#b91c1c;animation:shake .3s ease}
.opt-btn.revealed{background:#fef9c3;border-color:#f59e0b;color:#92400e}

.hint-text{
  text-align:center;font-size:13px;color:#f59e0b;
  font-weight:700;margin-top:8px;
  animation:fadeIn .3s ease;
}

/* ── Audio indicator ── */
.audio-indicator{
  display:none;
  align-items:center;justify-content:center;
  gap:10px;margin:8px 0;
  font-size:13px;font-weight:700;color:#2563eb;
}
.audio-indicator.visible{display:flex}
.audio-dot{
  width:10px;height:10px;border-radius:50%;background:#2563eb;
  animation:pulse 1s ease-in-out infinite;
}
.audio-dot:nth-child(2){animation-delay:.2s}
.audio-dot:nth-child(3){animation-delay:.4s}

/* ── End screen ── */
#endScreen{
  display:none;
  text-align:center;
  background:rgba(255,255,255,.92);
  border-radius:20px;
  padding:40px 24px;
  margin:0 auto;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.end-trophy{font-size:56px;margin-bottom:14px}
.end-title{font-size:24px;font-weight:900;color:#1e40af;margin-bottom:8px}
.end-sub{font-size:16px;font-weight:600;color:#374151;margin-bottom:6px}
.end-note{font-size:14px;color:#64748b;margin-bottom:24px}
.end-score{
  display:inline-flex;gap:20px;
  background:#f1f5f9;border-radius:12px;padding:10px 24px;
  margin-bottom:24px;font-size:15px;font-weight:700;
}
.end-score .c{color:#16a34a}
.end-score .w{color:#dc2626}
.continue-btn{
  display:inline-block;padding:13px 32px;
  background:#2563eb;color:white;border-radius:12px;
  text-decoration:none;font-weight:700;font-size:16px;
  touch-action:manipulation;
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}
@keyframes pulse{
  0%,100%{opacity:.3;transform:scale(.8)}
  50%{opacity:1;transform:scale(1.2)}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 4 • Parte 2</div>
  <div class="subline">Mi tía y mi tío</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step active" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Score pills -->
  <div class="score-row">
    <div class="score-pill correct-pill">✓ <span id="correctCount">0</span></div>
    <div class="score-pill wrong-pill">✗ <span id="wrongCount">0</span></div>
  </div>

  <!-- Main card -->
  <div class="card" id="mainCard">
    <div class="counter-row"><span id="counter">1 / 4</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>

    <img id="lessonImg" class="lesson-img" src="" alt="" />

    <div id="q1Block" class="q-block">
      <p class="q-label" id="q1Label"></p>
      <p class="q-sentence" id="q1Sentence"></p>
      <div class="options-row" id="q1Options"></div>
    </div>

    <div id="q2Block" class="q-block">
      <p class="q-label" id="q2Label"></p>
      <p class="q-sentence" id="q2Sentence"></p>
      <div class="options-row" id="q2Options"></div>
    </div>

    <div class="audio-indicator" id="audioIndicator">
      <div class="audio-dot"></div>
      <div class="audio-dot"></div>
      <div class="audio-dot"></div>
      <span>Escuchando...</span>
    </div>
  </div>

  <!-- End screen -->
  <div id="endScreen" data-unit="5" data-lesson="4" data-part="2">
    <div class="end-trophy">🏆</div>
    <h2 class="end-title">¡Muy buen trabajo!</h2>
    <p class="end-sub">Completaste la Parte 2.</p>
    <div class="end-score">
      <span class="c">✓ <span id="finalCorrect">0</span> correctas</span>
      <span class="w">✗ <span id="finalWrong">0</span> errores</span>
    </div>
    <p class="end-note">¡Excelente esfuerzo!</p>
    <a href="p3.html" class="continue-btn">Continuar → Parte 3</a>
  </div>
</div>

<script>
(() => {
  const UNIT   = 5;
  const LESSON = 4;
  const PART   = 2;
  const MAX_ERRORS_BEFORE_REVEAL = 2;

  const BASE       = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE   = BASE + "images/u5/";
  const AUDIO_BASE = BASE + "audio/u5/";

  // ── SFX ────────────────────────────────────────────────────────────────────
  const sfxCorrect   = new Audio(AUDIO_BASE + "correct.wav");
  const sfxIncorrect = new Audio(AUDIO_BASE + "incorrect.wav");
  sfxCorrect.preload = sfxIncorrect.preload = "auto";
  function playCorrectSfx()   { sfxCorrect.currentTime   = 0; sfxCorrect.play().catch(()=>{}); }
  function playIncorrectSfx() { sfxIncorrect.currentTime = 0; sfxIncorrect.play().catch(()=>{}); }

  // ── Slides ─────────────────────────────────────────────────────────────────
  const SLIDES = [
    {
      image: IMG_BASE   + "u5.boy.riding.jpg",
      audio: AUDIO_BASE + "u5.riding.bike.2.mp3",
      q1: {
        question: "Where is your cousin Tommy?",
        sentence: "He is at the _____.",
        options: [{ text:"park", correct:true }, { text:"school", correct:false }]
      },
      q2: {
        question: "What is he doing?",
        sentence: "He is _____ his bicycle.",
        options: [{ text:"reading", correct:false }, { text:"riding", correct:true }]
      }
    },
    {
      image: IMG_BASE   + "u5.feed.birds.jpg",
      audio: AUDIO_BASE + "u5.feed.birds2.mp3",
      q1: {
        question: "Where is your cousin Shelly?",
        sentence: "She is at the _____.",
        options: [{ text:"park", correct:true }, { text:"zoo", correct:false }]
      },
      q2: {
        question: "What is she doing?",
        sentence: "She is _____ the birds.",
        options: [{ text:"reading", correct:false }, { text:"feeding", correct:true }]
      }
    },
    {
      image: IMG_BASE   + "u5.bake.cookies.jpg",
      audio: AUDIO_BASE + "u5.bake.cookies.2.mp3",
      q1: {
        question: "Where is your aunt Carla?",
        sentence: "She is in the _____.",
        options: [{ text:"bedroom", correct:false }, { text:"kitchen", correct:true }]
      },
      q2: {
        question: "What is she doing?",
        sentence: "She is _____ cookies.",
        options: [{ text:"baking", correct:true }, { text:"cooking", correct:false }]
      }
    },
    {
      image: IMG_BASE   + "u5.mowing.grass.jpg",
      audio: AUDIO_BASE + "u5.mowing.grass.2.mp3",
      q1: {
        question: "Where is your uncle Greg?",
        sentence: "He is in the _____.",
        options: [{ text:"park", correct:false }, { text:"yard", correct:true }]
      },
      q2: {
        question: "What is he doing?",
        sentence: "He is _____ the grass.",
        options: [{ text:"mowing", correct:true }, { text:"fixing", correct:false }]
      }
    }
  ];

  // ── DOM ────────────────────────────────────────────────────────────────────
  const imgEl          = document.getElementById("lessonImg");
  const counterEl      = document.getElementById("counter");
  const barEl          = document.getElementById("progressBar");
  const mainCard       = document.getElementById("mainCard");
  const endScreen      = document.getElementById("endScreen");
  const q1Block        = document.getElementById("q1Block");
  const q2Block        = document.getElementById("q2Block");
  const q1LabelEl      = document.getElementById("q1Label");
  const q1SentenceEl   = document.getElementById("q1Sentence");
  const q2LabelEl      = document.getElementById("q2Label");
  const q2SentenceEl   = document.getElementById("q2Sentence");
  const q1OptionsEl    = document.getElementById("q1Options");
  const q2OptionsEl    = document.getElementById("q2Options");
  const audioIndicator = document.getElementById("audioIndicator");
  const correctCountEl = document.getElementById("correctCount");
  const wrongCountEl   = document.getElementById("wrongCount");

  let slideIndex   = 0;
  let currentAudio = null;
  let totalCorrect = 0;
  let totalWrong   = 0;

  function updateScore() {
    correctCountEl.textContent = totalCorrect;
    wrongCountEl.textContent   = totalWrong;
  }

  function updateCounter() {
    counterEl.textContent = `${slideIndex + 1} / ${SLIDES.length}`;
    barEl.style.width = ((slideIndex + 1) / SLIDES.length * 100) + "%";
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  // ── Build question → resolves on correct answer ────────────────────────────
  function buildQuestion(labelEl, sentenceEl, optionsEl, q) {
    labelEl.textContent    = q.question;
    sentenceEl.textContent = q.sentence;
    optionsEl.innerHTML    = "";

    // Remove any lingering hint from previous attempt
    const oldHint = optionsEl.parentElement.querySelector(".hint-text");
    if (oldHint) oldHint.remove();

    let errorsThisQ = 0;

    return new Promise(resolve => {
      function lockAll() {
        optionsEl.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);
      }

      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "opt-btn";
        btn.textContent = opt.text;

        btn.addEventListener("click", () => {
          if (btn.disabled) return;

          if (opt.correct) {
            totalCorrect++;
            updateScore();
            btn.classList.add("correct");
            playCorrectSfx();
            lockAll();
            sentenceEl.textContent = q.sentence.replace("_____", opt.text);
            resolve();
          } else {
            errorsThisQ++;
            totalWrong++;
            updateScore();
            playIncorrectSfx();
            btn.classList.add("wrong");
            setTimeout(() => btn.classList.remove("wrong"), 600);

            if (errorsThisQ >= MAX_ERRORS_BEFORE_REVEAL) {
              // Highlight correct answer
              optionsEl.querySelectorAll(".opt-btn").forEach(b => {
                const isCorrect = q.options.find(o => o.text === b.textContent && o.correct);
                if (isCorrect) b.classList.add("revealed");
                b.disabled = true;
              });
              // Show hint
              if (!optionsEl.parentElement.querySelector(".hint-text")) {
                const hint = document.createElement("p");
                hint.className = "hint-text";
                hint.textContent = "💡 La respuesta correcta es:";
                optionsEl.insertAdjacentElement("afterend", hint);
              }
              sentenceEl.textContent = q.sentence.replace("_____", q.options.find(o=>o.correct).text);
              setTimeout(resolve, 1600);
            }
          }
        });

        optionsEl.appendChild(btn);
      });
    });
  }

  // ── Play slide audio ───────────────────────────────────────────────────────
  function playSlideAudio(src) {
    return new Promise(resolve => {
      audioIndicator.classList.add("visible");
      if (currentAudio) { currentAudio.pause(); currentAudio.src = ""; }
      const audio = new Audio(src);
      currentAudio = audio;

      function finish() {
        audioIndicator.classList.remove("visible");
        resolve();
      }

      audio.play().catch(finish);
      audio.onended = finish;
      audio.onerror = finish;

      // iOS timeupdate fallback
      audio.addEventListener("timeupdate", function iosCheck() {
        if (audio.duration && audio.currentTime >= audio.duration - 0.3) {
          audio.removeEventListener("timeupdate", iosCheck);
          finish();
        }
      });
    });
  }

  // ── Load slide ─────────────────────────────────────────────────────────────
  async function loadSlide(index) {
    slideIndex = index;
    updateCounter();

    q1Block.classList.remove("visible");
    q2Block.classList.remove("visible");
    audioIndicator.classList.remove("visible");
    q1OptionsEl.innerHTML = "";
    q2OptionsEl.innerHTML = "";
    // Clean up lingering hints
    document.querySelectorAll(".hint-text").forEach(h => h.remove());

    const slide = SLIDES[index];
    imgEl.src = slide.image;
    imgEl.alt = slide.q1.question;

    await delay(200);

    // Q1
    q1Block.classList.add("visible");
    await buildQuestion(q1LabelEl, q1SentenceEl, q1OptionsEl, slide.q1);

    // Q2
    await delay(200);
    q2Block.classList.add("visible");
    await buildQuestion(q2LabelEl, q2SentenceEl, q2OptionsEl, slide.q2);

    // Both done → play audio
    await delay(600);
    await playSlideAudio(slide.audio);

    // Advance
    await delay(1200);

    const next = index + 1;
    if (next >= SLIDES.length) {
      showEnd();
    } else {
      loadSlide(next);
    }
  }

  // ── End ────────────────────────────────────────────────────────────────────
  function showEnd() {
    mainCard.style.display = "none";

    const key = `inglesco_progress_u${UNIT}`;
    try {
      const data = JSON.parse(localStorage.getItem(key) || "{}");
      if (!data[`l${LESSON}`]) data[`l${LESSON}`] = {};
      if (!data[`l${LESSON}`].partsCompleted || data[`l${LESSON}`].partsCompleted < PART) {
        data[`l${LESSON}`].partsCompleted = PART;
      }
      localStorage.setItem(key, JSON.stringify(data));
    } catch(e) {}

    document.getElementById("finalCorrect").textContent = totalCorrect;
    document.getElementById("finalWrong").textContent   = totalWrong;
    endScreen.style.display = "block";
    endScreen.scrollIntoView({ behavior:"smooth", block:"center" });
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  loadSlide(0);
})();
</script>
</body>
</html>
