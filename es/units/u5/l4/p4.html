<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 4 • Parte 4</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 60px;
  color:#111827;
}
.wrap{max-width:700px;margin:0 auto}

.back-btn{
  display:inline-block;margin-bottom:16px;padding:7px 14px;
  background:#2563eb;color:white;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}

.progress-container{
  display:flex;justify-content:center;gap:10px;margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* ── Card ────────────────────────────────────────────────────────────────── */
.card{
  background:rgba(255,255,255,.88);border-radius:18px;
  padding:16px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:20px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#a855f7;
  border-radius:999px;transition:width .4s;
}

.lesson-img{
  width:100%;height:auto;max-height:260px;object-fit:contain;
  border-radius:14px;margin-bottom:20px;display:block;background:#f1f5f9;
}

/* ── Question block ───────────────────────────────────────────────────────── */
#questionArea{margin-top:4px}

.q-block{
  opacity:0;transform:translateY(8px);
  transition:opacity .3s,transform .3s;
}
.q-block.visible{opacity:1;transform:translateY(0)}

.q-label{
  text-align:center;font-size:15px;font-weight:700;
  color:#1e3a5f;margin-bottom:6px;
}
.q-sentence{
  text-align:center;font-size:16px;font-weight:700;
  color:#0d9488;line-height:1.6;margin-bottom:14px;
}

.options-row{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  margin-bottom:4px;
}

.opt-btn{
  padding:12px 28px;
  border-radius:12px;
  border:2px solid #0d9488;
  background:#f0fdfa;color:#0f766e;
  font-weight:700;font-size:15px;
  font-family:'Poppins',sans-serif;
  cursor:pointer;min-width:120px;text-align:center;
  transition:background .15s,border-color .15s,color .15s,transform .1s;
}
.opt-btn:hover:not(:disabled){background:#ccfbf1;border-color:#0d9488}
.opt-btn:active{transform:scale(.96)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{background:#22c55e;border-color:#22c55e;color:white}
.opt-btn.wrong{
  background:#fee2e2;border-color:#ef4444;color:#b91c1c;
  animation:shake .3s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 4 • Parte 4</div>
  <div class="subline">Vacaciones en Hawaii</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step active" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <div class="card" id="mainCard">
    <div class="counter-row"><span id="counter">1 / 6</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>

    <img id="lessonImg" class="lesson-img" src="" alt="" />

    <div id="questionArea"></div>
  </div>
</div>

<!-- End screen -->
<div style="display:none;text-align:center;background:rgba(255,255,255,.88);border-radius:18px;padding:36px 24px;margin:16px auto;max-width:700px"
     id="endScreen"
     data-unit="5" data-lesson="4" data-part="4">
  <div style="font-size:52px;margin-bottom:12px">🏆</div>
  <h2 style="font-size:24px;font-weight:900;color:#1e40af;margin-bottom:8px">¡Muy buen trabajo!</h2>
  <p style="font-size:16px;font-weight:600;color:#374151;margin-bottom:6px">Completaste la Parte 4.</p>
  <p style="font-size:14px;color:#64748b;margin-bottom:24px">¡Excelente esfuerzo!</p>
  <a href="p5.html" style="display:inline-block;padding:12px 28px;background:#2563eb;color:white;border-radius:12px;text-decoration:none;font-weight:700;font-size:16px">Continuar → Parte 5</a>
</div>

<script src="../../../../js/u5/u5_l4_p4.js"></script>
</body>
</html>
