<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Unidad 5 • Lección 4 • Parte 5</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

<!-- Vercel Analytics -->
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 80px;
  color:#111827;
}
.wrap{max-width:640px;margin:0 auto}

.back-btn{
  display:inline-block;margin-bottom:16px;padding:7px 14px;
  background:#2563eb;color:white;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}

/* ── Progress dots ── */
.progress-container{
  display:flex;justify-content:center;gap:10px;margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* ── Score pills ── */
.score-row{
  display:flex;justify-content:center;gap:16px;margin-bottom:14px;
}
.score-pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:999px;
  font-weight:700;font-size:13px;
}
.score-pill.correct-pill{background:#dcfce7;color:#16a34a;border:1.5px solid #86efac}
.score-pill.wrong-pill{background:#fee2e2;color:#dc2626;border:1.5px solid #fca5a5}

/* ── Card ── */
.card{
  background:rgba(255,255,255,.88);border-radius:20px;
  padding:18px 16px 22px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:18px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#a855f7;
  border-radius:999px;transition:width .4s;
}

/* Image */
.lesson-img{
  width:100%;max-height:220px;object-fit:contain;
  border-radius:14px;margin-bottom:20px;
  display:block;background:#f1f5f9;
}

/* ── Question area ── */
#questionArea{margin-top:4px}

.q-block{
  opacity:0;transform:translateY(8px);
  transition:opacity .3s,transform .3s;
}
.q-block.visible{opacity:1;transform:translateY(0)}

.q-sentence{
  text-align:center;font-size:17px;font-weight:700;
  color:#1e3a5f;line-height:1.6;margin-bottom:14px;
}

.options-row{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  margin-bottom:4px;
}

.opt-btn{
  padding:13px 28px;
  border-radius:12px;
  border:2px solid #0d9488;
  background:#f0fdfa;color:#0f766e;
  font-weight:700;font-size:15px;
  font-family:'Poppins',sans-serif;
  cursor:pointer;min-width:120px;text-align:center;
  transition:background .15s,border-color .15s,color .15s,transform .1s;
  touch-action:manipulation;
}
.opt-btn:hover:not(:disabled){background:#ccfbf1;border-color:#0d9488}
.opt-btn:active:not(:disabled){transform:scale(.96)}
.opt-btn:disabled{cursor:default}
.opt-btn.correct{background:#22c55e;border-color:#22c55e;color:white}
.opt-btn.wrong{background:#fee2e2;border-color:#ef4444;color:#b91c1c;animation:shake .3s ease}
.opt-btn.revealed{background:#fef9c3;border-color:#f59e0b;color:#92400e}

.hint-text{
  text-align:center;font-size:13px;color:#f59e0b;
  font-weight:700;margin-top:10px;
  animation:fadeIn .3s ease;
}

/* ── End screen ── */
#endScreen{
  display:none;text-align:center;
  background:rgba(255,255,255,.92);border-radius:20px;
  padding:40px 24px;margin:0 auto;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.end-trophy{font-size:56px;margin-bottom:14px}
.end-title{font-size:24px;font-weight:900;color:#1e40af;margin-bottom:8px}
.end-sub{font-size:16px;font-weight:600;color:#374151;margin-bottom:6px}
.end-note{font-size:14px;color:#64748b;margin-bottom:24px}
.end-score{
  display:inline-flex;gap:20px;
  background:#f1f5f9;border-radius:12px;padding:10px 24px;
  margin-bottom:24px;font-size:15px;font-weight:700;
}
.end-score .c{color:#16a34a}
.end-score .w{color:#dc2626}
.continue-btn{
  display:inline-block;padding:13px 32px;
  background:#2563eb;color:white;border-radius:12px;
  text-decoration:none;font-weight:700;font-size:16px;
  touch-action:manipulation;
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  25%{transform:translateX(-6px)}
  75%{transform:translateX(6px)}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 4 • Parte 5</div>
  <div class="subline">Build your vacation</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step active" href="p5.html">5</a>
  </div>

  <!-- Score pills -->
  <div class="score-row">
    <div class="score-pill correct-pill">✓ <span id="correctCount">0</span></div>
    <div class="score-pill wrong-pill">✗ <span id="wrongCount">0</span></div>
  </div>

  <!-- Main card -->
  <div class="card" id="mainCard">
    <div class="counter-row"><span id="counter">0 / 11</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>

    <img id="lessonImg" class="lesson-img" src="" alt="" />
    <div id="questionArea"></div>
  </div>

  <!-- End screen -->
  <div id="endScreen" data-unit="5" data-lesson="4" data-part="5">
    <div class="end-trophy">🏆</div>
    <h2 class="end-title">¡Muy buen trabajo!</h2>
    <p class="end-sub">Completaste la Lección 4.</p>
    <div class="end-score">
      <span class="c">✓ <span id="finalCorrect">0</span> correctas</span>
      <span class="w">✗ <span id="finalWrong">0</span> errores</span>
    </div>
    <p class="end-note">¡Excelente esfuerzo!</p>
    <a href="../l5/p1.html" class="continue-btn">Continuar → Lección 5</a>
  </div>
</div>

<script>
(() => {
  const UNIT   = 5;
  const LESSON = 4;
  const PART   = 5;
  const MAX_ERRORS_BEFORE_REVEAL = 2;

  const BASE     = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE = BASE + "images/u5/";
  const SFX_BASE = BASE + "audio/u5/";

  // ── SFX ────────────────────────────────────────────────────────────────────
  const sfxCorrect   = new Audio(SFX_BASE + "correct.wav");
  const sfxIncorrect = new Audio(SFX_BASE + "incorrect.wav");
  sfxCorrect.preload = sfxIncorrect.preload = "auto";
  function playCorrectSfx()   { sfxCorrect.currentTime   = 0; sfxCorrect.play().catch(()=>{}); }
  function playIncorrectSfx() { sfxIncorrect.currentTime = 0; sfxIncorrect.play().catch(()=>{}); }

  // ── Slides ─────────────────────────────────────────────────────────────────
  const SLIDES = [
    {
      image: IMG_BASE + "u5.vacation.hawaii.jpg",
      sentences: [
        {
          text: "This is my ______.",
          options: [{ text:"cousins", correct:true }, { text:"parents", correct:false }]
        }
      ]
    },
    {
      image: IMG_BASE + "u5.hotel.jpg",
      sentences: [
        {
          text: "Their hotel is ______.",
          options: [{ text:"old", correct:true }, { text:"new", correct:false }]
        },
        {
          text: "Their hotel room is ______.",
          options: [{ text:"small", correct:true }, { text:"big", correct:false }]
        }
      ]
    },
    {
      image: IMG_BASE + "u5.tommy.surf.jpg",
      sentences: [
        {
          text: "This is my ______ Tommy.",
          options: [{ text:"cousin", correct:true }, { text:"brother", correct:false }]
        },
        {
          text: "He is ______ with his surfboard.",
          options: [{ text:"swimming", correct:true }, { text:"riding", correct:false }]
        }
      ]
    },
    {
      image: IMG_BASE + "u5.shelly.sand.jpg",
      sentences: [
        {
          text: "This is my ______ Shelly.",
          options: [{ text:"cousin", correct:true }, { text:"sister", correct:false }]
        },
        {
          text: "She is ______ a sandcastle.",
          options: [{ text:"building", correct:true }, { text:"reading", correct:false }]
        }
      ]
    },
    {
      image: IMG_BASE + "u5.dog.sand.jpg",
      sentences: [
        {
          text: "This is our ______.",
          options: [{ text:"dog", correct:true }, { text:"cat", correct:false }]
        },
        {
          text: "He is ______ on the sand.",
          options: [{ text:"running", correct:true }, { text:"sleeping", correct:false }]
        }
      ]
    },
    {
      image: IMG_BASE + "u5.aunt.uncle.beach.jpg",
      sentences: [
        {
          text: "My aunt is ______ a book.",
          options: [{ text:"reading", correct:true }, { text:"cooking", correct:false }]
        },
        {
          text: "My uncle is drinking a ______.",
          options: [{ text:"cocktail", correct:true }, { text:"sandwich", correct:false }]
        }
      ]
    }
  ];

  // ── Fisher-Yates shuffle ───────────────────────────────────────────────────
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  shuffle(SLIDES);

  const TOTAL_QUESTIONS = SLIDES.reduce((sum, s) => sum + s.sentences.length, 0);

  // ── DOM ────────────────────────────────────────────────────────────────────
  const imgEl          = document.getElementById("lessonImg");
  const counterEl      = document.getElementById("counter");
  const barEl          = document.getElementById("progressBar");
  const mainCard       = document.getElementById("mainCard");
  const endScreen      = document.getElementById("endScreen");
  const questionArea   = document.getElementById("questionArea");
  const correctCountEl = document.getElementById("correctCount");
  const wrongCountEl   = document.getElementById("wrongCount");

  let slideIndex    = 0;
  let questionIndex = 0;
  let totalCorrect  = 0;
  let totalWrong    = 0;

  function updateScore() {
    correctCountEl.textContent = totalCorrect;
    wrongCountEl.textContent   = totalWrong;
  }

  function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

  function updateCounter() {
    counterEl.textContent = `${questionIndex} / ${TOTAL_QUESTIONS}`;
    barEl.style.width = (questionIndex / TOTAL_QUESTIONS * 100) + "%";
  }

  // ── Show one sentence → resolves on correct ────────────────────────────────
  function showSentence(s) {
    return new Promise(resolve => {
      let errorsThisQ = 0;

      questionArea.innerHTML = "";

      const block = document.createElement("div");
      block.className = "q-block";

      const sentEl = document.createElement("p");
      sentEl.className = "q-sentence";
      sentEl.textContent = s.text;

      const optRow = document.createElement("div");
      optRow.className = "options-row";

      function lockAll() {
        optRow.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);
      }

      const shuffledOptions = shuffle([...s.options]);

      shuffledOptions.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "opt-btn";
        btn.textContent = opt.text;

        btn.addEventListener("click", () => {
          if (btn.disabled) return;

          if (opt.correct) {
            totalCorrect++;
            updateScore();
            btn.classList.add("correct");
            playCorrectSfx();
            lockAll();
            sentEl.textContent = s.text.replace("______", opt.text);
            resolve();
          } else {
            errorsThisQ++;
            totalWrong++;
            updateScore();
            playIncorrectSfx();
            btn.classList.add("wrong");
            setTimeout(() => btn.classList.remove("wrong"), 600);

            if (errorsThisQ >= MAX_ERRORS_BEFORE_REVEAL) {
              optRow.querySelectorAll(".opt-btn").forEach(b => {
                const match = s.options.find(o => o.text === b.textContent && o.correct);
                if (match) b.classList.add("revealed");
                b.disabled = true;
              });
              if (!block.querySelector(".hint-text")) {
                const hint = document.createElement("p");
                hint.className = "hint-text";
                hint.textContent = "💡 La respuesta correcta es:";
                block.appendChild(hint);
              }
              sentEl.textContent = s.text.replace("______", s.options.find(o => o.correct).text);
              setTimeout(resolve, 1600);
            }
          }
        });

        optRow.appendChild(btn);
      });

      block.appendChild(sentEl);
      block.appendChild(optRow);
      questionArea.appendChild(block);

      requestAnimationFrame(() => requestAnimationFrame(() => block.classList.add("visible")));
    });
  }

  // ── Run all sentences for a slide ──────────────────────────────────────────
  async function runSlide(slide) {
    for (const s of slide.sentences) {
      questionIndex++;
      updateCounter();
      await showSentence(s);
      await delay(400);
    }
  }

  // ── Load slide ─────────────────────────────────────────────────────────────
  async function loadSlide(index) {
    slideIndex = index;
    questionArea.innerHTML = "";

    const slide = SLIDES[index];
    imgEl.src = slide.image;
    imgEl.alt = slide.sentences[0].text;

    await delay(150);
    await runSlide(slide);
    await delay(600);

    const next = index + 1;
    if (next >= SLIDES.length) {
      showEnd();
    } else {
      loadSlide(next);
    }
  }

  // ── End ────────────────────────────────────────────────────────────────────
  function showEnd() {
    mainCard.style.display = "none";

    const key = `inglesco_progress_u${UNIT}`;
    try {
      const data = JSON.parse(localStorage.getItem(key) || "{}");
      if (!data[`l${LESSON}`]) data[`l${LESSON}`] = {};
      if (!data[`l${LESSON}`].partsCompleted || data[`l${LESSON}`].partsCompleted < PART) {
        data[`l${LESSON}`].partsCompleted = PART;
      }
      localStorage.setItem(key, JSON.stringify(data));
    } catch(e) {}

    document.getElementById("finalCorrect").textContent = totalCorrect;
    document.getElementById("finalWrong").textContent   = totalWrong;
    endScreen.style.display = "block";
    endScreen.scrollIntoView({ behavior:"smooth", block:"center" });
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  loadSlide(0);
})();
</script>
</body>
</html>
