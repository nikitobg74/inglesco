<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 5 • Parte 3</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 60px;
  color:#111827;
}
.wrap{max-width:700px;margin:0 auto}

.back-btn{
  display:inline-block;margin-bottom:16px;padding:7px 14px;
  background:#2563eb;color:white;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}

.progress-container{
  display:flex;justify-content:center;gap:10px;margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* ── Vocab panel ─────────────────────────────────────────────────────────── */
.vocab-panel{
  background:rgba(255,255,255,.92);
  border-radius:16px;
  box-shadow:0 4px 14px rgba(0,0,0,.09);
  margin-bottom:18px;
  overflow:hidden;
  border-left:5px solid #0d9488;
}
.vocab-toggle{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;
  background:none;border:none;cursor:pointer;
  font-family:'Poppins',sans-serif;
  text-align:left;
}
.vocab-toggle:hover{background:rgba(0,0,0,.02)}
.vocab-toggle-label{
  font-size:17px;font-weight:900;color:#0f766e;
  display:flex;align-items:center;gap:8px;
}
.vocab-badge{
  background:#0d9488;color:white;
  font-size:11px;font-weight:700;
  padding:2px 8px;border-radius:999px;
  letter-spacing:.04em;
}
.toggle-arrow{font-size:13px;color:#94a3b8;flex-shrink:0}
.vocab-body{
  display:none;
  padding:0 18px 18px;
}
.vocab-body.open{display:block}

.vocab-table{
  width:100%;border-collapse:collapse;font-size:15px;
}
.vocab-table th{
  background:#0f766e;color:white;
  padding:9px 12px;font-weight:700;font-size:14px;text-align:left;
}
.vocab-table th:first-child{border-radius:8px 0 0 0}
.vocab-table th:last-child{border-radius:0 8px 0 0}
.vocab-table td{
  padding:9px 12px;border-bottom:1px solid #e2e8f0;
  font-weight:600;vertical-align:middle;
}
.vocab-table tr:last-child td{border-bottom:none}
.vocab-table tr:nth-child(even) td{background:#f0fdfa}
.vocab-en{color:#1e40af;font-weight:700}
.vocab-es{color:#0d9488;font-weight:700}
.vocab-en.vocab-tap{
  background:none;border:none;cursor:pointer;
  font-family:'Poppins',sans-serif;
  font-size:15px;font-weight:700;color:#1e40af;
  padding:4px 0;text-align:left;
  transition:color .15s;
}
.vocab-en.vocab-tap:hover{color:#2563eb;text-decoration:underline}

/* ── Exercise card ──────────────────────────────────────────────────────── */
.card{
  background:rgba(255,255,255,.88);border-radius:18px;
  padding:16px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.score-badge{
  background:#f0fdf4;border:2px solid #86efac;
  color:#166534;border-radius:999px;
  padding:3px 12px;font-size:13px;font-weight:700;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:20px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#a855f7;
  border-radius:999px;transition:width .4s;
}

.lesson-img{
  width:100%;height:auto;max-height:240px;object-fit:contain;
  border-radius:14px;margin-bottom:14px;display:block;background:#f1f5f9;
}

/* Audio play button */
.audio-controls{
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;
}
.play-btn{
  width:54px;height:54px;border-radius:50%;
  border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:22px;transition:background .2s,transform .1s;
}
.play-btn.idle   {background:#2563eb;color:white}
.play-btn.playing{background:#f59e0b;color:white}
.play-btn.done   {background:#22c55e;color:white}
.play-btn:active {transform:scale(.93)}
.play-btn:disabled{opacity:.4;cursor:default}

/* Fill-in sentence */
.sentence-wrap{
  text-align:center;
  font-size:17px;font-weight:700;color:#1e3a5f;
  margin-bottom:16px;line-height:1.8;
  background:#f0f9ff;border-radius:12px;padding:14px 16px;
  border-left:4px solid #2563eb;
}
.blank{
  display:inline-block;
  min-width:100px;
  border-bottom:3px solid #2563eb;
  padding:2px 8px;
  border-radius:4px;
  color:#1e40af;
  font-weight:900;
  background:#dbeafe;
  transition:background .2s, color .2s, border-color .2s;
  cursor:default;
}
.blank.filled-correct{
  background:#dcfce7;color:#166534;border-color:#22c55e;
}
.blank.filled-wrong{
  background:#fee2e2;color:#991b1b;border-color:#ef4444;
  animation:shake .4s ease;
}
@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-7px)}
  40%{transform:translateX(7px)}
  60%{transform:translateX(-5px)}
  80%{transform:translateX(5px)}
}

/* Word bank */
.word-bank{
  display:flex;justify-content:center;flex-wrap:wrap;gap:10px;
  margin-bottom:16px;
}
.chip{
  padding:9px 20px;
  background:#0d9488;color:white;
  border:none;border-radius:10px;
  font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;
  cursor:pointer;transition:background .2s,transform .1s,opacity .2s;
}
.chip:hover:not(:disabled){background:#0f766e;transform:translateY(-2px)}
.chip:disabled{opacity:.35;cursor:default;transform:none}

/* Feedback box */
.feedback-box{
  display:none;
  border-radius:12px;padding:12px 16px;
  margin-bottom:16px;font-size:14px;font-weight:600;line-height:1.6;
}
.feedback-box.show{display:block}
.feedback-box.correct{background:#f0fdf4;border:2px solid #86efac;color:#166534}
.feedback-box.wrong{background:#fef2f2;border:2px solid #fca5a5;color:#991b1b}

/* Continue button */
.continue-btn{
  display:none;
  margin:0 auto;
  padding:12px 30px;
  background:#2563eb;color:white;
  border:none;border-radius:12px;
  font-weight:700;font-size:15px;font-family:'Poppins',sans-serif;
  cursor:pointer;transition:background .2s;
}
.continue-btn.visible{display:block}
.continue-btn:hover{background:#1d4ed8}


</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 5 • Parte 3</div>
  <div class="subline">El posesivo en inglés</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step active" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- ── Vocab panel ────────────────────────────────────────────────────── -->
  <div class="vocab-panel">
    <button class="vocab-toggle" id="vocabToggle">
      <span class="vocab-toggle-label">
        📗 Vocabulario
        <span class="vocab-badge">NUEVO</span>
      </span>
      <span class="toggle-arrow" id="vocabArrow">▲</span>
    </button>
    <div class="vocab-body open" id="vocabBody">
      <table class="vocab-table">
        <thead>
          <tr><th>🇺🇸 English (tap to listen)</th><th>🇲🇽 Español</th></tr>
        </thead>
        <tbody>
          <tr>
            <td><button class="vocab-en vocab-tap" data-audio="u5.nephew.mp3">🔊 nephew</button></td>
            <td class="vocab-es">sobrino</td>
          </tr>
          <tr>
            <td><button class="vocab-en vocab-tap" data-audio="u5.niece.mp3">🔊 niece</button></td>
            <td class="vocab-es">sobrina</td>
          </tr>
          <tr>
            <td><button class="vocab-en vocab-tap" data-audio="u5.cousin.mp3">🔊 cousin</button></td>
            <td class="vocab-es">primo / prima</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- ── Exercise card ──────────────────────────────────────────────────── -->
  <div class="card" id="mainCard">
    <div class="counter-row">
      <span id="counter">1 / 10</span>
      <span class="score-badge">✅ <span id="scoreNum">0</span> / 10</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>

    <img id="lessonImg" class="lesson-img" src="" alt="" />

    <div class="audio-controls">
      <button class="play-btn idle" id="playBtn" title="Reproducir">▶</button>
    </div>

    <div class="sentence-wrap" id="sentenceWrap"></div>

    <div class="word-bank" id="wordBank"></div>

    <div class="feedback-box" id="feedbackBox"></div>

    <button class="continue-btn" id="continueBtn">Siguiente →</button>
  </div>


</div><!-- /wrap -->

<!-- End screen -->
<div style="display:none;text-align:center;background:rgba(255,255,255,.88);border-radius:18px;padding:36px 24px;margin:16px auto;max-width:700px"
     id="endScreen"
     data-unit="5" data-lesson="5" data-part="3">
  <!-- populated by JS based on score -->
</div>

<script src="../../../../js/u5/u5_l5_p3.js"></script>
</body>
</html>
