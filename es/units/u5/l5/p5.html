<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Unidad 5 • Lección 5 • Parte 5</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />

<!-- Vercel Analytics -->
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif;-webkit-tap-highlight-color:transparent}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;padding:16px 12px 80px;color:#111827;
}
.wrap{max-width:640px;margin:0 auto}

.back-btn{
  display:inline-block;margin-bottom:16px;padding:7px 14px;
  background:#2563eb;color:white;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}

/* ── Progress dots ── */
.progress-container{display:flex;justify-content:center;gap:10px;margin:12px 0 20px 0}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* ── Score pills ── */
.score-row{display:flex;justify-content:center;gap:16px;margin-bottom:14px}
.score-pill{
  display:flex;align-items:center;gap:6px;
  padding:5px 14px;border-radius:999px;font-weight:700;font-size:13px;
}
.score-pill.correct-pill{background:#dcfce7;color:#16a34a;border:1.5px solid #86efac}
.score-pill.wrong-pill  {background:#fee2e2;color:#dc2626;border:1.5px solid #fca5a5}

/* ── Vocab panel ── */
.vocab-panel{
  background:rgba(255,255,255,.92);border-radius:16px;
  box-shadow:0 4px 14px rgba(0,0,0,.09);
  margin-bottom:18px;overflow:hidden;border-left:5px solid #0d9488;
}
.vocab-toggle{
  width:100%;display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;background:none;border:none;cursor:pointer;
  font-family:'Poppins',sans-serif;text-align:left;touch-action:manipulation;
}
.vocab-toggle:hover{background:rgba(0,0,0,.02)}
.vocab-toggle-label{font-size:17px;font-weight:900;color:#0f766e;display:flex;align-items:center;gap:8px}
.vocab-badge{background:#0d9488;color:white;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;letter-spacing:.04em}
.toggle-arrow{font-size:13px;color:#94a3b8;flex-shrink:0}
.vocab-body{display:none;padding:0 18px 18px}
.vocab-body.open{display:block}
.vocab-table{width:100%;border-collapse:collapse;font-size:15px}
.vocab-table th{background:#0f766e;color:white;padding:9px 12px;font-weight:700;font-size:14px;text-align:left}
.vocab-table th:first-child{border-radius:8px 0 0 0}
.vocab-table th:last-child{border-radius:0 8px 0 0}
.vocab-table td{padding:9px 12px;border-bottom:1px solid #e2e8f0;font-weight:600;vertical-align:middle}
.vocab-table tr:last-child td{border-bottom:none}
.vocab-table tr:nth-child(even) td{background:#f0fdfa}
.vocab-es{color:#0d9488;font-weight:700}
.vocab-tap{
  background:none;border:none;cursor:pointer;
  font-family:'Poppins',sans-serif;font-size:15px;font-weight:700;color:#1e40af;
  padding:4px 2px;text-align:left;text-decoration:underline dotted #93c5fd;
  transition:color .2s;touch-action:manipulation;
}
.vocab-tap:hover{color:#1d4ed8}

/* ── Slide card ── */
.card{
  background:rgba(255,255,255,.9);border-radius:20px;padding:18px 16px 22px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);margin-bottom:16px;
}
.bar-wrap{background:#e2e8f0;border-radius:999px;height:8px;margin-bottom:18px;overflow:hidden}
.bar-fill{height:100%;width:0;background:#a855f7;border-radius:999px;transition:width .35s}

.lesson-img{
  width:100%;max-height:220px;object-fit:contain;border-radius:16px;
  margin-bottom:16px;display:block;background:#f1f5f9;
}

.who-label{
  text-align:center;font-size:15px;font-weight:900;color:#2563eb;
  background:#eff6ff;border-radius:10px;
  padding:8px 14px;margin-bottom:12px;border-left:4px solid #2563eb;
}

.slide-lines{margin-bottom:16px}
.line-en{font-size:15px;font-weight:700;color:#1e3a5f;display:block;line-height:1.7;padding-left:4px}

.audio-controls{display:flex;align-items:center;justify-content:center;margin-bottom:18px}
.play-btn{
  width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;transition:background .2s,transform .1s;touch-action:manipulation;
}
.play-btn.idle   {background:#2563eb;color:white}
.play-btn.playing{background:#f59e0b;color:white}
.play-btn.done   {background:#22c55e;color:white}
.play-btn:active {transform:scale(.93)}
.play-btn:disabled{opacity:.4;cursor:default}

/* ── Quiz section ── */
.quiz-section{display:none}
.quiz-section.visible{display:block}

.q-prompt{
  font-size:16px;font-weight:800;color:#1e40af;
  background:#eff6ff;border-radius:12px;
  padding:11px 14px;margin-bottom:12px;border-left:4px solid #2563eb;
}

.options{display:grid;gap:10px;margin-bottom:14px}
.option-btn{
  width:100%;border:none;border-radius:14px;padding:13px 16px;text-align:left;
  background:#eff6ff;color:#1e3a8a;font-size:17px;font-weight:800;cursor:pointer;
  transition:transform .06s,background .2s;touch-action:manipulation;
}
.option-btn:active{transform:scale(.99)}
.option-btn:disabled{cursor:default;opacity:1}
.option-btn.correct{background:#dcfce7;color:#166534}
.option-btn.wrong  {background:#fee2e2;color:#b91c1c}

.feedback-box{
  display:none;border-radius:12px;padding:11px 14px;
  margin-bottom:14px;font-size:14px;font-weight:700;line-height:1.6;
}
.feedback-box.show{display:block}
.feedback-box.correct{background:#f0fdf4;border:2px solid #86efac;color:#166534}
.feedback-box.wrong  {background:#fef2f2;border:2px solid #fca5a5;color:#991b1b}

.btn-next{
  display:none;margin:0 auto;
  padding:12px 28px;background:#2563eb;color:white;
  border:none;border-radius:14px;
  font-weight:800;font-size:15px;font-family:'Poppins',sans-serif;
  cursor:pointer;transition:background .2s;touch-action:manipulation;
}
.btn-next.visible{display:block}
.btn-next:hover{background:#1d4ed8}

/* ── End screen ── */
#endScreen{
  display:none;text-align:center;
  background:rgba(255,255,255,.92);border-radius:20px;
  padding:40px 24px;margin:0 auto;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.end-btn{
  display:inline-block;padding:12px 28px;border-radius:12px;
  text-decoration:none;font-weight:700;font-size:15px;touch-action:manipulation;
}
.end-btn.retry{background:#ef4444;color:white}
.end-btn.next {background:#2563eb;color:white}
.end-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px}
.end-score-box{
  display:inline-flex;gap:20px;background:#f1f5f9;
  border-radius:12px;padding:10px 24px;
  margin:14px 0;font-size:15px;font-weight:700;
}
.end-score-box .c{color:#16a34a}
.end-score-box .w{color:#dc2626}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 5 • Parte 5</div>
  <div class="subline">Los abuelos</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step active" href="p5.html">5</a>
  </div>

  <!-- Score pills -->
  <div class="score-row">
    <div class="score-pill correct-pill">✓ <span id="correctCount">0</span></div>
    <div class="score-pill wrong-pill">✗ <span id="wrongCount">0</span></div>
  </div>

  <!-- Vocab panel -->
  <div class="vocab-panel">
    <button class="vocab-toggle" id="vocabToggle">
      <span class="vocab-toggle-label">
        📗 Vocabulario
        <span class="vocab-badge">NUEVO</span>
      </span>
      <span class="toggle-arrow" id="vocabArrow">▲</span>
    </button>
    <div class="vocab-body open" id="vocabBody">
      <table class="vocab-table">
        <thead>
          <tr><th>🇺🇸 English (tap to listen)</th><th>🇲🇽 Español</th></tr>
        </thead>
        <tbody>
          <tr><td><button class="vocab-tap" data-audio="u5.grandmother1.mp3">🔊 grandmother</button></td><td class="vocab-es">abuela</td></tr>
          <tr><td><button class="vocab-tap" data-audio="u5.grandfather1.mp3">🔊 grandfather</button></td><td class="vocab-es">abuelo</td></tr>
          <tr><td><button class="vocab-tap" data-audio="u5.granddaughter.mp3">🔊 granddaughter</button></td><td class="vocab-es">nieta</td></tr>
          <tr><td><button class="vocab-tap" data-audio="u5.grandson.mp3">🔊 grandson</button></td><td class="vocab-es">nieto</td></tr>
          <tr><td><button class="vocab-tap" data-audio="u5.grandparents.mp3">🔊 grandparents</button></td><td class="vocab-es">abuelos</td></tr>
          <tr><td><button class="vocab-tap" data-audio="u5.parents.mp3">🔊 parents</button></td><td class="vocab-es">padres</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Main card -->
  <div class="card" id="mainCard">
    <div class="bar-wrap"><div class="bar-fill" id="barFill"></div></div>

    <img class="lesson-img" id="slideImg" src="" alt="" />
    <div class="who-label"  id="whoLabel"></div>
    <div class="slide-lines" id="slideLines"></div>

    <div class="audio-controls">
      <button class="play-btn idle" id="playBtn" aria-label="Reproducir audio">▶</button>
    </div>

    <div class="quiz-section" id="quizSection">
      <div class="q-prompt"    id="qPrompt"></div>
      <div class="options"     id="optionsWrap"></div>
      <div class="feedback-box" id="feedbackBox"></div>
      <button class="btn-next"  id="btnNext">Siguiente →</button>
    </div>
  </div>

  <!-- End screen -->
  <div id="endScreen" data-unit="5" data-lesson="5" data-part="5"></div>
</div>

<script>
(() => {
  const UNIT   = 5;
  const LESSON = 5;
  const PART   = 5;

  const BASE       = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE   = BASE + "images/u5/";
  const AUDIO_BASE = BASE + "audio/u5/";

  // ── SFX ────────────────────────────────────────────────────────────────────
  const sfxCorrect   = new Audio(AUDIO_BASE + "correct.wav");
  const sfxIncorrect = new Audio(AUDIO_BASE + "incorrect.wav");
  sfxCorrect.preload = sfxIncorrect.preload = "auto";
  function playCorrectSfx()   { sfxCorrect.currentTime   = 0; sfxCorrect.play().catch(()=>{}); }
  function playIncorrectSfx() { sfxIncorrect.currentTime = 0; sfxIncorrect.play().catch(()=>{}); }

  // ── Slides ─────────────────────────────────────────────────────────────────
  const SLIDES = [
    {
      image: IMG_BASE   + "u5.brother.sister.grandparents.jpg",
      audio: AUDIO_BASE + "u5.who.are.they.mp3",
      who:   "Who are they?",
      lines: [
        "They are David and Susan.",
        "They are Mary and Tom's grandparents.",
        "Mary is their granddaughter.",
        "Tom is their grandson.",
        "David is their grandfather.",
        "Susan is their grandmother."
      ],
      questions: [
        { prompt:"👉 Who is David?",     answer:"grandfather",   wrong:"father"    },
        { prompt:"👉 Who is Susan?",     answer:"grandmother",   wrong:"mother"    },
        { prompt:"👉 Mary is their ___", answer:"granddaughter", wrong:"daughter"  },
        { prompt:"👉 Tom is their ___",  answer:"grandson",      wrong:"brother"   }
      ]
    },
    {
      image: IMG_BASE   + "u5.baby.grandparents.jpg",
      audio: AUDIO_BASE + "u5.who.are.they2.mp3",
      who:   "Who are they?",
      lines: [
        "They are David and Susan.",
        "They are Bill's grandparents.",
        "Bill is their grandson.",
        "David is Bill's grandfather.",
        "Susan is Bill's grandmother."
      ],
      questions: [
        { prompt:"👉 David is Bill's ___", answer:"grandfather", wrong:"uncle" },
        { prompt:"👉 Susan is Bill's ___", answer:"grandmother", wrong:"aunt"  }
      ]
    }
  ];

  const totalQs = SLIDES.reduce((s, sl) => s + sl.questions.length, 0);

  // ── DOM ────────────────────────────────────────────────────────────────────
  const mainCard    = document.getElementById("mainCard");
  const barFill     = document.getElementById("barFill");
  const slideImg    = document.getElementById("slideImg");
  const whoLabel    = document.getElementById("whoLabel");
  const slideLines  = document.getElementById("slideLines");
  const playBtn     = document.getElementById("playBtn");
  const quizSection = document.getElementById("quizSection");
  const qPrompt     = document.getElementById("qPrompt");
  const optionsWrap = document.getElementById("optionsWrap");
  const feedbackBox = document.getElementById("feedbackBox");
  const btnNext     = document.getElementById("btnNext");
  const endScreen   = document.getElementById("endScreen");
  const vocabToggle = document.getElementById("vocabToggle");
  const vocabBody   = document.getElementById("vocabBody");
  const vocabArrow  = document.getElementById("vocabArrow");
  const correctCountEl = document.getElementById("correctCount");
  const wrongCountEl   = document.getElementById("wrongCount");

  let slideIndex   = 0;
  let qIndex       = 0;
  let totalCorrect = 0;
  let totalWrong   = 0;
  let currentAudio = null;
  let quizUnlocked = false; // guard against iOS double-trigger

  function updateScorePills() {
    correctCountEl.textContent = totalCorrect;
    wrongCountEl.textContent   = totalWrong;
  }

  // ── Vocab ──────────────────────────────────────────────────────────────────
  vocabToggle.addEventListener("click", () => {
    const open = vocabBody.classList.toggle("open");
    vocabArrow.textContent = open ? "▲" : "▼";
  });
  document.querySelectorAll(".vocab-tap").forEach(btn => {
    btn.addEventListener("click", () => new Audio(AUDIO_BASE + btn.dataset.audio).play().catch(()=>{}));
  });

  // ── Progress bar ───────────────────────────────────────────────────────────
  function updateBar() {
    const doneSlides = SLIDES.slice(0, slideIndex).reduce((s, sl) => s + sl.questions.length, 0);
    const done = doneSlides + qIndex;
    barFill.style.width = (done / totalQs * 100) + "%";
  }

  // ── Audio helpers ──────────────────────────────────────────────────────────
  function destroyAudio() {
    if (currentAudio) { currentAudio.pause(); currentAudio.src = ""; currentAudio = null; }
  }

  function setPlayState(state) {
    playBtn.className   = "play-btn " + state;
    playBtn.textContent = state === "playing" ? "⏸" : "▶";
    playBtn.disabled    = false;
  }

  // ── Load slide ─────────────────────────────────────────────────────────────
  function loadSlide(index) {
    slideIndex   = index;
    qIndex       = 0;
    quizUnlocked = false;
    destroyAudio();

    const sl = SLIDES[index];
    slideImg.src         = sl.image;
    slideImg.alt         = sl.who;
    whoLabel.textContent = sl.who;
    slideLines.innerHTML = sl.lines.map(l => `<span class="line-en">👉 ${l}</span>`).join("");

    quizSection.classList.remove("visible");
    feedbackBox.className = "feedback-box";
    feedbackBox.innerHTML = "";
    btnNext.classList.remove("visible");
    optionsWrap.innerHTML = "";
    qPrompt.textContent   = "";

    updateBar();

    const audio = new Audio(sl.audio);
    currentAudio = audio;
    setPlayState("idle");

    playBtn.onclick = () => {
      if (!audio.paused) {
        audio.pause();
        setPlayState("idle");
      } else {
        audio.play().then(() => setPlayState("playing")).catch(()=>{});
      }
    };

    function unlockQuiz() {
      if (quizUnlocked) return;
      quizUnlocked = true;
      setPlayState("done");
      showQuestion(0);
    }

    audio.onended = unlockQuiz;

    // iOS timeupdate fallback
    audio.addEventListener("timeupdate", function iosCheck() {
      if (audio.duration && audio.currentTime >= audio.duration - 0.3) {
        audio.removeEventListener("timeupdate", iosCheck);
        unlockQuiz();
      }
    });
  }

  // ── Show question ──────────────────────────────────────────────────────────
  function showQuestion(index) {
    qIndex = index;
    updateBar();

    const q = SLIDES[slideIndex].questions[index];

    quizSection.classList.add("visible");
    feedbackBox.className = "feedback-box";
    feedbackBox.innerHTML = "";
    btnNext.classList.remove("visible");
    qPrompt.textContent   = q.prompt;

    const opts = [
      { text:q.answer, correct:true  },
      { text:q.wrong,  correct:false }
    ].sort(() => Math.random() - 0.5);

    optionsWrap.innerHTML = "";
    opts.forEach(opt => {
      const btn = document.createElement("button");
      btn.className   = "option-btn";
      btn.textContent = opt.text;
      btn.addEventListener("click", () => handleAnswer(btn, opt.correct, q));
      optionsWrap.appendChild(btn);
    });
  }

  // ── Handle answer ──────────────────────────────────────────────────────────
  function handleAnswer(btn, isCorrect, q) {
    const allBtns = [...optionsWrap.querySelectorAll(".option-btn")];
    allBtns.forEach(b => b.disabled = true);

    if (isCorrect) {
      totalCorrect++;
      playCorrectSfx();
      btn.classList.add("correct");
      feedbackBox.className = "feedback-box correct show";
      feedbackBox.innerHTML = `✔ Correcto: <strong>${q.answer}</strong>`;
    } else {
      totalWrong++;
      playIncorrectSfx();
      btn.classList.add("wrong");
      allBtns.find(b => b.textContent === q.answer).classList.add("correct");
      feedbackBox.className = "feedback-box wrong show";
      feedbackBox.innerHTML = `❌ Incorrecto. Correcto: <strong>${q.answer}</strong>`;
    }

    updateScorePills();
    btnNext.classList.add("visible");
  }

  // ── Next ───────────────────────────────────────────────────────────────────
  btnNext.addEventListener("click", () => {
    feedbackBox.className = "feedback-box";
    feedbackBox.innerHTML = "";
    btnNext.classList.remove("visible");

    const nextQ = qIndex + 1;
    if (nextQ < SLIDES[slideIndex].questions.length) {
      showQuestion(nextQ);
    } else {
      const nextSlide = slideIndex + 1;
      if (nextSlide < SLIDES.length) {
        loadSlide(nextSlide);
      } else {
        showEnd();
      }
    }
  });

  // ── End screen ─────────────────────────────────────────────────────────────
  function showEnd() {
    mainCard.style.display = "none";
    barFill.style.width    = "100%";

    const key = `inglesco_progress_u${UNIT}`;
    try {
      const data = JSON.parse(localStorage.getItem(key) || "{}");
      if (!data[`l${LESSON}`]) data[`l${LESSON}`] = {};
      if (!data[`l${LESSON}`].partsCompleted || data[`l${LESSON}`].partsCompleted < PART) {
        data[`l${LESSON}`].partsCompleted = PART;
      }
      localStorage.setItem(key, JSON.stringify(data));
    } catch(e) {}

    let trophy, heading, sub, btns;

    if (totalCorrect <= 2) {
      trophy  = "😓";
      heading = "Necesitas practicar más";
      sub     = "Recomendación: Repite la lección para mejorar.";
      btns    = `<a href="p5.html" class="end-btn retry">🔁 Intentar de nuevo</a>`;
    } else if (totalCorrect <= 4) {
      trophy  = "🙂";
      heading = "Buen trabajo, pero puedes mejorar";
      sub     = "Intenta otra vez para un mejor resultado.";
      btns    = `<a href="p5.html" class="end-btn retry">🔁 Intentar de nuevo</a>
                 <a href="../index.html" class="end-btn next">Continuar →</a>`;
    } else {
      trophy  = "🏆";
      heading = "¡Muy buen trabajo!";
      sub     = "¡Listo para continuar!";
      btns    = `<a href="../index.html" class="end-btn next">Continuar →</a>`;
    }

    endScreen.innerHTML = `
      <div style="font-size:52px;margin-bottom:14px">${trophy}</div>
      <h2 style="font-size:22px;font-weight:900;color:#1e40af;margin-bottom:8px">${heading}</h2>
      <div class="end-score-box">
        <span class="c">✓ ${totalCorrect} / ${totalQs}</span>
        <span class="w">✗ ${totalWrong} errores</span>
      </div>
      <p style="font-size:14px;color:#64748b;margin-bottom:4px">${sub}</p>
      <div class="end-btns">${btns}</div>
    `;

    endScreen.style.display = "block";
    endScreen.scrollIntoView({ behavior:"smooth", block:"center" });
  }

  // ── Init ───────────────────────────────────────────────────────────────────
  loadSlide(0);
})();
</script>
</body>
</html>
