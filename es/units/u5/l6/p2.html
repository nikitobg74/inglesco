<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Unidad 5 • Lección 6 • Parte 2</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
<script defer src="/_vercel/insights/script.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 110px;
  color:#111827;
}
.wrap{max-width:640px;margin:0 auto}

.back-btn{
  display:inline-block;margin-bottom:16px;padding:7px 14px;
  background:#2563eb;color:white;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}

.progress-container{
  display:flex;justify-content:center;gap:10px;margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* ── Score tracker ───────────────────────────────────────────────────────── */
.score-tracker{
  display:flex;justify-content:center;gap:24px;
  margin-bottom:16px;
}
.score-box{
  display:flex;align-items:center;gap:6px;
  background:rgba(255,255,255,.88);border-radius:12px;
  padding:8px 16px;box-shadow:0 2px 8px rgba(0,0,0,.07);
  font-weight:700;font-size:15px;
}
.score-box.correct-box{color:#16a34a}
.score-box.wrong-box{color:#dc2626}
.score-icon{font-size:18px}

/* ── Card ────────────────────────────────────────────────────────────────── */
.card{
  background:rgba(255,255,255,.88);border-radius:20px;
  padding:20px 16px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:24px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#a855f7;
  border-radius:999px;transition:width .4s;
}

/* ── Question blocks ─────────────────────────────────────────────────────── */
.q-block{
  margin-bottom:24px;padding-bottom:24px;
  border-bottom:1px solid #e2e8f0;
  opacity:0;transform:translateY(8px);
  transition:opacity .3s,transform .3s;
}
.q-block.visible{opacity:1;transform:translateY(0)}
.q-block:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0}

.q-context{
  text-align:center;font-size:16px;color:#6b7280;font-weight:600;
  margin-bottom:6px;line-height:1.5;
}
.q-sentence{
  text-align:center;font-size:16px;font-weight:700;
  color:#0d9488;line-height:1.6;margin-bottom:12px;
}

.options-row{
  display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
}

.opt-btn{
  padding:11px 28px;
  border-radius:12px;
  border:2px solid #0d9488;
  background:#f0fdfa;color:#0f766e;
  font-weight:700;font-size:15px;
  font-family:'Poppins',sans-serif;
  cursor:pointer;min-width:100px;text-align:center;
  transition:background .15s,border-color .15s,color .15s,transform .1s;
  -webkit-tap-highlight-color:transparent;
  touch-action:manipulation;
}
.opt-btn:active:not(:disabled){transform:scale(.96)}
.opt-btn:disabled{cursor:default;opacity:.85}
.opt-btn.correct{background:#22c55e;border-color:#22c55e;color:white}
.opt-btn.wrong{background:#fee2e2;border-color:#ef4444;color:#b91c1c}
.opt-btn.revealed{background:#fef9c3;border-color:#f59e0b;color:#92400e;animation:pulse-reveal .5s ease}

@keyframes pulse-reveal{
  0%{transform:scale(1)}50%{transform:scale(1.05)}100%{transform:scale(1)}
}

/* ── Floating button ─────────────────────────────────────────────────────── */
#sigBtn{
  display:none;
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  padding:14px 40px;background:#2563eb;color:white;
  border:none;border-radius:14px;font-family:'Poppins',sans-serif;
  font-weight:700;font-size:16px;cursor:pointer;
  box-shadow:0 6px 20px rgba(37,99,235,.4);
  z-index:100;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
  bottom:calc(24px + env(safe-area-inset-bottom));
}
#sigBtn.visible{display:block}

/* ── End screen ──────────────────────────────────────────────────────────── */
#endScreen{
  display:none;text-align:center;
  background:rgba(255,255,255,.88);border-radius:20px;
  padding:36px 24px;margin:16px auto;max-width:640px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.score-circle{
  width:90px;height:90px;border-radius:50%;
  background:#dbeafe;border:4px solid #2563eb;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 20px;
}
.score-num{font-size:28px;font-weight:900;color:#1e40af}
.score-label{font-size:11px;font-weight:700;color:#486581}
.end-btn{
  padding:12px 28px;border:none;border-radius:12px;
  font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;
  cursor:pointer;touch-action:manipulation;
}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 6 • Parte 2</div>
  <div class="subline">Pronombres posesivos</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step active" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Score tracker -->
  <div class="score-tracker">
    <div class="score-box correct-box">
      <span class="score-icon">✓</span>
      <span id="correctCount">0</span>
    </div>
    <div class="score-box wrong-box">
      <span class="score-icon">✗</span>
      <span id="wrongCount">0</span>
    </div>
  </div>

  <div class="card" id="mainCard">
    <div class="counter-row">
      <span id="counter">0 / 8</span>
    </div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>
    <div id="questionArea"></div>
  </div>
</div>

<button id="sigBtn">Ver resultado →</button>

<div id="endScreen" data-unit="5" data-lesson="6" data-part="2">
  <div style="font-size:52px;margin-bottom:16px">🏆</div>
  <h2 style="font-size:24px;font-weight:900;color:#1e40af;margin-bottom:16px">¡Muy buen trabajo!</h2>
  <div class="score-circle">
    <span class="score-num" id="scoreNum">0</span>
    <span class="score-label">correctas</span>
  </div>
  <p style="font-size:15px;font-weight:600;color:#374151;margin-bottom:6px" id="scoreMsg"></p>
  <p style="font-size:13px;color:#64748b;margin-bottom:28px">Completaste la Parte 2.</p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <button id="redoBtn" class="end-btn" style="background:#0d9488;color:white">Reintentar</button>
    <a href="p3.html" style="display:inline-block;padding:12px 28px;background:#2563eb;color:white;border-radius:12px;text-decoration:none;font-weight:700;font-size:15px">
      Continuar → Parte 3
    </a>
  </div>
</div>

<script>
(() => {
  const UNIT   = 5;
  const LESSON = 6;
  const PART   = 2;
  const MAX_WRONG_PER_Q = 2;

  const BASE   = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const AUD_U5 = BASE + "audio/u5/";
  const SFX_OK  = new Audio(AUD_U5 + "correct.wav");
  const SFX_BAD = new Audio(AUD_U5 + "incorrect.wav");
  SFX_OK.load(); SFX_BAD.load();
  function playSfx(sfx){ sfx.currentTime=0; sfx.play().catch(()=>{}); }

  const QUESTIONS = [
    {
      context:  "Emma's brother is not short.",
      sentence: "___ brother is tall.",
      options:  [{ text:"His",correct:false },{ text:"Her",correct:true }]
    },
    {
      context:  "Carlos and Sofia's apartment is not cheap.",
      sentence: "___ apartment is expensive.",
      options:  [{ text:"His",correct:false },{ text:"Their",correct:true }]
    },
    {
      context:  "Daniel's sister is not single.",
      sentence: "___ sister is married.",
      options:  [{ text:"His",correct:true },{ text:"Her",correct:false }]
    },
    {
      context:  "Laura's neighbors are not quiet.",
      sentence: "___ neighbors are noisy.",
      options:  [{ text:"Their",correct:false },{ text:"Her",correct:true }]
    },
    {
      context:  "Their dog's name is not Rover.",
      sentence: "___ name is Fido.",
      options:  [{ text:"Its",correct:true },{ text:"Their",correct:false }]
    },
    {
      context:  "Isabella's car is not large.",
      sentence: "___ car is small.",
      options:  [{ text:"His",correct:false },{ text:"Her",correct:true }]
    },
    {
      context:  "Leo's bicycle is not new.",
      sentence: "___ bicycle is old.",
      options:  [{ text:"His",correct:true },{ text:"Its",correct:false }]
    },
    {
      context:  "Noah and Mia's son is not single.",
      sentence: "___ son is married.",
      options:  [{ text:"Her",correct:false },{ text:"Their",correct:true }]
    }
  ];

  const TOTAL = QUESTIONS.length;
  let correctTotal  = 0;
  let wrongTotal    = 0;
  let answeredCount = 0;

  const questionArea = document.getElementById("questionArea");
  const counterEl    = document.getElementById("counter");
  const barEl        = document.getElementById("progressBar");
  const mainCard     = document.getElementById("mainCard");
  const endScreen    = document.getElementById("endScreen");
  const sigBtn       = document.getElementById("sigBtn");
  const scoreNum     = document.getElementById("scoreNum");
  const scoreMsg     = document.getElementById("scoreMsg");
  const redoBtn      = document.getElementById("redoBtn");
  const correctDisp  = document.getElementById("correctCount");
  const wrongDisp    = document.getElementById("wrongCount");

  function updateCounter() {
    counterEl.textContent = `${answeredCount} / ${TOTAL}`;
    barEl.style.width = (answeredCount / TOTAL * 100) + "%";
  }

  function updateScoreDisplay() {
    correctDisp.textContent = correctTotal;
    wrongDisp.textContent   = wrongTotal;
  }

  function renderAll() {
    questionArea.innerHTML = "";
    correctTotal  = 0;
    wrongTotal    = 0;
    answeredCount = 0;
    updateCounter();
    updateScoreDisplay();
    sigBtn.classList.remove("visible");

    QUESTIONS.forEach((q, qi) => {
      const block = document.createElement("div");
      block.className = "q-block";

      const ctxEl = document.createElement("p");
      ctxEl.className = "q-context";
      ctxEl.textContent = q.context;

      const sentEl = document.createElement("p");
      sentEl.className = "q-sentence";
      sentEl.textContent = q.sentence;

      const optRow = document.createElement("div");
      optRow.className = "options-row";

      let wrongThisQ = 0;

      q.options.forEach(opt => {
        const btn = document.createElement("button");
        btn.className = "opt-btn";
        btn.textContent = opt.text;

        const handleTap = (e) => {
          e.preventDefault();
          if (btn.disabled) return;

          if (opt.correct) {
            optRow.querySelectorAll(".opt-btn").forEach(b => b.disabled = true);
            btn.classList.add("correct");
            sentEl.textContent = q.sentence.replace("___", opt.text);
            correctTotal++;
            updateScoreDisplay();
            playSfx(SFX_OK);
            answeredCount++;
            updateCounter();
            if (answeredCount === TOTAL) sigBtn.classList.add("visible");
          } else {
            wrongThisQ++;
            wrongTotal++;
            updateScoreDisplay();
            btn.classList.add("wrong");
            btn.disabled = true;
            playSfx(SFX_BAD);

            if (wrongThisQ >= MAX_WRONG_PER_Q) {
              optRow.querySelectorAll(".opt-btn").forEach(b => {
                b.disabled = true;
                const isCorrect = q.options.find(o => o.text === b.textContent && o.correct);
                if (isCorrect && !b.classList.contains("wrong")) {
                  b.classList.add("revealed");
                  sentEl.textContent = q.sentence.replace("___", b.textContent);
                }
              });
              answeredCount++;
              updateCounter();
              if (answeredCount === TOTAL) sigBtn.classList.add("visible");
            }
          }
        };

        btn.addEventListener("click",    handleTap);
        btn.addEventListener("touchend", handleTap, { passive: false });
        optRow.appendChild(btn);
      });

      block.appendChild(ctxEl);
      block.appendChild(sentEl);
      block.appendChild(optRow);
      questionArea.appendChild(block);

      // Staggered fade-in
      setTimeout(() => requestAnimationFrame(() => block.classList.add("visible")), qi * 80);
    });
  }

  const advance = (e) => {
    if (e) e.preventDefault();
    sigBtn.classList.remove("visible");
    mainCard.style.display = "none";
    endScreen.style.display = "block";
    scoreNum.textContent = `${correctTotal} / ${TOTAL}`;
    scoreMsg.textContent = correctTotal === TOTAL
      ? "¡Perfecto! ¡Todo correcto!"
      : correctTotal >= Math.ceil(TOTAL * 0.7)
        ? "¡Muy bien! Casi perfecto."
        : "¡Sigue practicando!";

    // Progress tracking
    const key = `inglesco_progress_u${UNIT}`;
    const progress = JSON.parse(localStorage.getItem(key) || "{}");
    if (!progress[`l${LESSON}`]) progress[`l${LESSON}`] = {};
    const prev = progress[`l${LESSON}`].partsCompleted || 0;
    if (PART > prev) progress[`l${LESSON}`].partsCompleted = PART;
    localStorage.setItem(key, JSON.stringify(progress));
  };

  sigBtn.addEventListener("click",    advance);
  sigBtn.addEventListener("touchend", advance, { passive: false });

  const reset = (e) => {
    if (e) e.preventDefault();
    endScreen.style.display = "none";
    mainCard.style.display  = "block";
    renderAll();
  };

  redoBtn.addEventListener("click",    reset);
  redoBtn.addEventListener("touchend", reset, { passive: false });

  renderAll();
})();
</script>
</body>
</html>
