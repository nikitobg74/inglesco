<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 5 • Lección 4 • Parte 4</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 80px;
  color:#111827;
}
.wrap{max-width:700px;margin:0 auto}

.back-btn{
  display:inline-block;margin-bottom:16px;padding:7px 14px;
  background:#2563eb;color:white;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}

.progress-container{
  display:flex;justify-content:center;gap:10px;margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

/* ── Question card ───────────────────────────────────────────────────────── */
.card{
  background:rgba(255,255,255,.88);border-radius:18px;
  padding:18px 16px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:20px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#a855f7;
  border-radius:999px;transition:width .4s;
}

/* ── Instruction ─────────────────────────────────────────────────────────── */
.instruction{
  text-align:center;font-size:14px;font-weight:700;
  color:#6b7280;margin-bottom:18px;
}

/* ── Answer area ─────────────────────────────────────────────────────────── */
.answer-area{
  min-height:52px;
  border:2.5px dashed #d1d5db;
  border-radius:14px;
  padding:10px 12px;
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;
  margin-bottom:16px;
  transition:border-color .3s, background .3s;
}
.answer-area.correct-state{
  border-color:#22c55e;background:#dcfce7;
  animation:pulse-green .4s ease;
}
.answer-area.wrong-state{
  border-color:#ef4444;background:#fee2e2;
  animation:shake .4s ease;
}
@keyframes pulse-green{
  0%{transform:scale(1)}50%{transform:scale(1.015)}100%{transform:scale(1)}
}
@keyframes shake{
  0%{transform:translateX(0)}20%{transform:translateX(-8px)}
  40%{transform:translateX(8px)}60%{transform:translateX(-6px)}
  80%{transform:translateX(6px)}100%{transform:translateX(0)}
}

/* ── Tile bank ───────────────────────────────────────────────────────────── */
.tile-bank{
  display:flex;flex-wrap:wrap;gap:8px;
  margin-bottom:20px;min-height:44px;
}

/* ── Tiles ───────────────────────────────────────────────────────────────── */
.tile{
  background:#0d9488;color:#fff;border:none;border-radius:10px;
  padding:9px 18px;font-family:'Poppins',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;
  transition:background .15s,transform .12s;user-select:none;
}
.tile:hover{background:#0f766e;transform:translateY(-2px)}
.tile:active{transform:translateY(0)}
.tile.placed{background:#2563eb}
.tile.placed:hover{background:#1d4ed8}

/* ── Feedback ────────────────────────────────────────────────────────────── */
.feedback{
  text-align:center;font-size:14px;font-weight:700;
  min-height:20px;margin-bottom:12px;
}
.feedback.ok{color:#16a34a}
.feedback.err{color:#dc2626}

/* ── Reiniciar ───────────────────────────────────────────────────────────── */
.btn-reiniciar{
  display:block;margin:0 auto;
  background:#f3f4f6;color:#374151;
  border:2px solid #d1d5db;border-radius:12px;
  padding:9px 26px;font-family:'Poppins',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;
  transition:background .18s,border-color .18s;
}
.btn-reiniciar:hover{background:#e5e7eb;border-color:#9ca3af}

/* ── End screen ──────────────────────────────────────────────────────────── */
#endScreen{
  display:none;text-align:center;
  background:rgba(255,255,255,.88);border-radius:18px;
  padding:36px 24px;margin:16px auto;max-width:700px;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.score-circle{
  width:90px;height:90px;border-radius:50%;
  background:#dbeafe;border:4px solid #2563eb;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  margin:0 auto 20px;
}
.score-num{font-size:28px;font-weight:900;color:#1e40af}
.score-label{font-size:11px;font-weight:700;color:#486581}
</style>
</head>
<body>
<div class="wrap">
  <a href="../index.html" class="back-btn">← Unidad 5</a>
  <div class="top-title">Unidad 5 • Lección 4 • Parte 4</div>
  <div class="subline">Ordena las palabras</div>

  <div class="progress-container">
    <a class="step" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step active" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- Question card -->
  <div class="card" id="mainCard">
    <div class="counter-row"><span id="counter">1 / 8</span></div>
    <div class="bar-wrap"><div class="bar-fill" id="progressBar"></div></div>
    <div class="instruction">Ordena las palabras para formar una pregunta correcta.</div>

    <div class="answer-area" id="answerArea"></div>
    <div class="tile-bank"   id="tileBank"></div>
    <div class="feedback"    id="feedback"></div>
    <button class="btn-reiniciar" id="btnReiniciar">Reiniciar</button>
  </div>
</div>

<!-- End screen -->
<div id="endScreen" data-unit="5" data-lesson="4" data-part="4">
  <div style="font-size:52px;margin-bottom:16px">🏆</div>
  <h2 style="font-size:24px;font-weight:900;color:#1e40af;margin-bottom:16px">¡Muy buen trabajo!</h2>
  <div class="score-circle">
    <span class="score-num" id="scoreNum">0</span>
    <span class="score-label">correctas</span>
  </div>
  <p style="font-size:15px;font-weight:600;color:#374151;margin-bottom:6px" id="scoreMsg"></p>
  <p style="font-size:13px;color:#64748b;margin-bottom:28px">Completaste la Parte 4.</p>
  <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
    <button id="redoBtn" style="padding:12px 28px;background:#0d9488;color:white;border:none;border-radius:12px;font-family:'Poppins',sans-serif;font-weight:700;font-size:15px;cursor:pointer">
      Reintentar
    </button>
    <a href="p5.html" style="display:inline-block;padding:12px 28px;background:#2563eb;color:white;border-radius:12px;text-decoration:none;font-weight:700;font-size:15px">
      Continuar → Parte 5
    </a>
  </div>
</div>

<script>
(() => {
  const UNIT   = 5;
  const LESSON = 4;
  const PART   = 4;

  // words: tiles shown to student (shuffled each load)
  // answer: correct order, all lowercase for comparison
  const QUESTIONS = [
    { words: ["Are",  "you",     "busy?"],                answer: "are you busy?"              },
    { words: ["Is",   "your",    "dog",    "big?"],       answer: "is your dog big?"           },
    { words: ["Are",  "they",    "married?"],              answer: "are they married?"          },
    { words: ["Are",  "you",     "single?"],               answer: "are you single?"            },
    { words: ["Is",   "English", "difficult?"],            answer: "is english difficult?"      },
    { words: ["Is",   "your",    "car",    "new?"],       answer: "is your car new?"           },
    { words: ["Is",   "Maria",   "tall",   "or", "short?"], answer: "is maria tall or short?" },
    { words: ["Is",   "David",   "quiet",  "or", "noisy?"], answer: "is david quiet or noisy?" },
  ];

  const TOTAL = QUESTIONS.length;
  let current      = 0;
  let correctCount = 0;
  let placed       = [];   // [{word, uid}]
  let bank         = [];   // [{word, uid}]
  let locked       = false;

  const answerArea = document.getElementById("answerArea");
  const tileBank   = document.getElementById("tileBank");
  const feedback   = document.getElementById("feedback");
  const counterEl  = document.getElementById("counter");
  const barEl      = document.getElementById("progressBar");
  const mainCard   = document.getElementById("mainCard");
  const endScreen  = document.getElementById("endScreen");
  const scoreNum   = document.getElementById("scoreNum");
  const scoreMsg   = document.getElementById("scoreMsg");
  const redoBtn    = document.getElementById("redoBtn");

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function uid() { return Math.random().toString(36).slice(2); }

  function updateBar() {
    counterEl.textContent = `${current + 1} / ${TOTAL}`;
    barEl.style.width     = ((current + 1) / TOTAL * 100) + "%";
  }

  function clearStates() {
    answerArea.classList.remove("correct-state", "wrong-state");
  }

  function renderAnswer() {
    answerArea.innerHTML = "";
    placed.forEach((item, idx) => {
      const btn = document.createElement("button");
      btn.className   = "tile placed";
      btn.textContent = item.word;
      btn.onclick     = () => { if (!locked) returnToBank(idx); };
      answerArea.appendChild(btn);
    });
  }

  function renderBank() {
    tileBank.innerHTML = "";
    bank.forEach(item => {
      const btn = document.createElement("button");
      btn.className   = "tile";
      btn.textContent = item.word;
      btn.onclick     = () => { if (!locked) placeWord(item.uid); };
      tileBank.appendChild(btn);
    });
  }

  function placeWord(id) {
    const idx = bank.findIndex(b => b.uid === id);
    if (idx === -1) return;
    placed.push(bank[idx]);
    bank.splice(idx, 1);
    feedback.textContent = "";
    feedback.className   = "feedback";
    clearStates();
    renderAnswer();
    renderBank();
    if (bank.length === 0) checkAnswer();
  }

  function returnToBank(idx) {
    bank.push(placed[idx]);
    placed.splice(idx, 1);
    feedback.textContent = "";
    feedback.className   = "feedback";
    clearStates();
    renderAnswer();
    renderBank();
  }

  function checkAnswer() {
    const student = placed.map(t => t.word.toLowerCase()).join(" ");
    const correct = QUESTIONS[current].answer;

    if (student === correct) {
      locked = true;
      answerArea.classList.add("correct-state");
      feedback.textContent = "✓ ¡Correcto!";
      feedback.className   = "feedback ok";
      correctCount++;
      setTimeout(() => {
        current++;
        if (current >= TOTAL) { showEndScreen(); } else { loadQuestion(); }
      }, 2000);
    } else {
      answerArea.classList.add("wrong-state");
      feedback.textContent = "✗ Inténtalo de nuevo.";
      feedback.className   = "feedback err";
      setTimeout(() => answerArea.classList.remove("wrong-state"), 450);
    }
  }

  function loadQuestion() {
    locked = false;
    placed = [];
    bank   = shuffle(QUESTIONS[current].words).map(w => ({ word: w, uid: uid() }));
    feedback.textContent = "";
    feedback.className   = "feedback";
    clearStates();
    updateBar();
    renderAnswer();
    renderBank();
  }

  function showEndScreen() {
    mainCard.style.display  = "none";
    endScreen.style.display = "block";
    scoreNum.textContent    = `${correctCount} / ${TOTAL}`;
    if (correctCount === TOTAL) {
      scoreMsg.textContent = "¡Perfecto! ¡Todo correcto!";
    } else if (correctCount >= Math.ceil(TOTAL * 0.7)) {
      scoreMsg.textContent = "¡Muy bien! Casi perfecto.";
    } else {
      scoreMsg.textContent = "¡Sigue practicando!";
    }
  }

  document.getElementById("btnReiniciar").addEventListener("click", () => {
    if (locked) return;
    loadQuestion();
  });

  redoBtn.addEventListener("click", () => {
    correctCount = 0;
    current      = 0;
    endScreen.style.display = "none";
    mainCard.style.display  = "block";
    loadQuestion();
  });

  loadQuestion();
})();
</script>
</body>
</html>
