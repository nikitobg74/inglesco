<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Unidad 6 • Lección 2 • Parte 2</title>
<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg" />
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet" />

<script>
  window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
</script>
<script defer src="/_vercel/insights/script.js"></script>
<script>
  if (window.va) {
    window.va('track', 'U6 L2 P2 Started');
  }
</script>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Poppins',sans-serif}
body{
  background:linear-gradient(135deg,#dbeafe,#fef9c3);
  min-height:100vh;
  padding:16px 12px 80px;
  color:#111827;
}
.wrap{max-width:700px;margin:0 auto}

.back-btn{
  display:inline-block;margin-bottom:16px;padding:7px 14px;
  background:#2563eb;color:white;border-radius:10px;
  text-decoration:none;font-weight:700;font-size:14px;
}
.top-title{text-align:center;font-size:18px;font-weight:900;margin-bottom:4px}
.subline{text-align:center;font-size:14px;font-weight:700;margin-bottom:16px;color:#374151}

.progress-container{
  display:flex;justify-content:center;gap:10px;margin:12px 0 20px 0;
}
.step{
  width:38px;height:38px;border-radius:50%;background:#d1d5db;
  display:flex;align-items:center;justify-content:center;
  font-weight:600;text-decoration:none;color:#1f2933;transition:.3s;font-size:15px;
}
.step.active{background:#2563eb;color:#fff}

.card{
  background:rgba(255,255,255,.88);border-radius:18px;
  padding:20px 18px;box-shadow:0 8px 20px rgba(0,0,0,.08);
}
.counter-row{
  display:flex;justify-content:space-between;
  margin-bottom:8px;font-size:13px;font-weight:700;color:#486581;
}
.bar-wrap{
  background:#e2e8f0;border-radius:999px;height:7px;
  margin-bottom:20px;overflow:hidden;
}
.bar-fill{
  height:100%;width:0%;background:#a855f7;
  border-radius:999px;transition:width .5s;
}

.img-wrap{
  width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;
  background:#e2e8f0;display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;
}
.img-wrap img{width:100%;height:100%;object-fit:contain;display:block}

.dialogue-box{
  background:#f8fafc;border-radius:14px;
  padding:14px 16px;margin-bottom:18px;
  display:flex;flex-direction:column;gap:8px;
}
.dial-line{
  font-size:14px;font-weight:600;color:#374151;
  padding-left:10px;line-height:1.6;
  border-left:3px solid #e2e8f0;
}

.q-label{
  font-size:12px;font-weight:700;color:#a855f7;
  text-transform:uppercase;letter-spacing:.07em;
  margin-bottom:6px;
}
.question-text{
  font-size:16px;font-weight:900;color:#1e40af;
  margin-bottom:14px;line-height:1.4;
}
.choices-wrap{
  display:flex;flex-direction:column;gap:10px;
  margin-bottom:14px;
}
.choice-btn{
  width:100%;padding:13px 16px;
  background:#0d9488;color:white;border:none;border-radius:14px;
  font-weight:700;font-size:14px;
  cursor:pointer;text-align:left;
}
.choice-btn:hover:not(:disabled){background:#0f766e}
.choice-btn.correct {background:#16a34a}
.choice-btn.wrong   {background:#dc2626}
.choice-btn:disabled{opacity:.85;cursor:not-allowed}

.feedback{
  font-size:13px;font-weight:700;text-align:center;
  min-height:20px;margin-bottom:10px;
  opacity:0;transition:opacity .3s;
}
.feedback.show{opacity:1}
.feedback.ok  {color:#16a34a}
.feedback.err {color:#dc2626}

.next-btn{
  display:block;width:100%;padding:13px;
  background:#2563eb;color:white;border:none;border-radius:14px;
  font-weight:900;font-size:15px;
  cursor:pointer;
  opacity:0;pointer-events:none;
}
.next-btn.show{opacity:1;pointer-events:auto}
.next-btn:hover{background:#1d4ed8}

#endScreen{
  display:none;text-align:center;
  background:rgba(255,255,255,.88);border-radius:18px;
  padding:36px 24px;margin:0 auto;
  box-shadow:0 8px 20px rgba(0,0,0,.08);
}
#endScreen h2{
  font-size:24px;font-weight:900;color:#1e40af;margin-bottom:16px;
}
#endScreen a{
  display:inline-block;
  padding:12px 28px;
  background:#2563eb;
  color:white;
  border-radius:12px;
  text-decoration:none;
  font-weight:700;
  font-size:15px;
}
</style>
</head>

<body>
<div class="wrap">

<a href="../index.html" class="back-btn">← Unidad 6</a>
<div class="top-title">Unidad 6 • Lección 2 • Parte 2</div>
<div class="subline">Lee y responde</div>

<div class="progress-container">
  <a class="step" href="p1.html">1</a>
  <a class="step active" href="p2.html">2</a>
  <a class="step" href="p3.html">3</a>
  <a class="step" href="p4.html">4</a>
  <a class="step" href="p5.html">5</a>
</div>

<div class="card" id="mainCard">

  <div class="counter-row">
    <span id="counter"></span>
    <span id="qCounter"></span>
  </div>

  <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>

  <div class="img-wrap">
    <img id="slideImg" src="" alt="Diálogo">
  </div>

  <div class="dialogue-box" id="dialogueBox"></div>

  <div class="q-label">🧠 Responde</div>
  <div class="question-text" id="questionText"></div>

  <div class="choices-wrap" id="choicesWrap"></div>

  <div class="feedback" id="feedback"></div>

  <button class="next-btn" id="nextBtn"></button>

</div>
</div>

<div id="endScreen">
  <h2>¡Muy bien!</h2>
  <a href="p3.html">Continuar → Parte 3</a>
</div>

<script>
(() => {

const IMG = 'https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/images/u6/';
const SFX = 'https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/audio/u6/';

// Preload SFX
const sfxCorrect = new Audio(SFX + 'correct.wav');
const sfxIncorrect = new Audio(SFX + 'incorrect.wav');
sfxCorrect.load();
sfxIncorrect.load();

function playSfx(isCorrect) {
  const sfx = isCorrect ? sfxCorrect : sfxIncorrect;
  sfx.currentTime = 0;
  sfx.play().catch(() => {});
}

const SCENES = [
{
  img: 'u6.rain.beach.jpg',
  lines: [
    { sp:'A', text:'Hi Greg, this is Carl.' },
    { sp:'A', text:'I am calling from Sunny Beach.' },
    { sp:'A', text:'I am on vacation.' },
    { sp:'B', text:'Is it hot?' },
    { sp:'A', text:'No, it is cold.' },
    { sp:'A', text:'It is raining.' }
  ],
  questions: [
    {
      text:'Is Carl on vacation?',
      choices:[
        {text:'Yes.',correct:true},
        {text:'No.',correct:false}
      ]
    },
    {
      text:'Is it hot?',
      choices:[
        {text:'Yes.',correct:false},
        {text:'No.',correct:true}
      ]
    },
    {
      text:'Is it raining?',
      choices:[
        {text:'Yes.',correct:true},
        {text:'No.',correct:false}
      ]
    }
  ]
},
{
  img: 'u6.ski.resort.jpg',
  lines: [
    { sp:'A', text:'Hi Mark, this is Kate.' },
    { sp:'A', text:'I am calling from the Alps.' },
    { sp:'A', text:'I am on vacation.' },
    { sp:'B', text:'Is it cold?' },
    { sp:'A', text:'No, it is warm.' },
    { sp:'B', text:'Are you skiing?' },
    { sp:'A', text:'No, I am not skiing.' }
  ],
  questions: [
    {
      text:'Is Kate on vacation?',
      choices:[
        {text:'Yes.',correct:true},
        {text:'No.',correct:false}
      ]
    },
    {
      text:'Is it cold?',
      choices:[
        {text:'Yes.',correct:false},
        {text:'No.',correct:true}
      ]
    },
    {
      text:'Is Kate skiing?',
      choices:[
        {text:'Yes.',correct:false},
        {text:'No.',correct:true}
      ]
    }
  ]
}
];

let scene = 0;
let q = 0;
let total = SCENES.reduce((a, s) => a + s.questions.length, 0);
let count = 0;

const img = document.getElementById('slideImg');
const box = document.getElementById('dialogueBox');
const qText = document.getElementById('questionText');
const wrap = document.getElementById('choicesWrap');
const fb = document.getElementById('feedback');
const next = document.getElementById('nextBtn');
const bar = document.getElementById('bar');
const counter = document.getElementById('counter');
const qCounter = document.getElementById('qCounter');

function load() {
  const s = SCENES[scene];
  counter.textContent = `Diálogo ${scene + 1}/${SCENES.length}`;
  img.src = IMG + s.img;
  img.alt = `Diálogo ${scene + 1}`;

  box.innerHTML = '';
  s.lines.forEach(l => {
    let d = document.createElement('div');
    d.className = 'dial-line';
    d.textContent = l.sp + ': ' + l.text;
    box.appendChild(d);
  });

  const current = s.questions[q];
  qText.textContent = current.text;
  qCounter.textContent = `Pregunta ${q + 1}/${s.questions.length}`;

  wrap.innerHTML = '';
  current.choices.forEach(c => {
    let b = document.createElement('button');
    b.className = 'choice-btn';
    b.textContent = c.text;
    b.onclick = () => answer(c.correct);
    wrap.appendChild(b);
  });

  fb.textContent = '';
  fb.className = 'feedback';
  next.classList.remove('show');

  bar.style.width = (count / total * 100) + '%';
}

function answer(correct) {
  playSfx(correct);

  const currentChoices = SCENES[scene].questions[q].choices;
  [...wrap.children].forEach((b, i) => {
    b.disabled = true;
    if (currentChoices[i].correct) b.classList.add('correct');
    else b.classList.add('wrong');
  });

  fb.textContent = correct ? '✓ ¡Correcto!' : '✗ Incorrecto';
  fb.className = 'feedback show ' + (correct ? 'ok' : 'err');

  count++;
  bar.style.width = (count / total * 100) + '%';

  next.classList.add('show');
  next.textContent = 'Siguiente →';
  next.onclick = () => {
    q++;
    if (q >= SCENES[scene].questions.length) {
      scene++;
      q = 0;
    }

    if (scene >= SCENES.length) {
      if (window.va) {
        window.va('track', 'U6 L2 P2 Finished');
      }
      document.getElementById('mainCard').style.display = 'none';
      document.getElementById('endScreen').style.display = 'block';
    } else {
      load();
    }
  };
}

load();

})();
</script>
</body>
</html>
