<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unidad 6 • Lección 5 • Parte 1 singular - plural | Inglesco</title>

<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

body {
  background: linear-gradient(135deg, #dbeafe, #fef9c3);
  min-height: 100vh;
  padding: 16px 12px 80px;
  color: #111827;
}

.wrap { max-width: 700px; margin: 0 auto; }

.back-btn {
  display: inline-block; margin-bottom: 16px; padding: 7px 14px;
  background: #2563eb; color: white; border-radius: 10px;
  text-decoration: none; font-weight: 700; font-size: 14px;
}

.top-title { text-align: center; font-size: 18px; font-weight: 900; margin-bottom: 4px; }
.subline { text-align: center; font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #374151; }

.progress-container {
  display: flex; justify-content: center; gap: 10px; margin: 12px 0 20px;
}
.step {
  width: 38px; height: 38px; border-radius: 50%; background: #d1d5db;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 15px; text-decoration: none;
  color: #1f2933;
}
.step.active { background: #2563eb; color: #fff; }

/* VOCAB TABLE */
.vocab-card {
  background: rgba(255,255,255,.88);
  border-radius: 18px;
  padding: 20px 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
  margin-bottom: 16px;
}

.vocab-card h2 {
  font-size: 15px;
  font-weight: 900;
  margin-bottom: 12px;
  color: #1e3a5f;
}

.vocab-section-label {
  font-size: 12px;
  font-weight: 700;
  color: #6b7280;
  text-transform: uppercase;
  letter-spacing: .04em;
  margin-bottom: 6px;
  margin-top: 14px;
}
.vocab-section-label:first-of-type { margin-top: 0; }

.vocab-table {
  width: 100%;
  border-collapse: collapse;
}
.vocab-table td {
  padding: 7px 10px;
  font-size: 14px;
  font-weight: 600;
  border-bottom: 1px solid #e2e8f0;
}
.vocab-table tr:last-child td { border-bottom: none; }
.vocab-table td:first-child { color: #374151; }
.vocab-table td:nth-child(2) { color: #6b7280; font-size: 13px; text-align: center; }
.vocab-table td:nth-child(3) { color: #2563eb; font-weight: 800; }
.vocab-table td:last-child { color: #9ca3af; font-size: 12px; font-weight: 600; font-style: italic; padding-left: 14px; }

/* EXERCISE CARD */
.card {
  background: rgba(255,255,255,.88);
  border-radius: 18px;
  padding: 20px 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
}

.counter-row {
  display: flex; justify-content: space-between;
  margin-bottom: 8px;
  font-size: 13px; font-weight: 700; color: #486581;
}

.bar-wrap { background: #e2e8f0; border-radius: 999px; height: 7px; margin-bottom: 18px; }
.bar-fill { height: 100%; width: 0%; background: #a855f7; border-radius: 999px; transition: width .3s; }

.img-wrap {
  width: 100%; aspect-ratio: 16/9;
  border-radius: 14px; overflow: hidden;
  background: #e2e8f0;
  margin-bottom: 18px;
}
.img-wrap img { width: 100%; height: 100%; object-fit: contain; }

/* PHASE LABEL */
.phase-label {
  text-align: center;
  font-size: 12px;
  font-weight: 700;
  color: #9333ea;
  letter-spacing: .05em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* LISTEN BLOCK */
.listen-box {
  background: #f8fafc;
  border-radius: 14px;
  padding: 18px;
  text-align: center;
  margin-bottom: 12px;
}

.word-label {
  font-size: 22px;
  font-weight: 900;
  color: #1e3a5f;
  margin-bottom: 14px;
}

.listen-btn {
  padding: 14px 24px;
  border-radius: 12px;
  border: none;
  background: #2563eb;
  color: white;
  font-weight: 900;
  font-size: 15px;
  cursor: pointer;
  transition: opacity .2s;
}
.listen-btn:disabled { opacity: .6; cursor: default; }

/* TILES */
.tiles-box {
  background: #f8fafc;
  border-radius: 14px;
  padding: 18px;
  text-align: center;
  margin-bottom: 12px;
}

.tiles-instruction {
  font-size: 13px;
  font-weight: 700;
  color: #6b7280;
  margin-bottom: 12px;
}

.tiles-wrap {
  display: flex;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
}

.tile {
  padding: 14px 24px;
  border-radius: 12px;
  border: 2px solid #e2e8f0;
  background: white;
  font-size: 16px;
  font-weight: 800;
  cursor: pointer;
  transition: transform .1s;
}
.tile:active { transform: scale(.96); }
.tile.correct { background: #dcfce7; border-color: #22c55e; color: #15803d; }
.tile.wrong   { background: #fee2e2; border-color: #ef4444; color: #dc2626; }

/* NEXT BUTTON */
.next-btn {
  width: 100%;
  padding: 13px;
  background: #2563eb;
  color: white;
  border: none;
  border-radius: 14px;
  font-weight: 900;
  font-size: 15px;
  margin-top: 10px;
  opacity: 0;
  pointer-events: none;
  cursor: pointer;
  transition: opacity .2s;
}
.next-btn.show { opacity: 1; pointer-events: auto; }

/* END SCREEN */
.end-screen {
  text-align: center;
  padding: 30px 10px;
}
.end-screen h2 { font-size: 22px; font-weight: 900; margin-bottom: 8px; }
.end-screen p  { font-size: 14px; color: #374151; }
</style>
</head>

<body>

<div class="wrap">

  <a href="../index.html" class="back-btn">← Unidad 6</a>

  <div class="top-title">Unidad 6 • Lección 5 • Parte 1</div>
  <div class="subline">Singular y plural</div>

  <div class="progress-container">
    <a class="step active" href="p1.html">1</a>
    <a class="step" href="p2.html">2</a>
    <a class="step" href="p3.html">3</a>
    <a class="step" href="p4.html">4</a>
    <a class="step" href="p5.html">5</a>
  </div>

  <!-- VOCAB TABLE -->
  <div class="vocab-card">
    <h2>📚 Vocabulario: Singular → Plural</h2>

    <div class="vocab-section-label">Regular + S</div>
    <table class="vocab-table">
      <tr><td>boy</td><td>→</td><td>boys</td><td>niño → niños</td></tr>
      <tr><td>girl</td><td>→</td><td>girls</td><td>niña → niñas</td></tr>
    </table>

    <div class="vocab-section-label">Formas irregulares</div>
    <table class="vocab-table">
      <tr><td>man</td><td>→</td><td>men</td><td>hombre → hombres</td></tr>
      <tr><td>woman</td><td>→</td><td>women</td><td>mujer → mujeres</td></tr>
      <tr><td>child</td><td>→</td><td>children</td><td>niño/a → niños/as</td></tr>
    </table>
  </div>

  <!-- EXERCISE CARD -->
  <div class="card">

    <div class="counter-row">
      <span id="counter">1 / 4</span>
      <span id="pct">0%</span>
    </div>

    <div class="bar-wrap"><div class="bar-fill" id="bar"></div></div>

    <div class="img-wrap">
      <img id="img" alt="">
    </div>

    <div id="content"></div>

    <button id="nextBtn" class="next-btn">Siguiente →</button>

  </div>
</div>

<script>
(() => {

const BASE  = 'https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/';
const IMG   = BASE + 'images/u6/';
const AUDIO = BASE + 'audio/u6/';

const sfxCorrect   = new Audio(AUDIO + 'correct.wav');
const sfxIncorrect = new Audio(AUDIO + 'incorrect.wav');

function playSfx(isCorrect){
  const sfx = isCorrect ? sfxCorrect : sfxIncorrect;
  sfx.currentTime = 0;
  sfx.play().catch(()=>{});
}

// Pairs: each item knows its partner index for the quiz tiles
const ITEMS = [
  { img: 'u6.one.boy.jpg',   audio: 'u6.one.boy.mp3',   label: 'one boy',   pairIndex: 1 },
  { img: 'u6.two.boys.jpg',  audio: 'u6.two.boys.mp3',  label: 'two boys',  pairIndex: 0 },
  { img: 'u6.one.girl.jpg',  audio: 'u6.one.girl.mp3',  label: 'one girl',  pairIndex: 3 },
  { img: 'u6.two.girls.jpg', audio: 'u6.two.girls.mp3', label: 'two girls', pairIndex: 2 }
];

// Phase 1 order: 0,1,2,3 (introduce all four)
// Phase 2 order: same items, quiz with pair tiles
const TOTAL = ITEMS.length;

let phase = 1;   // 1 = introduce, 2 = quiz
let i = 0;       // current item index within the phase

const imgEl   = document.getElementById('img');
const content = document.getElementById('content');
const nextBtn = document.getElementById('nextBtn');

function updateProgress(){
  const step  = phase === 1 ? i : TOTAL + i;
  const total = TOTAL * 2;
  document.getElementById('counter').textContent = `${step + 1} / ${total}`;
  document.getElementById('pct').textContent = Math.round((step / total) * 100) + '%';
  document.getElementById('bar').style.width = (step / total) * 100 + '%';
}

function load(){
  nextBtn.classList.remove('show');
  content.innerHTML = '';

  const item = ITEMS[i];
  imgEl.src = IMG + item.img;
  updateProgress();

  if(phase === 1){
    showIntroduce(item);
  } else {
    showQuiz(item);
  }
}

/* ── PHASE 1: tap to listen ── */
function showIntroduce(item){
  content.innerHTML = '';

  const lbl = document.createElement('div');
  lbl.className = 'phase-label';
  lbl.textContent = 'Escucha el vocabulario';
  content.appendChild(lbl);

  const box = document.createElement('div');
  box.className = 'listen-box';

  const word = document.createElement('div');
  word.className = 'word-label';
  word.textContent = item.label;
  box.appendChild(word);

  const btn = document.createElement('button');
  btn.className = 'listen-btn';
  btn.textContent = '🔊 Toca para escuchar';

  btn.onclick = () => {
    const audio = new Audio(AUDIO + item.audio);
    btn.disabled = true;
    btn.textContent = '🔊 Reproduciendo...';
    audio.play().catch(()=>{});
    audio.onended = () => {
      btn.textContent = '🔊 Escuchar de nuevo';
      btn.disabled = false;
      btn.onclick = () => {
        const a2 = new Audio(AUDIO + item.audio);
        a2.play().catch(()=>{});
      };
      nextBtn.classList.add('show');
    };
  };

  box.appendChild(btn);
  content.appendChild(box);
}

/* ── PHASE 2: word tile quiz ── */
function showQuiz(item){
  content.innerHTML = '';

  const lbl = document.createElement('div');
  lbl.className = 'phase-label';
  lbl.textContent = 'Selecciona la respuesta correcta';
  content.appendChild(lbl);

  const box = document.createElement('div');
  box.className = 'tiles-box';

  const instr = document.createElement('div');
  instr.className = 'tiles-instruction';
  instr.textContent = '¿Qué ves en la imagen?';
  box.appendChild(instr);

  const wrap = document.createElement('div');
  wrap.className = 'tiles-wrap';

  // The two tiles are this item and its pair
  const pair = ITEMS[item.pairIndex];
  const options = shuffle([item.label, pair.label]);

  options.forEach(opt => {
    const b = document.createElement('button');
    b.className = 'tile';
    b.textContent = opt;

    b.onclick = () => {
      if(opt === item.label){
        b.classList.add('correct');
        playSfx(true);
        // Play the vocabulary audio for this item
        const audio = new Audio(AUDIO + item.audio);
        audio.play().catch(()=>{});
        wrap.querySelectorAll('button').forEach(x => x.disabled = true);
        // Auto-advance after 2 seconds
        setTimeout(() => advance(), 2000);
      } else {
        b.classList.add('wrong');
        playSfx(false);
        wrap.querySelectorAll('button').forEach(x => x.disabled = true);
        // Reveal correct
        wrap.querySelectorAll('button').forEach(x => {
          if(x.textContent === item.label) x.classList.add('correct');
        });
        setTimeout(() => advance(), 2000);
      }
    };

    wrap.appendChild(b);
  });

  box.appendChild(wrap);
  content.appendChild(box);
}

function advance(){
  i++;
  if(i < TOTAL){
    load();
  } else {
    showEnd();
  }
}

function showEnd(){
  nextBtn.classList.remove('show');
  document.getElementById('bar').style.width = '100%';
  document.getElementById('counter').textContent = `${TOTAL * 2} / ${TOTAL * 2}`;
  document.getElementById('pct').textContent = '100%';
  document.querySelector('.card').innerHTML =
    `<div class="end-screen">
       <h2>¡Completado! 🎉</h2>
       <p>Has terminado la Parte 1.</p>
     </div>`;
}

function shuffle(arr){
  for(let k = arr.length - 1; k > 0; k--){
    const j = Math.floor(Math.random() * (k + 1));
    [arr[k], arr[j]] = [arr[j], arr[k]];
  }
  return arr;
}

/* ── NEXT BUTTON (Phase 1 only) ── */
nextBtn.onclick = () => {
  if(phase === 1){
    i++;
    if(i < TOTAL){
      load();
    } else {
      // Switch to Phase 2
      phase = 2;
      i = 0;
      load();
    }
  }
};

load();

})();
</script>

</body>
</html>
