<script>
const UNIT   = 7;
const LESSON = 1;
const PART   = 3;
const FURTHEST_KEY = `inglesco_furthest_u${UNIT}_l${LESSON}`;
const PROGRESS_KEY = `inglesco_progress_u${UNIT}`;

const BASE    = 'https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/';
const IMG     = BASE + 'images/u7/';
const SFX_OK  = BASE + 'audio/u2/correct.wav';
const SFX_ERR = BASE + 'audio/u2/incorrect.wav';

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../../../../sw.js').catch(() => {});
}

document.querySelectorAll('.dot').forEach(dot => {
  dot.addEventListener('click', () => {
    const page = dot.dataset.page;
    if (page) window.location.href = page;
  });
});

function getFurthest() { return parseInt(localStorage.getItem(FURTHEST_KEY) || '1', 10); }
function updateFurthest(n) { if (n > getFurthest()) localStorage.setItem(FURTHEST_KEY, String(n)); }
function saveProgress() {
  try {
    const lp = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
    const lKey = `l${LESSON}`;
    if (!lp[lKey]) lp[lKey] = { partsTotal: 5, partsCompleted: 0 };
    if (lp[lKey].partsCompleted < PART) lp[lKey].partsCompleted = PART;
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(lp));
  } catch (_) {}
}
updateFurthest(PART);

/* ── SLIDES ── */
const SLIDES = [
  {
    img:      'u7.kitchen.model.jpg',
    restText: 'a table.',
    restQ:    'a table?',
    tiles:    ['Is', 'there', 'a table?'],
    answer:   ['Is', 'there', 'a table?']
  },
  {
    img:      'u7.kitchen.stove.jpg',
    restText: 'a stove.',
    restQ:    'a stove?',
    tiles:    ['a stove?', 'Is', 'there'],
    answer:   ['Is', 'there', 'a stove?']
  },
  {
    img:      'u7.fridge.jpg',
    restText: 'a fridge.',
    restQ:    'a fridge?',
    tiles:    ['there', 'a fridge?', 'Is'],
    answer:   ['Is', 'there', 'a fridge?']
  }
];

const TOTAL = SLIDES.length;

let current    = 0;
let answered   = [];
let locked     = false;
let teachState = 'statement'; // 'statement' | 'animating' | 'question'
let teachSeen  = false;       // unlocks the exercise

/* ── DOM refs ── */
const slideImg   = document.getElementById('slideImg');
const wThere     = document.getElementById('wThere');
const wIs        = document.getElementById('wIs');
const wRest      = document.getElementById('wRest');
const wordStage  = document.getElementById('wordStage');
const arrowsRow  = document.getElementById('arrowsRow');
const ruleBox    = document.getElementById('ruleBox');
const teachBtn   = document.getElementById('teachBtn');
const sentLabel  = document.getElementById('sentLabel');
const exSection  = document.getElementById('exSection');
const lockHint   = document.getElementById('lockHint');
const tileZone   = document.getElementById('tileZone');
const tileBank   = document.getElementById('tileBank');
const feedbackEl = document.getElementById('feedback');
const checkBtn   = document.getElementById('checkBtn');
const nextBtn    = document.getElementById('nextBtn');
const counterEl  = document.getElementById('counter');
const pctLabelEl = document.getElementById('pctLabel');
const barEl      = document.getElementById('bar');

function playSfx(url) { try { new Audio(url).play(); } catch(_) {} }

function updateBar(idx) {
  const pct = Math.round((idx / TOTAL) * 100);
  counterEl.textContent  = `${idx + 1} / ${TOTAL}`;
  pctLabelEl.textContent = pct + '%';
  barEl.style.width      = pct + '%';
}

/* ── WORD STAGE LAYOUT ──────────────────────────────────────────
   We place words by measuring their natural widths, then
   positioning them centred together in the stage.
   All movement is a simple translateX from that baseline.
   The vertical translateY(-50%) for top:50% centering is
   kept separate so horizontal animation is clean.
──────────────────────────────────────────────────────────────── */
const GAP = 10; // px gap between words

// Measure intrinsic width of a word element (set position:fixed off-screen,
// measure, then remove — avoids affecting layout).
function measureWidth(el) {
  const clone = el.cloneNode(true);
  clone.style.cssText = 'position:fixed;top:-9999px;left:-9999px;visibility:hidden;transform:none';
  document.body.appendChild(clone);
  const w = clone.getBoundingClientRect().width;
  document.body.removeChild(clone);
  return w;
}

// Positions of each word in statement order: [There] [is] [rest]
// Returns { there: {x,w}, is: {x,w}, rest: {x,w}, totalW }
function computePositions(slide) {
  // Temporarily set correct text so measurement is accurate
  wThere.textContent = 'There';
  wIs.textContent    = 'is';
  wRest.textContent  = slide.restText;

  const wT = measureWidth(wThere);
  const wI = measureWidth(wIs);
  const wR = measureWidth(wRest);

  const totalW = wT + GAP + wI + GAP + wR;
  const stageW = wordStage.getBoundingClientRect().width;
  const startX = (stageW - totalW) / 2;

  return {
    there: { x: startX,                  w: wT },
    is:    { x: startX + wT + GAP,       w: wI },
    rest:  { x: startX + wT + GAP + wI + GAP, w: wR }
  };
}

let pos = null; // computed positions for current slide

function placeWords(slide, animate) {
  pos = computePositions(slide);

  const transition = animate
    ? 'left 0.6s cubic-bezier(0.34,1.4,0.64,1), background 0.35s, color 0.35s'
    : 'none';

  wThere.style.transition = transition;
  wIs.style.transition    = transition;
  wRest.style.transition  = transition;

  // Statement positions
  wThere.style.left = pos.there.x + 'px';
  wIs.style.left    = pos.is.x    + 'px';
  wRest.style.left  = pos.rest.x  + 'px';

  // Reset vertical centering (absolute + top:50%)
  [wThere, wIs, wRest].forEach(w => { w.style.top = '50%'; w.style.transform = 'translateY(-50%)'; });

  // Reset color classes
  wIs.classList.remove('q-state');
  wThere.classList.remove('q-state');
}

/* ── TEACH LOGIC ── */
function resetTeach(slide) {
  teachState = 'statement';
  teachSeen  = false;

  // Lock exercise
  exSection.classList.add('locked');
  lockHint.classList.remove('hidden');

  // Update rule text for this slide
  ruleBox.innerHTML =
    'En inglés, para formar una pregunta con <strong>there is</strong>, intercambia las dos palabras:<br>' +
    '<strong>There is</strong> ' + slide.restText + ' → <strong>Is there</strong> ' + slide.restQ;

  arrowsRow.classList.remove('visible');
  ruleBox.classList.remove('visible');
  sentLabel.textContent = 'Enunciado';
  teachBtn.textContent  = 'Formar pregunta →';
  teachBtn.disabled     = false;

  // Place words without animation after a tiny delay so layout is settled
  requestAnimationFrame(() => requestAnimationFrame(() => placeWords(slide, false)));
}

window.handleTeachBtn = function() {
  if (teachState === 'animating') return;
  if (teachState === 'statement') {
    toQuestion();
  } else {
    toStatement();
  }
};

function toQuestion() {
  teachState = 'animating';
  teachBtn.disabled = true;

  // Question word order: [Is] [there] [rest]
  // "Is" goes to where "There" was; "there" goes to where "is" was.
  // We also need to account for the width difference when "Is" capitalises.
  // Solution: animate to statement positions first, swap text mid-flight,
  // then the positions are already correct for the question reading order
  // because we physically swap x coordinates.

  // Destination: Is → pos.there.x,  there → pos.is.x
  // But "Is" is narrower than "There", so after swap the visual gap would be uneven.
  // We recompute positions for the question text to get even spacing.

  // Step 1 — start animation to swapped x positions (cross over)
  wIs.style.transition    = 'left 0.6s cubic-bezier(0.34,1.4,0.64,1), background 0.35s, color 0.35s';
  wThere.style.transition = 'left 0.6s cubic-bezier(0.34,1.4,0.64,1), background 0.35s, color 0.35s';

  wIs.style.left    = pos.there.x + 'px';
  wThere.style.left = pos.is.x    + 'px';
  wIs.classList.add('q-state');
  wThere.classList.add('q-state');

  // Step 2 — at midpoint, capitalise and switch rest text
  setTimeout(() => {
    wIs.textContent   = 'Is';
    wRest.textContent = SLIDES[current].restQ;
  }, 300);

  // Step 3 — after animation, recompute for even spacing in question form
  setTimeout(() => {
    // Measure "Is" (now capitalised) and reposition all three for perfect spacing
    const wI2 = measureWidth(wIs);
    const wT2 = measureWidth(wThere);
    const wR2 = measureWidth(wRest);
    const totalW2 = wI2 + GAP + wT2 + GAP + wR2;
    const stageW  = wordStage.getBoundingClientRect().width;
    const startX2 = (stageW - totalW2) / 2;

    // Snap to final positions (no transition for this micro-correction)
    wIs.style.transition    = 'background 0.2s, color 0.2s';
    wThere.style.transition = 'background 0.2s, color 0.2s';
    wRest.style.transition  = 'none';

    wIs.style.left    = startX2 + 'px';
    wThere.style.left = (startX2 + wI2 + GAP) + 'px';
    wRest.style.left  = (startX2 + wI2 + GAP + wT2 + GAP) + 'px';

    arrowsRow.classList.add('visible');

    setTimeout(() => {
      ruleBox.classList.add('visible');
      sentLabel.textContent = 'Pregunta';
      teachBtn.textContent  = '← Volver al enunciado';
      teachBtn.disabled     = false;
      teachState = 'question';

      // Unlock exercise on first run
      if (!teachSeen) {
        teachSeen = true;
        exSection.classList.remove('locked');
        lockHint.classList.add('hidden');
      }
    }, 200);

  }, 650);
}

function toStatement() {
  teachState = 'animating';
  teachBtn.disabled = true;

  arrowsRow.classList.remove('visible');
  ruleBox.classList.remove('visible');

  // Restore text first, then animate back
  wIs.textContent   = 'is';
  wRest.textContent = SLIDES[current].restText;

  requestAnimationFrame(() => requestAnimationFrame(() => {
    placeWords(SLIDES[current], true);
    wIs.classList.remove('q-state');
    wThere.classList.remove('q-state');

    setTimeout(() => {
      sentLabel.textContent = 'Enunciado';
      teachBtn.textContent  = 'Formar pregunta →';
      teachBtn.disabled     = false;
      teachState = 'statement';
    }, 650);
  }));
}

/* ── TILES ── */
function buildTiles(slide) {
  tileBank.innerHTML = '';
  tileZone.innerHTML = '';
  answered = [];
  const shuffled = [...slide.tiles].sort(() => Math.random() - 0.5);
  shuffled.forEach(text => tileBank.appendChild(makeTile(text, 'bank')));
}

function makeTile(text, location) {
  const tile = document.createElement('div');
  tile.className   = 'tile';
  tile.textContent = text;

  tile.addEventListener('click', () => {
    if (locked) return;
    if (location === 'bank') {
      tileBank.removeChild(tile);
      location = 'answer';
      tile.classList.add('in-answer');
      tileZone.appendChild(tile);
      answered.push({ text, el: tile });
    } else {
      tileZone.removeChild(tile);
      location = 'bank';
      tile.classList.remove('in-answer');
      tileBank.appendChild(tile);
      answered = answered.filter(a => a.el !== tile);
    }
    checkBtn.disabled      = answered.length === 0;
    feedbackEl.className   = 'feedback';
    feedbackEl.textContent = '';
  });

  return tile;
}

/* ── CHECK ── */
window.checkAnswer = function() {
  if (locked) return;
  const slide      = SLIDES[current];
  const userAnswer = answered.map(a => a.text);

  const correct =
    userAnswer.length === slide.answer.length &&
    slide.answer.every((w, i) => userAnswer[i].toLowerCase() === w.toLowerCase());

  if (correct) {
    locked = true;
    playSfx(SFX_OK);
    answered.forEach(a => {
      a.el.classList.remove('in-answer');
      a.el.classList.add('locked-green');
    });
    tileZone.classList.add('correct-zone');
    feedbackEl.className   = 'feedback correct';
    feedbackEl.textContent = '¡Correcto! ✓';
    checkBtn.disabled      = true;
    nextBtn.classList.add('show');
  } else {
    playSfx(SFX_ERR);
    feedbackEl.className   = 'feedback wrong';
    feedbackEl.textContent = 'Intenta de nuevo.';
    tileZone.classList.add('shake');
    setTimeout(() => tileZone.classList.remove('shake'), 400);
  }
};

/* ── LOAD SLIDE ── */
function loadSlide(idx) {
  current = idx;
  locked  = false;
  const slide = SLIDES[idx];

  slideImg.src = IMG + slide.img;
  slideImg.alt = '';

  updateBar(idx);
  resetTeach(slide);
  buildTiles(slide);

  feedbackEl.className   = 'feedback';
  feedbackEl.textContent = '';
  checkBtn.disabled      = true;
  nextBtn.classList.remove('show');
  tileZone.classList.remove('correct-zone');

  if (idx < TOTAL - 1) {
    nextBtn.textContent = 'Siguiente →';
    nextBtn.onclick     = () => loadSlide(current + 1);
  } else {
    nextBtn.textContent = 'Finalizar →';
    nextBtn.onclick     = () => showEnd();
  }
}

/* ── END ── */
function showEnd() {
  if (window.va) { window.va('track', `U${UNIT} L${LESSON} P${PART} Finished`); }
  barEl.style.width      = '100%';
  pctLabelEl.textContent = '100%';
  document.getElementById('mainCard').style.display  = 'none';
  document.getElementById('endScreen').style.display = 'block';
  document.getElementById('dot-3').className = 'dot done';
  saveProgress();
  updateFurthest(PART + 1);
}

/* ── INIT ── */
loadSlide(0);
</script>
