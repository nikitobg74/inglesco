<script>
const UNIT   = 7;
const LESSON = 1;
const PART   = 4;
const FURTHEST_KEY = `inglesco_furthest_u${UNIT}_l${LESSON}`;
const PROGRESS_KEY = `inglesco_progress_u${UNIT}`;

const BASE    = 'https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/';
const IMG     = BASE + 'images/u7/';
const SFX_OK  = BASE + 'audio/u2/correct.wav';
const SFX_ERR = BASE + 'audio/u2/incorrect.wav';

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('../../../../sw.js').catch(() => {});
}

document.querySelectorAll('.dot').forEach(dot => {
  dot.addEventListener('click', () => {
    const page = dot.dataset.page;
    if (page) window.location.href = page;
  });
});

function getFurthest() { return parseInt(localStorage.getItem(FURTHEST_KEY) || '1', 10); }
function updateFurthest(n) { if (n > getFurthest()) localStorage.setItem(FURTHEST_KEY, String(n)); }
function saveProgress() {
  try {
    const lp = JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
    const lKey = `l${LESSON}`;
    if (!lp[lKey]) lp[lKey] = { partsTotal: 5, partsCompleted: 0 };
    if (lp[lKey].partsCompleted < PART) lp[lKey].partsCompleted = PART;
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(lp));
  } catch (_) {}
}
updateFurthest(PART);

/* ── SLIDES ──────────────────────────────────────────────────────
   chips:   array of {text, blue} shown as affirmative sentence
   tiles:   shuffled word bank
   answer:  correct question order
──────────────────────────────────────────────────────────────── */
const SLIDES = [
  {
    img:    'u7.kitchen.stove.jpg',
    chips:  [
      { text: 'There', blue: true },
      { text: 'is',    blue: true },
      { text: 'a stove',        blue: false },
      { text: 'in the kitchen.', blue: false }
    ],
    restText: 'a stove in the kitchen.',
    restQ:    'a stove in the kitchen?',
    tiles:  ['There', 'is', 'a stove', 'in the kitchen?'],
    answer: ['Is', 'there', 'a stove', 'in the kitchen?']
  },
  {
    img:    'u7.fridge.jpg',
    chips:  [
      { text: 'There', blue: true },
      { text: 'is',    blue: true },
      { text: 'a fridge',        blue: false },
      { text: 'in the kitchen.', blue: false }
    ],
    restText: 'a fridge in the kitchen.',
    restQ:    'a fridge in the kitchen?',
    tiles:  ['a fridge', 'There', 'in the kitchen?', 'is'],
    answer: ['Is', 'there', 'a fridge', 'in the kitchen?']
  },
  {
    img:    'u7.living.room.jpg',
    chips:  [
      { text: 'There', blue: true },
      { text: 'is',    blue: true },
      { text: 'a table',           blue: false },
      { text: 'in the living room.', blue: false }
    ],
    restText: 'a table in the living room.',
    restQ:    'a table in the living room?',
    tiles:  ['in the living room?', 'is', 'There', 'a table'],
    answer: ['Is', 'there', 'a table', 'in the living room?']
  },
  {
    img:    'u7.living.room.jpg',
    chips:  [
      { text: 'There', blue: true },
      { text: 'is',    blue: true },
      { text: 'a TV',               blue: false },
      { text: 'in the living room.', blue: false }
    ],
    restText: 'a TV in the living room.',
    restQ:    'a TV in the living room?',
    tiles:  ['a TV', 'in the living room?', 'Is', 'there'],
    answer: ['Is', 'there', 'a TV', 'in the living room?']
  }
];

const TOTAL = SLIDES.length;

let current    = 0;
let answered   = [];
let locked     = false;
let teachState = 'statement'; // 'statement' | 'animating' | 'question'

/* ── DOM ── */
const slideImg   = document.getElementById('slideImg');
const phraseArea = document.getElementById('phraseArea');
const wordStage  = document.getElementById('wordStage');
const wThere     = document.getElementById('wThere');
const wIs        = document.getElementById('wIs');
const arrowsRow  = document.getElementById('arrowsRow');
const ruleBox    = document.getElementById('ruleBox');
const teachBtn   = document.getElementById('teachBtn');
const sentLabel  = document.getElementById('sentLabel');
const tileZone   = document.getElementById('tileZone');
const tileBank   = document.getElementById('tileBank');
const feedbackEl = document.getElementById('feedback');
const checkBtn   = document.getElementById('checkBtn');
const nextBtn    = document.getElementById('nextBtn');
const counterEl  = document.getElementById('counter');
const pctLabelEl = document.getElementById('pctLabel');
const barEl      = document.getElementById('bar');

function playSfx(url) { try { new Audio(url).play(); } catch(_) {} }

function updateBar(idx) {
  const pct = Math.round((idx / TOTAL) * 100);
  counterEl.textContent  = `${idx + 1} / ${TOTAL}`;
  pctLabelEl.textContent = pct + '%';
  barEl.style.width      = pct + '%';
}

/* ── CHIPS (affirmative sentence) ── */
function buildChips(slide) {
  phraseArea.innerHTML = '';
  slide.chips.forEach(c => {
    const chip = document.createElement('div');
    chip.className   = 'phrase-chip ' + (c.blue ? 'chip-blue' : 'chip-plain');
    chip.textContent = c.text;
    phraseArea.appendChild(chip);
  });
}

/* ── QUESTION CHIPS (shown after animation) ── */
function buildQuestionChips(slide) {
  phraseArea.innerHTML = '';
  // Question chips: [Is][there][rest...]
  const words = slide.answer;
  words.forEach((w, i) => {
    const chip = document.createElement('div');
    chip.className   = 'phrase-chip ' + (i === 0 ? 'chip-blue' : 'chip-plain');
    chip.textContent = w;
    phraseArea.appendChild(chip);
  });
}

/* ── MEASURE (off-screen clone) ── */
function measureWidth(el) {
  const clone = el.cloneNode(true);
  clone.style.cssText = 'position:fixed;top:-9999px;left:-9999px;visibility:hidden;transform:none;transition:none';
  document.body.appendChild(clone);
  const w = clone.getBoundingClientRect().width;
  document.body.removeChild(clone);
  return w;
}

const GAP = 10;
let pos = null;

/* ── TEACH LOGIC ── */
function resetTeach(slide) {
  teachState = 'statement';

  // Show phrase chips, hide animated stage
  buildChips(slide);
  phraseArea.style.display = '';
  wordStage.style.display  = 'none';

  arrowsRow.classList.remove('visible');
  ruleBox.classList.remove('visible');

  ruleBox.innerHTML =
    'En inglés, para formar una pregunta con <strong>there is</strong>, intercambia las dos palabras:<br>' +
    '<strong>There is</strong> ' + slide.restText + ' → <strong>Is there</strong> ' + slide.restQ;

  sentLabel.textContent = 'Enunciado';
  teachBtn.textContent  = 'Formar pregunta →';
  teachBtn.disabled     = false;
}

window.handleTeachBtn = function() {
  if (teachState === 'animating') return;
  if (teachState === 'statement') {
    toQuestion();
  } else {
    toStatement();
  }
};

function toQuestion() {
  teachState = 'animating';
  teachBtn.disabled = true;

  // Hide chip row, show animated word stage
  phraseArea.style.display = 'none';
  wordStage.style.display  = 'block';

  // Reset word text and colours
  wThere.textContent = 'There';
  wIs.textContent    = 'is';
  wIs.classList.remove('q-state');
  wThere.classList.remove('q-state');
  wIs.style.transition = wThere.style.transition = 'none';
  wIs.style.left = wThere.style.left = '';

  // Place in statement positions after render
  requestAnimationFrame(() => requestAnimationFrame(() => {
    const wT = measureWidth(wThere);
    const wI = measureWidth(wIs);
    const totalW = wT + GAP + wI;
    const stageW = wordStage.getBoundingClientRect().width;
    const startX = (stageW - totalW) / 2;

    pos = {
      there: { x: startX,          w: wT },
      is:    { x: startX + wT + GAP, w: wI }
    };

    wThere.style.left = pos.there.x + 'px';
    wIs.style.left    = pos.is.x    + 'px';

    // Now animate cross
    requestAnimationFrame(() => {
      const TRANS = 'left 0.6s cubic-bezier(0.34,1.4,0.64,1), background 0.35s, color 0.35s';
      wIs.style.transition    = TRANS;
      wThere.style.transition = TRANS;

      wIs.style.left    = pos.there.x + 'px';
      wThere.style.left = pos.is.x    + 'px';
      wIs.classList.add('q-state');
      wThere.classList.add('q-state');

      // Capitalise mid-flight
      setTimeout(() => { wIs.textContent = 'Is'; }, 300);

      // After cross: snap to even final spacing, show arrows + rule
      setTimeout(() => {
        const wI2 = measureWidth(wIs);
        const wT2 = measureWidth(wThere);
        const totalW2 = wI2 + GAP + wT2;
        const stageW2 = wordStage.getBoundingClientRect().width;
        const startX2 = (stageW2 - totalW2) / 2;

        wIs.style.transition    = 'background 0.15s, color 0.15s';
        wThere.style.transition = 'background 0.15s, color 0.15s';
        wIs.style.left    = startX2 + 'px';
        wThere.style.left = (startX2 + wI2 + GAP) + 'px';

        arrowsRow.classList.add('visible');

        setTimeout(() => {
          ruleBox.classList.add('visible');
          sentLabel.textContent = 'Pregunta';
          teachBtn.textContent  = '← Volver al enunciado';
          teachBtn.disabled     = false;
          teachState = 'question';
        }, 200);
      }, 660);
    });
  }));
}

function toStatement() {
  teachState = 'animating';
  teachBtn.disabled = true;

  arrowsRow.classList.remove('visible');
  ruleBox.classList.remove('visible');

  // Reset word text and animate back to statement positions
  wIs.textContent = 'is';
  wIs.classList.remove('q-state');
  wThere.classList.remove('q-state');

  requestAnimationFrame(() => requestAnimationFrame(() => {
    const TRANS = 'left 0.6s cubic-bezier(0.34,1.4,0.64,1), background 0.35s, color 0.35s';
    wIs.style.transition    = TRANS;
    wThere.style.transition = TRANS;
    wIs.style.left    = pos.is.x    + 'px';
    wThere.style.left = pos.there.x + 'px';

    setTimeout(() => {
      // Hide animated stage, show phrase chips again
      wordStage.style.display  = 'none';
      phraseArea.style.display = '';
      buildChips(SLIDES[current]);
      sentLabel.textContent = 'Enunciado';
      teachBtn.textContent  = 'Formar pregunta →';
      teachBtn.disabled     = false;
      teachState = 'statement';
    }, 660);
  }));
}

/* ── TILES ── */
function buildTiles(slide) {
  tileBank.innerHTML = '';
  tileZone.innerHTML = '';
  answered = [];
  const shuffled = [...slide.tiles].sort(() => Math.random() - 0.5);
  shuffled.forEach(text => tileBank.appendChild(makeTile(text, 'bank')));
}

function makeTile(text, location) {
  const tile = document.createElement('div');
  tile.className   = 'tile';
  tile.textContent = text;

  tile.addEventListener('click', () => {
    if (locked) return;
    if (location === 'bank') {
      tileBank.removeChild(tile);
      location = 'answer';
      tile.classList.add('in-answer');
      tileZone.appendChild(tile);
      answered.push({ text, el: tile });
    } else {
      tileZone.removeChild(tile);
      location = 'bank';
      tile.classList.remove('in-answer');
      tileBank.appendChild(tile);
      answered = answered.filter(a => a.el !== tile);
    }
    checkBtn.disabled      = answered.length === 0;
    feedbackEl.className   = 'feedback';
    feedbackEl.textContent = '';
  });

  return tile;
}

/* ── CHECK ── */
window.checkAnswer = function() {
  if (locked) return;
  const slide      = SLIDES[current];
  const userAnswer = answered.map(a => a.text);

  const correct =
    userAnswer.length === slide.answer.length &&
    slide.answer.every((w, i) => userAnswer[i].toLowerCase() === w.toLowerCase());

  if (correct) {
    locked = true;
    playSfx(SFX_OK);
    answered.forEach(a => {
      a.el.classList.remove('in-answer');
      a.el.classList.add('locked-green');
    });
    tileZone.classList.add('correct-zone');
    feedbackEl.className   = 'feedback correct';
    feedbackEl.textContent = '¡Correcto! ✓';
    checkBtn.disabled      = true;
    nextBtn.classList.add('show');

    // Show question form in the teach panel
    if (teachState !== 'question') {
      phraseArea.style.display = '';
      wordStage.style.display  = 'none';
      buildQuestionChips(slide);
      arrowsRow.classList.add('visible');
      ruleBox.classList.add('visible');
      sentLabel.textContent = 'Pregunta';
      teachBtn.style.display = 'none';
      teachState = 'question';
    }
  } else {
    playSfx(SFX_ERR);
    feedbackEl.className   = 'feedback wrong';
    feedbackEl.textContent = 'Intenta de nuevo.';
    tileZone.classList.add('shake');
    setTimeout(() => tileZone.classList.remove('shake'), 400);
  }
};

/* ── LOAD SLIDE ── */
function loadSlide(idx) {
  current = idx;
  locked  = false;
  const slide = SLIDES[idx];

  slideImg.src = IMG + slide.img;
  slideImg.alt = '';

  updateBar(idx);
  resetTeach(slide);
  buildTiles(slide);

  feedbackEl.className   = 'feedback';
  feedbackEl.textContent = '';
  checkBtn.disabled      = true;
  nextBtn.classList.remove('show');
  tileZone.classList.remove('correct-zone');
  teachBtn.style.display = '';

  if (idx < TOTAL - 1) {
    nextBtn.textContent = 'Siguiente →';
    nextBtn.onclick     = () => loadSlide(current + 1);
  } else {
    nextBtn.textContent = 'Finalizar →';
    nextBtn.onclick     = () => showEnd();
  }
}

/* ── END ── */
function showEnd() {
  if (window.va) { window.va('track', `U${UNIT} L${LESSON} P${PART} Finished`); }
  barEl.style.width      = '100%';
  pctLabelEl.textContent = '100%';
  document.getElementById('mainCard').style.display  = 'none';
  document.getElementById('endScreen').style.display = 'block';
  document.getElementById('dot-4').className = 'dot done';
  saveProgress();
  updateFurthest(PART + 1);
}

/* ── INIT ── */
loadSlide(0);
</script>
