<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unidad 7 • Lección 3 • Parte 3 | Inglesco</title>

<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<!-- Vercel Web Analytics -->
<script defer src="/_vercel/insights/script.js"></script>

<script>
  const UNIT   = 7;
  const LESSON = 3;
  const PART   = 3;
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

body {
  background: linear-gradient(135deg, #dbeafe, #fef9c3);
  min-height: 100vh;
  padding: 16px 12px 80px;
  color: #111827;
}

.wrap { max-width: 700px; margin: 0 auto; }

.back-btn {
  display: inline-block; margin-bottom: 16px; padding: 7px 14px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  color: #1e40af; border-radius: 10px;
  text-decoration: none; font-weight: 700; font-size: 14px;
  border: 1.5px solid rgba(255,255,255,0.7);
}

.top-title { text-align: center; font-size: 18px; font-weight: 900; margin-bottom: 4px; }
.subline   { text-align: center; font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #374151; }

.progress-container {
  display: flex; justify-content: center; gap: 10px; margin: 12px 0 20px;
}
.step {
  width: 38px; height: 38px; border-radius: 50%; background: #d1d5db;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 15px; text-decoration: none; color: #1f2933;
}
.step.active { background: #2563eb; color: #fff; }
.step.done   { background: #059669; color: #fff; }

/* VOCAB TABLE */
.vocab-card {
  background: rgba(255,255,255,.88);
  border-radius: 14px;
  padding: 11px 14px;
  box-shadow: 0 4px 12px rgba(0,0,0,.07);
  margin-bottom: 16px;
}
.vocab-card-title {
  font-size: 11px; font-weight: 700; color: #9333ea;
  letter-spacing: .05em; text-transform: uppercase; margin-bottom: 8px;
}
.vocab-grid {
  display: grid; grid-template-columns: 1fr 1fr;
}
.vocab-en {
  font-size: 12px; font-weight: 700; color: #1e40af;
  padding: 5px 4px; border-bottom: 1px solid #e2e8f0;
}
.vocab-es {
  font-size: 12px; font-weight: 600; color: #374151;
  padding: 5px 4px; border-bottom: 1px solid #e2e8f0;
}
.vocab-grid .vocab-en:nth-last-child(2),
.vocab-grid .vocab-es:last-child { border-bottom: none; }

/* COUNTER */
.counter-row {
  display: flex; justify-content: space-between;
  margin-bottom: 14px; font-size: 13px; font-weight: 700; color: #486581;
}

.score-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.7); border-radius: 999px;
  padding: 3px 12px; font-size: 13px; font-weight: 700; color: #374151;
}

/* FRIDGE IMAGE */
.fridge-wrap {
  width: 100%; max-height: 220px;
  border-radius: 18px; overflow: hidden;
  background: #f1f5f9;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
  box-shadow: 0 4px 14px rgba(0,0,0,.08);
}
.fridge-wrap img { width: 100%; max-height: 220px; object-fit: contain; }

/* CARD */
.card {
  background: rgba(255,255,255,.88);
  border-radius: 18px;
  padding: 20px 18px;
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
}
.card-num {
  font-size: 12px; font-weight: 700; color: #9333ea;
  letter-spacing: .05em; text-transform: uppercase; margin-bottom: 14px;
}
.question-text {
  font-size: 20px; font-weight: 900; color: #1e3a5f;
  text-align: center; margin-bottom: 8px; line-height: 1.3;
}
.question-es {
  font-size: 14px; font-weight: 600; color: #6b7280;
  text-align: center; margin-bottom: 24px;
}

/* YES / NO */
.yn-row { display: flex; gap: 14px; margin-bottom: 20px; }
.yn-btn {
  flex: 1; padding: 16px 10px;
  border: none; border-radius: 14px;
  font-weight: 900; font-size: 18px; cursor: pointer;
  transition: transform .1s, opacity .2s;
  -webkit-tap-highlight-color: transparent;
}
.yn-btn:active { transform: scale(.96); }
.yn-btn.yes { background: #d1fae5; color: #065f46; border: 2px solid #6ee7b7; }
.yn-btn.no  { background: #fee2e2; color: #7f1d1d; border: 2px solid #fca5a5; }
.yn-btn:disabled { opacity: .45; cursor: default; transform: none; }

/* RESULT */
.result-area { display: none; margin-top: 4px; }
.result-area.visible { display: block; }

.result-label {
  font-size: 15px; font-weight: 900; text-align: center;
  margin-bottom: 14px; padding: 8px 12px; border-radius: 10px;
}
.result-label.correct { background: #d1fae5; color: #065f46; }
.result-label.wrong   { background: #fee2e2; color: #991b1b; }

/* BUBBLES */
.dialogue { display: flex; flex-direction: column; gap: 12px; }
.bubble-wrap { display: flex; flex-direction: column; gap: 4px; }
.bubble-wrap.right { align-items: flex-end; }
.speaker {
  font-size: 10px; font-weight: 700; color: #9ca3af;
  text-transform: uppercase; letter-spacing: .06em; padding: 0 4px;
}
.bubble {
  padding: 12px 16px; border-radius: 16px;
  font-size: 15px; font-weight: 600; line-height: 1.5; max-width: 90%;
}
.bubble.q { background: #dbeafe; color: #1e40af; border-bottom-left-radius: 4px; align-self: flex-start; }
.bubble.a { background: #d1fae5; color: #065f46; border-bottom-right-radius: 4px; align-self: flex-end; }

/* REPLAY */
.replay-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  width: 100%; padding: 11px;
  background: transparent; color: #2563eb;
  border: 2px solid #2563eb; border-radius: 12px;
  font-weight: 700; font-size: 14px; cursor: pointer; margin-top: 14px;
  transition: opacity .2s;
  -webkit-tap-highlight-color: transparent;
}
.replay-btn:active { opacity: .7; }

/* NEXT */
.next-btn {
  width: 100%; padding: 13px; background: #2563eb; color: white;
  border: none; border-radius: 14px; font-weight: 900; font-size: 15px;
  margin-top: 16px; cursor: pointer; transition: opacity .2s;
  -webkit-tap-highlight-color: transparent;
}
.next-btn:hover    { opacity: .9; }
.next-btn:disabled { opacity: .4; cursor: default; }

/* COMPLETE */
.complete-screen { text-align: center; padding: 30px 10px; }
.complete-screen .emoji { font-size: 56px; margin-bottom: 12px; }
.complete-screen h2 { font-size: 22px; font-weight: 900; color: #1e3a5f; margin-bottom: 8px; }
.complete-screen p  { font-size: 15px; color: #374151; margin-bottom: 10px; }
.score-final { font-size: 28px; font-weight: 900; color: #2563eb; margin: 12px 0 20px; }
.unit-btn {
  display: inline-block; padding: 13px 28px;
  background: #059669; color: white; border-radius: 14px;
  font-weight: 900; font-size: 15px; text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">&larr; Unidad 7</a>

  <div class="top-title">Unidad 7 &bull; Lecci&oacute;n 3 &bull; Parte 3</div>
  <div class="subline">Is there any&hellip;? &mdash; Yes / No</div>

  <div class="progress-container">
    <a class="step done"   href="p1.html">1</a>
    <a class="step done"   href="p2.html">2</a>
    <a class="step active" href="p3.html">3</a>
    <a class="step"        href="p4.html">4</a>
    <a class="step"        href="p5.html">5</a>
  </div>

  <!-- VOCAB TABLE -->
  <div class="vocab-card">
    <div class="vocab-card-title">&#x1F4DA; Vocabulario</div>
    <div class="vocab-grid">
      <span class="vocab-en">milk</span><span class="vocab-es">leche</span>
      <span class="vocab-en">bread</span><span class="vocab-es">pan</span>
      <span class="vocab-en">meat</span><span class="vocab-es">carne</span>
      <span class="vocab-en">butter</span><span class="vocab-es">mantequilla</span>
      <span class="vocab-en">salad</span><span class="vocab-es">ensalada</span>
      <span class="vocab-en">cheese</span><span class="vocab-es">queso</span>
    </div>
  </div>

  <!-- FRIDGE IMAGE -->
  <div class="fridge-wrap">
    <img src="https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/images/u7/u7.fridge.2.jpg" alt="Refrigerador">
  </div>

  <!-- COUNTER -->
  <div class="counter-row">
    <span id="counter">Pregunta 1 de 6</span>
    <span class="score-badge">&#11088; <span id="scoreTxt">0 / 0</span></span>
  </div>

  <!-- CARD -->
  <div class="card" id="card"></div>

  <button class="next-btn" id="nextBtn" disabled>Siguiente &rarr;</button>

</div>

<script>
(function() {

var BASE        = 'https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/';
var AUDIO_BASE  = BASE + 'audio/u7/';
var SFX_CORRECT = BASE + 'sfx/correct.wav';

var ITEMS = [
  { audio: 'u7.milk2.mp3',   q: 'Is there any milk?',   qEs: '\u00BFHay leche?',        answer: true,  aText: 'Yes, there is some milk.'   },
  { audio: 'u7.butter2.mp3', q: 'Is there any butter?', qEs: '\u00BFHay mantequilla?',   answer: false, aText: 'No, there is not any butter.' },
  { audio: 'u7.bread2.mp3',  q: 'Is there any bread?',  qEs: '\u00BFHay pan?',           answer: true,  aText: 'Yes, there is some bread.'  },
  { audio: 'u7.meat2.mp3',   q: 'Is there any meat?',   qEs: '\u00BFHay carne?',         answer: false, aText: 'No, there is not any meat.'  },
  { audio: 'u7.salad2.mp3',  q: 'Is there any salad?',  qEs: '\u00BFHay ensalada?',      answer: true,  aText: 'Yes, there is some salad.'  },
  { audio: 'u7.cheese2.mp3', q: 'Is there any cheese?', qEs: '\u00BFHay queso?',         answer: true,  aText: 'Yes, there is some cheese.' }
];

var TOTAL = ITEMS.length;

/* ── Preload all audio for instant playback ── */
var audioCache = {};
ITEMS.forEach(function(item) {
  var a = new Audio(AUDIO_BASE + item.audio);
  a.preload = 'auto';
  audioCache[item.audio] = a;
});
var sfx = new Audio(SFX_CORRECT);
sfx.preload = 'auto';
audioCache['correct.wav'] = sfx;

function getAudio(src) {
  var key = (src === SFX_CORRECT) ? 'correct.wav' : src.replace(AUDIO_BASE, '');
  var cached = audioCache[key];
  if (cached) { cached.currentTime = 0; return cached; }
  return new Audio(src);
}

var current  = 0;
var score    = 0;
var answered = 0;
var audioObj = null;

var cardEl   = document.getElementById('card');
var nextBtn  = document.getElementById('nextBtn');
var counter  = document.getElementById('counter');
var scoreTxt = document.getElementById('scoreTxt');

function updateScore() {
  scoreTxt.textContent = score + ' / ' + answered;
}

function playAudio(src, onended) {
  if (audioObj) { try { audioObj.pause(); } catch(e) {} }
  audioObj = getAudio(src);
  if (onended) audioObj.addEventListener('ended', onended, { once: true });
  audioObj.play().catch(function() {});
}

function render(i) {
  if (audioObj) { try { audioObj.pause(); } catch(e) {} audioObj = null; }
  nextBtn.disabled = true;
  counter.textContent = 'Pregunta ' + (i + 1) + ' de ' + TOTAL;
  nextBtn.innerHTML = (i === TOTAL - 1) ? 'Finalizar &rarr;' : 'Siguiente &rarr;';

  var item = ITEMS[i];
  cardEl.innerHTML = '';

  var numEl = document.createElement('div');
  numEl.className = 'card-num';
  numEl.textContent = 'Pregunta ' + (i + 1);
  cardEl.appendChild(numEl);

  var qText = document.createElement('div');
  qText.className = 'question-text';
  qText.textContent = item.q;
  cardEl.appendChild(qText);

  var qEs = document.createElement('div');
  qEs.className = 'question-es';
  qEs.textContent = item.qEs;
  cardEl.appendChild(qEs);

  var ynRow = document.createElement('div');
  ynRow.className = 'yn-row';

  var yesBtn = document.createElement('button');
  yesBtn.className = 'yn-btn yes';
  yesBtn.textContent = '\u2705 Yes';

  var noBtn = document.createElement('button');
  noBtn.className = 'yn-btn no';
  noBtn.textContent = '\u274C No';

  ynRow.appendChild(yesBtn);
  ynRow.appendChild(noBtn);
  cardEl.appendChild(ynRow);

  var resultArea = document.createElement('div');
  resultArea.className = 'result-area';
  cardEl.appendChild(resultArea);

  function handleAnswer(userSaidYes) {
    yesBtn.disabled = true;
    noBtn.disabled  = true;
    answered++;

    var isCorrect = (userSaidYes === item.answer);
    if (isCorrect) score++;
    updateScore();

    resultArea.innerHTML = '';
    resultArea.classList.add('visible');

    var label = document.createElement('div');
    label.className = 'result-label ' + (isCorrect ? 'correct' : 'wrong');
    label.textContent = isCorrect ? '\u2705 \u00A1Correcto!' : '\u274C Not quite \u2014 listen:';
    resultArea.appendChild(label);

    var dialogue = document.createElement('div');
    dialogue.className = 'dialogue';

    var qWrap = document.createElement('div');
    qWrap.className = 'bubble-wrap';
    var qSpeaker = document.createElement('div');
    qSpeaker.className = 'speaker';
    qSpeaker.textContent = 'Question';
    var qBubble = document.createElement('div');
    qBubble.className = 'bubble q';
    qBubble.textContent = item.q;
    qWrap.appendChild(qSpeaker);
    qWrap.appendChild(qBubble);
    dialogue.appendChild(qWrap);

    var aWrap = document.createElement('div');
    aWrap.className = 'bubble-wrap right';
    var aSpeaker = document.createElement('div');
    aSpeaker.className = 'speaker';
    aSpeaker.textContent = 'Answer';
    var aBubble = document.createElement('div');
    aBubble.className = 'bubble a';
    aBubble.textContent = item.aText;
    aWrap.appendChild(aSpeaker);
    aWrap.appendChild(aBubble);
    dialogue.appendChild(aWrap);

    resultArea.appendChild(dialogue);

    var replayBtn = document.createElement('button');
    replayBtn.className = 'replay-btn';
    replayBtn.textContent = '\u25B6 Escuchar de nuevo';
    replayBtn.addEventListener('click', function() { playAudio(AUDIO_BASE + item.audio); });
    replayBtn.addEventListener('touchstart', function() {}, { passive: true });
    replayBtn.addEventListener('touchend', function(e) { e.preventDefault(); playAudio(AUDIO_BASE + item.audio); });
    resultArea.appendChild(replayBtn);

    nextBtn.disabled = false;

    if (isCorrect) {
      playAudio(SFX_CORRECT, function() { playAudio(AUDIO_BASE + item.audio); });
    } else {
      playAudio(AUDIO_BASE + item.audio);
    }
  }

  function bindBtn(btn, val) {
    btn.addEventListener('click', function() { handleAnswer(val); });
    btn.addEventListener('touchstart', function() {}, { passive: true });
    btn.addEventListener('touchend', function(e) { e.preventDefault(); handleAnswer(val); });
  }

  bindBtn(yesBtn, true);
  bindBtn(noBtn, false);
}

nextBtn.addEventListener('click', function() {
  if (audioObj) { try { audioObj.pause(); } catch(e) {} audioObj = null; }

  if (current < TOTAL - 1) {
    current++;
    render(current);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    var key = 'inglesco_progress_u7';
    try {
      var raw  = localStorage.getItem(key);
      var data = raw ? JSON.parse(raw) : {};
      if (!data.l3) data.l3 = { partsCompleted: 0, partsTotal: 5 };
      if (data.l3.partsCompleted < 3) data.l3.partsCompleted = 3;
      localStorage.setItem(key, JSON.stringify(data));
    } catch(e) {}

    counter.textContent = '';
    scoreTxt.textContent = score + ' / ' + TOTAL;
    nextBtn.style.display = 'none';

    var pct   = Math.round((score / TOTAL) * 100);
    var emoji = pct === 100 ? '\uD83C\uDFC6' : pct >= 66 ? '\uD83C\uDF89' : '\uD83D\uDCAA';

    cardEl.innerHTML =
      '<div class="complete-screen">' +
        '<div class="emoji">' + emoji + '</div>' +
        '<h2>\u00A1Parte completada!</h2>' +
        '<p>Respondiste correctamente:</p>' +
        '<div class="score-final">' + score + ' / ' + TOTAL + '</div>' +
        '<p style="margin-bottom:24px">\u00A1Sigue as\u00ED!</p>' +
        '<a href="p4.html" class="unit-btn">Siguiente parte &rarr;</a>' +
      '</div>';
  }
});

render(0);
updateScore();

}());
</script>

</body>
</html>
