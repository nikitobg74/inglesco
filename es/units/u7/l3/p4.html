<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Unidad 7 &bull; Lecci&oacute;n 3 &bull; Parte 4 | Inglesco</title>

<link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;900&display=swap" rel="stylesheet">

<!-- Vercel Web Analytics -->
<script defer src="/_vercel/insights/script.js"></script>

<script>
  const UNIT   = 7;
  const LESSON = 3;
  const PART   = 4;
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

body {
  background: linear-gradient(135deg, #dbeafe, #fef9c3);
  min-height: 100vh;
  padding: 16px 12px 80px;
  color: #111827;
}

.wrap { max-width: 700px; margin: 0 auto; }

.back-btn {
  display: inline-block; margin-bottom: 16px; padding: 7px 14px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  color: #1e40af; border-radius: 10px;
  text-decoration: none; font-weight: 700; font-size: 14px;
  border: 1.5px solid rgba(255,255,255,0.7);
}

.top-title { text-align: center; font-size: 18px; font-weight: 900; margin-bottom: 4px; }
.subline   { text-align: center; font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #374151; }

.progress-container {
  display: flex; justify-content: center; gap: 10px; margin: 12px 0 20px;
}
.step {
  width: 38px; height: 38px; border-radius: 50%; background: #d1d5db;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 15px; text-decoration: none; color: #1f2933;
}
.step.active { background: #2563eb; color: #fff; }
.step.done   { background: #059669; color: #fff; }

/* FRIDGE IMAGE */
.fridge-wrap {
  width: 100%; max-height: 200px;
  border-radius: 18px; overflow: hidden; background: #f1f5f9;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 16px;
  box-shadow: 0 4px 14px rgba(0,0,0,.08);
}
.fridge-wrap img { width: 100%; max-height: 200px; object-fit: contain; }

/* COUNTER */
.counter-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; font-size: 13px; font-weight: 700; color: #486581;
}
.score-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.7); border-radius: 999px;
  padding: 3px 12px; font-size: 13px; font-weight: 700; color: #374151;
}

/* CARD */
.card {
  background: rgba(255,255,255,.88);
  border-radius: 18px; padding: 20px 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
}
.card-num {
  font-size: 11px; font-weight: 700; color: #9333ea;
  letter-spacing: .05em; text-transform: uppercase; margin-bottom: 14px;
}

/* PHASE LABEL */
.phase-label {
  font-size: 12px; font-weight: 700; color: #6b7280;
  text-transform: uppercase; letter-spacing: .05em;
  background: #f1f5f9; border-radius: 8px;
  padding: 3px 10px; display: inline-block; margin-bottom: 10px;
}

/* PLAY BUTTON */
.play-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 13px;
  background: #2563eb; color: white;
  border: none; border-radius: 14px;
  font-weight: 900; font-size: 15px; cursor: pointer;
  margin-bottom: 18px;
  transition: opacity .2s, transform .1s;
  -webkit-tap-highlight-color: transparent;
}
.play-btn:active  { transform: scale(.97); }
.play-btn.playing { background: #7c3aed; }
.play-btn.played  { background: #0369a1; }

/* DROP ZONE */
.drop-zone {
  min-height: 54px;
  border: 2px dashed #93c5fd;
  border-radius: 12px;
  background: #eff6ff;
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 8px 10px; margin-bottom: 14px;
  transition: border-color .2s, background .2s;
}
.drop-zone.correct { border-color: #6ee7b7; background: #d1fae5; }
.drop-zone.wrong   { border-color: #fca5a5; background: #fee2e2; }

.drop-zone-label {
  font-size: 10px; font-weight: 700; color: #93c5fd;
  text-transform: uppercase; letter-spacing: .05em;
  width: 100%; margin-bottom: 2px;
}
.drop-zone.correct .drop-zone-label { color: #6ee7b7; }
.drop-zone.wrong   .drop-zone-label { color: #fca5a5; }

/* TILE BANK */
.tile-bank {
  display: flex; flex-wrap: wrap; gap: 8px;
  min-height: 48px; margin-bottom: 4px;
}

/* TILE */
.tile {
  padding: 8px 14px;
  background: #fff; border: 2px solid #bfdbfe;
  border-radius: 10px; font-size: 14px; font-weight: 700; color: #1e40af;
  cursor: pointer; user-select: none;
  transition: transform .1s, box-shadow .1s, opacity .2s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.tile:active { transform: scale(.94); }
.tile.in-zone {
  background: #dbeafe; border-color: #60a5fa;
}
.tile.disabled { opacity: .45; cursor: default; pointer-events: none; }
.tile.wrong-flash { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }

@keyframes shake {
  0%   { transform: translateX(0); }
  20%  { transform: translateX(-6px); }
  40%  { transform: translateX(6px); }
  60%  { transform: translateX(-4px); }
  80%  { transform: translateX(4px); }
  100% { transform: translateX(0); }
}
.drop-zone.shake { animation: shake .35s ease; border-color: #fca5a5; background: #fee2e2; }
/* RESULT FEEDBACK */
.result-feedback {
  display: none; text-align: center;
  font-size: 15px; font-weight: 900;
  padding: 10px 12px; border-radius: 10px; margin-top: 4px;
}
.result-feedback.visible { display: block; }
.result-feedback.correct { background: #d1fae5; color: #065f46; }
.result-feedback.wrong   { background: #fee2e2; color: #991b1b; }

/* CHECK BUTTON — removed, auto-check on correct order */

/* NEXT */
.next-btn {
  width: 100%; padding: 13px; background: #2563eb; color: white;
  border: none; border-radius: 14px; font-weight: 900; font-size: 15px;
  margin-top: 12px; cursor: pointer; transition: opacity .2s;
  -webkit-tap-highlight-color: transparent;
}
.next-btn:hover    { opacity: .9; }
.next-btn:disabled { opacity: .4; cursor: default; }

/* COMPLETE */
.complete-screen { text-align: center; padding: 30px 10px; }
.complete-screen .emoji { font-size: 56px; margin-bottom: 12px; }
.complete-screen h2 { font-size: 22px; font-weight: 900; color: #1e3a5f; margin-bottom: 8px; }
.complete-screen p  { font-size: 15px; color: #374151; margin-bottom: 10px; }
.score-final { font-size: 28px; font-weight: 900; color: #2563eb; margin: 12px 0 20px; }
.unit-btn {
  display: inline-block; padding: 13px 28px;
  background: #059669; color: white; border-radius: 14px;
  font-weight: 900; font-size: 15px; text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}

/* divider between Q and A phases */
.phase-divider {
  border: none; border-top: 1px solid #e2e8f0; margin: 18px 0 14px;
}
</style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">&larr; Unidad 7</a>

  <div class="top-title">Unidad 7 &bull; Lecci&oacute;n 3 &bull; Parte 4</div>
  <div class="subline">Ordena las frases</div>

  <div class="progress-container">
    <a class="step done"   href="p1.html">1</a>
    <a class="step done"   href="p2.html">2</a>
    <a class="step done"   href="p3.html">3</a>
    <a class="step active" href="p4.html">4</a>
    <a class="step"        href="p5.html">5</a>
  </div>

  <!-- FRIDGE IMAGE -->
  <div class="fridge-wrap">
    <img src="https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/images/u7/u7.fridge.2.jpg" alt="Refrigerador">
  </div>

  <!-- COUNTER -->
  <div class="counter-row">
    <span id="counter">Ejercicio 1 de 6</span>
    <span class="score-badge">&#11088; <span id="scoreTxt">0 / 0</span></span>
  </div>

  <!-- CARD -->
  <div class="card" id="card"></div>

  <button class="next-btn" id="nextBtn" disabled>Siguiente &rarr;</button>

</div>

<script>
(function() {

var BASE        = 'https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/';
var AUDIO_BASE  = BASE + 'audio/u7/';
var SFX_CORRECT = BASE + 'sfx/correct.wav';

// Each item: audio, question tiles (correct order), answer tiles (correct order)
var ITEMS = [
  {
    audio: 'u7.milk2.mp3',
    q: ['Is there', 'any', 'milk?'],
    a: ['Yes,', 'there is', 'some', 'milk.']
  },
  {
    audio: 'u7.butter2.mp3',
    q: ['Is there', 'any', 'butter?'],
    a: ['No,', 'there is not', 'any', 'butter.']
  },
  {
    audio: 'u7.bread2.mp3',
    q: ['Is there', 'any', 'bread?'],
    a: ['Yes,', 'there is', 'some', 'bread.']
  },
  {
    audio: 'u7.meat2.mp3',
    q: ['Is there', 'any', 'meat?'],
    a: ['No,', 'there is not', 'any', 'meat.']
  },
  {
    audio: 'u7.salad2.mp3',
    q: ['Is there', 'any', 'salad?'],
    a: ['Yes,', 'there is', 'some', 'salad.']
  },
  {
    audio: 'u7.cheese2.mp3',
    q: ['Is there', 'any', 'cheese?'],
    a: ['Yes,', 'there is', 'some', 'cheese.']
  }
];

var TOTAL = ITEMS.length;

/* ── Preload audio ── */
var audioCache = {};
ITEMS.forEach(function(item) {
  var a = new Audio(AUDIO_BASE + item.audio);
  a.preload = 'auto';
  audioCache[item.audio] = a;
});
var sfx = new Audio(SFX_CORRECT);
sfx.preload = 'auto';
audioCache['correct.wav'] = sfx;

function getAudio(src) {
  var key = (src === SFX_CORRECT) ? 'correct.wav' : src.replace(AUDIO_BASE, '');
  var cached = audioCache[key];
  if (cached) { cached.currentTime = 0; return cached; }
  return new Audio(src);
}

var current  = 0;
var score    = 0;   // counts full exercises correct (both Q and A correct)
var answered = 0;
var audioObj = null;

var cardEl   = document.getElementById('card');
var nextBtn  = document.getElementById('nextBtn');
var counter  = document.getElementById('counter');
var scoreTxt = document.getElementById('scoreTxt');

function updateScore() {
  scoreTxt.textContent = score + ' / ' + answered;
}

function playAudio(src, onended) {
  if (audioObj) { try { audioObj.pause(); } catch(e) {} }
  audioObj = getAudio(src);
  if (onended) audioObj.addEventListener('ended', onended, { once: true });
  audioObj.play().catch(function() {});
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function makeTileExercise(correct, zoneLabel, onChecked) {
  var wrap = document.createElement('div');

  // Phase label
  var pl = document.createElement('div');
  pl.className = 'phase-label';
  pl.textContent = zoneLabel;
  wrap.appendChild(pl);

  // Drop zone
  var zone = document.createElement('div');
  zone.className = 'drop-zone';
  var zLabel = document.createElement('div');
  zLabel.className = 'drop-zone-label';
  zLabel.textContent = 'Tu respuesta';
  zone.appendChild(zLabel);
  wrap.appendChild(zone);

  // Tile bank
  var bank = document.createElement('div');
  bank.className = 'tile-bank';
  wrap.appendChild(bank);

  // Result feedback
  var feedback = document.createElement('div');
  feedback.className = 'result-feedback';
  wrap.appendChild(feedback);

  // State
  var zoneTiles = [];
  var tileEls   = {};
  var checked   = false;

  var shaking = false;

  function tryAutoCheck() {
    if (checked || shaking) return;
    if (zoneTiles.length !== correct.length) return;

    if (zoneTiles.join('|') === correct.join('|')) {
      // CORRECT — lock green
      checked = true;
      Object.keys(tileEls).forEach(function(t) {
        tileEls[t].tileEl.classList.add('disabled');
      });
      zone.classList.add('correct');
      feedback.className = 'result-feedback visible correct';
      feedback.textContent = '\u2705 \u00A1Correcto!';
      playAudio(SFX_CORRECT, function() { onChecked(true); });

    } else {
      // WRONG — shake, flash red, show hint, then auto-reset after 800ms
      shaking = true;

      // Flash tiles red
      Object.keys(tileEls).forEach(function(t) {
        if (tileEls[t].inZone) tileEls[t].tileEl.classList.add('wrong-flash');
      });
      zone.classList.add('shake');

      feedback.className = 'result-feedback visible wrong';
      feedback.textContent = '\u274C Casi\u2026 sigue intentando';

      setTimeout(function() {
        // Reset zone — send all tiles back to bank
        var toReturn = zoneTiles.slice();
        toReturn.forEach(function(t) {
          tileEls[t].inZone = false;
          tileEls[t].tileEl.classList.remove('in-zone', 'wrong-flash');
          bank.appendChild(tileEls[t].tileEl);
        });
        zoneTiles = [];

        // Remove red from zone
        zone.classList.remove('shake');

        // Hide hint
        feedback.className = 'result-feedback';

        shaking = false;
      }, 800);
    }
  }

  function addToZone(text) {
    if (checked || shaking) return;
    zoneTiles.push(text);
    tileEls[text].inZone = true;
    tileEls[text].tileEl.classList.add('in-zone');
    zone.appendChild(tileEls[text].tileEl);
    tryAutoCheck();
  }

  function removeFromZone(text) {
    if (checked || shaking) return;
    var idx = zoneTiles.indexOf(text);
    if (idx === -1) return;
    zoneTiles.splice(idx, 1);
    tileEls[text].inZone = false;
    tileEls[text].tileEl.classList.remove('in-zone');
    bank.appendChild(tileEls[text].tileEl);
  }

  // Build shuffled tiles
  var shuffled = shuffle(correct);
  shuffled.forEach(function(text) {
    var tile = document.createElement('div');
    tile.className = 'tile';
    tile.textContent = text;
    tileEls[text] = { tileEl: tile, inZone: false };

    function handleTileTap() {
      if (checked || shaking) return;
      if (tileEls[text].inZone) {
        removeFromZone(text);
      } else {
        addToZone(text);
      }
    }

    tile.addEventListener('click', handleTileTap);
    tile.addEventListener('touchstart', function() {}, { passive: true });
    tile.addEventListener('touchend', function(e) { e.preventDefault(); handleTileTap(); });
    bank.appendChild(tile);
  });

  return wrap;
}

function render(i) {
  if (audioObj) { try { audioObj.pause(); } catch(e) {} audioObj = null; }
  nextBtn.disabled = true;
  counter.textContent = 'Ejercicio ' + (i + 1) + ' de ' + TOTAL;
  nextBtn.innerHTML = (i === TOTAL - 1) ? 'Finalizar &rarr;' : 'Siguiente &rarr;';

  var item = ITEMS[i];
  cardEl.innerHTML = '';

  // Card label
  var numEl = document.createElement('div');
  numEl.className = 'card-num';
  numEl.textContent = 'Ejercicio ' + (i + 1);
  cardEl.appendChild(numEl);

  // Play button
  var playBtn = document.createElement('button');
  playBtn.className = 'play-btn';
  playBtn.innerHTML = '<span>\u25B6</span><span>Toca para escuchar</span>';
  cardEl.appendChild(playBtn);

  var hasPlayed = false;

  function doPlay() {
    playBtn.className = 'play-btn playing';
    playBtn.innerHTML = '<span>\u23F8</span><span>Reproduciendo\u2026</span>';
    playAudio(AUDIO_BASE + item.audio, function() {
      playBtn.className = 'play-btn played';
      playBtn.innerHTML = '<span>\u25B6</span><span>Escuchar de nuevo</span>';
      if (!hasPlayed) {
        hasPlayed = true;
        // Reveal exercises after first play
        qSection.style.display = '';
      }
    });
  }

  playBtn.addEventListener('click', doPlay);
  playBtn.addEventListener('touchstart', function() {}, { passive: true });
  playBtn.addEventListener('touchend', function(e) { e.preventDefault(); doPlay(); });

  // Q + A sections (hidden until audio plays once)
  var qSection = document.createElement('div');
  qSection.style.display = 'none';
  cardEl.appendChild(qSection);

  var qChecked = false;
  var aChecked = false;

  function maybeUnlock() {
    if (qChecked && aChecked) {
      answered++;
      score++;
      updateScore();
      nextBtn.disabled = false;
    }
  }

  // Question tile exercise
  var qExercise = makeTileExercise(item.q, '\u2753 Pregunta', function() {
    qChecked = true;
    maybeUnlock();
  });
  qSection.appendChild(qExercise);

  // Divider
  var hr = document.createElement('hr');
  hr.className = 'phase-divider';
  qSection.appendChild(hr);

  // Answer tile exercise
  var aExercise = makeTileExercise(item.a, '\u2714 Respuesta', function() {
    aChecked = true;
    maybeUnlock();
  });
  qSection.appendChild(aExercise);
}

nextBtn.addEventListener('click', function() {
  if (audioObj) { try { audioObj.pause(); } catch(e) {} audioObj = null; }

  if (current < TOTAL - 1) {
    current++;
    render(current);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    var key = 'inglesco_progress_u7';
    try {
      var raw  = localStorage.getItem(key);
      var data = raw ? JSON.parse(raw) : {};
      if (!data.l3) data.l3 = { partsCompleted: 0, partsTotal: 5 };
      if (data.l3.partsCompleted < 4) data.l3.partsCompleted = 4;
      localStorage.setItem(key, JSON.stringify(data));
    } catch(e) {}

    counter.textContent = '';
    scoreTxt.textContent = score + ' / ' + TOTAL;
    nextBtn.style.display = 'none';

    var pct   = Math.round((score / TOTAL) * 100);
    var emoji = pct === 100 ? '\uD83C\uDFC6' : pct >= 66 ? '\uD83C\uDF89' : '\uD83D\uDCAA';

    cardEl.innerHTML =
      '<div class="complete-screen">' +
        '<div class="emoji">' + emoji + '</div>' +
        '<h2>\u00A1Parte completada!</h2>' +
        '<p>Ejercicios completos correctamente:</p>' +
        '<div class="score-final">' + score + ' / ' + TOTAL + '</div>' +
        '<p style="margin-bottom:24px">\u00A1Sigue as\u00ED!</p>' +
        '<a href="p5.html" class="unit-btn">Siguiente parte &rarr;</a>' +
      '</div>';
  }
});

render(0);
updateScore();

}());
</script>

</body>
</html>
