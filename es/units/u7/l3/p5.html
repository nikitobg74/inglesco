<!DOCTYPE html>

<head>

<script defer src="/_vercel/insights/script.js"></script>

<script>
  const UNIT   = 7;
  const LESSON = 3;
  const PART   = 5;
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }

body {
  background: linear-gradient(135deg, #dbeafe, #fef9c3);
  min-height: 100vh;
  padding: 16px 12px 80px;
  color: #111827;
}

.wrap { max-width: 700px; margin: 0 auto; }

.back-btn {
  display: inline-block; margin-bottom: 16px; padding: 7px 14px;
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  color: #1e40af; border-radius: 10px;
  text-decoration: none; font-weight: 700; font-size: 14px;
  border: 1.5px solid rgba(255,255,255,0.7);
}

.top-title { text-align: center; font-size: 18px; font-weight: 900; margin-bottom: 4px; }
.subline   { text-align: center; font-size: 14px; font-weight: 700; margin-bottom: 16px; color: #374151; }

.progress-container {
  display: flex; justify-content: center; gap: 10px; margin: 12px 0 20px;
}
.step {
  width: 38px; height: 38px; border-radius: 50%; background: #d1d5db;
  display: flex; align-items: center; justify-content: center;
  font-weight: 600; font-size: 15px; text-decoration: none; color: #1f2933;
}
.step.active { background: #2563eb; color: #fff; }
.step.done   { background: #059669; color: #fff; }

/* IMAGE */
.img-wrap {
  width: 100%; max-height: 300px;
  border-radius: 18px; overflow: hidden; background: #f1f5f9;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 14px;
  box-shadow: 0 4px 14px rgba(0,0,0,.08);
}
.img-wrap img { width: 100%; max-height: 300px; object-fit: contain; }

/* INGREDIENT LISTS */
.ingredient-lists {
  display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  margin-bottom: 18px;
}
.ing-card {
  border-radius: 14px; padding: 10px 12px;
  box-shadow: 0 2px 8px rgba(0,0,0,.07);
}
.ing-card.yes { background: #d1fae5; border: 1.5px solid #6ee7b7; }
.ing-card.no  { background: #fee2e2; border: 1.5px solid #fca5a5; }
.ing-card-title {
  font-size: 11px; font-weight: 900; text-transform: uppercase;
  letter-spacing: .05em; margin-bottom: 6px;
}
.ing-card.yes .ing-card-title { color: #065f46; }
.ing-card.no  .ing-card-title { color: #991b1b; }
.ing-item {
  font-size: 13px; font-weight: 700; padding: 2px 0;
  display: flex; align-items: center; gap: 5px;
}
.ing-card.yes .ing-item { color: #065f46; }
.ing-card.no  .ing-item { color: #991b1b; }

/* COUNTER */
.counter-row {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 14px; font-size: 13px; font-weight: 700; color: #486581;
}
.score-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(255,255,255,.7); border-radius: 999px;
  padding: 3px 12px; font-size: 13px; font-weight: 700; color: #374151;
}

/* CARD */
.card {
  background: rgba(255,255,255,.88);
  border-radius: 18px; padding: 20px 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,.08);
}
.card-num {
  font-size: 11px; font-weight: 700; color: #9333ea;
  letter-spacing: .05em; text-transform: uppercase; margin-bottom: 12px;
}

/* QUESTION */
.question-text {
  font-size: 20px; font-weight: 900; color: #1e3a5f;
  text-align: center; margin-bottom: 6px; line-height: 1.3;
}
.question-hint {
  font-size: 12px; font-weight: 600; color: #9ca3af;
  text-align: center; margin-bottom: 20px;
}

/* PHASE LABEL */
.phase-label {
  font-size: 11px; font-weight: 700; color: #6b7280;
  text-transform: uppercase; letter-spacing: .05em;
  background: #f1f5f9; border-radius: 8px;
  padding: 3px 10px; display: inline-block; margin-bottom: 8px;
}

/* DROP ZONE */
.drop-zone {
  min-height: 52px;
  border: 2px dashed #93c5fd; border-radius: 12px;
  background: #eff6ff;
  display: flex; flex-wrap: wrap; gap: 8px;
  padding: 8px 10px; margin-bottom: 12px;
  transition: border-color .2s, background .2s;
}
.drop-zone.correct { border-color: #6ee7b7; background: #d1fae5; }

.drop-zone-label {
  font-size: 10px; font-weight: 700; color: #93c5fd;
  text-transform: uppercase; letter-spacing: .05em;
  width: 100%; margin-bottom: 2px;
}
.drop-zone.correct .drop-zone-label { color: #6ee7b7; }

/* TILE BANK */
.tile-bank {
  display: flex; flex-wrap: wrap; gap: 8px;
  min-height: 44px; margin-bottom: 6px;
}

/* TILES */
.tile {
  padding: 8px 14px;
  background: #fff; border: 2px solid #bfdbfe;
  border-radius: 10px; font-size: 14px; font-weight: 700; color: #1e40af;
  cursor: pointer; user-select: none;
  transition: transform .1s, background .15s, border-color .15s, color .15s;
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}
.tile:active { transform: scale(.94); }
.tile.in-zone { background: #dbeafe; border-color: #60a5fa; }
.tile.disabled { opacity: .45; cursor: default; pointer-events: none; }
.tile.wrong-flash { background: #fee2e2; border-color: #fca5a5; color: #991b1b; }

/* RESULT FEEDBACK */
.result-feedback {
  display: none; text-align: center;
  font-size: 14px; font-weight: 900;
  padding: 8px 12px; border-radius: 10px; margin-top: 6px;
}
.result-feedback.visible { display: block; }
.result-feedback.correct { background: #d1fae5; color: #065f46; }
.result-feedback.wrong   { background: #fee2e2; color: #991b1b; }

/* SHAKE */
@keyframes shake {
  0%   { transform: translateX(0); }
  20%  { transform: translateX(-6px); }
  40%  { transform: translateX(6px); }
  60%  { transform: translateX(-4px); }
  80%  { transform: translateX(4px); }
  100% { transform: translateX(0); }
}
.drop-zone.shake { animation: shake .35s ease; border-color: #fca5a5; background: #fee2e2; }

/* NEXT */
.next-btn {
  width: 100%; padding: 13px; background: #2563eb; color: white;
  border: none; border-radius: 14px; font-weight: 900; font-size: 15px;
  margin-top: 14px; cursor: pointer; transition: opacity .2s;
  -webkit-tap-highlight-color: transparent;
}
.next-btn:hover    { opacity: .9; }
.next-btn:disabled { opacity: .4; cursor: default; }

/* COMPLETE */
.complete-screen { text-align: center; padding: 30px 10px; }
.complete-screen .emoji { font-size: 56px; margin-bottom: 12px; }
.complete-screen h2 { font-size: 22px; font-weight: 900; color: #1e3a5f; margin-bottom: 8px; }
.complete-screen p  { font-size: 15px; color: #374151; margin-bottom: 10px; }
.score-final { font-size: 28px; font-weight: 900; color: #2563eb; margin: 12px 0 20px; }
.unit-btn {
  display: inline-block; padding: 13px 28px;
  background: #059669; color: white; border-radius: 14px;
  font-weight: 900; font-size: 15px; text-decoration: none;
  -webkit-tap-highlight-color: transparent;
}
</style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">&larr; Unidad 7</a>

  <div class="top-title">Unidad 7 &bull; Lecci&oacute;n 3 &bull; Parte 5</div>
  <div class="subline">Is there any&hellip;? &mdash; Ordena la respuesta</div>

  <div class="progress-container">
    <a class="step done"   href="p1.html">1</a>
    <a class="step done"   href="p2.html">2</a>
    <a class="step done"   href="p3.html">3</a>
    <a class="step done"   href="p4.html">4</a>
    <a class="step active" href="p5.html">5</a>
  </div>

  <!-- CONTEXT TITLE -->
  <div style="background:rgba(255,255,255,.88); border-radius:14px; padding:12px 16px; margin-bottom:14px; box-shadow:0 4px 12px rgba(0,0,0,.07); text-align:center;">
    <div style="font-size:17px; font-weight:900; color:#1e3a5f; margin-bottom:3px;">I am preparing pancakes.</div>
    <div style="font-size:14px; font-weight:700; color:#6b7280;">Estoy preparando panqueques.</div>
  </div>

  <!-- PANCAKES IMAGE -->
  <div class="img-wrap">
    <img src="https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/images/u7/u7.pancakes.jpg" alt="Ingredientes para panqueques">
  </div>

  <!-- YES / NO INGREDIENT LISTS -->
  <div class="ingredient-lists">
    <div class="ing-card yes">
      <div class="ing-card-title">&#10003; S&iacute; hay</div>
      <div class="ing-item">&#x1F9C2; flour <span style="font-weight:600;opacity:.7;font-size:11px;">&mdash; harina</span></div>
      <div class="ing-item">&#x1F9C8; butter <span style="font-weight:600;opacity:.7;font-size:11px;">&mdash; mantequilla</span></div>
      <div class="ing-item">&#x1F9C2; salt <span style="font-weight:600;opacity:.7;font-size:11px;">&mdash; sal</span></div>
    </div>
    <div class="ing-card no">
      <div class="ing-card-title">&#10007; No hay</div>
      <div class="ing-item">&#x1F33F; sugar <span style="font-weight:600;opacity:.7;font-size:11px;">&mdash; az&uacute;car</span></div>
      <div class="ing-item">&#x1F36F; honey <span style="font-weight:600;opacity:.7;font-size:11px;">&mdash; miel</span></div>
      <div class="ing-item">&#x1F95B; milk <span style="font-weight:600;opacity:.7;font-size:11px;">&mdash; leche</span></div>
    </div>
  </div>

  <!-- COUNTER -->
  <div class="counter-row">
    <span id="counter">Pregunta 1 de 6</span>
    <span class="score-badge">&#11088; <span id="scoreTxt">0 / 0</span></span>
  </div>

  <!-- CARD -->
  <div class="card" id="card"></div>

  <button class="next-btn" id="nextBtn" disabled>Siguiente &rarr;</button>

</div>

<script>
(function() {

var BASE        = 'https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/';
var SFX_CORRECT = BASE + 'sfx/correct.wav';
var SFX_WRONG   = BASE + 'sfx/incorrect.wav';

/*
  answer: true  = YES  → tiles from YES_TILES + ingredient
  answer: false = NO   → tiles from NO_TILES  + ingredient
*/
var YES_TILES = ['There is', 'some'];
var NO_TILES  = ['There is not', 'any'];

var ITEMS = [
  { ingredient: 'flour',  answer: true  },
  { ingredient: 'sugar',  answer: false },
  { ingredient: 'butter', answer: true  },
  { ingredient: 'honey',  answer: false },
  { ingredient: 'salt',   answer: true  },
  { ingredient: 'milk',   answer: false }
];

var TOTAL = ITEMS.length;

/* ── Preload SFX ── */
var audioCache = {};
[SFX_CORRECT, SFX_WRONG].forEach(function(src) {
  var key = src.split('/').pop();
  var a = new Audio(src);
  a.preload = 'auto';
  audioCache[key] = a;
});

function playAudio(src) {
  var key = src.split('/').pop();
  var cached = audioCache[key];
  var a = cached || new Audio(src);
  if (cached) a.currentTime = 0;
  a.play().catch(function() {});
}

var current  = 0;
var score    = 0;
var answered = 0;
var audioObj = null;

var cardEl   = document.getElementById('card');
var nextBtn  = document.getElementById('nextBtn');
var counter  = document.getElementById('counter');
var scoreTxt = document.getElementById('scoreTxt');

function updateScore() {
  scoreTxt.textContent = score + ' / ' + answered;
}

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function makeTileExercise(correct, onDone) {
  var wrap = document.createElement('div');

  var pl = document.createElement('div');
  pl.className = 'phase-label';
  pl.textContent = '\u270F\uFE0F Ordena la respuesta';
  wrap.appendChild(pl);

  var zone = document.createElement('div');
  zone.className = 'drop-zone';
  var zLabel = document.createElement('div');
  zLabel.className = 'drop-zone-label';
  zLabel.textContent = 'Tu respuesta';
  zone.appendChild(zLabel);
  wrap.appendChild(zone);

  var bank = document.createElement('div');
  bank.className = 'tile-bank';
  wrap.appendChild(bank);

  var feedback = document.createElement('div');
  feedback.className = 'result-feedback';
  wrap.appendChild(feedback);

  var zoneTiles = [];
  var tileEls   = {};
  var checked   = false;
  var shaking   = false;

  function tryAutoCheck() {
    if (checked || shaking) return;
    if (zoneTiles.length !== correct.length) return;

    if (zoneTiles.join('|') === correct.join('|')) {
      // CORRECT
      checked = true;
      Object.keys(tileEls).forEach(function(t) {
        tileEls[t].tileEl.classList.add('disabled');
      });
      zone.classList.add('correct');
      feedback.className = 'result-feedback visible correct';
      feedback.textContent = '\u2705 \u00A1Correcto!';
      playAudio(SFX_CORRECT);
      setTimeout(function() { onDone(); }, 400);

    } else {
      // WRONG — shake, flash, reset
      shaking = true;
      Object.keys(tileEls).forEach(function(t) {
        if (tileEls[t].inZone) tileEls[t].tileEl.classList.add('wrong-flash');
      });
      zone.classList.add('shake');
      feedback.className = 'result-feedback visible wrong';
      feedback.textContent = '\u274C Casi\u2026 sigue intentando';
      playAudio(SFX_WRONG);

      setTimeout(function() {
        var toReturn = zoneTiles.slice();
        toReturn.forEach(function(t) {
          tileEls[t].inZone = false;
          tileEls[t].tileEl.classList.remove('in-zone', 'wrong-flash');
          bank.appendChild(tileEls[t].tileEl);
        });
        zoneTiles = [];
        zone.classList.remove('shake');
        feedback.className = 'result-feedback';
        shaking = false;
      }, 800);
    }
  }

  function addToZone(text) {
    if (checked || shaking) return;
    zoneTiles.push(text);
    tileEls[text].inZone = true;
    tileEls[text].tileEl.classList.add('in-zone');
    zone.appendChild(tileEls[text].tileEl);
    tryAutoCheck();
  }

  function removeFromZone(text) {
    if (checked || shaking) return;
    var idx = zoneTiles.indexOf(text);
    if (idx === -1) return;
    zoneTiles.splice(idx, 1);
    tileEls[text].inZone = false;
    tileEls[text].tileEl.classList.remove('in-zone');
    bank.appendChild(tileEls[text].tileEl);
  }

  var shuffled = shuffle(correct);
  shuffled.forEach(function(text) {
    var tile = document.createElement('div');
    tile.className = 'tile';
    tile.textContent = text;
    tileEls[text] = { tileEl: tile, inZone: false };

    function handleTap() {
      if (checked || shaking) return;
      if (tileEls[text].inZone) { removeFromZone(text); }
      else { addToZone(text); }
    }

    tile.addEventListener('click', handleTap);
    tile.addEventListener('touchstart', function() {}, { passive: true });
    tile.addEventListener('touchend', function(e) { e.preventDefault(); handleTap(); });
    bank.appendChild(tile);
  });

  return wrap;
}

function render(i) {
  nextBtn.disabled = true;
  counter.textContent = 'Pregunta ' + (i + 1) + ' de ' + TOTAL;
  nextBtn.innerHTML = (i === TOTAL - 1) ? 'Finalizar &rarr;' : 'Siguiente &rarr;';

  var item = ITEMS[i];
  cardEl.innerHTML = '';

  // Card label
  var numEl = document.createElement('div');
  numEl.className = 'card-num';
  numEl.textContent = 'Pregunta ' + (i + 1);
  cardEl.appendChild(numEl);

  // Question
  var qText = document.createElement('div');
  qText.className = 'question-text';
  qText.textContent = 'Is there any ' + item.ingredient + '?';
  cardEl.appendChild(qText);

  var hint = document.createElement('div');
  hint.className = 'question-hint';
  hint.textContent = item.answer
    ? '\u2191 Mira la imagen \u2014 s\u00ED hay'
    : '\u2191 Mira la imagen \u2014 no hay';
  cardEl.appendChild(hint);

  // Build correct tile sequence
  var base = item.answer ? YES_TILES.slice() : NO_TILES.slice();
  // Append ingredient with period
  var correct = base.concat([item.ingredient + '.']);

  var exercise = makeTileExercise(correct, function() {
    answered++;
    score++;
    updateScore();
    nextBtn.disabled = false;
  });
  cardEl.appendChild(exercise);
}

nextBtn.addEventListener('click', function() {
  if (current < TOTAL - 1) {
    current++;
    render(current);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  } else {
    // Save progress
    var key = 'inglesco_progress_u7';
    try {
      var raw  = localStorage.getItem(key);
      var data = raw ? JSON.parse(raw) : {};
      if (!data.l3) data.l3 = { partsCompleted: 0, partsTotal: 5 };
      if (data.l3.partsCompleted < 5) data.l3.partsCompleted = 5;
      localStorage.setItem(key, JSON.stringify(data));
    } catch(e) {}

    counter.textContent = '';
    scoreTxt.textContent = score + ' / ' + TOTAL;
    nextBtn.style.display = 'none';

    cardEl.innerHTML =
      '<div class="complete-screen">' +
        '<div class="emoji">\uD83C\uDFC6</div>' +
        '<h2>\u00A1Lecci\u00F3n completada!</h2>' +
        '<p>Completaste las 5 partes de la lecci\u00F3n.</p>' +
        '<div class="score-final">' + score + ' / ' + TOTAL + '</div>' +
        '<p style="margin-bottom:24px">\u00A1Excelente trabajo!</p>' +
        '<a href="../index.html" class="unit-btn">Volver a la unidad &rarr;</a>' +
      '</div>';
  }
});

render(0);
updateScore();

}());
</script>

</body>
</html>
