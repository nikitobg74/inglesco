<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Repaso Final – AT, IN, ON | Inglesco Unidad 2 Lección 7</title>
  <meta name="description" content="Repaso final de la Unidad 2: elige la preposición correcta AT, IN u ON. Ejercicios interactivos con imagen. Inglesco Unidad 2 Lección 7 Parte 1." />
  <meta name="keywords" content="preposiciones inglés AT IN ON, repaso inglés, aprender inglés gratis, Inglesco" />
  <link rel="canonical" href="https://inglesco.co/es/units/u2/l7/p1.html" />
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
    body { padding:20px; background:#f0fdf4; color:#1e293b; }

    /* ── BACK ── */
    .back-btn {
      display:inline-flex; align-items:center; gap:6px;
      margin-bottom:20px; padding:8px 16px;
      background:#2563eb; color:#fff; border-radius:10px;
      text-decoration:none; font-weight:700; font-size:14px;
      transition:background .2s;
    }
    .back-btn:hover { background:#1e40af; }

    /* ── PROGRESS DOTS ── */
    .progress-container { display:flex; justify-content:center; gap:10px; margin:0 0 24px 0; }
    .step {
      width:40px; height:40px; border-radius:50%; background:#d1d5db;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; cursor:pointer; transition:all .25s;
      color:#1f2937; user-select:none; font-size:15px;
    }
    .step.active { background:#2563eb; color:#fff; box-shadow:0 0 0 3px #bfdbfe; }
    .step:hover { transform:scale(1.1); }

    /* ── SCORE BADGE ── */
    .score-badge { display:flex; justify-content:center; margin-bottom:14px; }
    .score-inner {
      background:#fff; border:2px solid #2563eb; border-radius:999px;
      padding:5px 18px; font-weight:800; font-size:14px; color:#1e40af;
      display:flex; align-items:center; gap:6px;
    }
    .score-inner span { font-size:18px; }

    /* ── PAGE BOX ── */
    .exercise-box {
      max-width:560px; margin:0 auto; background:#fff;
      padding:26px 28px; border-radius:20px;
      box-shadow:0 10px 30px rgba(139,92,246,0.12);
    }
    .unit-title { color:#2563eb; font-size:24px; font-weight:900; text-align:center; margin-bottom:4px; }
    .lesson-sub { text-align:center; font-weight:700; color:#475569; font-size:13px; margin-bottom:20px; }

    /* ── COUNTER + STATUS ── */
    .top-row {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:14px; gap:10px; flex-wrap:wrap;
    }
    .counter-pill {
      background:#2563eb; color:#fff; padding:5px 14px;
      border-radius:999px; font-size:13px; font-weight:900;
    }
    .status-pill {
      font-weight:800; font-size:14px; padding:6px 14px;
      border-radius:999px; background:#f1f5f9; border:2px solid #e2e8f0;
      color:#0f172a; transition:all .2s; white-space:nowrap;
    }
    .status-pill.ok  { background:#dcfce7; border-color:#16a34a; color:#14532d; }
    .status-pill.bad { background:#fee2e2; border-color:#dc2626; color:#7f1d1d; }

    /* ── IMAGE ── */
    .q-img-wrap {
      background:#f1f5f9; border-radius:16px; overflow:hidden;
      display:flex; justify-content:center; align-items:center;
      min-height:160px; margin-bottom:16px;
    }
    .q-img-wrap img {
      width:100%; max-height:240px; object-fit:contain;
      background:#f1f5f9; display:block;
    }
    .q-img-wrap.no-img {
      min-height:0; background:transparent; border-radius:0;
    }

    /* ── SENTENCE WITH BLANK ── */
    .sentence-box {
      background:#f8fafc; border:1px solid #e2e8f0; border-radius:14px;
      padding:16px; text-align:center; font-weight:900;
      font-size:18px; color:#0f172a; line-height:1.6;
      margin-bottom:18px; white-space:pre-line;
    }
    .blank {
      display:inline-block; min-width:60px;
      padding:2px 12px; border-radius:10px;
      background:#fff; border:2px dashed #94a3b8;
      color:#64748b; font-weight:900;
      vertical-align:middle;
      transition:all .25s;
    }
    .blank.filled {
      background:#dcfce7; border-color:#16a34a;
      color:#15803d; border-style:solid;
    }

    /* ── CHOICE BUTTONS ── */
    .choices {
      display:flex; flex-direction:column; gap:10px;
    }
    .choice-btn {
      border:2px solid #e2e8f0; background:#f8fafc;
      padding:15px 18px; border-radius:14px;
      font-weight:900; font-size:18px; cursor:pointer;
      text-align:left; color:#0f172a;
      transition:border-color .15s, background .15s, transform .08s;
      display:flex; align-items:center; gap:12px;
    }
    .choice-btn:active { transform:scale(.98); }
    .choice-btn:hover:not(:disabled) { border-color:#c7d2fe; background:#eff6ff; }
    .choice-btn .lbl {
      display:inline-flex; align-items:center; justify-content:center;
      width:32px; height:32px; border-radius:50%;
      background:#e2e8f0; color:#475569; font-size:14px; font-weight:900;
      flex-shrink:0; transition:background .15s, color .15s;
    }
    .choice-btn:hover:not(:disabled) .lbl { background:#bfdbfe; color:#1e40af; }
    .choice-btn.correct { border-color:#16a34a; background:#dcfce7; color:#14532d; }
    .choice-btn.correct .lbl { background:#16a34a; color:#fff; }
    .choice-btn.wrong   { border-color:#dc2626; background:#fee2e2; color:#7f1d1d; }
    .choice-btn.wrong .lbl { background:#dc2626; color:#fff; }
    .choice-btn:disabled { cursor:not-allowed; }

    /* ── DONE / FOOTER ── */
    .done-box {
      background:#dcfce7; border:1px solid #22c55e; color:#14532d;
      padding:14px 18px; border-radius:14px; font-weight:900;
      text-align:center; margin-top:18px; font-size:16px;
    }
    .footer-actions { display:flex; justify-content:center; margin-top:20px; }
    .next-btn {
      display:inline-block; padding:12px 28px; background:#2563eb;
      color:#fff; text-decoration:none; border-radius:12px;
      font-weight:900; font-size:15px; transition:background .2s;
    }
    .next-btn:hover { background:#1e40af; }

    .hidden { display:none !important; }

    @media (max-width:480px) {
      body { padding:12px; }
      .exercise-box { padding:18px 14px; }
      .unit-title { font-size:20px; }
      .sentence-box { font-size:16px; }
      .choice-btn { font-size:16px; padding:13px 14px; }
    }
  </style>
</head>

<body>
  <a href="../index.html" class="back-btn">← Voltar à Unidade 2</a>

  <div class="progress-container">
    <div class="step active" data-go="p1.html">1</div>
    <div class="step" data-go="p2.html">2</div>
    <div class="step" data-go="p3.html">3</div>
    <div class="step" data-go="p4.html">4</div>
  </div>

  <div class="score-badge">
    <div class="score-inner"><span>⭐</span> Score: <b id="scoreBadge">0 / 14</b></div>
  </div>

  <div class="exercise-box">
    <h1 class="unit-title">AT · IN · ON</h1>
    <div class="lesson-sub">Unidade 2 · Lição 7 · Parte 1 · Repaso Final</div>

    <div class="top-row">
      <span class="counter-pill" id="counter">1 / 14</span>
      <span class="status-pill" id="statusPill">Elige la preposición correcta.</span>
    </div>

    <div class="q-img-wrap" id="imgWrap">
      <img id="qImg" alt="Question image" />
    </div>

    <div class="sentence-box" id="sentenceBox"></div>

    <div class="choices" id="choicesWrap"></div>

    <div class="done-box hidden" id="doneBox">¡Excelente trabajo! ✅</div>
    <div class="footer-actions">
      <a href="p2.html" class="next-btn hidden" id="nextBtn">Next ▶</a>
    </div>
  </div>

<script>
(() => {
  const SB       = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE = SB + "images/u2/";
  const SFX_OK   = SB + "sfx/correct.wav";
  const SFX_BAD  = SB + "sfx/incorrect.wav";

  function playOK()  { try { new Audio(SFX_OK).play();  } catch(e){} }
  function playBad() { try { new Audio(SFX_BAD).play(); } catch(e){} }

  /* ── QUIZ DATA ──
     sentence uses "___" as the blank placeholder.
     correct: index into choices[].
  */
  const QUIZ = [
    {
      img: null,
      sentence: "Mateo is not at home.\nHe is ___ school.",
      choices: ["in", "at", "on"], correct: 1
    },
    {
      img: null,
      sentence: "Emma is not at home.\nShe is ___ school.",
      choices: ["in", "at", "on"], correct: 1
    },
    {
      img: null,
      sentence: "Jane and Linda are not at home.\nThey are ___ school.",
      choices: ["in", "at", "on"], correct: 1
    },
    {
      img: null,
      sentence: "We are ___ school today.",
      choices: ["at", "in", "on"], correct: 0
    },
    {
      img: null,
      sentence: "Where is Mateo?\nHe is ___ the classroom.",
      choices: ["at", "in", "on"], correct: 1
    },
    {
      img: null,
      sentence: "Where is Emma?\nShe is ___ the classroom.",
      choices: ["at", "in", "on"], correct: 1
    },
    {
      img: null,
      sentence: "Where are Jane and Linda?\nThey are ___ the classroom.",
      choices: ["at", "in", "on"], correct: 1
    },
    {
      img: null,
      sentence: "All the students are ___ the classroom today.",
      choices: ["in", "at", "on"], correct: 0
    },
    {
      img: "u2.l6.p1.pen.jpg",
      sentence: "The pen is ___ the desk.",
      choices: ["in", "at", "on"], correct: 2
    },
    {
      img: "u2.l6.p1.book.jpg",
      sentence: "The book is ___ the desk.",
      choices: ["in", "at", "on"], correct: 2
    },
    {
      img: "u2.l2.p2.man.bedroom.jpg",
      sentence: "Where is Mateo?\nHe is ___ the bedroom.",
      choices: ["in", "at", "on"], correct: 0
    },
    {
      img: "u2.l2.p4.park1.jpg",
      sentence: "Where is Emma?\nShe is ___ the park.",
      choices: ["at", "in", "on"], correct: 1
    },
    {
      img: "u2.l7.p1.women.livingroom.jpg",
      sentence: "Where are Jane and Linda?\nThey are ___ the living room.",
      choices: ["in", "at", "on"], correct: 0
    },
    {
      img: "u2.l3.p1.man.bank1.jpg",
      sentence: "Where are you?\nI am ___ the bank.",
      choices: ["at", "in", "on"], correct: 0
    },
  ];

  const LS_KEY = "inglesco_progress_u2";
  let idx = 0, score = 0, busy = false, pageComplete = false;

  const $ = id => document.getElementById(id);
  const counter     = $("counter");
  const statusPill  = $("statusPill");
  const imgWrap     = $("imgWrap");
  const qImg        = $("qImg");
  const sentenceBox = $("sentenceBox");
  const choicesWrap = $("choicesWrap");
  const doneBox     = $("doneBox");
  const nextBtn     = $("nextBtn");

  function updateScore() {
    $("scoreBadge").textContent = `${score} / ${QUIZ.length}`;
  }

  function setStatus(msg, cls) {
    statusPill.textContent = msg;
    statusPill.className   = "status-pill" + (cls ? " " + cls : "");
  }

  function saveProgress() {
    try {
      const raw  = localStorage.getItem(LS_KEY);
      const data = raw ? JSON.parse(raw) : {};
      if (!data.l7) data.l7 = { partsCompleted:0, partsTotal:4 };
      if (!pageComplete) {
        pageComplete = true;
        data.l7.partsCompleted = Math.max(data.l7.partsCompleted || 0, 1);
        data.l7.partsTotal = 4;
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }
    } catch(e) {}
  }

  document.querySelectorAll(".step").forEach(s => {
    s.addEventListener("click", () => { const go = s.getAttribute("data-go"); if (go) window.location.href = go; });
  });

  /* ── BUILD SENTENCE WITH BLANK ── */
  function buildSentence(sentence, filledWord) {
    sentenceBox.innerHTML = "";
    const parts = sentence.split("___");
    // parts[0] + blank + parts[1]
    sentenceBox.appendChild(document.createTextNode(parts[0]));
    const blankEl = document.createElement("span");
    blankEl.className = "blank" + (filledWord ? " filled" : "");
    blankEl.textContent = filledWord || "____";
    sentenceBox.appendChild(blankEl);
    if (parts[1]) sentenceBox.appendChild(document.createTextNode(parts[1]));
    return blankEl;
  }

  /* ── LOAD QUESTION ── */
  function loadQuestion() {
    const q = QUIZ[idx];
    busy = false;

    counter.textContent = `${idx + 1} / ${QUIZ.length}`;
    setStatus("Elige la preposición correcta.");

    // Image
    if (q.img) {
      imgWrap.classList.remove("no-img");
      imgWrap.style.display = "";
      qImg.src = IMG_BASE + q.img;
      qImg.alt = "Question image";
    } else {
      imgWrap.style.display = "none";
    }

    // Sentence
    buildSentence(q.sentence, null);

    // Choices
    choicesWrap.innerHTML = "";
    const labels = ["A", "B", "C"];
    q.choices.forEach((label, ci) => {
      const btn = document.createElement("button");
      btn.type      = "button";
      btn.className = "choice-btn";
      btn.innerHTML = `<span class="lbl">${labels[ci]}</span>${label}`;

      btn.addEventListener("click", () => handleAnswer(ci, label, btn));
      choicesWrap.appendChild(btn);
    });
  }

  /* ── HANDLE ANSWER ── */
  function handleAnswer(ci, label, btn) {
    if (busy) return;
    const q = QUIZ[idx];
    const allBtns = choicesWrap.querySelectorAll(".choice-btn");

    if (ci === q.correct) {
      busy = true;
      playOK();
      btn.classList.add("correct");
      allBtns.forEach(b => b.disabled = true);
      // Fill the blank
      buildSentence(q.sentence, label);
      setStatus("✅ Correto!", "ok");
      score++;
      updateScore();

      setTimeout(() => {
        idx++;
        if (idx >= QUIZ.length) {
          finish();
        } else {
          loadQuestion();
        }
      }, 750);

    } else {
      playBad();
      btn.classList.add("wrong");
      setStatus("❌ Tente novamente.", "bad");
      setTimeout(() => {
        btn.classList.remove("wrong");
        setStatus("Elige la preposición correcta.");
      }, 700);
    }
  }

  /* ── FINISH ── */
  function finish() {
    setStatus("✅ ¡Completado!", "ok");
    choicesWrap.innerHTML = "";
    imgWrap.style.display = "none";
    sentenceBox.style.display = "none";
    counter.textContent = `${QUIZ.length} / ${QUIZ.length}`;
    doneBox.classList.remove("hidden");
    nextBtn.classList.remove("hidden");
    saveProgress();
  }

  /* ── INIT ── */
  updateScore();
  loadQuestion();
})();
</script>
</body>
</html>
