<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escribe las Palabras – Vocabulario del Aula | Inglesco Unidad 2 Lección 7</title>
  <meta name="description" content="Practica el vocabulario del aula en inglés: mira la imagen y escribe la palabra. Inglesco Unidad 2 Lección 7 Parte 2." />
  <meta name="keywords" content="vocabulario aula inglés, escribir en inglés, aprender inglés gratis, Inglesco" />
  <link rel="canonical" href="https://inglesco.co/es/units/u2/l7/p2.html" />
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins', sans-serif; }
    body { padding:20px; background:#f0fdf4; color:#1e293b; }

    /* ── BACK ── */
    .back-btn {
      display:inline-flex; align-items:center; gap:6px;
      margin-bottom:20px; padding:8px 16px;
      background:#2563eb; color:#fff; border-radius:10px;
      text-decoration:none; font-weight:700; font-size:14px;
      transition:background .2s;
    }
    .back-btn:hover { background:#1e40af; }

    /* ── PROGRESS DOTS ── */
    .progress-container { display:flex; justify-content:center; gap:10px; margin:0 0 24px 0; }
    .step {
      width:40px; height:40px; border-radius:50%; background:#d1d5db;
      display:flex; align-items:center; justify-content:center;
      font-weight:700; cursor:pointer; transition:all .25s;
      color:#1f2937; user-select:none; font-size:15px;
    }
    .step.active { background:#2563eb; color:#fff; box-shadow:0 0 0 3px #bfdbfe; }
    .step:hover { transform:scale(1.1); }

    /* ── SCORE BADGE ── */
    .score-badge { display:flex; justify-content:center; margin-bottom:14px; }
    .score-inner {
      background:#fff; border:2px solid #2563eb; border-radius:999px;
      padding:5px 18px; font-weight:800; font-size:14px; color:#1e40af;
      display:flex; align-items:center; gap:6px;
    }
    .score-inner span { font-size:18px; }

    /* ── PAGE BOX ── */
    .exercise-box {
      max-width:560px; margin:0 auto; background:#fff;
      padding:26px 28px; border-radius:20px;
      box-shadow:0 10px 30px rgba(139,92,246,0.12);
    }
    .unit-title { color:#2563eb; font-size:24px; font-weight:900; text-align:center; margin-bottom:4px; }
    .lesson-sub { text-align:center; font-weight:700; color:#475569; font-size:13px; margin-bottom:20px; }

    /* ── TOP ROW ── */
    .top-row {
      display:flex; justify-content:space-between; align-items:center;
      margin-bottom:14px; gap:10px; flex-wrap:wrap;
    }
    .counter-pill {
      background:#2563eb; color:#fff; padding:5px 14px;
      border-radius:999px; font-size:13px; font-weight:900;
    }
    .status-pill {
      font-weight:800; font-size:13px; padding:6px 14px;
      border-radius:999px; background:#f1f5f9; border:2px solid #e2e8f0;
      color:#0f172a; transition:all .2s;
    }
    .status-pill.ok   { background:#dcfce7; border-color:#16a34a; color:#14532d; }
    .status-pill.bad  { background:#fee2e2; border-color:#dc2626; color:#7f1d1d; }

    /* ── IMAGE ── */
    .img-wrap {
      background:#f1f5f9; border-radius:16px; overflow:hidden;
      display:flex; justify-content:center; align-items:center;
      min-height:200px; margin-bottom:18px;
    }
    .img-wrap img {
      width:100%; max-height:260px; object-fit:contain;
      background:#f1f5f9; display:block;
    }

    /* ── PATTERN HINT ── */
    .pattern-row {
      display:flex; align-items:center; gap:10px;
      flex-wrap:wrap; margin-bottom:14px; justify-content:center;
    }
    .pattern-box {
      font-family: ui-monospace, 'Courier New', monospace;
      font-weight:900; font-size:16px; color:#475569;
      background:#f1f5f9; border:2px dashed #94a3b8;
      border-radius:12px; padding:8px 14px;
      letter-spacing:.12em; transition:color .2s;
    }
    .pattern-box.revealed { color:#2563eb; border-color:#2563eb; border-style:solid; }

    .hint-btn {
      border:none; cursor:pointer; background:#2563eb; color:#fff;
      padding:9px 14px; border-radius:12px; font-weight:900;
      font-size:13px; transition:background .2s;
      white-space:nowrap;
    }
    .hint-btn:hover { background:#1e40af; }
    .hint-btn:disabled { opacity:.55; cursor:not-allowed; }

    /* ── INPUT ── */
    .word-input {
      width:100%; padding:14px 16px;
      border:2px solid #e2e8f0; border-radius:14px;
      font-size:18px; font-weight:900; color:#0f172a;
      outline:none; margin-bottom:16px;
      transition:border-color .2s, background .2s;
    }
    .word-input:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.15); }
    .word-input.ok  { border-color:#16a34a; background:#dcfce7; color:#14532d; }
    .word-input.bad { border-color:#dc2626; background:#fee2e2; color:#7f1d1d; }

    /* ── CHECK BUTTON ── */
    .check-btn {
      width:100%; border:none; cursor:pointer;
      background:#16a34a; color:#fff;
      padding:14px 20px; border-radius:14px;
      font-weight:900; font-size:17px;
      transition:background .2s;
      box-shadow:0 4px 14px rgba(22,163,74,0.28);
    }
    .check-btn:hover { background:#15803d; }
    .check-btn:disabled { opacity:.5; cursor:not-allowed; box-shadow:none; }

    /* ── DONE / FOOTER ── */
    .done-box {
      background:#dcfce7; border:1px solid #22c55e; color:#14532d;
      padding:14px 18px; border-radius:14px; font-weight:900;
      text-align:center; margin-top:18px; font-size:16px;
    }
    .footer-actions { display:flex; justify-content:center; margin-top:18px; }
    .next-btn {
      display:inline-block; padding:12px 28px; background:#2563eb;
      color:#fff; text-decoration:none; border-radius:12px;
      font-weight:900; font-size:15px; transition:background .2s;
    }
    .next-btn:hover { background:#1e40af; }

    .hidden { display:none !important; }

    @media (max-width:480px) {
      body { padding:12px; }
      .exercise-box { padding:18px 14px; }
      .unit-title { font-size:20px; }
      .word-input { font-size:16px; }
    }
  </style>
</head>

<body>
  <a href="../index.html" class="back-btn">← Voltar à Unidade 2</a>

  <div class="progress-container">
    <div class="step" data-go="p1.html">1</div>
    <div class="step active" data-go="p2.html">2</div>
    <div class="step" data-go="p3.html">3</div>
    <div class="step" data-go="p4.html">4</div>
  </div>

  <div class="score-badge">
    <div class="score-inner"><span>⭐</span> Score: <b id="scoreBadge">0 / 15</b></div>
  </div>

  <div class="exercise-box">
    <h1 class="unit-title">Escribe las Palabras</h1>
    <div class="lesson-sub">Unidade 2 · Lição 7 · Parte 2</div>

    <div class="top-row">
      <span class="counter-pill" id="counter">1 / 15</span>
      <span class="status-pill" id="statusPill">Escribe la palabra.</span>
    </div>

    <div class="img-wrap">
      <img id="qImg" alt="Classroom object" />
    </div>

    <div class="pattern-row">
      <div class="pattern-box" id="patternBox"></div>
      <button class="hint-btn" id="hintBtn" type="button">👁 Hint</button>
    </div>

    <input
      class="word-input" id="wordInput"
      type="text" autocomplete="off" spellcheck="false"
      inputmode="text" placeholder="Type the word here…"
    />

    <button class="check-btn" id="checkBtn" type="button" disabled>✔ Check</button>

    <div class="done-box hidden" id="doneBox">🎉 ¡Felicitaciones! Has terminado la lección. ✅</div>
    <div class="footer-actions">
      <a href="p3.html" class="next-btn hidden" id="nextBtn">Next ▶</a>
    </div>
  </div>

<script>
(() => {
  const SB       = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE = SB + "images/u2/";
  const SFX_OK   = SB + "sfx/correct.wav";
  const SFX_BAD  = SB + "sfx/incorrect.wav";

  function playOK()  { try { new Audio(SFX_OK).play();  } catch(e){} }
  function playBad() { try { new Audio(SFX_BAD).play(); } catch(e){} }

  /* ── ITEMS ── (bagpack → bag, confirmed in Supabase) */
  const ITEMS = [
    { answer:"pen",            img:"u2.l6.p1.pen.jpg",            pattern:"p _ n"                    },
    { answer:"book",           img:"u2.l6.p1.book.jpg",           pattern:"b _ _ k"                  },
    { answer:"desk",           img:"u2.l6.p1.desk.jpg",           pattern:"d _ s k"                  },
    { answer:"chair",          img:"u2.l6.p1.chair.jpg",          pattern:"ch _ _ r"                 },
    { answer:"map",            img:"u2.l6.p4.map.jpg",            pattern:"m _ p"                    },
    { answer:"clock",          img:"u2.l6.p4.clock.jpg",          pattern:"cl _ _ k"                 },
    { answer:"table",          img:"u2.l6.p4.table.jpg",          pattern:"t _ b l e"                },
    { answer:"board",          img:"u2.l6.p4.board.jpg",          pattern:"b _ a r d"                },
    { answer:"laptop",         img:"u2.l6.p1.laptop.jpg",         pattern:"l _ p t _ p"              },
    { answer:"globe",          img:"u2.l6.p1.globe.jpg",          pattern:"gl _ b e"                 },
    { answer:"pencil",         img:"u2.l6.p4.pencil.jpg",         pattern:"p e n c _ l"              },
    { answer:"bag",            img:"u2.l6.p1.bag.jpg",            pattern:"b _ g"                    },
    { answer:"dictionary",     img:"u2.l6.p1.dictionary.jpg",     pattern:"d i c t i _ n a r y"      },
    { answer:"bookshelf",      img:"u2.l6.p4.bookshelf.jpg",      pattern:"b _ _ k s h e l f"        },
    { answer:"bulletin board", img:"u2.l6.p4.bulletin.board.jpg", pattern:"b u l l e t i n  b _ a r d" },
  ];

  /* ── STATE ── */
  const LS_KEY = "inglesco_progress_u2";
  let idx = 0, score = 0, pageComplete = false;
  let hintLock = false, hintTimer = null;

  const $ = id => document.getElementById(id);
  const counter    = $("counter");
  const statusPill = $("statusPill");
  const qImg       = $("qImg");
  const patternBox = $("patternBox");
  const hintBtn    = $("hintBtn");
  const wordInput  = $("wordInput");
  const checkBtn   = $("checkBtn");
  const doneBox    = $("doneBox");
  const nextBtn    = $("nextBtn");

  function normalize(s) {
    return String(s || "").trim().toLowerCase().replace(/\s+/g, " ");
  }

  function updateScore() {
    $("scoreBadge").textContent = `${score} / ${ITEMS.length}`;
  }

  function setStatus(msg, cls) {
    statusPill.textContent = msg;
    statusPill.className   = "status-pill" + (cls ? " " + cls : "");
  }

  function saveProgress() {
    try {
      const raw  = localStorage.getItem(LS_KEY);
      const data = raw ? JSON.parse(raw) : {};
      if (!data.l7) data.l7 = { partsCompleted:0, partsTotal:4 };
      if (!pageComplete) {
        pageComplete = true;
        data.l7.partsCompleted = Math.max(data.l7.partsCompleted || 0, 2);
        data.l7.partsTotal = 4;
        localStorage.setItem(LS_KEY, JSON.stringify(data));
      }
    } catch(e) {}
  }

  document.querySelectorAll(".step").forEach(s => {
    s.addEventListener("click", () => { const go = s.getAttribute("data-go"); if (go) window.location.href = go; });
  });

  /* ── LOAD ITEM ── */
  function loadItem() {
    const item = ITEMS[idx];
    hintLock = false;
    clearTimeout(hintTimer);

    counter.textContent      = `${idx + 1} / ${ITEMS.length}`;
    qImg.src                 = IMG_BASE + item.img;
    qImg.alt                 = item.answer;
    patternBox.textContent   = item.pattern;
    patternBox.classList.remove("revealed");
    hintBtn.disabled         = false;
    hintBtn.textContent      = "👁 Hint";
    wordInput.value          = "";
    wordInput.className      = "word-input";
    wordInput.disabled       = false;
    wordInput.focus();
    checkBtn.disabled        = true;
    setStatus("Escribe la palabra.");
  }

  /* ── INPUT LISTENER ── */
  wordInput.addEventListener("input", () => {
    wordInput.classList.remove("ok", "bad");
    checkBtn.disabled = normalize(wordInput.value).length === 0;
  });

  /* Allow Enter key to trigger check */
  wordInput.addEventListener("keydown", e => {
    if (e.key === "Enter" && !checkBtn.disabled) checkBtn.click();
  });

  /* ── HINT ── */
  hintBtn.addEventListener("click", () => {
    if (hintLock) return;
    hintLock = true;
    hintBtn.disabled = true;
    hintBtn.textContent = "⏳";

    patternBox.textContent = ITEMS[idx].answer;
    patternBox.classList.add("revealed");

    hintTimer = setTimeout(() => {
      patternBox.textContent = ITEMS[idx].pattern;
      patternBox.classList.remove("revealed");
      hintLock = false;
      hintBtn.disabled = false;
      hintBtn.textContent = "👁 Hint";
    }, 2000);
  });

  /* ── CHECK ── */
  checkBtn.addEventListener("click", () => {
    const typed    = normalize(wordInput.value);
    const expected = normalize(ITEMS[idx].answer);

    if (typed === expected) {
      playOK();
      wordInput.className = "word-input ok";
      wordInput.disabled  = true;
      checkBtn.disabled   = true;
      hintBtn.disabled    = true;
      clearTimeout(hintTimer);
      patternBox.textContent = ITEMS[idx].answer;
      patternBox.classList.add("revealed");
      setStatus("✅ Correto!", "ok");
      score++;
      updateScore();

      setTimeout(() => {
        idx++;
        if (idx >= ITEMS.length) {
          finish();
        } else {
          loadItem();
        }
      }, 900);

    } else {
      playBad();
      wordInput.className = "word-input bad";
      setStatus("❌ Tente novamente.", "bad");
      setTimeout(() => {
        wordInput.className = "word-input";
        setStatus("Escribe la palabra.");
        wordInput.select();
      }, 800);
    }
  });

  /* ── FINISH ── */
  function finish() {
    setStatus("✅ ¡Completado!", "ok");
    qImg.src = "";
    patternBox.textContent = "";
    hintBtn.classList.add("hidden");
    wordInput.classList.add("hidden");
    checkBtn.classList.add("hidden");
    counter.textContent = `${ITEMS.length} / ${ITEMS.length}`;
    doneBox.classList.remove("hidden");
    nextBtn.classList.remove("hidden");
    saveProgress();
  }

  /* ── INIT ── */
  updateScore();
  loadItem();
})();
</script>
</body>
</html>
