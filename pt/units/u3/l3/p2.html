<!-- u3/l3/p2.html  (Unidade 3 / Lição 3 / Parte 2) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidade 3 • Lição 3 • Parte 2</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vercel Insights -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px 16px 40px;
      background: linear-gradient(135deg, #dbeafe 0%, #fef9c3 100%);
      color: #111827;
      margin: 0;
      min-height: 100vh;
    }

    .wrap { max-width: 600px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── Header ── */
    .top-title {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 6px;
      color: #1e3a8a;
    }
    .subline {
      text-align: center;
      margin: 0 0 14px;
    }
    .subline span {
      background: rgba(255,255,255,.75);
      padding: 5px 14px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 15px;
      display: inline-block;
    }

    /* ── Score bar ── */
    .score-bar {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 14px;
    }
    .score-pill {
      background: rgba(255,255,255,.80);
      border-radius: 20px;
      padding: 5px 16px;
      font-weight: 800;
      font-size: 14px;
      color: #1e3a8a;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    /* ── Progress dots ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 20px;
    }
    .step {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all .25s;
      color: #374151;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; box-shadow: 0 3px 10px rgba(37,99,235,.35); }
    .step:hover { transform: scale(1.1); }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Image ── */
    .img-wrap {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #f1f5f9;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      margin-bottom: 10px;
    }
    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      max-height: 220px;
    }

    /* ── Who label ── */
    .who {
      text-align: center;
      font-weight: 800;
      font-size: 16px;
      background: rgba(255,255,255,.75);
      border-radius: 12px;
      padding: 8px 14px;
      margin-bottom: 8px;
      color: #1e3a8a;
    }

    /* ── Round label ── */
    .round-label {
      text-align: center;
      font-weight: 800;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    /* ── Script box ── */
    .script {
      background: rgba(255,255,255,.70);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }
    .script .line {
      display: block;
      font-weight: 700;
      font-size: 15px;
      color: #1e3a8a;
      margin: 3px 0;
      line-height: 1.4;
    }

    /* ── Q box ── */
    .qbox {
      background: rgba(255,255,255,.75);
      border-radius: 14px;
      padding: 12px;
      border: 2px solid transparent;
    }
    .qtitle {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #1f2937;
    }
    .status {
      min-width: 32px;
      text-align: right;
      font-weight: 900;
      font-size: 20px;
    }
    .status.ok  { color: #16a34a; }
    .status.bad { color: #dc2626; }

    /* ── Prompts ── */
    .prompt {
      font-weight: 800;
      font-size: 16px;
      margin: 6px 0 10px;
      line-height: 1.35;
      color: #111827;
    }
    .blank {
      display: inline-block;
      padding: 0 10px;
      border-bottom: 3px solid rgba(17,24,39,.45);
      border-radius: 4px;
      min-width: 68px;
      text-align: center;
      color: #6b7280;
    }
    .blank.answered {
      border-bottom-color: #16a34a;
      color: #16a34a;
      font-weight: 900;
    }

    /* ── Options ── */
    .options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
      margin-top: 4px;
    }
    .opt {
      width: 100%;
      text-align: center;
      border: 2px solid rgba(17,24,39,.12);
      background: #fff;
      border-radius: 12px;
      padding: 12px 10px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .opt:hover:not(:disabled) { border-color: rgba(37,99,235,.5); background: #eff6ff; }
    .opt.correct  { border-color: #16a34a; background: rgba(22,163,74,.10); }
    .opt.wrong    { border-color: #dc2626; background: rgba(220,38,38,.08); }
    .opt:disabled { cursor: not-allowed; }

    /* ── Feedback ── */
    .feedback {
      text-align: center;
      font-weight: 900;
      font-size: 18px;
      color: #16a34a;
      margin: 10px 0 2px;
    }

    /* ── End screen ── */
    .end {
      text-align: center;
      padding: 10px 0 4px;
    }
    .end h2 {
      font-size: 22px;
      font-weight: 900;
      margin: 0 0 6px;
      color: #1e3a8a;
    }
    .end .final-score {
      font-size: 16px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 16px;
    }
    .next-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 4px 14px rgba(37,99,235,.3);
    }
    .next-btn:hover { background: #1d4ed8; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      body { padding: 12px 12px 36px; }
      .step { width: 34px; height: 34px; font-size: 14px; }
      .top-title { font-size: 16px; }
      .opt { font-size: 15px; padding: 11px 8px; }
      .img-wrap img { max-height: 180px; }
      .options { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">← Voltar à Unidade 3</a>

  <div class="top-title">Unidade 3 • Lição 3 • Parte 2</div>
  <div class="subline"><span><b>We are • They are</b></span></div>

  <!-- Score bar -->
  <div class="score-bar">
    <div class="score-pill">✅ <span id="scoreCorrect">0</span> corretas</div>
    <div class="score-pill">❌ <span id="scoreWrong">0</span> erros</div>
  </div>

  <!-- Progress steps -->
  <div class="progress-container">
    <a class="step" href="p1.html" aria-label="Parte 1">1</a>
    <a class="step active" href="p2.html" aria-label="Parte 2">2</a>
    <a class="step" href="p3.html" aria-label="Parte 3">3</a>
    <a class="step" href="p4.html" aria-label="Parte 4">4</a>
  </div>

  <div class="card">

    <!-- Image -->
    <div class="img-wrap">
      <img id="sceneImg" src="" alt="Cena" />
    </div>

    <div class="who" id="whoLabel"></div>
    <div class="round-label" id="roundLabel">1 / 6</div>

    <!-- Reference sentences -->
    <div class="script" aria-live="polite">
      <span class="line" id="fullLine1"></span>
      <span class="line" id="fullLine2"></span>
    </div>

    <!-- Q box -->
    <div class="qbox" id="qBox">
      <div class="qtitle">
        <span>Escolha o pronome correto</span>
        <span class="status" id="qStatus"></span>
      </div>

      <div class="prompt" id="prompt1"></div>
      <div class="prompt" id="prompt2"></div>

      <div class="options" id="optionsGrid"></div>

      <div class="feedback hidden" id="feedbackOk">Muito bem! ✅</div>
    </div>

    <!-- End screen -->
    <div class="end hidden" id="endScreen">
      <h2>Excelente trabalho! 🎉</h2>
      <div class="final-score" id="finalScore"></div>
      <a class="next-btn" href="p3.html">Próxima (P3) →</a>
    </div>

  </div><!-- /card -->
</div><!-- /wrap -->

<script>
(() => {
  "use strict";

  const SUPABASE   = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE   = SUPABASE + "images/u3/";
  const SFX_CORRECT = SUPABASE + "sfx/correct.wav";
  const GAP_MS     = 650;
  const PROGRESS_KEY = "inglesco_progress_u3";
  const FURTHEST_KEY = "inglesco_furthest_u3_l3";

  // ── Scenes ──────────────────────────────────────────────────────────────
  const SCENES = [
    {
      img: "u3.l3.p1.clark.jpg",
      who: "Mr. and Mrs. Clark",
      line1: "Mr. and Mrs. Clark are in the dining room.",
      line2: "They are eating dinner.",
      correctPronoun: "They",
      p1: "_____ are in the dining room.",
      p2: "_____ are eating dinner."
    },
    {
      img: "u3.l3.p2.library.jpg",
      who: "Julie and Martha",
      line1: "Julie and Martha are at the library.",
      line2: "They are reading books.",
      correctPronoun: "They",
      p1: "_____ are at the library.",
      p2: "_____ are reading books."
    },
    {
      img: "u3.l3.p1.we.cards.jpg",
      who: "We",
      line1: "We are in the living room.",
      line2: "We are playing cards.",
      correctPronoun: "We",
      p1: "_____ are in the living room.",
      p2: "_____ are playing cards."
    },
    {
      img: "u3.l3.p1.gary.phil.jpg",
      who: "Gary and Phil",
      line1: "Gary and Phil are in the yard.",
      line2: "They are playing baseball.",
      correctPronoun: "They",
      p1: "_____ are in the yard.",
      p2: "_____ are playing baseball."
    },
    {
      img: "u3.l3.p2.kitchen.jpg",
      who: "Tom and I",
      line1: "Tom and I are in the kitchen.",
      line2: "We are cooking dinner.",
      correctPronoun: "We",
      p1: "_____ are in the kitchen.",
      p2: "_____ are cooking dinner."
    },
    {
      img: "u3.l3.p2.tv.jpg",
      who: "Carol and Ken",
      line1: "Carol and Ken are in the living room.",
      line2: "They are watching TV.",
      correctPronoun: "They",
      p1: "_____ are in the living room.",
      p2: "_____ are watching TV."
    }
  ];

  const CHOICES = ["We", "They", "He", "She"];

  // ── DOM ──────────────────────────────────────────────────────────────────
  const sceneImg     = document.getElementById("sceneImg");
  const whoLabel     = document.getElementById("whoLabel");
  const roundLabel   = document.getElementById("roundLabel");
  const fullLine1    = document.getElementById("fullLine1");
  const fullLine2    = document.getElementById("fullLine2");
  const qStatus      = document.getElementById("qStatus");
  const prompt1      = document.getElementById("prompt1");
  const prompt2      = document.getElementById("prompt2");
  const optionsGrid  = document.getElementById("optionsGrid");
  const feedbackOk   = document.getElementById("feedbackOk");
  const endScreen    = document.getElementById("endScreen");
  const scoreCorrect = document.getElementById("scoreCorrect");
  const scoreWrong   = document.getElementById("scoreWrong");
  const finalScore   = document.getElementById("finalScore");

  // ── State ────────────────────────────────────────────────────────────────
  const sfxOk  = new Audio(SFX_CORRECT);
  const order  = fisherYates([...SCENES]);
  let idx      = 0;
  let step     = 1;   // 1 = answering prompt1, 2 = answering prompt2
  let locked   = false;
  let correctCount = 0;
  let wrongCount   = 0;
  let p1FirstAttempt = true;
  let p2FirstAttempt = true;

  // ── Helpers ──────────────────────────────────────────────────────────────
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const hide  = el => el.classList.add("hidden");
  const show  = el => el.classList.remove("hidden");

  function updateScoreUI() {
    scoreCorrect.textContent = correctCount;
    scoreWrong.textContent   = wrongCount;
  }

  function setStatus(ok) {
    qStatus.textContent = ok ? "✓" : "✗";
    qStatus.className   = "status " + (ok ? "ok" : "bad");
  }

  function clearStatus() {
    qStatus.textContent = "";
    qStatus.className   = "status";
  }

  function fisherYates(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function makePromptHTML(text, answeredWord) {
    if (answeredWord) {
      return text.replace("_____", `<span class="blank answered">${answeredWord}</span>`);
    }
    return text.replace("_____", '<span class="blank">_____</span>');
  }

  function setOptionsDisabled(disabled) {
    optionsGrid.querySelectorAll("button.opt").forEach(b => b.disabled = disabled);
  }

  function resetOptionStyles() {
    optionsGrid.querySelectorAll("button.opt").forEach(b => {
      b.disabled = false;
      b.classList.remove("correct", "wrong");
    });
  }

  function playSfxCorrect() {
    sfxOk.currentTime = 0;
    sfxOk.play().catch(() => {});
  }

  function saveProgress() {
    try {
      const raw  = localStorage.getItem(PROGRESS_KEY);
      const data = raw ? JSON.parse(raw) : {};
      if (!data.l3) data.l3 = { partsCompleted: 0, partsTotal: 4 };
      if (data.l3.partsCompleted < 2) data.l3.partsCompleted = 2;
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));

      const cur = parseInt(localStorage.getItem(FURTHEST_KEY) || "0", 10);
      if (cur < 2) localStorage.setItem(FURTHEST_KEY, "2");
    } catch(e) {}
  }

  function buildOptions() {
    optionsGrid.innerHTML = "";
    fisherYates([...CHOICES]).forEach(c => {
      const btn = document.createElement("button");
      btn.type        = "button";
      btn.className   = "opt";
      btn.textContent = c;

      let moved = false;
      btn.addEventListener("touchstart", () => { moved = false; }, { passive: true });
      btn.addEventListener("touchmove",  () => { moved = true;  }, { passive: true });
      btn.addEventListener("touchend",   e  => { if (!moved) { e.preventDefault(); onPick(btn, c); } }, { passive: false });
      btn.addEventListener("click",      ()  => onPick(btn, c));

      optionsGrid.appendChild(btn);
    });
  }

  function renderScene() {
    const s = order[idx];

    hide(endScreen);
    hide(feedbackOk);
    locked         = false;
    step           = 1;
    p1FirstAttempt = true;
    p2FirstAttempt = true;

    sceneImg.src           = IMG_BASE + s.img;
    whoLabel.textContent   = s.who;
    roundLabel.textContent = `${idx + 1} / ${order.length}`;
    fullLine1.textContent  = s.line1;
    fullLine2.textContent  = s.line2;

    prompt1.innerHTML = makePromptHTML(s.p1);
    prompt2.innerHTML = makePromptHTML(s.p2);
    prompt2.style.opacity = "0.4";

    clearStatus();
    buildOptions();
  }

  async function onPick(btn, choice) {
    if (locked) return;
    locked = true;

    const s  = order[idx];
    const ok = choice === s.correctPronoun;

    if (ok) {
      btn.classList.add("correct");
      playSfxCorrect();

      if (step === 1) {
        if (p1FirstAttempt) { correctCount++; updateScoreUI(); }

        prompt1.innerHTML     = makePromptHTML(s.p1, choice);
        prompt2.style.opacity = "1";

        setOptionsDisabled(true);
        show(feedbackOk);
        await sleep(GAP_MS);
        hide(feedbackOk);

        step   = 2;
        locked = false;
        clearStatus();
        resetOptionStyles();

      } else {
        if (p2FirstAttempt) { correctCount++; updateScoreUI(); }

        prompt2.innerHTML = makePromptHTML(s.p2, choice);
        setStatus(true);
        show(feedbackOk);
        setOptionsDisabled(true);
        await sleep(GAP_MS);
        hide(feedbackOk);

        idx++;
        if (idx >= order.length) {
          saveProgress();
          finalScore.textContent = `Respostas corretas: ${correctCount} / ${order.length * 2}`;
          show(endScreen);
        } else {
          renderScene();
        }
      }

    } else {
      btn.classList.add("wrong");
      setStatus(false);

      if (step === 1 && p1FirstAttempt) { wrongCount++;  updateScoreUI(); p1FirstAttempt = false; }
      if (step === 2 && p2FirstAttempt) { wrongCount++;  updateScoreUI(); p2FirstAttempt = false; }

      locked = false;
    }
  }

  renderScene();
})();
</script>

</body>
</html>
