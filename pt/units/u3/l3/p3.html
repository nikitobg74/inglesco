<!-- u3/l3/p3.html  (Unidade 3 / Lição 3 / Parte 3) -->
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidade 3 • Lição 3 • Parte 3</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vercel Insights -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px 16px 40px;
      background: linear-gradient(135deg, #dbeafe 0%, #fef9c3 100%);
      color: #111827;
      margin: 0;
      min-height: 100vh;
    }

    .wrap { max-width: 600px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── Header ── */
    .top-title {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 6px;
      color: #1e3a8a;
    }
    .subline {
      text-align: center;
      margin: 0 0 14px;
    }
    .subline span {
      background: rgba(255,255,255,.75);
      padding: 5px 14px;
      border-radius: 10px;
      font-weight: 800;
      font-size: 15px;
      display: inline-block;
    }

    /* ── Score bar ── */
    .score-bar {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin-bottom: 14px;
    }
    .score-pill {
      background: rgba(255,255,255,.80);
      border-radius: 20px;
      padding: 5px 16px;
      font-weight: 800;
      font-size: 14px;
      color: #1e3a8a;
      display: flex;
      align-items: center;
      gap: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    /* ── Progress dots ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 20px;
    }
    .step {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all .25s;
      color: #374151;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; box-shadow: 0 3px 10px rgba(37,99,235,.35); }
    .step:hover { transform: scale(1.1); }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Image ── */
    .img-wrap {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #f1f5f9;
      box-shadow: 0 4px 14px rgba(0,0,0,.08);
      margin-bottom: 12px;
    }
    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      max-height: 220px;
    }

    /* ── Play button ── */
    .controls {
      display: flex;
      justify-content: center;
      margin-bottom: 8px;
    }
    .btn-play {
      border: 0;
      border-radius: 12px;
      padding: 10px 24px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 800;
      font-size: 15px;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      box-shadow: 0 4px 12px rgba(37,99,235,.25);
      transition: background .15s, transform .1s;
      width: 100%;
      max-width: 340px;
    }
    .btn-play:hover { background: #1d4ed8; }
    .btn-play:active { transform: translateY(1px); }
    .btn-play:disabled { background: #93c5fd; cursor: not-allowed; }

    /* ── Round label ── */
    .round-label {
      text-align: center;
      font-weight: 800;
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    /* ── Script box ── */
    .script {
      background: rgba(255,255,255,.70);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 14px;
    }
    .script .line {
      display: block;
      font-weight: 700;
      font-size: 15px;
      color: #1e3a8a;
      margin: 3px 0;
      line-height: 1.4;
    }

    /* ── Q box ── */
    .qbox {
      background: rgba(255,255,255,.75);
      border-radius: 14px;
      padding: 12px;
    }
    .qtitle {
      font-weight: 800;
      font-size: 15px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      color: #1f2937;
    }
    .status {
      min-width: 32px;
      text-align: right;
      font-weight: 900;
      font-size: 20px;
    }
    .status.ok  { color: #16a34a; }
    .status.bad { color: #dc2626; }

    /* ── Prompt ── */
    .prompt {
      font-weight: 800;
      font-size: 17px;
      margin: 0 0 12px;
      line-height: 1.35;
      color: #111827;
    }
    .blank {
      display: inline-block;
      padding: 0 10px;
      border-bottom: 3px solid rgba(17,24,39,.45);
      border-radius: 4px;
      min-width: 96px;
      text-align: center;
      color: #6b7280;
    }
    .blank.answered {
      border-bottom-color: #16a34a;
      color: #16a34a;
      font-weight: 900;
    }

    /* ── Tiles ── */
    .tiles { display: grid; gap: 9px; }
    .tile {
      width: 100%;
      text-align: left;
      border: 2px solid rgba(17,24,39,.12);
      background: #fff;
      border-radius: 12px;
      padding: 12px 14px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 800;
      font-size: 16px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
    }
    .tile:hover:not(:disabled) { border-color: rgba(37,99,235,.5); background: #eff6ff; }
    .tile.correct  { border-color: #16a34a; background: rgba(22,163,74,.10); }
    .tile.wrong    { border-color: #dc2626; background: rgba(220,38,38,.08); }
    .tile:disabled { cursor: not-allowed; }

    /* ── Feedback ── */
    .feedback {
      text-align: center;
      font-weight: 900;
      font-size: 18px;
      color: #16a34a;
      margin: 10px 0 2px;
    }

    /* ── End screen ── */
    .end {
      text-align: center;
      padding: 10px 0 4px;
    }
    .end h2 {
      font-size: 22px;
      font-weight: 900;
      margin: 0 0 6px;
      color: #1e3a8a;
    }
    .end .final-score {
      font-size: 16px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 16px;
    }
    .next-btn {
      display: inline-block;
      padding: 12px 24px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 800;
      font-size: 16px;
      box-shadow: 0 4px 14px rgba(37,99,235,.3);
    }
    .next-btn:hover { background: #1d4ed8; }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      body { padding: 12px 12px 36px; }
      .step { width: 34px; height: 34px; font-size: 14px; }
      .top-title { font-size: 16px; }
      .tile { font-size: 15px; padding: 11px 12px; }
      .prompt { font-size: 16px; }
      .img-wrap img { max-height: 180px; }
    }
  </style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">← Voltar à Unidade 3</a>

  <div class="top-title">Unidade 3 • Lição 3 • Parte 3</div>
  <div class="subline"><span><b>What are they doing?</b></span></div>

  <!-- Score bar -->
  <div class="score-bar">
    <div class="score-pill">✅ <span id="scoreCorrect">0</span> corretas</div>
    <div class="score-pill">❌ <span id="scoreWrong">0</span> erros</div>
  </div>

  <!-- Progress steps -->
  <div class="progress-container">
    <a class="step" href="p1.html" aria-label="Parte 1">1</a>
    <a class="step" href="p2.html" aria-label="Parte 2">2</a>
    <a class="step active" href="p3.html" aria-label="Parte 3">3</a>
    <a class="step" href="p4.html" aria-label="Parte 4">4</a>
  </div>

  <div class="card">

    <!-- Image -->
    <div class="img-wrap">
      <img id="sceneImg" src="" alt="Cena" />
    </div>

    <!-- Play button -->
    <div class="controls">
      <button id="playBtn" class="btn-play" type="button">▶ Ouvir</button>
    </div>

    <div class="round-label" id="roundLabel">1 / 6</div>

    <!-- Script (hidden until audio plays) -->
    <div class="script hidden" id="scriptBox" aria-live="polite">
      <span class="line" id="line1"></span>
      <span class="line" id="line2"></span>
    </div>

    <!-- Q box -->
    <div class="qbox">
      <div class="qtitle">
        <span id="qText">What are they doing?</span>
        <span class="status" id="qStatus"></span>
      </div>

      <div class="prompt" id="prompt"></div>

      <div class="tiles" id="tilesGrid"></div>
      <div class="feedback hidden" id="feedbackOk">Muito bem! ✅</div>
    </div>

    <!-- End screen -->
    <div class="end hidden" id="endScreen">
      <h2>Excelente trabalho! 🎉</h2>
      <div class="final-score" id="finalScore"></div>
      <a class="next-btn" href="p4.html">Próxima (P4) →</a>
    </div>

  </div><!-- /card -->
</div><!-- /wrap -->

<script>
(() => {
  "use strict";

  const SUPABASE    = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE    = SUPABASE + "images/u3/";
  const AUDIO_BASE  = SUPABASE + "audio/u3/";
  const SFX_CORRECT = SUPABASE + "sfx/correct.wav";
  const GAP_MS      = 600;
  const PROGRESS_KEY = "inglesco_progress_u3";
  const FURTHEST_KEY = "inglesco_furthest_u3_l3";

  // ── Scenes ──────────────────────────────────────────────────────────────
  const SCENES = [
    {
      img: "u3.l3.p3.library.jpg",
      audio: "u3.l3.p3.studying.mp3",
      line1: "Sam and Jess are at the library.",
      line2: "They are studying English.",
      subject: "they",
      verb: "studying",
      distractors: ["sleeping", "drinking"]
    },
    {
      img: "u3.l3.p3.math.jpg",
      audio: "u3.l3.p3.math.mp3",
      line1: "Mrs. Johnson is in the classroom.",
      line2: "She is teaching math.",
      subject: "she",
      verb: "teaching",
      distractors: ["sleeping", "drinking"]
    },
    {
      img: "u3.l3.p3.swimming.jpg",
      audio: "u3.l3.p3.pool.mp3",
      line1: "Gary and Phil are at the pool.",
      line2: "They are swimming in the pool.",
      subject: "they",
      verb: "swimming",
      distractors: ["sleeping", "studying"]
    },
    {
      img: "u3.l3.p3.bank.jpg",
      audio: "u3.l3.p3.working.mp3",
      line1: "Mr. Lopez is at the bank.",
      line2: "He is working at the bank.",
      subject: "he",
      verb: "working",
      distractors: ["sleeping", "swimming"]
    },
    {
      img: "u3.l3.p3.flowers.jpg",
      audio: "u3.l3.p3.planting.mp3",
      line1: "Carol and Jenny are in the garden.",
      line2: "They are planting flowers.",
      subject: "they",
      verb: "planting",
      distractors: ["drinking", "working"]
    },
    {
      img: "u3.l3.p3.sleeping.jpg",
      audio: "u3.l3.p3.sleeping.mp3",
      line1: "Tom is in the bedroom.",
      line2: "He is sleeping.",
      subject: "he",
      verb: "sleeping",
      distractors: ["studying", "planting"]
    }
  ];

  // ── DOM ──────────────────────────────────────────────────────────────────
  const sceneImg     = document.getElementById("sceneImg");
  const playBtn      = document.getElementById("playBtn");
  const roundLabel   = document.getElementById("roundLabel");
  const scriptBox    = document.getElementById("scriptBox");
  const line1        = document.getElementById("line1");
  const line2        = document.getElementById("line2");
  const qText        = document.getElementById("qText");
  const promptEl     = document.getElementById("prompt");
  const tilesGrid    = document.getElementById("tilesGrid");
  const qStatus      = document.getElementById("qStatus");
  const feedbackOk   = document.getElementById("feedbackOk");
  const endScreen    = document.getElementById("endScreen");
  const scoreCorrect = document.getElementById("scoreCorrect");
  const scoreWrong   = document.getElementById("scoreWrong");
  const finalScore   = document.getElementById("finalScore");

  // ── State ────────────────────────────────────────────────────────────────
  const player  = new Audio();
  const sfxOk   = new Audio(SFX_CORRECT);
  player.preload = "auto";

  let idx          = 0;
  let phase        = "need_play"; // need_play | ready | locked | ended
  let audioUnlocked = false;
  let correctCount = 0;
  let wrongCount   = 0;
  let firstAttempt = true;

  // ── Helpers ──────────────────────────────────────────────────────────────
  const sleep = ms => new Promise(r => setTimeout(r, ms));
  const hide  = el => el.classList.add("hidden");
  const show  = el => el.classList.remove("hidden");

  function updateScoreUI() {
    scoreCorrect.textContent = correctCount;
    scoreWrong.textContent   = wrongCount;
  }

  function clearStatus() {
    qStatus.textContent = "";
    qStatus.className   = "status";
  }

  function setStatus(ok) {
    qStatus.textContent = ok ? "✓" : "✗";
    qStatus.className   = "status " + (ok ? "ok" : "bad");
  }

  function fisherYates(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function subjectParts(subject) {
    if (subject === "he")   return { q: "What is he doing?",    lead: "He is" };
    if (subject === "she")  return { q: "What is she doing?",   lead: "She is" };
    return                         { q: "What are they doing?", lead: "They are" };
  }

  function setTilesDisabled(disabled) {
    tilesGrid.querySelectorAll("button.tile").forEach(b => b.disabled = disabled);
  }

  async function playAudio(filename) {
    player.pause();
    player.currentTime = 0;
    player.src = AUDIO_BASE + filename;
    try { await player.play(); return true; } catch { return false; }
  }

  function playSfxCorrect() {
    sfxOk.currentTime = 0;
    sfxOk.play().catch(() => {});
  }

  // ── Progress tracking ────────────────────────────────────────────────────
  function saveProgress() {
    try {
      const raw  = localStorage.getItem(PROGRESS_KEY);
      const data = raw ? JSON.parse(raw) : {};
      if (!data.l3) data.l3 = { partsCompleted: 0, partsTotal: 4 };
      if (data.l3.partsCompleted < 3) data.l3.partsCompleted = 3;
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));

      const cur = parseInt(localStorage.getItem(FURTHEST_KEY) || "0", 10);
      if (cur < 3) localStorage.setItem(FURTHEST_KEY, "3");
    } catch(e) {}
  }

  // ── Scene rendering ──────────────────────────────────────────────────────
  function renderScene() {
    const s  = SCENES[idx];
    const sp = subjectParts(s.subject);

    hide(endScreen);
    hide(feedbackOk);
    hide(scriptBox);
    clearStatus();

    sceneImg.src           = IMG_BASE + s.img;
    roundLabel.textContent = `${idx + 1} / ${SCENES.length}`;
    line1.textContent      = s.line1;
    line2.textContent      = s.line2;

    qText.textContent  = sp.q;
    promptEl.innerHTML = `${sp.lead} <span class="blank">_____</span>.`;

    tilesGrid.innerHTML = "";
    fisherYates([s.verb, ...s.distractors].slice(0, 3)).forEach(word => {
      const btn = document.createElement("button");
      btn.type      = "button";
      btn.className = "tile";
      btn.textContent = word;

      let moved = false;
      btn.addEventListener("touchstart", () => { moved = false; }, { passive: true });
      btn.addEventListener("touchmove",  () => { moved = true;  }, { passive: true });
      btn.addEventListener("touchend",   e  => { if (!moved) { e.preventDefault(); onPick(btn, word); } }, { passive: false });
      btn.addEventListener("click",      ()  => onPick(btn, word));

      tilesGrid.appendChild(btn);
    });

    firstAttempt     = true;
    phase            = "need_play";
    playBtn.disabled = false;
    playBtn.textContent = "▶ Ouvir";
    setTilesDisabled(true);
  }

  function unlockScene() {
    show(scriptBox);
    setTilesDisabled(false);
    phase = "ready";
  }

  playBtn.addEventListener("click", async () => {
    if (phase === "ended") return;
    const ok = await playAudio(SCENES[idx].audio);
    if (ok) audioUnlocked = true;
    unlockScene();
    playBtn.textContent = "▶ Repetir";
  });

  async function onPick(btn, word) {
    if (phase !== "ready") return;
    phase = "locked";

    const s  = SCENES[idx];
    const sp = subjectParts(s.subject);
    const ok = word === s.verb;

    if (ok) {
      btn.classList.add("correct");
      setStatus(true);
      playSfxCorrect();

      promptEl.innerHTML = `${sp.lead} <span class="blank answered">${word}</span>.`;

      if (firstAttempt) { correctCount++; updateScoreUI(); }

      show(feedbackOk);
      setTilesDisabled(true);
      await sleep(GAP_MS);
      hide(feedbackOk);

      idx++;
      if (idx >= SCENES.length) {
        phase = "ended";
        playBtn.disabled = true;
        saveProgress();
        finalScore.textContent = `Respostas corretas: ${correctCount} / ${SCENES.length}`;
        show(endScreen);
        return;
      }

      renderScene();

      if (audioUnlocked) {
        const okAuto = await playAudio(SCENES[idx].audio);
        if (okAuto) unlockScene();
        playBtn.textContent = "▶ Repetir";
      }

    } else {
      btn.classList.add("wrong");
      setStatus(false);
      if (firstAttempt) { wrongCount++; updateScoreUI(); }
      firstAttempt = false;
      phase = "ready";
    }
  }

  renderScene();
})();
</script>

</body>
</html>
