<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Unidade 3 • Lição 4 • Parte 1</title>
  <link rel="icon" type="image/svg+xml" href="../../../../favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Vercel Insights -->
  <script>window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };</script>
  <script defer src="/_vercel/insights/script.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe 0%, #fef9c3 100%);
      min-height: 100vh;
    }

    .wrap { max-width: 640px; margin: 0 auto; }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 8px 16px;
      background: #2563eb;
      color: #fff;
      border-radius: 10px;
      text-decoration: none;
      font-weight: 700;
      font-size: 14px;
    }
    .back-btn:hover { background: #1e40af; }

    /* ── Page header ── */
    .top-title {
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      margin: 0 0 6px;
    }
    .topic-badge {
      text-align: center;
      margin: 0 0 6px;
    }
    .topic-badge span {
      background: rgba(255,255,255,.75);
      padding: 5px 14px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 15px;
      display: inline-block;
    }
    .subline {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
      color: #374151;
      margin: 0 0 14px;
    }

    /* ── Score bar ── */
    .score-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 18px;
      margin-bottom: 14px;
    }
    .score-pill {
      background: rgba(255,255,255,.8);
      border-radius: 20px;
      padding: 5px 16px;
      font-weight: 800;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .score-pill .icon { font-size: 16px; }
    .score-pill.green { color: #16a34a; }
    .score-pill.blue  { color: #2563eb; }

    /* ── Step dots ── */
    .progress-container {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin: 0 0 18px;
    }
    .step {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all .25s;
      color: #1f2933;
      text-decoration: none;
      user-select: none;
    }
    .step.active { background: #2563eb; color: #fff; }
    .step:hover  { transform: scale(1.1); }

    /* ── Card ── */
    .card {
      background: rgba(255,255,255,.88);
      border-radius: 20px;
      padding: 16px;
      box-shadow: 0 10px 28px rgba(0,0,0,.09);
    }

    /* ── Image ── */
    .img-wrap {
      width: 100%;
      border-radius: 14px;
      overflow: hidden;
      background: #f1f5f9;
      margin-bottom: 14px;
      box-shadow: 0 4px 12px rgba(0,0,0,.07);
    }
    .img-wrap img {
      width: 100%;
      height: auto;
      display: block;
      object-fit: contain;
      max-height: 280px;
    }

    /* ── Round label ── */
    .round-label {
      text-align: center;
      font-weight: 800;
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 10px;
    }

    /* ── Audio progress bar ── */
    .audio-bar-wrap {
      background: #bfdbfe;
      border-radius: 99px;
      height: 10px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .audio-bar-fill {
      height: 100%;
      background: #2563eb;
      border-radius: 99px;
      width: 0%;
      transition: width .25s linear;
    }

    /* ── Play button ── */
    .btn-play {
      width: 100%;
      border: 0;
      border-radius: 14px;
      padding: 13px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 900;
      font-size: 16px;
      background: #2563eb;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(37,99,235,.25);
      transition: background .2s, transform .1s;
      margin-bottom: 14px;
    }
    .btn-play:hover  { background: #1e40af; }
    .btn-play:active { transform: translateY(1px); }
    .btn-play:disabled { opacity: .7; cursor: not-allowed; }

    /* ── Script box ── */
    .script-box {
      background: rgba(241,245,249,.85);
      border-radius: 14px;
      padding: 12px 14px;
      margin-bottom: 14px;
      line-height: 1.6;
    }
    .script-line {
      display: block;
      font-weight: 700;
      font-size: 14px;
      border-radius: 6px;
      padding: 2px 4px;
      transition: background .2s;
    }
    .script-line.title-line {
      font-weight: 900;
      font-size: 15px;
      margin-bottom: 4px;
    }
    .script-line.lit {
      background: rgba(37,99,235,.15);
    }

    /* ── Question box ── */
    .qbox {
      background: rgba(248,250,252,.9);
      border-radius: 16px;
      padding: 14px;
      border: 2px solid transparent;
      margin-bottom: 10px;
    }
    .qbox.hidden { display: none; }

    .q-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }
    .q-prompt {
      font-weight: 800;
      font-size: 15px;
      flex: 1;
    }
    .q-status {
      font-size: 20px;
      font-weight: 900;
      min-width: 28px;
      text-align: right;
    }
    .q-status.ok  { color: #16a34a; }
    .q-status.bad { color: #dc2626; }

    .options { display: grid; gap: 10px; }
    .opt {
      width: 100%;
      text-align: left;
      border: 2px solid rgba(17,24,39,.12);
      background: #fff;
      border-radius: 14px;
      padding: 12px 14px;
      font-family: 'Poppins', Arial, sans-serif;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: border-color .15s, background .15s;
      -webkit-tap-highlight-color: transparent;
    }
    .opt:hover   { border-color: rgba(37,99,235,.45); }
    .opt.correct { border-color: #16a34a; background: rgba(22,163,74,.1); }
    .opt.wrong   { border-color: #dc2626; background: rgba(220,38,38,.08); }
    .opt:disabled { cursor: not-allowed; opacity: .95; }

    /* ── Feedback toast ── */
    .feedback-toast {
      text-align: center;
      font-weight: 900;
      font-size: 17px;
      color: #16a34a;
      padding: 8px 0;
    }
    .feedback-toast.hidden { display: none; }

    /* ── End screen ── */
    .end-screen {
      text-align: center;
      padding: 10px 0 4px;
    }
    .end-screen.hidden { display: none; }
    .end-screen h2 {
      font-size: 24px;
      font-weight: 900;
      margin: 8px 0 6px;
    }
    .end-score {
      font-size: 15px;
      font-weight: 700;
      color: #374151;
      margin-bottom: 16px;
    }
    .next-btn {
      display: inline-block;
      padding: 12px 28px;
      background: #2563eb;
      color: #fff;
      text-decoration: none;
      border-radius: 14px;
      font-weight: 900;
      font-size: 16px;
      box-shadow: 0 6px 14px rgba(37,99,235,.25);
    }
    .next-btn:hover { background: #1e40af; }

    .hidden { display: none !important; }

    @media (max-width: 420px) {
      body { padding: 12px; }
      .top-title { font-size: 16px; }
      .step { width: 34px; height: 34px; font-size: 13px; }
      .opt { font-size: 14px; padding: 11px 12px; }
      .img-wrap img { max-height: 220px; }
    }
  </style>
</head>

<body>
<div class="wrap">

  <a href="../index.html" class="back-btn">← Voltar para a Unidade 3</a>

  <div class="top-title">Unidade 3 • Lição 4 • Parte 1</div>

  <div class="topic-badge"><span id="topicLabel">NO PARQUE</span></div>
  <div class="subline">Ouça o texto e responda às perguntas.</div>

  <!-- Score bar -->
  <div class="score-bar">
    <div class="score-pill green"><span class="icon">✓</span><span id="scoreCorrect">0</span> corretas</div>
    <div class="score-pill blue"><span class="icon">📝</span><span id="scoreTotal">0</span> respondidas</div>
  </div>

  <!-- Part progress dots -->
  <div class="progress-container">
    <a class="step active" href="p1.html" aria-label="Parte 1">1</a>
    <a class="step"        href="p2.html" aria-label="Parte 2">2</a>
    <a class="step"        href="p3.html" aria-label="Parte 3">3</a>
    <a class="step"        href="p4.html" aria-label="Parte 4">4</a>
  </div>

  <!-- Main card -->
  <div class="card">

    <!-- Scene image -->
    <div class="img-wrap">
      <img id="sceneImg" src="" alt="Cena" />
    </div>

    <!-- Round label -->
    <div class="round-label" id="roundLabel">Texto 1 / 2</div>

    <!-- Audio progress -->
    <div class="audio-bar-wrap">
      <div class="audio-bar-fill" id="audioBar"></div>
    </div>

    <!-- Play button -->
    <button
      id="playBtn"
      class="btn-play"
      type="button"
    >▶ Ouvir / Reproduzir</button>

    <!-- Transcript -->
    <div class="script-box" id="scriptBox"></div>

    <!-- Question -->
    <div class="qbox hidden" id="qBox">
      <div class="q-header">
        <div class="q-prompt" id="qPrompt"></div>
        <div class="q-status" id="qStatus"></div>
      </div>
      <div class="options" id="qOptions"></div>
    </div>

    <!-- Feedback -->
    <div class="feedback-toast hidden" id="feedbackToast">¡Correcto! ✓</div>

    <!-- End screen -->
    <div class="end-screen hidden" id="endScreen">
      <h2>¡Bem feito! 🎉</h2>
      <div class="end-score" id="endScore"></div>
      <a class="next-btn" href="p2.html">Seguinte → Parte 2</a>
    </div>

  </div><!-- /card -->
</div><!-- /wrap -->

<script>
(() => {
  "use strict";

  const SUPABASE = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG_BASE   = SUPABASE + "images/u3/";
  const AUDIO_BASE = SUPABASE + "audio/u3/";
  const SFX_CORRECT = SUPABASE + "sfx/correct.wav";

  const sceneImg     = document.getElementById("sceneImg");
  const topicLabel   = document.getElementById("topicLabel");
  const roundLabel   = document.getElementById("roundLabel");
  const audioBar     = document.getElementById("audioBar");
  const playBtn      = document.getElementById("playBtn");
  const scriptBox    = document.getElementById("scriptBox");
  const qBox         = document.getElementById("qBox");
  const qPrompt      = document.getElementById("qPrompt");
  const qStatus      = document.getElementById("qStatus");
  const qOptions     = document.getElementById("qOptions");
  const feedbackToast= document.getElementById("feedbackToast");
  const endScreen    = document.getElementById("endScreen");
  const endScore     = document.getElementById("endScore");
  const scoreCorrectEl = document.getElementById("scoreCorrect");
  const scoreTotalEl   = document.getElementById("scoreTotal");

  const ROUNDS = [
    {
      topic: "NO PARQUE",
      img:   "u3.l4.p1.park2.jpg",
      audio: "u3.l4.p1.park.mp3",
      lines: [
        { text: "NO PARQUE", isTitle: true },
        { text: "A família Lopez está no parque hoje." },
        { text: "O Sr. Lopez está lendo um livro." },
        { text: "A Sra. Lopez está comendo um sanduíche." },
        { text: "Carlos e Anna estão brincando com uma bola." },
        { text: "A família Lopez está muito feliz." },
        { text: "Eles estão no parque hoje." }
      ],
      questions: [
        {
          prompt: "A. Onde eles estão?",
          options: ["no parque", "em casa no quintal", "na escola"],
          answer: "no parque"
        },
        {
          prompt: "B. O que o Sr. Lopez está fazendo?",
          options: ["lendo um livro", "bebendo limonada", "brincando com uma bola"],
          answer: "lendo um livro"
        },
        {
          prompt: "C. O que a Sra. Lopez está fazendo?",
          options: ["comendo um sanduíche", "plantando flores", "lendo uma mensagem"],
          answer: "comendo um sanduíche"
        },
        {
          prompt: "D. O que Carlos e Anna estão fazendo?",
          options: ["brincando com uma bola", "lendo um livro", "bebendo limonada"],
          answer: "brincando com uma bola"
        }
      ]
    },
    {
      topic: "EM CASA NO QUINTAL",
      img:   "u3.l4.p1.yard.jpg",
      audio: "u3.l4.p1.yard.mp3",
      lines: [
        { text: "EM CASA NO QUINTAL", isTitle: true },
        { text: "A família Johnson está em casa no quintal hoje." },
        { text: "O Sr. Johnson está plantando flores." },
        { text: "A Sra. Johnson está bebendo limonada." },
        { text: "David e Tom estão brincando com uma bola." },
        { text: "A família Johnson está feliz." },
        { text: "Eles estão em casa no quintal hoje." }
      ],
      questions: [
        {
          prompt: "A. Onde eles estão?",
          options: ["em casa no quintal", "no parque", "no trabalho"],
          answer: "em casa no quintal"
        },
        {
          prompt: "B. O que o Sr. Johnson está fazendo?",
          options: ["plantando flores", "lendo um livro", "comendo um sanduíche"],
          answer: "plantando flores"
        },
        {
          prompt: "C. O que a Sra. Johnson está fazendo?",
          options: ["bebendo limonada", "brincando com uma bola", "lendo uma mensagem"],
          answer: "bebendo limonada"
        },
        {
          prompt: "D. O que David e Tom estão fazendo?",
          options: ["brincando com uma bola", "plantando flores", "comendo um sanduíche"],
          answer: "brincando com uma bola"
        }
      ]
    }
  ];

  const TOTAL = ROUNDS.length;
  const TOTAL_QUESTIONS = ROUNDS.reduce((s, r) => s + r.questions.length, 0);

  let idx = 0, audio = null, isPlaying = false, hasListened = false, qIdx = 0, lineEls = [], scoreCorrect = 0, scoreAnswered = 0, sfxCorrect = null;

  try { sfxCorrect = new Audio(SFX_CORRECT); sfxCorrect.load(); } catch {}

  const show = el => el.classList.remove("hidden");
  const hide = el => el.classList.add("hidden");

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function updateScoreDisplay() {
    scoreCorrectEl.textContent = scoreCorrect;
    scoreTotalEl.textContent = scoreAnswered;
  }

  function saveProgress() {
    try {
      const key = "inglesco_progress_u3";
      const data = JSON.parse(localStorage.getItem(key) || "{}");
      if (!data.l4) data.l4 = {};
      data.l4.p1 = { done: true, correct: scoreCorrect, total: TOTAL_QUESTIONS };
      localStorage.setItem(key, JSON.stringify(data));
    } catch {}
  }

  function buildScript(lines) {
    scriptBox.innerHTML = "";
    lineEls = [];
    lines.forEach(({ text, isTitle }) => {
      const span = document.createElement("span");
      span.className = "script-line" + (isTitle ? " title-line" : "");
      span.textContent = text;
      scriptBox.appendChild(span);
      lineEls.push(span);
    });
  }

  function lightLine(i) {
    lineEls.forEach((el, j) => el.classList.toggle("lit", j === i));
  }
  function clearLights() { lineEls.forEach(el => el.classList.remove("lit")); }

  function resetBar() { audioBar.style.width = "0%"; }

  function stopAudio() {
    if (!audio) return;
    try { audio.pause(); audio.currentTime = 0; } catch {}
    isPlaying = false;
    playBtn.disabled = false;
    clearLights();
    resetBar();
    playBtn.textContent = hasListened ? "🔁 Ouvir novamente" : "▶ Ouvir / Reproduzir";
  }

  function playCurrent() {
    const round = ROUNDS[idx];
    if (!audio) audio = new Audio();
    audio.src = AUDIO_BASE + round.audio;
    isPlaying = true;
    playBtn.disabled = true;
    playBtn.textContent = "⏸ Reproduzindo...";
    hide(qBox);
    hide(feedbackToast);
    resetBar();

    const n = lineEls.length;

    audio.ontimeupdate = () => {
      if (!audio.duration) return;
      audioBar.style.width = (audio.currentTime / audio.duration * 100) + "%";
      const seg = audio.duration / n;
      lightLine(Math.min(Math.floor(audio.currentTime / seg), n - 1));
    };

    audio.onended = () => {
      isPlaying = false;
      hasListened = true;
      playBtn.disabled = false;
      playBtn.textContent = "🔁 Ouvir novamente";
      clearLights();
      resetBar();
      qIdx = 0;
      renderQuestion(round, qIdx);
    };

    audio.onerror = () => {
      isPlaying = false;
      playBtn.disabled = false;
      playBtn.textContent = "▶ Ouvir / Reproduzir";
    };

    audio.play().catch(() => {
      isPlaying = false;
      playBtn.disabled = false;
      playBtn.textContent = "▶ Ouvir / Reproduzir";
    });
  }

  function onPlayTap(e) {
    e.preventDefault();
    if (!isPlaying) playCurrent();
  }
  playBtn.addEventListener("touchend", onPlayTap, { passive: false });
  playBtn.addEventListener("click", onPlayTap);

  function renderQuestion(round, i) {
    const q = round.questions[i];
    qPrompt.textContent = q.prompt;
    qStatus.textContent = "";
    qStatus.className = "q-status";
    qOptions.innerHTML = "";

    shuffle(q.options).forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "opt";
      btn.type = "button";
      btn.textContent = opt;

      let moved = false;
      btn.addEventListener("touchstart", () => { moved = false; }, { passive: true });
      btn.addEventListener("touchmove", () => { moved = true; }, { passive: true });
      btn.addEventListener("touchend", e => {
        if (!moved) { e.preventDefault(); onAnswer(round, q, opt); }
      }, { passive: false });
      btn.addEventListener("click", () => onAnswer(round, q, opt));

      qOptions.appendChild(btn);
    });

    show(qBox);
  }

  function onAnswer(round, q, chosen) {
    if (!hasListened) return;

    const btns = qOptions.querySelectorAll(".opt");
    btns.forEach(b => { b.disabled = true; });

    scoreAnswered++;
    updateScoreDisplay();

    if (chosen === q.answer) {
      scoreCorrect++;
      updateScoreDisplay();

      btns.forEach(b => { if (b.textContent === q.answer) b.classList.add("correct"); });
      qStatus.textContent = "✓";
      qStatus.className = "q-status ok";

      try { if (sfxCorrect) { sfxCorrect.currentTime = 0; sfxCorrect.play(); } } catch {}

      showToast("Correto! ✓", "#16a34a");

      setTimeout(() => {
        hide(feedbackToast);
        qIdx++;
        if (qIdx < round.questions.length) {
          renderQuestion(round, qIdx);
        } else {
          setTimeout(nextRound, 500);
        }
      }, 700);

    } else {
      btns.forEach(b => { if (b.textContent === chosen) b.classList.add("wrong"); });
      qStatus.textContent = "✗";
      qStatus.className = "q-status bad";

      setTimeout(() => {
        qStatus.textContent = "";
        qStatus.className = "q-status";
        btns.forEach(b => {
          b.classList.remove("wrong");
          b.disabled = false;
        });
      }, 700);
    }
  }

  function showToast(msg, color) {
    feedbackToast.textContent = msg;
    feedbackToast.style.color = color || "#16a34a";
    show(feedbackToast);
  }

  function loadRound(i) {
    idx = i;
    hasListened = false;
    qIdx = 0;

    hide(endScreen);
    hide(qBox);
    hide(feedbackToast);

    const round = ROUNDS[idx];
    topicLabel.textContent = round.topic;
    roundLabel.textContent = `Texto ${idx + 1} / ${TOTAL}`;
    sceneImg.src = IMG_BASE + round.img;

    buildScript(round.lines);
    resetBar();
    stopAudio();
    playBtn.textContent = "▶ Ouvir / Reproduzir";
    playBtn.disabled = false;
  }

  function nextRound() {
    stopAudio();
    if (idx < TOTAL - 1) {
      loadRound(idx + 1);
      return;
    }
    hide(qBox);
    saveProgress();
    endScore.textContent = `Respostas corretas: ${scoreCorrect} / ${TOTAL_QUESTIONS}`;
    show(endScreen);
  }

  loadRound(0);
})();
</script>
</body>
</html>
