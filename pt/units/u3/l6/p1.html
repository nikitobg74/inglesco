      audio: "u3.l6.p1.girl.brushing.teeth.mp3",
      dialogueA: [{ text: "What are you doing?" }],
      dialogueB: [{ text: "I am brushing " }, { text: "my", pronoun: true }, { text: " teeth." }],
      fill:      [{ text: "I am brushing " }, { text: "my", pronoun: true }, { text: " teeth." }],
      correct: "my",     wrong: ["her", "his"]
    },
    {
      image: "u3.l6.p1.man.read.email.jpg",
      audio: "u3.l6.p1.man.read.email.mp3",
      dialogueA: [{ text: "What is he doing?" }],
      dialogueB: [{ text: "He is reading " }, { text: "his", pronoun: true }, { text: " emails." }],
      fill:      [{ text: "He is reading " }, { text: "his", pronoun: true }, { text: " emails." }],
      correct: "his",    wrong: ["my", "her"]
    }
  ];

  const TOTAL = ROUNDS.length;
  let idx            = 0;
  let audio          = null;
  let roundMistakes  = 0;
  let totalCorrect   = 0;
  let totalWrong     = 0;

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function stopAudio() {
    if (!audio) return;
    try { audio.pause(); audio.currentTime = 0; } catch(e) {}
  }

  function playSfx(sfx) {
    try { sfx.currentTime = 0; sfx.play(); } catch(e) {}
  }

  function setStatus(type, text) {
    statusLine.textContent = text;
    statusLine.className   = "status-line" + (type ? " " + type : "");
  }

  function updateScoreUI() {
    correctCountEl.textContent = totalCorrect;
    wrongCountEl.textContent   = totalWrong;
  }

  function renderMistakeDots(count) {
    mistakeDots.innerHTML = "";
    for (let i = 0; i < MAX_MISTAKES; i++) {
      const d = document.createElement("div");
      d.className = "m-dot" + (i < count ? " filled" : "");
      mistakeDots.appendChild(d);
    }
    mistakeDots.classList.remove("hidden");
  }

  function buildTableRows(tbody, thEnEl, thEsEl) {
    thEnEl.textContent = CONFIG.note.colEn;
    thEsEl.textContent = CONFIG.note.colEs;
    tbody.innerHTML    = "";
    CONFIG.note.rows.forEach(row => {
      const tr = document.createElement("tr");
      const tdEn = document.createElement("td"); tdEn.className = "col-en"; tdEn.textContent = row.en;
      const tdEs = document.createElement("td"); tdEs.className = "col-es"; tdEs.textContent = row.es;
      tr.append(tdEn, tdEs);
      tbody.appendChild(tr);
    });
  }

  function renderLine(el, speaker, parts) {
    el.innerHTML = "";
    const sp = document.createElement("span");
    sp.className = "speaker"; sp.textContent = speaker;
    el.appendChild(sp);
    parts.forEach(part => {
      if (part.pronoun) {
        const mark = document.createElement("span");
        mark.className = "pronoun"; mark.textContent = part.text;
        el.appendChild(mark);
      } else {
        el.appendChild(document.createTextNode(part.text));
      }
    });
  }

  function renderFillSentence(parts) {
    fillSentence.innerHTML = "";
    parts.forEach(part => {
      if (part.pronoun) {
        const blank = document.createElement("span");
        blank.className = "fill-blank"; blank.id = "fillBlank";
        blank.textContent = "___";
        fillSentence.appendChild(blank);
      } else {
        fillSentence.appendChild(document.createTextNode(part.text));
      }
    });
  }

  function revealAnswer(round) {
    const allTiles = Array.from(tilesContainer.querySelectorAll(".tile"));
    allTiles.forEach(b => { b.disabled = true; });

    const correctTile = allTiles.find(b => b.textContent === round.correct);
    if (correctTile) correctTile.classList.add("revealed");

    const blank = document.getElementById("fillBlank");
    if (blank) {
      blank.textContent        = round.correct;
      blank.style.borderColor  = "#f59e0b";
      blank.style.color        = "#b45309";
    }

    setStatus("hint", "⚠ A resposta correta é: " + round.correct);

    setTimeout(() => {
      setStatus("", "");
      advanceOrFinish();
    }, 1800);
  }

  function buildTiles(round) {
    tilesContainer.innerHTML = "";
    const options = shuffle([round.correct, ...round.wrong]);

    options.forEach(word => {
      const btn = document.createElement("button");
      btn.className = "tile"; btn.type = "button";
      btn.textContent = word;

      const handler = () => {
        if (btn.disabled) return;

        if (word === round.correct) {
          Array.from(tilesContainer.querySelectorAll(".tile")).forEach(b => { b.disabled = true; });
          btn.classList.add("correct");
          const blank = document.getElementById("fillBlank");
          if (blank) {
            blank.textContent       = word;
            blank.style.borderColor = "#16a34a";
            blank.style.color       = "#16a34a";
          }
          totalCorrect++;
          updateScoreUI();
          playSfx(SFX_OK);
          setStatus("ok", "✓");
          setTimeout(() => { setStatus("", ""); advanceOrFinish(); }, 1000);

        } else {
          roundMistakes++;
          totalWrong++;
          updateScoreUI();
          renderMistakeDots(roundMistakes);
          btn.classList.add("wrong");
          playSfx(SFX_BAD);
          setStatus("bad", "✗");

          if (roundMistakes >= MAX_MISTAKES) {
            Array.from(tilesContainer.querySelectorAll(".tile")).forEach(b => { b.disabled = true; });
            setTimeout(() => { revealAnswer(round); }, 500);
          } else {
            setTimeout(() => {
              btn.classList.remove("wrong");
              Array.from(tilesContainer.querySelectorAll(".tile")).forEach(b => { b.disabled = false; });
              setStatus("", "");
            }, 600);
          }
        }
      };

      btn.addEventListener("click", handler);
      btn.addEventListener("touchstart", e => { e.preventDefault(); handler(); }, { passive: false });
      tilesContainer.appendChild(btn);
    });
  }

  function loadRound(i) {
    idx           = i;
    roundMistakes = 0;
    stopAudio();
    setStatus("", "");
    mistakeDots.innerHTML = "";
    renderMistakeDots(0);

    const round = ROUNDS[idx];
    roundLabel.textContent = `${idx + 1} / ${TOTAL}`;

    itemImg.src = IMG + round.image;
    itemImg.alt = "";

    dialogueBlock.classList.add("hidden");
    fillBlock.classList.add("hidden");
    playLabel.textContent = CONFIG.play;
    playBtn.disabled = false;
  }

  const handlePlay = () => {
    stopAudio();
    const round     = ROUNDS[idx];
    const firstPlay = dialogueBlock.classList.contains("hidden");

    if (firstPlay) {
      renderLine(lineA, "A: ", round.dialogueA);
      renderLine(lineB, "B: ", round.dialogueB);
      dialogueBlock.classList.remove("hidden");
    }

    audio = new Audio(AUD + round.audio);

    const showFill = () => {
      if (fillBlock.classList.contains("hidden")) {
        fillTitle.textContent = CONFIG.fillTitle;
        renderFillSentence(round.fill);
        buildTiles(round);
        fillBlock.classList.remove("hidden");
        fillBlock.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    };

    audio.onended = showFill;
    audio.play().catch(showFill);
  };

  playBtn.addEventListener("click", handlePlay);
  playBtn.addEventListener("touchstart", e => { e.preventDefault(); handlePlay(); }, { passive: false });

  function advanceOrFinish() {
    if (idx < TOTAL - 1) {
      loadRound(idx + 1);
    } else {
      finish();
    }
  }

  function finish() {
    stopAudio();
    markPageComplete();
    exerciseBox.classList.add("hidden");
    roundLabel.classList.add("hidden");
    mistakeDots.classList.add("hidden");
    refPanel.classList.add("hidden");
    scoreBar.classList.add("hidden");

    endCorrectEl.textContent = totalCorrect;
    endWrongEl.textContent   = totalWrong;
    endTitle.textContent     = CONFIG.end.title;
    endMsg1.textContent      = CONFIG.end.msg1;
    endMsg2.textContent      = CONFIG.end.msg2;
    endScreen.classList.remove("hidden");
  }

  refToggle.addEventListener("click", () => {
    const open = refBody.classList.contains("open");
    refBody.classList.toggle("open", !open);
    refToggle.classList.toggle("open", !open);
  });

  function initNoteCard() {
    noteTitle.textContent    = CONFIG.note.title;
    noteSubtitle.textContent = CONFIG.note.subtitle;
    buildTableRows(noteTableBody, thEn, thEs);
    dismissBtn.textContent   = CONFIG.note.dismiss;

    const startExercise = () => {
      noteCard.classList.add("hidden");
      buildTableRows(refTableBody, refThEn, refThEs);
      refToggleLabel.textContent = CONFIG.note.refLabel;
      refPanel.classList.remove("hidden");
      roundLabel.classList.remove("hidden");
      scoreBar.classList.remove("hidden");
      exerciseBox.classList.remove("hidden");
      loadRound(0);
    };

    dismissBtn.addEventListener("click", startExercise);
    dismissBtn.addEventListener("touchstart", e => { e.preventDefault(); startExercise(); }, { passive: false });
  }

  instrLine.textContent = CONFIG.instr;
  initNoteCard();
})();
</script>
</body>
</html>
