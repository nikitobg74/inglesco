<!DOCTYPE html>
<html lang="pt">
<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'Poppins', Arial, sans-serif;
      padding: 16px;
      margin: 0;
      color: #111827;
      background: linear-gradient(135deg, #dbeafe 0%, #fef9c3 100%);
      min-height: 100vh;
    }

    .wrap { max-width: 680px; margin: 0 auto; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 18px;
      padding: 8px 16px;
      background: #2563eb; color: #fff;

      transition: background .2s;

    .progress-container {
      display: flex; justify-content: center; gap: 10px;

    }
    .step {
      width: 38px; height: 38px; border-radius: 50%;
      background: #d1d5db;
      display: flex; align-items: center; justify-content: center;

    }
    .step.active { background: #2563eb; color: #fff; box-shadow: 0 4px 12px rgba(37,99,235,.35); }

    .top-title {
      text-align: center; margin: 0 0 6px;
      font-size: 19px; font-weight: 900; color: #1e3a5f;
    }
    .subline { text-align: center; margin: 0 0 16px; }
    .subline span {
      background: rgba(255,255,255,.75);
      padding: 5px 12px; border-radius: 10px;

      background: rgba(255,255,255,.88);

      display: flex; justify-content: center; align-items: center;

    .img-wrapper {

    .play-btn {
      display: flex; align-items: center; justify-content: center;

      font-weight: 900; font-size: 16px;

    .blank-input {
      display: inline-block;
      border: none;

      background: transparent;
      font-family: 'Poppins', Arial, sans-serif;

      text-align: center;
      outline: none;

      border-radius: 4px 4px 0 0;
      transition: border-color .2s, background .2s, color .2s;
    }
    .blank-input:focus {
      background: #eff6ff;
      border-color: #1d4ed8;
    }
    .blank-input.correct {
      color: #16a34a;
      border-color: #16a34a;
      background: rgba(22,163,74,.08);
    }
    .blank-input.wrong {
      color: #dc2626;
      border-color: #dc2626;

    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25%      { transform: translateX(-5px); }
      75%      { transform: translateX(5px); }
    }

    .check-btn {
      display: block; margin: 0 auto;
      padding: 12px 36px;

      font-weight: 900; font-size: 16px;

      box-shadow: 0 5px 14px rgba(124,58,237,.28);
      transition: background .2s, transform .1s;
    }
    .check-btn:hover:not(:disabled) { background: #6d28d9; }
    .check-btn:active  { transform: scale(.97); }
    .check-btn:disabled { opacity: .5; cursor: not-allowed; }

    .hint-section {
      margin-top: 14px;
      text-align: center;
    }

    .hint-btn {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 20px;
      background: #fef3c7; color: #92400e;
      border: 2px solid #fcd34d;
      border-radius: 12px;
      font-weight: 900; font-size: 14px;
      cursor: pointer; font-family: inherit;
      transition: background .2s, transform .1s;
      margin-bottom: 10px;
    }
    .hint-btn:hover { background: #fde68a; }
    .hint-btn:active { transform: scale(.97); }

    .hint-table-wrap {
      background: #fffbeb;
      border: 2px solid #fcd34d;
      border-radius: 14px;
      overflow: hidden;
      margin-top: 6px;
    }

      width: 100%; border-collapse: collapse; font-size: 14px;

    .hint-table thead th {
      background: #fef3c7; color: #92400e;
      font-weight: 900; padding: 6px 10px;
      text-align: center; font-size: 11px;
      letter-spacing: .05em; text-transform: uppercase;
    }
    .hint-table tbody tr:nth-child(odd)  { background: #fffbeb; }
    .hint-table tbody tr:nth-child(even) { background: #fef9c3; }
    .hint-table td { padding: 8px 14px; vertical-align: middle; }
    .hint-table td.col-en { font-weight: 900; color: #7c3aed; font-size: 16px; }
    .hint-table td.col-es { color: #374151; font-style: italic; font-size: 13px; }

    .status-line {
      text-align: center; min-height: 26px;
      font-weight: 900; font-size: 17px; margin-top: 6px;
    }
    .status-line.ok  { color: #16a34a; }
    .status-line.bad { color: #dc2626; }

    .end { text-align: center; padding: 20px 10px 8px; }
    .end .trophy { font-size: 54px; margin-bottom: 6px; }
    .end h2 { margin: 8px 0 4px; font-size: 24px; font-weight: 900; color: #1e3a5f; }
    .end .end-score {
      display: flex; justify-content: center; gap: 24px;
      margin: 12px 0 16px;
    }

      display: flex; flex-direction: column; align-items: center;

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      body { padding: 12px; }

      .item-img { height: 175px; }
      .sentence-display { font-size: 17px; }
      .blank-input { font-size: 17px; min-width: 68px; }
      .check-btn { font-size: 15px; padding: 11px 28px; }
      .play-btn { font-size: 15px; }
    }
  </style>

                <tr><th>English</th><th>Português</th></tr>

                <tr><td class="col-en">my</td>    <td class="col-es">meu / minha / meus / minhas</td></tr>
                <tr><td class="col-en">his</td>   <td class="col-es">seu / sua (dele)</td></tr>

          <span class="es-num" id="endWrong">0</span>

<script>
(() => {
  "use strict";

  const SB      = "https://cnbuzahtzqknhhdxncur.supabase.co/storage/v1/object/public/assets/";
  const IMG     = SB + "images/u3/";
  const AUD     = SB + "audio/u3/";
  const SFX_OK  = new Audio(SB + "audio/u3/correct.wav");
  const SFX_BAD = new Audio(SB + "audio/u3/incorrect.wav");

  const PROGRESS_KEY = "inglesco_progress_u3";
  const LESSON_KEY   = "inglesco_furthest_u3_l6";

  function markPageComplete() {
    try {
      const prev = parseInt(localStorage.getItem(LESSON_KEY) || "0", 10);
      if (4 > prev) localStorage.setItem(LESSON_KEY, "4");
    } catch(e) {}
    try {
      const raw  = localStorage.getItem(PROGRESS_KEY);
      const data = raw ? JSON.parse(raw) : {};
      if (!data.l6) data.l6 = { partsCompleted: 0, partsTotal: 4 };
      if (data.l6.partsCompleted < 4) data.l6.partsCompleted = 4;
      localStorage.setItem(PROGRESS_KEY, JSON.stringify(data));
    } catch(e) {}
  }

  const $ = id => document.getElementById(id);
  const roundLabel     = $("roundLabel");
  const mistakeDots    = $("mistakeDots");
  const exerciseBox    = $("exerciseBox");
  const endScreen      = $("endScreen");
  const instrLine      = $("instrLine");
  const scoreBar       = $("scoreBar");
  const correctCountEl = $("correctCount");
  const wrongCountEl   = $("wrongCount");
  const itemImg        = $("itemImg");
  const playBtn        = $("playBtn");
  const playLabel      = $("playLabel");
  const buildBlock     = $("buildBlock");
  const sentenceDisplay= $("sentenceDisplay");
  const checkBtn       = $("checkBtn");
  const hintBtn        = $("hintBtn");
  const hintTableWrap  = $("hintTableWrap");
  const statusLine     = $("statusLine");
  const endTitle       = $("endTitle");
  const endMsg1        = $("endMsg1");
  const endMsg2        = $("endMsg2");
  const endCorrectEl   = $("endCorrect");
  const endWrongEl     = $("endWrong");

  const HINT_AFTER = 2;

  const CONFIG = {
    instr:    "Ouça e escreva o pronome possessivo.",
    play:     "Ouvir",
    checkBtn: "Verificar",
    end: {
      title: "Fantástico!",
      msg1:  "Parabéns.",
      msg2:  "Você terminou a Parte 4."
    }
  };

  const ROUNDS = [
    {
      image:    "u3.l6.p1.fix.car.jpg",
      audio:    "u3.l6.p3.fix.car.mp3",
      template: ["I am fixing ", "{0}", " car."],
      answer:   "my"
    },
    {
      image:    "u3.l6.p1.woman.fix.car.jpg",
      audio:    "u3.l6.p3.woman.fix.car.mp3",
      template: ["She is fixing ", "{0}", " car."],
      answer:   "her"
    },
    {
      image:    "u3.l6.p1.fix.sink.jpg",
      audio:    "u3.l6.p3.fix.sink.mp3",
      template: ["He is fixing ", "{0}", " sink."],
      answer:   "his"
    },
    {
      image:    "u3.l6.p1.woman.clean.apartment.jpg",
      audio:    "u3.l6.p3.woman.clean.apartment.mp3",
      template: ["She is cleaning ", "{0}", " apartment."],
      answer:   "her"
    },
    {
      image:    "u3.l6.p1.man.clean.window.jpg",
      audio:    "u3.l6.p3.man.clean.window.mp3",
      template: ["He is cleaning ", "{0}", " window."],
      answer:   "his"
    },
    {
      image:    "u3.l6.p1.feed.cat.jpg",
      audio:    "u3.l6.p3.feed.cat.mp3",
      template: ["I am feeding ", "{0}", " cat."],
      answer:   "my"
    },
    {
      image:    "u3.l6.p1.doing.homework.jpg",
      audio:    "u3.l6.p3.doing.homework.mp3",
      template: ["They are doing ", "{0}", " homework."],
      answer:   "their"
    },
    {
      image:    "u3.l6.p1.woman.washing.clothes.jpg",
      audio:    "u3.l6.p3.woman.washing.clothes.mp3",
      template: ["She is washing ", "{0}", " clothes."],
      answer:   "her"
    },
    {
      image:    "u3.l6.p1.painting.jpg",
      audio:    "u3.l6.p3.painting.mp3",
      template: ["We are painting ", "{0}", " bedroom."],
      answer:   "our"
    },
    {
      image:    "u3.l6.p1.girl.brushing.teeth.jpg",
      audio:    "u3.l6.p3.girl.brushing.teeth.mp3",
      template: ["I am brushing ", "{0}", " teeth."],
      answer:   "my"
    },
    {
      image:    "u3.l6.p1.man.read.email.jpg",
      audio:    "u3.l6.p3.man.read.email.mp3",
      template: ["He is reading ", "{0}", " emails."],
      answer:   "his"
    }
  ];

  function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  const SHUFFLED = shuffle(ROUNDS);
  const TOTAL    = SHUFFLED.length;

  let idx           = 0;
  let audio         = null;
  let isLocked      = false;
  let roundMistakes = 0;
  let totalCorrect  = 0;
  let totalWrong    = 0;

  function stopAudio() {
    if (!audio) return;
    try { audio.pause(); audio.currentTime = 0; } catch(e) {}
  }

  function playSfx(sfx) {
    try { sfx.currentTime = 0; sfx.play(); } catch(e) {}
  }

  function setStatus(type, text) {
    statusLine.textContent = text;
    statusLine.className   = "status-line" + (type ? " " + type : "");
  }

  function updateScoreUI() {
    correctCountEl.textContent = totalCorrect;
    wrongCountEl.textContent   = totalWrong;
  }

  function renderMistakeDots(count) {
    mistakeDots.innerHTML = "";
    for (let i = 0; i < HINT_AFTER; i++) {
      const d = document.createElement("div");
      d.className = "m-dot" + (i < count ? " filled" : "");
      mistakeDots.appendChild(d);
    }
  }

  function maybeShowHintBtn() {
    if (roundMistakes >= HINT_AFTER) {
      hintBtn.classList.remove("hidden");
    }
  }

  hintBtn.addEventListener("click", () => {
    hintTableWrap.classList.toggle("hidden");
    hintBtn.textContent = hintTableWrap.classList.contains("hidden")
      ? "💡 Ver dica"
      : "💡 Ocultar dica";
  });

  function resetHint() {
    hintBtn.classList.add("hidden");
    hintTableWrap.classList.add("hidden");
    hintBtn.textContent = "💡 Ver dica";
  }

  function buildSentence(round) {
    while (sentenceDisplay.firstChild) sentenceDisplay.removeChild(sentenceDisplay.firstChild);

    round.template.forEach(part => {
      if (part === "{0}") {
        const inp = document.createElement("input");
        inp.type           = "text";
        inp.className      = "blank-input";
        inp.autocomplete   = "off";
        inp.autocorrect    = "off";
        inp.autocapitalize = "off";
        inp.spellcheck     = false;
        inp.style.width    = Math.max(round.answer.length * 14 + 28, 80) + "px";

        inp.addEventListener("keydown", e => {
          if (e.key === "Enter") handleCheck();
        });

        sentenceDisplay.appendChild(inp);
      } else {
        const span = document.createElement("span");
        span.textContent = part;
        sentenceDisplay.appendChild(span);
      }
    });

    const inp = sentenceDisplay.querySelector(".blank-input");
    if (inp) setTimeout(() => inp.focus(), 80);
  }

  function handleCheck() {
    if (isLocked) return;
    const round = SHUFFLED[idx];
    const inp   = sentenceDisplay.querySelector(".blank-input");
    if (!inp) return;

    const typed   = inp.value.trim().toLowerCase();
    const correct = round.answer.toLowerCase();

    if (typed === correct) {
      isLocked = true;
      resetHint();
      inp.classList.add("correct");
      inp.disabled      = true;
      checkBtn.disabled = true;
      totalCorrect++;
      updateScoreUI();
      playSfx(SFX_OK);
      setStatus("ok", "✓");
      setTimeout(() => {
        setStatus("", "");
        isLocked = false;
        advanceOrFinish();
      }, 900);
    } else {
      roundMistakes++;
      totalWrong++;
      updateScoreUI();
      renderMistakeDots(roundMistakes);
      inp.classList.add("wrong");
      playSfx(SFX_BAD);
      setStatus("bad", "✗ Tente novamente.");
      maybeShowHintBtn();

      setTimeout(() => {
        inp.classList.remove("wrong");
        inp.value = "";
        inp.focus();
        setStatus("", "");
      }, 600);
    }
  }

  function loadRound(i) {
    idx           = i;
    roundMistakes = 0;
    stopAudio();
    setStatus("", "");
    isLocked    = false;
    resetHint();
    renderMistakeDots(0);

    const round = SHUFFLED[idx];
    roundLabel.textContent = `${idx + 1} / ${TOTAL}`;
    itemImg.src            = IMG + round.image;
    itemImg.alt            = "";
    playLabel.textContent  = CONFIG.play;
    checkBtn.textContent   = CONFIG.checkBtn;
    checkBtn.disabled      = false;

    buildBlock.classList.add("hidden");
  }

  const handlePlay = () => {
    stopAudio();
    const round = SHUFFLED[idx];
    audio = new Audio(AUD + round.audio);

    const showBuild = () => {
      if (buildBlock.classList.contains("hidden")) {
        buildSentence(round);
        buildBlock.classList.remove("hidden");
        buildBlock.scrollIntoView({ behavior: "smooth", block: "nearest" });
      }
    };

    audio.onended = showBuild;
    audio.play().catch(showBuild);
  };

  playBtn.addEventListener("click", handlePlay);
  playBtn.addEventListener("touchstart", e => { e.preventDefault(); handlePlay(); }, { passive: false });
  checkBtn.addEventListener("click", handleCheck);

  function advanceOrFinish() {
    if (idx < TOTAL - 1) loadRound(idx + 1);
    else finish();
  }

  function finish() {
    stopAudio();
    markPageComplete();
    exerciseBox.classList.add("hidden");
    roundLabel.classList.add("hidden");
    mistakeDots.classList.add("hidden");
    scoreBar.classList.add("hidden");

    endCorrectEl.textContent = totalCorrect;
    endWrongEl.textContent   = totalWrong;
    endTitle.textContent     = CONFIG.end.title;
    endMsg1.textContent      = CONFIG.end.msg1;
    endMsg2.textContent      = CONFIG.end.msg2;
    endScreen.classList.remove("hidden");
  }

  instrLine.textContent = CONFIG.instr;
  loadRound(0);
})();
</script>
</body>
</html>
